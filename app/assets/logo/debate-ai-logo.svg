<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" role="img" aria-label="Debate AI">
  <title>Debate AI</title>
  <desc>Debate AI logo. Master vector for social-media profile pictures, PWA icons, and marketing surfaces. Square 1024x1024 so it crops to a circle on every platform with avatar cropping. Crimson red on near-black; "Debate" in warm white sans, "AI." in crimson italic serif (matches the in-product topbar wordmark). The radial glow echoes the live-debate orb on /landing.</desc>
  <defs>
    <radialGradient id="glow" cx="50%" cy="48%" r="55%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.55"/>
      <stop offset="35%" stop-color="#7a1d1d" stop-opacity="0.30"/>
      <stop offset="70%" stop-color="#0a0a0c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accentInk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fb7185"/>
      <stop offset="55%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blurred"/>
      <feMerge>
        <feMergeNode in="blurred"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1024" height="1024" fill="#0a0a0c"/>
  <rect width="1024" height="1024" fill="url(#glow)"/>

  <circle cx="512" cy="512" r="468" fill="none" stroke="rgba(239,68,68,0.18)" stroke-width="2"/>
  <circle cx="512" cy="512" r="446" fill="none" stroke="rgba(239,68,68,0.10)" stroke-width="1"/>

  <g font-family="'Inter','Helvetica Neue',Arial,sans-serif" text-anchor="middle">
    <text x="512" y="470" font-size="184" font-weight="900" letter-spacing="-6" fill="#f5f5ee" filter="url(#softGlow)">Debate</text>
    <text x="512" y="680" font-size="288" font-weight="900" font-style="italic" font-family="'Playfair Display','Times New Roman',serif" letter-spacing="-12" fill="url(#accentInk)">AI<tspan fill="#f5f5ee">.</tspan></text>
  </g>

  <text x="746" y="500" font-family="'Inter',sans-serif" font-size="36" font-weight="700" fill="rgba(245,245,238,0.55)">™</text>
</svg>
