<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" fill="none" role="img" aria-label="Two students debating at podiums in a classroom while a moderator keeps time">
<style>
  :root{--ink:#ece7da;--red:#ef4444;}
  .ln{fill:none;stroke:#ece7da;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round}
  .lnT{fill:none;stroke:#ece7da;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;opacity:.55}
  .lnF{fill:none;stroke:#ece7da;stroke-width:1.4;opacity:.3}
  .ink{fill:#ece7da}
  .inkD{fill:#ece7da;opacity:.5}
  .red{fill:#ef4444}
  .redS{fill:none;stroke:#ef4444;stroke-width:2.6;stroke-linecap:round}
  .panel{fill:#0c0c0e}

  /* ── back-and-forth: left speaks, then right ── */
  @keyframes bubL{0%,4%{opacity:0;transform:translateY(6px) scale(.96)}9%,42%{opacity:1;transform:none}48%,100%{opacity:0;transform:translateY(6px) scale(.96)}}
  @keyframes bubR{0%,52%{opacity:0;transform:translateY(6px) scale(.96)}57%,92%{opacity:1;transform:none}98%,100%{opacity:0;transform:translateY(6px) scale(.96)}}
  #bubL{transform-box:fill-box;transform-origin:center;animation:bubL 7s ease-in-out infinite}
  #bubR{transform-box:fill-box;transform-origin:center;animation:bubR 7s ease-in-out infinite}
  /* speaker leans in on their turn */
  @keyframes leanL{0%,4%,48%,100%{transform:translateY(0)}9%,42%{transform:translateY(-5px)}}
  @keyframes leanR{0%,52%,98%,100%{transform:translateY(0)}57%,92%{transform:translateY(-5px)}}
  #figL{animation:leanL 7s ease-in-out infinite}
  #figR{animation:leanR 7s ease-in-out infinite}
  /* sound bars pulse */
  @keyframes eq{0%,100%{transform:scaleY(.35)}50%{transform:scaleY(1)}}
  .eq rect{transform-box:fill-box;transform-origin:bottom;animation:eq .9s ease-in-out infinite}
  .eq rect:nth-child(2){animation-delay:.15s}.eq rect:nth-child(3){animation-delay:.3s}.eq rect:nth-child(4){animation-delay:.12s}
  @keyframes showL{0%,4%,48%,100%{opacity:0}9%,42%{opacity:1}}
  @keyframes showR{0%,52%,98%,100%{opacity:0}57%,92%{opacity:1}}
  #eqL{animation:showL 7s ease-in-out infinite}
  #eqR{animation:showR 7s ease-in-out infinite}
  /* clock second hand + gavel tap + score marker drift */
  @keyframes spin{to{transform:rotate(360deg)}}
  #sec{transform-box:fill-box;transform-origin:111px 132px;animation:spin 9s linear infinite}
  @keyframes tap{0%,70%,100%{transform:rotate(0)}80%{transform:rotate(-26deg)}90%{transform:rotate(0)}}
  #gavel{transform-box:fill-box;transform-origin:right bottom;animation:tap 3.5s ease-in-out infinite}
  @keyframes drift{0%,100%{transform:translateX(-46px)}50%{transform:translateX(46px)}}
  #score{animation:drift 7s ease-in-out infinite}
  @media (prefers-reduced-motion:reduce){#bubL,#bubR,#figL,#figR,#sec,#gavel,#score,.eq rect,#eqL,#eqR{animation:none}#bubR{opacity:1}}
</style>

<!-- chalkboard with the motion -->
<rect x="300" y="64" width="372" height="150" rx="7" class="ln"/>
<rect x="300" y="64" width="372" height="150" rx="7" class="panel" opacity=".5"/>
<text x="318" y="92" class="inkD" font-family="ui-monospace,Menlo,monospace" font-size="13" letter-spacing="3">THE MOTION</text>
<line x1="318" y1="118" x2="610" y2="118" class="lnT"/>
<line x1="318" y1="142" x2="654" y2="142" class="lnT"/>
<line x1="318" y1="166" x2="566" y2="166" class="lnT"/>
<line x1="318" y1="188" x2="470" y2="188" class="redS"/>
<circle cx="648" cy="196" r="6" class="red"/>

<!-- score tug rail under the board -->
<line x1="356" y1="244" x2="616" y2="244" class="lnF"/>
<g id="score"><circle cx="486" cy="244" r="7" class="red"/><circle cx="486" cy="244" r="12" class="redS" opacity=".5"/></g>

<!-- clock, ticking -->
<circle cx="111" cy="132" r="44" class="ln"/>
<circle cx="111" cy="132" r="3.5" class="ink"/>
<line x1="111" y1="132" x2="111" y2="104" class="ln"/>
<line x1="111" y1="132" x2="132" y2="132" class="lnT"/>
<g id="sec"><line x1="111" y1="132" x2="111" y2="98" class="redS"/></g>
<line x1="111" y1="92" x2="111" y2="99" class="lnT"/><line x1="151" y1="132" x2="144" y2="132" class="lnT"/>
<line x1="111" y1="172" x2="111" y2="165" class="lnT"/><line x1="71" y1="132" x2="78" y2="132" class="lnT"/>

<!-- ░░ LEFT debater ░░ -->
<g id="figL">
  <circle cx="250" cy="356" r="27" class="ln"/>
  <path d="M250 383 q-30 6 -34 40 M250 383 q30 6 34 40" class="ln"/>
  <path d="M250 388 v34" class="lnT"/>
  <!-- raised arm, pointing toward center -->
  <path d="M278 398 q44 -10 78 -34" class="ln"/>
  <circle cx="358" cy="362" r="4.5" class="red"/>
  <!-- red bowtie -->
  <path d="M242 386 l8 5 -8 5 z M258 386 l-8 5 8 5 z" class="red"/>
</g>
<!-- left podium -->
<path d="M196 470 h108 l16 96 h-140 z" class="ln"/>
<path d="M196 470 h108 l16 96 h-140 z" class="panel" opacity=".6"/>
<line x1="216" y1="470" x2="206" y2="566" class="lnF"/><line x1="284" y1="470" x2="294" y2="566" class="lnF"/>
<rect x="188" y="462" width="124" height="12" rx="3" class="ln"/>
<!-- left sound bars -->
<g id="eqL" class="eq"><g transform="translate(150 350)"><rect x="0" y="0" width="5" height="34" rx="2" class="red"/><rect x="10" y="0" width="5" height="34" rx="2" class="red"/><rect x="20" y="0" width="5" height="34" rx="2" class="red"/><rect x="30" y="0" width="5" height="34" rx="2" class="red"/></g></g>

<!-- ░░ RIGHT debater ░░ -->
<g id="figR">
  <circle cx="710" cy="356" r="27" class="ln"/>
  <path d="M710 383 q-30 6 -34 40 M710 383 q30 6 34 40" class="ln"/>
  <path d="M710 388 v34" class="lnT"/>
  <path d="M682 398 q-44 -10 -78 -34" class="ln"/>
  <circle cx="602" cy="362" r="4.5" class="ink"/>
  <rect x="700" y="388" width="20" height="9" rx="2" class="red"/>
</g>
<path d="M656 470 h108 l16 96 h-140 z" class="ln"/>
<path d="M656 470 h108 l16 96 h-140 z" class="panel" opacity=".6"/>
<line x1="676" y1="470" x2="666" y2="566" class="lnF"/><line x1="744" y1="470" x2="754" y2="566" class="lnF"/>
<rect x="648" y="462" width="124" height="12" rx="3" class="ln"/>
<g id="eqR" class="eq"><g transform="translate(780 350)"><rect x="0" y="0" width="5" height="34" rx="2" class="red"/><rect x="10" y="0" width="5" height="34" rx="2" class="red"/><rect x="20" y="0" width="5" height="34" rx="2" class="red"/><rect x="30" y="0" width="5" height="34" rx="2" class="red"/></g></g>

<!-- moderator + gavel -->
<circle cx="480" cy="452" r="20" class="ln"/>
<path d="M480 472 q-22 5 -26 30 M480 472 q22 5 26 30" class="ln"/>
<rect x="430" y="506" width="100" height="48" rx="5" class="ln"/>
<rect x="430" y="506" width="100" height="48" rx="5" class="panel" opacity=".6"/>
<g id="gavel" transform="translate(540 500)">
  <line x1="0" y1="14" x2="26" y2="-12" class="ln"/>
  <rect x="20" y="-26" width="26" height="16" rx="3" class="red" transform="rotate(-45 33 -18)"/>
</g>
<rect x="556" y="540" width="34" height="9" rx="3" class="lnT"/>

<!-- audience heads (faint) -->
<g class="lnF">
  <path d="M120 612 a18 18 0 0 1 36 0"/><path d="M186 612 a18 18 0 0 1 36 0"/>
  <path d="M252 612 a18 18 0 0 1 36 0"/><path d="M740 612 a18 18 0 0 1 36 0"/>
  <path d="M806 612 a18 18 0 0 1 36 0"/>
</g>

<!-- ░░ speech bubbles, alternating ░░ -->
<g id="bubL">
  <rect x="92" y="232" width="168" height="92" rx="14" class="ln"/>
  <rect x="92" y="232" width="168" height="92" rx="14" class="panel"/>
  <path d="M150 324 l-6 26 30 -26 z" class="ln"/><path d="M150 324 l-6 26 30 -26 z" class="panel"/>
  <line x1="112" y1="262" x2="232" y2="262" class="lnT"/>
  <line x1="112" y1="282" x2="240" y2="282" class="lnT"/>
  <line x1="112" y1="302" x2="196" y2="302" class="lnT"/>
  <circle cx="240" cy="248" r="5" class="red"/>
</g>
<g id="bubR">
  <rect x="700" y="232" width="168" height="92" rx="14" class="ln"/>
  <rect x="700" y="232" width="168" height="92" rx="14" class="panel"/>
  <path d="M810 324 l6 26 -30 -26 z" class="ln"/><path d="M810 324 l6 26 -30 -26 z" class="panel"/>
  <line x1="724" y1="262" x2="844" y2="262" class="lnT"/>
  <line x1="716" y1="282" x2="844" y2="282" class="lnT"/>
  <line x1="760" y1="302" x2="844" y2="302" class="lnT"/>
  <circle cx="720" cy="248" r="5" class="red"/>
</g>
</svg>
