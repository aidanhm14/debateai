<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex">
<title>Your debates · Devil's Advocate</title>
<link rel="icon" href="/icons/icon-192.png">
<script defer src="/js/track.js"></script>
<script defer src="/js/usage-banner.js"></script>
<script defer src="/js/upgrade-cta.js"></script>
<style>
  :root { --bg:#0b0f17; --fg:#e8eef7; --muted:#94a3b8; --dim:#64748b; --accent:#ef4444; --good:#22c55e; --card:#121826; --line:#1f2937; }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--fg);font:14px/1.55 -apple-system,BlinkMacSystemFont,"SF Pro Text",system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  a{color:var(--accent);text-decoration:none}
  .wrap{max-width:880px;margin:0 auto;padding:48px 24px 96px}
  header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:28px;border-bottom:1px solid var(--line);padding-bottom:16px;flex-wrap:wrap;gap:12px}
  h1{font:700 30px/1.1 "SF Pro Display",system-ui,sans-serif;margin:0;letter-spacing:-0.02em}
  .sub{color:var(--muted);font-size:13px;margin-top:4px}
  .back{color:var(--muted);font-size:13px}

  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:32px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px}
  .stat .lbl{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:0.08em;font-weight:600}
  .stat .val{font:700 26px/1.1 "SF Pro Display",system-ui,sans-serif;margin-top:6px;font-variant-numeric:tabular-nums;letter-spacing:-0.02em}

  .debate{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:18px;margin-bottom:12px;display:grid;grid-template-columns:1fr auto;gap:16px;align-items:center}
  .debate .q{font:600 15px/1.35 system-ui;color:var(--fg);margin:0 0 6px}
  .debate .meta{color:var(--dim);font-size:11px;font-variant-numeric:tabular-nums}
  .debate .src{display:inline-block;text-transform:uppercase;font-size:9px;letter-spacing:0.08em;padding:2px 6px;border:1px solid var(--line);border-radius:4px;color:var(--muted);margin-left:6px}
  .nums{display:flex;gap:8px;align-items:center;font-variant-numeric:tabular-nums}
  .pill{padding:6px 10px;border-radius:8px;background:rgba(255,255,255,0.04);border:1px solid var(--line);font-size:11px;color:var(--muted);text-align:center;min-width:48px}
  .pill .v{font:700 16px system-ui;color:var(--fg);display:block}
  .pill.after{background:rgba(239,68,68,0.1);border-color:rgba(239,68,68,0.3)}
  .pill.after .v{color:#ef4444}
  .arrow{color:var(--dim);font-size:16px}
  .delta{font:700 18px system-ui;min-width:60px;text-align:right}
  .delta.up{color:#22c55e}
  .delta.down{color:#3b82f6}
  .delta.flat{color:var(--muted)}

  .empty{text-align:center;padding:80px 20px;color:var(--muted)}
  .empty h2{font:600 18px system-ui;color:var(--fg);margin:0 0 8px}
  .empty .cta{display:inline-block;margin-top:16px;padding:10px 20px;border-radius:10px;background:var(--accent);color:#fff;font-weight:600}

  .clear{display:inline-block;margin-top:24px;padding:6px 12px;border-radius:6px;border:1px solid var(--line);background:transparent;color:var(--muted);cursor:pointer;font-size:11px}
  .clear:hover{border-color:var(--accent);color:var(--accent)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>Your debates</h1>
      <div class="sub">Stored locally on this device. Nothing on a server.</div>
    </div>
    <a class="back" href="/landing">← landing</a>
  </header>

  <div id="content"></div>
</div>

<script>
  const KEY = 'da-debates-v1';
  const $ = id => document.getElementById(id);

  function load() {
    try { return JSON.parse(localStorage.getItem(KEY) || '[]'); } catch { return []; }
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function fmtTime(ts) {
    const d = new Date(ts);
    const diff = Date.now() - ts;
    if (diff < 60_000) return 'just now';
    if (diff < 3_600_000) return Math.round(diff / 60_000) + 'm ago';
    if (diff < 86_400_000) return Math.round(diff / 3_600_000) + 'h ago';
    if (diff < 7 * 86_400_000) return Math.round(diff / 86_400_000) + 'd ago';
    return d.toLocaleDateString();
  }

  function render() {
    const log = load();
    if (!log.length) {
      $('content').innerHTML = `
        <div class="empty">
          <h2>Nothing here yet.</h2>
          <p>When you finish a debate on Devil's Advocate and lock in your posterior, it'll show up here.</p>
          <a class="cta" href="/debate-ai">Start a debate →</a>
        </div>`;
      return;
    }

    // Stats
    const total = log.length;
    const deltas = log.map(d => d.posterior - d.prior);
    const avgShift = Math.round(deltas.reduce((a, b) => a + Math.abs(b), 0) / total);
    const moved = deltas.filter(d => Math.abs(d) >= 5).length;
    const pctMoved = Math.round((moved / total) * 100);
    const aboveMarket = log.filter(d => d.posterior > d.market).length;

    const stats = `
      <div class="stats">
        <div class="stat"><div class="lbl">Debates</div><div class="val">${total}</div></div>
        <div class="stat"><div class="lbl">Avg shift</div><div class="val">${avgShift} pts</div></div>
        <div class="stat"><div class="lbl">Mind changed</div><div class="val">${pctMoved}%</div></div>
        <div class="stat"><div class="lbl">Above market</div><div class="val">${aboveMarket}/${total}</div></div>
      </div>`;

    const rows = log.map(d => {
      const delta = d.posterior - d.prior;
      const cls = Math.abs(delta) < 5 ? 'flat' : (delta > 0 ? 'up' : 'down');
      const sign = delta > 0 ? '+' : (delta < 0 ? '' : '±');
      return `
        <div class="debate">
          <div>
            <div class="q">${escapeHtml(d.motion || '(custom debate)')}</div>
            <div class="meta">${fmtTime(d.ts)}${d.source ? '<span class="src">' + d.source + '</span>' : ''}</div>
          </div>
          <div class="nums">
            <div class="pill"><div class="lbl" style="font-size:9px;color:var(--dim);text-transform:uppercase">Prior</div><span class="v">${d.prior}%</span></div>
            <span class="arrow">→</span>
            <div class="pill after"><div class="lbl" style="font-size:9px;color:var(--dim);text-transform:uppercase">Post</div><span class="v">${d.posterior}%</span></div>
            <div class="pill"><div class="lbl" style="font-size:9px;color:var(--dim);text-transform:uppercase">Mkt</div><span class="v">${d.market}%</span></div>
            <div class="delta ${cls}">${sign}${delta}</div>
          </div>
        </div>`;
    }).join('');

    $('content').innerHTML = stats + rows + `
      <button class="clear" onclick="if(confirm('Clear all debate history on this device?')){localStorage.removeItem('${KEY}');location.reload();}">Clear history</button>`;
  }

  render();
</script>

</body>
</html>
