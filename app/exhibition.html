// Role-prompt builder for each speech. Kept small but format-aware: the
// system prompt sets up persona + format expectations; the user prompt
// includes the role for THIS speech + the prior transcript so the brain
// can build on what was said. Reuses the canonical voice rules via the
// server-side voice-guidelines pipeline (passed through _voiceFeature).
function buildSpeechPrompt(speech, fmt, motion, transcript) {
  var sideLabel = fmt.sideLabels[speech.side] || speech.side;
  var sys = [
  'You are an experienced competitive debater in a ' + fmt.name + ' round.',
  'You are arguing for ' + sideLabel + '.',
  'Motion: "' + motion + '"',
  'This is an exhibition round — two AI brains are debating each other in proper format. Stay strictly in role.',
  '',
  'Your speech is: ' + speech.code + ' (' + speech.title + '). Aim for ' + speech.dur + ' minutes (~' + speech.dur * 165 + ' words).',
  '',
  'RULES:',
  '- Stay in format. ' + fmt.name + ' conventions apply: speech order, role-specific duties (constructives build, rebuttals weigh).',
  '- Engage with what was actually said in prior speeches. Reference specific arguments by name.',
  '- No preamble, no "thank you, judge." Open with substance.',
  '- Real warrants with named mechanisms. No generic "this harms the economy" — name the actor, the year, the link.',
  '- No em-dashes. Periods, commas, semicolons only.',
  '- Stay under ' + speech.dur * 200 + ' words.'].

  return { sys, userPrompt };

function extractText(json) {
  if (!json || typeof json !== 'object') return '';
  // Anthropic native
  if (Array.isArray(json.content)) {
    return json.content.filter((c) => c.type === 'text').map((c) => c.text || '').join('').trim();
  }
  // OpenAI / Grok / DeepSeek (also routed through openai-chat-shape proxies)
  if (Array.isArray(json.choices) && json.choices[0]) {
    return (json.choices[0].message && json.choices[0].message.content || json.choices[0].text || '').trim();
  }
  if (typeof json.text === 'string') return json.text.trim();
  return '';
}

async function callBrain(brainKey, sys, user) {
  var brain = BRAINS[brainKey];
  if (!brain) throw new Error('Unknown brain: ' + brainKey);
  var body = {
    system: sys,
    messages: [{ role: 'user', content: user }],
    model: brain.model,
    max_tokens: 2200,
    stream: false,
    _feature: 'exhibition'
  };

  if (brainKey === 'claude') headers['anthropic-version'] = '2023-06-01';

    var msg = 'request failed (' + res.status + ')';
    try {var j = await res.json();if (j && j.error) msg = j.error;} catch {}
    throw new Error(msg);
  }
  var json = await res.json();
  var text = extractText(json);
  if (!text) throw new Error('empty response');
  return text;
}

    {

  sp.status === 'error' && el('span', { className: 'speech-status', style: { color: '#fca5a5' } }, 'failed'),
  sp.status === 'done' && el('span', { className: 'speech-status', style: { color: '#86efac' } }, 'done')
  ),
  sp.error && el('div', { className: 'speech-error' }, sp.error),
  !sp.error && sp.text && el('div', { className: 'speech-body' }, sp.text),
  !sp.error && !sp.text && sp.status === 'queued' && el('div', { className: 'empty-speech' }, 'Waiting for prior speeches.'),
  !sp.error && !sp.text && sp.status === 'running' && el('div', { className: 'empty-speech' }, BRAINS[sp.brainKey].name + ' is writing…')
  )),
  stage === 'done' && el('div', null,
  el('div', { className: 'done-banner' }, 'All ' + speeches.length + ' speeches complete. Flow this round in your notebook, then run another with different brains to see how the matchup shifts.'),
  el('button', { className: 'reset-link', onClick: reset }, '← New exhibition')
  )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(el(App));</script>
</body>
</html>
