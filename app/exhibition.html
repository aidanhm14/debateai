    var bench = speech.side === 'og' || speech.side === 'cg' ? 'Government' : 'Opposition';
    if (isWhip){
      bpRoleNote = 'You are the WHIP for ' + sideLabel + '. NO new arguments. Give a global, issue-by-issue summary that explains why YOUR team (' + sideLabel + ') wins the whole debate. Compare your extension against the opening half on your own bench AND against both teams on the other bench.';
    } else if (isClosing){
      bpRoleNote = 'You are the substantive for ' + sideLabel + ', a CLOSING team. You MUST bring a clear EXTENSION — a new actor, timeframe, mechanism, or impact layer that the opening ' + bench + ' team did not run. Your team is scored against your own opening half, so out-flank them: be the most persuasive ' + bench + ' team in the room. Acknowledge the opening case once, then move past it.';
    } else {
      bpRoleNote = 'You are the OPENING ' + bench + ' team. Set the debate up well, but know two more teams speak after you — leave the bench in a strong position and stake the ground a closing team would want.';
    }
  }
  var sys = [
  'You are an experienced competitive debater in a ' + fmt.name + ' round.',
  'You are arguing for ' + sideLabel + '.',
  'Motion: "' + motion + '"',
  'This is an exhibition round — ' + (fourTeam ? 'four AI brains, one per team,' : 'two AI brains') + ' debating each other in proper format. Stay strictly in role.',
  '',
  'Your speech is: ' + speech.code + ' (' + speech.title + '). Aim for ' + speech.dur + ' minutes (~' + speech.dur * 165 + ' words).',
  bpRoleNote ? '\n' + bpRoleNote : '',
  '',
  'RULES:',
  '- Stay in format. ' + fmt.name + ' conventions apply: speech order, role-specific duties (constructives build, rebuttals weigh' + (fourTeam ? ', closing teams extend, whips adjudicate' : '') + ').',
  '- Engage with what was actually said in prior speeches. Reference specific arguments by name.',
  '- No preamble, no "thank you, judge." Open with substance.',
  '- Real warrants with named mechanisms. No generic "this harms the economy" — name the actor, the year, the link.',
  '- No em-dashes. Periods, commas, semicolons only.',
  '- Stay under ' + speech.dur * 200 + ' words.'].
  join('\n');
  var userPrompt = transcript ?
  'Prior speeches in the round:\n\n' + transcript + '\n\nNow deliver your ' + speech.code + ' speech. Begin immediately.' :
  'You are the first speaker. Deliver your ' + speech.code + ' speech. Begin immediately.';
  return { sys, userPrompt };
}

function extractText(json) {
  if (!json || typeof json !== 'object') return '';
  // Anthropic native
  if (Array.isArray(json.content)) {
    return json.content.filter((c) => c.type === 'text').map((c) => c.text || '').join('').trim();
  }
  // OpenAI / Grok / DeepSeek (also routed through openai-chat-shape proxies)
  if (Array.isArray(json.choices) && json.choices[0]) {
    return (json.choices[0].message && json.choices[0].message.content || json.choices[0].text || '').trim();
  }
  if (typeof json.text === 'string') return json.text.trim();
  return '';
}

async function callBrain(brainKey, sys, user) {
  var brain = BRAINS[brainKey];
  if (!brain) throw new Error('Unknown brain: ' + brainKey);
  var body = {
    system: sys,
    messages: [{ role: 'user', content: user }],
    model: brain.model,
    max_tokens: 2200,
    stream: false,
    _feature: 'exhibition'
  };
  var headers = { 'Content-Type': 'application/json' };
  // Anthropic version header for /api/claude.
  if (brainKey === 'claude') headers['anthropic-version'] = '2023-06-01';
  var res = await fetch(brain.endpoint, { method: 'POST', headers, body: JSON.stringify(body) });
  if (!res.ok) {
    var msg = 'request failed (' + res.status + ')';
    try {var j = await res.json();if (j && j.error) msg = j.error;} catch {}
    throw new Error(msg);
  }
  var json = await res.json();
  var text = extractText(json);
  if (!text) throw new Error('empty response');
  return text;
}

// Deep links from /ai-vs-ai-debate (?prop=claude&opp=gpt) preselect the
// two brains. Keys are validated against BRAINS; anything unknown (or a
// missing param) falls back to the defaults below. Read once at boot.
var DEEP_LINK_BRAINS = (function () {
  var out = { prop: null, opp: null };
  try {
    var qs = new URLSearchParams(location.search);
    var p = (qs.get('prop') || '').toLowerCase();
    var o = (qs.get('opp') || '').toLowerCase();
    if (BRAINS[p]) out.prop = p;
    if (BRAINS[o]) out.opp = o;
  } catch (e) {}
  return out;
})();

  // 2-side path keeps brainA/brainB; this object only matters when
  // isFourTeam(fmt) is true. Defaults spread the four big brains so a
  // first run is interesting out of the box.
  var [teamBrains, setTeamBrains] = useState({ og: 'claude', oo: 'grok', cg: 'gpt', co: 'deepseek' });
  var [speeches, setSpeeches] = useState([]); // [{code, side, brainKey, text, status, error}]
  var [currentIdx, setCurrentIdx] = useState(-1);

  var [ballot, setBallot] = useState(null); // { judge, text }
  var [ballotLoading, setBallotLoading] = useState(false);
  var [ballotError, setBallotError] = useState('');
  var abortRef = useRef(false);

  var fmt = FORMATS[format];

  var sideAOption = fmt.sides[0];

  // the new format doesn't have. Snap to the first side.
  React.useEffect(() => {if (!fmt.sides.includes(sideA)) setSideA(fmt.sides[0]);}, [format]);

  // format (defends against a brain key that isn't in BRAINS).
  React.useEffect(() => {
    if (!fourTeam) return;

      var next = { ...prev };
      var fallback = Object.keys(BRAINS);

      return next;
    });
  }, [format]);

  // The AI judge. Runs once the speeches are in, with the full transcript.
  // Sends _promptId:'exhibitionBallot' so the adjudication core + ballot
  // instructions are injected server-side; Claude Haiku writes plain text.
  var generateBallot = async function (transcript) {
    setBallotLoading(true); setBallotError(''); setBallot(null);
    try {
      var judge = BRAINS.claude;
      var matchup = fourTeam ?
        fmt.sides.map(function (s) { return (BRAINS[teamBrains[s]] ? BRAINS[teamBrains[s]].name : '?') + ' as ' + fmt.sideLabels[s]; }).join(', ') :
        BRAINS[brainA].name + ' (' + fmt.sideLabels[sideA] + ') vs ' + BRAINS[brainB].name + ' (' + fmt.sideLabels[fmt.sides.find(function (x) { return x !== sideA; })] + ')';
      var rankingInstruction = fourTeam ?
        'Rank ALL FOUR teams 1-2-3-4 by the half-call, and put the full ranking in the WINNER line.' :
        'Pick the winning side.';
      var res = await fetch(judge.endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'anthropic-version': '2023-06-01' },
        body: JSON.stringify({
          _promptId: 'exhibitionBallot',
          _promptVars: { matchup: matchup, motion: motion, fmtName: fmt.name, rankingInstruction: rankingInstruction },
          messages: [{ role: 'user', content: 'Full round transcript:\n\n' + transcript }],
          model: judge.model,
          max_tokens: 1100,
          stream: false,
          _feature: 'exhibition-judge'
        })
      });
      if (!res.ok) { var m = 'request failed (' + res.status + ')'; try { var j = await res.json(); if (j && j.error) m = j.error; } catch (e) {} throw new Error(m); }
      var text = extractText(await res.json());
      if (!text) throw new Error('empty ballot');
      setBallot({ judge: judge.name, text: text });
    } catch (e) {
      setBallotError(e.message || 'ballot failed');
    }
    setBallotLoading(false);
  };

  var start = async () => {
    if (!motion.trim()) return;
    if (brainA === brainB) {




      // Same brain on both sides isn't useful for the disagreement signal,
      // but allow it — user might be testing self-consistency.
    }setStage('running');abortRef.current = false;var queue = fmt.speeches.map((s) => ({ code: s.code, side: s.side, title: s.title, dur: s.dur,
        // 4-team: dispatch by the team's brain. 2-side: the side that
        // matches sideA gets brainA, the other gets brainB.
        brainKey: fourTeam ? (teamBrains[s.side] || brainA) : (s.side === sideA ? brainA : brainB),
        text: '', status: 'queued', error: null
      }));
    setSpeeches(queue);
    var transcript = '';var _loop = async function (i)
    {
      if (abortRef.current) return 1; // break
      setCurrentIdx(i);
      setSpeeches((prev) => prev.map((s, idx) => idx === i ? { ...s, status: 'running' } : s));
      var sp = queue[i];
      var { sys, userPrompt } = buildSpeechPrompt(sp, fmt, motion, transcript);
      try {
        var text = await callBrain(sp.brainKey, sys, userPrompt);
        queue[i].text = text;

        setSpeeches([...queue]);
      } catch (e) {
        queue[i].status = 'error';
        queue[i].error = e.message || 'request failed';
        setSpeeches([...queue]);
        // Continue with the remaining speeches — one brain failing
        // shouldn't kill the whole exhibition.
      }
    };for (var i = 0; i < queue.length; i++) {if (await _loop(i)) break;}
    setCurrentIdx(-1);
    setStage('done');
    // Best-effort save to localStorage.
    try {
      var round = {
        id: Date.now(), motion, format, brainA, brainB, sideA,
        teamBrains: fourTeam ? { ...teamBrains } : null,
        speeches: queue.map((s) => ({ code: s.code, side: s.side, brainKey: s.brainKey, text: s.text, error: s.error })),
        date: new Date().toISOString()
      };
      var list = JSON.parse(localStorage.getItem('debateai-exhibition-rounds') || '[]');
      localStorage.setItem('debateai-exhibition-rounds', JSON.stringify([round, ...list].slice(0, 20)));
    } catch {}
    // The verdict is the payoff. Generate it once the speeches are in.
    if (transcript.trim()) generateBallot(transcript);
  };

  var reset = () => {abortRef.current = true;setStage('setup');setSpeeches([]);setCurrentIdx(-1);setBallot(null);setBallotLoading(false);setBallotError('');};

  if (stage === 'setup') {
    return el('div', { className: 'exh-wrap' },
    el('div', { className: 'exh-eyebrow' }, 'New · exhibition mode'),
    el('h1', { className: 'exh-title' }, fourTeam ? 'Four AI brains. ' : 'Two AI brains. ', el('em', null, 'One motion.')),
    el('p', { className: 'exh-sub' }, fourTeam ?
      'Pick a motion, then a brain for each of the four teams. The orchestrator runs the eight-speech BP sequence in proper order; closing teams have to extend past their own opening half. You flow it like a real round.' :
      'Pick a motion, pick two brains, pick which side each plays. The orchestrator runs the format\'s speech sequence in proper order. You flow it like a real round.'),
    el('div', { className: 'setup-card' },
    el('div', { className: 'setup-row' },
    el('label', null, 'Motion'),
    el('textarea', { value: motion, onChange: (e) => setMotion(e.target.value.slice(0, 400)), placeholder: 'This house would ban …' })

    )
    ),
    // ── 4-team picker (BP): one brain per team so OG/OO/CG/CO are
    // each a different AI. ── 2-side picker: Brain A / Brain B + side.
    fourTeam ?
    el('div', { className: 'setup-row' },
    el('label', null, 'Brain per team'),
    el('div', { style: { display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 } },
    fmt.sides.map((s) => el('div', { key: s, style: { border: '1px solid rgba(255,255,255,.1)', borderRadius: 10, padding: '10px 12px', background: 'rgba(255,255,255,.02)' } },
    el('div', { style: { fontSize: '.64rem', fontWeight: 800, letterSpacing: '.08em', textTransform: 'uppercase', color: 'rgba(255,255,255,.62)', marginBottom: 8 } }, fmt.sideLabels[s]),
    el('div', { className: 'brain-row' },
    Object.entries(BRAINS).map(([k, b]) => el('button', {
      key: k, type: 'button', className: 'brain-btn' + (teamBrains[s] === k ? ' on' : ''),
      style: { color: teamBrains[s] === k ? b.color : undefined, borderColor: teamBrains[s] === k ? b.color + '66' : undefined, background: teamBrains[s] === k ? b.color + '14' : undefined },
      onClick: () => setTeamBrains((prev) => ({ ...prev, [s]: k }))

    )
    ))

    el('div', { style: { fontSize: '.7rem', color: 'rgba(255,255,255,.5)', marginTop: 8, lineHeight: 1.5 } }, 'Four teams, four brains. Closing teams (CG / CO) are scored against their own opening half, so they must extend, not echo.')
    ) :
    [
    el('div', { className: 'setup-row', key: 'ba' },
    el('label', null, 'Brain A'),
    el('div', { className: 'brain-row' },
    Object.entries(BRAINS).map(([k, b]) => el('button', {
      key: k, type: 'button', className: 'brain-btn' + (brainA === k ? ' on' : ''),
      style: { color: brainA === k ? b.color : undefined, borderColor: brainA === k ? b.color + '66' : undefined, background: brainA === k ? b.color + '14' : undefined },
      onClick: () => setBrainA(k)
    }, el('span', { className: 'dot', style: { background: b.color } }), b.name))

    el('div', { className: 'brain-row' },

    )

  ballot && el('div', { className: 'exh-ballot-body' }, ballot.text),

  ),
  el('div', { className: 'done-banner' }, 'All ' + speeches.length + ' speeches complete. Flow this round in your notebook, then run another with different brains to see how the matchup shifts.'),
  // 2026-05-20: forward CTAs so the finished round isn't a dead end.

  el('div', { style: { marginTop: 14, display: 'flex', gap: 10, flexWrap: 'wrap', alignItems: 'center' } },

  el('a', { href: '/voice-debate', style: { color: '#c084fc', fontSize: '.84rem', textDecoration: 'none', fontWeight: 700 } }, 'Or out loud, in a voice round'),
  el('a', { href: '/leaderboard', style: { color: 'rgba(255,255,255,.55)', fontSize: '.84rem', textDecoration: 'none' } }, 'See the leaderboard')
  ),
  el('button', { className: 'reset-link', onClick: reset }, '← New exhibition')
  )
  );
}
