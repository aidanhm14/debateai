      if (idx >= 0) {
        const next = prev.slice();
        next[idx] = { ...next[idx], ...turn };
        return next;
      }
      return [...prev, turn];
    });
  }, []);
  const addSystem = useCallback((text)=>{
    setTurns(prev => [...prev, { id:'sys-'+Date.now()+'-'+Math.random(), who:'system', text }]);
  }, []);

  /* ── Cleanup ──────────────────────────────────── */

  const cleanup = useCallback(()=>{
    if (tickRef.current) { clearInterval(tickRef.current); tickRef.current = null; }
    if (micPollRef.current) { clearInterval(micPollRef.current); micPollRef.current = null; }
    if (orbStopRef.current) { try{ orbStopRef.current(); }catch(e){} orbStopRef.current = null; }
    // Stop the recorder before tearing down audio sources so the
    // final chunk + onstop blob materialization happens cleanly.
    try {
      if (recorderRef.current && recorderRef.current.state === 'recording') {
        recorderRef.current.stop();
      }
    } catch(e){}
    recorderRef.current = null;
    try { dcRef.current && dcRef.current.close(); } catch(e){}
    dcRef.current = null;
    try { pcRef.current && pcRef.current.close(); } catch(e){}
    pcRef.current = null;
    if (localStreamRef.current) {
      localStreamRef.current.getTracks().forEach(t=>{ try{t.stop()}catch(e){} });
      localStreamRef.current = null;
    }
    if (audioElRef.current) {
      try { audioElRef.current.srcObject = null; } catch(e){}
      try { audioElRef.current.remove(); } catch(e){}
      audioElRef.current = null;
    }
    aiAnalyserRef.current = null;
    userAnalyserRef.current = null;
    setSpeaking('idle');
    isUserSpeakingRef.current = false;
  }, []);

  useEffect(()=>{ return cleanup; }, [cleanup]);

  // Push playback rate to the live audio element whenever the user
  // adjusts the slider during a session.
  useEffect(()=>{
    if (audioElRef.current) {
      try { audioElRef.current.playbackRate = playbackRate; } catch(e){}
    }
  }, [playbackRate]);

  // Toggle the local mic track on/off when the user mutes themselves.
  // This prevents accidental VAD-triggered interruptions while still
  // keeping the WebRTC connection alive — much cleaner than tearing
  // down and re-adding the track.
  useEffect(()=>{
    const stream = localStreamRef.current;
    if (!stream) return;
    stream.getAudioTracks().forEach(t => { try { t.enabled = !muted; } catch(e){} });
  }, [muted]);

  /* ── Realtime event handler ───────────────────── */

  const handleEvent = useCallback((evt)=>{
    if (!evt || !evt.type) return;

    switch (evt.type) {
      case 'session.created':
      case 'session.updated':
        break;

      case 'input_audio_buffer.speech_started': {
        // User started talking — interrupt if AI was mid-response.
        const cur = currentAiTurnRef.current;
        if (cur) {
          upsertTurn({ ...cur, interrupted: true });
          currentAiTurnRef.current = null;
          setInterruptCount(n => n + 1);
          SFX.interrupt();
        }
        setSpeaking('user');
        isUserSpeakingRef.current = true;
        const id = 'you-' + Date.now();
        currentUserTurnRef.current = { id, who:'you', text:'…' };
        upsertTurn(currentUserTurnRef.current);
        lastSpeechTickRef.current = { ai: 0, user: Date.now(), who: 'user' };
        break;
      }

      case 'input_audio_buffer.speech_stopped': {
        if (lastSpeechTickRef.current.who === 'user' && lastSpeechTickRef.current.user) {
          setUserSpeakingMs(ms => ms + (Date.now() - lastSpeechTickRef.current.user));
        }
        lastSpeechTickRef.current = { ai: 0, user: 0, who: null };
        isUserSpeakingRef.current = false;
        if (speaking === 'user') setSpeaking('idle');
        break;
      }

      case 'conversation.item.input_audio_transcription.completed': {
        const id = currentUserTurnRef.current?.id;
        if (id) {
          upsertTurn({ id, who:'you', text: evt.transcript || '' });
          currentUserTurnRef.current = null;
        } else {
          upsertTurn({ id:'you-'+Date.now(), who:'you', text: evt.transcript || '' });
        }
        break;
      }

      case 'response.created': {
        const id = 'ai-' + Date.now();
        currentAiTurnRef.current = { id, who:'ai', text:'' };
        upsertTurn(currentAiTurnRef.current);
        setSpeaking('ai');
        lastSpeechTickRef.current = { ai: Date.now(), user: 0, who: 'ai' };
        break;
      }

      case 'response.audio_transcript.delta': {
        const cur = currentAiTurnRef.current;
        if (cur) {
          cur.text = (cur.text || '') + (evt.delta || '');
          upsertTurn(cur);
        }
        break;
      }

      case 'response.audio_transcript.done': {
        const cur = currentAiTurnRef.current;
        if (cur) {
          cur.text = evt.transcript || cur.text;
          upsertTurn(cur);
        }
        break;
      }

      case 'response.done': {
        if (lastSpeechTickRef.current.who === 'ai' && lastSpeechTickRef.current.ai) {
          setAiSpeakingMs(ms => ms + (Date.now() - lastSpeechTickRef.current.ai));
        }
        lastSpeechTickRef.current = { ai: 0, user: 0, who: null };
        if (speaking === 'ai') setSpeaking('idle');
        currentAiTurnRef.current = null;
        break;
      }

      case 'error':
        console.error('[realtime event error]', evt.error);
        addSystem('Error: ' + (evt.error?.message || 'unknown'));
        break;

      default:
        break;
    }
  }, [upsertTurn, addSystem, speaking]);

  /* ── stop / start ─────────────────────────────── */

  function stop(systemMsg) {
    SFX.end();
    cleanup();
    setStatus('ended');
    if (systemMsg) addSystem(systemMsg);
    else addSystem('Session ended.');

    // Only count this as a "round together" if the user actually
    // engaged — at least one user turn with real text. Stops accidental
    // start/stop clicks from inflating bond counters.
    const realUserTurns = turnsRef.current.filter(
      t => t.who === 'you' && (t.text || '').trim().length > 4
    ).length;
    if (realUserTurns >= 1) {
      const beforeLevel = bondInfo(getBond(personaKey)).label;
      const after = incrementBond(personaKey);
      const afterLevel = bondInfo(after).label;
      setBondTick(n => n + 1);
      // Bond-up moment: surfaces a celebratory card if the round
      // crossed a threshold (Acquaintance → Sparring Partner, etc.).
      if (beforeLevel !== afterLevel) {
        setBondUp({ from: beforeLevel, to: afterLevel, count: after });
      } else {
        setBondUp({ from: null, to: null, count: after });
      }
    } else {
      setBondUp(null);
    }
  }

  const start = useCallback(async ()=>{
    setError('');
    setRfd('');
    setTurns([]);
    setInterruptCount(0);
    setAiSpeakingMs(0);
    setUserSpeakingMs(0);
    if (recordingUrl) { try { URL.revokeObjectURL(recordingUrl); } catch(e){} }
    setRecordingUrl('');
    setStatus('connecting');
    setConnectStep('Minting session…');

    try {
      // Resume audio context now (we have a user gesture). Crucial on
      // iOS Safari, which won't unlock audio without one.
      const ctx = getAudioCtx();
      if (ctx && ctx.state === 'suspended') { try { await ctx.resume(); } catch(e){} }

      // 1. Mint ephemeral session token via our backend.
      // Server prepends a CHARACTER preamble to the mode prompt so the
      // AI knows who it IS (persona name + archetype + style), who the
      // USER is (first name when signed in), and how many rounds they
      // have together. That's what powers the relationship arc.
      // smartness > 1 triggers a server-side parallel "council" — the
      // function calls Claude/Gemini/Grok/GPT-5 to research the motion
      // before minting the realtime session. Adds 2-6s of latency to
      // the connection but the AI's first speech is dramatically
      // sharper. Show the user what's happening while they wait.
      if (smartness > 1) {
        setConnectStep('Convening AI council (' + smartness + ' brains)…');
      }
      const mintRes = await fetch('/api/realtime-session', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          mode, motion, side, format: 'APDA',
          voice: persona.voice,
          personaName: persona.name,
          personaArchetype: persona.archetype,
          personaStyle: persona.style,
          userName: userFirstName,
          bondCount,
          smartness,
        }),
      });
      if (!mintRes.ok) {
        const raw = await mintRes.text().catch(()=> '');
        let body = {}; try { body = JSON.parse(raw); } catch(e){}
        if (mintRes.status === 429) {
          throw new Error('Rate limit hit. 6 sessions per hour. Try again soon.');
        }
        // Show OpenAI's actual error message when we have one — e.g.
        // "model `gpt-realtime-2` does not exist" tells you exactly
        // what to flip OPENAI_REALTIME_MODEL to in Netlify env.
        const friendly = body.openai
          ? body.openai + (body.modelTried ? ' (model tried: ' + body.modelTried + ')' : '')
          : (body.error || raw.slice(0,200) || ('HTTP ' + mintRes.status));
        throw new Error('Could not start session: ' + friendly);
      }
      const session = await mintRes.json();
      const ephemeralKey = session?.client_secret?.value;
      if (!ephemeralKey) throw new Error('Session response missing client_secret.');
      setNegotiatedModel(session.model || '');
      setNegotiatedEndpoint(session.endpoint || '');

      setConnectStep('Requesting microphone…');

      // 2. WebRTC peer connection
      const pc = new RTCPeerConnection();
      pcRef.current = pc;

      // Remote audio sink
      const audioEl = document.createElement('audio');
      audioEl.autoplay = true;
      audioEl.playsInline = true;
      audioEl.playbackRate = playbackRate; // honor whatever the user set
      document.body.appendChild(audioEl);
      audioElRef.current = audioEl;
      pc.ontrack = (evt) => {
        if (evt.streams && evt.streams[0]) {
          audioEl.srcObject = evt.streams[0];
          // Tap the AI stream for the orb visualizer + recording mix.
          try {
            const ctx2 = getAudioCtx();
            if (ctx2) {
              const src = ctx2.createMediaStreamSource(evt.streams[0]);
              const an = ctx2.createAnalyser();
              an.fftSize = 512;
              an.smoothingTimeConstant = 0.7;
              src.connect(an);
              aiAnalyserRef.current = an;
              aiBufRef.current = new Uint8Array(an.frequencyBinCount);
              // Also feed the recording mix bus if it was set up.
              if (pc._mixDest) {
                try {
                  const recSrc = ctx2.createMediaStreamSource(evt.streams[0]);
                  recSrc.connect(pc._mixDest);
                } catch(e){ console.warn('[rec] AI tap failed:', e); }
              }
            }
          } catch(e){ console.warn('[orb] AI analyser tap failed:', e); }
        }
      };

      // Local mic
      let stream;
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true },
        });
      } catch(e) {
        throw new Error('Microphone permission denied. Allow mic access in your browser settings, then reload.');
      }
      localStreamRef.current = stream;
      stream.getTracks().forEach(t => pc.addTrack(t, stream));

      // Tap mic for level meter + orb (user-side amplitude).
      try {
        const ctx2 = getAudioCtx();
        if (ctx2) {
          const src = ctx2.createMediaStreamSource(stream);
          const an = ctx2.createAnalyser();
          an.fftSize = 512;
          an.smoothingTimeConstant = 0.6;
          src.connect(an);
          userAnalyserRef.current = an;
          userBufRef.current = new Uint8Array(an.frequencyBinCount);
        }
      } catch(e){ console.warn('[orb] mic analyser tap failed:', e); }

      // Recording: mix both sides into a single MediaStream and feed
      // MediaRecorder. Best-effort — if the browser doesn't support
      // the chosen mimeType, fall back to default. AI track is added
      // when pc.ontrack fires (below); user track is wired now.
      try {
        const ctxR = getAudioCtx();
        if (ctxR && typeof MediaRecorder !== 'undefined') {
          const mixDest = ctxR.createMediaStreamDestination();
          const userSrc = ctxR.createMediaStreamSource(stream);
          userSrc.connect(mixDest);
          // Stash the destination on the PC so ontrack can connect the
          // AI source to the same mix bus.
          pc._mixDest = mixDest;
          pc._mixCtx = ctxR;
          // Pick a widely-supported container — webm/opus on Chrome,
          // mp4 on Safari (16+).
          let mime = '';
          if (MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported('audio/webm;codecs=opus')) mime = 'audio/webm;codecs=opus';
          else if (MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported('audio/mp4')) mime = 'audio/mp4';
          const recOpts = mime ? { mimeType: mime } : {};
          const rec = new MediaRecorder(mixDest.stream, recOpts);
          recordedChunksRef.current = [];
          rec.ondataavailable = (ev) => {
            if (ev.data && ev.data.size > 0) recordedChunksRef.current.push(ev.data);
          };
          rec.onstop = () => {
            try {
              const blobMime = (mime || 'audio/webm').split(';')[0];
              const blob = new Blob(recordedChunksRef.current, { type: blobMime });
              const url = URL.createObjectURL(blob);
              setRecordingUrl(url);
              setRecordingExt(blobMime.includes('mp4') ? 'm4a' : 'webm');
            } catch(e){ console.warn('[rec] finalize failed:', e); }
          };
          rec.start(1000); // emit a chunk per second so we don't lose much on crash
          recorderRef.current = rec;
        }
      } catch(e){ console.warn('[rec] setup failed:', e); }

      // Data channel for events
      const dc = pc.createDataChannel('oai-events');
      dcRef.current = dc;
      dc.onmessage = (e) => {
        try { handleEvent(JSON.parse(e.data)); }
        catch(err) { console.warn('[dc parse]', err); }
      };
      dc.onopen = () => {
        // Two send-paths once the data channel opens:
        //
        // 1. session.update — pushes the FULL session config
        //    (instructions, voice, turn_detection, transcription).
        //    This is the safety net for when the server minted the
        //    session with a minimal body (the GA endpoint may not
        //    accept all the config inline; sending it as an event
        //    after connect is the documented pattern).
        // 2. response.create — kicks off the opening greeting so
        //    there's no awkward dead air on session start.
        try {
          // GA Realtime session.update shape:
          //  - session MUST include `type: 'realtime'` (the discriminator)
          //  - `modalities` was renamed to `output_modalities`
          //  - turn_detection still lives at session.turn_detection
          //  - input_audio_transcription is now session.audio.input.transcription
          // GA Realtime moved turn_detection INSIDE session.audio.input
          // (it used to be a top-level session field on the beta API).
          // Without this, OpenAI 400s with "Unknown parameter:
          // 'session.turn_detection'" and the user's speech stops
          // interrupting the AI mid-sentence (the killer feature).
          dc.send(JSON.stringify({
            type: 'session.update',
            session: {
              type: 'realtime',
              output_modalities: ['audio'],
              audio: {
                input: {
                  transcription: { model: 'whisper-1' },
                  turn_detection: {
                    type: 'server_vad',
                    threshold: 0.5,
                    prefix_padding_ms: 300,
                    silence_duration_ms: 500,
                    create_response: true,
                  },
                },
                output: { voice: persona.voice },
              },
            },
          }));
        } catch(e){ console.warn('[dc] session.update send failed:', e); }

        try {
          const nameSuffix = userFirstName ? (', ' + userFirstName) : '';
          // Casual, low-energy openers. The CHARACTER preamble already
          // bans "Absolutely", "Let's get into it", etc. — we restate
          // the no-enthusiasm rule here because greetings are where the
          // model is most likely to slip into hype-man mode.
          const greetingInstructions = motion.trim()
            ? `Open in character. Under 8 seconds. Name the motion in one short clean line, name your side, then say "whenever you're ready${nameSuffix}". Do NOT say "Absolutely", "Let's get into it", "Sure", or any enthusiastic interjection. Dry and direct.`
            : `Open with exactly this line, in your character's voice and dry register: "what's up${nameSuffix}, what are we debating?" Then stop. Do not suggest motions. Do not list options. Do not say "Absolutely" or any enthusiastic filler. One short line, then silence.`;
          // GA Realtime response.create dropped `modalities` (it's
          // inherited from session.output_modalities now). Just send
          // instructions.
          dc.send(JSON.stringify({
            type: 'response.create',
            response: { instructions: greetingInstructions },
          }));
        } catch(e){ console.warn('[dc] greeting send failed:', e); }
      };

      setConnectStep('Negotiating with OpenAI…');

      // 3. SDP offer/answer
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);

      // The server tells us where to POST the SDP and which headers to
      // include — different between the GA Realtime API
      // (POST /v1/realtime/calls, no extra headers) and the legacy beta
      // (POST /v1/realtime?model=..., needs OpenAI-Beta header). Trust
      // the server so we never have to guess from the model name.
      const sdpUrl = session.sdpUrl
        || 'https://api.openai.com/v1/realtime/calls';
      const extraSdpHeaders = session.sdpHeaders || {};
      const sdpRes = await fetch(sdpUrl, {
        method: 'POST',
        body: offer.sdp,
        headers: {
          'Authorization': 'Bearer ' + ephemeralKey,
          'Content-Type': 'application/sdp',
          ...extraSdpHeaders,
        },
      });
      if (!sdpRes.ok) {
        const detail = await sdpRes.text().catch(()=> '');
        throw new Error('OpenAI handshake failed (' + sdpRes.status + '). ' + detail.slice(0,140));
      }
      const answerSdp = await sdpRes.text();
      await pc.setRemoteDescription({ type: 'answer', sdp: answerSdp });

      // 4. Live!
      startedAtRef.current = Date.now();
      tickRef.current = setInterval(()=>{
        const t = (Date.now() - startedAtRef.current) / 1000;
        setElapsed(t);
        if (t >= SESSION_HARD_CAP_SEC) {
          stop('Session ended (8-minute cap reached).');
        }
      }, 250);

      // Mic level poll — drives the 5-bar meter under the orb.
      micPollRef.current = setInterval(()=>{
        const an = userAnalyserRef.current, buf = userBufRef.current;
        if (!an || !buf) return;
        an.getByteFrequencyData(buf);
        let sum = 0; for (let i = 0; i < buf.length; i++) sum += buf[i];
        const avg = sum / buf.length / 255; // 0-1
        const lit = Math.max(0, Math.min(5, Math.round(avg * 8)));
        setMicBars([0,1,2,3,4].map(i => i < lit ? 1 : 0));
      }, 90);

      setStatus('live');
      SFX.start();
      addSystem('Live. Speak whenever. Interrupting the AI is the whole point.');
    } catch (e) {
      console.error('[start] failed:', e);
      setError(e.message || String(e));
      setStatus('idle');
      cleanup();
    }
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [mode, motion, persona, side, userFirstName, bondCount, addSystem, handleEvent, cleanup]);

  /* ── Orb bootstrap (after canvas mounts) ──────── */

  // Setup orb. Synthetic 'preparing to debate you' levels — a slow
  // breath baseline plus a soft thought-pulse every few seconds so the
  // orb reads as 'alive but waiting'. Drives the same startOrbAnimation
  // so the visual language is identical to the live round.
  useEffect(()=>{
    if (status !== 'idle') return;
    const canvas = setupOrbCanvasRef.current;
    if (!canvas) return;
    const startedAt = Date.now();
    const fakeUserSpeakingRef = { current: false };
    const getLevels = () => {
      const t = (Date.now() - startedAt) / 1000;
      // Long breath at ~0.18Hz (5.5s cycle) so it's clearly alive
      // but never frantic. Plus a brief thought-pulse every ~3.5s
      // — Gaussian envelope so it eases in/out.
      const breath = 0.06 + Math.sin(t * 1.1) * 0.035;
      const phase = (t % 3.5) - 1.4;
      const pulse = Math.exp(-(phase * phase) / 0.18) * 0.13;
      return { ai: Math.max(0, breath + pulse), user: 0 };
    };
    setupOrbStopRef.current = startOrbAnimation(canvas, getLevels, fakeUserSpeakingRef);
    return () => {
      if (setupOrbStopRef.current) { try { setupOrbStopRef.current(); } catch(e){} setupOrbStopRef.current = null; }
    };
  }, [status]);

  useEffect(()=>{
    if (status !== 'live') return;
    const canvas = orbCanvasRef.current;
    if (!canvas) return;
    const getLevels = () => {
      let ai = 0, user = 0;
      const aA = aiAnalyserRef.current, aB = aiBufRef.current;
      if (aA && aB) {
        aA.getByteFrequencyData(aB);
        let s = 0; for (let i = 0; i < aB.length; i++) s += aB[i];
        ai = Math.min(1, (s / aB.length / 255) * 1.6);
      }
      const uA = userAnalyserRef.current, uB = userBufRef.current;
      if (uA && uB) {
        uA.getByteFrequencyData(uB);
        let s = 0; for (let i = 0; i < uB.length; i++) s += uB[i];
        user = Math.min(1, (s / uB.length / 255) * 1.8);
      }
      return { ai, user };
    };
    orbStopRef.current = startOrbAnimation(canvas, getLevels, isUserSpeakingRef);
    return () => {
      if (orbStopRef.current) { orbStopRef.current(); orbStopRef.current = null; }
    };
  }, [status]);

  /* ── RFD generation ───────────────────────────── */

  const generateRFD = useCallback(async ()=>{
    setRfdLoading(true);
    setRfd('');
    try {
      const transcriptText = turnsRef.current
        .filter(t => t.who === 'you' || t.who === 'ai')
        .map(t => (t.who === 'you' ? 'YOU' : 'AI') + ': ' + (t.text || '').trim() + (t.interrupted ? ' [interrupted]' : ''))
        .join('\n\n');
      const modeLabel = MODES.find(m => m.key === mode)?.title || mode;
      const sys = `You are a debate judge giving a Reason for Decision after a live voice debate. Mode: ${modeLabel}. Motion: "${motion}". Side the user took: ${side === 'gov' ? 'Government' : 'Opposition'}.

Format the RFD exactly as:

DECISION
(one line — who would win on the flow if this were a competitive round)

BEST MOMENT
(1-2 sentences — name the specific exchange and why it landed)

COSTLIEST MOMENT
(1-2 sentences — name the specific exchange and why it cost ground)

TWO FIXES FOR NEXT ROUND
1. ...
2. ...

Tone: varsity-debater register. Specific to the actual exchange — quote the user's claim back at them when relevant. No throat-clearing. No em-dashes. No generic coaching. If the user only spoke briefly, say so and base feedback on what's there.`;
      const user = 'TRANSCRIPT:\n\n' + transcriptText;

      const res = await fetch('/api/openai-chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'gpt-4o-mini',
          system: sys,
          messages: [{ role: 'user', content: user }],
          stream: false,
        }),
      });
      if (!res.ok) throw new Error('RFD ' + res.status);
      const data = await res.json();
      const text = data?.choices?.[0]?.message?.content
        || data?.message?.content
        || data?.text
        || '';
      setRfd(text || '(No RFD returned.)');
    } catch (e) {
      setRfd('Could not generate RFD: ' + e.message);
    } finally {
      setRfdLoading(false);
    }
  }, [mode, motion, side]);

  /* ── Auto-scroll transcript ───────────────────── */

  const transcriptRef = useRef(null);
  useEffect(()=>{
    const node = transcriptRef.current;
    if (node) node.scrollTop = node.scrollHeight;
  }, [turns]);

  /* ── Derived ──────────────────────────────────── */

  const isLive = status === 'live';
  const isConnecting = status === 'connecting';
  const isEnded = status === 'ended';

  const totalSpokenMs = aiSpeakingMs + userSpeakingMs;
  const aiSharePct = totalSpokenMs > 0 ? Math.round((aiSpeakingMs / totalSpokenMs) * 100) : 50;
  const userSharePct = 100 - aiSharePct;

  const stageClass = 'stage' + (speaking === 'user' ? ' user' : '');

  /* ── Render ───────────────────────────────────── */

  return el('div', { className:'shell' },
    // Header
    el('div', { className:'head' },
      el('div', { className:'brand' },
        el('a', { href:'/' },
          el('span', { className:'logo-mark' }, 'D'),
          el('span', null, 'Debate AI ', el('span', { className:'beta' }, 'Voice · Beta')),
        ),
      ),
      el('a', { className:'back', href:'/debate-ai' }, '← text mode'),
    ),

    // Hero — left headline + right status pill (per redesign brief)
    !isLive && !isConnecting && el('div', { className:'hero' },
      el('div', null,
        el('h1', null, 'The AI talks back. ', el('span', { className:'accent' }, 'And listens.')),
        el('p', { className:'lede' },
          'Speak your case, cut in mid-speech, take POIs. Live voice debate over WebRTC.'
        ),
      ),
      el('div', { className:'hero-status' },
        el('span', { className:'pip' }),
        el('div', { className:'meta' },
          el('strong', null, 'Live'), ' · 8-min cap · 6 sessions/hr · ', el('strong', null, '~300ms'), ' latency'
        ),
      ),
    ),

    // Setup — two-column on desktop, numbered steps left, opponent + summary right.
    !isLive && !isConnecting && el('div', { className:'setup-grid' },

      // ── LEFT COLUMN: numbered setup steps ───────────────────────
      el('div', null,

        // Step 1: Mode
        el('div', { className:'step' },
          el('div', { className:'step-h' },
            el('div', { className:'step-num' }, '1'),
            el('div', { className:'step-title' }, 'Choose a mode'),
          ),
          el('div', { className:'card' },
            el('div', { className:'modes' },
              MODES.map(m =>
                el('button', {
                  key:m.key,
                  type:'button',
                  className:'mode' + (mode===m.key ? ' on' : ''),
                  onClick:()=>setMode(m.key),
                  'aria-pressed': mode===m.key,
                },
                  el('div', { className:'t' }, m.title),
                  el('div', { className:'d' }, m.desc),
                )
              )
            )
          ),
        ),

        // Step 2: Motion
        el('div', { className:'step' },
          el('div', { className:'step-h' },
            el('div', { className:'step-num' }, '2'),
            el('div', { className:'step-title' }, 'Add a motion'),
          ),
          el('div', { className:'step-help' }, 'Leave blank for a generated motion you say out loud.'),
          el('div', { className:'card' },
            el('input', {
              type:'text',
              className:'motion-input',
              value: motion,
              onChange: e => setMotion(e.target.value),
              placeholder: 'THBT social media does more harm than good…',
              maxLength: 400,
              'aria-label':'Debate motion',
            }),
            el('div', { className:'motion-chips' },
              SAMPLE_MOTIONS.map((m,i) =>
                el('button', {
                  key:i,
                  type:'button',
                  className:'motion-chip',
                  onClick:()=>setMotion(m.text),
                  title: m.text,
                }, m.tag)
              )
            ),
          ),
        ),

        // Step 3: Side
        el('div', { className:'step' },
          el('div', { className:'step-h' },
            el('div', { className:'step-num' }, '3'),
            el('div', { className:'step-title' }, 'Choose your side'),
          ),
          el('div', { className:'card' },
            el('div', { className:'side-seg', role:'radiogroup', 'aria-label':'Your side' },
              el('button', {
                type:'button', role:'radio',
                'aria-pressed': side==='gov',
                onClick: ()=> setSide('gov'),
              }, 'Government'),
              el('button', {
                type:'button', role:'radio',
                'aria-pressed': side==='opp',
                onClick: ()=> setSide('opp'),
              }, 'Opposition'),
            ),
          ),
        ),
      ),

      // ── RIGHT COLUMN: opponent picker (top), sticky summary card (bottom) ───────
      el('div', { className:'summary-col' },

        // 'Standing by' orb — same visual language as the live round
        // so the AI reads as already in the room, just waiting for the
        // user to configure and hit Start. Uses the synthetic idle
        // levels driven by the useEffect at status==='idle'.
        el('div', { className:'setup-orb-card' },
          el('canvas', { className:'setup-orb', ref: setupOrbCanvasRef, 'aria-hidden':'true' }),
          el('div', { className:'setup-orb-label' },
            '◉ ' + (persona && persona.name ? persona.name.split(' ')[0].toUpperCase() : 'OPPONENT') + ' · STANDING BY'
          ),
          el('div', { className:'setup-orb-sub' },
            'Ready when you are. Pick the format, name the motion, hit Start.'
          ),
        ),

        // Step 4 (visually right column): Opponent picker
        el('div', { className:'step' },
          el('div', { className:'step-h' },
            el('div', { className:'step-num' }, '4'),
            el('div', { className:'step-title' }, 'Pick an opponent'),
          ),
          el('div', { className:'card' },
            el('div', { className:'opps' },
              (showAllOpponents ? PERSONALITIES : PERSONALITIES.slice(0, 3)).map(p => {
                const r = getBond(p.key);
                const b = bondInfo(r);
                return el('button', {
                  key:p.key,
                  type:'button',
                  className:'opp',
                  'aria-pressed': personaKey===p.key,
                  title: p.bio + ' · ' + p.style,
                  onClick:()=>{ setPersonaKey(p.key); rememberPersona(p.key); },
                },
                  el('div', { className:'av' }, p.initials),
                  el('div', { className:'info' },
                    el('div', { className:'nm' }, p.name),
                    el('div', { className:'role' }, p.archetype),
                  ),
                  el('div', { className:'meta' },
                    r > 0 ? (b.label.toLowerCase() + ' · ' + r) : 'new',
                  ),
                );
              })
            ),
            PERSONALITIES.length > 3 && el('button', {
              type:'button',
              className:'opp-toggle',
              onClick: ()=> setShowAllOpponents(v => !v),
            }, showAllOpponents ? 'Show featured only' : 'View all opponents (' + PERSONALITIES.length + ')'),
          ),
        ),

        // Session summary card
        el('div', { className:'summary-card' },
          el('div', { className:'ttl' }, 'Your round'),
          el('div', { className:'row' },
            el('div', { className:'k' }, 'Mode'),
            el('div', { className:'v' }, MODES.find(m => m.key === mode)?.title || mode),
          ),
          el('div', { className:'row' },
            el('div', { className:'k' }, 'Motion'),
            motion.trim()
              ? el('div', { className:'v' }, motion)
              : el('div', { className:'v muted' }, 'You will state it on mic'),
          ),
          el('div', { className:'row' },
            el('div', { className:'k' }, 'Side'),
            el('div', { className:'v' }, side === 'gov' ? 'Government' : 'Opposition'),
          ),
          el('div', { className:'row' },
            el('div', { className:'k' }, 'Opponent'),
            el('div', { className:'v' }, persona.name + ' (' + persona.archetype + ')'),
          ),
          el('div', { className:'row' },
            el('div', { className:'k' }, 'Length'),
            el('div', { className:'v' }, 'Up to 8 minutes'),
          ),
        ),

        // Smartness slider — picks how many extra brains the AI
        // consults before its first speech. 1 = solo (fastest), 5 =
        // full council (~6s slower start, much sharper arguments).
        (function(){
          const SMART_LABELS = [
            { lvl:1, name:'Quick',       desc:'Solo gpt-realtime. Fastest start.' },
            { lvl:2, name:'Sharp',       desc:'+ Claude research. ~3s slower start, better framework.' },
            { lvl:3, name:'Tournament',  desc:'+ Claude + Gemini council. Stronger weighing.' },
            { lvl:4, name:'Council',     desc:'+ Claude + Gemini + Grok. Multi-angle prep.' },
            { lvl:5, name:'World Champ', desc:'Full council + GPT-5 synthesis. ~6s start, hardest opponent.' },
          ];
          const cur = SMART_LABELS[smartness - 1] || SMART_LABELS[0];
          return el('div', { className:'smart-card' },
            el('div', { className:'smart-h' },
              el('span', { className:'lbl' }, 'Smartness'),
              el('span', { className:'lvl' }, cur.name),
            ),
            el('div', { className:'smart-desc' }, cur.desc),
            el('input', {
              type:'range',
              className:'smart-slider',
              min:1, max:5, step:1, value: smartness,
              onChange: e => setSmartness(parseInt(e.target.value, 10)),
              'aria-label':'AI smartness level',
            }),
            el('div', { className:'smart-ticks' },
              SMART_LABELS.map(s =>
                el('span', { key:s.lvl, className: smartness===s.lvl ? 'on' : '' }, s.name)
              )
            ),
            smartness >= 4 && el('div', { className:'smart-warn' },
              '⚠ Council mode adds ~3-6 seconds to the session start while ' + (smartness === 5 ? '4' : '3') + ' brains research the motion in parallel.'
            ),
          );
        })(),

        // Microphone permission notice — surfaces ABOVE the Start CTA
        // so the user knows the browser dialog is coming and what it's for.
        el('div', { className:'mic-notice ' + (micPerm === 'granted' ? 'granted' : micPerm === 'denied' ? 'denied' : '') },
          el('div', { className:'mic-icon' }, '🎤'),
          el('div', { className:'body' },
            el('div', { className:'t' },
              micPerm === 'granted' ? 'Microphone ready' :
              micPerm === 'denied'  ? 'Microphone blocked' :
                                       'Microphone access needed'
            ),
            el('div', { className:'d' },
              micPerm === 'granted'
                ? 'Your browser already has mic access for this site. Hit Start and you\'re live.'
                : micPerm === 'denied'
                  ? ['Your browser is blocking mic access. Open ', el('strong', { key:'a' }, 'Site Settings'), ' for debateai.com and re-allow the microphone, then reload.']
                  : ['When you click Start, your browser will pop a permission dialog. Click ', el('strong', { key:'b' }, 'Allow'), '. Audio streams directly to OpenAI Realtime; nothing is saved unless you download the recording after the round.']
            ),
          ),
        ),

        error && el('div', { className:'notice error' }, error),

        // Start CTA
        el('div', { className:'summary-cta' },
          el('button', {
            type:'button',
            className:'cta',
            onClick: start,
            disabled: micPerm === 'denied',
          }, 'Start voice debate'),
          el('div', { className:'helper' },
            'You can interrupt the AI mid-sentence. The whole point.'
          ),
        ),
      ),
    ),

    // Connecting
    isConnecting && el('div', { className:'card' },
      el('div', { className:'connecting' },
        el('div', { className:'spinner' }),
        el('div', { className:'step' }, connectStep || 'Connecting…'),
      ),
    ),

    // LIVE — the showpiece
    isLive && el('div', null,
      el('div', { className: stageClass },
        el('canvas', { className:'orb', ref: orbCanvasRef }),
        el('div', { className:'label' },
          el('span', { className:'who' },
            speaking === 'user' ? '◉ ' + (userFirstName ? userFirstName.toUpperCase() : 'YOU') + ' SPEAKING' :
            speaking === 'ai'   ? '◉ ' + persona.name.split(' ')[0].toUpperCase() + ' SPEAKING' :
                                   '○ LISTENING'
          ),
        ),
        el('div', { className:'timer' },
          fmtTime(elapsed),
          el('span', { className:'total' }, ' / ' + fmtTime(SESSION_HARD_CAP_SEC)),
        ),
        el('div', { className:'stats' },
          el('span', null, el('strong', null, interruptCount), ' interrupts'),
          el('span', null, 'AI ', el('strong', null, aiSharePct + '%'), ' / You ', el('strong', null, userSharePct + '%')),
        ),
        el('div', { className:'miclevel' },
          'mic',
          el('div', { className:'bars' },
            micBars.map((on, i) =>
              el('div', { key:i, className:'bar' + (on ? ' on' : '') })
            )
          )
        ),
        // Live controls — speed, mute, model badge, recording badge.
        // All tweakable mid-session.
        el('div', { className:'live-controls' },
          el('button', {
            type:'button',
            className: 'mute-btn' + (muted ? ' on' : ''),
            onClick: ()=> setMuted(m => !m),
            title: muted ? 'Unmute mic' : 'Mute mic (stops auto-interrupting the AI)',
            'aria-pressed': muted,
          }, muted ? '🔇  Muted' : '🎙  Mic on'),
          el('div', { className:'speed-ctl' },
            el('span', { className:'lbl' }, 'speed'),
            el('button', {
              className:'spd',
              onClick:()=> setPlaybackRate(r => Math.max(0.9, Math.round((r - 0.1) * 10) / 10)),
              title:'Slower',
            }, '−'),
            el('span', { className:'val' }, playbackRate.toFixed(1) + '×'),
            el('button', {
              className:'spd',
              onClick:()=> setPlaybackRate(r => Math.min(1.5, Math.round((r + 0.1) * 10) / 10)),
              title:'Faster',
            }, '+'),
          ),
          negotiatedModel && el('span', { className:'model-badge', title: negotiatedEndpoint || '' },
            negotiatedModel + (/^gpt-realtime/.test(negotiatedModel) && !/preview/.test(negotiatedModel) ? ' · GA' : '')
          ),
          recorderRef.current && el('span', { className:'rec-pill' },
            el('span', { className:'rec-dot' }),
            'Recording'
          ),
        ),
      ),

      el('div', { className:'card' },
        el('h3', null, 'Live Transcript'),
        el('div', { className:'transcript', ref: transcriptRef },
          turns.length === 0
            ? el('div', { style:{color:'#9b9bab',fontSize:'.86rem',padding:'30px 4px',textAlign:'center'} },
                'Waiting for the first word…'
              )
            : turns.map(t =>
                el('div', { key:t.id, className:'turn ' + t.who },
                  t.who !== 'system' && el('div', { className:'label' },
                    t.who === 'ai' ? 'AI' : 'You',
                    t.interrupted && el('span', { className:'interrupted' }, 'INTERRUPTED'),
                  ),
                  el('div', null, t.text || (t.who === 'system' ? '' : '…')),
                )
              )
        ),
      ),

      el('button', { className:'cta stop', onClick: ()=>stop() }, 'End Session'),
    ),

    // Ended — summary + RFD
    isEnded && el('div', null,
      // Bond-up moment: shows when the user has just crossed a level
      // threshold with this persona, or just confirms bond +1.
      bondUp && el('div', {
        className:'bond-up-card',
        style:{ '--avatar-bg': persona.avatarBg },
      },
        el('div', { className:'b-avatar' }, persona.initials),
        el('div', { className:'msg' },
          el('div', { className:'t' },
            bondUp.from && bondUp.from !== bondUp.to
              ? '★ ' + persona.name + ': ' + bondUp.from + ' → ' + bondUp.to
              : '+1 round with ' + persona.name
          ),
          el('div', { className:'s' },
            bondUp.count + ' round' + (bondUp.count === 1 ? '' : 's') + ' together' +
            (bondUp.from && bondUp.from !== bondUp.to
              ? ' · bond level up'
              : '')
          ),
        ),
      ),

      el('div', { className:'notice info' }, el('strong', null, 'Round complete.'), ' Generate the judge\'s RFD to see how it landed.'),

      // Stat tiles
      el('div', { className:'summary-grid' },
        el('div', { className:'stat-card' },
          el('div', { className:'v' }, fmtTime(elapsed)),
          el('div', { className:'l' }, 'Round time'),
        ),
        el('div', { className:'stat-card' },
          el('div', { className:'v' }, interruptCount),
          el('div', { className:'l' }, 'Interrupts'),
        ),
        el('div', { className:'stat-card' },
          el('div', { className:'v' }, turns.filter(t => t.who === 'you').length),
          el('div', { className:'l' }, 'Your turns'),
        ),
        el('div', { className:'stat-card' },
          el('div', { className:'v' }, turns.filter(t => t.who === 'ai').length),
          el('div', { className:'l' }, 'AI turns'),
        ),
      ),

      // Talk-time bar
      el('div', { className:'card' },
        el('h3', null, 'Talk-time split'),
        el('div', { className:'talk-bar' },
          el('div', { className:'ai-fill', style:{ width: aiSharePct + '%' } }),
        ),
        el('div', { className:'talk-bar-legend' },
          el('span', null, 'You ' + userSharePct + '%'),
          el('span', null, 'AI ' + aiSharePct + '%'),
        ),
        // Round audio download — both sides mixed via AudioContext +
        // MediaRecorder during the session, finalized on stop.
        recordingUrl && el('div', { className:'download-row' },
          el('a', {
            href: recordingUrl,
            download: 'debate-' + persona.key + '-' + new Date().toISOString().slice(0,10) + '.' + recordingExt,
            className:'download-btn',
          }, '⬇  Download round audio'),
        ),
      ),

      !rfd && el('button', {
        className:'cta',
        onClick: generateRFD,
        disabled: rfdLoading,
      }, rfdLoading ? 'Generating RFD…' : ['Generate Judge RFD ', el('span', { key:'a', className:'arrow' }, '→')]),

      rfd && el('div', { className:'rfd-card' },
        el('h3', null, 'Reason for Decision'),
        rfd,
      ),

      el('div', { className:'card', style:{marginTop:14} },
        el('h3', null, 'Transcript'),
        el('div', { className:'transcript', ref: transcriptRef },
          turns.filter(t => t.who !== 'system').length === 0
            ? el('div', { style:{color:'#5a5a6a',fontSize:'.82rem',padding:'20px 4px',textAlign:'center'} }, 'No turns recorded.')
            : turns.filter(t => t.who !== 'system').map(t =>
                el('div', { key:t.id, className:'turn ' + t.who },
                  el('div', { className:'label' },
                    t.who === 'ai' ? 'AI' : 'You',
                    t.interrupted && el('span', { className:'interrupted' }, 'INTERRUPTED'),
                  ),
                  el('div', null, t.text || '…'),
                )
              )
        ),
      ),

      el('button', {
        className:'cta ghost',
        style:{marginTop:14},
        onClick: ()=>{
          setStatus('idle');
          setTurns([]);
          setRfd('');
          setElapsed(0);
          setInterruptCount(0);
          setAiSpeakingMs(0);
          setUserSpeakingMs(0);
          if (recordingUrl) { try { URL.revokeObjectURL(recordingUrl); } catch(e){} }
          setRecordingUrl('');
        }
      }, 'Run Another Round'),
    ),

    el('div', { className:'foot' },
      el('div', { className:'about' },
        'Voice mode runs on OpenAI Realtime (',
        el('strong', null, negotiatedModel || 'gpt-realtime'),
        ') over WebRTC. The Realtime API is OpenAI-only — there is no Claude Realtime, no Gemini Realtime, no Grok Realtime. The thinking is gpt-realtime; the system prompt is the same voice bank that powers ',
        el('a', { href:'/debate-ai' }, '/debate-ai'),
        ', so the personality and debate IQ stay consistent across modes. For multi-brain text mode, use ',
        el('a', { href:'/debate-ai' }, '/debate-ai'),
        '.',
      ),
      el('div', null, 'Voice mode is in beta. Feedback: ',
        el('a', { href:'mailto:hello@debateai.com' }, 'hello@debateai.com'),
      ),
    ),
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(el(App));
</script>
</body>
</html>
