                  type:'button',
                  className:'motion-chip',
                  onClick: rollAny,

                    className:'motion-chip',
                    onClick: () => rollCategory(tag),

                })

            })(),

            { lvl:1, name:'Quick',       desc:'Solo gpt-realtime. Fastest start.' },
            { lvl:2, name:'Sharp',       desc:'+ Claude research. ~3s slower start, better framework.' },
            { lvl:3, name:'Tournament',  desc:'+ Claude + Gemini council. Stronger weighing.' },
            { lvl:4, name:'Council',     desc:'+ Claude + Gemini + Grok. Multi-angle prep.' },
            { lvl:5, name:'World Champ', desc:'Full council + GPT-5 synthesis. ~6s start, hardest opponent.' },
          ];
          const cur = SMART_LABELS[smartness - 1] || SMART_LABELS[0];
          return el('div', { className:'smart-card' },
            el('div', { className:'smart-h' },
              el('span', { className:'lbl' }, 'Smartness'),
              el('span', { className:'lvl' }, cur.name),

            el('div', { className:'smart-desc' }, cur.desc),
            el('input', {

              onChange: e => setSmartness(parseInt(e.target.value, 10)),
              'aria-label':'AI smartness level',
            }),
            el('div', { className:'smart-ticks' },

              // each other at every viewport under ~520px (Council
              // crashed into World Champ even on desktop card widths).
              // Endpoint labels still anchor the user's mental model
              // of the range. Dim ticks render as small dots between.
              SMART_LABELS.map((s, i) => {
                const N = SMART_LABELS.length;
                const frac = i / (N - 1);
                const left = 'calc(9px + ' + frac + ' * (100% - 18px))';
                const isEnd = i === 0 || i === N - 1;
                const isSelected = smartness === s.lvl;
                if (!isEnd && !isSelected) {
                  // Mid-track dot only; no label text
                  return el('span', {
                    key: s.lvl,
                    className: 'tick-dot',
                    style: { left, transform: 'translateX(-50%)' },
                    'aria-hidden': 'true',
                  });
                }
                const transform = i === 0 ? 'translateX(0)'
                  : i === N - 1 ? 'translateX(-100%)'
                  : 'translateX(-50%)';
                return el('span', {
                  key: s.lvl,
                  className: isSelected ? 'on' : '',
                  style: { left, transform },
                }, s.name);
              })

            smartness >= 4 && el('div', { className:'smart-warn' },
              '⚠ ' + cur.name + ' mode adds ~3-6 seconds to the session start while ' + (smartness === 5 ? '4' : '3') + ' brains research the motion in parallel.'

          );
        })(),

        el('div', { className:'summary-cta' },
          voiceGate.state === 'sign-in' ? el('div', { className:'voice-gate' },
            el('div', { className:'vg-eyebrow' }, 'Free trial used'),
            el('div', { className:'vg-h' }, 'Sign in for 3 more rounds'),
            el('p', { className:'vg-body' },
              'You\'ve used your one anonymous voice round. Sign in with Google for 3 more — they save to your record so you can come back to them.',
            ),
            el('button', {
              type:'button', className:'cta vg-cta',
              onClick: triggerGoogleSignIn,
            }, 'Sign in with Google'),
            el('a', { href:'/debate-ai', className:'vg-fallback' }, 'or try typed mode (unmetered) →'),

            el('div', { className:'vg-eyebrow' }, 'Free voice rounds used'),

            el('p', { className:'vg-body' },

            ),
            el('a', {
              href:'/pricing', className:'cta vg-cta',
            }, 'See Pro pricing →'),
            el('a', { href:'/debate-ai', className:'vg-fallback' }, 'or keep going in typed mode →'),

        el('canvas', { className:'orb', ref: orbCanvasRef }),
        el('div', { className:'label' },
          el('span', { className:'who' },
            speaking === 'user' ? '◉ ' + (userFirstName ? userFirstName.toUpperCase() : 'YOU') + ' SPEAKING' :

        ),
        el('div', { className:'stat-card' },
          el('div', { className:'v' }, turns.filter(t => t.who === 'you').length),
          el('div', { className:'l' }, 'Your turns'),
        ),
        el('div', { className:'stat-card' },
          el('div', { className:'v' }, turns.filter(t => t.who === 'ai').length),
          el('div', { className:'l' }, 'AI turns'),
        ),
      ),

      // Talk-time bar
      el('div', { className:'card' },
        el('h3', null, 'Talk-time split'),
        el('div', { className:'talk-bar' },
          el('div', { className:'ai-fill', style:{ width: aiSharePct + '%' } }),
        ),
        el('div', { className:'talk-bar-legend' },
          el('span', null, 'You ' + userSharePct + '%'),
          el('span', null, 'AI ' + aiSharePct + '%'),
        ),
        // Round audio download — both sides mixed via AudioContext +
        // MediaRecorder during the session, finalized on stop.
        recordingUrl && el('div', { className:'download-row' },
          el('a', {
            href: recordingUrl,
            download: 'debate-' + persona.key + '-' + new Date().toISOString().slice(0,10) + '.' + recordingExt,
            className:'download-btn',
          }, '⬇  Download round audio'),
        ),
        // WhatsApp share. Counter only — debate users get the existing
        // round-audio download instead. Tap opens WhatsApp's share
        // sheet on mobile or web.WhatsApp on desktop, prefilled with a
        // viva-flavored line. The Indian board-exam audience lives in
        // WhatsApp groups, so a tap-to-share at end-of-round is the
        // single highest-leverage growth lever for that surface.
        extMode === 'counter' && el('div', { className:'download-row', style:{marginTop:8} },
          el('a', {
            href: (function(){
              const topic = (motion || 'my notes').slice(0, 80);
              const text = `Just ran a viva on “${topic}” with Counter, the AI cross-examines you out loud. Try yours: https://debateai.com/?ref=wa`;
              return 'https://wa.me/?text=' + encodeURIComponent(text);
            })(),
            target:'_blank',
            rel:'noopener',
            className:'download-btn',
            style:{ background:'rgba(37,211,102,.12)', borderColor:'rgba(37,211,102,.4)', color:'#5be584' },
          }, 'Share viva on WhatsApp'),
        ),
      ),

      !rfd && el('button', {
        className:'cta',
        onClick: generateRFD,
        disabled: rfdLoading,
      }, rfdLoading ? 'Generating RFD…' : ['Generate Judge RFD ', el('span', { key:'a', className:'arrow' }, '→')]),

      rfd && el('div', { className:'rfd-card' },
        el('h3', null, 'Reason for Decision'),
        rfd,
      ),

      el('div', { className:'card', style:{marginTop:14} },
        el('h3', null, 'Transcript'),
        el('div', { className:'transcript', ref: transcriptRef },
          turns.filter(t => t.who !== 'system').length === 0
            ? el('div', { style:{color:'#5a5a6a',fontSize:'.82rem',padding:'20px 4px',textAlign:'center'} }, 'No turns recorded.')
            : turns.filter(t => t.who !== 'system').map(t =>
                el('div', { key:t.id, className:'turn ' + t.who },
                  el('div', { className:'label' },
                    t.who === 'ai' ? 'AI' : 'You',
                    t.interrupted && el('span', { className:'interrupted' }, 'INTERRUPTED'),
                  ),
                  el('div', null, t.text || '…'),
                )
              )
        ),
      ),

      el('button', {
        className:'cta ghost',
        style:{marginTop:14},
        onClick: ()=>{
          setStatus('idle');
          setTurns([]);
          setRfd('');
          setElapsed(0);
          setInterruptCount(0);
          setAiSpeakingMs(0);
          setUserSpeakingMs(0);
          if (recordingUrl) { try { URL.revokeObjectURL(recordingUrl); } catch(e){} }
          setRecordingUrl('');
        }
      }, 'Run Another Round'),
    ),

    el('div', { className:'foot' },
      el('div', { className:'about' },
        'Voice mode runs on OpenAI Realtime (',
        el('strong', null, negotiatedModel || 'gpt-realtime'),
        ') over WebRTC. The Realtime API is OpenAI-only. There is no Claude Realtime, no Gemini Realtime, no Grok Realtime. The thinking is gpt-realtime; the system prompt is the same voice bank that powers ',
        el('a', { href:'/debate-ai' }, '/debate-ai'),
        ', so the personality and debate IQ stay consistent across modes. For multi-brain text mode, use ',
        el('a', { href:'/debate-ai' }, '/debate-ai'),
        '.',
      ),
      el('div', null, 'Voice mode is in beta. Feedback: ',
        el('a', { href:'mailto:hello@debateai.com' }, 'hello@debateai.com'),
      ),
    ),
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(el(App));
</script>
</body>
</html>
