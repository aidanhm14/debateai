<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{min-height:100%;width:100%}
body{
  font-family:'Inter','Segoe UI',system-ui,-apple-system,sans-serif;
  background:#06060c;
  color:#e6e6ee;
  font-size:16px;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  overflow-x:hidden;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;font-size:inherit}
a{color:inherit}
:focus-visible{outline:2px solid #ef4444;outline-offset:2px;border-radius:4px}

/* ── Ambient backdrop ─────────────────────────────── */
.bg{
  position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 10%, rgba(239,68,68,.12) 0%, transparent 60%),
    radial-gradient(ellipse 60% 80% at 80% 90%, rgba(168,85,247,.06) 0%, transparent 60%),
    radial-gradient(ellipse 60% 80% at 20% 80%, rgba(96,165,250,.04) 0%, transparent 60%),
    #06060c;
}
.bg::before{
  content:'';position:absolute;inset:0;
  background-image:
    radial-gradient(circle at 1px 1px, rgba(255,255,255,.025) 1px, transparent 0);
  background-size:32px 32px;
  mask-image:radial-gradient(ellipse 70% 70% at 50% 30%, #000 30%, transparent 80%);
}

.shell{position:relative;z-index:1;max-width:980px;margin:0 auto;padding:22px 18px 80px}

/* ── Header ───────────────────────────────────────── */
.head{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:32px;gap:12px;flex-wrap:wrap;
}
.brand{display:flex;align-items:center;gap:10px;font-weight:800;letter-spacing:-.02em;font-size:1.05rem}
.brand a{text-decoration:none;color:inherit;display:flex;align-items:center;gap:10px}
.brand .logo-mark{
  width:32px;height:32px;border-radius:9px;
  background:linear-gradient(135deg,#ef4444 0%,#7c2d12 100%);
  display:grid;place-items:center;color:#fff;font-weight:900;font-size:.78rem;
  box-shadow:0 4px 16px rgba(239,68,68,.35), inset 0 1px 0 rgba(255,255,255,.15);
}
.beta{
  display:inline-block;font-size:.55rem;letter-spacing:.14em;color:#fca5a5;
  background:rgba(239,68,68,.12);padding:3px 7px;border-radius:4px;
  font-weight:700;text-transform:uppercase;border:1px solid rgba(239,68,68,.2);
}
.back{
  font-size:.78rem;color:#9b9bab;text-decoration:none;
  padding:8px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.07);
  transition:all .15s;
}
.back:hover{background:rgba(255,255,255,.04);color:#e6e6ee;border-color:rgba(255,255,255,.12)}

/* ── Hero ─────────────────────────────────────────── */
.hero{margin-bottom:28px;text-align:center}
.hero h1{
  font-size:clamp(2rem, 5vw, 2.85rem);font-weight:900;letter-spacing:-.035em;
  line-height:1.05;margin-bottom:14px;
  background:linear-gradient(180deg,#fff 0%,#a3a3b3 130%);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
}
.hero h1 .accent{
  background:linear-gradient(135deg,#ef4444 0%,#fb7185 100%);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
}
.hero .lede{
  color:#9b9bab;font-size:1.02rem;line-height:1.55;
  max-width:560px;margin:0 auto;
}
.hero .lede strong{color:#e6e6ee;font-weight:600}
.hero .meta{
  display:inline-flex;align-items:center;gap:8px;margin-top:14px;
  font-size:.7rem;color:#7a7a8a;letter-spacing:.05em;
}
.hero .meta .pip{width:5px;height:5px;border-radius:50%;background:#22c55e;box-shadow:0 0 8px #22c55e;animation:pip 2.4s ease-in-out infinite}
@keyframes pip{0%,100%{opacity:.4}50%{opacity:1}}

/* ── Cards ────────────────────────────────────────── */
.card{
  background:linear-gradient(180deg, rgba(255,255,255,.035) 0%, rgba(255,255,255,.01) 100%);
  border:1px solid rgba(255,255,255,.06);
  border-radius:16px;padding:18px;margin-bottom:14px;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}
.card h3{
  font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;
  color:#7a7a8a;margin-bottom:12px;font-weight:700;
}

/* ── Mode picker ──────────────────────────────────── */
.modes{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}
.mode{
  position:relative;
  padding:14px;border:1px solid rgba(255,255,255,.06);border-radius:12px;
  background:linear-gradient(180deg, rgba(255,255,255,.025) 0%, rgba(0,0,0,.15) 100%);
  text-align:left;transition:all .18s cubic-bezier(.2,.8,.2,1);
  display:flex;flex-direction:column;gap:6px;
  overflow:hidden;
}
.mode::before{
  content:'';position:absolute;inset:0;border-radius:12px;
  background:linear-gradient(135deg, rgba(239,68,68,.12) 0%, transparent 50%);
  opacity:0;transition:opacity .18s;pointer-events:none;
}
.mode:hover{border-color:rgba(239,68,68,.25);transform:translateY(-1px)}
.mode:hover::before{opacity:1}
.mode.on{
  border-color:rgba(239,68,68,.55);
  background:linear-gradient(180deg, rgba(239,68,68,.1) 0%, rgba(239,68,68,.02) 100%);
  box-shadow:0 0 0 1px rgba(239,68,68,.25), 0 8px 24px rgba(239,68,68,.12);
}
.mode.on::before{opacity:1}
.mode .icon{font-size:1.25rem;line-height:1;margin-bottom:4px}
.mode .t{font-size:.88rem;font-weight:700;color:#e6e6ee;letter-spacing:-.005em}
.mode .d{font-size:.72rem;color:#9b9bab;line-height:1.4}
.mode.on .t{color:#fecaca}

/* ── Inputs ───────────────────────────────────────── */
.row{display:flex;gap:10px;flex-wrap:wrap}
.row > *{flex:1;min-width:160px}
input[type=text],select,textarea{
  width:100%;padding:13px 14px;
  border:1px solid rgba(255,255,255,.08);border-radius:11px;
  background:rgba(0,0,0,.35);color:#e6e6ee;
  font-size:.92rem;font-family:inherit;outline:none;
  transition:border-color .15s, box-shadow .15s;
}
input[type=text]:focus,select:focus,textarea:focus{
  border-color:rgba(239,68,68,.55);box-shadow:0 0 0 3px rgba(239,68,68,.1);
}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.chip{
  font-size:.7rem;color:#9b9bab;padding:6px 11px;
  border:1px solid rgba(255,255,255,.08);border-radius:999px;
  background:rgba(0,0,0,.2);transition:all .15s;
}
.chip:hover{border-color:rgba(239,68,68,.4);color:#e6e6ee}

/* ── Side toggle ──────────────────────────────────── */
.side-toggle{
  display:grid;grid-template-columns:1fr 1fr;gap:6px;
  padding:4px;background:rgba(0,0,0,.3);border-radius:11px;
  border:1px solid rgba(255,255,255,.06);
}
.side-toggle button{
  padding:11px 12px;border-radius:8px;font-size:.85rem;font-weight:600;
  color:#9b9bab;transition:all .15s;
}
.side-toggle button.on{background:rgba(239,68,68,.15);color:#fecaca}

/* ── Primary CTA ──────────────────────────────────── */
.cta{
  display:flex;align-items:center;justify-content:center;gap:10px;
  width:100%;padding:18px;
  background:linear-gradient(135deg,#ef4444 0%,#dc2626 100%);
  color:#fff;border-radius:14px;
  font-size:1rem;font-weight:800;letter-spacing:.04em;text-transform:uppercase;
  transition:transform .15s, box-shadow .15s, opacity .15s;
  box-shadow:0 8px 24px rgba(239,68,68,.3), inset 0 1px 0 rgba(255,255,255,.15);
}
.cta:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 12px 32px rgba(239,68,68,.4), inset 0 1px 0 rgba(255,255,255,.15)}
.cta:active:not(:disabled){transform:translateY(0)}
.cta:disabled{opacity:.5;cursor:not-allowed}
.cta.stop{background:linear-gradient(135deg,#3a3a44 0%,#1f1f28 100%);box-shadow:0 6px 18px rgba(0,0,0,.4)}
.cta.ghost{background:transparent;border:1px solid rgba(255,255,255,.12);color:#e6e6ee;box-shadow:none}
.cta.ghost:hover:not(:disabled){background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.2)}
.cta .arrow{font-size:1.1em;line-height:1;display:inline-block;transition:transform .2s}
.cta:hover .arrow{transform:translateX(3px)}

/* ── LIVE: the showpiece ──────────────────────────── */
.stage{
  position:relative;
  display:flex;flex-direction:column;align-items:center;
  padding:40px 18px 28px;
  background:radial-gradient(ellipse 80% 100% at 50% 50%, rgba(239,68,68,.06) 0%, transparent 70%);
  border-radius:18px;margin-bottom:14px;
}
.stage canvas.orb{
  width:280px;height:280px;
  filter:drop-shadow(0 0 40px rgba(239,68,68,.35));
  transition:filter .25s;
}
@media (max-width:600px){.stage canvas.orb{width:230px;height:230px}}
.stage.user canvas.orb{filter:drop-shadow(0 0 40px rgba(34,197,94,.35))}
.stage .label{
  margin-top:18px;font-size:.7rem;letter-spacing:.22em;text-transform:uppercase;
  font-weight:700;color:#9b9bab;
}
.stage .label .who{color:#fca5a5;transition:color .2s}
.stage.user .label .who{color:#86efac}
.stage .timer{
  margin-top:8px;font-family:'JetBrains Mono', monospace;
  font-size:1.4rem;font-weight:600;color:#e6e6ee;letter-spacing:.05em;
  font-variant-numeric:tabular-nums;
}
.stage .timer .total{color:#8a8a9a;font-size:.8rem;margin-left:4px}
.stage .stats{
  display:flex;gap:18px;margin-top:12px;
  font-size:.74rem;color:#a3a3b3;letter-spacing:.05em;font-weight:500;
}
.stage .stats span strong{color:#fff;font-weight:700;font-variant-numeric:tabular-nums}
.stage .hint{
  position:absolute;bottom:14px;left:50%;transform:translateX(-50%);
  font-size:.7rem;color:#8a8a9a;text-align:center;letter-spacing:.04em;
}

/* live controls (speed + model badge) — sit just below the mic meter */
.live-controls{
  margin-top:14px;display:flex;align-items:center;justify-content:center;
  gap:14px;flex-wrap:wrap;font-size:.72rem;color:#a3a3b3;
}
.speed-ctl{
  display:flex;align-items:center;gap:6px;
  padding:4px 8px;border-radius:8px;
  background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.06);
}
.speed-ctl .lbl{letter-spacing:.08em;text-transform:uppercase;font-size:.6rem}
.speed-ctl .val{
  font-family:'JetBrains Mono', monospace;font-size:.72rem;font-weight:600;
  color:#e6e6ee;min-width:32px;text-align:center;font-variant-numeric:tabular-nums;
}
.speed-ctl .spd{
  width:22px;height:22px;border-radius:6px;
  background:rgba(255,255,255,.04);color:#a3a3b3;
  display:grid;place-items:center;font-weight:700;line-height:1;
  transition:all .12s;
}
.speed-ctl .spd:hover{background:rgba(239,68,68,.12);color:#fca5a5}
.model-badge{
  font-family:'JetBrains Mono', monospace;font-size:.62rem;
  padding:4px 8px;border-radius:6px;
  background:rgba(96,165,250,.06);border:1px solid rgba(96,165,250,.18);
  color:#bfdbfe;letter-spacing:.02em;
}

/* mic level meter under the orb */
.miclevel{
  margin-top:16px;display:flex;align-items:center;gap:6px;
  font-size:.68rem;color:#a3a3b3;letter-spacing:.08em;font-weight:600;
}
.miclevel .bars{display:flex;gap:2px}
.miclevel .bar{
  width:3px;height:14px;border-radius:2px;
  background:rgba(34,197,94,.18);
  transition:background .08s, height .08s;
}
.miclevel .bar.on{background:#22c55e;box-shadow:0 0 6px rgba(34,197,94,.4)}

/* ── Transcript ───────────────────────────────────── */
.transcript{
  min-height:240px;max-height:480px;overflow-y:auto;padding:6px 4px;
  scroll-behavior:smooth;
}
.transcript::-webkit-scrollbar{width:6px}
.transcript::-webkit-scrollbar-track{background:transparent}
.transcript::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:3px}
.turn{
  padding:12px 14px;border-radius:11px;margin-bottom:9px;
  font-size:.95rem;line-height:1.55;letter-spacing:-.005em;
  animation:turnIn .25s ease-out;
}
@keyframes turnIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.turn.ai{
  background:linear-gradient(180deg, rgba(239,68,68,.06) 0%, rgba(239,68,68,.02) 100%);
  border-left:3px solid rgba(239,68,68,.5);
}
.turn.you{
  background:linear-gradient(180deg, rgba(34,197,94,.06) 0%, rgba(34,197,94,.02) 100%);
  border-left:3px solid rgba(34,197,94,.5);
}
.turn.system{
  background:rgba(255,255,255,.04);font-size:.74rem;color:#b8b8c8;
  border-left:2px solid rgba(255,255,255,.18);font-style:italic;padding:8px 12px;
}
.turn .label{
  font-size:.62rem;letter-spacing:.16em;text-transform:uppercase;
  font-weight:800;margin-bottom:5px;opacity:.85;
}
.turn.ai .label{color:#fca5a5}
.turn.you .label{color:#86efac}
.turn .interrupted{
  display:inline-block;margin-left:8px;font-size:.55rem;color:#fbbf24;
  background:rgba(251,191,36,.12);padding:2px 6px;border-radius:3px;
  letter-spacing:.08em;animation:flashWarn .6s ease-out;
}
@keyframes flashWarn{0%{background:rgba(251,191,36,.4)}100%{background:rgba(251,191,36,.12)}}

/* ── Notices / errors ─────────────────────────────── */
.notice{padding:13px 15px;border-radius:11px;font-size:.85rem;line-height:1.55;margin-bottom:14px}
.notice.warn{background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.2);color:#fde68a}
.notice.error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#fca5a5}
.notice.info{background:rgba(96,165,250,.06);border:1px solid rgba(96,165,250,.18);color:#bfdbfe}
.notice strong{color:#fff;font-weight:600}

/* ── Connecting state ─────────────────────────────── */
.connecting{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:50px 20px;gap:18px;
}
.spinner{
  width:40px;height:40px;border-radius:50%;
  border:2px solid rgba(239,68,68,.15);border-top-color:#ef4444;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.connecting .step{font-size:.78rem;color:#9b9bab;letter-spacing:.04em}

/* ── End-of-session summary ───────────────────────── */
.summary-grid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:14px;
}
.stat-card{
  padding:14px;border-radius:12px;text-align:center;
  background:linear-gradient(180deg, rgba(255,255,255,.035) 0%, rgba(0,0,0,.15) 100%);
  border:1px solid rgba(255,255,255,.06);
}
.stat-card .v{
  font-family:'JetBrains Mono', monospace;font-size:1.55rem;font-weight:600;
  color:#e6e6ee;letter-spacing:-.01em;font-variant-numeric:tabular-nums;
}
.stat-card .l{font-size:.64rem;color:#a3a3b3;letter-spacing:.14em;text-transform:uppercase;margin-top:4px;font-weight:600}
.talk-bar{
  height:8px;border-radius:4px;background:rgba(34,197,94,.25);
  position:relative;overflow:hidden;margin:6px 0 4px;
}
.talk-bar .ai-fill{
  position:absolute;right:0;top:0;bottom:0;
  background:rgba(239,68,68,.6);transition:width .6s cubic-bezier(.2,.8,.2,1);
}
.talk-bar-legend{display:flex;justify-content:space-between;font-size:.66rem;color:#a3a3b3;letter-spacing:.08em;font-weight:600}

.rfd-card{
  background:linear-gradient(180deg, rgba(168,85,247,.07) 0%, rgba(168,85,247,.02) 100%);
  border:1px solid rgba(168,85,247,.22);
  border-radius:14px;padding:20px;
  white-space:pre-wrap;line-height:1.65;font-size:.92rem;
  margin-top:14px;
}
.rfd-card h3{
  color:#c4b5fd;font-size:.68rem;letter-spacing:.18em;text-transform:uppercase;
  margin-bottom:14px;font-weight:700;
}

/* ── Personalities (gamified character picker) ───── */
.persona-grid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px;
}
.persona{
  position:relative;text-align:left;padding:14px;
  border:1px solid rgba(255,255,255,.06);border-radius:12px;
  background:linear-gradient(180deg, rgba(255,255,255,.025) 0%, rgba(0,0,0,.15) 100%);
  transition:all .18s cubic-bezier(.2,.8,.2,1);
  display:flex;gap:12px;align-items:flex-start;
  overflow:hidden;
}
.persona::before{
  content:'';position:absolute;inset:0;border-radius:12px;
  background:linear-gradient(135deg, var(--accent-glow, rgba(239,68,68,.15)) 0%, transparent 60%);
  opacity:0;transition:opacity .18s;pointer-events:none;
}
.persona:hover{border-color:var(--accent-border, rgba(239,68,68,.3));transform:translateY(-1px)}
.persona:hover::before{opacity:1}
.persona.on{
  border-color:var(--accent-strong, rgba(239,68,68,.6));
  background:linear-gradient(180deg, rgba(239,68,68,.08) 0%, rgba(239,68,68,.015) 100%);
  box-shadow:0 0 0 1px var(--accent-border, rgba(239,68,68,.3)), 0 8px 24px rgba(0,0,0,.25);
}
.persona.on::before{opacity:1}
.persona .avatar{
  width:46px;height:46px;flex-shrink:0;border-radius:50%;
  display:grid;place-items:center;
  font-weight:900;font-size:1.05rem;color:#fff;letter-spacing:-.02em;
  background:var(--avatar-bg, linear-gradient(135deg,#ef4444,#7c2d12));
  box-shadow:0 4px 12px rgba(0,0,0,.3), inset 0 1px 0 rgba(255,255,255,.18);
}
.persona .body{flex:1;min-width:0}
.persona .name-row{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
.persona .name{font-size:.95rem;font-weight:700;color:#e6e6ee;letter-spacing:-.01em}
.persona .arch{font-size:.65rem;color:#7a7a8a;text-transform:uppercase;letter-spacing:.12em;font-weight:600}
.persona .bio{font-size:.74rem;color:#9b9bab;line-height:1.45;margin-top:5px}
.persona .bond{
  display:flex;align-items:center;gap:6px;margin-top:8px;
  font-size:.65rem;color:#7a7a8a;letter-spacing:.06em;font-weight:600;
}
.persona .bond .stars{color:#fbbf24;letter-spacing:.05em;font-size:.7rem}
.persona .bond .level{color:#c4b5fd}
.persona .bond .rounds{color:#7a7a8a;font-variant-numeric:tabular-nums}

.bond-up-card{
  background:linear-gradient(135deg, rgba(251,191,36,.1) 0%, rgba(168,85,247,.08) 100%);
  border:1px solid rgba(251,191,36,.25);
  border-radius:12px;padding:14px 16px;margin-bottom:14px;
  display:flex;align-items:center;gap:14px;
  animation:bondPulse .8s ease-out;
}
@keyframes bondPulse{0%{transform:scale(.96);opacity:0}100%{transform:scale(1);opacity:1}}
.bond-up-card .b-avatar{
  width:42px;height:42px;flex-shrink:0;border-radius:50%;
  display:grid;place-items:center;color:#fff;font-weight:900;font-size:1rem;
  background:var(--avatar-bg, linear-gradient(135deg,#ef4444,#7c2d12));
}
.bond-up-card .msg{flex:1}
.bond-up-card .msg .t{font-size:.78rem;color:#fde68a;font-weight:700;letter-spacing:.04em}
.bond-up-card .msg .s{font-size:.7rem;color:#9b9bab;margin-top:2px}

/* ── Footer ───────────────────────────────────────── */
.foot{
  margin-top:32px;padding-top:20px;
  border-top:1px solid rgba(255,255,255,.06);
  text-align:center;font-size:.7rem;color:#8a8a9a;line-height:1.6;
}
.foot a{color:#bfbfcf;text-decoration:underline;text-decoration-color:rgba(255,255,255,.32);text-underline-offset:2px}

/* ──────────────────────────────────────────────────────
   CLEAN-UP OVERRIDES
   Strip the heavy decoration the first pass leaned on (multi-layer
   gradients, glow shadows, animated pip, gradient text). Single
   accent color, flat surfaces, generous whitespace. Leaves the orb
   alone — that's the moment of magic.
   ────────────────────────────────────────────────────── */
/* Restore the warm crimson brand backdrop — subtle radial glow at
   top so the page reads as part of the same dark/red world as
   /landing and /debate-ai, not a separate cold-blue island. */
body{background:#0a0509}
.bg{
  display:block;position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 90% 60% at 50% 0%, rgba(239,68,68,.10) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 50% 100%, rgba(127,29,29,.08) 0%, transparent 70%),
    #0a0509;
}
.bg::before{display:none}

.shell{max-width:760px;padding:18px 20px 64px}
.head{margin-bottom:22px}
.brand .logo-mark{
  background:#ef4444;box-shadow:none;
  width:28px;height:28px;border-radius:7px;font-size:.72rem;
}
.brand{font-size:.95rem}
.beta{font-weight:600;border:none;background:rgba(239,68,68,.1);color:#fca5a5;letter-spacing:.1em}
.back{padding:7px 11px;font-size:.74rem;border-radius:8px}

/* Hero — quieter, no gradient text, no animated pip */
.hero{margin-bottom:24px;text-align:left}
.hero h1{
  font-size:1.75rem;font-weight:700;letter-spacing:-.02em;line-height:1.15;
  color:#f0f0f5;background:none;-webkit-text-fill-color:initial;margin-bottom:8px;
}
.hero h1 .accent{color:#ef4444;background:none;-webkit-text-fill-color:initial}
.hero .lede{font-size:.92rem;line-height:1.55;color:#9b9bab;max-width:none;margin:0}
.hero .meta{display:none}

/* Cards — flat, single border, no backdrop blur */
.card{
  background:rgba(255,255,255,.025);
  border:1px solid rgba(255,255,255,.06);
  border-radius:10px;padding:16px;margin-bottom:10px;
  backdrop-filter:none;-webkit-backdrop-filter:none;
  box-shadow:none;
}
.card h3{
  font-size:.66rem;letter-spacing:.14em;font-weight:600;
  color:#7a7a8a;margin-bottom:10px;
}

/* Mode tiles — no emoji icons (we hide them via JSX swap below),
   no internal gradient, simple selected state */
.modes{grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:8px}
.mode{
  padding:11px 12px;border-radius:8px;
  background:rgba(255,255,255,.02);
  border:1px solid rgba(255,255,255,.06);
}
.mode::before{display:none}
.mode:hover{transform:none;border-color:rgba(239,68,68,.22);background:rgba(239,68,68,.04)}
.mode.on{
  border-color:#ef4444;background:rgba(239,68,68,.08);
  box-shadow:none;
}
.mode .icon{display:none} /* drop emojis */
.mode .t{font-size:.82rem;font-weight:600}
.mode .d{font-size:.7rem;line-height:1.4;color:#8a8a9a}

/* Persona picker — compact card: avatar + name + bond on one row */
.persona-grid{grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:6px}
.persona{
  padding:10px 12px;border-radius:8px;
  background:rgba(255,255,255,.02);
  border:1px solid rgba(255,255,255,.06);
  gap:11px;
}
.persona::before{display:none}
.persona:hover{transform:none;border-color:rgba(239,68,68,.22);background:rgba(239,68,68,.04)}
.persona.on{
  border-color:#ef4444;background:rgba(239,68,68,.08);
  box-shadow:none;
}
.persona .avatar{
  width:36px;height:36px;border-radius:50%;
  font-size:.78rem;letter-spacing:0;
  background:#3a3a44 !important;color:#e6e6ee;
  box-shadow:none;
}
.persona.on .avatar{background:#ef4444 !important;color:#fff}
.persona .name-row{gap:6px;align-items:center}
.persona .name{font-size:.85rem;font-weight:600}
.persona .arch{font-size:.6rem;letter-spacing:.08em;color:#7a7a8a}
.persona .bio{display:none} /* tooltip via title attr instead — see JSX */
.persona .bond{margin-top:4px;font-size:.6rem;letter-spacing:.04em}
.persona .bond .stars{font-size:.65rem;letter-spacing:.04em}

/* Inputs — quieter focus state */
input[type=text],select,textarea{
  padding:11px 12px;border-radius:8px;font-size:.88rem;
  background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.08);
}
input[type=text]:focus,select:focus,textarea:focus{
  border-color:rgba(239,68,68,.5);box-shadow:none;
}
.chip{padding:5px 10px;font-size:.68rem;border-radius:6px}
.side-toggle{padding:3px}
.side-toggle button{padding:9px 12px;font-size:.8rem;font-weight:500}

/* CTA — keep the punch but drop the layered shadows */
.cta{
  padding:15px;border-radius:10px;font-size:.88rem;letter-spacing:.06em;
  background:#ef4444;
  box-shadow:none;
  transition:background .15s,transform .1s;
}
.cta:hover:not(:disabled){transform:none;background:#dc2626;box-shadow:none}
.cta.stop{background:#3a3a44}
.cta.stop:hover:not(:disabled){background:#525258;box-shadow:none}
.cta.ghost{background:transparent;border:1px solid rgba(255,255,255,.12)}

/* Live stage — keep the orb prominent, simplify everything else */
.stage{padding:28px 18px 22px;background:none}
.stage canvas.orb{filter:drop-shadow(0 0 24px rgba(239,68,68,.28))}
.stage.user canvas.orb{filter:drop-shadow(0 0 24px rgba(34,197,94,.28))}
.stage .label{margin-top:14px;font-size:.66rem;letter-spacing:.18em}
.stage .timer{margin-top:6px;font-size:1.2rem}
.stage .timer .total{font-size:.72rem}
.stage .stats{margin-top:10px;font-size:.66rem;gap:14px}
.miclevel{margin-top:12px}
.live-controls{margin-top:12px;gap:10px;font-size:.66rem}
.speed-ctl{padding:3px 8px}
.model-badge{font-size:.6rem;padding:3px 7px;background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.1);color:#a3a3b3}

/* Transcript turns — flatter borders */
.turn{border-radius:8px;font-size:.9rem}
.turn.ai{background:rgba(239,68,68,.045)}
.turn.you{background:rgba(34,197,94,.045)}

/* Footer — add an "about" line about the OpenAI-only architecture */
.foot{margin-top:24px;padding-top:18px}
.foot .about{
  font-size:.72rem;color:#a3a3b3;line-height:1.5;
  max-width:520px;margin:0 auto 10px;text-align:center;
}

/* ──────────────────────────────────────────────────────
   PROFESSIONAL REDESIGN (per spec)
   Two-column setup, numbered steps, sticky session summary,
   segmented controls, compact opponent picker.
   ────────────────────────────────────────────────────── */

/* Global topbar is position:fixed at top:0 height:52px — pad above
   it so the page's own header isn't hidden behind it. */
.shell{max-width:1080px;padding:78px 24px 80px}

/* The page's local .head was duplicating the topbar's branding, which
   meant the badge+logo got clipped behind the fixed topbar AND read
   redundantly. Drop the local brand entirely; keep only the
   "back to text mode" link, right-aligned. */
.head{
  margin-bottom:18px;justify-content:flex-end;
}
.head .brand{display:none}

/* Hero — left headline, right status pill */
.hero{
  display:grid;grid-template-columns:1fr auto;align-items:center;
  gap:18px;margin-bottom:32px;
}
.hero h1{
  font-size:clamp(1.75rem, 3.4vw, 2.5rem);font-weight:700;
  letter-spacing:-.02em;line-height:1.1;color:#f0f0f5;margin-bottom:6px;
}
.hero h1 .accent{color:#ef4444}
.hero .lede{
  font-size:.95rem;line-height:1.5;color:#9b9bab;max-width:520px;margin:0;
}
.hero-status{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;border-radius:10px;
  background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.07);
}
.hero-status .pip{
  width:7px;height:7px;border-radius:50%;background:#22c55e;
  box-shadow:0 0 6px rgba(34,197,94,.5);
}
.hero-status .meta{font-size:.72rem;color:#9b9bab;line-height:1.45}
.hero-status .meta strong{color:#e6e6ee;font-weight:600}

@media (max-width:760px){
  .hero{grid-template-columns:1fr}
  .hero-status{justify-self:start}
}

/* Two-column setup grid */
.setup-grid{
  display:grid;grid-template-columns:minmax(0,1fr) 340px;gap:20px;
  align-items:start;
}
@media (max-width:920px){
  .setup-grid{grid-template-columns:minmax(0,1fr)}
}

/* Numbered step heading */
.step{margin-bottom:18px}
.step-h{
  display:flex;align-items:center;gap:10px;margin-bottom:10px;
}
.step-num{
  width:24px;height:24px;border-radius:50%;
  display:grid;place-items:center;
  background:rgba(239,68,68,.12);color:#fca5a5;
  font-size:.72rem;font-weight:700;letter-spacing:0;
  border:1px solid rgba(239,68,68,.2);
}
.step-title{
  font-size:.92rem;font-weight:600;color:#f0f0f5;
  letter-spacing:-.005em;
}
.step-help{
  font-size:.74rem;color:#8a8a9a;margin-bottom:10px;line-height:1.45;
  margin-left:34px;
}
.step-body{margin-left:0}

/* Step cards — flatter, premium */
.step .card{
  margin:0;background:rgba(255,255,255,.02);
  border:1px solid rgba(255,255,255,.06);
  border-radius:12px;padding:14px;
}
.step .card h3{display:none}

/* Mode tiles — uniform 2x2 grid on desktop */
.modes{
  grid-template-columns:repeat(2, minmax(0, 1fr));gap:8px;
}
@media (max-width:520px){.modes{grid-template-columns:1fr}}
.mode{
  padding:12px 14px;border-radius:10px;
  background:rgba(255,255,255,.022);border:1px solid rgba(255,255,255,.06);
  min-height:64px;
}
.mode .t{font-size:.85rem;font-weight:600;letter-spacing:-.005em;color:#e6e6ee}
.mode .d{font-size:.72rem;line-height:1.4;color:#8a8a9a;margin-top:2px}
.mode.on{
  border-color:rgba(239,68,68,.55);
  background:rgba(239,68,68,.06);
}
.mode.on .t{color:#fff}

/* Side segmented control — polished, not alarm-red */
.side-seg{
  display:grid;grid-template-columns:1fr 1fr;gap:0;
  padding:0;border-radius:10px;
  background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.08);
  overflow:hidden;
}
.side-seg button{
  padding:12px 14px;font-size:.86rem;font-weight:500;
  color:#9b9bab;background:transparent;border:none;
  transition:all .15s;letter-spacing:0;
}
.side-seg button[aria-pressed="true"]{
  background:rgba(239,68,68,.1);color:#fde2e2;font-weight:600;
}
.side-seg button:hover:not([aria-pressed="true"]){
  background:rgba(255,255,255,.03);color:#e6e6ee;
}

/* Right column — sticky session summary + Start */
.summary-col{
  position:sticky;top:24px;
  display:flex;flex-direction:column;gap:14px;
}
@media (max-width:920px){.summary-col{position:static}}
.summary-card{
  background:linear-gradient(180deg, rgba(239,68,68,.04) 0%, rgba(255,255,255,.02) 100%);
  border:1px solid rgba(239,68,68,.18);
  border-radius:12px;padding:18px;
}
.summary-card .ttl{
  font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;
  color:#9b9bab;font-weight:600;margin-bottom:14px;
}
.summary-card .row{
  display:grid;grid-template-columns:90px 1fr;
  padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05);
  font-size:.84rem;line-height:1.4;align-items:start;gap:10px;
}
.summary-card .row:last-of-type{border-bottom:none}
.summary-card .row .k{color:#8a8a9a;font-size:.78rem;letter-spacing:.02em}
.summary-card .row .v{color:#e6e6ee;font-weight:500;word-break:break-word}
.summary-card .row .v.muted{color:#7a7a8a;font-style:italic;font-weight:400}

.summary-cta{
  display:flex;flex-direction:column;gap:8px;
}
.summary-cta .cta{
  width:100%;padding:16px 18px;font-size:.94rem;font-weight:700;
  letter-spacing:.04em;border-radius:11px;
  background:#ef4444;
  box-shadow:0 6px 16px rgba(239,68,68,.22);
}
.summary-cta .cta:hover:not(:disabled){background:#dc2626;transform:translateY(-1px)}
.summary-cta .helper{
  font-size:.72rem;color:#7a7a8a;text-align:center;line-height:1.45;
}

/* Voice usage gate. Replaces the Start button when an anon user has
   used their 1 free trial (state='sign-in') or a free signed-in user
   has used their 3 lifetime sessions (state='upgrade'). Card-style
   so it reads as a deliberate gate, not a generic warning. */
.voice-gate{
  display:flex;flex-direction:column;align-items:center;gap:10px;
  padding:18px 20px;
  background:linear-gradient(135deg,rgba(251,191,36,.10),rgba(239,68,68,.06));
  border:1px solid rgba(251,191,36,.32);
  border-radius:14px;
  text-align:center;
}
.voice-gate .vg-eyebrow{
  font-size:.6rem;font-weight:900;letter-spacing:.16em;text-transform:uppercase;
  color:#fbbf24;
}
.voice-gate .vg-h{
  font-size:1.05rem;font-weight:800;color:#fff;letter-spacing:-.01em;
}
.voice-gate .vg-body{
  font-size:.78rem;color:#a0a0b0;line-height:1.55;margin:2px 0 4px;max-width:380px;
}
.voice-gate .vg-cta{
  /* Keep the Start-button visual identity so the gate reads as the
     same surface, just with a different label/intent. */
  display:inline-block;width:100%;padding:13px 18px;
  font-size:.9rem;font-weight:800;letter-spacing:.04em;
  background:#ef4444;color:#fff;text-decoration:none;text-align:center;
  border-radius:11px;border:none;cursor:pointer;
  box-shadow:0 6px 16px rgba(239,68,68,.22);
  transition:background .15s,transform .15s;
}
.voice-gate .vg-cta:hover{background:#dc2626;transform:translateY(-1px)}
.voice-gate .vg-fallback{
  font-size:.74rem;color:#a0a0b0;text-decoration:none;
  margin-top:2px;
}
.voice-gate .vg-fallback:hover{color:#fff;text-decoration:underline}

/* Compact opponent picker (right column) */
.opps{display:flex;flex-direction:column;gap:6px}
.opp{
  display:flex;align-items:center;gap:11px;
  padding:10px 12px;border-radius:9px;
  background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);
  text-align:left;transition:all .15s;cursor:pointer;
  width:100%;
}
.opp:hover{border-color:rgba(239,68,68,.22);background:rgba(239,68,68,.04)}
.opp[aria-pressed="true"]{
  border-color:rgba(239,68,68,.55);background:rgba(239,68,68,.07);
}
.opp .av{
  width:32px;height:32px;border-radius:50%;flex-shrink:0;
  display:grid;place-items:center;color:#fff;
  font-size:.72rem;font-weight:800;background:#3a3a44;
  letter-spacing:0;
}
.opp[aria-pressed="true"] .av{background:#ef4444}
.opp .info{flex:1;min-width:0;display:flex;flex-direction:column;gap:1px}
.opp .nm{font-size:.84rem;font-weight:600;color:#e6e6ee;line-height:1.2}
.opp .role{font-size:.66rem;color:#8a8a9a;letter-spacing:.04em}
.opp .meta{
  font-size:.65rem;color:#7a7a8a;font-variant-numeric:tabular-nums;
  white-space:nowrap;letter-spacing:.04em;
}
.opp-toggle{
  margin-top:6px;padding:9px 12px;font-size:.74rem;
  border:1px solid rgba(255,255,255,.08);border-radius:8px;
  color:#9b9bab;background:transparent;text-align:center;
  transition:all .15s;
}
.opp-toggle:hover{background:rgba(255,255,255,.03);color:#e6e6ee}

/* Tighter motion input */
.motion-input{
  width:100%;padding:13px 14px;font-size:.92rem;
  background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.08);
  border-radius:10px;color:#e6e6ee;outline:none;
  transition:border-color .15s;
}
.motion-input:focus{border-color:rgba(239,68,68,.45)}
.motion-input::placeholder{color:#8a8a9a}
.motion-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.motion-chip{
  font-size:.7rem;padding:5px 10px;border-radius:6px;
  background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.07);
  color:#9b9bab;transition:all .15s;
}
.motion-chip:hover{border-color:rgba(239,68,68,.3);color:#e6e6ee;background:rgba(239,68,68,.04)}

/* Recording UI */
.rec-pill{
  display:inline-flex;align-items:center;gap:6px;
  font-size:.65rem;color:#fca5a5;letter-spacing:.06em;
  background:rgba(239,68,68,.08);padding:4px 9px;border-radius:999px;
  border:1px solid rgba(239,68,68,.18);
}
.rec-pill .rec-dot{
  width:6px;height:6px;border-radius:50%;background:#ef4444;
  animation:recPulse 1.6s ease-in-out infinite;
}
@keyframes recPulse{0%,100%{opacity:.6}50%{opacity:1}}

.download-row{
  display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;
}
.download-btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:11px 16px;font-size:.82rem;font-weight:600;
  border-radius:10px;border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.02);color:#e6e6ee;text-decoration:none;
  transition:all .15s;
}
.download-btn:hover{background:rgba(255,255,255,.05);border-color:rgba(239,68,68,.35)}

/* Hide the legacy single-column setup elements when the new layout is active */
body[data-layout="setup-v2"] .legacy-setup{display:none}

/* Accessibility — visible focus on the buttons that lost it from the cleanup */
.mode:focus-visible, .opp:focus-visible, .side-seg button:focus-visible,
.motion-chip:focus-visible, .opp-toggle:focus-visible{
  outline:2px solid #ef4444;outline-offset:2px;
}

/* 'Standing by' orb in the setup right column. Smaller than the live
   stage orb (180px vs 280px) so it doesn't compete with the form, but
   uses the same canvas + animation function so the visual continuity
   into the live round is one-to-one. Crimson glow at idle, no green
   user-active variant since this is pre-mic-grant. */
.setup-orb-card{
  text-align:center;padding:22px 18px 18px;margin-bottom:18px;
  background:linear-gradient(180deg, rgba(239,68,68,.04) 0%, rgba(255,255,255,.018) 100%);
  border:1px solid rgba(239,68,68,.18);
  border-radius:14px;
  position:relative;overflow:hidden;
}
.setup-orb-card::before{
  content:'';position:absolute;inset:-30%;
  background:radial-gradient(ellipse 60% 60% at 50% 40%, rgba(239,68,68,.08) 0%, transparent 60%);
  pointer-events:none;
}
.setup-orb-card canvas.setup-orb{
  width:180px;height:180px;display:block;margin:0 auto;
  position:relative;z-index:1;
}
@media (max-width:600px){.setup-orb-card canvas.setup-orb{width:150px;height:150px}}
.setup-orb-card .setup-orb-label{
  margin-top:14px;font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;
  font-weight:700;color:#fca5a5;position:relative;z-index:1;
}
.setup-orb-card .setup-orb-sub{
  margin-top:6px;font-size:.78rem;color:#a3a3b3;line-height:1.5;
  max-width:260px;margin-left:auto;margin-right:auto;position:relative;z-index:1;
}

/* Mic permission notice — neutral warm so it sits in the same
   crimson-on-dark world as the rest of the setup. The cold blue
   the previous pass used read as an alert from a different app. */
.mic-notice{
  display:flex;align-items:flex-start;gap:11px;
  padding:12px 14px;border-radius:10px;
  background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.07);
  margin-top:10px;
}
.mic-notice .mic-icon{
  width:32px;height:32px;flex-shrink:0;border-radius:8px;
  background:rgba(239,68,68,.1);
  display:grid;place-items:center;color:#fca5a5;
  font-size:1.05rem;
}
.mic-notice .body{flex:1;min-width:0}
.mic-notice .t{font-size:.8rem;font-weight:600;color:#e6e6ee;margin-bottom:2px;letter-spacing:-.005em}
.mic-notice .d{font-size:.72rem;color:#9b9bab;line-height:1.5}
.mic-notice .d strong{color:#fecaca;font-weight:600}
.mic-notice.granted{background:rgba(34,197,94,.05);border-color:rgba(34,197,94,.18)}
.mic-notice.granted .mic-icon{background:rgba(34,197,94,.12);color:#86efac}
.mic-notice.denied{background:rgba(239,68,68,.06);border-color:rgba(239,68,68,.22)}
.mic-notice.denied .mic-icon{background:rgba(239,68,68,.14);color:#fca5a5}

/* Smartness slider — picks how many extra brains the AI consults
   during prep before its first speech. */
.smart-card{
  background:rgba(255,255,255,.022);border:1px solid rgba(255,255,255,.06);
  border-radius:10px;padding:14px;

// Singleton AudioContext. Some browsers throttle creation if abused;
// reuse one per page. resume() needs a user gesture, which we always
// have (Start button).
let _audioCtx = null;

  if (_audioCtx) return _audioCtx;

  } catch(e){ return null; }
  return _audioCtx;
}

// Synth chime — short oscillator burst, no external audio files.
// Used for session start / end / interrupt cues. Subtle so it doesn't
// sound like a notification bot.
function chime(freqs, opts){
  const ctx = getAudioCtx();
  if (!ctx) return;
  if (ctx.state === 'suspended') { try { ctx.resume(); } catch(e){} }
  const dur = (opts && opts.dur) || 0.18;
  const gain = (opts && opts.gain) || 0.05;
  const type = (opts && opts.type) || 'sine';
  const stagger = (opts && opts.stagger) || 0.06;
  freqs.forEach((f, i) => {
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    const start = ctx.currentTime + i * stagger;
    osc.type = type;
    osc.frequency.value = f;
    g.gain.setValueAtTime(0.0001, start);
    g.gain.exponentialRampToValueAtTime(gain, start + 0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, start + dur);
    osc.connect(g).connect(ctx.destination);
    osc.start(start);
    osc.stop(start + dur + 0.02);
  });
}

};

    const live = Math.max(ai, user);

    const accent = isUser ? [34,197,94] : [239,68,68];

    const auroraR = R * (1.4 + smoothLevel * 0.7);
    const grad = ctx.createRadialGradient(cx, cy, R*0.2, cx, cy, auroraR);
    grad.addColorStop(0, `rgba(${accent[0]},${accent[1]},${accent[2]},${0.35 + smoothLevel*0.3})`);
    grad.addColorStop(0.4, `rgba(${accent[0]},${accent[1]},${accent[2]},${0.12 + smoothLevel*0.15})`);
    grad.addColorStop(1, `rgba(${accent[0]},${accent[1]},${accent[2]},0)`);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // Inner ring waveform
    phase += 0.012 + smoothLevel * 0.02;
    const segments = 96;
    ctx.beginPath();
    for (let i = 0; i <= segments; i++) {
      const t = i / segments;
      const a = t * Math.PI * 2;
      // Layered sine modulation gives an organic, breathing motion.
      const r = R * (1 + smoothLevel * 0.55) +
                Math.sin(a * 6 + phase * 2) * (3 + smoothLevel * 14) +
                Math.sin(a * 11 - phase * 3) * (2 + smoothLevel * 9) +
                Math.cos(a * 3 + phase) * (4 + smoothLevel * 6);
      const x = cx + Math.cos(a) * r;
      const y = cy + Math.sin(a) * r;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.lineWidth = 1.6 * dpr;
    ctx.strokeStyle = `rgba(${accent[0]},${accent[1]},${accent[2]},${0.55 + smoothLevel*0.3})`;
    ctx.stroke();
    ctx.fillStyle = `rgba(${accent[0]},${accent[1]},${accent[2]},${0.04 + smoothLevel*0.06})`;
    ctx.fill();

    // Inner pulsing core
    const coreR = R * (0.55 + smoothLevel * 0.25);
    const coreGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, coreR);
    coreGrad.addColorStop(0, `rgba(${accent[0]},${accent[1]},${accent[2]},${0.6 + smoothLevel*0.3})`);
    coreGrad.addColorStop(1, `rgba(${accent[0]},${accent[1]},${accent[2]},0)`);
    ctx.fillStyle = coreGrad;
    ctx.beginPath();
    ctx.arc(cx, cy, coreR, 0, Math.PI*2);
    ctx.fill();

    // Bright hot center
    ctx.fillStyle = `rgba(255,255,255,${0.5 + smoothLevel*0.4})`;
    ctx.beginPath();
    ctx.arc(cx, cy, 4 * dpr + smoothLevel*8, 0, Math.PI*2);
    ctx.fill();

    raf = requestAnimationFrame(draw);
  };
  draw();

  return () => {
    if (raf) cancelAnimationFrame(raf);
    window.removeEventListener('resize', fitCanvas);
  };
}

  const [extMode, setExtMode] = useState('');

  useEffect(() => {

    try {
      document.documentElement.setAttribute('data-ext', '1');

    } catch (e) {}
    setExtMode(mode);
    if (mode === 'counter') {
      // Auto-pick the closest realtime mode for oral examination — the
      // realtime engine's `crossex` prompt is short-question / pause /

      try { setMode('crossex'); } catch (e) {}

      try {

          && PERSONALITIES.some(p => p.key === 'examiner');

      } catch (e) {}
    }
    const SHORT = 200;
    const handle = (ev) => {
      if (!ev || !ev.data || ev.data.type !== 'debateai-ext') return;
      // Trust only the extension panel as parent.
      if (!String(ev.origin || '').startsWith('chrome-extension://')) return;
      const text = String(ev.data.text || '').trim();
      if (!text) return;
      // For voice-debate the motion is the spoken topic. Long passages
      // get their first sentence in the motion field; the rest is dropped

      // separately, and the motion box has only one line of UI room).
      const stem = text.length > SHORT
        ? (text.match(/[^.!?]+[.!?]/) || [text])[0].trim().slice(0, SHORT)

    };
    window.addEventListener('message', handle);

  // Microphone permission state — checked on mount via the Permissions
  // API so we can render an accurate notice ("granted" / "needs prompt"

  const [micPerm, setMicPerm] = useState('unknown'); // unknown | granted | prompt | denied
  useEffect(()=>{
    let cancelled = false;
    let permRef = null;
    (async ()=>{
      try {
        if (navigator.permissions && navigator.permissions.query) {
          const p = await navigator.permissions.query({ name: 'microphone' });
          permRef = p;
          if (!cancelled) setMicPerm(p.state);
          p.onchange = () => { if (!cancelled) setMicPerm(p.state); };
        }
      } catch(e) { /* unsupported — leave as unknown */ }
    })();
    return () => { cancelled = true; if (permRef) permRef.onchange = null; };
  }, []);

  // ── Voice usage gate ─────────────────────────────────────────────
  // Tiered access:
  //   • Anon visitors: 1 free voice session (localStorage counter)
  //   • Signed-in free: 3 lifetime voice sessions (server-truth on
  //     user_profiles/{uid}.voiceSessionsUsed, client read-only)
  //   • Pro: no client cap (server-side 6/hour/IP rate limit still applies)
  // Client-side gate is UX-only; the real enforcement lives in
  // realtime-session.mjs which checks Firestore on every mint.
  const ANON_VOICE_LIMIT = 1;
  const FREE_VOICE_LIMIT = 3;
  const ANON_USAGE_KEY = 'da-voice-anon-used';
  // Owner allowlist — bypasses the voice cap on the client so the gate
  // never shows the upgrade card to these accounts. Server enforces the
  // same allowlist in realtime-session.mjs; this just keeps the UI
  // honest when the owner is signed in.
  const OWNER_EMAILS = new Set([
    'aidandavidhollinger@gmail.com',
  ]);
  const [voiceGate, setVoiceGate] = useState({
    loading: true,
    signedIn: false,
    isPro: false,
    used: 0,
    limit: ANON_VOICE_LIMIT,
    state: 'ok',  // 'ok' | 'sign-in' | 'upgrade'
  });

  function readAnonUsed(){
    try { return Math.max(0, parseInt(localStorage.getItem(ANON_USAGE_KEY), 10) || 0); }
    catch(e){ return 0; }
  }
  function bumpAnonUsed(){
    try { localStorage.setItem(ANON_USAGE_KEY, String(readAnonUsed() + 1)); } catch(e){}
  }

  // Recompute gate state from current auth + counter. Called on
  // mount, on auth state change, and after a successful session
  // start (so the button updates immediately).
  const refreshVoiceGate = useCallback(async ()=>{
    let signedIn = false;
    let isPro = false;
    let used = 0;
    let limit = ANON_VOICE_LIMIT;
    let state = 'ok';
    try {
      const u = (typeof firebase !== 'undefined' && firebase.auth) ? firebase.auth().currentUser : null;
      if (u){
        signedIn = true;
        limit = FREE_VOICE_LIMIT;
        // Pull profile once; voiceSessionsUsed is the server-incremented
        // counter, plan/tier flags whether they're Pro.
        try {
          const db = firebase.firestore();
          const snap = await db.collection('user_profiles').doc(u.uid).get();
          if (snap.exists){
            const d = snap.data() || {};
            used = Math.max(0, parseInt(d.voiceSessionsUsed, 10) || 0);
            isPro = d.plan === 'pro' || d.plan === 'team' || d.plan === 'lifetime' || d.isPro === true;
          }
        } catch(e){ /* read failure → treat as fresh; server will enforce real cap */ }
        if (OWNER_EMAILS.has(String(u.email || '').toLowerCase())){
          isPro = true;
        }
      } else {
        used = readAnonUsed();
      }
      if (isPro){
        state = 'ok';
      } else if (signedIn && used >= FREE_VOICE_LIMIT){
        state = 'upgrade';
      } else if (!signedIn && used >= ANON_VOICE_LIMIT){
        state = 'sign-in';
      } else {
        state = 'ok';
      }
    } catch(e){ /* fall through with defaults */ }
    setVoiceGate({ loading: false, signedIn, isPro, used, limit, state });

  useEffect(()=>{

  const [elapsed, setElapsed] = useState(0);
  const [turns, setTurns] = useState([]);
  const [interruptCount, setInterruptCount] = useState(0);
  const [aiSpeakingMs, setAiSpeakingMs] = useState(0);

  const dcRef = useRef(null);

  const audioElRef = useRef(null);
  const startedAtRef = useRef(0);
  const tickRef = useRef(null);
  const lastSpeechTickRef = useRef({ ai: 0, user: 0, who: null });

  const currentUserTurnRef = useRef(null);

  const setupOrbCanvasRef = useRef(null);

  const upsertTurn = useCallback((turn)=>{

  const cleanup = useCallback(()=>{

    }

  // perceived speed.
  useEffect(()=>{
    if (audioElRef.current) {
      try { audioElRef.current.playbackRate = playbackRate; } catch(e){}
    }
  }, [playbackRate]);

  // AI-side pacing nudge — sends a debounced system-role conversation
  // item over the data channel telling the AI what WPM to target on
  // the next turn. This is what makes the speed slider audibly affect
  // the AI's delivery (the playbackRate above is unreliable on live
  // WebRTC streams). 1.0× = 180 wpm baseline; 0.85× = 153 wpm
  // (deliberate); 1.6× = 288 wpm (debater pace).
  //
  // Debounced 450ms so rapid +/- clicks send ONE update instead of a
  // burst of conflicting pacing notes that would whiplash the AI.
  // Skipped on initial mount (== 1.0×) so we don't spam the channel
  // with a no-op on session start.
  const lastPacingRateRef = useRef(1.0);
  useEffect(()=>{
    if (!dcRef.current || dcRef.current.readyState !== 'open') return;
    if (Math.abs(playbackRate - lastPacingRateRef.current) < 0.01) return;
    const t = setTimeout(()=>{
      try {
        const wpm = Math.round(180 * playbackRate);
        const pace = playbackRate < 0.95 ? 'slower and more deliberately'
          : playbackRate > 1.05 ? 'faster, with brisk debater pacing'
          : 'at normal conversational pace';
        dcRef.current.send(JSON.stringify({
          type: 'conversation.item.create',
          item: {
            type: 'message',
            role: 'system',
            content: [{
              type: 'input_text',
              text: '[Pacing update] Speak ' + pace + ' from your next turn onward — target ~' + wpm + ' words per minute. Hold this pace until told otherwise. Do NOT acknowledge this note in speech.'
            }]
          }
        }));
        lastPacingRateRef.current = playbackRate;
      } catch(e){ /* dc closed mid-flight; ignore */ }
    }, 450);
    return ()=> clearTimeout(t);
  }, [playbackRate]);

  // Toggle the local mic track on/off when the user mutes themselves.
  // This prevents accidental VAD-triggered interruptions while still
  // keeping the WebRTC connection alive — much cleaner than tearing
  // down and re-adding the track.
  useEffect(()=>{
    const stream = localStreamRef.current;
    if (!stream) return;
    stream.getAudioTracks().forEach(t => { try { t.enabled = !muted; } catch(e){} });
  }, [muted]);

  /* ── Realtime event handler ───────────────────── */

  const handleEvent = useCallback((evt)=>{
    if (!evt || !evt.type) return;

    switch (evt.type) {
      case 'session.created':
      case 'session.updated':
        break;

      case 'input_audio_buffer.speech_started': {
        // User started talking — interrupt if AI was mid-response.
        const cur = currentAiTurnRef.current;
        if (cur) {
          upsertTurn({ ...cur, interrupted: true });
          currentAiTurnRef.current = null;
          setInterruptCount(n => n + 1);
          try { window.SFX && SFX.interrupt && SFX.interrupt(); } catch (sfxErr) { console.warn('[interrupt] SFX skipped:', sfxErr); }
        }
        setSpeaking('user');
        isUserSpeakingRef.current = true;
        const id = 'you-' + Date.now();
        currentUserTurnRef.current = { id, who:'you', text:'…' };
        upsertTurn(currentUserTurnRef.current);
        lastSpeechTickRef.current = { ai: 0, user: Date.now(), who: 'user' };
        break;
      }

      case 'input_audio_buffer.speech_stopped': {
        if (lastSpeechTickRef.current.who === 'user' && lastSpeechTickRef.current.user) {
          setUserSpeakingMs(ms => ms + (Date.now() - lastSpeechTickRef.current.user));
        }
        lastSpeechTickRef.current = { ai: 0, user: 0, who: null };
        isUserSpeakingRef.current = false;
        if (speaking === 'user') setSpeaking('idle');
        break;
      }

      case 'conversation.item.input_audio_transcription.completed': {
        const id = currentUserTurnRef.current?.id;
        if (id) {
          upsertTurn({ id, who:'you', text: evt.transcript || '' });
          currentUserTurnRef.current = null;
        } else {
          upsertTurn({ id:'you-'+Date.now(), who:'you', text: evt.transcript || '' });
        }
        break;
      }

      case 'response.created': {
        const id = 'ai-' + Date.now();
        currentAiTurnRef.current = { id, who:'ai', text:'' };
        upsertTurn(currentAiTurnRef.current);
        setSpeaking('ai');
        lastSpeechTickRef.current = { ai: Date.now(), user: 0, who: 'ai' };
        break;
      }

      // Audio output transcript stream. Match both naming conventions:
      // the original GA shape (`response.audio_transcript.*`) and the
      // newer one observed on gpt-realtime-2 (`response.output_audio_-
      // transcript.*`). Listening for both costs nothing and stops the
      // transcript log from rendering as a wall of "…" when the server
      // happens to use the prefix the handler didn't expect.
      //
      // Also resilient now: if a delta arrives before `response.created`
      // populated currentAiTurnRef (out-of-order websocket frame, race
      // on session restart, etc.), we lazy-create the AI turn instead
      // of silently dropping the chunk.
      case 'response.audio_transcript.delta':
      case 'response.output_audio_transcript.delta': {
        let cur = currentAiTurnRef.current;
        if (!cur) {
          cur = { id: 'ai-' + Date.now(), who: 'ai', text: '' };
          currentAiTurnRef.current = cur;
        }
        cur.text = (cur.text || '') + (evt.delta || '');
        upsertTurn(cur);
        break;
      }

      case 'response.audio_transcript.done':
      case 'response.output_audio_transcript.done': {
        let cur = currentAiTurnRef.current;
        if (!cur && evt.transcript) {
          cur = { id: 'ai-' + Date.now(), who: 'ai', text: '' };
          currentAiTurnRef.current = cur;
        }
        if (cur) {
          cur.text = evt.transcript || cur.text;
          upsertTurn(cur);
        }
        break;
      }

      case 'response.done': {
        if (lastSpeechTickRef.current.who === 'ai' && lastSpeechTickRef.current.ai) {
          setAiSpeakingMs(ms => ms + (Date.now() - lastSpeechTickRef.current.ai));
        }
        lastSpeechTickRef.current = { ai: 0, user: 0, who: null };
        if (speaking === 'ai') setSpeaking('idle');
        currentAiTurnRef.current = null;
        break;
      }

      case 'error':
        console.error('[realtime event error]', evt.error);
        addSystem('Error: ' + (evt.error?.message || 'unknown'));
        break;

      default:
        break;
    }
  }, [upsertTurn, addSystem, speaking]);

  /* ── stop / start ─────────────────────────────── */

  function stop(systemMsg) {
    try { window.SFX && SFX.end && SFX.end(); } catch (sfxErr) { console.warn('[stop] SFX skipped:', sfxErr); }
    cleanup();
    setStatus('ended');
    if (systemMsg) addSystem(systemMsg);
    else addSystem('Session ended.');

    // Only count this as a "round together" if the user actually
    // engaged — at least one user turn with real text. Stops accidental
    // start/stop clicks from inflating bond counters.
    const realUserTurns = turnsRef.current.filter(
      t => t.who === 'you' && (t.text || '').trim().length > 4
    ).length;
    if (realUserTurns >= 1) {
      const beforeLevel = bondInfo(getBond(personaKey), personaKey).label;
      const after = incrementBond(personaKey);
      const afterLevel = bondInfo(after, personaKey).label;
      setBondTick(n => n + 1);
      // Bond-up moment: surfaces a celebratory card if the round
      // crossed a threshold (Acquaintance → Sparring Partner, etc.).
      if (beforeLevel !== afterLevel) {
        setBondUp({ from: beforeLevel, to: afterLevel, count: after });
      } else {
        setBondUp({ from: null, to: null, count: after });
      }
    } else {
      setBondUp(null);
    }
  }

  const start = useCallback(async ()=>{
    setError('');
    setErrorKind('');
    setRfd('');
    setTurns([]);
    setInterruptCount(0);
    setAiSpeakingMs(0);
    setUserSpeakingMs(0);
    if (recordingUrl) { try { URL.revokeObjectURL(recordingUrl); } catch(e){} }
    setRecordingUrl('');
    setStatus('connecting');
    setConnectStep('Minting session…');

    try {
      // Resume audio context now (we have a user gesture). Crucial on
      // iOS Safari, which won't unlock audio without one.
      const ctx = getAudioCtx();
      if (ctx && ctx.state === 'suspended') { try { await ctx.resume(); } catch(e){} }

      // 1. Mint ephemeral session token via our backend.
      // Server prepends a CHARACTER preamble to the mode prompt so the
      // AI knows who it IS (persona name + archetype + style), who the
      // USER is (first name when signed in), and how many rounds they
      // have together. That's what powers the relationship arc.
      // smartness > 1 triggers a server-side parallel "council" — the
      // function calls Claude/Gemini/Grok/GPT-5 to research the motion
      // before minting the realtime session. Adds 2-6s of latency to
      // the connection but the AI's first speech is dramatically
      // sharper. Show the user what's happening while they wait.
      if (smartness > 1) {
        setConnectStep('Convening AI council (' + smartness + ' brains)…');
      }
      // Attach Firebase ID token so the server can attribute the
      // session to a uid + enforce the 3-lifetime free-tier voice
      // cap (FREE_VOICE_LIFETIME_LIMIT in realtime-session.mjs).
      // Anon callers send no token; the server falls back to the
      // 6/hour/IP rate limit + the client gate at 1 anon session.
      let authHeader = {};
      try {
        if (firebase.auth && firebase.auth().currentUser){
          const tok = await firebase.auth().currentUser.getIdToken();
          if (tok) authHeader = { 'Authorization': 'Bearer ' + tok };
        }
      } catch(e){ /* anon fall-through */ }
      // Examiner-persona override for the empty-motion case. The
      // universal CHARACTER_PREAMBLE on the server tells the AI to
      // open with "what's up{userName}, what are we debating?" — that
      // greeting is wrong for an oral exam. When the user hits
      // Connect with motion blank AND the persona is Dr. Iyer, append
      // a viva-specific opener directive so the model says
      // "What's your name, and what are you preparing for today?"
      // first, then runs a brief 2-3 question exam on whatever the
      // student names. The more-specific persona instruction wins
      // over the universal default in the model's prompt-following.
      const isExaminerOnboarding =
        persona.key === 'examiner' && !String(motion || '').trim();
      const effectivePersonaStyle = isExaminerOnboarding
        ? persona.style + ' VIVA OPENER — your first words this session, EXACTLY: "What\'s your name, and what are you preparing for today?" Then stop and wait. After the student answers, identify the topic from what they said (a chapter, a concept, a paper, a viva subject) and run a brief 2-3 question oral exam on it. Do NOT use the debate greeting; do NOT ask "what are we debating today."'
        : persona.style;
      const mintRes = await fetch('/api/realtime-session', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', ...authHeader },
        body: JSON.stringify({
          mode, motion, side, format: 'APDA',
          voice: persona.voice,
          personaName: persona.name,
          personaArchetype: persona.archetype,
          personaStyle: effectivePersonaStyle,
          userName: userFirstName,
          bondCount,
          smartness,
        }),
      });
      if (!mintRes.ok) {
        const raw = await mintRes.text().catch(()=> '');
        let body = {}; try { body = JSON.parse(raw); } catch(e){}
        if (mintRes.status === 429) {
          throw new Error('Rate limit hit. 6 sessions per hour. Try again soon.');
        }
        // Server says the signed-in user has hit their free voice cap.
        // Refresh the gate so the UI swaps to the upgrade card on next
        // render, and surface a kind='upgrade' error so the renderer
        // can branch (we don't have a renderer for that yet — falls
        // through to the error notice for v1).
        if (mintRes.status === 402 && body.upgrade){
          try { await refreshVoiceGate(); } catch(e){}
          const e = new Error(body.error || 'Free voice rounds exhausted. Upgrade to Pro for unlimited voice.');
          e.kind = 'upgrade';
          throw e;
        }
        // OpenAI account is at quota — detected by the upstream message
        // forwarded as body.openai (realtime-session.mjs L605-615 maps
        // OpenAI's {"error":{"message":"You exceeded your current quota..."}}
        // into 502 + body.openai). Tag .kind so the renderer surfaces
        // the typed-mode fallback CTA.
        const upstreamMsg = body.openai || raw;
        if (/exceeded your current quota|insufficient_quota|billing/i.test(upstreamMsg || '')) {
          const e = new Error('Voice AI is temporarily at capacity. Typed mode is fully available.');
          e.kind = 'quota';
          throw e;
        }
        // Show OpenAI's actual error message when we have one — e.g.
        // "model `gpt-realtime-2` does not exist" tells you exactly
        // what to flip OPENAI_REALTIME_MODEL to in Netlify env.
        const friendly = body.openai
          ? body.openai + (body.modelTried ? ' (model tried: ' + body.modelTried + ')' : '')
          : (body.error || raw.slice(0,200) || ('HTTP ' + mintRes.status));
        throw new Error('Could not start session: ' + friendly);
      }
      const session = await mintRes.json();
      const ephemeralKey = session?.client_secret?.value;
      if (!ephemeralKey) throw new Error('Session response missing client_secret.');
      setNegotiatedModel(session.model || '');
      setNegotiatedEndpoint(session.endpoint || '');

      setConnectStep('Requesting microphone…');

      // 2. WebRTC peer connection
      const pc = new RTCPeerConnection();
      pcRef.current = pc;

      // Remote audio sink
      const audioEl = document.createElement('audio');
      audioEl.autoplay = true;
      audioEl.playsInline = true;
      audioEl.playbackRate = playbackRate; // honor whatever the user set
      document.body.appendChild(audioEl);
      audioElRef.current = audioEl;
      pc.ontrack = (evt) => {
        if (evt.streams && evt.streams[0]) {
          audioEl.srcObject = evt.streams[0];
          // Tap the AI stream for the orb visualizer + recording mix.
          try {
            const ctx2 = getAudioCtx();
            if (ctx2) {
              const src = ctx2.createMediaStreamSource(evt.streams[0]);
              const an = ctx2.createAnalyser();
              an.fftSize = 512;
              an.smoothingTimeConstant = 0.7;
              src.connect(an);
              aiAnalyserRef.current = an;
              aiBufRef.current = new Uint8Array(an.frequencyBinCount);
              // Also feed the recording mix bus if it was set up.
              if (pc._mixDest) {
                try {
                  const recSrc = ctx2.createMediaStreamSource(evt.streams[0]);
                  recSrc.connect(pc._mixDest);
                } catch(e){ console.warn('[rec] AI tap failed:', e); }
              }
            }
          } catch(e){ console.warn('[orb] AI analyser tap failed:', e); }
        }
      };

      // Local mic
      let stream;
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true },
        });
      } catch(e) {
        throw new Error('Microphone permission denied. Allow mic access in your browser settings, then reload.');
      }
      localStreamRef.current = stream;
      stream.getTracks().forEach(t => pc.addTrack(t, stream));

      // Tap mic for level meter + orb (user-side amplitude).
      try {
        const ctx2 = getAudioCtx();
        if (ctx2) {
          const src = ctx2.createMediaStreamSource(stream);
          const an = ctx2.createAnalyser();
          an.fftSize = 512;
          an.smoothingTimeConstant = 0.6;
          src.connect(an);
          userAnalyserRef.current = an;
          userBufRef.current = new Uint8Array(an.frequencyBinCount);
        }
      } catch(e){ console.warn('[orb] mic analyser tap failed:', e); }

      // Recording: mix both sides into a single MediaStream and feed
      // MediaRecorder. Best-effort — if the browser doesn't support
      // the chosen mimeType, fall back to default. AI track is added
      // when pc.ontrack fires (below); user track is wired now.
      try {
        const ctxR = getAudioCtx();
        if (ctxR && typeof MediaRecorder !== 'undefined') {
          const mixDest = ctxR.createMediaStreamDestination();
          const userSrc = ctxR.createMediaStreamSource(stream);
          userSrc.connect(mixDest);
          // Stash the destination on the PC so ontrack can connect the
          // AI source to the same mix bus.
          pc._mixDest = mixDest;
          pc._mixCtx = ctxR;
          // Pick a widely-supported container — webm/opus on Chrome,
          // mp4 on Safari (16+).
          let mime = '';
          if (MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported('audio/webm;codecs=opus')) mime = 'audio/webm;codecs=opus';
          else if (MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported('audio/mp4')) mime = 'audio/mp4';
          const recOpts = mime ? { mimeType: mime } : {};
          const rec = new MediaRecorder(mixDest.stream, recOpts);
          recordedChunksRef.current = [];
          rec.ondataavailable = (ev) => {
            if (ev.data && ev.data.size > 0) recordedChunksRef.current.push(ev.data);
          };
          rec.onstop = () => {
            try {
              const blobMime = (mime || 'audio/webm').split(';')[0];
              const blob = new Blob(recordedChunksRef.current, { type: blobMime });
              const url = URL.createObjectURL(blob);
              setRecordingUrl(url);
              setRecordingExt(blobMime.includes('mp4') ? 'm4a' : 'webm');
            } catch(e){ console.warn('[rec] finalize failed:', e); }
          };
          rec.start(1000); // emit a chunk per second so we don't lose much on crash
          recorderRef.current = rec;
        }
      } catch(e){ console.warn('[rec] setup failed:', e); }

      // Data channel for events
      const dc = pc.createDataChannel('oai-events');
      dcRef.current = dc;
      dc.onmessage = (e) => {
        try { handleEvent(JSON.parse(e.data)); }
        catch(err) { console.warn('[dc parse]', err); }
      };
      dc.onopen = () => {
        // Two send-paths once the data channel opens:
        //
        // 1. session.update — pushes the FULL session config
        //    (instructions, voice, turn_detection, transcription).
        //    This is the safety net for when the server minted the
        //    session with a minimal body (the GA endpoint may not
        //    accept all the config inline; sending it as an event
        //    after connect is the documented pattern).
        // 2. response.create — kicks off the opening greeting so
        //    there's no awkward dead air on session start.
        try {
          // GA Realtime session.update shape:
          //  - session MUST include `type: 'realtime'` (the discriminator)
          //  - `modalities` was renamed to `output_modalities`
          //  - turn_detection still lives at session.turn_detection
          //  - input_audio_transcription is now session.audio.input.transcription
          // GA Realtime moved turn_detection INSIDE session.audio.input
          // (it used to be a top-level session field on the beta API).
          // Without this, OpenAI 400s with "Unknown parameter:
          // 'session.turn_detection'" and the user's speech stops
          // interrupting the AI mid-sentence (the killer feature).
          dc.send(JSON.stringify({
            type: 'session.update',
            session: {
              type: 'realtime',
              output_modalities: ['audio'],
              audio: {
                input: {
                  // language:'en' kills the most famous Whisper failure mode:
                  // on silence or low-energy noise, whisper-1 with no language
                  // hint hallucinates "Sampai jumpa di video selanjutnya" and
                  // similar Indonesian/Spanish YouTube outro phrases (the
                  // training set was full of them). Pinning English cuts that
                  // off. Multilingual users on the Counter extension's Hindi
                  // viva path already set their own aiLanguage upstream — this
                  // default only applies to the standard English-debate flow.
                  transcription: { model: 'whisper-1', language: 'en' },
                  turn_detection: {
                    type: 'server_vad',
                    threshold: 0.5,
                    prefix_padding_ms: 300,
                    silence_duration_ms: 500,
                    create_response: true,
                  },
                },
                output: { voice: persona.voice },
              },
            },
          }));
        } catch(e){ console.warn('[dc] session.update send failed:', e); }

        try {
          const nameSuffix = userFirstName ? (', ' + userFirstName) : '';
          // Casual, low-energy openers. The CHARACTER preamble already
          // bans "Absolutely", "Let's get into it", etc. — we restate
          // the no-enthusiasm rule here because greetings are where the
          // model is most likely to slip into hype-man mode.
          const greetingInstructions = motion.trim()
            ? `Open in character. Under 8 seconds. Name the motion in one short clean line, name your side, then say "whenever you're ready${nameSuffix}". Do NOT say "Absolutely", "Let's get into it", "Sure", or any enthusiastic interjection. Dry and direct.`
            : `Open with exactly this line, in your character's voice and dry register: "what's up${nameSuffix}, what are we debating?" Then stop. Do not suggest motions. Do not list options. Do not say "Absolutely" or any enthusiastic filler. One short line, then silence.`;
          // GA Realtime response.create dropped `modalities` (it's
          // inherited from session.output_modalities now). Just send
          // instructions.
          dc.send(JSON.stringify({
            type: 'response.create',
            response: { instructions: greetingInstructions },
          }));
        } catch(e){ console.warn('[dc] greeting send failed:', e); }
      };

      setConnectStep('Negotiating with OpenAI…');

      // 3. SDP offer/answer
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);

      // The server tells us where to POST the SDP and which headers to
      // include — different between the GA Realtime API
      // (POST /v1/realtime/calls, no extra headers) and the legacy beta
      // (POST /v1/realtime?model=..., needs OpenAI-Beta header). Trust
      // the server so we never have to guess from the model name.
      const sdpUrl = session.sdpUrl
        || 'https://api.openai.com/v1/realtime/calls';
      const extraSdpHeaders = session.sdpHeaders || {};
      const sdpRes = await fetch(sdpUrl, {
        method: 'POST',
        body: offer.sdp,
        headers: {
          'Authorization': 'Bearer ' + ephemeralKey,
          'Content-Type': 'application/sdp',
          ...extraSdpHeaders,
        },
      });
      if (!sdpRes.ok) {
        const detail = await sdpRes.text().catch(()=> '');
        // OpenAI account is at quota (different from our per-IP rate limit
        // which 429s on the mint endpoint). Tag the error so the renderer
        // can surface the typed-mode fallback CTA instead of dumping raw
        // JSON onto the page. Common 429 body shape:
        //   {"error":{"message":"You exceeded your current quota..."}}
        const isQuota = sdpRes.status === 429
          || /exceeded your current quota|insufficient_quota|billing/i.test(detail);
        if (isQuota) {
          const e = new Error('Voice AI is temporarily at capacity. Typed mode is fully available.');
          e.kind = 'quota';
          throw e;
        }
        throw new Error('OpenAI handshake failed (' + sdpRes.status + '). ' + detail.slice(0,140));
      }
      const answerSdp = await sdpRes.text();
      await pc.setRemoteDescription({ type: 'answer', sdp: answerSdp });
    } catch (e) {
      // Outer catch is intentionally narrow — only WebRTC handshake
      // failures (mint, peer connection, SDP exchange) roll back the
      // session. Earlier regression: a phantom SFX method (SFX.start)
      // threw inside the post-connection setup and the catch tore down
      // a successfully-established live session as if the connection
      // itself had failed. Post-connection code now lives below the
      // try/catch so it can't trigger a false rollback.
      console.error('[start] failed:', e);
      setError(e.message || String(e));
      setErrorKind(e.kind || '');
      setStatus('idle');
      cleanup();
      return;
    }

    // 4. Live! WebRTC is established. Past this point, nothing should
    //    be allowed to roll the session back — non-critical errors
    //    (telemetry, UI chimes, gate refresh) are swallowed locally
    //    rather than thrown.
    startedAtRef.current = Date.now();
    tickRef.current = setInterval(()=>{
      const t = (Date.now() - startedAtRef.current) / 1000;
      setElapsed(t);
      if (t >= SESSION_HARD_CAP_SEC) {
        stop('Session ended (8-minute cap reached).');
      }
    }, 250);

    // Mic level poll — drives the 5-bar meter under the orb.
    micPollRef.current = setInterval(()=>{
      const an = userAnalyserRef.current, buf = userBufRef.current;
      if (!an || !buf) return;
      an.getByteFrequencyData(buf);
      let sum = 0; for (let i = 0; i < buf.length; i++) sum += buf[i];
      const avg = sum / buf.length / 255; // 0-1
      const lit = Math.max(0, Math.min(5, Math.round(avg * 8)));
      setMicBars([0,1,2,3,4].map(i => i < lit ? 1 : 0));
    }, 90);

    setStatus('live');
    try { window.SFX && SFX.start && SFX.start(); } catch (sfxErr) { console.warn('[start] SFX chime skipped:', sfxErr); }
    addSystem('Live. Speak whenever. Interrupting the AI is the whole point.');
    // Voice usage counter — incremented client-side on successful
    // session start so the gate UI updates immediately. Anon goes to
    // localStorage; signed-in is server-truth (incremented by
    // realtime-session.mjs on the next request) so we just refresh
    // the gate to pull the post-mint count from Firestore.
    try {
      if (firebase.auth && firebase.auth().currentUser){
        refreshVoiceGate();
      } else {
        bumpAnonUsed();
        refreshVoiceGate();
      }
    } catch(e){ console.warn('[start] gate refresh skipped:', e); }
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [mode, motion, persona, side, userFirstName, bondCount, addSystem, handleEvent, cleanup]);

  /* ── Orb bootstrap (after canvas mounts) ──────── */

  // Setup orb. Synthetic 'preparing to debate you' levels — a slow
  // breath baseline plus a soft thought-pulse every few seconds so the
  // orb reads as 'alive but waiting'. Drives the same startOrbAnimation
  // so the visual language is identical to the live round.
  useEffect(()=>{
    if (status !== 'idle') return;
    const canvas = setupOrbCanvasRef.current;
    if (!canvas) return;
    const startedAt = Date.now();
    const fakeUserSpeakingRef = { current: false };
    const getLevels = () => {
      const t = (Date.now() - startedAt) / 1000;
      // Long breath at ~0.18Hz (5.5s cycle) so it's clearly alive
      // but never frantic. Plus a brief thought-pulse every ~3.5s
      // — Gaussian envelope so it eases in/out.
      const breath = 0.06 + Math.sin(t * 1.1) * 0.035;
      const phase = (t % 3.5) - 1.4;
      const pulse = Math.exp(-(phase * phase) / 0.18) * 0.13;
      return { ai: Math.max(0, breath + pulse), user: 0 };
    };
    setupOrbStopRef.current = startOrbAnimation(canvas, getLevels, fakeUserSpeakingRef);
    return () => {
      if (setupOrbStopRef.current) { try { setupOrbStopRef.current(); } catch(e){} setupOrbStopRef.current = null; }
    };
  }, [status]);

  useEffect(()=>{
    if (status !== 'live') return;
    const canvas = orbCanvasRef.current;
    if (!canvas) return;
    const getLevels = () => {
      let ai = 0, user = 0;
      const aA = aiAnalyserRef.current, aB = aiBufRef.current;
      if (aA && aB) {
        aA.getByteFrequencyData(aB);
        let s = 0; for (let i = 0; i < aB.length; i++) s += aB[i];
        ai = Math.min(1, (s / aB.length / 255) * 1.6);
      }
      const uA = userAnalyserRef.current, uB = userBufRef.current;
      if (uA && uB) {
        uA.getByteFrequencyData(uB);
        let s = 0; for (let i = 0; i < uB.length; i++) s += uB[i];
        user = Math.min(1, (s / uB.length / 255) * 1.8);
      }
      return { ai, user };
    };
    orbStopRef.current = startOrbAnimation(canvas, getLevels, isUserSpeakingRef);
    return () => {
      if (orbStopRef.current) { orbStopRef.current(); orbStopRef.current = null; }
    };
  }, [status]);

  /* ── RFD generation ───────────────────────────── */

  const generateRFD = useCallback(async ()=>{
    setRfdLoading(true);
    setRfd('');
    try {
      const transcriptText = turnsRef.current
        .filter(t => t.who === 'you' || t.who === 'ai')
        .map(t => (t.who === 'you' ? 'YOU' : 'AI') + ': ' + (t.text || '').trim() + (t.interrupted ? ' [interrupted]' : ''))
        .join('\n\n');
      const modeLabel = MODES.find(m => m.key === mode)?.title || mode;
      const sys = `You are a debate judge giving a Reason for Decision after a live voice debate. Mode: ${modeLabel}. Motion: "${motion}". Side the user took: ${side === 'gov' ? 'Government' : 'Opposition'}.

Format the RFD exactly as:

DECISION
(one line — who would win on the flow if this were a competitive round)

BEST MOMENT
(1-2 sentences — name the specific exchange and why it landed)

COSTLIEST MOMENT
(1-2 sentences — name the specific exchange and why it cost ground)

TWO FIXES FOR NEXT ROUND
1. ...
2. ...

Tone: varsity-debater register. Specific to the actual exchange — quote the user's claim back at them when relevant. No throat-clearing. No em-dashes. No generic coaching. If the user only spoke briefly, say so and base feedback on what's there.`;
      const user = 'TRANSCRIPT:\n\n' + transcriptText;

      const res = await fetch('/api/openai-chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'gpt-4o-mini',
          system: sys,
          messages: [{ role: 'user', content: user }],
          stream: false,
        }),
      });
      if (!res.ok) throw new Error('RFD ' + res.status);
      const data = await res.json();
      const text = data?.choices?.[0]?.message?.content
        || data?.message?.content
        || data?.text
        || '';
      setRfd(text || '(No RFD returned.)');
    } catch (e) {
      setRfd('Could not generate RFD: ' + e.message);
    } finally {
      setRfdLoading(false);
    }
  }, [mode, motion, side]);

  /* ── Auto-scroll transcript ───────────────────── */

  const transcriptRef = useRef(null);
  useEffect(()=>{
    const node = transcriptRef.current;
    if (node) node.scrollTop = node.scrollHeight;
  }, [turns]);

  /* ── Derived ──────────────────────────────────── */

  const isLive = status === 'live';
  const isConnecting = status === 'connecting';
  const isEnded = status === 'ended';

  const totalSpokenMs = aiSpeakingMs + userSpeakingMs;
  const aiSharePct = totalSpokenMs > 0 ? Math.round((aiSpeakingMs / totalSpokenMs) * 100) : 50;
  const userSharePct = 100 - aiSharePct;

  const stageClass = 'stage' + (speaking === 'user' ? ' user' : '');

  /* ── Render ───────────────────────────────────── */

  return el('div', { className:'shell' },
    // Header
    el('div', { className:'head' },
      el('div', { className:'brand' },

        el('div', { className:'step' },

            // Category chips: click a tag to reroll a random motion from

            (function(){
              const cats = [];
              const seen = {};
              SAMPLE_MOTIONS.forEach(m => {
                if (!seen[m.tag]) { seen[m.tag] = true; cats.push(m.tag); }
              });
              const lastByTag = {};
              const lastAll = { v: null };
              const rollCategory = (tag) => {
                const pool = SAMPLE_MOTIONS.filter(m => m.tag === tag);
                if (pool.length === 0) return;
                let pick;
                if (pool.length === 1) {
                  pick = pool[0];
                } else {
                  do { pick = pool[Math.floor(Math.random() * pool.length)]; }
                  while (lastByTag[tag] && pick.text === lastByTag[tag]);
                }
                lastByTag[tag] = pick.text;
                setMotion(pick.text);
              };
              const rollAny = () => {
                let pick;
                if (SAMPLE_MOTIONS.length === 1) pick = SAMPLE_MOTIONS[0];
                else {
                  do { pick = SAMPLE_MOTIONS[Math.floor(Math.random() * SAMPLE_MOTIONS.length)]; }
                  while (lastAll.v && pick.text === lastAll.v);
                }
                lastAll.v = pick.text;
                setMotion(pick.text);
              };
              return el('div', { className:'motion-chips' },
