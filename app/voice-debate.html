<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Live Voice Debate · Debate AI</title>
<meta name="description" content="Live voice debate with full interruption. Cut in mid-speech, take POIs, run cross-ex drills. Powered by OpenAI gpt-realtime-2." />
<meta name="theme-color" content="#0a0a12" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/ui.css">
<script>
(function(){
  try{
    var t=localStorage.getItem('da-theme');
    if(!t || t==='day') t='crimson';
    document.documentElement.setAttribute('data-theme',t);
  }catch(e){
    document.documentElement.setAttribute('data-theme','crimson');
  }
})();
</script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-check-compat.js"></script>
<script defer src="/js/app-check.js"></script>
<script defer src="/js/track.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{min-height:100%;width:100%}
body{
  font-family:'Inter','Segoe UI',system-ui,-apple-system,sans-serif;
  background:#06060c;
  color:#e6e6ee;
  font-size:16px;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  overflow-x:hidden;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;font-size:inherit}
a{color:inherit}
:focus-visible{outline:2px solid #ef4444;outline-offset:2px;border-radius:4px}

/* ── Ambient backdrop ─────────────────────────────── */
.bg{
  position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 10%, rgba(239,68,68,.12) 0%, transparent 60%),
    radial-gradient(ellipse 60% 80% at 80% 90%, rgba(168,85,247,.06) 0%, transparent 60%),
    radial-gradient(ellipse 60% 80% at 20% 80%, rgba(96,165,250,.04) 0%, transparent 60%),
    #06060c;
}
.bg::before{
  content:'';position:absolute;inset:0;
  background-image:
    radial-gradient(circle at 1px 1px, rgba(255,255,255,.025) 1px, transparent 0);
  background-size:32px 32px;
  mask-image:radial-gradient(ellipse 70% 70% at 50% 30%, #000 30%, transparent 80%);
}

.shell{position:relative;z-index:1;max-width:980px;margin:0 auto;padding:22px 18px 80px}

/* ── Header ───────────────────────────────────────── */
.head{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:32px;gap:12px;flex-wrap:wrap;
}
.brand{display:flex;align-items:center;gap:10px;font-weight:800;letter-spacing:-.02em;font-size:1.05rem}
.brand a{text-decoration:none;color:inherit;display:flex;align-items:center;gap:10px}
.brand .logo-mark{
  width:32px;height:32px;border-radius:9px;
  background:linear-gradient(135deg,#ef4444 0%,#7c2d12 100%);
  display:grid;place-items:center;color:#fff;font-weight:900;font-size:.78rem;
  box-shadow:0 4px 16px rgba(239,68,68,.35), inset 0 1px 0 rgba(255,255,255,.15);
}
.beta{
  display:inline-block;font-size:.55rem;letter-spacing:.14em;color:#fca5a5;
  background:rgba(239,68,68,.12);padding:3px 7px;border-radius:4px;
  font-weight:700;text-transform:uppercase;border:1px solid rgba(239,68,68,.2);
}
.back{
  font-size:.78rem;color:#9b9bab;text-decoration:none;
  padding:8px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.07);
  transition:all .15s;
}
.back:hover{background:rgba(255,255,255,.04);color:#e6e6ee;border-color:rgba(255,255,255,.12)}

/* ── Hero ─────────────────────────────────────────── */
.hero{margin-bottom:28px;text-align:center}
.hero h1{
  font-size:clamp(2rem, 5vw, 2.85rem);font-weight:900;letter-spacing:-.035em;
  line-height:1.05;margin-bottom:14px;
  background:linear-gradient(180deg,#fff 0%,#a3a3b3 130%);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
}
.hero h1 .accent{
  background:linear-gradient(135deg,#ef4444 0%,#fb7185 100%);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
}
.hero .lede{
  color:#9b9bab;font-size:1.02rem;line-height:1.55;
  max-width:560px;margin:0 auto;
}
.hero .lede strong{color:#e6e6ee;font-weight:600}
.hero .meta{
  display:inline-flex;align-items:center;gap:8px;margin-top:14px;
  font-size:.7rem;color:#7a7a8a;letter-spacing:.05em;
}
.hero .meta .pip{width:5px;height:5px;border-radius:50%;background:#22c55e;box-shadow:0 0 8px #22c55e;animation:pip 2.4s ease-in-out infinite}
@keyframes pip{0%,100%{opacity:.4}50%{opacity:1}}

/* ── Cards ────────────────────────────────────────── */
.card{
  background:linear-gradient(180deg, rgba(255,255,255,.035) 0%, rgba(255,255,255,.01) 100%);
  border:1px solid rgba(255,255,255,.06);
  border-radius:16px;padding:18px;margin-bottom:14px;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}
.card h3{
  font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;
  color:#7a7a8a;margin-bottom:12px;font-weight:700;
}

/* ── Mode picker ──────────────────────────────────── */
.modes{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}
.mode{
  position:relative;
  padding:14px;border:1px solid rgba(255,255,255,.06);border-radius:12px;
  background:linear-gradient(180deg, rgba(255,255,255,.025) 0%, rgba(0,0,0,.15) 100%);
  text-align:left;transition:all .18s cubic-bezier(.2,.8,.2,1);
  display:flex;flex-direction:column;gap:6px;
  overflow:hidden;
}
.mode::before{
  content:'';position:absolute;inset:0;border-radius:12px;
  background:linear-gradient(135deg, rgba(239,68,68,.12) 0%, transparent 50%);
  opacity:0;transition:opacity .18s;pointer-events:none;
}
.mode:hover{border-color:rgba(239,68,68,.25);transform:translateY(-1px)}
.mode:hover::before{opacity:1}
.mode.on{
  border-color:rgba(239,68,68,.55);
  background:linear-gradient(180deg, rgba(239,68,68,.1) 0%, rgba(239,68,68,.02) 100%);
  box-shadow:0 0 0 1px rgba(239,68,68,.25), 0 8px 24px rgba(239,68,68,.12);
}
.mode.on::before{opacity:1}
.mode .icon{font-size:1.25rem;line-height:1;margin-bottom:4px}
.mode .t{font-size:.88rem;font-weight:700;color:#e6e6ee;letter-spacing:-.005em}
.mode .d{font-size:.72rem;color:#9b9bab;line-height:1.4}
.mode.on .t{color:#fecaca}

/* ── Inputs ───────────────────────────────────────── */
.row{display:flex;gap:10px;flex-wrap:wrap}
.row > *{flex:1;min-width:160px}
input[type=text],select,textarea{
  width:100%;padding:13px 14px;
  border:1px solid rgba(255,255,255,.08);border-radius:11px;
  background:rgba(0,0,0,.35);color:#e6e6ee;
  font-size:.92rem;font-family:inherit;outline:none;
  transition:border-color .15s, box-shadow .15s;
}
input[type=text]:focus,select:focus,textarea:focus{
  border-color:rgba(239,68,68,.55);box-shadow:0 0 0 3px rgba(239,68,68,.1);
}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.chip{
  font-size:.7rem;color:#9b9bab;padding:6px 11px;
  border:1px solid rgba(255,255,255,.08);border-radius:999px;
  background:rgba(0,0,0,.2);transition:all .15s;
}
.chip:hover{border-color:rgba(239,68,68,.4);color:#e6e6ee}

/* ── Side toggle ──────────────────────────────────── */
.side-toggle{
  display:grid;grid-template-columns:1fr 1fr;gap:6px;
  padding:4px;background:rgba(0,0,0,.3);border-radius:11px;
  border:1px solid rgba(255,255,255,.06);
}
.side-toggle button{
  padding:11px 12px;border-radius:8px;font-size:.85rem;font-weight:600;
  color:#9b9bab;transition:all .15s;
}
.side-toggle button.on{background:rgba(239,68,68,.15);color:#fecaca}

/* ── Primary CTA ──────────────────────────────────── */
.cta{
  display:flex;align-items:center;justify-content:center;gap:10px;
  width:100%;padding:18px;
  background:linear-gradient(135deg,#ef4444 0%,#dc2626 100%);
  color:#fff;border-radius:14px;
  font-size:1rem;font-weight:800;letter-spacing:.04em;text-transform:uppercase;
  transition:transform .15s, box-shadow .15s, opacity .15s;
  box-shadow:0 8px 24px rgba(239,68,68,.3), inset 0 1px 0 rgba(255,255,255,.15);
}
.cta:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 12px 32px rgba(239,68,68,.4), inset 0 1px 0 rgba(255,255,255,.15)}
.cta:active:not(:disabled){transform:translateY(0)}
.cta:disabled{opacity:.5;cursor:not-allowed}
.cta.stop{background:linear-gradient(135deg,#3a3a44 0%,#1f1f28 100%);box-shadow:0 6px 18px rgba(0,0,0,.4)}
.cta.ghost{background:transparent;border:1px solid rgba(255,255,255,.12);color:#e6e6ee;box-shadow:none}
.cta.ghost:hover:not(:disabled){background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.2)}
.cta .arrow{font-size:1.1em;line-height:1;display:inline-block;transition:transform .2s}
.cta:hover .arrow{transform:translateX(3px)}

/* ── LIVE: the showpiece ──────────────────────────── */
.stage{
  position:relative;
  display:flex;flex-direction:column;align-items:center;
  padding:40px 18px 28px;
  background:radial-gradient(ellipse 80% 100% at 50% 50%, rgba(239,68,68,.06) 0%, transparent 70%);
  border-radius:18px;margin-bottom:14px;
}
.stage canvas.orb{
  width:280px;height:280px;
  filter:drop-shadow(0 0 40px rgba(239,68,68,.35));
  transition:filter .25s;
}
@media (max-width:600px){.stage canvas.orb{width:230px;height:230px}}
.stage.user canvas.orb{filter:drop-shadow(0 0 40px rgba(34,197,94,.35))}
.stage .label{
  margin-top:18px;font-size:.7rem;letter-spacing:.22em;text-transform:uppercase;
  font-weight:700;color:#9b9bab;
}
.stage .label .who{color:#fca5a5;transition:color .2s}
.stage.user .label .who{color:#86efac}
.stage .timer{
  margin-top:8px;font-family:'JetBrains Mono', monospace;
  font-size:1.4rem;font-weight:600;color:#e6e6ee;letter-spacing:.05em;
  font-variant-numeric:tabular-nums;
}
.stage .timer .total{color:#8a8a9a;font-size:.8rem;margin-left:4px}
.stage .stats{
  display:flex;gap:18px;margin-top:12px;
  font-size:.74rem;color:#a3a3b3;letter-spacing:.05em;font-weight:500;
}
.stage .stats span strong{color:#fff;font-weight:700;font-variant-numeric:tabular-nums}
.stage .hint{
  position:absolute;bottom:14px;left:50%;transform:translateX(-50%);
  font-size:.7rem;color:#8a8a9a;text-align:center;letter-spacing:.04em;
}

/* live controls (speed + model badge) — sit just below the mic meter */
.live-controls{
  margin-top:14px;display:flex;align-items:center;justify-content:center;
  gap:14px;flex-wrap:wrap;font-size:.72rem;color:#a3a3b3;
}
.speed-ctl{
  display:flex;align-items:center;gap:6px;
  padding:4px 8px;border-radius:8px;
  background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.06);
}
.speed-ctl .lbl{letter-spacing:.08em;text-transform:uppercase;font-size:.6rem}
.speed-ctl .val{
  font-family:'JetBrains Mono', monospace;font-size:.72rem;font-weight:600;
  color:#e6e6ee;min-width:32px;text-align:center;font-variant-numeric:tabular-nums;
}
.speed-ctl .spd{
  width:22px;height:22px;border-radius:6px;
  background:rgba(255,255,255,.04);color:#a3a3b3;
  display:grid;place-items:center;font-weight:700;line-height:1;
  transition:all .12s;
}
.speed-ctl .spd:hover{background:rgba(239,68,68,.12);color:#fca5a5}
.model-badge{
  font-family:'JetBrains Mono', monospace;font-size:.62rem;
  padding:4px 8px;border-radius:6px;
  background:rgba(96,165,250,.06);border:1px solid rgba(96,165,250,.18);
  color:#bfdbfe;letter-spacing:.02em;
}

/* mic level meter under the orb */
.miclevel{
  margin-top:16px;display:flex;align-items:center;gap:6px;
  font-size:.68rem;color:#a3a3b3;letter-spacing:.08em;font-weight:600;
}
.miclevel .bars{display:flex;gap:2px}
.miclevel .bar{
  width:3px;height:14px;border-radius:2px;
  background:rgba(34,197,94,.18);
  transition:background .08s, height .08s;
}
.miclevel .bar.on{background:#22c55e;box-shadow:0 0 6px rgba(34,197,94,.4)}

/* ── Transcript ───────────────────────────────────── */
.transcript{
  min-height:240px;max-height:480px;overflow-y:auto;padding:6px 4px;
  scroll-behavior:smooth;
}
.transcript::-webkit-scrollbar{width:6px}
.transcript::-webkit-scrollbar-track{background:transparent}
.transcript::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:3px}
.turn{
  padding:12px 14px;border-radius:11px;margin-bottom:9px;
  font-size:.95rem;line-height:1.55;letter-spacing:-.005em;
  animation:turnIn .25s ease-out;
}
@keyframes turnIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.turn.ai{
  background:linear-gradient(180deg, rgba(239,68,68,.06) 0%, rgba(239,68,68,.02) 100%);
  border-left:3px solid rgba(239,68,68,.5);
}
.turn.you{
  background:linear-gradient(180deg, rgba(34,197,94,.06) 0%, rgba(34,197,94,.02) 100%);
  border-left:3px solid rgba(34,197,94,.5);
}
.turn.system{
  background:rgba(255,255,255,.04);font-size:.74rem;color:#b8b8c8;
  border-left:2px solid rgba(255,255,255,.18);font-style:italic;padding:8px 12px;
}
.turn .label{
  font-size:.62rem;letter-spacing:.16em;text-transform:uppercase;
  font-weight:800;margin-bottom:5px;opacity:.85;
}
.turn.ai .label{color:#fca5a5}
.turn.you .label{color:#86efac}
.turn .interrupted{
  display:inline-block;margin-left:8px;font-size:.55rem;color:#fbbf24;
  background:rgba(251,191,36,.12);padding:2px 6px;border-radius:3px;
  letter-spacing:.08em;animation:flashWarn .6s ease-out;
}
@keyframes flashWarn{0%{background:rgba(251,191,36,.4)}100%{background:rgba(251,191,36,.12)}}

/* ── Notices / errors ─────────────────────────────── */
.notice{padding:13px 15px;border-radius:11px;font-size:.85rem;line-height:1.55;margin-bottom:14px}
.notice.warn{background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.2);color:#fde68a}
.notice.error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#fca5a5}
.notice.info{background:rgba(96,165,250,.06);border:1px solid rgba(96,165,250,.18);color:#bfdbfe}
.notice strong{color:#fff;font-weight:600}

/* ── Connecting state ─────────────────────────────── */
.connecting{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:50px 20px;gap:18px;
}
.spinner{
  width:40px;height:40px;border-radius:50%;
  border:2px solid rgba(239,68,68,.15);border-top-color:#ef4444;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.connecting .step{font-size:.78rem;color:#9b9bab;letter-spacing:.04em}

/* ── End-of-session summary ───────────────────────── */
.summary-grid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:14px;
}
.stat-card{
  padding:14px;border-radius:12px;text-align:center;
  background:linear-gradient(180deg, rgba(255,255,255,.035) 0%, rgba(0,0,0,.15) 100%);
  border:1px solid rgba(255,255,255,.06);
}
.stat-card .v{
  font-family:'JetBrains Mono', monospace;font-size:1.55rem;font-weight:600;
  color:#e6e6ee;letter-spacing:-.01em;font-variant-numeric:tabular-nums;
}
.stat-card .l{font-size:.64rem;color:#a3a3b3;letter-spacing:.14em;text-transform:uppercase;margin-top:4px;font-weight:600}
.talk-bar{
  height:8px;border-radius:4px;background:rgba(34,197,94,.25);
  position:relative;overflow:hidden;margin:6px 0 4px;
}
.talk-bar .ai-fill{
  position:absolute;right:0;top:0;bottom:0;
  background:rgba(239,68,68,.6);transition:width .6s cubic-bezier(.2,.8,.2,1);
}
.talk-bar-legend{display:flex;justify-content:space-between;font-size:.66rem;color:#a3a3b3;letter-spacing:.08em;font-weight:600}

.rfd-card{
  background:linear-gradient(180deg, rgba(168,85,247,.07) 0%, rgba(168,85,247,.02) 100%);
  border:1px solid rgba(168,85,247,.22);
  border-radius:14px;padding:20px;
  white-space:pre-wrap;line-height:1.65;font-size:.92rem;
  margin-top:14px;
}
.rfd-card h3{
  color:#c4b5fd;font-size:.68rem;letter-spacing:.18em;text-transform:uppercase;
  margin-bottom:14px;font-weight:700;
}

/* ── Personalities (gamified character picker) ───── */
.persona-grid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px;
}
.persona{
  position:relative;text-align:left;padding:14px;
  border:1px solid rgba(255,255,255,.06);border-radius:12px;
  background:linear-gradient(180deg, rgba(255,255,255,.025) 0%, rgba(0,0,0,.15) 100%);
  transition:all .18s cubic-bezier(.2,.8,.2,1);
  display:flex;gap:12px;align-items:flex-start;
  overflow:hidden;
}
.persona::before{
  content:'';position:absolute;inset:0;border-radius:12px;
  background:linear-gradient(135deg, var(--accent-glow, rgba(239,68,68,.15)) 0%, transparent 60%);
  opacity:0;transition:opacity .18s;pointer-events:none;
}
.persona:hover{border-color:var(--accent-border, rgba(239,68,68,.3));transform:translateY(-1px)}
.persona:hover::before{opacity:1}
.persona.on{
  border-color:var(--accent-strong, rgba(239,68,68,.6));
  background:linear-gradient(180deg, rgba(239,68,68,.08) 0%, rgba(239,68,68,.015) 100%);
  box-shadow:0 0 0 1px var(--accent-border, rgba(239,68,68,.3)), 0 8px 24px rgba(0,0,0,.25);
}
.persona.on::before{opacity:1}
.persona .avatar{
  width:46px;height:46px;flex-shrink:0;border-radius:50%;
  display:grid;place-items:center;
  font-weight:900;font-size:1.05rem;color:#fff;letter-spacing:-.02em;
  background:var(--avatar-bg, linear-gradient(135deg,#ef4444,#7c2d12));
  box-shadow:0 4px 12px rgba(0,0,0,.3), inset 0 1px 0 rgba(255,255,255,.18);
}
.persona .body{flex:1;min-width:0}
.persona .name-row{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
.persona .name{font-size:.95rem;font-weight:700;color:#e6e6ee;letter-spacing:-.01em}
.persona .arch{font-size:.65rem;color:#7a7a8a;text-transform:uppercase;letter-spacing:.12em;font-weight:600}
.persona .bio{font-size:.74rem;color:#9b9bab;line-height:1.45;margin-top:5px}
.persona .bond{
  display:flex;align-items:center;gap:6px;margin-top:8px;
  font-size:.65rem;color:#7a7a8a;letter-spacing:.06em;font-weight:600;
}
.persona .bond .stars{color:#fbbf24;letter-spacing:.05em;font-size:.7rem}
.persona .bond .level{color:#c4b5fd}
.persona .bond .rounds{color:#7a7a8a;font-variant-numeric:tabular-nums}

.bond-up-card{
  background:linear-gradient(135deg, rgba(251,191,36,.1) 0%, rgba(168,85,247,.08) 100%);
  border:1px solid rgba(251,191,36,.25);
  border-radius:12px;padding:14px 16px;margin-bottom:14px;
  display:flex;align-items:center;gap:14px;
  animation:bondPulse .8s ease-out;
}
@keyframes bondPulse{0%{transform:scale(.96);opacity:0}100%{transform:scale(1);opacity:1}}
.bond-up-card .b-avatar{
  width:42px;height:42px;flex-shrink:0;border-radius:50%;
  display:grid;place-items:center;color:#fff;font-weight:900;font-size:1rem;
  background:var(--avatar-bg, linear-gradient(135deg,#ef4444,#7c2d12));
}
.bond-up-card .msg{flex:1}
.bond-up-card .msg .t{font-size:.78rem;color:#fde68a;font-weight:700;letter-spacing:.04em}
.bond-up-card .msg .s{font-size:.7rem;color:#9b9bab;margin-top:2px}

/* ── Footer ───────────────────────────────────────── */
.foot{
  margin-top:32px;padding-top:20px;
  border-top:1px solid rgba(255,255,255,.06);
  text-align:center;font-size:.7rem;color:#8a8a9a;line-height:1.6;
}
.foot a{color:#bfbfcf;text-decoration:underline;text-decoration-color:rgba(255,255,255,.32);text-underline-offset:2px}

/* ──────────────────────────────────────────────────────
   CLEAN-UP OVERRIDES
   Strip the heavy decoration the first pass leaned on (multi-layer
   gradients, glow shadows, animated pip, gradient text). Single
   accent color, flat surfaces, generous whitespace. Leaves the orb
   alone — that's the moment of magic.
   ────────────────────────────────────────────────────── */
/* Restore the warm crimson brand backdrop — subtle radial glow at
   top so the page reads as part of the same dark/red world as
   /landing and /debate-ai, not a separate cold-blue island. */
body{background:#0a0509}
.bg{
  display:block;position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 90% 60% at 50% 0%, rgba(239,68,68,.10) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 50% 100%, rgba(127,29,29,.08) 0%, transparent 70%),
    #0a0509;
}
.bg::before{display:none}

.shell{max-width:760px;padding:18px 20px 64px}
.head{margin-bottom:22px}
.brand .logo-mark{
  background:#ef4444;box-shadow:none;
  width:28px;height:28px;border-radius:7px;font-size:.72rem;
}
.brand{font-size:.95rem}
.beta{font-weight:600;border:none;background:rgba(239,68,68,.1);color:#fca5a5;letter-spacing:.1em}
.back{padding:7px 11px;font-size:.74rem;border-radius:8px}

/* Hero — quieter, no gradient text, no animated pip */
.hero{margin-bottom:24px;text-align:left}
.hero h1{
  font-size:1.75rem;font-weight:700;letter-spacing:-.02em;line-height:1.15;
  color:#f0f0f5;background:none;-webkit-text-fill-color:initial;margin-bottom:8px;
}
.hero h1 .accent{color:#ef4444;background:none;-webkit-text-fill-color:initial}
.hero .lede{font-size:.92rem;line-height:1.55;color:#9b9bab;max-width:none;margin:0}
.hero .meta{display:none}

/* Cards — flat, single border, no backdrop blur */
.card{
  background:rgba(255,255,255,.025);
  border:1px solid rgba(255,255,255,.06);
  border-radius:10px;padding:16px;margin-bottom:10px;
  backdrop-filter:none;-webkit-backdrop-filter:none;
  box-shadow:none;
}
.card h3{
  font-size:.66rem;letter-spacing:.14em;font-weight:600;
  color:#7a7a8a;margin-bottom:10px;
}

/* Mode tiles — no emoji icons (we hide them via JSX swap below),
   no internal gradient, simple selected state */
.modes{grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:8px}
.mode{
  padding:11px 12px;border-radius:8px;
  background:rgba(255,255,255,.02);
  border:1px solid rgba(255,255,255,.06);
}
.mode::before{display:none}
.mode:hover{transform:none;border-color:rgba(239,68,68,.22);background:rgba(239,68,68,.04)}
.mode.on{
  border-color:#ef4444;background:rgba(239,68,68,.08);
  box-shadow:none;
}
.mode .icon{display:none} /* drop emojis */
.mode .t{font-size:.82rem;font-weight:600}
.mode .d{font-size:.7rem;line-height:1.4;color:#8a8a9a}

/* Persona picker — compact card: avatar + name + bond on one row */
.persona-grid{grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:6px}
.persona{
  padding:10px 12px;border-radius:8px;
  background:rgba(255,255,255,.02);
  border:1px solid rgba(255,255,255,.06);
  gap:11px;
}
.persona::before{display:none}
.persona:hover{transform:none;border-color:rgba(239,68,68,.22);background:rgba(239,68,68,.04)}
.persona.on{
  border-color:#ef4444;background:rgba(239,68,68,.08);
  box-shadow:none;
}
.persona .avatar{
  width:36px;height:36px;border-radius:50%;
  font-size:.78rem;letter-spacing:0;
  background:#3a3a44 !important;color:#e6e6ee;
  box-shadow:none;
}
.persona.on .avatar{background:#ef4444 !important;color:#fff}
.persona .name-row{gap:6px;align-items:center}
.persona .name{font-size:.85rem;font-weight:600}
.persona .arch{font-size:.6rem;letter-spacing:.08em;color:#7a7a8a}
.persona .bio{display:none} /* tooltip via title attr instead — see JSX */
.persona .bond{margin-top:4px;font-size:.6rem;letter-spacing:.04em}
.persona .bond .stars{font-size:.65rem;letter-spacing:.04em}

/* Inputs — quieter focus state */
input[type=text],select,textarea{
  padding:11px 12px;border-radius:8px;font-size:.88rem;
  background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.08);
}
input[type=text]:focus,select:focus,textarea:focus{
  border-color:rgba(239,68,68,.5);box-shadow:none;
}
.chip{padding:5px 10px;font-size:.68rem;border-radius:6px}
.side-toggle{padding:3px}
.side-toggle button{padding:9px 12px;font-size:.8rem;font-weight:500}

/* CTA — keep the punch but drop the layered shadows */
.cta{
  padding:15px;border-radius:10px;font-size:.88rem;letter-spacing:.06em;
  background:#ef4444;
  box-shadow:none;
  transition:background .15s,transform .1s;
}
.cta:hover:not(:disabled){transform:none;background:#dc2626;box-shadow:none}
.cta.stop{background:#3a3a44}
.cta.stop:hover:not(:disabled){background:#525258;box-shadow:none}
.cta.ghost{background:transparent;border:1px solid rgba(255,255,255,.12)}

/* Live stage — keep the orb prominent, simplify everything else */
.stage{padding:28px 18px 22px;background:none}
.stage canvas.orb{filter:drop-shadow(0 0 24px rgba(239,68,68,.28))}
.stage.user canvas.orb{filter:drop-shadow(0 0 24px rgba(34,197,94,.28))}
.stage .label{margin-top:14px;font-size:.66rem;letter-spacing:.18em}
.stage .timer{margin-top:6px;font-size:1.2rem}
.stage .timer .total{font-size:.72rem}
.stage .stats{margin-top:10px;font-size:.66rem;gap:14px}
.miclevel{margin-top:12px}
.live-controls{margin-top:12px;gap:10px;font-size:.66rem}
.speed-ctl{padding:3px 8px}
.model-badge{font-size:.6rem;padding:3px 7px;background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.1);color:#a3a3b3}

/* Transcript turns — flatter borders */
.turn{border-radius:8px;font-size:.9rem}
.turn.ai{background:rgba(239,68,68,.045)}
.turn.you{background:rgba(34,197,94,.045)}

/* Footer — add an "about" line about the OpenAI-only architecture */
.foot{margin-top:24px;padding-top:18px}
.foot .about{
  font-size:.72rem;color:#a3a3b3;line-height:1.5;
  max-width:520px;margin:0 auto 10px;text-align:center;
}

/* ──────────────────────────────────────────────────────
   PROFESSIONAL REDESIGN (per spec)
   Two-column setup, numbered steps, sticky session summary,
   segmented controls, compact opponent picker.
   ────────────────────────────────────────────────────── */

/* Global topbar is position:fixed at top:0 height:52px — pad above
   it so the page's own header isn't hidden behind it. */
.shell{max-width:1080px;padding:78px 24px 80px}

/* The page's local .head was duplicating the topbar's branding, which
   meant the badge+logo got clipped behind the fixed topbar AND read
   redundantly. Drop the local brand entirely; keep only the
   "back to text mode" link, right-aligned. */
.head{
  margin-bottom:18px;justify-content:flex-end;
}
.head .brand{display:none}

/* Hero — left headline, right status pill */
.hero{
  display:grid;grid-template-columns:1fr auto;align-items:center;
  gap:18px;margin-bottom:32px;
}
.hero h1{
  font-size:clamp(1.75rem, 3.4vw, 2.5rem);font-weight:700;
  letter-spacing:-.02em;line-height:1.1;color:#f0f0f5;margin-bottom:6px;
}
.hero h1 .accent{color:#ef4444}
.hero .lede{
  font-size:.95rem;line-height:1.5;color:#9b9bab;max-width:520px;margin:0;
}
.hero-status{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;border-radius:10px;
  background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.07);
}
.hero-status .pip{
  width:7px;height:7px;border-radius:50%;background:#22c55e;
  box-shadow:0 0 6px rgba(34,197,94,.5);
}
.hero-status .meta{font-size:.72rem;color:#9b9bab;line-height:1.45}
.hero-status .meta strong{color:#e6e6ee;font-weight:600}

@media (max-width:760px){
  .hero{grid-template-columns:1fr}
  .hero-status{justify-self:start}
}

/* Two-column setup grid */
.setup-grid{
  display:grid;grid-template-columns:minmax(0,1fr) 340px;gap:20px;
  align-items:start;
}
@media (max-width:920px){
  .setup-grid{grid-template-columns:minmax(0,1fr)}
}

/* Numbered step heading */
.step{margin-bottom:18px}
.step-h{
  display:flex;align-items:center;gap:10px;margin-bottom:10px;
}
.step-num{
  width:24px;height:24px;border-radius:50%;
  display:grid;place-items:center;
  background:rgba(239,68,68,.12);color:#fca5a5;
  font-size:.72rem;font-weight:700;letter-spacing:0;
  border:1px solid rgba(239,68,68,.2);
}
.step-title{
  font-size:.92rem;font-weight:600;color:#f0f0f5;
  letter-spacing:-.005em;
}
.step-help{
  font-size:.74rem;color:#8a8a9a;margin-bottom:10px;line-height:1.45;
  margin-left:34px;
}
.step-body{margin-left:0}

/* Step cards — flatter, premium */
.step .card{
  margin:0;background:rgba(255,255,255,.02);
  border:1px solid rgba(255,255,255,.06);
  border-radius:12px;padding:14px;
}
.step .card h3{display:none}

/* Mode tiles — uniform 2x2 grid on desktop */
.modes{
  grid-template-columns:repeat(2, minmax(0, 1fr));gap:8px;
}
@media (max-width:520px){.modes{grid-template-columns:1fr}}
.mode{
  padding:12px 14px;border-radius:10px;
  background:rgba(255,255,255,.022);border:1px solid rgba(255,255,255,.06);
  min-height:64px;
}
.mode .t{font-size:.85rem;font-weight:600;letter-spacing:-.005em;color:#e6e6ee}
.mode .d{font-size:.72rem;line-height:1.4;color:#8a8a9a;margin-top:2px}
.mode.on{
  border-color:rgba(239,68,68,.55);
  background:rgba(239,68,68,.06);
}
.mode.on .t{color:#fff}

/* Side segmented control — polished, not alarm-red */
.side-seg{
  display:grid;grid-template-columns:1fr 1fr;gap:0;
  padding:0;border-radius:10px;
  background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.08);
  overflow:hidden;
}
.side-seg button{
  padding:12px 14px;font-size:.86rem;font-weight:500;
  color:#9b9bab;background:transparent;border:none;
  transition:all .15s;letter-spacing:0;
}
.side-seg button[aria-pressed="true"]{
  background:rgba(239,68,68,.1);color:#fde2e2;font-weight:600;
}
.side-seg button:hover:not([aria-pressed="true"]){
  background:rgba(255,255,255,.03);color:#e6e6ee;
}

/* Right column — sticky session summary + Start */
.summary-col{
  position:sticky;top:24px;
  display:flex;flex-direction:column;gap:14px;
}
@media (max-width:920px){.summary-col{position:static}}
.summary-card{
  background:linear-gradient(180deg, rgba(239,68,68,.04) 0%, rgba(255,255,255,.02) 100%);
  border:1px solid rgba(239,68,68,.18);
  border-radius:12px;padding:18px;
}
.summary-card .ttl{
  font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;
  color:#9b9bab;font-weight:600;margin-bottom:14px;
}
.summary-card .row{
  display:grid;grid-template-columns:90px 1fr;
  padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05);
  font-size:.84rem;line-height:1.4;align-items:start;gap:10px;
}
.summary-card .row:last-of-type{border-bottom:none}
.summary-card .row .k{color:#8a8a9a;font-size:.78rem;letter-spacing:.02em}
.summary-card .row .v{color:#e6e6ee;font-weight:500;word-break:break-word}
.summary-card .row .v.muted{color:#7a7a8a;font-style:italic;font-weight:400}

.summary-cta{
  display:flex;flex-direction:column;gap:8px;
}
.summary-cta .cta{
  width:100%;padding:16px 18px;font-size:.94rem;font-weight:700;
  letter-spacing:.04em;border-radius:11px;
  background:#ef4444;
  box-shadow:0 6px 16px rgba(239,68,68,.22);
}
.summary-cta .cta:hover:not(:disabled){background:#dc2626;transform:translateY(-1px)}
.summary-cta .helper{
  font-size:.72rem;color:#7a7a8a;text-align:center;line-height:1.45;
}

/* Compact opponent picker (right column) */
.opps{display:flex;flex-direction:column;gap:6px}
.opp{
  display:flex;align-items:center;gap:11px;
  padding:10px 12px;border-radius:9px;
  background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);
  text-align:left;transition:all .15s;cursor:pointer;
  width:100%;
}
.opp:hover{border-color:rgba(239,68,68,.22);background:rgba(239,68,68,.04)}
.opp[aria-pressed="true"]{
  border-color:rgba(239,68,68,.55);background:rgba(239,68,68,.07);
}
.opp .av{
  width:32px;height:32px;border-radius:50%;flex-shrink:0;
  display:grid;place-items:center;color:#fff;
  font-size:.72rem;font-weight:800;background:#3a3a44;
  letter-spacing:0;
}
.opp[aria-pressed="true"] .av{background:#ef4444}
.opp .info{flex:1;min-width:0;display:flex;flex-direction:column;gap:1px}
.opp .nm{font-size:.84rem;font-weight:600;color:#e6e6ee;line-height:1.2}
.opp .role{font-size:.66rem;color:#8a8a9a;letter-spacing:.04em}
.opp .meta{
  font-size:.65rem;color:#7a7a8a;font-variant-numeric:tabular-nums;
  white-space:nowrap;letter-spacing:.04em;
}
.opp-toggle{
  margin-top:6px;padding:9px 12px;font-size:.74rem;
  border:1px solid rgba(255,255,255,.08);border-radius:8px;
  color:#9b9bab;background:transparent;text-align:center;
  transition:all .15s;
}
.opp-toggle:hover{background:rgba(255,255,255,.03);color:#e6e6ee}

/* Tighter motion input */
.motion-input{
  width:100%;padding:13px 14px;font-size:.92rem;
  background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.08);
  border-radius:10px;color:#e6e6ee;outline:none;
  transition:border-color .15s;
}
.motion-input:focus{border-color:rgba(239,68,68,.45)}
.motion-input::placeholder{color:#8a8a9a}
.motion-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.motion-chip{
  font-size:.7rem;padding:5px 10px;border-radius:6px;
  background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.07);
  color:#9b9bab;transition:all .15s;
}
.motion-chip:hover{border-color:rgba(239,68,68,.3);color:#e6e6ee;background:rgba(239,68,68,.04)}

/* Recording UI */
.rec-pill{
  display:inline-flex;align-items:center;gap:6px;
  font-size:.65rem;color:#fca5a5;letter-spacing:.06em;
  background:rgba(239,68,68,.08);padding:4px 9px;border-radius:999px;
  border:1px solid rgba(239,68,68,.18);
}
.rec-pill .rec-dot{
  width:6px;height:6px;border-radius:50%;background:#ef4444;
  animation:recPulse 1.6s ease-in-out infinite;
}
@keyframes recPulse{0%,100%{opacity:.6}50%{opacity:1}}

.download-row{
  display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;
}
.download-btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:11px 16px;font-size:.82rem;font-weight:600;
  border-radius:10px;border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.02);color:#e6e6ee;text-decoration:none;
  transition:all .15s;
}
.download-btn:hover{background:rgba(255,255,255,.05);border-color:rgba(239,68,68,.35)}

/* Hide the legacy single-column setup elements when the new layout is active */
body[data-layout="setup-v2"] .legacy-setup{display:none}

/* Accessibility — visible focus on the buttons that lost it from the cleanup */
.mode:focus-visible, .opp:focus-visible, .side-seg button:focus-visible,
.motion-chip:focus-visible, .opp-toggle:focus-visible{
  outline:2px solid #ef4444;outline-offset:2px;
}

/* 'Standing by' orb in the setup right column. Smaller than the live
   stage orb (180px vs 280px) so it doesn't compete with the form, but
   uses the same canvas + animation function so the visual continuity
   into the live round is one-to-one. Crimson glow at idle, no green
   user-active variant since this is pre-mic-grant. */
.setup-orb-card{
  text-align:center;padding:22px 18px 18px;margin-bottom:18px;
  background:linear-gradient(180deg, rgba(239,68,68,.04) 0%, rgba(255,255,255,.018) 100%);
  border:1px solid rgba(239,68,68,.18);
  border-radius:14px;
  position:relative;overflow:hidden;
}
.setup-orb-card::before{
  content:'';position:absolute;inset:-30%;
  background:radial-gradient(ellipse 60% 60% at 50% 40%, rgba(239,68,68,.08) 0%, transparent 60%);
  pointer-events:none;
}
.setup-orb-card canvas.setup-orb{
  width:180px;height:180px;display:block;margin:0 auto;
  position:relative;z-index:1;
}
@media (max-width:600px){.setup-orb-card canvas.setup-orb{width:150px;height:150px}}
.setup-orb-card .setup-orb-label{
  margin-top:14px;font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;
  font-weight:700;color:#fca5a5;position:relative;z-index:1;
}
.setup-orb-card .setup-orb-sub{
  margin-top:6px;font-size:.78rem;color:#a3a3b3;line-height:1.5;
  max-width:260px;margin-left:auto;margin-right:auto;position:relative;z-index:1;
}

/* Mic permission notice — neutral warm so it sits in the same
   crimson-on-dark world as the rest of the setup. The cold blue
   the previous pass used read as an alert from a different app. */
.mic-notice{
  display:flex;align-items:flex-start;gap:11px;
  padding:12px 14px;border-radius:10px;
  background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.07);
  margin-top:10px;
}
.mic-notice .mic-icon{
  width:32px;height:32px;flex-shrink:0;border-radius:8px;
  background:rgba(239,68,68,.1);
  display:grid;place-items:center;color:#fca5a5;
  font-size:1.05rem;
}
.mic-notice .body{flex:1;min-width:0}
.mic-notice .t{font-size:.8rem;font-weight:600;color:#e6e6ee;margin-bottom:2px;letter-spacing:-.005em}
.mic-notice .d{font-size:.72rem;color:#9b9bab;line-height:1.5}
.mic-notice .d strong{color:#fecaca;font-weight:600}
.mic-notice.granted{background:rgba(34,197,94,.05);border-color:rgba(34,197,94,.18)}
.mic-notice.granted .mic-icon{background:rgba(34,197,94,.12);color:#86efac}
.mic-notice.denied{background:rgba(239,68,68,.06);border-color:rgba(239,68,68,.22)}
.mic-notice.denied .mic-icon{background:rgba(239,68,68,.14);color:#fca5a5}

/* Smartness slider — picks how many extra brains the AI consults
   during prep before its first speech. */
.smart-card{
  background:rgba(255,255,255,.022);border:1px solid rgba(255,255,255,.06);
  border-radius:10px;padding:14px;
}
.smart-h{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:6px;gap:10px}
.smart-h .lbl{font-size:.82rem;font-weight:600;color:#e6e6ee}
.smart-h .lvl{
  font-size:.7rem;color:#fca5a5;letter-spacing:.04em;font-weight:600;
  background:rgba(239,68,68,.08);padding:3px 8px;border-radius:6px;
  border:1px solid rgba(239,68,68,.18);
}
.smart-desc{font-size:.7rem;color:#8a8a9a;line-height:1.5;margin-bottom:12px;min-height:30px}
.smart-slider-row{display:flex;align-items:center;gap:10px}
.smart-slider{
  flex:1;-webkit-appearance:none;appearance:none;
  height:4px;border-radius:2px;background:rgba(255,255,255,.08);outline:none;
}
.smart-slider::-webkit-slider-thumb{
  -webkit-appearance:none;width:18px;height:18px;border-radius:50%;
  background:#ef4444;cursor:pointer;border:2px solid #06060c;
  box-shadow:0 0 0 1px rgba(239,68,68,.4);
}
.smart-slider::-moz-range-thumb{
  width:18px;height:18px;border-radius:50%;background:#ef4444;
  cursor:pointer;border:2px solid #06060c;
}
.smart-ticks{
  display:flex;justify-content:space-between;font-size:.6rem;color:#7a7a8a;
  letter-spacing:.04em;margin-top:8px;padding:0 2px;
}
.smart-ticks span.on{color:#fca5a5;font-weight:600}
.smart-warn{
  font-size:.65rem;color:#fde68a;margin-top:8px;line-height:1.5;
  background:rgba(251,191,36,.06);border:1px solid rgba(251,191,36,.18);
  border-radius:6px;padding:7px 10px;
}

/* Mute button — sits in the live-controls row */
.mute-btn{
  display:inline-flex;align-items:center;gap:7px;
  padding:6px 12px;border-radius:8px;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);
  color:#e6e6ee;font-size:.7rem;font-weight:600;letter-spacing:.02em;
  transition:all .12s;
}
.mute-btn:hover{background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.2)}
.mute-btn.on{
  background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.4);
  color:#fecaca;
}

/* Hide the theme-picker dots from the shared topbar on this page —

// Synth chime — short oscillator burst, no external audio files.
// Used for session start / end / interrupt cues. Subtle so it doesn't
// sound like a notification bot.
function chime(freqs, opts){
  const ctx = getAudioCtx();
  if (!ctx) return;
  if (ctx.state === 'suspended') { try { ctx.resume(); } catch(e){} }
  const dur = (opts && opts.dur) || 0.18;
  const gain = (opts && opts.gain) || 0.05;
  const type = (opts && opts.type) || 'sine';
  const stagger = (opts && opts.stagger) || 0.06;
  freqs.forEach((f, i) => {
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    const start = ctx.currentTime + i * stagger;
    osc.type = type;
    osc.frequency.value = f;
    g.gain.setValueAtTime(0.0001, start);
    g.gain.exponentialRampToValueAtTime(gain, start + 0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, start + dur);
    osc.connect(g).connect(ctx.destination);
    osc.start(start);
    osc.stop(start + dur + 0.02);
  });
}

// Renders a circular waveform-meets-aurora that responds to either the
// AI audio amplitude or the user's mic amplitude (whichever is louder).
// Pure 2D canvas, no WebGL — works everywhere, low CPU.
function startOrbAnimation(canvas, getLevels, isUserSpeakingRef){
  const ctx = canvas.getContext('2d');
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const fitCanvas = () => {
    const cssW = canvas.clientWidth || 280;
    const cssH = canvas.clientHeight || 280;
    canvas.width = cssW * dpr;
    canvas.height = cssH * dpr;
  };
  fitCanvas();
  window.addEventListener('resize', fitCanvas);

  let raf = null;
  let phase = 0;
  // Slight smoothing so the orb breathes instead of stuttering on each
  // amplitude sample. Larger smoothing = chiller motion.
  let smoothLevel = 0;

  const draw = () => {
    const W = canvas.width, H = canvas.height, cx = W/2, cy = H/2;
    const R = Math.min(W, H) * 0.32;
    const { ai, user } = getLevels();
    const isUser = !!isUserSpeakingRef.current;
    const live = Math.max(ai, user);
    smoothLevel += (live - smoothLevel) * 0.18;

    ctx.clearRect(0, 0, W, H);

    // Color palette — green for user-active, crimson otherwise.
    const accent = isUser ? [34,197,94] : [239,68,68];

    // Outer aurora glow
    const auroraR = R * (1.4 + smoothLevel * 0.7);
    const grad = ctx.createRadialGradient(cx, cy, R*0.2, cx, cy, auroraR);
    grad.addColorStop(0, `rgba(${accent[0]},${accent[1]},${accent[2]},${0.35 + smoothLevel*0.3})`);
    grad.addColorStop(0.4, `rgba(${accent[0]},${accent[1]},${accent[2]},${0.12 + smoothLevel*0.15})`);
    grad.addColorStop(1, `rgba(${accent[0]},${accent[1]},${accent[2]},0)`);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // Inner ring waveform
    phase += 0.012 + smoothLevel * 0.02;
    const segments = 96;
    ctx.beginPath();
    for (let i = 0; i <= segments; i++) {
      const t = i / segments;
      const a = t * Math.PI * 2;
      // Layered sine modulation gives an organic, breathing motion.
      const r = R * (1 + smoothLevel * 0.55) +
                Math.sin(a * 6 + phase * 2) * (3 + smoothLevel * 14) +
                Math.sin(a * 11 - phase * 3) * (2 + smoothLevel * 9) +
                Math.cos(a * 3 + phase) * (4 + smoothLevel * 6);
      const x = cx + Math.cos(a) * r;
      const y = cy + Math.sin(a) * r;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.lineWidth = 1.6 * dpr;
    ctx.strokeStyle = `rgba(${accent[0]},${accent[1]},${accent[2]},${0.55 + smoothLevel*0.3})`;
    ctx.stroke();
    ctx.fillStyle = `rgba(${accent[0]},${accent[1]},${accent[2]},${0.04 + smoothLevel*0.06})`;
    ctx.fill();

    // Inner pulsing core
    const coreR = R * (0.55 + smoothLevel * 0.25);
    const coreGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, coreR);
    coreGrad.addColorStop(0, `rgba(${accent[0]},${accent[1]},${accent[2]},${0.6 + smoothLevel*0.3})`);
    coreGrad.addColorStop(1, `rgba(${accent[0]},${accent[1]},${accent[2]},0)`);
    ctx.fillStyle = coreGrad;
    ctx.beginPath();
    ctx.arc(cx, cy, coreR, 0, Math.PI*2);
    ctx.fill();

    // Bright hot center
    ctx.fillStyle = `rgba(255,255,255,${0.5 + smoothLevel*0.4})`;
    ctx.beginPath();
    ctx.arc(cx, cy, 4 * dpr + smoothLevel*8, 0, Math.PI*2);
    ctx.fill();

    raf = requestAnimationFrame(draw);
  };
  draw();

  return () => {
    if (raf) cancelAnimationFrame(raf);
    window.removeEventListener('resize', fitCanvas);
  };
}
