[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  NETLIFY_SKIP_SECRETS_CHECK = "true"

[functions]
  external_node_modules = ["@google-cloud/firestore", "stripe"]
  node_bundler = "esbuild"

# ──────────────────────────────────────────────────────────────────
# Icon 404 patches — browsers and PWAs request canonical icon paths
# that don't physically exist. Serve them from /icons/ via rewrite.
# (Netlify analytics: /favicon.ico 138, apple-touch-icon variants 114.)
# ──────────────────────────────────────────────────────────────────
[[redirects]]
  from = "/favicon.ico"
  to = "/icons/icon-192.png"
  status = 200

[[redirects]]
  from = "/apple-touch-icon.png"
  to = "/icons/icon-192.png"
  status = 200

[[redirects]]
  from = "/apple-touch-icon-precomposed.png"
  to = "/icons/icon-192.png"
  status = 200

# Optional: iOS touch icons at alternate sizes all point to the 512
[[redirects]]
  from = "/apple-touch-icon-*.png"
  to = "/icons/icon-512.png"
  status = 200

# ──────────────────────────────────────────────────────────────────
# URL canonicalization — kill duplicate URLs that split analytics.
#
# Before: /, /index.html, /landing, /landing.html were serving two
# real pages under FOUR URLs, splitting pageview counts and returning
# visitor attribution (confirmed in Netlify analytics: /landing 3391,
# / 1475, /index.html 554, /landing.html 10 — all for 2 real pages).
#
# After: / and /landing are canonical. .html variants 301 to them.
# ──────────────────────────────────────────────────────────────────
# Marketing landing page is now the public face at /.
# The React app moved to /app so product lives at /app#case, /app#chat, etc.
# /landing still resolves for backwards-compat with old links + in-app nav.
#
# `force = true` is load-bearing: without it, Netlify serves any shadow
# file at `/` (including /index.html, which when publish=app is the React
# app bundle) BEFORE falling through to this rule. That caused
# debatethedevil.com to boot straight into the app instead of the
# marketing landing. With force=true the rewrite wins unconditionally.
[[redirects]]
  from = "/"
  to = "/landing.html"
  status = 200
  force = true

[[redirects]]
  from = "/landing"
  to = "/landing.html"
  status = 200

[[redirects]]
  from = "/app"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/app/*"
  to = "/index.html"
  status = 200

# High School edition page
[[redirects]]
  from = "/high-school"
  to = "/high-school.html"
  status = 200

# Audience-specific landing pages (mirrored from repo-root netlify.toml).
# Both toml files carry these because we don't know which one Netlify
# treats as authoritative — publishing from app/ uses this file, publishing
# from the repo root uses the other. Keeping them in sync is the easy fix.
[[redirects]]
  from = "/debaters"
  to = "/debaters.html"
  status = 200
[[redirects]]
  from = "/lawyers"
  to = "/lawyers.html"
  status = 200
[[redirects]]
  from = "/sales"
  to = "/sales.html"
  status = 200
[[redirects]]
  from = "/teams"
  to = "/teams.html"
  status = 200
[[redirects]]
  from = "/founders"
  to = "/founders.html"
  status = 200
[[redirects]]
  from = "/students"
  to = "/students.html"
  status = 200
[[redirects]]
  from = "/speakers"
  to = "/speakers.html"
  status = 200

# Debate AI page
[[redirects]]
  from = "/debate-ai"
  to = "/debate-ai.html"
  status = 200

# Learn to Debate page
[[redirects]]
  from = "/learn"
  to = "/learn.html"
  status = 200

# Changelog
[[redirects]]
  from = "/changelog"
  to = "/changelog.html"
  status = 200

# Standalone markets page (SEO target for "debate prediction markets")
[[redirects]]
  from = "/markets"
  to = "/markets.html"
  status = 200

# Admin dashboard — gated by Firebase auth + ADMIN_UID env var.
# noindex'd in the page itself so crawlers skip it.
[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200

# Public pricing page — anchor for every Upgrade CTA across the app.
[[redirects]]
  from = "/pricing"
  to = "/pricing.html"
  status = 200

# Personal debate history — reads from localStorage, no auth.
[[redirects]]
  from = "/me"
  to = "/me.html"
  status = 200

# ──────────────────────────────────────────────────────────────────
# API routing — DO NOT add /api/* redirects here.
#
# Every function uses Netlify Functions v2 and self-declares its
# route via `export const config = { path: '/api/...' }`. Adding
# [[redirects]] from /api/* to /.netlify/functions/* with force=true
# OVERRIDES the function's own routing and rewrites to a path that
# doesn't exist for v2 functions, which serves Netlify's 404 HTML
# page. This is what broke every AI call for hours. Don't repeat.
#
# Legacy alias /api/billing/webhook → /api/stripe-webhook still
# needed because old Stripe configs may point there.
# ──────────────────────────────────────────────────────────────────
[[redirects]]
  from = "/api/billing/webhook"
  to = "/api/stripe-webhook"
  status = 200
