[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  NETLIFY_SKIP_SECRETS_CHECK = "true"

[functions]
  external_node_modules = ["@google-cloud/firestore", "stripe"]
  node_bundler = "esbuild"

# ──────────────────────────────────────────────────────────────────
# Icon 404 patches — browsers and PWAs request canonical icon paths
# that don't physically exist. Serve them from /icons/ via rewrite.
# (Netlify analytics: /favicon.ico 138, apple-touch-icon variants 114.)
# ──────────────────────────────────────────────────────────────────
[[redirects]]
  from = "/favicon.ico"
  to = "/icons/icon-192.png"
  status = 200

[[redirects]]
  from = "/apple-touch-icon.png"
  to = "/icons/icon-192.png"
  status = 200

[[redirects]]
  from = "/apple-touch-icon-precomposed.png"
  to = "/icons/icon-192.png"
  status = 200

# Optional: iOS touch icons at alternate sizes all point to the 512
[[redirects]]
  from = "/apple-touch-icon-*.png"
  to = "/icons/icon-512.png"
  status = 200

# ──────────────────────────────────────────────────────────────────
# URL canonicalization — kill duplicate URLs that split analytics.
#
# Before: /, /index.html, /landing, /landing.html were serving two
# real pages under FOUR URLs, splitting pageview counts and returning
# visitor attribution (confirmed in Netlify analytics: /landing 3391,
# / 1475, /index.html 554, /landing.html 10 — all for 2 real pages).
#
# After: / and /landing are canonical. .html variants 301 to them.
# ──────────────────────────────────────────────────────────────────
# Root serves the React app (index.html) — the way it's always worked.
# Landing page accessible at /landing for marketing links.
[[redirects]]
  from = "/landing"
  to = "/landing.html"
  status = 200

# High School edition page
[[redirects]]
  from = "/high-school"
  to = "/high-school.html"
  status = 200

# Debate AI page
[[redirects]]
  from = "/debate-ai"
  to = "/debate-ai.html"
  status = 200

# Learn to Debate page
[[redirects]]
  from = "/learn"
  to = "/learn.html"
  status = 200

# Changelog
[[redirects]]
  from = "/changelog"
  to = "/changelog.html"
  status = 200

# Standalone markets page (SEO target for "debate prediction markets")
[[redirects]]
  from = "/markets"
  to = "/markets.html"
  status = 200

# ──────────────────────────────────────────────────────────────────
# API routing — DO NOT add /api/* redirects here.
#
# Every function uses Netlify Functions v2 and self-declares its
# route via `export const config = { path: '/api/...' }`. Adding
# [[redirects]] from /api/* to /.netlify/functions/* with force=true
# OVERRIDES the function's own routing and rewrites to a path that
# doesn't exist for v2 functions, which serves Netlify's 404 HTML
# page. This is what broke every AI call for hours. Don't repeat.
#
# Legacy alias /api/billing/webhook → /api/stripe-webhook still
# needed because old Stripe configs may point there.
# ──────────────────────────────────────────────────────────────────
[[redirects]]
  from = "/api/billing/webhook"
  to = "/api/stripe-webhook"
  status = 200
