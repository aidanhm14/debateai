[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  NETLIFY_SKIP_SECRETS_CHECK = "true"

[functions]
  external_node_modules = ["@google-cloud/firestore", "stripe"]
  node_bundler = "esbuild"

# ──────────────────────────────────────────────────────────────────
# Digital Asset Links for the Google Play TWA wrapper.
# The Android system fetches this URL with no Accept header and
# strict Content-Type checking — must be application/json or the
# verification fails and Chrome shows the URL bar inside the app.
# Path is fixed by the Android spec; do NOT redirect or rewrite it.
# ──────────────────────────────────────────────────────────────────
[[headers]]
  for = "/.well-known/assetlinks.json"
  [headers.values]
    Content-Type = "application/json"
    Cache-Control = "public, max-age=300"
    Access-Control-Allow-Origin = "*"

# ──────────────────────────────────────────────────────────────────
# Icon 404 patches — browsers and PWAs request canonical icon paths
# that don't physically exist. Serve them from /icons/ via rewrite.
# (Netlify analytics: /favicon.ico 138, apple-touch-icon variants 114.)
# ──────────────────────────────────────────────────────────────────
[[redirects]]
  from = "/favicon.ico"
  to = "/icons/icon-192.png"
  status = 200

[[redirects]]
  from = "/apple-touch-icon.png"
  to = "/icons/icon-192.png"
  status = 200

[[redirects]]
  from = "/apple-touch-icon-precomposed.png"
  to = "/icons/icon-192.png"
  status = 200

# Optional: iOS touch icons at alternate sizes all point to the 512
[[redirects]]
  from = "/apple-touch-icon-*.png"
  to = "/icons/icon-512.png"
  status = 200

# ──────────────────────────────────────────────────────────────────
# URL canonicalization — kill duplicate URLs that split analytics.
#
# Before: /, /index.html, /landing, /landing.html were serving two
# real pages under FOUR URLs, splitting pageview counts and returning
# visitor attribution (confirmed in Netlify analytics: /landing 3391,
# / 1475, /index.html 554, /landing.html 10 — all for 2 real pages).
#
# After: / shows the voice-first splash; /landing is the marketing page;
# .html variants 301 to clean URLs.
# ──────────────────────────────────────────────────────────────────
# Splash page (sexy minimal voice-AI intro) is now the public face at /.
# It tap-routes to /landing where the full marketing surface lives.
# The React app moved to /app so product lives at /app#case, /app#chat, etc.
# Direct visits to /landing skip the splash (returning users + deep links).
#
# `force = true` is load-bearing: without it, Netlify serves any shadow
# file at `/` (including /index.html, which when publish=app is the React
# app bundle) BEFORE falling through to this rule. That caused
# debatethedevil.com to boot straight into the app instead of the
# marketing landing. With force=true the rewrite wins unconditionally.
[[redirects]]
  from = "/"
  to = "/splash.html"
  status = 200
  force = true

[[redirects]]
  from = "/splash"
  to = "/splash.html"
  status = 200

[[redirects]]
  from = "/landing"
  to = "/landing.html"
  status = 200

[[redirects]]
  from = "/app"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/app/*"
  to = "/index.html"
  status = 200

# High School edition page
[[redirects]]
  from = "/high-school"
  to = "/high-school.html"
  status = 200

# Schools / educators page (canonical URL declared in app/schools.html)
[[redirects]]
  from = "/schools"
  to = "/schools.html"
  status = 200

# Audience-specific landing pages (mirrored from repo-root netlify.toml).
# Both toml files carry these because we don't know which one Netlify
# treats as authoritative — publishing from app/ uses this file, publishing
# from the repo root uses the other. Keeping them in sync is the easy fix.
[[redirects]]
  from = "/debaters"
  to = "/debaters.html"
  status = 200

