[build]
  command = "node ../scripts/bake-firestore-creds.mjs && echo 'Static Netlify deploy: publishing app/ without Vite build'"
  publish = "."
  functions = "netlify/functions"

[build.environment]
  NETLIFY_SKIP_SECRETS_CHECK = "true"
  # Bake script intentionally writes the Firestore service account into the
  # function bundle (base64-encoded), so tell the scanner not to flag the
  # match against the dashboard GOOGLE_SERVICE_ACCOUNT value.
  SECRETS_SCAN_OMIT_KEYS = "GOOGLE_SERVICE_ACCOUNT"
  SECRETS_SCAN_OMIT_PATHS = "netlify/functions/lib/_firestore-creds.mjs"

[functions]
  external_node_modules = ["@google-cloud/firestore", "stripe"]
  node_bundler = "esbuild"

# ──────────────────────────────────────────────────────────────────
# Digital Asset Links for the Google Play TWA wrapper.
# The Android system fetches this URL with no Accept header and
# strict Content-Type checking — must be application/json or the
# verification fails and Chrome shows the URL bar inside the app.
# Path is fixed by the Android spec; do NOT redirect or rewrite it.
# ──────────────────────────────────────────────────────────────────
[[headers]]
  for = "/.well-known/assetlinks.json"
  [headers.values]
    Content-Type = "application/json"
    Cache-Control = "public, max-age=300"
    Access-Control-Allow-Origin = "*"

# ──────────────────────────────────────────────────────────────────
# Icon 404 patches — browsers and PWAs request canonical icon paths
# that don't physically exist. Serve them from /icons/ via rewrite.
# (Netlify analytics: /favicon.ico 138, apple-touch-icon variants 114.)
# ──────────────────────────────────────────────────────────────────

# Public round pages (/r/{id}). Each published round becomes its own
# indexable page rendered server-side by app/netlify/functions/r.mjs.
# The function path is /api/r/:id internally (consistent with every
# other function in this repo); this rewrite (status=200, force=true)
# lets the public URL stay short at /r/{id} without exposing the
# function path. force=true so it wins against any later catch-all
# rewrite that might claim /r/*.
[[redirects]]
  from = "/r/*"
  to = "/api/r/:splat"
  status = 200
  force = true

# Public rounds listing (/rounds). Index page for the /r/{id} corpus,
# linked from topbar + landing pill rail + footer of /r/{id} pages.
# Server-rendered by app/netlify/functions/rounds.mjs.
[[redirects]]
  from = "/rounds"
  to = "/api/rounds"
  status = 200
  force = true

# Daily motion pages (/today, /today/{YYYY-MM-DD}). Server-rendered by
# app/netlify/functions/today.mjs. Same pattern as /r/* above: function
# lives at /api/today internally, public URL stays short at /today.
# Each date URL deterministically maps to a stable motion so Google
# crawls /today/2026-05-14 once and the content never changes.
[[redirects]]
  from = "/today"
  to = "/api/today"
  status = 200
  force = true

[[redirects]]
  from = "/today/*"
  to = "/api/today/:splat"
  status = 200
  force = true

# Friday Night Finals roll of honor (/champions). Server-rendered by
# app/netlify/functions/champions.mjs. Empty-state pre-Final-#1
# (Fri 30 May 2026), grows as winners pin. The cult-build surface that
# matters most for retention: visible status earned by showing up.
[[redirects]]
  from = "/champions"
  to = "/api/champions"
  status = 200
  force = true

# AI-vs-AI exhibition round (/exhibition). Static page that fans the
# round to two of the five brains side-by-side, format-aware. Page is
# at app/exhibition.html; canonical declared as /exhibition (no .html)
# so the redirect matches what the OG/Twitter tags and JSON-LD already
# point at. Without this, /exhibition 404s — Netlify auto-handles
# .html for some paths but not reliably for new files.
[[redirects]]
  from = "/exhibition"
  to = "/exhibition.html"
  status = 200

# Format reference pages (/learn/formats/{slug}). One server-rendered
# page per competitive debate format. Substantive content + Course
# JSON-LD schema = long-tail SEO carpet for queries like "APDA debate
# structure", "Public Forum rules", "Asian Parli format". Function
# lives at /api/learn/formats/{slug}.
[[redirects]]
  from = "/learn/formats/*"
  to = "/api/learn/formats/:splat"
  status = 200
  force = true

# Education sub-hub under /learn (the "Learn to Argue" surface).
# Substantive-subject primers (finance, feminist theory, IR, climate
# policy) plus a self-check quiz per topic. One function serves both
# the index (/learn/education) and each per-topic primer page
# (/learn/education/{slug}).
[[redirects]]
  from = "/learn/education"
  to = "/api/learn/education"
  status = 200
  force = true

[[redirects]]
  from = "/learn/education/*"
  to = "/api/learn/education/:splat"
  status = 200
  force = true

# Backwards compat. /education and /education/{slug} were the original
# paths before nesting under /learn. Keep them 301-able so any external
# link (Reddit comment, screenshot, share) still lands.
[[redirects]]
  from = "/education"
  to = "/learn/education"
  status = 301
  force = true

[[redirects]]
  from = "/education/*"
  to = "/learn/education/:splat"
  status = 301
  force = true

# Dynamic sitemaps. Each sub-sitemap is server-rendered. /sitemap.xml
# itself is now a function (see app/netlify/functions/sitemap.mjs) so
# lastmod dates can move with content instead of freezing whenever the
# file was last hand-edited. /sitemap-index.xml stays a static file
# that lists all three URLs. force=true so the rewrite wins over any
# chance of a stale static .xml shadow at the same path.
[[redirects]]
  from = "/sitemap.xml"
  to = "/api/sitemap"
  status = 200
  force = true

[[redirects]]
  from = "/sitemap-rounds.xml"
  to = "/api/sitemap-rounds"
  status = 200
  force = true

[[redirects]]
  from = "/sitemap-motions.xml"
  to = "/api/sitemap-motions"
  status = 200
  force = true

[[redirects]]
  from = "/favicon.ico"
  to = "/icons/icon-192.png"
  status = 200

[[redirects]]
  from = "/apple-touch-icon.png"
  to = "/icons/icon-192.png"
  status = 200

[[redirects]]
  from = "/apple-touch-icon-precomposed.png"
  to = "/icons/icon-192.png"
  status = 200

# Optional: iOS touch icons at alternate sizes all point to the 512
[[redirects]]
  from = "/apple-touch-icon-*.png"
  to = "/icons/icon-512.png"
  status = 200

# ──────────────────────────────────────────────────────────────────
# URL canonicalization — kill duplicate URLs that split analytics.
#
# Root routing.
#
# Reverted the splash interstitial at "/" (2026-05-15) because it tanked
# SEO: the splash has ~14 words of body content and zero outbound links,
# so Google was indexing an empty page at the canonical URL while the
# real marketing copy on /landing accumulated none of the brand equity.
# Bounce rate on / was punishing rank for branded searches too.
# Now: / serves /landing.html directly (the 2,700-line marketing page
# with the SoftwareApplication + FAQPage structured data Google reads
# for rich results). The splash is still reachable at /splash for
# anyone who wants the voice-first intro; the launch animation lives
# on but stops being the public face at the canonical URL.
#
# `force = true` is load-bearing: without it Netlify serves any shadow
# file at `/` (including /index.html, which when publish=app is the
# React app bundle) BEFORE falling through to this rule. That caused
# the root domain to boot into the app instead of marketing. With
# force=true the rewrite wins unconditionally.
[[redirects]]
  from = "/"
  to = "/landing.html"
  status = 200
  force = true

[[redirects]]
  from = "/splash"
  to = "/splash.html"
  status = 200

[[redirects]]
  from = "/landing"
  to = "/landing.html"
  status = 200

[[redirects]]
  from = "/app"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/app/*"
  to = "/index.html"
  status = 200

