  status = 200

# ──────────────────────────────────────────────────────────────────
# URL canonicalization — kill duplicate URLs that split analytics.
#
# Root routing.
#
# Reverted the splash interstitial at "/" (2026-05-15) because it tanked
# SEO: the splash has ~14 words of body content and zero outbound links,
# so Google was indexing an empty page at the canonical URL while the
# real marketing copy on /landing accumulated none of the brand equity.
# Bounce rate on / was punishing rank for branded searches too.
# Now: / serves /landing.html directly (the 2,700-line marketing page
# with the SoftwareApplication + FAQPage structured data Google reads
# for rich results). The splash is still reachable at /splash for
# anyone who wants the voice-first intro; the launch animation lives
# on but stops being the public face at the canonical URL.
#
# `force = true` is load-bearing: without it Netlify serves any shadow
# file at `/` (including /index.html, which when publish=app is the
# React app bundle) BEFORE falling through to this rule. That caused
# the root domain to boot into the app instead of marketing. With
# force=true the rewrite wins unconditionally.
[[redirects]]
  from = "/"
  to = "/landing.html"
  status = 200
  force = true

[[redirects]]
  from = "/splash"
  to = "/splash.html"
  status = 200

[[redirects]]
  from = "/landing"
  to = "/landing.html"
  status = 200

[[redirects]]
  from = "/app"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/app/*"
  to = "/index.html"
  status = 200

