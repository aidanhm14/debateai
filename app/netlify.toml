[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  NETLIFY_SKIP_SECRETS_CHECK = "true"

[functions]
  external_node_modules = ["@google-cloud/firestore", "stripe"]
  node_bundler = "esbuild"

# API routes — map /api/* to serverless functions
[[redirects]]
  from = "/api/perplexity"
  to = "/.netlify/functions/perplexity"
  status = 200

[[redirects]]
  from = "/api/claude"
  to = "/.netlify/functions/claude"
  status = 200

[[redirects]]
  from = "/api/save-profile"
  to = "/.netlify/functions/save-profile"
  status = 200

[[redirects]]
  from = "/api/teams"
  to = "/.netlify/functions/create-team"
  status = 200

[[redirects]]
  from = "/api/teams/members"
  to = "/.netlify/functions/team-members"
  status = 200

[[redirects]]
  from = "/api/teams/update"
  to = "/.netlify/functions/update-team"
  status = 200

[[redirects]]
  from = "/api/teams/usage"
  to = "/.netlify/functions/team-usage"
  status = 200

[[redirects]]
  from = "/api/teams/analytics"
  to = "/.netlify/functions/team-analytics"
  status = 200

[[redirects]]
  from = "/api/teams/join"
  to = "/.netlify/functions/join-team"
  status = 200

[[redirects]]
  from = "/api/teams/log-usage"
  to = "/.netlify/functions/log-usage"
  status = 200

[[redirects]]
  from = "/api/insights"
  to = "/.netlify/functions/log-insight"
  status = 200

[[redirects]]
  from = "/api/billing/checkout"
  to = "/.netlify/functions/create-checkout"
  status = 200

[[redirects]]
  from = "/api/billing/portal"
  to = "/.netlify/functions/billing-portal"
  status = 200
