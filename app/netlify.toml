[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  NETLIFY_SKIP_SECRETS_CHECK = "true"

[functions]
  external_node_modules = ["@google-cloud/firestore", "stripe"]
  node_bundler = "esbuild"

# High School edition page
[[redirects]]
  from = "/high-school"
  to = "/high-school.html"
  status = 200

# Debate AI page
[[redirects]]
  from = "/debate-ai"
  to = "/debate-ai.html"
  status = 200

# Learn to Debate page
[[redirects]]
  from = "/learn"
  to = "/learn.html"
  status = 200

# Alias: /api/billing/webhook → stripe-webhook function
# (kept because stripe-webhook.mjs config.path is /api/stripe-webhook, not this path)
[[redirects]]
  from = "/api/billing/webhook"
  to = "/.netlify/functions/stripe-webhook"
  status = 200
