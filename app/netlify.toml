[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  NETLIFY_SKIP_SECRETS_CHECK = "true"

[functions]
  external_node_modules = ["@google-cloud/firestore", "stripe"]
  node_bundler = "esbuild"

# ──────────────────────────────────────────────────────────────────
# Icon 404 patches — browsers and PWAs request canonical icon paths
# that don't physically exist. Serve them from /icons/ via rewrite.
# (Netlify analytics: /favicon.ico 138, apple-touch-icon variants 114.)
# ──────────────────────────────────────────────────────────────────
[[redirects]]
  from = "/favicon.ico"
  to = "/icons/icon-192.png"
  status = 200

[[redirects]]
  from = "/apple-touch-icon.png"
  to = "/icons/icon-192.png"
  status = 200

[[redirects]]
  from = "/apple-touch-icon-precomposed.png"
  to = "/icons/icon-192.png"
  status = 200

# Optional: iOS touch icons at alternate sizes all point to the 512
[[redirects]]
  from = "/apple-touch-icon-*.png"
  to = "/icons/icon-512.png"
  status = 200

# ──────────────────────────────────────────────────────────────────
# URL canonicalization — kill duplicate URLs that split analytics.
#
# Before: /, /index.html, /landing, /landing.html were serving two
# real pages under FOUR URLs, splitting pageview counts and returning
# visitor attribution (confirmed in Netlify analytics: /landing 3391,
# / 1475, /index.html 554, /landing.html 10 — all for 2 real pages).
#
# After: / and /landing are canonical. .html variants 301 to them.
# ──────────────────────────────────────────────────────────────────
# Root → landing page (marketing). React app moved to /app.
[[redirects]]
  from = "/"
  to = "/landing.html"
  status = 200
  force = true

# React app at /app
[[redirects]]
  from = "/app"
  to = "/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/app/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/index.html"
  to = "/app"
  status = 301
  force = true

[[redirects]]
  from = "/landing.html"
  to = "/landing"
  status = 301
  force = true

[[redirects]]
  from = "/landing"
  to = "/landing.html"
  status = 200

# High School edition page
[[redirects]]
  from = "/high-school"
  to = "/high-school.html"
  status = 200

# Debate AI page
[[redirects]]
  from = "/debate-ai"
  to = "/debate-ai.html"
  status = 200

# Learn to Debate page
[[redirects]]
  from = "/learn"
  to = "/learn.html"
  status = 200

# ──────────────────────────────────────────────────────────────────
# API routing — explicit redirects to /.netlify/functions/*
#
# Each function declares `export const config = { path: '/api/...' }`
# which Netlify honors, BUT during cold starts and deploy propagation
# this routing has been observed to intermittently 404 (confirmed via
# Netlify Analytics: /api/claude 404'd 16 times, /api/gemini 9 times,
# /api/teams/* multiple times over 30 days).
#
# Explicit [[redirects]] to /.netlify/functions/* use the edge-layer
# rewrite engine which doesn't depend on function warmth and is
# idempotent with the config.path declaration. Belt + suspenders.
#
# ORDER MATTERS: more-specific paths must come before less-specific
# ones (e.g. /api/teams/join before /api/teams).
# ──────────────────────────────────────────────────────────────────

# AI model proxies
[[redirects]]
  from = "/api/claude"
  to = "/.netlify/functions/claude"
  status = 200
  force = true

[[redirects]]
  from = "/api/gemini"
  to = "/.netlify/functions/gemini"
  status = 200
  force = true

[[redirects]]
