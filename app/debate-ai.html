        // Pass voiceFormat so server appends the format-specific voice block
        // (Policy spreads + evidence tags, PF lay-accessible, LD value/criterion,
        // BP whip structure, Congress "Mr. Speaker," etc).
        const rawTxt=await callAI(buildPrompt(s,side,motion,hist,notes,format,oppStrengths,oppWeaknesses,getDifficultyNote(),background,currentLog,historyRounds,targetWords,voice,judgeParadigm,customParadigm,aiLanguage),`Deliver your ${s.code} speech on: "${motion}"`,chunk=>{
          const clean=stripPlan(chunk);
          setAiText(clean);
          const words=clean.split(/\s+/).length;
          setAiPct(Math.min(99,Math.round((words/targetWords)*100)));
          tryChunk(clean,false);
        },brain,{voiceFormat:format});
        const txt=stripPlan(rawTxt);
        setAiText(txt);setAiPct(100);
        // Final chunk: anything remaining
        tryChunk(txt,true);
        blobPromises._done=true; // signal playChunks that no more chunks coming
        if(!playbackStarted) stopThinking();

        // If no chunks were created at all, fallback to single-shot
        if(!playbackStarted){
          try { if (SFX && typeof SFX.ready === 'function') SFX.ready(); } catch(e){}
          setAiLoading('voice');
          tts.speak(txt,wpm,()=>{orb.setMode('idle');setTimeout(()=>endSpeech(),800)},voice,onAudioStart);
        }
      }catch(e){
        stopThinking();
        setAiLoading(false);
        // Surface the AI error with both the raw cause and a clear next
        // action. Generic "Something went wrong" leaves users staring
        // at a dead orb wondering whether to refresh, retry, or wait.
        const raw = (e && e.message) || 'unknown error';
        const hint = /401|sign in/i.test(raw) ? ' Sign in (top right) and retry.'
          : /429|rate limit|quota|cap/i.test(raw) ? ' You hit your usage cap. /pricing has BYOK $1/mo for unlimited Claude.'
          : /Failed to fetch|network|offline/i.test(raw) ? ' Network is flaky. Check your connection and tap retry.'
          : /500|server|backend/i.test(raw) ? ' AI backend hiccupped. Wait 10 seconds and retry, or paste a Claude API key in Settings for instant unlimited.'
          : ' Tap the orb to retry, or refresh if it sticks.';
        const msg = raw + '.' + hint;
        setAiText('[AI request failed: ' + msg + ']');
        setAiError(msg);
        orb.setMode('idle');
        // Auto-advance to the next speech so the round doesn't hang on a
        // dead screen. Without this the user is stuck at "AI SPEAKING / 0:00"
        // forever — exactly the bug screenshot. Short delay so the banner
        // is readable before the screen moves on.
        setTimeout(()=>{ if(!endingRef.current) endSpeech(); }, 3500);
      }
    }
  };

  // Visual cue when the user cuts the AI off. `wasInterrupted` flashes
  // the orb red and tags the log entry so the feedback page knows the
  // speech didn't run to completion.
  const[wasInterrupted,setWasInterrupted]=useState(false);

  // End speech + advance (guarded against double-calls). The optional
  // `interrupted` flag flips the entry's metadata + flashes the orb so
  // a user-cut-off speech reads differently from a clean skip when they
  // review the round later.
  const endSpeech=(opts={})=>{
    if(endingRef.current) return; // prevent double-fire from keyboard+button race
    endingRef.current=true;
    timer.reset();
    // Clean up POI state
    setPoiActive(false);setPoiText('');setPoiOffer(false);
    if(poiTimeoutRef.current){clearTimeout(poiTimeoutRef.current);poiTimeoutRef.current=null}
    const userTurn=cur.side===side;
    const interrupted = !!opts.interrupted && !userTurn;
    if(typeof gtag==='function')gtag('event','speech_end',{speech:cur.code,who:userTurn?'user':'ai',format:fmt.name,interrupted});
    let text='';
    if(userTurn){text=rec.stop();orb.stopMic();orb.setMode('idle')}
    else{tts.stop();text=aiText;orb.setMode('idle')}

    if (interrupted) {
      setWasInterrupted(true);
      setTimeout(()=>setWasInterrupted(false), 1200);
    }

    // Spoken duration (seconds used) + WPM, the speech slot allots
    // cur.time; whatever's left went unused, so elapsed = total - left.
    // Clamp to >= 1s so we don't divide by zero on instant skips.
    const elapsedSec=Math.max(1,(cur.time||0)-(timer.left||0));
    const words=(text||'').trim().split(/\s+/).filter(Boolean).length;
    const wpmThisSpeech=words>0 ? Math.round(words/(elapsedSec/60)) : 0;

    const entry={code:cur.code,who:userTurn?'You':'AI',text:(text||'(no transcript)')+(interrupted?' [interrupted]':''),durationSec:elapsedSec,wpm:wpmThisSpeech,wordCount:words,interrupted};
    const newLog=[...log,entry];
    setLog(newLog);setAiText('');

    const next=idx+1;
    if(next>=SPEECHES.length){
      clearSession();
      if(typeof gtag==='function')gtag('event','round_complete',{format:fmt.name,side,speeches:SPEECHES.length});
      transition('feedback',()=>genFeedback(newLog));
    } else {
      setIdx(next);
      setTimeout(()=>runSpeech(next,newLog),600);
    }
  };

  // AI speech stuck-state watchdog. If the AI turn settles into a state
  // where nothing is happening (no loading, no audio, no countdown gate,
  // timer at 0) for more than 6 seconds, force-advance to the next speech.
  // Covers silent failure modes (network died mid-stream, audio failed to
  // play because of autoplay policy, TTS chunk fetch hung) that the catch
  // block in runSpeech wouldn't catch — there the await resolved cleanly
  // but the downstream audio/timer chain didn't fire onAudioStart/onEnd.
  // Without this, the user sees "AI SPEAKING / LIVE. Timer running / 0:00"
  // forever and has to refresh the round.
  React.useEffect(()=>{
    if(phase!=='speech') return;
    if(isUser) return;
    if(aiLoading) return;
    if(aiCountdown!==null) return;
    if(tts.speaking) return;
    if(timer.left>0) return;
    if(endingRef.current) return;
    const id=setTimeout(()=>{
      if(endingRef.current) return;
      console.warn('[debate-ai] AI speech stuck. Auto-advancing.');
      endSpeech();
    },6000);
    return ()=>clearTimeout(id);
  },[phase,isUser,aiLoading,aiCountdown,tts.speaking,timer.left]);

  // Keyboard shortcuts help modal. Press `?` anywhere outside an input
  // to toggle. Documents the shortcuts that already exist so new users
  // can discover them without digging through the code.
  const[showShortcuts,setShowShortcuts]=useState(false);

  // Keyboard shortcuts
  useEffect(()=>{
    const handler=(e)=>{
      // Don't intercept when typing in a textarea/input
      if(e.target.tagName==='TEXTAREA'||e.target.tagName==='INPUT') return;
      // Global: `?` toggles the shortcuts overlay (need shift on most
      // layouts for the literal ? key).
      if(e.key==='?'||(e.shiftKey&&e.key==='/')){e.preventDefault();setShowShortcuts(s=>!s);return}
      if(showShortcuts&&e.key==='Escape'){e.preventDefault();setShowShortcuts(false);return}
      if(phase==='speech'){
        if(e.code==='Space'){e.preventDefault();if(tts.speaking){const wasPaused=tts.paused;tts.togglePause();if(wasPaused){timer.resume()}else{timer.pause()}}}
        if(e.code==='Escape'||e.code==='ArrowRight'){e.preventDefault();endSpeech()}
        // Speed hotkeys 1-5 during AI speech. Match the existing speed
        // pills so users can crank the pace without mouse travel.
        if(!isUser&&tts.speaking){
          const speedMap={Digit1:0.75,Digit2:1,Digit3:1.25,Digit4:1.5,Digit5:2};
          if(speedMap[e.code]!=null){e.preventDefault();setLiveRate(speedMap[e.code]);tts.setRate(speedMap[e.code])}
        }
      }
      if(phase==='prep'){
        if(e.code==='Enter'&&!e.shiftKey&&e.target.tagName!=='TEXTAREA'){e.preventDefault();goToSpeeches()}
      }
    };
    window.addEventListener('keydown',handler);
    return()=>window.removeEventListener('keydown',handler);
  },[phase,tts.speaking,showShortcuts]);

  // Adaptive difficulty. check user's win rate against this opponent
  const getWinRate=()=>{
    if(historyRounds.length===0) return { wins:0, losses:0, total:0, rate:0.5 };
    const wins=historyRounds.filter(r=>r.userWon===true).length;
    const losses=historyRounds.filter(r=>r.userWon===false).length;
    return { wins, losses, total:historyRounds.length, rate: historyRounds.length>0 ? wins/historyRounds.length : 0.5 };
  };
  const getDifficultyNote=()=>{
    const wr=getWinRate();
    if(wr.total<3) return '';
    if(wr.rate>=0.7) return 'The user has been winning consistently ('+wr.wins+'/'+wr.total+' wins). Debate at a SIGNIFICANTLY higher level. exploit YOUR strengths more aggressively, give fewer openings, use more sophisticated arguments. Make them EARN the win.';
    if(wr.rate<=0.3) return 'The user has been struggling ('+wr.wins+'/'+wr.total+' wins). Debate well but leave slightly more exploitable openings in your weaker areas. Still argue to win, but give the user more chances to find your weaknesses.';
    return '';
  };

  // Judge feedback. structured ballot
  const[ballot,setBallot]=useState(null); // parsed structured ballot
  const[panelText,setPanelText]=useState(''); // streaming 3-judge deliberation
  const[panelResult,setPanelResult]=useState(null); // parsed vote tally
  const[panelLoading,setPanelLoading]=useState(false);
  // Post-round auto flow sheet. AI reads the full round transcript and
  // produces a compact per-speech flow, arguments, warrants, drops,
  // extensions, turns, so the student can study the round the way a
  // coach would flow it. Plain-text markdown table so it copies cleanly.
  const[flowSheet,setFlowSheet]=useState('');
  const[flowLoading,setFlowLoading]=useState(false);
  // Multi-round pattern analysis. After enough rounds exist in history,
  // AI reads the last N and surfaces recurring weaknesses the user can
  // actually train out, what they drop, where their speaker points
  // dip, which argument types they mishandle. Compounds with the flow
  // sheet (per-round) by giving a meta view across rounds.
  const[patterns,setPatterns]=useState('');
  const[patternsLoading,setPatternsLoading]=useState(false);
  // 'Train this', given the pattern analysis, generate a round designed
  // to stress-test the user's #1 weakness. One-click launches the setup
  // with motion/side/format/opponent-traits pre-filled so they can't
  // accidentally pick something comfortable.
  const[drillPlan,setDrillPlan]=useState(null); // { motion, side, format, traits[], why }
  const[drillLoading,setDrillLoading]=useState(false);

  // Parse [Judge]: turn format into array of {judge, text} for bubble rendering
  const parsePanelTurns=(raw)=>{
    const beforeVote = raw.split(/\[VOTE\]/i)[0] || raw;
    const lines = beforeVote.split(/\n(?=\[(?:Maya|Marcus|Dr\.? Chen|Chen)\]:)/i);
    return lines.map(block=>{
      const m = block.match(/^\[(Maya|Marcus|Dr\.? Chen|Chen)\]:\s*([\s\S]*)/i);
      if(!m) return null;
      const nameRaw = m[1].toLowerCase();
      const key = nameRaw.includes('maya') ? 'maya' : nameRaw.includes('marcus') ? 'marcus' : 'chen';
      return { judge: key, text: m[2].trim() };
    }).filter(Boolean);
  };

  // Parse the [VOTE]...[/VOTE] block at end of deliberation
  const parsePanelVote=(raw)=>{
    const m = raw.match(/\[VOTE\]([\s\S]*?)\[\/VOTE\]/i) || raw.match(/\[VOTE\]([\s\S]*)$/i);
    if(!m) return null;
    const block = m[1];
    const pick = (re)=> (block.match(re)||[])[1];
    const mayaVote = (pick(/Maya:\s*(user|ai)/i)||'').toLowerCase();
    const marcusVote = (pick(/Marcus:\s*(user|ai)/i)||'').toLowerCase();
    const chenVote = (pick(/(?:Dr\.?\s*)?Chen:\s*(user|ai)/i)||'').toLowerCase();
    const winner = (pick(/Winner:\s*(user|ai)/i)||'').toLowerCase();
    const spUser = parseFloat(pick(/user\s*=\s*([\d.]+)/i)||'0');
    const spAi = parseFloat(pick(/ai\s*=\s*([\d.]+)/i)||'0');
    const practice = (pick(/Practice this:\s*([^\n]+)/i)||'').trim();
    const votes = [mayaVote, marcusVote, chenVote].filter(v=>v==='user'||v==='ai');
    const tally = votes.filter(v=>v==='user').length + '-' + votes.filter(v=>v==='ai').length;
    return { maya: mayaVote, marcus: marcusVote, chen: chenVote, winner, tally, speakerPoints: { user: spUser, ai: spAi }, practice };
  };

  // Build a compact, Claude-readable summary of the user's last N rounds.
  // Full transcripts would blow the token budget, so we extract what a
  // coach would actually look at: motion, format, side, voice, result,
  // ballot highlights, and a 400-char sample of the user's longest
  // speech for voice/style pattern-matching.
  const buildHistoryDigest=(rounds)=>{
    return rounds.slice(0,12).map((r,i)=>{
      const userSpeeches=(r.log||[]).filter(l=>l.who==='You');
      const longest=userSpeeches.reduce((a,b)=>(b.text||'').length>(a.text||'').length?b:a,{text:''});
      const sample=(longest.text||'').slice(0,400);
      const outcome=r.userWon===true?'WON':r.userWon===false?'LOST':'tie/unknown';
      const ballotSnippet=(r.feedback||'').slice(0,600);
      return `ROUND ${i+1}, ${r.formatName||r.format} · ${r.sideLabel||r.side} · vs ${r.voice||'unknown voice'}, ${outcome}
Motion: ${r.motion||''}
User-speech sample: ${sample}
Ballot highlights: ${ballotSnippet}`;
    }).join('\n\n---\n\n');
  };

  const genPatterns=async()=>{
    if(!historyRounds||historyRounds.length<3){setPatterns('Need at least 3 saved rounds before we can find patterns. Keep debating.');return}
    setPatternsLoading(true);
    setPatterns('');
    const digest=buildHistoryDigest(historyRounds);
    const sys=`You are a debate coach reading ${Math.min(historyRounds.length,12)} rounds a single debater ran against AI opponents. Your job is to find RECURRING patterns, strengths that consistently show up, weaknesses that keep costing rounds, and the single highest-leverage fix for this debater.

Rules:
- Base everything on evidence IN THE DIGEST. Quote specifically ("in round 3 the ballot says...") rather than speaking in generalities.
- Diagnose PATTERNS, not individual round failures. If something only happened once, don't list it.
- Be honest. A kind coach who won't tell you what's wrong is a useless coach. Point out the thing they keep doing that loses the round, specifically.
- Structure your output as PLAIN TEXT (no markdown fences, no headers styled as #):

RECURRING STRENGTHS (what works)
- 2-4 bullets. What shows up in rounds they win AND rounds they lose, their actual core competency.

RECURRING WEAKNESSES (what loses rounds)
- 3-5 bullets. Rank by how often this shows up in losses. For each: name the specific behavior + quote 1 ballot line that called it out.

VOICE / DELIVERY PATTERNS
- 1-3 bullets about their speaking style. Do they lean abstract? Do they signpost? Do they front-load arguments? Use the speech samples.

FORMAT-SPECIFIC NOTES
- If they perform differently in one format vs another, say so. Otherwise skip.

THE ONE DRILL
- Single most important thing this debater should practice next. Name the drill specifically (not "work on rebuttals" but "write three rebuttal openings that start with a link turn, read them aloud, time them, aim for under 20 seconds each"). This drill must target their #1 weakness.

Do NOT hedge ("it seems," "perhaps"). This is coaching, not horoscope.`;
    try{
      let raw='';
      const ts=window.TypeStream&&window.TypeStream.create(setPatterns,{cps:120});
      await callAI(sys,digest,chunk=>{raw=chunk;if(ts)ts.feed(chunk);else setPatterns(chunk)},brain,{voiceFeature:'feedback'});
      if(ts)ts.done();
      setPatterns(raw);
    }catch(e){
      setPatterns('Could not analyze patterns: '+e.message);
    }
    setPatternsLoading(false);
  };

  const genDrillPlan=async()=>{
    if(!patterns){return}
    setDrillLoading(true);
    setDrillPlan(null);
    const strengthKeys=Object.keys(STRENGTHS||{});
    const sys=`You are a debate coach. The student just had their last N rounds analyzed and the diagnosis is below. Your job: design ONE round that will force them to confront their #1 weakness.

Output EXACTLY this JSON structure and nothing else (no backticks, no prose before or after):
{
  "motion": "A specific debate motion as a single sentence",
  "side": "gov" | "opp",
  "format": "apda" | "bp" | "worlds" | "asian" | "ld" | "pf" | "policy" | "congress" | "quick",
  "traits": ["1-3 keys from this list: ${strengthKeys.join(', ')}"],
  "why": "One sentence: how this round specifically stress-tests their #1 weakness."
}

Rules:
- The motion must be debatable (splits a room) and SPECIFICALLY set up to exercise their weakness. If they drop impacts, pick a motion with competing harm stories. If they struggle with framework, pick a motion where framework clash is unavoidable.
- Choose the SIDE that forces them into the weakness, not the comfortable side.
- Pick a format they've shown weakness in if any; otherwise match their most-played format.
- traits = opponent strengths to load up. If they drop on the flow, give the AI "strategy" + "steelmanning". If they lose the rhetoric game, give it "rhetoric" + "impact".
- The 'why' is the coaching payoff, why THIS motion, not a generic one.
- JSON only. No markdown. No explanation. No closing sentence.`;
    try{
      let raw='';
      await callAI(sys,'PATTERN DIAGNOSIS:\n\n'+patterns,chunk=>{raw=chunk},brain,{voiceFeature:'feedback'});
      const cleaned=raw.replace(/```json\s*/g,'').replace(/```\s*/g,'').trim();
      const parsed=JSON.parse(cleaned);
      if(parsed && parsed.motion) setDrillPlan(parsed);
      else setDrillPlan({error:'Could not build a drill plan. Try again.'});
    }catch(e){
      setDrillPlan({error:'Drill-plan generation failed: '+e.message});
    }
    setDrillLoading(false);
  };

  const useDrillPlan=()=>{
    if(!drillPlan||drillPlan.error) return;
    // Clear round + apply drill settings, then drop the user on setup with
    // everything pre-filled so they can't dodge the weakness by re-picking
    // a comfortable motion.
    clearSession();
    transition('setup',()=>{
      setMotion(drillPlan.motion||'');
      setBackground('');
      setIdx(0);
      setLog([]);
      setFeedback('');
      setBallot(null);
      setNotes('');
      setAiText('');
      setShowTx(false);
      setPanelText('');
      setPanelResult(null);
      setFlowSheet('');
      setPatterns('');
      setDrillPlan(null);
      if(drillPlan.format && FORMATS[drillPlan.format]) setFormat(drillPlan.format);
      const f=FORMATS[drillPlan.format]||FORMATS.apda;
      if(drillPlan.side && f.sides.includes(drillPlan.side)) setSide(drillPlan.side);
      else setSide(f.sides[0]);
      if(Array.isArray(drillPlan.traits)) setOppStrengths(drillPlan.traits.filter(t=>STRENGTHS&&STRENGTHS[t]));
    });
  };

  const genFlowSheet=async(allLog)=>{
    setFlowLoading(true);
    setFlowSheet('');
    const tx=allLog.map(l=>`[${l.code}. ${l.who}]: ${l.text}`).join('\n\n');
    const sys=`You are a debate coach reading a round transcript and producing a FLOW SHEET the way a tab-style judge would flow it in real time. Your output is a compact, readable plain-text table a student can use to study the round.

OUTPUT FORMAT, plain text (no markdown headers, no backticks). Use this exact structure:

ROUND FLOW, ${fmt.name} · "${motion}"
Side: user=${fmt.sideLabels[side]||side}

ARGUMENT LEDGER
---------------
For each DISTINCT argument that appeared in the round, one row:
  [tag] · ran by: [gov/opp or user/ai] · outcome: [won / dropped / turned / conceded / mitigated]
  Warrant: 1 sentence.
  Journey: brief speech-by-speech ("PM introduced → LO responded with X → MG extended → MO dropped it").
  Flow status: whether this argument reaches the ballot or not, and why.

Aim for 5-8 arguments. Don't invent arguments that weren't actually made, only flow what the transcript contains.

KEY CLASHES
-----------
2-3 clashes between the sides. For each:
  CLASH: [name]
  Gov/User said: ...
  Opp/AI said: ...
  Winner of the clash + one-sentence reason.

DROPS & CONCESSIONS
-------------------
Every argument that was dropped or conceded, one per line:
  [speech code]: [who] dropped [argument name], why it matters.

WEIGHING
--------
One paragraph. What the judge weighs the round on in practice, magnitude/probability/timeframe/reversibility, and whose impacts win under that lens. Be blunt about which side lost the weighing, if either.

Do NOT preface the output with anything. Start with "ROUND FLOW , ". No closing paragraph, no "hope this helps."`;
    try{
      let raw='';
      const ts=window.TypeStream&&window.TypeStream.create(setFlowSheet,{cps:140});
      await callAI(sys,'Full round transcript:\n\n'+tx,chunk=>{raw=chunk;if(ts)ts.feed(chunk);else setFlowSheet(chunk)},brain,{voiceFeature:'feedback'});
      if(ts)ts.done();
      setFlowSheet(raw);
    }catch(e){
      setFlowSheet('Could not generate flow sheet: '+e.message);
    }
    setFlowLoading(false);
  };

  const genPanelFeedback=async(allLog)=>{
    setPanelLoading(true);
    setPanelText('');
    setPanelResult(null);
    const tx=allLog.map(l=>`[${l.code}. ${l.who}]: ${l.text}`).join('\n\n');
    // Prompt lives server-side as PROMPT_LIBRARY.judgePanelDeliberation
    try{
      let raw='';
      const ts=window.TypeStream&&window.TypeStream.create(setPanelText,{cps:120});
      await callAI('','Full round transcript:\n\n'+tx,chunk=>{
        raw=chunk;
        if(ts)ts.feed(chunk);
        else setPanelText(chunk);
      },brain,{
        promptId:'judgePanelDeliberation',
        promptVars:{
          fmtName:fmt.name,
          motion:motion,
          sideLabel:fmt.sideLabels[side]||side,
          mayaParadigm:PANEL_JUDGES.maya.paradigm,
          mayaVoice:PANEL_JUDGES.maya.voice,
          marcusParadigm:PANEL_JUDGES.marcus.paradigm,
          marcusVoice:PANEL_JUDGES.marcus.voice,
          chenParadigm:PANEL_JUDGES.chen.paradigm,
          chenVoice:PANEL_JUDGES.chen.voice,
          voiceGuidelines:DEBATE_VOICE_GUIDELINES,
        },
      });
      if(ts)ts.done();
      const parsed=parsePanelVote(raw);
      if(parsed) setPanelResult(parsed);
    }catch(e){
      setPanelText('Could not generate panel deliberation: '+e.message);
    }
    setPanelLoading(false);
  };

  const genFeedback=async(allLog)=>{
    setFbLoading(true);setBallot(null);
    const tx=allLog.map(l=>`[${l.code}. ${l.who}]: ${l.text}`).join('\n\n');
    // Prompt lives server-side as PROMPT_LIBRARY.singleJudgeBallot
    try{
      let raw='';
      // Custom paradigm overrides preset. Ballot voice must match the
      // judge the user is actually training against.
      const paradigmNote = (customParadigm && customParadigm.trim())
        ? 'THIS ROUND IS IN FRONT OF A SPECIFIC REAL JUDGE. Their paradigm is below (verbatim). Your ballot MUST be written AS this judge, their voting priorities, their language, their vote. Do not water this down to a generic ballot.\n\n---JUDGE PARADIGM (VERBATIM)---\n'+customParadigm.trim()+'\n---END PARADIGM---\n\n'
        : (judgeParadigm && JUDGE_PARADIGMS[judgeParadigm])
          ? 'Judge paradigm the user selected for this round: '+JUDGE_PARADIGMS[judgeParadigm].label+'.\n'+JUDGE_PARADIGMS[judgeParadigm].prompt+'\nYour ballot MUST be written in the voice of this paradigm, weigh and decide the way this judge would.\n\n'
          : '';
      const ts=window.TypeStream&&window.TypeStream.create(setFeedback,{cps:120});
      const fb=await callAI('',paradigmNote+'Full round transcript:\n\n'+tx,chunk=>{raw=chunk;if(ts)ts.feed(chunk);else setFeedback(chunk)},brain,{
        promptId:'singleJudgeBallot',
        promptVars:{ fmtName:fmt.name, motion:motion, sideLabel:fmt.sideLabels[side]||side },
      });
      if(ts)ts.done();
      setFeedback(fb);
      // Parse structured ballot. Robust extraction: the model sometimes
      // wraps the JSON in ```json fences, sometimes adds a leading
      // "Here is the ballot:" sentence, sometimes both. Strip fences,
      // then find the first '{' and walk to the matching '}' so prose
      // before/after the JSON doesn't break the parse.
      try{
        let cleaned=fb.replace(/```json\s*/gi,'').replace(/```\s*/g,'').trim();
        const firstBrace=cleaned.indexOf('{');
        const lastBrace=cleaned.lastIndexOf('}');
        if(firstBrace>=0 && lastBrace>firstBrace){
          cleaned=cleaned.slice(firstBrace,lastBrace+1);
        }
        const parsed=JSON.parse(cleaned);
        setBallot(parsed);
        saveRound(allLog,fb,parsed.winner==='user',parsed.speakerPoints||null);
      }catch{
        // Fallback: save as unstructured
        saveRound(allLog,fb,null,null);
      }
    }catch(e){setFeedback('Could not generate feedback: '+e.message)}
    setFbLoading(false);
    // If the user picked a 3-judge panel at setup, fire the panel
    // deliberation automatically once the single ballot lands. They
    // already opted in; no second click required. The panel block on
    // the ballot screen still allows manual re-rolls.
    if(judgeCount===3 && !panelText && !panelLoading){
      try{ genPanelFeedback(allLog); }catch(e){}
    }
  };

  // Save round to history
  const saveRound=(allLog,fb,userWon,speakerPoints)=>{
    // Coerce speakerPoints to {user, ai} numbers or null. The single-judge
    // ballot sometimes returns string values, sometimes {user, ai} objects
    // nested, sometimes flat. Normalize here so downstream histogram code
    // doesn't have to care.
    let sp=null;
    if(speakerPoints&&typeof speakerPoints==='object'){
      const u=parseFloat(speakerPoints.user);
      const a=parseFloat(speakerPoints.ai);
      if(!isNaN(u)||!isNaN(a)) sp={user:isNaN(u)?null:u,ai:isNaN(a)?null:a};
    }
    const round={
      id:Date.now(),
      date:new Date().toISOString(),
      motion,format,side,voice,brain,
      oppStrengths,oppWeaknesses,
      formatName:(FORMATS[format]||FORMATS.apda).name,
      opponentName:'AI',
      sideLabel:(FORMATS[format]||FORMATS.apda).sideLabels[side]||side,
      log:allLog,
      feedback:fb||'',
      userWon: userWon, // true/false/null
      speakerPoints: sp, // {user, ai} or null
    };
    const updated=[round,...historyRounds].slice(0,50);
    setHistoryRounds(updated);
    try{localStorage.setItem('debateos-round-history',JSON.stringify(updated))}catch{}
    // First-round retention email. Fires after the first AI round
    // completes — server-side gates on (a) email never sent before
    // for this uid, (b) round count == 1, so re-firing on subsequent
    // rounds is a no-op. Fire-and-forget; never block the save flow.
    if(user&&historyRounds.length===0){
      try{
        user.getIdToken().then(token=>{
          const fname=(user.displayName||'').trim().split(/\s+/)[0]||'';
          // Compress the feedback for the email body — RFD section
          // first if structured, else first 600 chars of the raw fb.
          let rfdSnippet=(fb||'').slice(0,600);
          try{
            const rfdMatch=(fb||'').match(/RFD[^:]*:\s*([\s\S]{40,600})/i);
            if(rfdMatch&&rfdMatch[1])rfdSnippet=rfdMatch[1].trim().slice(0,600);
          }catch{}
          fetch('/api/send-first-round-email',{
            method:'POST',
            headers:{'Content-Type':'application/json',Authorization:'Bearer '+token},
            body:JSON.stringify({
              motion: round.motion||'',
              side: round.sideLabel||'',
              format: round.formatName||'',
              firstName: fname,
              rfdSnippet: rfdSnippet,
            }),
          }).catch(()=>{});
        });
      }catch{}
    }
    // Also save to Firestore if signed in
    if(user&&firebaseDb){
      user.getIdToken().then(token=>{
        firebaseDb.collection('debate_rounds').doc(user.uid+'_'+round.id).set(round).catch(()=>{});
        // Leaderboard write is intentionally OFF for the typed flow.
        // Project rule (2026-05-13): the leaderboard ranks voice rounds
        // only — typed rounds remain in the user's personal history
        // (debate_rounds above) but never enter the public ranking.
        // Speaker points from voice-debate.html's RFD are the only
        // input to leaderboard_entries now.
      }).catch(()=>{});
    }
  };

  const deleteRound=(id)=>{
    const updated=historyRounds.filter(r=>r.id!==id);
    setHistoryRounds(updated);
    try{localStorage.setItem('debateos-round-history',JSON.stringify(updated))}catch{}
    if(viewingRound&&viewingRound.id===id)setViewingRound(null);
  };

  // Publish current round to /r/{id} — the Quora/Genius play.
  // Sends sanitized round data to /api/round/publish which writes to
  // the public_rounds Firestore collection under a short URL-safe ID.
  // Server-rendered HTML at /r/{id} carries OG meta + JSON-LD Article
  // schema so Google indexes the motion as the H1. Every published
  // round = one more indexable long-tail entry into the funnel.
  const publishRound=async()=>{
    if(publishStatus==='publishing') return;
    if(!user){ setPublishError('Sign in first to publish.'); setPublishStatus('error'); return; }
    setPublishStatus('publishing');
    setPublishError('');
    try{
      const token=await user.getIdToken();
      const speeches=(log||[])
        .filter(l=>l && l.text && l.code !== 'POI')
        .map(l=>({
          who: l.who==='You' ? 'user' : 'ai',
          speaker: l.code || '',
          side: l.who==='You' ? side : ((fmt.sides||[]).find(s=>s!==side) || ''),
          text: l.text,
        }));
      const payload={
        motion,
        format,
        formatName: fmt && fmt.name,
        side,
        sideLabel: fmt && fmt.sideLabels && fmt.sideLabels[side],
        voice,
        voiceName: (VOICES[voice]||{}).name || '',
        brain,
        speeches,
        rfd: feedback || '',
        decision: (ballot && ballot.decision) || '',
        winner: (ballot && ballot.winner) || null,
        speakerPoints: (ballot && ballot.speakerPoints) || null,
        displayName: (user.displayName || '').trim(),
      };
      const res=await fetch('/api/round/publish',{
        method:'POST',
        headers:{'Content-Type':'application/json',Authorization:'Bearer '+token},
        body:JSON.stringify(payload),
      });
      const data=await res.json().catch(()=>({}));
      if(!res.ok || !data.ok){
        throw new Error(data.error || ('Publish failed ('+res.status+')'));

    }catch(err){
      console.error('publishRound failed:', err);
      setPublishError(err.message || 'Could not publish.');
      setPublishStatus('error');
    }
  };

  // Copy transcript
  const copyAll=()=>{
    const t=log.map(l=>`[${l.code}. ${l.who}]\n${l.text}`).join('\n\n---\n\n')+'\n\n---\nJUDGE:\n'+feedback;
    navigator.clipboard.writeText(t).catch(()=>{});
  };

  // Format round as downloadable text
  const formatRoundText=(roundMotion,roundFormat,roundSide,roundLog,roundFeedback,roundBallot)=>{
    const fmtName=(FORMATS[roundFormat]||FORMATS.apda).name;
    const sideLabel=(FORMATS[roundFormat]||FORMATS.apda).sideLabels[roundSide]||roundSide;
    let txt=`DEBATE ROUND. ${fmtName}\n`;
    txt+=`${'═'.repeat(50)}\n\n`;
    txt+=`Motion: "${roundMotion}"\n`;
    txt+=`Side: ${sideLabel}\n`;
    txt+=`Date: ${new Date().toLocaleDateString()}\n\n`;
    txt+=`${'─'.repeat(50)}\n\n`;
    roundLog.forEach(l=>{
      txt+=`[${l.code}. ${l.who}]\n${l.text}\n\n${'─'.repeat(50)}\n\n`;
    });
    if(roundBallot){
      txt+=`JUDGE BALLOT\n${'═'.repeat(50)}\n\n`;
      txt+=`Winner: ${roundBallot.winner==='user'?'You':'AI'}\n`;
      txt+=`Decision: ${roundBallot.decision||''}\n\n`;
      if(roundBallot.speakerPoints) txt+=`Speaker Points. You: ${roundBallot.speakerPoints.user} | AI: ${roundBallot.speakerPoints.ai}\n\n`;
      if(roundBallot.keyClash) txt+=`Key Clash: ${roundBallot.keyClash}\n\n`;
      if(roundBallot.speeches) roundBallot.speeches.forEach(sp=>{
        txt+=`${sp.code} (${sp.who}). ${sp.score}\n`;
        if(sp.strengths) sp.strengths.forEach(s=>{ txt+=`  ${s}\n`; });
        if(sp.improvements) sp.improvements.forEach(s=>{ txt+=`  ${s}\n`; });
        txt+='\n';
      });
      if(roundBallot.practiceAdvice) txt+=`Practice Advice: ${roundBallot.practiceAdvice}\n`;
    } else if(roundFeedback){
      txt+=`JUDGE FEEDBACK\n${'═'.repeat(50)}\n\n${roundFeedback}\n`;
    }
    return txt;
  };

  // Download round as .txt file
  const downloadRound=(roundMotion,roundFormat,roundSide,roundLog,roundFeedback,roundBallot)=>{
    const txt=formatRoundText(roundMotion,roundFormat,roundSide,roundLog,roundFeedback,roundBallot);
    if(typeof gtag==='function')gtag('event','export_round',{format:roundFormat,side:roundSide});

    document.body.appendChild(a);a.click();document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  // Share-round card. Renders a 1200×630 (OG-sized) PNG with motion,
  // format, side, outcome, and speaker points, downloadable and
  // clipboard-copyable for social. Canvas-only, no backend. Growth
  // lever: winning a round should be shareable without screenshots.
  const [shareBusy,setShareBusy]=useState(false);
  const genShareCard=async()=>{
    setShareBusy(true);
    try{
      const W=1200, H=630;
      const canvas=document.createElement('canvas');
      canvas.width=W; canvas.height=H;
      const ctx=canvas.getContext('2d');
      // Background, near-black with red radial glow top-right
      ctx.fillStyle='#0a0a0c'; ctx.fillRect(0,0,W,H);
      const grad=ctx.createRadialGradient(W*0.78,H*0.18,0, W*0.78,H*0.18, W*0.55);
      grad.addColorStop(0,'rgba(239,68,68,0.42)');
      grad.addColorStop(1,'rgba(239,68,68,0)');
      ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);
      // Wordmark
      ctx.fillStyle='#ffffff';
      ctx.font='800 34px "Inter", system-ui, sans-serif';
      ctx.fillText('Debate', 64, 86);
      ctx.fillStyle='#ef4444';
      ctx.fillText(' AI', 64+ctx.measureText('Debate').width, 86);
      // Outcome pill
      const won = ballot && ballot.winner==='user';
      const drawn = ballot && ballot.winner && ballot.winner!=='user' && ballot.winner!=='ai';
      const pillText = won?'Won':drawn?'Split':'Round complete';
      const pillBg = won?'rgba(34,197,94,0.14)':drawn?'rgba(245,158,11,0.14)':'rgba(239,68,68,0.16)';
      const pillBorder = won?'rgba(34,197,94,0.6)':drawn?'rgba(245,158,11,0.6)':'rgba(239,68,68,0.5)';
      const pillColor = won?'#4ade80':drawn?'#fbbf24':'#fca5a5';
      ctx.font='700 22px "Inter", system-ui, sans-serif';
      const pillW=ctx.measureText(pillText).width+44;
      const pillX=W-64-pillW, pillY=58;
      ctx.fillStyle=pillBg;
      ctx.strokeStyle=pillBorder; ctx.lineWidth=2;
      const r=26;
      ctx.beginPath();
      ctx.moveTo(pillX+r,pillY);
      ctx.arcTo(pillX+pillW,pillY,pillX+pillW,pillY+52,r);
      ctx.arcTo(pillX+pillW,pillY+52,pillX,pillY+52,r);
      ctx.arcTo(pillX,pillY+52,pillX,pillY,r);
      ctx.arcTo(pillX,pillY,pillX+pillW,pillY,r);
      ctx.closePath(); ctx.fill(); ctx.stroke();
      ctx.fillStyle=pillColor;
      ctx.fillText(pillText, pillX+22, pillY+34);
      // Motion (word-wrapped to 3 lines max)
      ctx.fillStyle='#f1f5f9';
      ctx.font='800 52px "Inter", system-ui, sans-serif';
      const wrap=(text,maxW,maxLines)=>{
        const words=text.split(/\s+/);
        const lines=[]; let cur='';
        for(const w of words){
          const trial=cur?cur+' '+w:w;
          if(ctx.measureText(trial).width<=maxW) cur=trial;
          else{ lines.push(cur); cur=w; if(lines.length>=maxLines-1){ while(words.length){ const t=cur+' '+words.shift(); cur=ctx.measureText(t+'…').width<=maxW?t:(words.unshift(),null); if(cur===null){cur=t.slice(0,-1); break;} } lines.push(cur+'…'); return lines; } }
        }
        if(cur) lines.push(cur);
        return lines;
      };
      const motionLines=wrap('"'+motion+'"', W-128, 3);
      motionLines.forEach((line,i)=>ctx.fillText(line, 64, 200+i*62));
      // Meta row, format · side · pace
      const metaY = 200 + motionLines.length*62 + 40;
      ctx.fillStyle='#94a3b8';
      ctx.font='600 24px "Inter", system-ui, sans-serif';
      const sideLabel=(FORMATS[format]||FORMATS.apda).sideLabels[side]||side;
      const fmtName=(FORMATS[format]||FORMATS.apda).name;
      ctx.fillText(fmtName + '  ·  ' + sideLabel + '  ·  vs ' + (VOICES[voice]?.name||'AI'), 64, metaY);
      // Speaker points block (if available)
      if(ballot && ballot.speakerPoints){
        ctx.fillStyle='#cbd5e1';
        ctx.font='700 28px "Inter", system-ui, sans-serif';
        const sp='You: '+(ballot.speakerPoints.user||', ')+'   AI: '+(ballot.speakerPoints.ai||', ');
        ctx.fillText(sp, 64, metaY+48);
      }
      // Footer
      ctx.fillStyle='rgba(255,255,255,0.35)';
      ctx.font='500 20px "Inter", system-ui, sans-serif';
      ctx.fillText('debateai.com  ·  argue with an AI, get sharper', 64, H-48);

      const blob=await new Promise(res=>canvas.toBlob(res,'image/png',0.95));
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');
      const slug=motion.slice(0,40).replace(/[^a-zA-Z0-9]+/g,'-').replace(/(^-|-$)/g,'');

  // ── PREP ──
  if(phase==='prep') return el('div',{className:'page'},

        el('button',{className:'cta-ghost',style:{fontSize:'.75rem',padding:'8px 16px'},disabled:prepHintLoading,onClick:async()=>{

      el('div',{style:{marginTop:26,paddingTop:18,borderTop:'1px solid var(--c-border)',maxWidth:480,marginLeft:'auto',marginRight:'auto',textAlign:'center'}},
        el('div',{style:{fontSize:'.62rem',fontWeight:800,letterSpacing:'.14em',textTransform:'uppercase',color:'var(--c-mid)',marginBottom:10}},'Got your partner or opponent here?'),

            padding:'9px 18px',borderRadius:999,

  );

  // ── SPEECH ──
  if(phase==='speech'){
    const tc=timer.left<=15?'danger':timer.left<=30?'warn':'';
    return el('div',{className:'page'},
      shortcutsOverlay,
    accountOverlay,
      helpFloatingButton,
      el('div',{className:'ambient'}),bar,
      el('div',{className:stageClass,key:'s'+idx},

        // Progress pips
        el('div',{className:'progress-bar'},
          SPEECHES.map((s,i)=>el('div',{key:s.code,className:'pip'+(i<idx?' done':i===idx?' now':'')},
            el('div',{className:'pip-bar'+(i<idx?' done':i===idx?' now':'')}),
            el('div',{className:'pip-code',style:{color:s.side===fmt.sides[0]?'#ef4444':'var(--c-bright)'}},s.code),

        // ── Stage row: motion+context (left) + phase label + orb + timer (right)

        el('div',{className:'speech-stage-row'+((background||generatedBackground)?' split':'')},
          // Resolution display (left col when split). The "Curated case" badge fires when

          el('div',{className:'speech-context'},
            (()=>{const cf=caseFileFor(motion);return el('div',{style:{maxWidth:600,margin:'0 auto 16px',textAlign:'center',position:'relative',zIndex:1}},
              el('div',{style:{fontSize:'.92rem',fontWeight:600,color:'var(--c-text3)',lineHeight:1.4,fontStyle:'italic'}},'"'+motion+'"'),
              cf && el('div',{style:{display:'inline-flex',alignItems:'center',gap:6,marginTop:6,fontSize:'.55rem',fontWeight:800,letterSpacing:'.12em',textTransform:'uppercase',color:'#fca5a5',background:'rgba(239,68,68,.08)',border:'1px solid rgba(239,68,68,.25)',padding:'3px 9px',borderRadius:999}},'★ Curated case'),
              (background||generatedBackground)&&el('div',{style:{fontSize:'.72rem',color:'var(--c-subtle)',marginTop:6,lineHeight:1.5}},
                !background&&generatedBackground?el('span',{style:{fontSize:'.55rem',fontWeight:700,letterSpacing:'.14em',textTransform:'uppercase',color:'rgba(239,68,68,.55)',marginRight:6}},cf?'Background':'Context'):null,
                stripPlainMd(background||generatedBackground)

            )})(),
          ),
          // Right col when split: phase header + orb + timer.

            el('div',{className:'t-label'},isUser?'Your Turn':'AI Speaking'),
            el('div',{className:'t-phase'},cur.code+'. '+cur.name),

            // round so they can pace themselves. First-round audit

            // 'Speech 2 of 4 · then AI rebuts · then ballot'.
            el('div',{
              className:'t-dim',
              style:{fontSize:'.66rem',letterSpacing:'.08em',textTransform:'uppercase',marginBottom:8,opacity:.75},
              title:'Where you are in the round',
            },
              (function(){
                const total = SPEECHES.length;
                const cur1 = idx + 1;
                const remaining = total - cur1;
                const tail = remaining === 0
                  ? 'last speech · then ballot'
                  : remaining === 1
                    ? 'one speech left · then ballot'
                    : (remaining + ' speeches left · then ballot');
                return 'Speech ' + cur1 + ' of ' + total + ' · ' + tail;
              })()
            ),
            el('div',{className:'t-dim',style:{marginBottom:12}},
              isUser?(rec.micAvailable?'Speak now. your voice is being transcribed':rec.micError):
              aiLoading==='voice'?(tts.streamStatus||'Preparing HD voice...'):
              aiLoading?'Writing argument via '+(BRAINS[brain]||BRAINS.claude).name+(isPro()?' Pro':'')+' ... '+aiPct+'%':
              aiError?'AI couldn\'t respond. Advancing in a moment...':
              tts.paused?'Paused':

            // The orb. `interrupted` adds a 1.2s red-flash class so the

              el('div',{className:'orb-glow'+(!isUser||tts.speaking?' on':'')}),
              el('div',{className:'orb-ring'+(isUser?' active':tts.speaking||aiLoading?' active pulse':'')}),
              el('canvas',{className:'orb',ref:orb.ref}),
            ),
            // Timer + pause button. Pause/resume already existed (Spacebar

            el('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',gap:10}},
              el('div',{className:'t-time'+(tc?' '+tc:'')},timer.fmt(timer.left)),
              !isUser && tts.speaking && el('button',{
                onClick:()=>{
                  const wasPaused=tts.paused;
                  tts.togglePause();
                  if(wasPaused) timer.resume();
                  else timer.pause();
                },
                style:{
                  display:'inline-flex',alignItems:'center',gap:8,
                  padding:'8px 18px',borderRadius:999,
                  background:tts.paused?'rgba(239,68,68,.15)':'rgba(255,255,255,.04)',
                  border:'1px solid '+(tts.paused?'rgba(239,68,68,.5)':'var(--c-border2)'),
                  color:tts.paused?'#fca5a5':'var(--c-text)',
                  fontSize:'.74rem',fontWeight:700,letterSpacing:'.08em',textTransform:'uppercase',

                el('span',{'aria-hidden':true,style:{fontSize:'.9rem',lineHeight:1}},tts.paused?'▶':'❚❚'),
                el('span',null,tts.paused?'Resume':'Pause'),
              ),
            ),
          ),
        ),

        // TTS error banner
        !isUser&&tts.ttsError&&el('div',{style:{padding:'8px 14px',background:'rgba(245,158,11,.08)',border:'1px solid rgba(245,158,11,.2)',borderRadius:10,maxWidth:400,margin:'0 auto 12px',fontSize:'.75rem',color:'#f59e0b',textAlign:'center'}},tts.ttsError),

        // AI fetch error banner. Visible whenever the catch block in
        // runSpeech tripped. The screen auto-advances 3.5s after the
        // error; this surface tells the user why instead of leaving them
        // wondering whether to refresh.
        !isUser&&aiError&&el('div',{style:{padding:'10px 14px',background:'rgba(239,68,68,.08)',border:'1px solid rgba(239,68,68,.28)',borderRadius:10,maxWidth:460,margin:'0 auto 12px',fontSize:'.78rem',color:'#fca5a5',textAlign:'center',lineHeight:1.45}},
          el('strong',{style:{display:'block',fontSize:'.66rem',fontWeight:800,letterSpacing:'.12em',textTransform:'uppercase',marginBottom:4}},'AI couldn\'t respond'),
          aiError,
        ),

        // 30s countdown gate before AI begins speaking. Audio is generated and
        // ready to fire, clicking "Start" (or letting the counter hit 0)
        // triggers playback so the user is never ambushed by the AI voice.
        !isUser&&aiCountdown!==null&&el('div',{style:{
          maxWidth:480,margin:'0 auto 16px',padding:'18px 22px',
          background:'rgba(239,68,68,.06)',
          border:'1px solid rgba(239,68,68,.28)',
          borderRadius:14,textAlign:'center',
        }},
          el('div',{style:{fontSize:'.6rem',fontWeight:700,letterSpacing:'.16em',textTransform:'uppercase',color:'#fca5a5',marginBottom:8}},'AI Voice Ready'),
          el('div',{style:{fontSize:'2.4rem',fontWeight:800,color:'#fff',lineHeight:1,marginBottom:4,fontVariantNumeric:'tabular-nums'}},'0:'+String(aiCountdown).padStart(2,'0')),
          el('div',{style:{fontSize:'.78rem',color:'var(--c-text)',marginBottom:14}},'Press Start when you’re ready. Auto-starts at 0:00.'),
          el('button',{
            onClick:startAiSpeechNow,
            style:{
              display:'inline-flex',alignItems:'center',gap:8,
              padding:'12px 32px',borderRadius:999,
              background:'#ef4444',color:'#fff',
              border:'1px solid rgba(239,68,68,.7)',
              fontSize:'.86rem',fontWeight:800,letterSpacing:'.08em',textTransform:'uppercase',
              cursor:'pointer',fontFamily:'inherit',
              boxShadow:'0 6px 18px rgba(239,68,68,.35)',
            },
          },'▶ Start AI speech'),
          // Skip-the-gate opt-out. Persisted across sessions so power users
          // who hate the countdown only have to dismiss it once.
          el('div',{style:{marginTop:10,fontSize:'.66rem',color:'var(--c-dim)'}},
            el('button',{
              onClick:()=>{
                try { localStorage.setItem('debateos-skip-ai-countdown','1'); } catch(e){}
                startAiSpeechNow();
              },
              style:{background:'none',border:'none',color:'var(--c-dim)',cursor:'pointer',fontFamily:'inherit',fontSize:'inherit',textDecoration:'underline',padding:0},
            },'Always skip this countdown'),
          ),
        ),

        // Mic fallback: text input when mic unavailable. First-round
        // users (no history yet) get a starter-outline placeholder so
        // the textarea isn't a blank page — first-round audit found
        // blank-page paralysis was the #1 friction at speech 1.
        isUser&&!rec.micAvailable&&el('textarea',{
          className:'float-input',rows:6,
          placeholder: historyRounds.length===0 && idx===0
            ? 'New here? Try this outline:\n\n1. My main argument is __________\n2. Here\'s why it matters __________\n3. The other side might say __________, but that\'s wrong because __________\n\nReplace the blanks. 60-90 seconds is plenty. The AI judges what you write.'
            : 'Type your argument here...',
          value:rec.transcript,
          onChange:e=>rec.setManualText(e.target.value),
          style:{maxWidth:560,margin:'0 auto 16px',display:'block',fontSize:'.9rem'},
          autoFocus:true,
        }),

        // POI availability indicator during user speech
        isUser&&fmt.poi&&el('div',{style:{fontSize:'.65rem',color:'var(--c-subtle)',textAlign:'center',marginBottom:8}},
          timer.left>(cur.time-60)?'POIs available in '+Math.max(0,timer.left-(cur.time-60))+'s':
          timer.left<60?'POI window closed':
          'POIs are active. opponent may rise'
        ),

        // Adaptive scouting report. show user what the AI detected
        !isUser&&aiLoading&&aiLoading!=='voice'&&log.filter(l=>l.who==='You').length>0&&(()=>{
          const userText=log.filter(l=>l.who==='You').map(l=>l.text).join(' ');
          const detections=[];
          if(!userText.match(/weigh|outweigh|magnitude|probability/gi)) detections.push('No weighing detected');
          if(!userText.match(/even if|grant|concede/gi)) detections.push('No preemption');
          if(!userText.match(/drop|extend|pull through/gi)) detections.push('Not tracking flow');
          if(userText.match(/framework|standard|criterion/gi)?.length>2) detections.push('Framework-heavy');
          if(userText.match(/example|real.?world|instance/gi)?.length>2) detections.push('Example-heavy');
          if(detections.length===0) return null;
          return el('div',{style:{marginTop:8,padding:'8px 14px',background:'rgba(239,68,68,.06)',border:'1px solid rgba(239,68,68,.12)',borderRadius:10,maxWidth:400,margin:'8px auto'}},
            el('div',{style:{fontSize:'.55rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'.12em',color:'rgba(239,68,68,.5)',marginBottom:4}},'AI Scouting Your Style'),
            detections.map((d,i)=>el('div',{key:i,style:{fontSize:'.72rem',color:'var(--c-text)'}},d))
          );
        })(),

        // POI: user can send a POI during AI speech (middle of speech only)
        !isUser&&fmt.poi&&timer.left<(cur.time-60)&&timer.left>60&&el('div',{style:{marginTop:12}},
          !poiActive
            ?el('button',{className:'cta-ghost',onClick:()=>setPoiActive(true),style:{fontSize:'.8rem',padding:'10px 20px'}},'Point of Information')
            :el('div',{style:{display:'flex',gap:8,maxWidth:400,margin:'0 auto'}},
              el('input',{value:poiText,onChange:e=>setPoiText(e.target.value),placeholder:'Your POI...',style:{flex:1,padding:'10px 14px',background:'var(--c-surface3)',border:'1px solid var(--c-border4)',borderRadius:8,color:'var(--fg)',fontSize:'.85rem',fontFamily:'inherit'},onKeyDown:e=>{if(e.key==='Enter')sendPOI()}}),
              el('button',{className:'cta-ghost',onClick:sendPOI,style:{padding:'10px 16px',fontSize:'.8rem',marginTop:0}},'Send'),
            )
        ),

        // POI: AI offers a POI during user speech
        isUser&&poiOffer&&el('div',{style:{position:'fixed',bottom:120,left:'50%',transform:'translateX(-50%)',background:'var(--c-scrim2)',border:'1px solid rgba(239,68,68,.3)',borderRadius:14,padding:'16px 24px',display:'flex',gap:12,alignItems:'center',zIndex:100}},
          el('span',{style:{fontSize:'.85rem',color:'var(--c-bright)'}},'AI offers a Point of Information'),
          el('button',{className:'cta-ghost',onClick:()=>{setPoiOffer(false);acceptAIPOI()},style:{padding:'8px 16px',fontSize:'.78rem',marginTop:0}},'Accept'),

              el('div',{style:{fontSize:'.86rem',fontWeight:700,color:'var(--c-text)',lineHeight:1.4}},

                  el('div',{style:{display:'flex',gap:8,flexWrap:'wrap'}},
                    el('a',{
                      href:publishedRound.url, target:'_blank', rel:'noopener',
                      style:{ display:'inline-flex',alignItems:'center',gap:6, padding:'8px 14px',borderRadius:8, background:'rgba(255,255,255,.06)',border:'1px solid var(--c-border2)', color:'var(--c-text)', fontSize:'.76rem',fontWeight:700,textDecoration:'none', cursor:'pointer' },
                    }, 'Open page →'),
                    el('button',{
                      onClick:async()=>{ try{ await navigator.clipboard.writeText(publishedRound.fullUrl); setPublishStatus('copied'); setTimeout(()=>setPublishStatus('published'),1500); }catch(e){} },
                      style:{ padding:'8px 14px',borderRadius:8, background:'rgba(255,255,255,.06)',border:'1px solid var(--c-border2)', color:'var(--c-text)', fontSize:'.76rem',fontWeight:700,fontFamily:'inherit', cursor:'pointer' },
                    }, publishStatus==='copied' ? '✓ Copied' : 'Copy link'),
                    el('a',{
                      href:'https://api.whatsapp.com/send?text='+encodeURIComponent('I just argued "'+(motion||'').slice(0,80)+'" against an AI. '+publishedRound.fullUrl),
                      target:'_blank', rel:'noopener',
                      style:{ display:'inline-flex',alignItems:'center',gap:6, padding:'8px 14px',borderRadius:8, background:'rgba(37,211,102,.12)',border:'1px solid rgba(37,211,102,.32)', color:'#25D366', fontSize:'.76rem',fontWeight:700,textDecoration:'none', cursor:'pointer' },

          ),
        ),
        flowSheet && el('div',{style:{marginTop:12}},
          el('div',{style:{display:'flex',justifyContent:'center',gap:10,marginBottom:8}},
            el('button',{className:'transcript-btn',style:{fontSize:'.65rem'},onClick:()=>{navigator.clipboard.writeText(flowSheet).catch(()=>{})}},'Copy flow'),
            !flowLoading&&el('button',{className:'transcript-btn',style:{fontSize:'.65rem'},onClick:()=>genFlowSheet(log)},'Re-flow'),
          ),
          el('div',{className:'transcript-box'+(flowLoading?' type-stream-active':''),style:{maxHeight:480,whiteSpace:'pre-wrap',fontFamily:'ui-monospace, Menlo, monospace',fontSize:'.78rem',lineHeight:1.6}},flowSheet),
        ),

        // Multi-round pattern analysis. Only appears once the user has
        // actually debated enough for patterns to exist (3+ rounds);
        // before that the button would produce unreliable diagnoses.
        historyRounds && historyRounds.length >= 3 && el('div',{id:'fb-patterns',style:{marginTop:20,textAlign:'center',scrollMarginTop:80}},
          !patterns && !patternsLoading && el('button',{
            className:'cta-ghost',
            style:{fontSize:'.78rem'},
            onClick:genPatterns,
          },'Find patterns across your last '+Math.min(historyRounds.length,12)+' rounds'),
          patternsLoading && el('div',{style:{fontSize:'.78rem',color:'var(--c-muted)'}},
            el('span',{className:'spinner',style:{marginRight:8}}),
            'Coaching across your history…'
          ),
        ),
        patterns && el('div',{style:{marginTop:12}},
          el('div',{style:{display:'flex',justifyContent:'center',gap:10,marginBottom:8}},
            el('button',{className:'transcript-btn',style:{fontSize:'.65rem'},onClick:()=>{navigator.clipboard.writeText(patterns).catch(()=>{})}},'Copy patterns'),
            !patternsLoading&&el('button',{className:'transcript-btn',style:{fontSize:'.65rem'},onClick:genPatterns},'Re-analyze'),
          ),
          el('div',{className:'transcript-box'+(patternsLoading?' type-stream-active':''),style:{maxHeight:520,whiteSpace:'pre-wrap',fontSize:'.82rem',lineHeight:1.65}},patterns),
          // 'Train this' drill launcher, converts the diagnosis into a
          // round designed to force the user into their weakness.
          el('div',{id:'fb-drill',style:{marginTop:14,textAlign:'center',scrollMarginTop:80}},
            !drillPlan && !drillLoading && el('button',{
              className:'cta-ghost',
              style:{fontSize:'.78rem'},
              onClick:genDrillPlan,
            },'Build a round that drills this'),
            drillLoading && el('div',{style:{fontSize:'.78rem',color:'var(--c-muted)'}},
              el('span',{className:'spinner',style:{marginRight:8}}),
              'Designing your drill round…'
            ),
          ),
          drillPlan && !drillPlan.error && el('div',{style:{marginTop:12,padding:'18px 20px',background:'rgba(239,68,68,.06)',border:'1px solid rgba(239,68,68,.24)',borderRadius:14,maxWidth:560,margin:'12px auto 0',textAlign:'left'}},
            el('div',{style:{fontSize:'.58rem',fontWeight:800,textTransform:'uppercase',letterSpacing:'.14em',color:'#ef4444',marginBottom:10}},'Drill round proposal'),
            el('div',{style:{fontSize:'.95rem',fontWeight:700,lineHeight:1.4,marginBottom:8,color:'var(--c-bright)'}},'"'+(drillPlan.motion||'')+'"'),
            el('div',{style:{fontSize:'.76rem',color:'var(--c-text3)',marginBottom:10}},
              (FORMATS[drillPlan.format]?.name||drillPlan.format||'apda'),
              ' · You play ',
              (FORMATS[drillPlan.format]||FORMATS.apda).sideLabels[drillPlan.side]||drillPlan.side,
              (Array.isArray(drillPlan.traits)&&drillPlan.traits.length?' · AI loaded with: '+drillPlan.traits.map(t=>STRENGTHS[t]?.label||t).join(', '):''),
            ),
            drillPlan.why && el('div',{style:{fontSize:'.8rem',color:'var(--c-text4)',fontStyle:'italic',lineHeight:1.55,marginBottom:14,paddingLeft:10,borderLeft:'2px solid rgba(239,68,68,.4)'}},drillPlan.why),
            el('div',{style:{display:'flex',gap:10,flexWrap:'wrap',justifyContent:'flex-end'}},
              el('button',{className:'cta-ghost',style:{fontSize:'.74rem',padding:'8px 14px',marginTop:0},onClick:()=>setDrillPlan(null)},'Skip'),
              el('button',{className:'cta',style:{fontSize:'.78rem',padding:'9px 18px',marginTop:0},onClick:useDrillPlan},'Start this round →'),
            ),
          ),
          drillPlan && drillPlan.error && el('div',{style:{marginTop:12,padding:'10px 14px',background:'rgba(239,68,68,.08)',border:'1px solid rgba(239,68,68,.2)',borderRadius:10,fontSize:'.78rem',color:'#fca5a5',textAlign:'center',maxWidth:480,margin:'12px auto 0'}},drillPlan.error),
        ),

        el('div',{id:'fb-transcript',style:{scrollMarginTop:80}}),
        el('button',{className:'transcript-btn',style:{marginTop:28},onClick:()=>setShowTx(!showTx)},showTx?'▼ Hide round transcript':'▶ Show round transcript'),
        showTx&&el('div',{className:'transcript-box',style:{maxHeight:360}},log.map(l=>'['+l.code+'. '+l.who+']\n'+l.text).join('\n\n---\n\n')),

        el('div',{className:'row-c',style:{marginTop:28,flexWrap:'wrap'}},
          el('button',{className:'cta-ghost',onClick:copyAll},'Copy'),
          el('button',{className:'cta-ghost',onClick:()=>downloadRound(motion,format,side,log,feedback,ballot)},'⬇ Download .txt'),
          el('button',{className:'cta-ghost',onClick:genShareCard,disabled:shareBusy,title:'Generate a shareable PNG of this round'},shareBusy?'Rendering…':'📸 Share card'),
          el('button',{className:'cta-ghost',onClick:()=>saveCase(),style:caseSaved?{background:'rgba(34,197,94,.15)',borderColor:'#22c55e',color:'#22c55e'}:{}},caseSaved?'Case Saved':'Save Case'),
          // Publish-to-/disclosures button. Only enabled for signed-in
          // users; pending shows a spinner-style label; published flips
          // green and links to the live disclosure board so the user
          // can verify the post landed.
          user && el('button',{
            className:'cta-ghost',
            onClick:casePublished==='published'?(()=>window.open('/community','_blank')):publishToDisclosures,
            disabled:casePublished==='pending',
            title:casePublished==='published'?'Open /community in a new tab':'Share this AI case publicly on the community board',
            style:casePublished==='published'?{background:'rgba(34,197,94,.15)',borderColor:'#22c55e',color:'#22c55e'}:casePublished==='pending'?{opacity:.6}:{},
          }, casePublished==='pending'?'Publishing…':casePublished==='published'?'✓ Published · view':'🌐 Publish to Community'),
          el('button',{className:'cta',style:{marginTop:0},onClick:newRound},'New Round'),
        ),
      )
    );
  }

  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(el(App));
</script>
