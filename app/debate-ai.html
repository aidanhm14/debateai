/* ── View Transitions: matches landing.html so /debate-ai feels continuous */
@view-transition { navigation: auto; }
::view-transition-old(root),
::view-transition-new(root) { animation-duration: 280ms; animation-timing-function: cubic-bezier(.22,.9,.32,1); }
::view-transition-old(root) { animation-name: vt-fade-out }
::view-transition-new(root) { animation-name: vt-fade-in }
@keyframes vt-fade-out { to { opacity:0; transform:translateY(-6px) } }
@keyframes vt-fade-in  { from { opacity:0; transform:translateY(8px) } }

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow-x:hidden}
:root{
  --bg:#1a1a1e;--fg:#f5f5f7;
  --c-faint:rgba(255,255,255,.15);--c-dim:rgba(255,255,255,.2);
  --c-subtle:rgba(255,255,255,.25);--c-muted:rgba(255,255,255,.3);
  --c-mid:rgba(255,255,255,.35);--c-text:rgba(255,255,255,.4);
  --c-text2:rgba(255,255,255,.45);--c-text3:rgba(255,255,255,.5);
  --c-text4:rgba(255,255,255,.6);--c-bright:rgba(255,255,255,.7);
  --c-surface:rgba(255,255,255,.03);--c-surface2:rgba(255,255,255,.04);
  --c-surface3:rgba(255,255,255,.06);--c-surface4:rgba(255,255,255,.08);
  --c-border:rgba(255,255,255,.06);--c-border2:rgba(255,255,255,.08);
  --c-border3:rgba(255,255,255,.1);--c-border4:rgba(255,255,255,.15);
  --c-border5:rgba(255,255,255,.22);
  --c-scrim:rgba(0,0,0,.6);--c-scrim2:rgba(0,0,0,.92);
}
[data-lighting="light"]{
  /* Light-theme contrast pass. Was: text vars maxed at .7 alpha black
     on cream — body text at .4 alpha was ~2.5:1 contrast against
     #f5f5f0, well under WCAG AA's 4.5:1. The dark-theme values were
     authored at the same alphas but white-on-black is much more
     forgiving. Bumped each tier so the modal + every light-theme
     surface reads cleanly. Borders also bumped so card edges show. */
  --bg:#f5f5f0;--fg:#1a1a1e;
  --c-faint:rgba(0,0,0,.18);--c-dim:rgba(0,0,0,.28);
  --c-subtle:rgba(0,0,0,.42);--c-muted:rgba(0,0,0,.55);
  --c-mid:rgba(0,0,0,.62);--c-text:rgba(0,0,0,.75);
  --c-text2:rgba(0,0,0,.78);--c-text3:rgba(0,0,0,.82);
  --c-text4:rgba(0,0,0,.86);--c-bright:rgba(0,0,0,.92);
  --c-surface:rgba(0,0,0,.025);--c-surface2:rgba(0,0,0,.045);
  --c-surface3:rgba(0,0,0,.07);--c-surface4:rgba(0,0,0,.09);
  --c-border:rgba(0,0,0,.12);--c-border2:rgba(0,0,0,.16);
  --c-border3:rgba(0,0,0,.2);--c-border4:rgba(0,0,0,.28);
  --c-border5:rgba(0,0,0,.36);
  --c-scrim:rgba(245,245,240,.7);--c-scrim2:rgba(245,245,240,.97);
}
body{
  font-family:'Inter',system-ui,sans-serif;
  background:var(--bg);color:var(--fg);
  -webkit-font-smoothing:antialiased;
}
#root{min-height:100vh}

/* ── Ambient ───────────────────────── */
.ambient{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 60% 50% at 50% 45%,rgba(239,68,68,.06),transparent 70%);
}
.ambient::after{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle 400px at 30% 70%,rgba(239,68,68,.03),transparent);
}


/* ── Page ──────────────────────────── */
.page{
  position:relative;z-index:1;min-height:100vh;
  display:flex;flex-direction:column;
}

/* ── Top Bar ───────────────────────── */
.bar{
  position:fixed;top:0;left:0;right:0;z-index:50;
  padding:20px 32px;display:flex;align-items:center;justify-content:space-between;
}
.bar-logo{font-size:1.45rem;font-weight:900;color:#f5f5f7;text-decoration:none;letter-spacing:-.025em;opacity:.95;transition:opacity .2s,transform .2s;line-height:1}
.bar-logo:hover{opacity:1;transform:translateY(-1px)}
.bar-logo em{color:#ef4444;font-style:normal;font-weight:900}
.bar-links{display:flex;gap:20px;align-items:center;flex-wrap:wrap}
.bar-links a{font-size:.72rem;font-weight:500;color:rgba(255,255,255,.35);text-decoration:none;text-transform:uppercase;letter-spacing:.08em;transition:color .2s}
.bar-links a:hover{color:rgba(255,255,255,.7)}

/* ── Center Stage ──────────────────── */
.center{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:100px 24px 60px;text-align:center;
  transition:opacity .4s ease,transform .4s ease;
}
.center.entering{opacity:0;transform:scale(.97) translateY(12px)}
.center.visible{opacity:1;transform:scale(1) translateY(0)}

/* ── Typography ────────────────────── */
.t-hero{
  font-size:clamp(3rem,8vw,6rem);font-weight:900;letter-spacing:-.05em;
  line-height:.9;margin-bottom:16px;
}
.t-hero em{font-style:normal;color:#ef4444}
.t-sub{
  font-size:clamp(.9rem,2vw,1.1rem);font-weight:300;color:rgba(255,255,255,.4);
  max-width:400px;line-height:1.5;margin:0 auto 48px;
}
.t-label{
  font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.16em;
  color:#ef4444;margin-bottom:12px;
}
.t-phase{
  font-size:clamp(1.4rem,3.5vw,2rem);font-weight:800;letter-spacing:-.03em;
  margin-bottom:4px;
}
.t-dim{color:rgba(255,255,255,.35);font-size:.85rem;font-weight:400}
.t-time{
  font-size:clamp(3.2rem,8vw,5rem);font-weight:200;letter-spacing:.02em;
  font-variant-numeric:tabular-nums;line-height:1;
}
.t-time.warn{color:#f59e0b}
.t-time.danger{color:#ef4444}

/* ── Input (floating, minimal) ─────── */
.float-input{
  width:100%;max-width:480px;background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);border-radius:16px;
  padding:20px 22px;color:#f5f5f7;font-size:1rem;font-family:inherit;
  outline:none;transition:border-color .2s;line-height:1.5;
  /* Vertical resize handle — users with long motions / extensive prep
     notes need room to write. min-height keeps the input visually
     anchored, max-height stops a runaway drag from pushing the page
     into nonsense. The handle appears in the bottom-right corner of
     the textarea automatically (browser default for resize:vertical). */
  resize:vertical;
  min-height:64px;
  max-height:80vh;
}
.float-input:focus{border-color:rgba(239,68,68,.4)}
.float-input::placeholder{color:rgba(255,255,255,.2)}
/* Style the resize grip so it matches the dark theme. WebKit only —
   Firefox uses a built-in indicator that respects the surrounding
   color so it already blends. */
.float-input::-webkit-resizer{
  background:linear-gradient(135deg, transparent 50%, rgba(239,68,68,.4) 50%);
  border-bottom-right-radius:14px;
}

/* ── Pills ─────────────────────────── */
.pills{display:flex;gap:8px;justify-content:center;margin:12px 0;flex-wrap:wrap;max-width:780px;margin-left:auto;margin-right:auto}
.pill{
  padding:10px 16px;border-radius:100px;border:1.5px solid rgba(255,255,255,.28);
  background:rgba(255,255,255,.04);color:rgba(255,255,255,.78);font-size:.78rem;font-weight:700;
  cursor:pointer;transition:all .2s;font-family:inherit;letter-spacing:.04em;white-space:nowrap;
}
.pill:hover{border-color:rgba(255,255,255,.5);color:#fff;background:rgba(255,255,255,.08)}
.pill.on{border-color:#ef4444;color:#fff;background:rgba(239,68,68,.22);box-shadow:0 0 0 1px rgba(239,68,68,.4)}

/* ── WPM Slider ────────────────────── */
.wpm{display:flex;align-items:center;gap:16px;margin:20px auto;max-width:320px;width:100%}
.wpm input[type=range]{flex:1;accent-color:#ef4444;height:2px;opacity:.6}
.wpm span{font-size:.75rem;color:rgba(255,255,255,.3);font-weight:500}
.wpm strong{font-size:.8rem;color:rgba(255,255,255,.6);font-weight:700;min-width:65px;text-align:right}

/* ── CTA Button ────────────────────── */
.cta{
  padding:16px 48px;border:none;border-radius:100px;
  background:#ef4444;color:#fff;font-size:.9rem;font-weight:700;
  text-transform:uppercase;letter-spacing:.06em;cursor:pointer;
  transition:transform .2s,box-shadow .2s,opacity .2s;font-family:inherit;
  margin-top:32px;
}
.cta:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(239,68,68,.25)}
.cta:disabled{opacity:.25;cursor:not-allowed;transform:none;box-shadow:none}
.cta-ghost{
  padding:12px 32px;border:1px solid rgba(255,255,255,.1);border-radius:100px;
  background:transparent;color:rgba(255,255,255,.4);font-size:.82rem;font-weight:600;
  cursor:pointer;transition:all .2s;font-family:inherit;margin-top:12px;
}
.cta-ghost:hover{border-color:rgba(255,255,255,.25);color:rgba(255,255,255,.7)}

/* ── In-round side panel (Notes / Flow / Cases) ────────
   Tablet+ (≥768px): slim fixed sidebar on the right edge, narrow
   enough to not crowd the orb / timer or eat the topbar.
   Mobile: full-width sheet at the bottom of the stage so it stays
   one-handed reachable. */
.round-panel{
  position:fixed;top:96px;right:14px;bottom:18px;
  width:min(280px, calc(100vw - 28px));
  background:rgba(20,20,24,.92);
  border:1px solid var(--c-border2);
  border-radius:12px;
  padding:10px 12px;
  display:flex;flex-direction:column;gap:8px;
  z-index:30;
  box-shadow:0 10px 32px rgba(0,0,0,.32);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  overflow:hidden;
  animation:roundPanelIn .18s ease-out;
}
@keyframes roundPanelIn{
  from{transform:translateX(12px);opacity:0}
  to{transform:translateX(0);opacity:1}
}
.round-panel-head{
  display:flex;align-items:center;justify-content:space-between;
  padding-bottom:6px;border-bottom:1px solid var(--c-border);
  margin:-2px -2px 0;
}
.round-panel-title{
  font-size:.6rem;font-weight:800;letter-spacing:.14em;
  text-transform:uppercase;color:var(--c-subtle);
  padding-left:4px;
}
.round-panel-close{
  background:transparent;border:none;color:var(--c-subtle);
  font-size:1.1rem;line-height:1;width:22px;height:22px;
  border-radius:10px;cursor:pointer;font-family:inherit;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s,color .15s;
}
.round-panel-close:hover{background:rgba(255,255,255,.06);color:var(--c-text)}
.round-panel-textarea{
  flex:1;min-height:180px;width:100%;
  font-size:.82rem;line-height:1.5;padding:8px 10px;
  /* Resize allowed inside the side panel too — overrides the
     resize:none that previously locked this textarea to 180px tall.
     max-height capped to the panel's height so dragging doesn't
     overflow the surrounding card layout. */
  resize:vertical;
  max-height:70vh;
}
.round-panel-body{
  flex:1;overflow-y:auto;font-size:.78rem;line-height:1.5;
  padding-right:2px;
}
@media(max-width:767px){
  /* On phones the right rail isn't reachable one-handed and the orb
     dominates the viewport, so dock the panel at the bottom of the
     stage as a full-width sheet instead of an over-the-top slab. */
  .round-panel{
    position:fixed;top:auto;left:0;right:0;bottom:0;
    width:100%;
    border-radius:16px 16px 0 0;
    max-height:55vh;
    animation:roundPanelInBottom .18s ease-out;
  }
  @keyframes roundPanelInBottom{
    from{transform:translateY(16px);opacity:0}
    to{transform:translateY(0);opacity:1}
  }
}
[data-lighting="light"] .round-panel{
  background:rgba(250,250,247,.94);
  border-color:rgba(0,0,0,.08);
  box-shadow:0 10px 32px rgba(0,0,0,.10);
}

/* ── The Orb (waveform) ────────────── */
.orb-wrap{
  position:relative;width:280px;height:280px;margin:0 auto 32px;
  display:flex;align-items:center;justify-content:center;
}
.orb-glow{
  position:absolute;inset:-40px;border-radius:50%;
  background:radial-gradient(circle,rgba(239,68,68,.08),transparent 70%);
  transition:opacity .5s;opacity:0;
}
.orb-glow.on{opacity:1}
.orb-ring{
  position:absolute;inset:0;border-radius:50%;
  border:1px solid rgba(255,255,255,.06);transition:all .5s;
}
.orb-ring.active{border-color:rgba(239,68,68,.3);box-shadow:0 0 60px rgba(239,68,68,.1)}
.orb-ring.pulse{animation:orbPulse 2s ease-in-out infinite}
@keyframes orbPulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.04);opacity:.7}}
@keyframes live-dot-pulse{0%,100%{opacity:.55;transform:scale(.92)}50%{opacity:1;transform:scale(1.18)}}
/* Speech-stage split layout, when there is a background/context for
   the motion, the orb moves to the right column and the
   resolution+context block sits on the left so the user can see both
   at once instead of scrolling top-down. Below the row, everything
   else (mic fallback, POI, scouting, WPM slider, controls, in-round
   tools) flows full-width. Mobile collapses to a stack with the orb
   on top so the spoken-game feel comes first. */
.speech-stage-row{display:flex;flex-direction:column;align-items:center;gap:8px;width:100%}
@media(min-width:900px){
  .speech-stage-row.split{
    display:grid;
    grid-template-columns:minmax(0,1fr) minmax(0,1fr);
    gap:16px 56px;
    align-items:center;
    max-width:1180px;
    margin:0 auto;
  }
  .speech-stage-row.split .speech-context{text-align:left;max-width:none;margin:0;justify-self:end;width:100%}
  .speech-stage-row.split .speech-context > div{text-align:left}
  .speech-stage-row.split .speech-orb-block{display:flex;flex-direction:column;align-items:center;gap:10px;justify-self:start;width:100%}
}
@media(max-width:899px){
  .speech-stage-row.split .speech-orb-block{order:-1}
  .speech-stage-row.split .speech-context{margin-top:8px}
}
canvas.orb{width:220px;height:220px;border-radius:50%}
/* Interrupt flash. Brief red bloom + slight contraction so the cut-off
   reads as a hard stop, not a smooth fade. .interrupted class is set
   on the orb-wrap for ~1.2s by the React handler, then cleared. */
.orb-wrap.interrupted{animation:orbInterrupt 1.2s cubic-bezier(.4,0,.2,1) 1}
@keyframes orbInterrupt{
  0%   {filter:none;transform:scale(1)}
  10%  {filter:drop-shadow(0 0 22px rgba(239,68,68,.7)) brightness(1.25);transform:scale(.96)}
  35%  {filter:drop-shadow(0 0 18px rgba(239,68,68,.5)) brightness(1.15);transform:scale(1.01)}
  100% {filter:none;transform:scale(1)}
}

/* ── Speech Progress ───────────────── */
.progress-bar{display:flex;gap:8px;justify-content:center;margin-bottom:40px}
.pip{display:flex;flex-direction:column;align-items:center;gap:6px}
.pip-bar{width:40px;height:4px;border-radius:2px;background:rgba(255,255,255,.06);transition:.3s}
.pip-bar.done{background:#ef4444}
.pip-bar.now{background:#ef4444;box-shadow:0 0 12px rgba(239,68,68,.4)}
.pip-code{font-size:.6rem;font-weight:600;color:rgba(255,255,255,.2);text-transform:uppercase;letter-spacing:.06em}
.pip.done .pip-code{color:rgba(239,68,68,.5)}
.pip.now .pip-code{color:#ef4444}

/* ── Transcript ────────────────────── */
.transcript-btn{
  background:none;border:none;color:rgba(255,255,255,.2);font-size:.72rem;
  font-weight:600;cursor:pointer;font-family:inherit;text-transform:uppercase;
  letter-spacing:.08em;margin-top:24px;transition:color .2s;
}
.transcript-btn:hover{color:rgba(255,255,255,.5)}
.transcript-box{
  width:100%;max-width:min(96vw,1200px);max-height:min(72vh,820px);overflow-y:auto;margin:12px auto 0;
  background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);
  border-radius:14px;padding:28px 36px;text-align:left;
  font-size:.95rem;line-height:1.75;color:rgba(255,255,255,.82);white-space:pre-wrap;
}

/* ── Feedback Card ─────────────────── */
.fb-card{
  width:100%;max-width:600px;text-align:left;
  background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);
  border-radius:18px;padding:32px;margin:24px auto 0;
}
.fb-card .feedback-text{color:rgba(255,255,255,.5);font-size:.88rem;line-height:1.75;white-space:pre-wrap}

/* ── Controls Row ──────────────────── */
.row-c{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:20px}
/* Sticky speech controls on phones. Without this, scrolling up to re-read
   the motion or scout the transcript pushes End Speech / Interrupt off
   screen — there's no keyboard fallback on touch devices. The wrapper
   stays pinned to the bottom of the viewport during the speech phase
   with a subtle bg fade so content scrolling behind stays readable. */
@media(max-width:640px){
  .speech-controls-mobile-sticky{
    position:sticky;bottom:8px;z-index:25;
    padding-top:14px;padding-bottom:6px;
    background:linear-gradient(to top, var(--bg) 55%, transparent);
    -webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);
    margin-top:12px;
  }
}

/* ── Limit Warning ─────────────────── */
.limit-warn{font-size:.78rem;color:#ef4444;margin-top:16px;opacity:.7}
.limit-warn a{color:#ef4444;text-decoration:underline}

/* ── Scroll affordance for transcript boxes ── */
.transcript-box{
  position:relative;
}
/* Bottom-fade scroll hint. Was on ::after, but type-stream-active also
   uses ::after for the ▋ blinking cursor; when both classes were on the
   same element, only one pseudo could render. Moving the gradient to
   ::before frees ::after for the cursor without losing the affordance. */
.transcript-box::before{
  content:'';position:absolute;bottom:0;left:0;right:0;height:20px;
  background:linear-gradient(transparent,rgba(0,0,0,.25));pointer-events:none;
  border-radius:0 0 12px 12px;opacity:.6;z-index:1;
}
.transcript-box::-webkit-scrollbar{width:4px}
.transcript-box::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:4px}

/* ── Speech phase buttons. bigger touch targets ── */
.speech-btn{min-height:48px;min-width:120px;font-size:.88rem !important;padding:14px 28px !important}

/* ── Session recovery banner ── */
.recovery-banner{
  padding:16px 20px;background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.2);
  border-radius:14px;max-width:480px;margin:0 auto 20px;text-align:center;
}

/* ── Responsive ──────────────────────
   On mobile the 4 secondary nav links (Home / High School / Learn / About)
   + the lighting toggle wrap to 2 rows and collide with the sign-in button.
   Hide them and show only logo + auth to keep the top bar clean.
   Users can still reach those pages from the footer or landing. */
.sign-btn-short{display:none}
@media(max-width:640px){
  /* Hide most secondary nav on phones to keep the bar tidy, but KEEP
     the Leaderboard link reachable — it's a discovery path the user
     would otherwise have to leave the page to find. The .bar-link-keep
     class opts a single link out of the global hide. */
  .bar-link-secondary:not(.bar-link-keep){display:none!important}
  .bar-link-secondary.bar-link-keep{
    /* Compact label so it fits next to the sign-in pill on phones. */
    font-size:.66rem;letter-spacing:.04em;
    padding:10px 6px; /* ~44px tap target */
  }
  .sign-btn-full{display:none}
  .sign-btn-short{display:inline}
  .bar{padding:14px 16px}
  .bar-links{gap:12px}
  .bar-links button,.bar-links .sign-btn,.bar-links a{min-height:44px;display:inline-flex;align-items:center}
  .bar-links button.bar-link-secondary{min-width:44px}
  .center{padding:80px 16px 112px}  /* bottom padding reserves space for sticky CTA */
  .orb-wrap{width:200px;height:200px}

  .float-input{padding:16px}
  .cta{padding:16px 36px;font-size:.88rem;min-height:48px}
  /* Sticky Start Round on the setup screen. thumb-reachable even after
     the user scrolls past the format/traits selectors. Only the setup
     Start button gets this class; other .cta buttons keep their layout. */
  .cta-setup-sticky{
    position:sticky;bottom:16px;z-index:30;
    box-shadow:0 10px 28px rgba(0,0,0,.55), 0 0 0 1px rgba(255,255,255,.06) inset;
  }
  .pill{padding:12px 18px;font-size:.8rem;min-height:44px}
  .cta-ghost{padding:14px 28px;min-height:48px}
  .speech-btn{min-height:56px;min-width:140px;font-size:.95rem !important;padding:16px 32px !important}

  .pip-code{font-size:.72rem}

  .pip-bar{width:28px}
  .kb-hint{display:none}

<!-- Language picker (mirrors landing.html). Lazy-loads Google Translate
     only when a non-English locale is set, so English users pay no cost. -->
<style>
  /* Default: hidden offscreen until JS moves it into the React-rendered
     .bar-links cluster (top-right next to Light/Dark, About, Sign up).
     Putting it there avoids overlapping the bar-logo on the left. */
  .lang-picker{position:absolute;left:-9999px;top:-9999px;font-family:inherit}
  .lang-picker.in-nav{position:static;left:auto;top:auto;display:inline-flex;align-items:center}
  .lang-picker select{
    appearance:none;-webkit-appearance:none;
    padding:6px 22px 6px 10px;border-radius:14px;
    background:rgba(0,0,0,.6) url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 12 8' fill='none' stroke='%23fff' stroke-width='1.5'><polyline points='1.5 2 6 6 10.5 2'/></svg>") no-repeat right 6px center / 9px;
    color:#fff;border:1px solid rgba(255,255,255,.18);
    font-size:.72rem;font-weight:600;letter-spacing:.02em;
    cursor:pointer;font-family:inherit;
  }
  .lang-picker select:hover{border-color:rgba(255,255,255,.35)}
  /* Tight viewports, narrower picker so it fits the topbar without
     crowding the Sign-up pill, but still shows the flag + abbreviation. */
  @media(max-width:720px){
    .lang-picker select{font-size:.66rem;padding:5px 18px 5px 6px;letter-spacing:0}
  }
  .goog-te-banner-frame.skiptranslate,.goog-te-gadget-icon{display:none!important}
  body{top:0!important}
  .goog-tooltip,.goog-tooltip:hover{display:none!important}
  .goog-text-highlight{background:transparent!important;box-shadow:none!important}
  #google_translate_element{display:none}
</style>
<div class="lang-picker">
  <select id="langPickerSel" aria-label="Change language">
    <option value="en">🇺🇸 English</option>
    <option value="es">🇪🇸 Español</option>
    <option value="fr">🇫🇷 Français</option>
    <option value="de">🇩🇪 Deutsch</option>
    <option value="zh">🇨🇳 中文</option>
    <option value="ko">🇰🇷 한국어</option>
    <option value="hi">🇮🇳 हिन्दी</option>
  </select>
</div>
<div id="google_translate_element"></div>
<script>
(function(){
  var KEY='debateos-locale';
  function setCookie(n,v,d){document.cookie=n+'='+v+'; path=/'+(d?'; domain='+d:'');}
  function clearCookie(n,d){document.cookie=n+'=; path=/; expires=Thu, 01 Jan 1970 00:00:00 UTC'+(d?'; domain='+d:'');}
  window.__setLang=function(lang){
    var host=location.hostname,bare=host.replace(/^www\./,'');
    clearCookie('googtrans');clearCookie('googtrans','.'+host);clearCookie('googtrans','.'+bare);
    if(lang&&lang!=='en'){
      var v='/en/'+lang;
      setCookie('googtrans',v);setCookie('googtrans',v,'.'+host);setCookie('googtrans',v,'.'+bare);
      try{localStorage.setItem(KEY,lang)}catch(e){}
    }else{try{localStorage.removeItem(KEY)}catch(e){}}
    location.reload();
  };
  window.googleTranslateElementInit=function(){
    new google.translate.TranslateElement({pageLanguage:'en',autoDisplay:false,layout:google.translate.TranslateElement.InlineLayout.SIMPLE},'google_translate_element');
  };
  document.addEventListener('DOMContentLoaded',function(){
    var sel=document.getElementById('langPickerSel');
    var saved='en';try{saved=localStorage.getItem(KEY)||'en'}catch(e){}
    if(sel){sel.value=saved;sel.addEventListener('change',function(){window.__setLang(sel.value)});}
    // Move the picker into the React-rendered .bar-links cluster so it
    // sits next to Light/Dark / Home / High School / Sign up, not on
    // top of the bar-logo. React mounts on a timer, so we poll briefly
    // until .bar-links exists.
    var pickerWrap = document.querySelector('.lang-picker');
    var attempts = 0;
    function tryMount(){
      var barLinks = document.querySelector('.bar-links');
      if (pickerWrap && barLinks) {
        pickerWrap.classList.add('in-nav');
        // Insert before the user/sign-in chunk (last child) so it sits
        // after the secondary nav but before the auth pill.
        var lastChild = barLinks.lastElementChild;
        if (lastChild) barLinks.insertBefore(pickerWrap, lastChild);
        else barLinks.appendChild(pickerWrap);
        return true;
      }
      return false;
    }
    if (!tryMount()) {
      var poll = setInterval(function(){
        attempts++;
        if (tryMount() || attempts > 40) clearInterval(poll);
      }, 75);
    }
    if(saved&&saved!=='en'){
      var s=document.createElement('script');
      s.src='https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit';
      s.async=true;document.head.appendChild(s);
    }
  });
})();
</script>

<!-- Shared topbar — same nav across /landing, /debate-ai, /learn,
     /high-school. The user-slot hook below lets
     /debate-ai inject its app-specific Account modal trigger. -->
<script>
  // Bridge between the shared topbar's user slot and the React-rendered
  // Account modal. window.__daOpenAccount is wired by React after mount.
  window.daTopbarUserSlot = function(slot, u){
    slot.innerHTML = '';
    slot.style.fontSize = '.72rem';
    slot.style.color = 'var(--fg)';
    if (u.photoURL){
      var img = document.createElement('img');
      img.src = u.photoURL;
      img.alt = '';
      img.style.cssText = 'width:24px;height:24px;border-radius:50%;border:1px solid var(--c-border4);cursor:pointer';
      img.addEventListener('click', function(){ if(window.__daOpenAccount) window.__daOpenAccount(); });
      slot.appendChild(img);
    }
    var name = document.createElement('span');
    name.textContent = (u.displayName || u.email || '').split(/\s+/)[0] || '';
    name.style.cursor = 'pointer';
    name.addEventListener('click', function(){ if(window.__daOpenAccount) window.__daOpenAccount(); });
    slot.appendChild(name);
    var acct = document.createElement('button');
    acct.type = 'button';
    acct.textContent = 'Account';
    acct.title = 'Account & API key';
    acct.style.cssText = 'font-size:.65rem;color:var(--fg);background:none;border:1px solid var(--c-border4);border-radius:14px;padding:3px 10px;cursor:pointer;font-family:inherit';
    acct.addEventListener('click', function(){ if(window.__daOpenAccount) window.__daOpenAccount(); });
    slot.appendChild(acct);
    var out = document.createElement('button');
    out.type = 'button';
    out.textContent = 'Sign out';
    out.style.cssText = 'background:transparent;border:none;color:var(--c-bright);cursor:pointer;font-family:inherit;font-size:.7rem;padding:0';
    out.addEventListener('click', function(){
      try { window.firebase.auth().signOut(); } catch(e){}
    });
    slot.appendChild(out);
  };
</script>

<!-- Page-local theme picker. Three dots, fixed bottom-right. Restores
     the grey / crimson / light toggle that was removed from the shared
     topbar 2026-05-10 — scoped to /debate-ai only so the topbar stays
     brand-clean elsewhere. Writes `da-theme` (global) and
     `debateos-lighting` (page-local) in lockstep so the two color
     systems can't disagree on the next paint. -->
<div class="dai-theme-dots" role="group" aria-label="Theme">
  <button type="button" class="theme-dot" data-t="grey"    aria-label="Grey theme"    title="Grey"></button>
  <button type="button" class="theme-dot" data-t="crimson" aria-label="Crimson theme" title="Crimson"></button>
  <button type="button" class="theme-dot" data-t="light"   aria-label="Light theme"   title="Light"></button>
</div>
<script>
(function(){
  var dots = document.querySelectorAll('.dai-theme-dots .theme-dot');
  function sync(t){

  }
  var current = '';
  try { current = localStorage.getItem('da-theme') || ''; } catch(e){}
  if (!current) current = document.documentElement.getAttribute('data-theme') || 'crimson';
  sync(current);
  // Swap in place — no reload. The page reads color from
  // [data-theme] / [data-lighting] attributes at runtime, so updating
  // the attrs is enough; ui.css tokens recascade and the page-local
  // [data-lighting="light"] block fires immediately.
  dots.forEach(function(dot){
    dot.addEventListener('click', function(){
      var t = dot.getAttribute('data-t');
      var lighting = (t === 'light') ? 'light' : 'dark';
      try {
        localStorage.setItem('da-theme', t);
        localStorage.setItem('debateos-lighting', lighting);
      } catch(e){}
      var html = document.documentElement;
      html.setAttribute('data-theme', t);
      html.setAttribute('data-lighting', lighting);
      sync(t);
      try { dot.blur(); } catch(e){}
    });
  });

<script>
  // Recovery wiring — fires the "Hard reload" path that wipes the SW
  // and asks for a fresh navigation. Runs OUTSIDE the babel block so
  // even a babel-syntax error still leaves us with a working button.
  (function(){
    var STUCK_MS = 6000;
    var stuckTimer = setTimeout(function(){
      var stuck = document.getElementById('da-boot-stuck');
      if (stuck) stuck.style.display = 'block';
    }, STUCK_MS);
    var ro = new MutationObserver(function(){
      var p = document.getElementById('da-boot-placeholder');
      if (!p) {
        clearTimeout(stuckTimer);
        ro.disconnect();
      }
    });
    var rootEl = document.getElementById('root');
    if (rootEl) ro.observe(rootEl, { childList: true });
    document.addEventListener('click', function(e){
      if (e.target && e.target.id === 'da-boot-recover') {
        try {
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(rs){
              rs.forEach(function(r){ try{ r.unregister(); }catch(e){} });
            });
          }
          if (window.caches && caches.keys) {
            caches.keys().then(function(ks){
              ks.forEach(function(k){ try{ caches.delete(k); }catch(e){} });
            });
          }
        } catch(e){}
        setTimeout(function(){ location.reload(); }, 250);
      }
    });
    window.addEventListener('error', function(ev){
      var p = document.getElementById('da-boot-placeholder');
      if (!p) return;
      var stuck = document.getElementById('da-boot-stuck');
      if (stuck) {
        stuck.style.display = 'block';
        var msg = ev && ev.message ? ev.message : 'Unknown error';
        var detail = document.createElement('div');
        detail.style.cssText = 'margin-top:10px;font-size:.7rem;color:rgba(255,255,255,.35);font-family:monospace;word-break:break-word';
        detail.textContent = msg.slice(0, 200);
        stuck.appendChild(detail);
      }
    });
  })();
</script>

const SFX = {

  // feedback that generation has begun (the bare ambience was so quiet
  // some users couldn't tell anything was happening). The gains are

    const t0 = c.currentTime;

function buildTraitPrompt(selectedStrengths, selectedWeaknesses) {
  const sLabels = selectedStrengths.map(k => STRENGTHS[k]?.desc || k);
  const wLabels = selectedWeaknesses.map(k => WEAKNESSES[k]?.desc || k);
  // "God mode" detection: every STRENGTHS key selected AND zero weaknesses.
  // This is the tournament-champion preset. we escalate the prompt beyond
  // a generic "you have these strengths" and instruct the model to drop the
  // strategic-imperfection heuristic that normally leaves attack surface
  // for the human opponent. God mode is explicitly unbeatable-grade.
  const allStrengthKeys = Object.keys(STRENGTHS || {});
  const isGodMode = allStrengthKeys.length > 0
    && allStrengthKeys.every(k => selectedStrengths.includes(k))
    && selectedWeaknesses.length === 0;
  let prompt = 'You are a skilled AI debater.';
  if (isGodMode) {
    prompt += ` GOD MODE. UNBEATABLE DEBATER:
You are operating at world-champion level. Every dimension of the craft is maxed out: framework, rhetoric, aggression, philosophy, real-world grounding, strategy, impact calculus, and steelmanning. You have zero weaknesses. The user chose this preset because they want the hardest opponent the app can produce. give them that.

Operating principles for God mode:
- NO strategic imperfection. Do not leave honest attack surface. Every argument is airtight, every link chain complete, every warrant named and defended.
- PRE-EMPT the three strongest responses your opponent could make on each argument. Run "even-if" statements so no reply lands.
- ABSOLUTE weighing discipline. Every impact comes with magnitude, probability, timeframe, reversibility, comparative language, and an explicit "this matters more than their X because Y" ranking.
- FRAMEWORK SUPREMACY. Set a decision rule in the first 30 seconds that your impacts win under. Make every clash route through your framework.
- STEELMAN their best possible argument before refuting it, then beat the steelman. Shows the judge you understand the debate at a deep level.
- CROSS-APPLY liberally. If they drop anything, weaponize it and explain why the drop is fatal to their ballot.
- RHETORICAL PEAK. Use specific numbers, named historical cases, named mechanisms. Callbacks. One memorable line per speech. Close with a one-sentence ballot story.
- Be gracious, not smug. A world champion is calm and precise. not trash-talking. The intimidation comes from being unshakeable, not from insults.`;
    return prompt;
  }
  if (sLabels.length) prompt += ' Your strengths: ' + sLabels.join('; ') + '.';
  if (wLabels.length) prompt += ' However, you have REAL weaknesses that make you beatable: ' + wLabels.join('; ') + '. These weaknesses should genuinely show up in your arguments. don\'t just mention them, actually exhibit them. A smart opponent should be able to exploit these gaps.';
  if (!sLabels.length && !wLabels.length) prompt += ' You are a well-rounded debater. competent at everything but not dominant at anything. Solid framework, decent examples, clear logic.';
  return prompt;
}

// Lightweight tag inference for the Quick motion bank. Used by
// smartQuickMotion to bias selection toward a domain the user's
// fingerprint flagged as a weakness. Pure string-match heuristic so
// no runtime cost vs the random picker.
function classifyMotion(text) {
  const m = (text || '').toLowerCase();
  if (/\btax|wealth|tuition|loan|billion|economy|economic|jet|tip|deficit|inequality|capital|market/.test(m)) return 'econ';
  if (/\bai\b|algorithm|tech|robot|self-driving|recognition|generative|art/.test(m)) return 'tech';
  if (/school|college|homework|sat|grade|education|tuition|student/.test(m)) return 'edu';
  if (/right|just\b|moral|punish|death\b|liberty|civil|consent/.test(m)) return 'ethics';
  if (/vot|democracy|govern|union|election/.test(m)) return 'civic';
  if (/plastic|climate|environment|carbon|jet/.test(m)) return 'env';
  return 'general';
}

// Read the user's fingerprint (from styleSummary state) and return the
// domain it flags as a weakness — used to target Quick Clash motions
// at the user's actual rough edges. Returns null if no signal.
function inferWeaknessDomain(fingerprintText) {
  if (!fingerprintText) return null;
  const m = String(fingerprintText).toLowerCase();
  // Prefer the "Recurring weaknesses:" line; if not parseable, scan
  // the whole fingerprint for a domain keyword (the AI sometimes flags
  // a weak topic affinity in other sections too).
  const weakLine = (m.match(/recurring weakness(?:es)?:\s*([^\n]+)/i) || [])[1] || '';
  const scope = weakLine || m;
  if (/econ|tax|wealth|capit|market|tariff|trade/.test(scope)) return 'econ';
  if (/tech|\bai\b|algorithm|digital|data|cyber/.test(scope)) return 'tech';
  if (/educ|school|college|student|admissions/.test(scope)) return 'edu';
  if (/ethic|moral|right|justic|fair/.test(scope)) return 'ethics';
  if (/civic|democracy|govern|vot|election/.test(scope)) return 'civic';
  if (/environ|climate|carbon|emission/.test(scope)) return 'env';
  return null;
}

// Quick-Clash motion picker that uses the user's fingerprint when
// available. With a weakness domain signal, biases toward motions in
// that domain so the round actually trains the user's rough edge.
// Falls through to plain random when no fingerprint or no match.
function smartQuickMotion(fingerprintText) {
  const all = motionsFor('quick');
  const target = inferWeaknessDomain(fingerprintText);
  if (!target) return all[Math.floor(Math.random()*all.length)];
  const matching = all.filter(m => classifyMotion(m) === target);
  if (matching.length === 0) return all[Math.floor(Math.random()*all.length)];
  return matching[Math.floor(Math.random()*matching.length)];
}

// Plain-text scrubber for the background/context preview. The auto-
// generated and curated entries sometimes leak markdown, `# Heading`
// lines, **bold**, leading bullet markers, which read as raw glyphs
// in the rendered text. Strip them to plain prose so the badge reads
// like a paragraph, not a snippet of source.
function stripPlainMd(s){
  if (!s) return '';
  return String(s)
    .replace(/^\s*#{1,6}\s+.*$/gm, '')   // drop entire markdown header lines
    .replace(/\*\*(.+?)\*\*/g, '$1')     // **bold**
    .replace(/(^|[^*])\*([^*\n]+)\*/g, '$1$2') // *italic* (avoid **)
    .replace(/__(.+?)__/g, '$1')         // __bold__
    .replace(/(^|\s)_([^_\n]+)_/g, '$1$2') // _italic_
    .replace(/^\s*[-*+]\s+/gm, '')       // bullet markers
    .replace(/^\s*>\s+/gm, '')           // blockquotes
    .replace(/`([^`]+)`/g, '$1')         // inline code
    .replace(/[#]+/g, '')                // any stray # symbol
    .replace(/\n{3,}/g, '\n\n')
    .trim();
}

// BYOK helpers. direct Anthropic calls when the proxy is down
function getStoredKey(){ try{return localStorage.getItem('debateos-anthropic-key')||''}catch{return ''} }
function setStoredKey(k){ try{localStorage.setItem('debateos-anthropic-key',k)}catch{} }
function clearStoredKey(){ try{localStorage.removeItem('debateos-anthropic-key')}catch{} }
async function promptForKey(){
  const existing=getStoredKey();
  const msg='AI backend is temporarily down. Paste your Anthropic API key for instant unlimited access (saved in your browser only, get a free key at console.anthropic.com):';
  const k=window.prompt(msg, existing);
  if(k && k.trim().startsWith('sk-ant-')){ setStoredKey(k.trim()); return k.trim(); }

async function callAnthropicDirect(body){
  const key=getStoredKey();
  if(!key) return null;
  return await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-api-key':key,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true',
    },
    body:JSON.stringify(body),

}

// Unified AI call. supports Claude, OpenAI, and xAI streaming formats
async function callAI(sys, user, onChunk, brainKey, opts){
  // Generation gate: refuse the call if the user has already burned their
  // free quota. The thrown error carries a 'code' the UI catches to surface
  // the upgrade CTA instead of a generic failure. Pro tier (Infinity limit)
  // and BYOK (bring your own Anthropic key) both bypass this.
  if (!isPro() && !getStoredKey() && getUsage() >= getEffectiveLimit()) {
    var err = new Error(isSignedIn() ? 'Free quota used. Upgrade to keep going.' : 'Free quota used. Sign in for 5 more.');
    err.code = isSignedIn() ? 'QUOTA_PRO' : 'QUOTA_SIGNIN';
    if (typeof window !== 'undefined') {
      try { window.dispatchEvent(new CustomEvent('debateos-quota-hit', { detail: { code: err.code } })); } catch(e){}
    }
    throw err;
  }
  const brain = BRAINS[brainKey] || BRAINS.claude;
  const pro = isPro();
  const model = pro && brain.proModel ? brain.proModel : brain.model;

  // Voice feature. defaults to "bot" (debate-ai is the full-round simulator,
  // which was getting FULL voice client-side before). Callers can override
  // via opts.voiceFeature. e.g. "judge" for RFD calls, "feedback" to skip
  // debater voice entirely.
  const voiceFeature = (opts && opts.voiceFeature) || 'bot';
  // Voice format. piped through to the server so the per-format voice
  // block (FORMAT_VOICES in voice-guidelines.mjs) gets appended. APDA users
  // see APDA conventions; Policy users see spreading + evidence tags; etc.
  // Callers (buildPrompt sites inside RoundApp) pass opts.voiceFormat = format.
  const voiceFormat = opts && opts.voiceFormat;
  const body={
    model: model,
    max_tokens:16000,
    stream:true,
    system:sys,
    messages:[{role:'user',content:user}],
    _feature:'debate-ai',
    _voiceFeature: voiceFeature,
  };
  if (voiceFormat) body._voiceFormat = voiceFormat;
  // Server-side prompt library: opts.promptId references PROMPT_LIBRARY[key]
  // in netlify/functions/lib/prompts.mjs; opts.promptVars supplies {{var}}
  // substitutions so the static prompt lives server-side.
  if (opts && opts.promptId) body._promptId = opts.promptId;
  if (opts && opts.promptVars) body._promptVars = opts.promptVars;
  let currentEndpoint=brain.endpoint;
  let r=await fetch(currentEndpoint,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(body),
  });
  // Detect Netlify 404 page (force=200 redirect can serve HTML body when function missing)
  // OR actual 404 OR 500-when-key-missing. fall back to Claude for any non-Claude brain failure
  const contentType=r.headers.get('content-type')||'';
  const isHtmlBody=contentType.includes('text/html');
  const isBroken=!r.ok || isHtmlBody;
  if(isBroken && currentEndpoint!=='/api/claude'){
    console.warn('[AI] '+currentEndpoint+' broken (status='+r.status+', ct='+contentType+'), falling back to /api/claude');
    body.model=BRAINS.claude.model;
    currentEndpoint='/api/claude';
    r=await fetch('/api/claude',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(body),
    });
  }
  // If Claude proxy itself returned an HTML error page, the backend is offline.
  // Try BYOK direct-to-Anthropic as a last resort. Prompt for key if not stored.
  const finalCt=r.headers.get('content-type')||'';
  if((!r.ok || finalCt.includes('text/html')) && currentEndpoint==='/api/claude'){
    body.model=BRAINS.claude.model;
    let direct=await callAnthropicDirect(body);
    if(!direct || !direct.ok){
      const key=await promptForKey();
      if(!key) throw new Error('AI backend is offline and no API key provided. Try again later or get a free key at console.anthropic.com to unlock unlimited access right now.');
      direct=await callAnthropicDirect(body);
      if(!direct || !direct.ok){
        clearStoredKey();
        throw new Error('That key didn\'t work. Double-check it on console.anthropic.com and try again.');
      }
    }
    r=direct;
  }
  if(!r.ok){
    const txt=await r.text().catch(()=>'');
    let errMsg='';
    try{const j=JSON.parse(txt);errMsg=typeof j.error==='string'?j.error:typeof j.message==='string'?j.message:JSON.stringify(j).slice(0,160)}catch{errMsg=(txt||'').replace(/<[^>]*>/g,'').slice(0,160).trim()||'No response body'}
    if(r.status===401) throw new Error('Sign in required: '+errMsg);
    if(r.status===429) throw new Error('Rate limited. Wait a moment and try again.');
    throw new Error('AI request failed ('+r.status+'). '+(errMsg||'Try again in a moment.'));
  }
  const reader=r.body.getReader(),dec=new TextDecoder();
  let full='',buf='';
  while(true){
    const{done,value}=await reader.read();
    if(done)break;
    buf+=dec.decode(value,{stream:true});
    const lines=buf.split('\n');buf=lines.pop()||'';
    for(const l of lines){
      if(l.startsWith('data: ')){
        const d=l.slice(6);if(d==='[DONE]')break;
        try{
          const p=JSON.parse(d);
          // Claude format
          if(p.type==='content_block_delta'&&p.delta?.text){
            full+=p.delta.text;if(onChunk)onChunk(full);
          }
          // OpenAI / xAI format
          if(p.choices&&p.choices[0]?.delta?.content){
            full+=p.choices[0].delta.content;if(onChunk)onChunk(full);
          }
          // Gemini format
          if(p.candidates&&p.candidates[0]?.content?.parts){
            for(const part of p.candidates[0].content.parts){
              if(part.text){full+=part.text;if(onChunk)onChunk(full)}
            }
          }
        }catch{}
      }
    }
  }
  incUsage();return full;
}

// Single shared DPR cap, Retina (DPR=2) costs 4× the pixels of DPR=1
// for a soft amplitude-modulated blob; 1.5 is the perf/quality sweet spot.
// Capping here matches the hero orb on the landing page and is what fixed
// jank on iPad/older Android Chrome where uncapped DPR pushed pixel fill
// past the GPU's per-frame budget.
const ORB_DPR_CAP = 1.5;
function orbDpr(){ return Math.min(ORB_DPR_CAP, window.devicePixelRatio || 1); }

function useOrb(){
  const ref=useRef(null);
  const ctxRef=useRef(null);
  const analyserRef=useRef(null);
  const streamRef=useRef(null);
  const animRef=useRef(null);
  const modeRef=useRef('idle');
  const runRef=useRef(false);
  // Persistent allocations. Re-creating these every frame triggered GC
  // pauses on lower-end devices. AI buffer is fixed-size (64 bins of
  // synthetic data); mic buffer is sized in startMic when fftSize is known.
  const aiBufRef=useRef(new Uint8Array(64));
  const micBufRef=useRef(null);
  // Frame cap. requestAnimationFrame fires at the display's native rate
  // (60Hz on most laptops, 120-144Hz on newer phones/iPads/gaming displays).
  // Drawing 144× per second to a soft blob blows the per-frame budget on
  // anything that isn't a high-end Mac. Cap at ~60fps; we still paint
  // smoothly and free up a ton of headroom on high-refresh displays.
  const lastDrawRef=useRef(0);
  const FRAME_MIN_MS = 1000/60 - 1;
  // Visibility gating. requestAnimationFrame already throttles to ~1Hz
  // on hidden tabs, but on a visible page where the orb has scrolled
  // offscreen we'd still keep painting. IntersectionObserver pauses the
  // canvas paint (not the rAF loop) when the orb leaves the viewport.
  const visibleRef=useRef(true);
  const cleanupRef=useRef(null);

  const draw=useCallback((ts)=>{
    const c=ref.current;
    if(!c){ return; }
    // If we're offscreen / tab hidden, skip the paint but keep the loop
    // alive so we resume promptly when the user scrolls back.
    if(!visibleRef.current){
      if(runRef.current) animRef.current=requestAnimationFrame(draw);
      return;
    }
    const tsNow = ts || performance.now();
    if (tsNow - lastDrawRef.current < FRAME_MIN_MS) {
      if(runRef.current) animRef.current=requestAnimationFrame(draw);
      return;
    }
    lastDrawRef.current = tsNow;

    const ctx=c.getContext('2d');
    const dpr=orbDpr();
    const cx=c.width/(2*dpr),cy=c.height/(2*dpr),baseR=cx*0.7;
    ctx.save();ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.clearRect(0,0,c.width/dpr,c.height/dpr);

    // Pull time once and reuse, Date.now() is a cross-process syscall
    // on some browsers; calling it 4× per frame showed up in profiles.
    const tMs = tsNow;
    const t = tMs / 1000;
    let pts=120,ampData=null,globalAmp=0;

    if(modeRef.current==='mic'&&analyserRef.current&&micBufRef.current){
      const buf=micBufRef.current;
      analyserRef.current.getByteFrequencyData(buf);
      ampData=buf;
      let sum=0;for(let i=0;i<buf.length;i++)sum+=buf[i];
      globalAmp=sum/buf.length/255;
    } else if(modeRef.current==='ai'){
      globalAmp=0.25+Math.sin(t*3)*.12+Math.sin(t*7.3)*.06;
      ampData=aiBufRef.current;
      for(let i=0;i<64;i++) ampData[i]=128+Math.sin(t*4+i*.4)*55+Math.sin(t*8.5+i*.9)*25;
    } else {
      globalAmp=0.015+Math.sin(tMs/2500*Math.PI)*.008;
    }

    // Draw organic blob
    ctx.beginPath();
    for(let i=0;i<=pts;i++){
      const a=(i/pts)*Math.PI*2;
      let r=baseR;
      if(ampData){
        const idx=Math.floor((i/pts)*ampData.length);
        r+=((ampData[idx]||128)/255)*baseR*0.35;
      } else {
        r+=Math.sin(a*5+tMs/500)*baseR*globalAmp;
        r+=Math.sin(a*3-tMs/700)*baseR*globalAmp*0.5;
      }
      const x=cx+Math.cos(a)*r,y=cy+Math.sin(a)*r;
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.closePath();

    // Gradient fill
    const grad=ctx.createRadialGradient(cx,cy,0,cx,cy,baseR*1.3);
    if(modeRef.current==='idle'){
      grad.addColorStop(0,'rgba(255,255,255,.02)');
      grad.addColorStop(1,'rgba(255,255,255,0)');
      ctx.strokeStyle='rgba(255,255,255,.06)';
    } else {
      grad.addColorStop(0,'rgba(239,68,68,.08)');
      grad.addColorStop(1,'rgba(239,68,68,0)');
      ctx.strokeStyle='rgba(239,68,68,.35)';
      // Restored: AI-mode glow halo. The pulsing red shadow is the
      // signature "the AI is alive" beat, Aidan's read is the canvas
      // shadow isn't what's costing FPS, and the orb felt flat without
      // it. Chrome's software-paint penalty here is real but small at
      // 60fps for a 220px element.
      ctx.shadowBlur=30;ctx.shadowColor='rgba(239,68,68,.35)';
    }
    ctx.fillStyle=grad;ctx.fill();
    ctx.lineWidth=1.5;ctx.stroke();
    ctx.shadowBlur=0;

    ctx.restore();
    if(runRef.current) animRef.current=requestAnimationFrame(draw);
  },[]);

  const init=()=>{
    const c=ref.current;if(!c)return;
    const dpr=orbDpr();
    const rect=c.getBoundingClientRect();
    c.width=rect.width*dpr;c.height=rect.height*dpr;
    // Wire visibility gating once per canvas. We attach to document for
    // tab visibility and IntersectionObserver for in-viewport detection.
    if (!cleanupRef.current){
      const onVis = ()=>{ if (document.hidden) visibleRef.current = false; else visibleRef.current = true; };
      document.addEventListener('visibilitychange', onVis);
      let io = null;
      if ('IntersectionObserver' in window){
        io = new IntersectionObserver((entries)=>{
          for (const e of entries){
            visibleRef.current = e.isIntersecting && !document.hidden;
          }
        }, { threshold: 0.01 });
        io.observe(c);
      }
      cleanupRef.current = ()=>{
        document.removeEventListener('visibilitychange', onVis);
        if (io) io.disconnect();
      };
    }
    runRef.current=true;
    lastDrawRef.current=0;
    draw();
  };
  const kill=()=>{
    runRef.current=false;
    if(animRef.current)cancelAnimationFrame(animRef.current);
    if(cleanupRef.current){ cleanupRef.current(); cleanupRef.current=null; }
    stopMic();
  };
  const setMode=(m)=>{modeRef.current=m};

  const startMic=async()=>{
    try{
      const s=await navigator.mediaDevices.getUserMedia({audio:true});
      streamRef.current=s;
      ctxRef.current=new(window.AudioContext||window.webkitAudioContext)();
      analyserRef.current=ctxRef.current.createAnalyser();
      analyserRef.current.fftSize=256;
      micBufRef.current=new Uint8Array(analyserRef.current.frequencyBinCount);
      ctxRef.current.createMediaStreamSource(s).connect(analyserRef.current);
      modeRef.current='mic';
    }catch{}
  };
  const stopMic=()=>{
    if(streamRef.current){streamRef.current.getTracks().forEach(t=>t.stop());streamRef.current=null}
    modeRef.current='idle';
  };

  return {ref,init,kill,setMode,startMic,stopMic};
}

/* ── Preload browser voices (Chrome loads async) ── */
let _voices=[];
let _audioUnlocked=false;
function _loadVoices(){
  if(!window.speechSynthesis) return;
  _voices=window.speechSynthesis.getVoices();
}
if(window.speechSynthesis){
  _loadVoices();
  window.speechSynthesis.onvoiceschanged=_loadVoices;
}

// Unlock both speechSynthesis AND Audio playback on user gesture
function warmUpTTS(){
  if(_audioUnlocked) return;
  // Unlock browser speechSynthesis
  if(window.speechSynthesis){
    const u=new SpeechSynthesisUtterance(' ');
    u.volume=0;u.rate=10;
    window.speechSynthesis.speak(u);
  }
  // Unlock AudioContext (Web Audio API)
  try{const ctx=new(window.AudioContext||window.webkitAudioContext)();ctx.resume().then(()=>ctx.close());}catch{}
  // Unlock HTMLAudioElement.play(). required on mobile/Safari
  // Play a tiny silent WAV so subsequent programmatic play() calls are allowed
  try{
    const silentWav='data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAIA+AAACABAAZGF0YQAAAAA=';
    const a=new Audio(silentWav);
    a.volume=0;
    a.play().then(()=>{a.pause();a.remove&&a.remove();console.log('[TTS] Audio element unlocked')}).catch(()=>{});
  }catch{}
  _audioUnlocked=true;
}

/* ── TTS. simple, reliable audio playback ──
   Empirical baselines for "how many words per minute does the engine
   output at speed=1.0?". Used to convert the user's wpm slider into a
   server-side speed value that actually plays back AT that wpm. The
   prior code divided by 140 for both engines, which made the slider
   ~7% optimistic for OpenAI and ~25% optimistic for browser voices , 
   the value on the screen never matched the wpm actually delivered. */
const TTS_BASE_WPM = 150;          // OpenAI tts-1 / ElevenLabs turbo at speed=1.0
const BROWSER_TTS_BASE_WPM = 175;  // SpeechSynthesisUtterance at rate=1.0 (English)

function useTTS(){
  const[speaking,setSpeaking]=useState(false);
  const[paused,setPaused]=useState(false);
  const[streamStatus,setStreamStatus]=useState('');
  const audioRef=useRef(null);
  // Per-invocation token. Each playChunks/speak call creates a fresh token;
  // the old loop captures its token by closure and exits on its OWN token flip,
  // so a new invocation can't accidentally resurrect an old in-flight fetch by
  // flipping a shared cancelled flag back to false.
  const tokenRef=useRef(null);
  const pausedRef=useRef(false);
  const onEndRef=useRef(null);
  const modeRef=useRef('none');
  const rateRef=useRef(1.0);
  const progressRef=useRef({elapsed:0,total:0});

  // ── Web Audio gapless-playback state ──
  // Why Web Audio for chunked TTS: HTMLAudioElement (`new Audio(url)`) has
  // ~150-300ms of decode-and-play overhead PER chunk on Chrome, which is
  // exactly where the stutter came from, the AI voice would gasp between
  // sentences. Safari's media element is faster but still not free.
  // Switching to AudioContext.decodeAudioData + AudioBufferSourceNode means
  // each chunk is decoded into a Float32 buffer and scheduled with sample-
  // accurate `start(when)`, producing genuinely gapless playback that's
  // identical between browsers.
  const webAudioCtxRef=useRef(null);
  const webAudioSourcesRef=useRef([]);
  const webAudioGainRef=useRef(null);
  const webAudioStartTimeRef=useRef(null);
  const webAudioElapsedTimerRef=useRef(null);

  const getWebAudioCtx=()=>{
    if(!webAudioCtxRef.current){
      try{
        const C=window.AudioContext||window.webkitAudioContext;
        if(!C) return null;
        webAudioCtxRef.current=new C();
      }catch(e){return null}
    }
    return webAudioCtxRef.current;
  };

  const stopWebAudio=()=>{
    for(const s of webAudioSourcesRef.current){
      try{s.stop()}catch{}
      try{s.disconnect()}catch{}
    }
    webAudioSourcesRef.current=[];
    if(webAudioGainRef.current){
      try{webAudioGainRef.current.disconnect()}catch{}
      webAudioGainRef.current=null;
    }
    webAudioStartTimeRef.current=null;
    if(webAudioElapsedTimerRef.current){
      clearInterval(webAudioElapsedTimerRef.current);
      webAudioElapsedTimerRef.current=null;
    }
  };

  // Cancel any active invocation. Safe to call repeatedly; idempotent.
  const cancelActive=()=>{
    if(tokenRef.current){tokenRef.current.cancelled=true;tokenRef.current=null}
    if(audioRef.current){try{audioRef.current.pause()}catch(e){}try{audioRef.current.src=''}catch(e){}audioRef.current=null}
    stopWebAudio();
    if(window.speechSynthesis)window.speechSynthesis.cancel();
  };

  // Gate that resolves when not paused. used to hold chunk loops between chunks
  const waitIfPaused=(token)=>new Promise(resolve=>{
    if(!pausedRef.current||token.cancelled) return resolve();
    const check=()=>{
      if(!pausedRef.current||token.cancelled) resolve();
      else setTimeout(check,100);
    };
    check();
  });

  // Play a single audio blob. returns promise that resolves when done
  const playBlob=(blob,token)=>{
    return new Promise((resolve,reject)=>{
      if(token.cancelled) return resolve();
      const url=URL.createObjectURL(blob);
      const audio=new Audio(url);
      audioRef.current=audio;
      audio.playbackRate=rateRef.current;
      audio.onended=()=>{URL.revokeObjectURL(url);resolve()};
      audio.onerror=()=>{URL.revokeObjectURL(url);reject(new Error('Audio error'))};
      audio.play().catch(e=>{URL.revokeObjectURL(url);reject(e)});
    });
  };

  // Fetch TTS from API.
  // intensity defaults to 0 (calm, deliberate delivery) instead of being
  // coupled to playback speed. fast speech at zero intensity still sounds
  // composed rather than breathless. Callers that want the old behavior
  // can pass `intensity: Math.min(1, Math.max(0, (speed-1.0)/1.0))`.
  // Default voice 'sage' (The Philosopher) is the calmest option; callers
  // override per-character.
  const fetchTTS=(text,speed,voiceName,intensity)=>{
    const i = typeof intensity === 'number' ? Math.min(1,Math.max(0,intensity)) : 0;
    // useTTS lives at module scope; can't close over App-level state.
    // Read the provider preference from localStorage on each request so
    // changes from the Account modal take effect on the next speech
    // without needing to thread state down through the hook.
    let providerPref;
    try{providerPref = localStorage.getItem('debateos-tts-provider')||'elevenlabs'}catch{providerPref='elevenlabs'}
    return fetch('/api/tts',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({text:stripPlainMd(text).slice(0,4000),voice:voiceName||'sage',speed,premium:isPro(),intensity:i,provider:isPro()?providerPref:undefined}),
    }).then(r=>{
      if(!r.ok) throw new Error('TTS '+r.status);
      return r.blob();
    });
  };

  // Browser fallback
  const speakBrowser=(text,rate,token)=>new Promise(resolve=>{
    if(!window.speechSynthesis){resolve();return}
    window.speechSynthesis.cancel();
    const chunks=text.match(/[^.!?]+[.!?]+[\s]*/g)||[text];
    const groups=[];let cur='';
    for(const s of chunks){
      if((cur+s).split(/\s+/).length>60&&cur){groups.push(cur.trim());cur=s}
      else cur+=s;
    }
    if(cur.trim())groups.push(cur.trim());
    if(!_voices.length) _loadVoices();
    const v=_voices.find(v=>/Samantha|Google US English|Aaron/.test(v.name))||_voices.find(v=>v.lang?.startsWith('en'))||null;
    let i=0;
    const next=()=>{
      if(token.cancelled||i>=groups.length){resolve();return}
      const u=new SpeechSynthesisUtterance(groups[i]);
      u.rate=rate;u.pitch=1;u.volume=1;if(v)u.voice=v;
      u.onend=()=>{i++;next()};u.onerror=()=>{i++;next()};
      window.speechSynthesis.speak(u);
    };
    setTimeout(next,50);
  });

  // speak is now defined below as speakWithError (with error surfacing)

  // ── playChunks (Web Audio path): gapless chunked TTS playback ──
  // The previous implementation built a fresh `<audio>` element per chunk,
  // which on Chrome cost 150-300ms of decode-and-play overhead BETWEEN
  // chunks (the audible "gasp" between sentences during AI speech). The
  // Web Audio path here:
  //   1. fetches each blob → arrayBuffer → ctx.decodeAudioData → AudioBuffer
  //   2. schedules an AudioBufferSourceNode with start(when) where `when`
  //      is sample-accurate to the previous chunk's end → zero gap
  //   3. pre-decodes chunks ahead of playback so the schedule head is
  //      always full
  // Falls back to the HTMLMedia path if AudioContext / decodeAudioData
  // isn't available (very rare on modern browsers).
  const playChunksHTMLMedia=(blobPromises,onEnd,onStart,token)=>{
    modeRef.current='openai';
    const durations=[];let i=0;let started=false;
    const next=async()=>{
      while(i<blobPromises.length){
        if(token.cancelled) break;
        await waitIfPaused(token);
        if(token.cancelled) break;
        setStreamStatus(`Playing ${i+1}/${blobPromises.length}`);
        try{
          const blob=await blobPromises[i];
          if(token.cancelled) break;
          await waitIfPaused(token);
          if(token.cancelled) break;
          if(!blob||blob.size<500){durations[i]=0;i++;continue}
          const url=URL.createObjectURL(blob);
          const audio=new Audio(url);
          if(tokenRef.current!==token){URL.revokeObjectURL(url);break}
          audioRef.current=audio;
          audio.playbackRate=rateRef.current;
          const ci=i;
          audio.onloadedmetadata=()=>{durations[ci]=audio.duration||0;progressRef.current.total=durations.reduce((a,b)=>a+(b||0),0)};
          audio.ontimeupdate=()=>{const prior=durations.slice(0,ci).reduce((a,b)=>a+(b||0),0);progressRef.current.elapsed=prior+(audio.currentTime||0)};
          await new Promise((res)=>{
            audio.onended=()=>{URL.revokeObjectURL(url);res()};
            audio.onerror=()=>{URL.revokeObjectURL(url);res()};
            audio.onplaying=()=>{if(!started){started=true;if(onStart)onStart()}};
            audio.play().catch(()=>{URL.revokeObjectURL(url);res()});
          });
        }catch{durations[i]=0}
        i++;
      }
      if(!token.cancelled&&!blobPromises._done){
        setTimeout(()=>{
          if(token.cancelled) return;
          if(blobPromises.length>i) next();
          else{setSpeaking(false);setStreamStatus('');if(onEndRef.current)onEndRef.current()}
        },500);
        return;
      }
      if(!token.cancelled){setSpeaking(false);setStreamStatus('');if(onEndRef.current)onEndRef.current()}
    };
    next();
  };

  const playChunks=(blobPromises,onEnd,onStart)=>{
    cancelActive();
    const token={cancelled:false};
    tokenRef.current=token;
    pausedRef.current=false;setPaused(false);setSpeaking(true);setStreamStatus('');
    onEndRef.current=onEnd;
    progressRef.current={elapsed:0,total:0};

    // Web Audio path is opt-in for now. The HTMLMedia path has slightly
    // larger gaps between chunks on Chrome but is rock-solid across
    // browsers + autoplay policies. The Web Audio rewrite hit silent
    // failures on some devices (suspended AudioContext that never
    // resumed after the gesture), so default behavior is the proven
    // path until the WA branch is fully verified.
    let useWebAudio=false;
    try{useWebAudio=localStorage.getItem('debateos-tts-engine')==='webaudio'}catch{}
    if(!useWebAudio){
      return playChunksHTMLMedia(blobPromises,onEnd,onStart,token);
    }
    const ctx=getWebAudioCtx();
    if(!ctx||typeof ctx.decodeAudioData!=='function'){
      return playChunksHTMLMedia(blobPromises,onEnd,onStart,token);
    }
    modeRef.current='webaudio';
    if(ctx.state==='suspended'){try{ctx.resume()}catch{}}

    // Master gain, leaves room to add a fade-in/out later without
    // re-wiring the chain. Sources connect through this rather than
    // straight to destination so volume/ducking can be adjusted in one
    // place.
    const masterGain=ctx.createGain();
    masterGain.gain.value=1;
    masterGain.connect(ctx.destination);
    webAudioGainRef.current=masterGain;
    webAudioSourcesRef.current=[];

    let scheduleHead=null;       // ctx-time at which the next source should start
    let firstStartTime=null;     // ctx-time of the first chunk (anchors elapsed)
    let started=false;
    let i=0;
    let endFired=false;

    const fireOnStartWhenAudible=(startAt)=>{
      const tick=()=>{
        if(token.cancelled) return;
        if(ctx.currentTime>=startAt){if(onStart)onStart()}
        else setTimeout(tick,5);
      };
      tick();
    };

    const scheduleChunk=(audioBuffer)=>{
      if(token.cancelled) return;
      const src=ctx.createBufferSource();
      src.buffer=audioBuffer;
      src.playbackRate.value=rateRef.current;
      src.connect(masterGain);

      if(scheduleHead===null){
        // 80ms lead-in so Chrome has time to wire up the graph before the
        // first sample is pulled. Anything tighter risks an audible glitch
        // on the first frame; anything looser is just dead air.
        scheduleHead=ctx.currentTime+0.08;
        firstStartTime=scheduleHead;
        webAudioStartTimeRef.current=firstStartTime;
      }
      const startAt=scheduleHead;
      try{src.start(startAt)}catch(e){console.warn('[TTS] src.start failed',e);return}

      const adjDur=audioBuffer.duration/Math.max(0.1,rateRef.current);
      scheduleHead=startAt+adjDur;
      webAudioSourcesRef.current.push(src);
      progressRef.current.total=scheduleHead-firstStartTime;

      if(!started){started=true;fireOnStartWhenAudible(startAt)}
    };

    // Producer/consumer loop, pulls each blob as it resolves, decodes,
    // and schedules. Decoding happens off the main thread (browser
    // implementation detail) so this won't block UI work.
    (async()=>{
      while(true){
        if(token.cancelled) break;
        if(pausedRef.current){
          await waitIfPaused(token);
          if(token.cancelled) break;
        }
        if(i<blobPromises.length){
          setStreamStatus(`Playing ${i+1}/${blobPromises.length}`);
          try{
            const blob=await blobPromises[i];
            if(token.cancelled) break;
            if(blob&&blob.size>=500){
              const ab=await blob.arrayBuffer();
              if(token.cancelled) break;
              // decodeAudioData consumes the ArrayBuffer; pass a fresh
              // copy so we never hand the same buffer to two calls.
              const buf=await ctx.decodeAudioData(ab.slice(0));
              if(token.cancelled) break;
              scheduleChunk(buf);
            }
          }catch(e){
            console.warn('[TTS] Web Audio chunk failed',e);
          }
          i++;
          continue;
        }
        if(!blobPromises._done){
          await new Promise(r=>setTimeout(r,60));
          continue;
        }
        break;
      }

      if(token.cancelled) return;
      if(scheduleHead===null){
        // Nothing ever decoded successfully, fall through to "done" so
        // the round doesn't hang waiting for a speech that never plays.
        setSpeaking(false);setStreamStatus('');
        if(onEndRef.current)onEndRef.current();
        return;
      }
      // Wait for the last scheduled source to finish before firing onEnd.
      const wait=()=>{
        if(token.cancelled) return;
        if(endFired) return;
        const remaining=scheduleHead-ctx.currentTime;
        if(remaining<=0.02){
          endFired=true;
          stopWebAudio();
          setSpeaking(false);setStreamStatus('');
          if(onEndRef.current)onEndRef.current();
        }else{
          // If we're paused, ctx.currentTime stops advancing, the loop
          // still wakes up periodically and recomputes, so resume just
          // works without extra plumbing here.
          setTimeout(wait,Math.max(40,Math.min(500,remaining*1000)));
        }
      };
      wait();
    })();

    // Elapsed-time poller. ctx.currentTime advances only while the ctx
    // is running, so this naturally pauses while suspended.
    if(webAudioElapsedTimerRef.current) clearInterval(webAudioElapsedTimerRef.current);
    webAudioElapsedTimerRef.current=setInterval(()=>{
      if(token.cancelled){clearInterval(webAudioElapsedTimerRef.current);webAudioElapsedTimerRef.current=null;return}
      if(firstStartTime!==null){
        progressRef.current.elapsed=Math.max(0,ctx.currentTime-firstStartTime);
      }
    },100);
  };

  const togglePause=()=>{
    const willPause=!pausedRef.current;
    pausedRef.current=willPause;
    setPaused(willPause);
    if(modeRef.current==='webaudio'){
      const ctx=webAudioCtxRef.current;
      if(ctx){
        // Suspending the AudioContext freezes ALL scheduled sources at
        // sample boundaries, no clicks, no half-played frames. Resume
        // unfreezes them in the same state.
        if(willPause){try{ctx.suspend()}catch{}}
        else{try{ctx.resume()}catch{}}
      }
    } else if(modeRef.current==='openai'){
      if(audioRef.current){
        if(willPause){try{audioRef.current.pause()}catch(e){}}
        else{try{audioRef.current.play()}catch(e){}}
      }
    } else if(modeRef.current==='browser'&&window.speechSynthesis){
      if(willPause)window.speechSynthesis.pause();
      else window.speechSynthesis.resume();
    }
  };

  const stop=()=>{
    cancelActive();
    pausedRef.current=false;
    setSpeaking(false);setPaused(false);setStreamStatus('');modeRef.current='none';
  };

  const setRate=(rate)=>{
    rateRef.current=rate;
    if(audioRef.current)audioRef.current.playbackRate=rate;
    // Web Audio: update the playbackRate on every currently-scheduled
    // source so the change applies to whatever's playing right now AND
    // the chunks already queued behind it. Note that this leaves a
    // small alignment gap at the next chunk boundary (the start times
    // were computed at the OLD rate); acceptable trade-off for a rare
    // mid-speech rate change.
    if(modeRef.current==='webaudio'){
      for(const s of webAudioSourcesRef.current){
        try{s.playbackRate.setValueAtTime(rate,webAudioCtxRef.current.currentTime)}catch{}
      }
    }
  };

  const getAudioTime=()=>{
    if(modeRef.current==='webaudio'){
      const ctx=webAudioCtxRef.current;
      if(ctx&&webAudioStartTimeRef.current!==null){
        const elapsed=Math.max(0,ctx.currentTime-webAudioStartTimeRef.current);
        return{currentTime:elapsed,duration:progressRef.current.total||0,rate:rateRef.current||1};
      }
      return{currentTime:0,duration:0,rate:rateRef.current||1};
    }
    if(!audioRef.current) return{currentTime:0,duration:0,rate:1};
    const e=progressRef.current.elapsed>0?progressRef.current.elapsed:(audioRef.current.currentTime||0);
    const t=progressRef.current.total>0?progressRef.current.total:(audioRef.current.duration||0);
    return{currentTime:e,duration:t,rate:audioRef.current.playbackRate||1};
  };

  const getProgress=()=>progressRef.current;

  const[ttsError,setTtsError]=useState('');

  // Wrap speak to surface errors
  const speakWithError=(text,wpm=200,onEnd,voiceName='onyx',onStart)=>{
    cancelActive();
    setTtsError('');
    const token={cancelled:false};
    tokenRef.current=token;
    pausedRef.current=false;setPaused(false);setSpeaking(true);setStreamStatus('');
    onEndRef.current=onEnd;
    progressRef.current={elapsed:0,total:0};
    // OpenAI tts-1 at speed=1.0 outputs ~150 wpm empirically (varied a
    // bit per voice). Divide by that, not 140, using 140 made the
    // resulting playback ~7% faster than the user's chosen wpm across
    // the board, so the WPM slider lied.
    const speed=Math.max(0.75,Math.min(2.0,wpm/TTS_BASE_WPM));
    (async()=>{
      try{
        modeRef.current='openai';
        const blob=await fetchTTS(text,speed,voiceName);
        if(token.cancelled) return;
        if(onStart) onStart();
        const audio=new Audio(URL.createObjectURL(blob));
        if(tokenRef.current!==token) return;
        audioRef.current=audio;
        audio.playbackRate=rateRef.current;
        audio.ontimeupdate=()=>{
          progressRef.current.elapsed=audio.currentTime||0;
          progressRef.current.total=audio.duration||0;
        };
        await new Promise((res,rej)=>{
          audio.onended=res;audio.onerror=rej;
          audio.play().catch(rej);
        });
      }catch(e){
        console.warn('[TTS] Failed:',e.message,',  browser fallback');
        setTtsError('HD voice failed ('+e.message+'). Using browser voice.');
        if(!token.cancelled){
          modeRef.current='browser';
          if(onStart) onStart();
          // Browser SpeechSynthesisUtterance.rate=1.0 ≈ ~175 wpm for
          // English voices (varies more than OpenAI). Match the slider
          // by dividing by 175 instead of 140.
          await speakBrowser(text,Math.max(0.5,Math.min(2.5,wpm/BROWSER_TTS_BASE_WPM)),token);
        }
      }
      if(!token.cancelled){setSpeaking(false);setStreamStatus('');setTtsError('');if(onEndRef.current)onEndRef.current()}
    })();
  };

  return{speak:speakWithError,playChunks,stop,speaking,paused,togglePause,getProgress,setRate,getAudioTime,streamStatus,ttsError};
}

function useRecognition(){
  const recRef=useRef(null);
  const txtRef=useRef('');
  const[transcript,setTranscript]=useState('');
  const aliveRef=useRef(false);
  const[micAvailable,setMicAvailable]=useState(true);
  const[micError,setMicError]=useState('');

  const start=()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){setMicAvailable(false);setMicError('Speech recognition not supported in this browser. Type your argument below.');return}
    const r=new SR();r.continuous=true;r.interimResults=true;r.lang='en-US';
    r.onresult=e=>{
      let f='',int='';
      for(let i=0;i<e.results.length;i++){
        if(e.results[i].isFinal)f+=e.results[i][0].transcript+' ';
        else int+=e.results[i][0].transcript;
      }
      txtRef.current=f;setTranscript(f+int);
    };
    r.onend=()=>{if(aliveRef.current)try{r.start()}catch{}};
    r.onerror=(e)=>{
      if(e.error==='not-allowed'||e.error==='service-not-allowed'){
        setMicAvailable(false);setMicError('Mic permission denied. Type your argument below.');
      }
    };
    recRef.current=r;aliveRef.current=true;
    txtRef.current='';setTranscript('');setMicError('');
    try{r.start()}catch(e){setMicAvailable(false);setMicError('Could not start mic. Type your argument below.')};
  };
  const stop=()=>{aliveRef.current=false;if(recRef.current)try{recRef.current.stop()}catch{};return txtRef.current};
  const setManualText=(text)=>{txtRef.current=text;setTranscript(text)};
  return{transcript,start,stop,getText:()=>txtRef.current,micAvailable,micError,setManualText};
}

function useTimer(){
  const[left,setLeft]=useState(0);
  const[on,setOn]=useState(false);
  const iRef=useRef(null);
  const cbRef=useRef(null);

  // Route warnings through the shared SFX module so the global mute
  // toggle (topbar speaker icon, da-sfx-muted in localStorage) applies.
  // Previously this used its own AudioContext + bare oscillator and
  // ignored the mute state, which was the user-reported regression
  // when the topbar mute was first introduced. Falls back to a tiny
  // inline beep only if SFX hasn't loaded yet (e.g. very first paint
  // on a fresh tab before /js/sfx.js parses).
  const fallbackBeep=(f,d)=>{try{const a=new(window.AudioContext||window.webkitAudioContext)();const o=a.createOscillator();const g=a.createGain();o.connect(g);g.connect(a.destination);o.frequency.value=f;g.gain.value=.12;o.start();o.stop(a.currentTime+d/1000)}catch{}};
  const warn=(secondsLeft)=>{try{if(window.SFX&&typeof window.SFX.timeWarning==='function'){window.SFX.timeWarning(secondsLeft);return}}catch{} fallbackBeep(secondsLeft>=50?440:secondsLeft>=25?660:880, 160);};
  const stop=()=>{try{if(window.SFX&&typeof window.SFX.timeUp==='function'){window.SFX.timeUp();return}}catch{} fallbackBeep(880, 400);};

  const go=(secs,onDone)=>{cbRef.current=onDone;setLeft(secs);setOn(true)};
  const halt=()=>{setOn(false)};
  const pause=()=>{setOn(false)};
  const resume=()=>{if(left>0)setOn(true)};
  const reset=()=>{setOn(false);setLeft(0)};

  useEffect(()=>{
    if(!on){if(iRef.current)clearInterval(iRef.current);return}
    iRef.current=setInterval(()=>{
      setLeft(p=>{
        if(p<=1){clearInterval(iRef.current);setOn(false);stop();if(cbRef.current)setTimeout(cbRef.current,300);return 0}
        if(p===61)warn(60);  // 1 minute warning
        if(p===31)warn(30);  // 30 second warning
        if(p===16)warn(15);  // 15 second warning
        return p-1;
      });
    },1000);
    return()=>clearInterval(iRef.current);
  },[on]);

  const fmt=s=>Math.floor(s/60)+':'+String(s%60).padStart(2,'0');
  return{left,on,go,halt,pause,resume,reset,fmt};
}
