    if(!recoveryData) return;
    setMotion(recoveryData.motion||'');
    setFormat(recoveryData.format||'apda');
    setSide(recoveryData.side||'gov');
    setBrain(recoveryData.brain||'claude');
    setVoice(recoveryData.voice||'onyx');
    setWpm(recoveryData.wpm||180);
    setOppStrengths(recoveryData.oppStrengths||[]);
    setOppWeaknesses(recoveryData.oppWeaknesses||[]);
    setBackground(recoveryData.background||'');
    setNotes(recoveryData.notes||'');
    if(recoveryData.phase==='speech'){
      const savedLog=recoveryData.log||[];
      const savedIdx=recoveryData.idx||0;
      const recFmt=FORMATS[recoveryData.format||'apda']||FORMATS.apda;
      const recSpeeches=recFmt.speeches;
      // Figure out the correct resume point:
      // The log has completed speeches. The saved idx is where the round was.
      // If savedIdx's speech code is already in the log, that speech finished. advance to next.
      const speechAtIdx=recSpeeches[savedIdx];
      const alreadyDone=speechAtIdx&&savedLog.some(l=>l.code===speechAtIdx.code);
      const resumeIdx=alreadyDone?Math.min(savedIdx+1,recSpeeches.length-1):savedIdx;

      if(resumeIdx>=recSpeeches.length){
        // Round was actually complete. go to feedback
        setLog(savedLog);
        transition('feedback',()=>genFeedback(savedLog));
      } else {
        setLog(savedLog);
        setIdx(resumeIdx);
        transition('speech',()=>{
          setIdx(resumeIdx);
          setTimeout(()=>runSpeech(resumeIdx,savedLog),400);
        });
      }
    } else {
      transition('prep',()=>prepTimer.go((FORMATS[recoveryData.format||'apda']||FORMATS.apda).prep));
    }
    setRecoveryData(null);
  };
  const dismissRecovery=()=>{setRecoveryData(null);clearSession()};

  // POI: user sends a POI during AI speech
  const sendPOI=async()=>{
    if(!poiText.trim())return;
    setPoiActive(false);
    tts.stop();
    try{
      const poiResponse=await callAI(
        `You are mid-speech in a ${fmt.name} debate on "${motion}". The opponent just raised a Point of Information. Respond in 1-2 sentences MAX, then get back to your speech. If the POI is weak: dismiss it sharply ("That's exactly my point. thank you for conceding it."). If it's strong: pivot without fully conceding ("Interesting, but that actually helps us because..."). NEVER say "good question" or "thank you for that." This is a debate, not a seminar.`,
        'POI: "'+poiText+'"',
        null,
        brain
      );
      const poiEntry={code:'POI',who:'POI',text:'You: "'+poiText+'" → AI: "'+poiResponse+'"'};
      setLog(prev=>[...prev,poiEntry]);
    }catch(e){
      console.warn('[POI] Error:',e);
    }
    setPoiText('');
  };

  // POI: AI offers a POI during user speech, user accepts
  const acceptAIPOI=async()=>{
    const hist=log.map(l=>'['+l.code+']: '+l.text).join('\n');
    try{
      const poiQ=await callAI(
        'You are the opposing debater in a '+(FORMATS[format]||FORMATS.apda).name+' debate on "'+motion+'". You just stood to offer a Point of Information during the opponent\'s speech. Ask ONE sharp, brief question (max 15 words) that challenges their weakest point or forces a difficult concession. Be incisive.',
        'Speech history:\n'+hist+'\nAsk your POI now.',
        null,
        brain
      );
      setAiText(poiQ);
      const poiEntry={code:'POI',who:'AI POI',text:poiQ};
      setLog(prev=>[...prev,poiEntry]);
      setTimeout(()=>setAiText(''),5000);
    }catch(e){
      console.warn('[POI] AI offer error:',e);
    }
  };

  const fmt=FORMATS[format]||FORMATS.apda;
  const SPEECHES=fmt.speeches;
  const cur=SPEECHES[idx]||SPEECHES[0];
  const isUser=cur.side===side;

  // Init orb in speech phase
  useEffect(()=>{if(phase==='speech'){orb.init()}return()=>orb.kill()},[phase]);

  // Phase transition helper
  const transition=(next,cb)=>{setVis(false);setTimeout(()=>{if(cb)cb();setPhase(next);setTimeout(()=>setVis(true),50)},350)};

  // Start debate
  const startDebate=()=>{if(!motion.trim())return;SFX.startRound();warmUpTTS();if(typeof gtag==='function')gtag('event','round_start',{format:fmt.name,side,motion_length:motion.length});transition('prep',()=>prepTimer.go(fmt.prep))};

  // Quick-start: one-tap flow that picks a random motion, forces Quick
  // Clash format (shortest round), picks pro, and fires startDebate.
  // Uses a pending flag + useEffect because startDebate closes over
  // motion/format state that won't reflect until the next render.
  const[quickStartPending,setQuickStartPending]=useState(false);
  useEffect(()=>{
    if(quickStartPending && motion.trim() && format==='quick'){
      setQuickStartPending(false);
      startDebate();
    }
  },[quickStartPending,motion,format]);
  const quickStart=()=>{
    const m = MOTIONS[Math.floor(Math.random()*MOTIONS.length)];
    setMotion(m);
    if(format!=='quick') setFormat('quick');
    const quickFmt = FORMATS.quick;
    if(quickFmt && !quickFmt.sides.includes(side)) setSide(quickFmt.sides[0]);
    setQuickStartPending(true);
  };

  // Skip prep → first speech
  const goToSpeeches=()=>{SFX.click();
    warmUpTTS();
    prepTimer.reset();
    transition('speech',()=>{setIdx(0);setLog([]);setTimeout(()=>runSpeech(0,[]),400)});
  };

  // Auto-advance when prep timer ends
  useEffect(()=>{
    if(phase==='prep'&&prepTimer.left===0&&!prepTimer.on&&log.length===0){
      // Only auto-advance if timer actually ran (not on initial mount)
    }
  },[prepTimer.left]);

  // Run a speech
  const runSpeech=async(i,currentLog)=>{
    endingRef.current=false; // allow endSpeech for this new speech
    const s=SPEECHES[i];
    const userTurn=s.side===side;
    setLiveRate(1.0); // reset live speed each speech

    if(userTurn){
      // User turn. start timer + mic immediately
      timer.go(s.time);
      orb.setMode('mic');await orb.startMic();rec.start();
      // POI: AI may offer POIs during user speech (only in POI-enabled formats)
      if(fmt.poi){
        poiCountRef.current=0;
        setPoiOffer(false);setPoiActive(false);setPoiText('');
        // Offer first POI after 60-90s, second after another 60-90s
        const offerPOI=()=>{
          if(poiCountRef.current<2){
            setPoiOffer(true);
            poiCountRef.current++;
            // Schedule a possible second POI
            if(poiCountRef.current<2){
              poiTimeoutRef.current=setTimeout(offerPOI,60000+Math.random()*30000);
            }
          }
        };
        poiTimeoutRef.current=setTimeout(offerPOI,60000+Math.random()*30000);
      }
    } else {
      // AI turn. overlapped: start fetching audio for first half while still generating text
      orb.setMode('ai');setAiLoading(true);setAiText('');setAiPct(0);
      const stopThinking=SFX.thinking();
      try{
        // Word count = what TTS will deliver in the speech time
        // TTS base rate ~150 wpm × playback speed (wpm/140) = actual words per minute
        const actualWPM=Math.round(150*(wpm/140));
        const targetWords=Math.round((s.time/60)*actualWPM);
        const hist=currentLog.map(l=>`[${l.code}. ${l.who}]: ${l.text}`).join('\n\n');
        const ttsSpeed=Math.max(0.75,Math.min(2.0,wpm/140));

        // ── Chunked TTS pipeline: fire audio for each paragraph as soon as it's ready ──
        // Default to 0 (calm delivery) so fast speech doesn't also sound breathless.
        // The old coupling (ttsSpeed-1)/1 auto-cranked intensity whenever the user
        // bumped speed, which was the main "annoying, too intense" signal.
        const ttsIntensity=0;
        const fetchTTSBlob=(text)=>{
          const input=text.slice(0,4000);
          return fetch('/api/tts',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({text:input,voice,speed:ttsSpeed,premium:isPro(),intensity:ttsIntensity}),
          }).then(r=>{
            if(!r.ok) throw new Error('TTS '+r.status);
            return r.blob();
          });
        };

        // Strip <plan>/<thinking> tags from AI output. including incomplete open tags during streaming
        const stripPlan=(text)=>text.replace(/<plan>[\s\S]*?<\/plan>/gi,'').replace(/<plan>[\s\S]*$/gi,'').replace(/<\/?plan>/gi,'').replace(/<thinking>[\s\S]*?<\/thinking>/gi,'').replace(/<thinking>[\s\S]*$/gi,'').replace(/<\/?thinking>/gi,'').trim();

        // ── Live-streaming TTS pipeline ──
        // Audio starts playing as soon as first ~25 words have TTS ready,
        // while AI is still generating the rest of the speech.
        const blobPromises=[];  // grows as AI streams. playStream consumes them live
        let lastChunkEnd=0;
        const MIN_CHUNK_WORDS=25;
        const MAX_CHUNK_WORDS=200;
        let playbackStarted=false;

        const onAudioStart=()=>{
          stopThinking();
          setAiLoading(false);
          timer.go(s.time);
        };

        const tryChunk=(clean,force)=>{
          const unchunked=clean.slice(lastChunkEnd).trim();
          const words=unchunked.split(/\s+/).filter(Boolean);
          if(words.length<MIN_CHUNK_WORDS&&!force) return;
          let splitText=unchunked;
          if(!force&&words.length>MAX_CHUNK_WORDS){
            const approxChar=unchunked.split(/\s+/).slice(0,MAX_CHUNK_WORDS).join(' ').length;
            const sentEnd=unchunked.indexOf('.',approxChar);
            if(sentEnd>0) splitText=unchunked.slice(0,sentEnd+1).trim();
          } else if(!force){
            const lastPeriod=unchunked.lastIndexOf('.');
            const lastExcl=unchunked.lastIndexOf('!');
            const lastQ=unchunked.lastIndexOf('?');
            const boundary=Math.max(lastPeriod,lastExcl,lastQ);
            if(boundary>unchunked.length*0.5) splitText=unchunked.slice(0,boundary+1).trim();
            else return;
          }
          if(splitText.length<20) return;
          lastChunkEnd+=clean.slice(lastChunkEnd).indexOf(splitText)+splitText.length;
          const blobP=fetchTTSBlob(splitText).catch(e=>{console.warn('[TTS] Chunk failed:',e);return null});
          blobPromises.push(blobP);
          console.log(`%c[TTS] Chunk ${blobPromises.length} queued (${splitText.split(/\s+/).length} words)`,'color:cyan');

          // Start playback on the FIRST chunk. don't wait for AI to finish
          if(!playbackStarted){
            playbackStarted=true;
            setAiLoading('voice');
            console.log('%c[TTS] Starting live playback while AI still generating','color:lime;font-weight:bold');
            tts.playChunks(blobPromises,()=>{orb.setMode('idle');setTimeout(()=>endSpeech(),800)},onAudioStart);
          }
        };

        // Generate argument text. chunks fire TTS and start playing mid-stream.
        // Pass voiceFormat so server appends the format-specific voice block
        // (Policy spreads + evidence tags, PF lay-accessible, LD value/criterion,
        // BP whip structure, Congress "Mr. Speaker," etc).
        const rawTxt=await callAI(buildPrompt(s,side,motion,hist,notes,format,oppStrengths,oppWeaknesses,getDifficultyNote(),background,currentLog,historyRounds,targetWords,voice,judgeParadigm),`Deliver your ${s.code} speech on: "${motion}"`,chunk=>{
          const clean=stripPlan(chunk);
          setAiText(clean);
          const words=clean.split(/\s+/).length;
          setAiPct(Math.min(99,Math.round((words/targetWords)*100)));
          tryChunk(clean,false);
        },brain,{voiceFormat:format});
        const txt=stripPlan(rawTxt);
        setAiText(txt);setAiPct(100);
        // Final chunk: anything remaining
        tryChunk(txt,true);
        blobPromises._done=true; // signal playChunks that no more chunks coming
        if(!playbackStarted) stopThinking();

        // If no chunks were created at all, fallback to single-shot
        if(!playbackStarted){
          SFX.ready();
          setAiLoading('voice');
          tts.speak(txt,wpm,()=>{orb.setMode('idle');setTimeout(()=>endSpeech(),800)},voice,onAudioStart);
        }
      }catch(e){
        stopThinking();
        setAiLoading(false);
        const msg='Something went wrong: '+e.message;
        setAiText('['+msg+']');
        orb.setMode('idle');
      }
    }
  };

  // End speech + advance (guarded against double-calls)
  const endSpeech=()=>{
    if(endingRef.current) return; // prevent double-fire from keyboard+button race
    endingRef.current=true;
    timer.reset();
    // Clean up POI state
    setPoiActive(false);setPoiText('');setPoiOffer(false);
    if(poiTimeoutRef.current){clearTimeout(poiTimeoutRef.current);poiTimeoutRef.current=null}
    const userTurn=cur.side===side;
    if(typeof gtag==='function')gtag('event','speech_end',{speech:cur.code,who:userTurn?'user':'ai',format:fmt.name});
    let text='';
    if(userTurn){text=rec.stop();orb.stopMic();orb.setMode('idle')}
    else{tts.stop();text=aiText;orb.setMode('idle')}

    const entry={code:cur.code,who:userTurn?'You':'AI',text:text||'(no transcript)'};
    const newLog=[...log,entry];
    setLog(newLog);setAiText('');

    const next=idx+1;
    if(next>=SPEECHES.length){
      clearSession();
      if(typeof gtag==='function')gtag('event','round_complete',{format:fmt.name,side,speeches:SPEECHES.length});
      transition('feedback',()=>genFeedback(newLog));
    } else {
      setIdx(next);
      setTimeout(()=>runSpeech(next,newLog),600);
    }
  };

  // Keyboard shortcuts
  useEffect(()=>{
    const handler=(e)=>{
      // Don't intercept when typing in a textarea/input
      if(e.target.tagName==='TEXTAREA'||e.target.tagName==='INPUT') return;
      if(phase==='speech'){
        if(e.code==='Space'){e.preventDefault();if(tts.speaking){const wasPaused=tts.paused;tts.togglePause();if(wasPaused){timer.resume()}else{timer.pause()}}}
        if(e.code==='Escape'||e.code==='ArrowRight'){e.preventDefault();endSpeech()}
      }
      if(phase==='prep'){
        if(e.code==='Enter'&&!e.shiftKey&&e.target.tagName!=='TEXTAREA'){e.preventDefault();goToSpeeches()}
      }
    };
    window.addEventListener('keydown',handler);
    return()=>window.removeEventListener('keydown',handler);
  },[phase,tts.speaking]);

  // Adaptive difficulty. check user's win rate against this opponent
  const getWinRate=()=>{
    if(historyRounds.length===0) return { wins:0, losses:0, total:0, rate:0.5 };
    const wins=historyRounds.filter(r=>r.userWon===true).length;
    const losses=historyRounds.filter(r=>r.userWon===false).length;
    return { wins, losses, total:historyRounds.length, rate: historyRounds.length>0 ? wins/historyRounds.length : 0.5 };
  };
  const getDifficultyNote=()=>{
    const wr=getWinRate();
    if(wr.total<3) return '';
    if(wr.rate>=0.7) return 'The user has been winning consistently ('+wr.wins+'/'+wr.total+' wins). Debate at a SIGNIFICANTLY higher level. exploit YOUR strengths more aggressively, give fewer openings, use more sophisticated arguments. Make them EARN the win.';
    if(wr.rate<=0.3) return 'The user has been struggling ('+wr.wins+'/'+wr.total+' wins). Debate well but leave slightly more exploitable openings in your weaker areas. Still argue to win, but give the user more chances to find your weaknesses.';
    return '';
  };

  // Judge feedback. structured ballot
  const[ballot,setBallot]=useState(null); // parsed structured ballot
  const[panelText,setPanelText]=useState(''); // streaming 3-judge deliberation
  const[panelResult,setPanelResult]=useState(null); // parsed vote tally
  const[panelLoading,setPanelLoading]=useState(false);

  // Parse [Judge]: turn format into array of {judge, text} for bubble rendering
  const parsePanelTurns=(raw)=>{
    const beforeVote = raw.split(/\[VOTE\]/i)[0] || raw;
    const lines = beforeVote.split(/\n(?=\[(?:Maya|Marcus|Dr\.? Chen|Chen)\]:)/i);
    return lines.map(block=>{
      const m = block.match(/^\[(Maya|Marcus|Dr\.? Chen|Chen)\]:\s*([\s\S]*)/i);
      if(!m) return null;
      const nameRaw = m[1].toLowerCase();
      const key = nameRaw.includes('maya') ? 'maya' : nameRaw.includes('marcus') ? 'marcus' : 'chen';
      return { judge: key, text: m[2].trim() };
    }).filter(Boolean);
  };

  // Parse the [VOTE]...[/VOTE] block at end of deliberation
  const parsePanelVote=(raw)=>{
    const m = raw.match(/\[VOTE\]([\s\S]*?)\[\/VOTE\]/i) || raw.match(/\[VOTE\]([\s\S]*)$/i);
    if(!m) return null;
    const block = m[1];
    const pick = (re)=> (block.match(re)||[])[1];
    const mayaVote = (pick(/Maya:\s*(user|ai)/i)||'').toLowerCase();
    const marcusVote = (pick(/Marcus:\s*(user|ai)/i)||'').toLowerCase();
    const chenVote = (pick(/(?:Dr\.?\s*)?Chen:\s*(user|ai)/i)||'').toLowerCase();
    const winner = (pick(/Winner:\s*(user|ai)/i)||'').toLowerCase();
    const spUser = parseFloat(pick(/user\s*=\s*([\d.]+)/i)||'0');
    const spAi = parseFloat(pick(/ai\s*=\s*([\d.]+)/i)||'0');
    const practice = (pick(/Practice this:\s*([^\n]+)/i)||'').trim();
    const votes = [mayaVote, marcusVote, chenVote].filter(v=>v==='user'||v==='ai');
    const tally = votes.filter(v=>v==='user').length + '-' + votes.filter(v=>v==='ai').length;
    return { maya: mayaVote, marcus: marcusVote, chen: chenVote, winner, tally, speakerPoints: { user: spUser, ai: spAi }, practice };
  };

  const genPanelFeedback=async(allLog)=>{
    setPanelLoading(true);
    setPanelText('');
    setPanelResult(null);
    const tx=allLog.map(l=>`[${l.code}. ${l.who}]: ${l.text}`).join('\n\n');
    // Prompt lives server-side as PROMPT_LIBRARY.judgePanelDeliberation
    try{
      let raw='';
      await callAI('','Full round transcript:\n\n'+tx,chunk=>{
        raw=chunk;
        setPanelText(chunk);
      },brain,{
        promptId:'judgePanelDeliberation',
        promptVars:{
          fmtName:fmt.name,
          motion:motion,
          sideLabel:fmt.sideLabels[side]||side,
          mayaParadigm:PANEL_JUDGES.maya.paradigm,
          mayaVoice:PANEL_JUDGES.maya.voice,
          marcusParadigm:PANEL_JUDGES.marcus.paradigm,
          marcusVoice:PANEL_JUDGES.marcus.voice,
          chenParadigm:PANEL_JUDGES.chen.paradigm,
          chenVoice:PANEL_JUDGES.chen.voice,
          voiceGuidelines:DEBATE_VOICE_GUIDELINES,
        },
      });
      const parsed=parsePanelVote(raw);
      if(parsed) setPanelResult(parsed);
    }catch(e){
      setPanelText('Could not generate panel deliberation: '+e.message);
    }
    setPanelLoading(false);
  };

  const genFeedback=async(allLog)=>{
    setFbLoading(true);setBallot(null);
    const tx=allLog.map(l=>`[${l.code}. ${l.who}]: ${l.text}`).join('\n\n');
    // Prompt lives server-side as PROMPT_LIBRARY.singleJudgeBallot
    try{
      let raw='';
      const paradigmNote = (judgeParadigm && JUDGE_PARADIGMS[judgeParadigm])
        ? 'Judge paradigm the user selected for this round: '+JUDGE_PARADIGMS[judgeParadigm].label+'.\n'+JUDGE_PARADIGMS[judgeParadigm].prompt+'\nYour ballot MUST be written in the voice of this paradigm — weigh and decide the way this judge would.\n\n'
        : '';
      const fb=await callAI('',paradigmNote+'Full round transcript:\n\n'+tx,chunk=>{raw=chunk;setFeedback(chunk)},brain,{
        promptId:'singleJudgeBallot',
        promptVars:{ fmtName:fmt.name, motion:motion, sideLabel:fmt.sideLabels[side]||side },
      });
      setFeedback(fb);
      // Parse structured ballot
      try{
        const cleaned=fb.replace(/```json\s*/g,'').replace(/```\s*/g,'').trim();
        const parsed=JSON.parse(cleaned);
        setBallot(parsed);
        saveRound(allLog,fb,parsed.winner==='user');
      }catch{
        // Fallback: save as unstructured
        saveRound(allLog,fb,null);
      }
    }catch(e){setFeedback('Could not generate feedback: '+e.message)}
    setFbLoading(false);
  };

  // Save round to history
  const saveRound=(allLog,fb,userWon)=>{
    const round={
      id:Date.now(),
      date:new Date().toISOString(),
      motion,format,side,voice,brain,
      oppStrengths,oppWeaknesses,
      formatName:(FORMATS[format]||FORMATS.apda).name,
      opponentName:'AI',
      sideLabel:(FORMATS[format]||FORMATS.apda).sideLabels[side]||side,
      log:allLog,
      feedback:fb||'',
      userWon: userWon, // true/false/null
    };
    const updated=[round,...historyRounds].slice(0,50);
    setHistoryRounds(updated);
    try{localStorage.setItem('debateos-round-history',JSON.stringify(updated))}catch{}
    // Also save to Firestore if signed in
    if(user&&firebaseDb){
      user.getIdToken().then(token=>{
        firebaseDb.collection('debate_rounds').doc(user.uid+'_'+round.id).set(round).catch(()=>{});
      }).catch(()=>{});
    }
  };

  const deleteRound=(id)=>{
    const updated=historyRounds.filter(r=>r.id!==id);
    setHistoryRounds(updated);
    try{localStorage.setItem('debateos-round-history',JSON.stringify(updated))}catch{}
    if(viewingRound&&viewingRound.id===id)setViewingRound(null);
  };

  // Copy transcript
  const copyAll=()=>{
    const t=log.map(l=>`[${l.code}. ${l.who}]\n${l.text}`).join('\n\n---\n\n')+'\n\n---\nJUDGE:\n'+feedback;
    navigator.clipboard.writeText(t).catch(()=>{});
  };

  // Format round as downloadable text
  const formatRoundText=(roundMotion,roundFormat,roundSide,roundLog,roundFeedback,roundBallot)=>{
    const fmtName=(FORMATS[roundFormat]||FORMATS.apda).name;
    const sideLabel=(FORMATS[roundFormat]||FORMATS.apda).sideLabels[roundSide]||roundSide;
    let txt=`DEBATE ROUND. ${fmtName}\n`;
    txt+=`${'═'.repeat(50)}\n\n`;
    txt+=`Motion: "${roundMotion}"\n`;
    txt+=`Side: ${sideLabel}\n`;
    txt+=`Date: ${new Date().toLocaleDateString()}\n\n`;
    txt+=`${'─'.repeat(50)}\n\n`;
    roundLog.forEach(l=>{
      txt+=`[${l.code}. ${l.who}]\n${l.text}\n\n${'─'.repeat(50)}\n\n`;
    });
    if(roundBallot){
      txt+=`JUDGE BALLOT\n${'═'.repeat(50)}\n\n`;
      txt+=`Winner: ${roundBallot.winner==='user'?'You':'AI'}\n`;
      txt+=`Decision: ${roundBallot.decision||''}\n\n`;
      if(roundBallot.speakerPoints) txt+=`Speaker Points. You: ${roundBallot.speakerPoints.user} | AI: ${roundBallot.speakerPoints.ai}\n\n`;
      if(roundBallot.keyClash) txt+=`Key Clash: ${roundBallot.keyClash}\n\n`;
      if(roundBallot.speeches) roundBallot.speeches.forEach(sp=>{
        txt+=`${sp.code} (${sp.who}). ${sp.score}\n`;
        if(sp.strengths) sp.strengths.forEach(s=>{ txt+=`  ${s}\n`; });
        if(sp.improvements) sp.improvements.forEach(s=>{ txt+=`  ${s}\n`; });
        txt+='\n';
      });
      if(roundBallot.practiceAdvice) txt+=`Practice Advice: ${roundBallot.practiceAdvice}\n`;
    } else if(roundFeedback){
      txt+=`JUDGE FEEDBACK\n${'═'.repeat(50)}\n\n${roundFeedback}\n`;
    }
    return txt;
  };

  // Download round as .txt file
  const downloadRound=(roundMotion,roundFormat,roundSide,roundLog,roundFeedback,roundBallot)=>{
    const txt=formatRoundText(roundMotion,roundFormat,roundSide,roundLog,roundFeedback,roundBallot);
    if(typeof gtag==='function')gtag('event','export_round',{format:roundFormat,side:roundSide});
    const blob=new Blob([txt],{type:'text/plain'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;

  );

  // ── PREP ──
  if(phase==='prep') return el('div',{className:'page'},
    el('div',{className:'ambient'}),bar,
    el('div',{className:stageClass},
      el('div',{className:'t-label'},'Prep Time'),
      el('div',{className:'t-time'+(prepTimer.left<=60?' danger':'')},prepTimer.fmt(prepTimer.left)),

        el('textarea',{className:'float-input',rows:8,placeholder:'Brainstorm your arguments...',value:notes,onChange:e=>{setNotes(e.target.value);try{localStorage.setItem('debateos-prep-notes',e.target.value)}catch{};setNotesSaved(true);setTimeout(()=>setNotesSaved(false),1200)},autoFocus:true,style:{width:'100%'}}),

      // AI Prep Coach
      el('div',{style:{display:'flex',gap:8,justifyContent:'center',marginTop:12}},
        el('button',{className:'cta-ghost',style:{fontSize:'.75rem',padding:'8px 16px'},disabled:prepHintLoading,onClick:async()=>{
          setPrepHintLoading(true);setPrepHint('');if(typeof gtag==='function')gtag('event','ai_prep_coach',{format:fmt.name,side});

  // ── SPEECH ──
  if(phase==='speech'){

    return el('div',{className:'page'},

        // Mic fallback: text input when mic unavailable

              el('input',{value:poiText,onChange:e=>setPoiText(e.target.value),placeholder:'Your POI...',style:{flex:1,padding:'10px 14px',background:'var(--c-surface3)',border:'1px solid var(--c-border4)',borderRadius:8,color:'var(--fg)',fontSize:'.85rem',fontFamily:'inherit'},onKeyDown:e=>{if(e.key==='Enter')sendPOI()}}),
              el('button',{className:'cta-ghost',onClick:sendPOI,style:{padding:'10px 16px',fontSize:'.8rem',marginTop:0}},'Send'),

        // POI: AI offers a POI during user speech
        isUser&&poiOffer&&el('div',{style:{position:'fixed',bottom:120,left:'50%',transform:'translateX(-50%)',background:'var(--c-scrim2)',border:'1px solid rgba(239,68,68,.3)',borderRadius:14,padding:'16px 24px',display:'flex',gap:12,alignItems:'center',zIndex:100}},

            el('button',{key:r,onClick:()=>{setLiveRate(r);tts.setRate(r)},style:{padding:'4px 10px',fontSize:'.68rem',borderRadius:8,border:liveRate===r?'1px solid rgba(239,68,68,.5)':'1px solid var(--c-border2)',background:liveRate===r?'rgba(239,68,68,.15)':'var(--c-surface2)',color:liveRate===r?'#ef4444':'var(--c-text)',cursor:'pointer',fontWeight:liveRate===r?700:500}},r+'×')

          el('button',{className:'cta-ghost',style:{padding:'6px 14px',fontSize:'.68rem',marginTop:0,opacity:showRoundPanel==='flow'?.9:.4},onClick:()=>setShowRoundPanel(showRoundPanel==='flow'?null:'flow')},'Flow'),
          savedCases.length>0&&el('button',{className:'cta-ghost',style:{padding:'6px 14px',fontSize:'.68rem',marginTop:0,opacity:showRoundPanel==='cases'?.9:.4},onClick:()=>setShowRoundPanel(showRoundPanel==='cases'?null:'cases')},'Cases'),
        ),

        // In-round panel content
        showRoundPanel==='notes'&&el('div',{style:{width:'100%',maxWidth:'min(90vw,700px)',margin:'12px auto 0'}},
          el('textarea',{className:'float-input',rows:5,placeholder:'Your prep notes...',value:notes,onChange:e=>{setNotes(e.target.value);try{localStorage.setItem('debateos-prep-notes',e.target.value)}catch{}},style:{width:'100%',fontSize:'.85rem'}}),
        ),
        showRoundPanel==='flow'&&el('div',{style:{width:'100%',maxWidth:'min(90vw,700px)',margin:'12px auto 0',background:'var(--c-surface)',border:'1px solid var(--c-border)',borderRadius:14,padding:'16px 20px',maxHeight:280,overflowY:'auto'}},
          log.length===0?el('div',{style:{color:'var(--c-dim)',fontSize:'.78rem',textAlign:'center'}},'No speeches yet'):
          log.map((l,i)=>el('div',{key:i,style:{marginBottom:10,paddingBottom:10,borderBottom:'1px solid var(--c-border)'}},
            el('div',{style:{fontSize:'.65rem',fontWeight:700,color:l.who==='You'?'#ef4444':'var(--c-text3)',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:4}},l.code+'. '+l.who),
            el('div',{style:{fontSize:'.78rem',color:'var(--c-mid)',lineHeight:1.5,maxHeight:80,overflow:'hidden'}},l.text.slice(0,300)+(l.text.length>300?'...':'')),
          ))
        ),
        showRoundPanel==='cases'&&el('div',{style:{width:'100%',maxWidth:'min(90vw,700px)',margin:'12px auto 0',background:'var(--c-surface)',border:'1px solid var(--c-border)',borderRadius:14,padding:'16px 20px',maxHeight:280,overflowY:'auto'}},
          savedCases.slice(0,5).map(c=>el('div',{key:c.id,style:{marginBottom:10,paddingBottom:10,borderBottom:'1px solid var(--c-border)',cursor:'pointer'},onClick:()=>{navigator.clipboard.writeText(c.fullText).catch(()=>{})}},
            el('div',{style:{fontSize:'.75rem',fontWeight:600,color:'var(--c-text3)'}},'"'+c.motion.slice(0,60)+'"'),
            el('div',{style:{fontSize:'.6rem',color:'var(--c-dim)',marginTop:2}},c.formatName+' · '+c.sideLabel+' · Tap to copy'),

          !isUser&&tts.speaking?'Tap Pause or press Space':'Tap End Speech or press Escape'
        ),
      )
    );
  }

  // ── FEEDBACK ──
  if(phase==='feedback') {
    const b=ballot; // structured ballot or null
    const wr=getWinRate();
    return el('div',{className:'page'},
      el('div',{className:'ambient'}),bar,
      el('div',{className:stageClass,style:{justifyContent:'flex-start',paddingTop:90,maxWidth:700,textAlign:'left'}},
        el('div',{className:'t-label',style:{textAlign:'center'}},'Round Complete'),
        el('h2',{className:'t-hero',style:{fontSize:'clamp(2rem,5vw,3.2rem)',marginBottom:8,textAlign:'center'}},'Judge Ballot'),
        el('p',{className:'t-dim',style:{marginBottom:24,textAlign:'center'}},'"'+motion+'". '+(fmt.sideLabels[side]||side)+' vs AI'),

        fbLoading&&!ballot&&el('div',{style:{textAlign:'center',marginTop:40}},
          el('p',{className:'t-dim',style:{fontStyle:'italic'}},'Deliberating...'),
        ),

        // Structured ballot
        b && el('div',{style:{width:'100%'}},
          // Decision banner
          el('div',{style:{padding:'20px 24px',background:b.winner==='user'?'rgba(34,197,94,.08)':'rgba(239,68,68,.08)',border:'1px solid '+(b.winner==='user'?'rgba(34,197,94,.2)':'rgba(239,68,68,.2)'),borderRadius:16,marginBottom:20,textAlign:'center'}},
            el('div',{style:{fontSize:'1.6rem',fontWeight:900,color:b.winner==='user'?'#22c55e':'#ef4444',marginBottom:6}},
              b.winner==='user'?'You Win':'Opponent Wins'

            el('p',{style:{fontSize:'.88rem',color:'var(--c-text4)',lineHeight:1.5}},b.decision),
          ),

          // ── Calibration / Confidence-delta panel ──────────────────

          // Asks for posterior, then displays the swing alongside the market price.
          marketPct!=null && el('div',{style:{padding:'20px 22px',background:'rgba(239,68,68,.06)',border:'1px solid rgba(239,68,68,.25)',borderRadius:16,marginBottom:20}},
            el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}},
              el('div',{style:{fontSize:'.66rem',fontWeight:800,color:'#ef4444',letterSpacing:'.12em',textTransform:'uppercase'}},'Calibration check'),
              el('div',{style:{fontSize:'.7rem',color:'rgba(255,255,255,.55)'}},(marketSource==='manifold'?'Manifold':'Polymarket')+': ',el('strong',{style:{color:'#fff',marginLeft:4}},marketPct+'%'))
            ),
            posteriorPct==null
              ? el('div',null,
                  el('div',{style:{fontSize:'.85rem',color:'rgba(255,255,255,.85)',marginBottom:12,lineHeight:1.5}},
                    'You started at ',el('strong',{style:{color:'#fff'}},priorPct+'%'),'. After arguing both sides. ',el('strong',{style:{color:'#fff'}},'how confident are you NOW?')
                  ),
                  el('div',{style:{display:'flex',alignItems:'center',gap:14,marginBottom:10}},
                    el('input',{
                      type:'range',min:0,max:100,defaultValue:priorPct,
                      id:'posterior-slider',
                      style:{flex:1,accentColor:'#ef4444'}
                    }),
                    el('div',{style:{minWidth:54,textAlign:'right',fontSize:'1.15rem',fontWeight:800,color:'#fff',fontVariantNumeric:'tabular-nums'},id:'posterior-num'},priorPct+'%')
                  ),
                  el('button',{
                    className:'cta-ghost',
                    style:{marginTop:6,fontSize:'.78rem'},
                    onClick:()=>{
                      const sl=document.getElementById('posterior-slider');
                      const v=sl?parseInt(sl.value,10):priorPct;
                      setPosteriorPct(v);
                      try{if(window.gtag)gtag('event','confidence_delta',{prior:priorPct,posterior:v,market:marketPct,delta:v-priorPct})}catch(e){}
                      // Persist to localStorage so /me can render the user's debate history.
                      // Survives reloads, no auth required, capped at 50 entries.
                      try {
                        const KEY = 'da-debates-v1';
                        const log = JSON.parse(localStorage.getItem(KEY) || '[]');
                        log.unshift({
                          motion: (motion || '').slice(0, 200),
                          prior: priorPct,
                          posterior: v,
                          market: marketPct,
                          source: marketSource,
                          ts: Date.now(),
                        });
                        localStorage.setItem(KEY, JSON.stringify(log.slice(0, 50)));
                      } catch(e) {}
                    }
                  },'Lock in answer →'),
                  el('script',{dangerouslySetInnerHTML:{__html:"(function(){var s=document.getElementById('posterior-slider');var n=document.getElementById('posterior-num');if(s&&n)s.addEventListener('input',function(){n.textContent=s.value+'%'});})();"}})
                )
              : el('div',null,
                  // Three-row delta display: prior → posterior → market
                  el('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10,marginBottom:14}},
                    el('div',{style:{padding:'14px 12px',background:'rgba(255,255,255,.04)',border:'1px solid rgba(255,255,255,.08)',borderRadius:12,textAlign:'center'}},
                      el('div',{style:{fontSize:'.6rem',color:'rgba(255,255,255,.5)',textTransform:'uppercase',letterSpacing:'.1em',marginBottom:4}},'Before'),
                      el('div',{style:{fontSize:'1.4rem',fontWeight:800,color:'rgba(255,255,255,.8)'}},priorPct+'%')
                    ),
                    el('div',{style:{padding:'14px 12px',background:'rgba(239,68,68,.1)',border:'1px solid rgba(239,68,68,.3)',borderRadius:12,textAlign:'center'}},
                      el('div',{style:{fontSize:'.6rem',color:'#ef4444',textTransform:'uppercase',letterSpacing:'.1em',marginBottom:4}},'After'),
                      el('div',{style:{fontSize:'1.4rem',fontWeight:800,color:'#fff'}},posteriorPct+'%')
                    ),
                    el('div',{style:{padding:'14px 12px',background:'rgba(255,255,255,.04)',border:'1px solid rgba(255,255,255,.08)',borderRadius:12,textAlign:'center'}},
                      el('div',{style:{fontSize:'.6rem',color:'rgba(255,255,255,.5)',textTransform:'uppercase',letterSpacing:'.1em',marginBottom:4}},'Market'),
                      el('div',{style:{fontSize:'1.4rem',fontWeight:800,color:'rgba(255,255,255,.8)'}},marketPct+'%')
                    )
                  ),
                  el('div',{style:{fontSize:'.85rem',color:'rgba(255,255,255,.85)',lineHeight:1.5,textAlign:'center'}},
                    Math.abs(posteriorPct-priorPct)<5
                      ? 'You barely moved. The arguments didn\'t shake your prior. that\'s either strong calibration or strong stubbornness.'
                      : (posteriorPct>priorPct
                        ? 'You moved '+(posteriorPct-priorPct)+' points UP. Arguing the case made it more credible to you.'
                        : 'You moved '+(priorPct-posteriorPct)+' points DOWN. Stress-testing your priors paid off.')
                  ),
                  el('div',{style:{marginTop:8,fontSize:'.72rem',color:'rgba(255,255,255,.5)',textAlign:'center'}},
                    'You\'re now ',
                    el('strong',{style:{color:'#fff'}},Math.abs(posteriorPct-marketPct)+' points'),
                    ' '+(posteriorPct>marketPct?'above':'below')+' the market.'
                  ),
                  // Share card buttons. viral loop. Every debate becomes a tiny ad.
                  el('div',{style:{marginTop:18,display:'flex',gap:10,justifyContent:'center',flexWrap:'wrap'}},
                    el('button',{
                      style:{padding:'10px 18px',borderRadius:10,border:'none',background:'#ef4444',color:'#fff',fontWeight:700,fontSize:'.85rem',cursor:'pointer',letterSpacing:'.02em'},
                      onClick:()=>{
                        try{if(window.gtag)gtag('event','share_card_click',{action:'share',prior:priorPct,posterior:posteriorPct,market:marketPct})}catch(e){}
                        shareConfidenceCard({motion,prior:priorPct,posterior:posteriorPct,market:marketPct,source:marketSource});
                      }
                    },'Share this delta'),
                    el('button',{
                      style:{padding:'10px 18px',borderRadius:10,border:'1px solid rgba(255,255,255,.2)',background:'transparent',color:'rgba(255,255,255,.85)',fontWeight:600,fontSize:'.85rem',cursor:'pointer'},
                      onClick:()=>{
                        try{if(window.gtag)gtag('event','share_card_click',{action:'download',prior:priorPct,posterior:posteriorPct,market:marketPct})}catch(e){}
                        downloadConfidenceCard({motion,prior:priorPct,posterior:posteriorPct,market:marketPct,source:marketSource});
                      }
                    },'Download PNG')
                  )
                )
          ),

          // Speaker Points
          el('div',{style:{display:'flex',gap:12,marginBottom:20,flexWrap:'wrap'}},
            el('div',{style:{flex:1,minWidth:140,padding:'16px 20px',background:'var(--c-surface)',border:'1px solid var(--c-border)',borderRadius:14,textAlign:'center'}},
              el('div',{style:{fontSize:'.65rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'.1em',color:'var(--c-muted)',marginBottom:6}},'Your Points'),
              el('div',{style:{fontSize:'2rem',fontWeight:900,color:'var(--fg)'}},b.speakerPoints?.user||', '),
            ),
            el('div',{style:{flex:1,minWidth:140,padding:'16px 20px',background:'var(--c-surface)',border:'1px solid var(--c-border)',borderRadius:14,textAlign:'center'}},
              el('div',{style:{fontSize:'.65rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'.1em',color:'var(--c-muted)',marginBottom:6}},'AI Points'),
              el('div',{style:{fontSize:'2rem',fontWeight:900,color:'var(--c-text)'}},b.speakerPoints?.ai||', '),
            ),
            wr.total>=2&&el('div',{style:{flex:1,minWidth:140,padding:'16px 20px',background:'var(--c-surface)',border:'1px solid var(--c-border)',borderRadius:14,textAlign:'center'}},
              el('div',{style:{fontSize:'.65rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'.1em',color:'var(--c-muted)',marginBottom:6}},'Overall Win Rate'),
              el('div',{style:{fontSize:'2rem',fontWeight:900,color:wr.rate>=0.5?'#22c55e':'#f59e0b'}},Math.round(wr.rate*100)+'%'),
            ),
          ),

          // Key clash
          b.keyClash&&el('div',{style:{padding:'16px 20px',background:'var(--c-surface)',border:'1px solid var(--c-border)',borderRadius:14,marginBottom:20}},
            el('div',{style:{fontSize:'.65rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'.1em',color:'#f59e0b',marginBottom:6}},'Key Clash'),
            el('p',{style:{fontSize:'.88rem',color:'var(--c-text4)',lineHeight:1.5}},b.keyClash),
          ),

          // Per-speech breakdown
          b.speeches&&b.speeches.length>0&&el('div',{style:{marginBottom:20}},
            el('div',{style:{fontSize:'.65rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'.1em',color:'var(--c-muted)',marginBottom:12}},'Speech Breakdown'),
            b.speeches.map((sp,i)=>el('div',{key:i,style:{padding:'14px 18px',background:'var(--c-surface)',border:'1px solid var(--c-border)',borderRadius:12,marginBottom:8}},
              el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}},
                el('span',{style:{fontWeight:700,fontSize:'.85rem',color:'var(--c-bright)'}},sp.code+'. '+sp.who),
                el('span',{style:{fontSize:'1.1rem',fontWeight:900,color:sp.score>=28?'#22c55e':sp.score>=27?'#f5f5f7':'#f59e0b'}},sp.score),
              ),
              sp.strengths&&el('div',{style:{marginBottom:4}},sp.strengths.map((s,j)=>
                el('div',{key:'s'+j,style:{fontSize:'.78rem',color:'rgba(100,220,100,.6)',paddingLeft:12}},''+s)
              )),
              sp.improvements&&sp.improvements.map((s,j)=>
                el('div',{key:'i'+j,style:{fontSize:'.78rem',color:'rgba(239,68,68,.6)',paddingLeft:12}},''+s)
              ),
            )),
          ),

          // Overall strengths/weaknesses
          (b.overallStrengths||b.overallWeaknesses)&&el('div',{style:{display:'flex',gap:12,marginBottom:20,flexWrap:'wrap'}},
            b.overallStrengths&&el('div',{style:{flex:1,minWidth:140,padding:'14px 18px',background:'rgba(34,197,94,.04)',border:'1px solid rgba(34,197,94,.1)',borderRadius:14}},
              el('div',{style:{fontSize:'.65rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'.1em',color:'#22c55e',marginBottom:8}},'Strengths'),
              b.overallStrengths.map((s,i)=>el('div',{key:i,style:{fontSize:'.8rem',color:'var(--c-text3)',marginBottom:4}},'• '+s)),
            ),
            b.overallWeaknesses&&el('div',{style:{flex:1,minWidth:140,padding:'14px 18px',background:'rgba(239,68,68,.04)',border:'1px solid rgba(239,68,68,.1)',borderRadius:14}},
              el('div',{style:{fontSize:'.65rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'.1em',color:'#ef4444',marginBottom:8}},'To Improve'),
              b.overallWeaknesses.map((s,i)=>el('div',{key:i,style:{fontSize:'.8rem',color:'var(--c-text3)',marginBottom:4}},'• '+s)),
            ),
          ),

          // Practice advice
          b.practiceAdvice&&el('div',{style:{padding:'16px 20px',background:'rgba(59,130,246,.06)',border:'1px solid rgba(59,130,246,.15)',borderRadius:14,marginBottom:20}},
            el('div',{style:{fontSize:'.65rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'.1em',color:'#3b82f6',marginBottom:6}},'Practice This Next'),
            el('p',{style:{fontSize:'.88rem',color:'var(--c-text4)',lineHeight:1.5}},b.practiceAdvice),
          ),
        ),

        // Fallback: raw text if JSON parse failed + retry button
        !b&&feedback&&el('div',null,
          el('div',{className:'fb-card'},el('div',{className:'feedback-text'},feedback)),
          el('button',{className:'cta-ghost',style:{marginTop:12,display:'block',margin:'12px auto'},onClick:()=>genFeedback(log)},'Retry Judge Feedback'),
        ),

        // ── 3-Judge Panel Deliberation ──────────────────────────────
        el('div',{style:{marginTop:32,padding:'24px 20px 20px',background:'linear-gradient(180deg,rgba(168,85,247,.04),rgba(96,165,250,.04))',border:'1px solid rgba(168,85,247,.15)',borderRadius:18}},
          el('div',{style:{textAlign:'center',marginBottom:16}},
            el('div',{style:{fontSize:'.65rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'.12em',color:'#a855f7',marginBottom:6}},'Judge Panel Deliberation'),
            el('div',{style:{fontSize:'.85rem',color:'var(--c-text3)',maxWidth:480,margin:'0 auto',lineHeight:1.5}},'Hear three judges with different paradigms argue through your round. just like a real APDA panel.'),
          ),
          // Judge portraits
          el('div',{style:{display:'flex',justifyContent:'center',gap:14,marginBottom:16,flexWrap:'wrap'}},
            Object.entries(PANEL_JUDGES).map(([k,j])=>
              el('div',{key:k,style:{display:'flex',alignItems:'center',gap:8,padding:'8px 14px',background:j.color+'12',border:'1px solid '+j.color+'30',borderRadius:999}},
                el('div',{style:{width:26,height:26,borderRadius:'50%',background:j.color,color:'#0a0a0a',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:800,fontSize:'.78rem'}},j.initial),
                el('div',{style:{textAlign:'left'}},
                  el('div',{style:{fontSize:'.75rem',fontWeight:700,color:j.color,lineHeight:1.1}},j.name),
                  el('div',{style:{fontSize:'.6rem',color:'var(--c-muted)',lineHeight:1.1}},j.role),
                ),
              )
            ),
          ),
          // Trigger button (only when no deliberation yet)
          !panelText&&!panelLoading&&el('div',{style:{textAlign:'center'}},
            el('button',{className:'cta',style:{marginTop:0,background:'linear-gradient(135deg,#a855f7,#60a5fa)'},onClick:()=>genPanelFeedback(log)},'Hear the judges deliberate'),
          ),
          panelLoading&&!panelText&&el('div',{style:{textAlign:'center',padding:'16px 0',fontSize:'.82rem',color:'var(--c-muted)'}},'Judges huddling...'),
          // Streaming deliberation. render as chat bubbles
          (panelText||panelLoading)&&el('div',{style:{marginTop:16,display:'flex',flexDirection:'column',gap:12,maxHeight:480,overflowY:'auto',padding:'8px 4px'}},
            parsePanelTurns(panelText).map((turn,i)=>{
              const j = PANEL_JUDGES[turn.judge];
              if(!j) return null;
              return el('div',{key:i,style:{display:'flex',gap:10,alignItems:'flex-start'}},
                el('div',{style:{width:32,height:32,borderRadius:'50%',background:j.color,color:'#0a0a0a',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:800,fontSize:'.82rem',flexShrink:0}},j.initial),
                el('div',{style:{flex:1,padding:'10px 14px',background:j.color+'0c',border:'1px solid '+j.color+'22',borderRadius:14}},
                  el('div',{style:{fontSize:'.68rem',fontWeight:700,color:j.color,marginBottom:4,letterSpacing:'.04em'}},j.name.toUpperCase()+' · '+j.role.toUpperCase()),
                  el('div',{style:{fontSize:'.86rem',color:'var(--c-text4)',lineHeight:1.55,whiteSpace:'pre-wrap'}},turn.text),
                ),
              );
            }),
          ),
          // Vote tally
          panelResult&&el('div',{style:{marginTop:20,padding:'18px 20px',background:panelResult.winner==='user'?'rgba(34,197,94,.06)':'rgba(239,68,68,.06)',border:'1px solid '+(panelResult.winner==='user'?'rgba(34,197,94,.2)':'rgba(239,68,68,.2)'),borderRadius:14}},
            el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12,flexWrap:'wrap',gap:10}},
              el('div',{style:{fontSize:'.65rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'.12em',color:'var(--c-muted)'}},'Panel Decision'),
              el('div',{style:{fontSize:'1.15rem',fontWeight:900,color:panelResult.winner==='user'?'#22c55e':'#ef4444'}},
                panelResult.winner==='user'?'You win '+panelResult.tally:'AI wins '+panelResult.tally,
              ),
            ),
            el('div',{style:{display:'flex',gap:10,marginBottom:12,flexWrap:'wrap'}},
              ['maya','marcus','chen'].map(k=>{
                const j = PANEL_JUDGES[k];
                const vote = panelResult[k];
                const userVoted = vote==='user';
                return el('div',{key:k,style:{display:'flex',alignItems:'center',gap:6,padding:'6px 10px',background:j.color+'10',border:'1px solid '+j.color+'28',borderRadius:999,fontSize:'.72rem'}},
                  el('div',{style:{width:18,height:18,borderRadius:'50%',background:j.color,color:'#0a0a0a',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:800,fontSize:'.62rem'}},j.initial),
                  el('span',{style:{color:j.color,fontWeight:700}},j.name),
                  el('span',{style:{color:'var(--c-muted)'}},'→'),
                  el('span',{style:{color:userVoted?'#22c55e':'#ef4444',fontWeight:700}},userVoted?'You':'AI'),
                );
              }),
            ),
            panelResult.speakerPoints&&(panelResult.speakerPoints.user||panelResult.speakerPoints.ai)&&el('div',{style:{fontSize:'.76rem',color:'var(--c-text3)',marginBottom:8}},'Speaker points. You: ',el('strong',null,panelResult.speakerPoints.user.toFixed(1)),' · AI: ',el('strong',null,panelResult.speakerPoints.ai.toFixed(1))),
            panelResult.practice&&el('div',{style:{marginTop:8,padding:'10px 14px',background:'rgba(59,130,246,.08)',border:'1px solid rgba(59,130,246,.18)',borderRadius:10,fontSize:'.82rem',color:'var(--c-text4)'}},
              el('span',{style:{fontWeight:700,color:'#3b82f6'}},'Practice this next: '),
              panelResult.practice,
            ),
          ),
          // Replay button
          panelText&&!panelLoading&&el('div',{style:{textAlign:'center',marginTop:14}},
            el('button',{className:'cta-ghost',style:{fontSize:'.76rem'},onClick:()=>genPanelFeedback(log)},'New deliberation'),
          ),
        ),

        el('button',{className:'transcript-btn',style:{marginTop:28},onClick:()=>setShowTx(!showTx)},showTx?'▼ Hide round transcript':'▶ Show round transcript'),
        showTx&&el('div',{className:'transcript-box',style:{maxHeight:360}},log.map(l=>'['+l.code+'. '+l.who+']\n'+l.text).join('\n\n---\n\n')),

        el('div',{className:'row-c',style:{marginTop:28,flexWrap:'wrap'}},
          el('button',{className:'cta-ghost',onClick:copyAll},'Copy'),
          el('button',{className:'cta-ghost',onClick:()=>downloadRound(motion,format,side,log,feedback,ballot)},'⬇ Download .txt'),
          el('button',{className:'cta-ghost',onClick:()=>saveCase(),style:caseSaved?{background:'rgba(34,197,94,.15)',borderColor:'#22c55e',color:'#22c55e'}:{}},caseSaved?'Case Saved':'Save Case'),
          el('button',{className:'cta',style:{marginTop:0},onClick:newRound},'New Round'),
        ),
      )
    );
  }

  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(el(App));
</script>
</body>
</html>
