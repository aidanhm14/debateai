/* ── Flow Tracker: analyze what's been dropped/extended/conceded ── */
function buildFlowAnalysis(history,format,userSide){
  if(!history) return '';
  const fmt=FORMATS[format]||FORMATS.apda;
  const speeches=history.split('\n\n').filter(s=>s.startsWith('['));
  if(speeches.length<2) return '';

  return `
FLOW ANALYSIS. READ THIS CAREFULLY BEFORE SPEAKING:
You must track the "flow" of the round. every argument that has been made, and what happened to it.

Here is the round history for you to analyze:
${history}

Before writing your speech, mentally track:
1. THEIR ARGUMENTS: List every distinct argument/warrant the opponent has made. For each one, note: have you (your side) responded to it? If not, it is a DROP and you are losing on that argument. You MUST address drops.
2. YOUR ARGUMENTS: List every argument your side has made. Has the opponent responded? If they dropped it, EXTEND it explicitly: "They completely dropped our [argument name]. pull this through, Judge."
3. CONCESSIONS: Has either side conceded any point? If they conceded something, use it: "They granted our point about X. That's huge because it means Y."
4. CLASH POINTS: Where are both sides directly engaging? These are the key voting issues. Weigh them explicitly.

STRATEGIC RULES based on the flow:
- NEVER re-argue a point your side already made well. Instead, EXTEND it with new warrants, new applications, or weighing. Repetition is a waste of speech time.
- ALWAYS address the opponent's STRONGEST argument first, not their weakest. Judges notice when you dodge the hard clash. it makes you look scared.
- If the opponent dropped something, don't just note it. explain WHY the drop is fatal: "Because they dropped [Argument Name], they have no answer to [specific impact]. That argument flows uncontested to our side and it's sufficient to win the round on its own."
- Track the NUMBER of arguments won vs lost. If you're winning 3 clashes and losing 1, crystallize around the 3 wins and minimize the 1 loss.
- ADAPT YOUR STRATEGY to the round state:
  * If you're WINNING: protect your leads, don't overreach, force the opponent to answer YOUR framing
  * If you're LOSING: be aggressive, challenge their framework, find turns, create new voting issues
  * If it's CLOSE: weighing is everything. the side that does better comparative analysis wins tight rounds`;
}

/* ── Adaptive Opponent Modeling: detect user's argument patterns ── */
function buildOpponentModel(currentLog, historyRounds, userSide){
  // Analyze current round
  const userSpeeches=currentLog.filter(l=>l.who==='You');
  if(userSpeeches.length===0) return '';

  const userText=userSpeeches.map(l=>l.text).join(' ');
  const patterns=[];

  // Detect argument style tendencies
  if(userText.match(/framework|standard|criterion/gi)?.length>2) patterns.push('relies heavily on framework-level debate. challenge their framework directly or show yours subsumes it');
  if(userText.match(/example|instance|case study|real.?world/gi)?.length>2) patterns.push('uses lots of real-world examples. attack the examples as disanalogous or cherry-picked');
  if(userText.match(/emotion|feel|suffer|pain|human cost/gi)?.length>2) patterns.push('leans on emotional/pathos appeals. counter with structural analysis and mechanism');
  if(userText.match(/study|data|percent|statistic|research/gi)?.length>2) patterns.push('evidence-heavy. question the methodology or show the data cuts both ways');
  if(userText.match(/rights?|freedom|autonomy|liberty|dignity/gi)?.length>2) patterns.push('frames through rights/deontological lens. argue rights conflict or that consequences override in this context');
  if(userText.match(/consequen|utilitar|outcome|result|effect/gi)?.length>2) patterns.push('consequentialist framing. introduce a rights-based or principled objection they cannot weigh against');
  if(userText.match(/moral hazard|incentiv|rational|actor/gi)?.length>1) patterns.push('uses economic/rational actor reasoning. show where human behavior deviates from rational models');
  if(userText.match(/slippery slope|inevitable|always leads|will become/gi)?.length>1) patterns.push('prone to slippery slope reasoning. challenge the mechanism at each step');

  // Detect structural tendencies
  if(!userText.match(/weigh|outweigh|magnitude|probability|timeframe/gi)) patterns.push('DOES NOT WEIGH. exploit this by doing extensive comparative weighing on every clash');
  if(!userText.match(/even if|grant|concede/gi)) patterns.push('does not use strategic concessions or preemption. use even-if arguments to show your case is resilient');
  if(!userText.match(/drop|extend|pull through|cross.?apply/gi)) patterns.push('does not track the flow. call out their drops loudly and extend your untouched arguments');
  if(!userText.match(/framework|standard|criterion|lens/gi)) patterns.push('DID NOT SET A FRAMEWORK. set one aggressively and make all arguments flow through your standard');
  if(!userText.match(/impact|harm|benefit|consequence|affect/gi)) patterns.push('WEAK ON IMPACTS. their arguments lack terminal impacts, punish this by showing your impacts are concrete and theirs are vague');
  if(userText.split(/\s+/).length < 100 && userSpeeches.length > 0) patterns.push('VERY SHORT SPEECHES. they are underutilizing their time, point this out to the judge as lack of substantive engagement');

  // Check history for broader patterns
  if(historyRounds && historyRounds.length >= 3){
    const recentWins=historyRounds.slice(0,5).filter(r=>r.userWon===true).length;
    const recentTotal=Math.min(5,historyRounds.length);
    if(recentWins/recentTotal>=0.7) patterns.push('has been winning frequently. bring your A-game, exploit any gap in their technique');
    if(recentWins/recentTotal<=0.3) patterns.push('has been struggling. still debate well but the user needs practice identifying drops and weighing');
  }

  if(patterns.length===0) return '';
  return `
OPPONENT SCOUTING REPORT (based on analysis of their speeches this round):
Your opponent's tendencies: ${patterns.join('; ')}.
Use this intelligence. If they don't weigh, you weigh extensively. If they rely on examples, attack with framework. If they're framework-heavy, overwhelm with concrete impacts. Exploit their blind spots while respecting their strengths.`;
}

// Voice guidelines now live server-side (see
// /app/netlify/functions/lib/voice-guidelines.mjs). The brain endpoints
// inject the full block based on `_voiceFeature` in the request body.
// This constant stays as an empty string so the few inline
// `${DEBATE_VOICE_GUIDELINES}` interpolations below become no-ops.
const DEBATE_VOICE_GUIDELINES = '';

// Build the rivalry memory block: if the user has faced THIS voice
// personality before, give the AI a short history so it can reference the
// prior rounds naturally. This is what turns a one-shot debate into an
// ongoing rivalry, the AI "remembers" getting beaten on the impact calc
// last round and anticipates it this round.
function buildOpponentMemory(voice, historyRounds) {
  if (!voice || !Array.isArray(historyRounds) || !historyRounds.length) return '';
  const prior = historyRounds.filter(r => r && r.voice === voice);
  if (!prior.length) return '';
  const wins = prior.filter(r => r.userWon === true).length;
  const losses = prior.filter(r => r.userWon === false).length;
  // Last 3 rounds, most recent first, enough to ground the AI's memory
  // without overflowing the system prompt.
  const recent = prior.slice(0, 3).map((r, i) => {
    const outcome = r.userWon === true ? 'they beat you' : r.userWon === false ? 'you beat them' : 'split decision';
    const side = r.sideLabel || r.side || '?';
    return `  ${i+1}. "${(r.motion||'').slice(0,100)}", they ran ${side}, ${outcome}`;
  }).join('\n');
  const personaLine = `You've debated this opponent ${prior.length} time${prior.length===1?'':'s'} before. Record so far: ${losses}W-${wins}L in your favor.`;
  return `
RIVALRY, YOU AND THIS DEBATER HAVE HISTORY:
${personaLine}
Recent rounds:
${recent}

Play this like a rematch. Reference the history sparingly but real, "last time you ran ${prior[0].sideLabel||prior[0].side||'the other side'} on a motion like this and I caught the drop on..." or "I've learned your tells, you'll likely collapse to the impact argument, so I'm pre-empting it this time." Do NOT force the reference if it doesn't fit; ONE callback per speech is plenty. The goal is to make this feel like a debate between two people who've been in a room together before, not a cold open.
`;
}

function buildPrompt(speech,userSide,motion,history,notes,format,oppStr,oppWk,difficultyNote,background,currentLog,historyRounds,targetWordCount,voice,judgeParadigm,customParadigm,aiLanguage){

The user is on Quick Clash precisely because they're new. Match the

────────────────────────────────────────────────────────
` : '';
  const isRebuttal=speech.code.includes('R')||speech.code==='LOR'||speech.code==='PMR'||speech.code==='GW'||speech.code==='OW'||speech.code.startsWith('Reply');

  const isConstructive=!isRebuttal;

  // Build flow analysis and opponent model
  const flowAnalysis=buildFlowAnalysis(history,format,userSide);
  const opponentModel=buildOpponentModel(currentLog||[],historyRounds||[],userSide);
  const rivalryMemory=buildOpponentMemory(voice, historyRounds||[]);
  // Custom paradigm (Tabroom paste) wins over the preset when present.
  // Real judge prep is always more specific than any of our generic buckets.
  const paradigmBlock = (customParadigm && customParadigm.trim())
    ? `\nJUDGE PARADIGM, ADAPT YOUR STRATEGY:\nYour judge is a SPECIFIC REAL JUDGE whose paradigm the debater has provided below. Read it carefully. Weight their explicit preferences (what they like, dislike, vote on) over any generic strategy. Adapt your style, vocabulary, and argument selection to what THIS judge rewards. When in doubt, err on whatever the paradigm text actually says, if it says "I hate theory," drop theory. If it says "evidence is gospel," cite more. If it says "I vote on the flow," be ruthless about signposting and drops.\n\n---JUDGE PARADIGM TEXT (VERBATIM)---\n${customParadigm.trim()}\n---END JUDGE PARADIGM---\n`
    : (judgeParadigm && JUDGE_PARADIGMS[judgeParadigm])
      ? `\nJUDGE PARADIGM, ADAPT YOUR STRATEGY:\n${JUDGE_PARADIGMS[judgeParadigm].prompt}\n`
      : '';

  const steelmanInstruction=history?`
STEELMANNING. NON-NEGOTIABLE:
Never strawman. Before attacking any opponent argument, state it at its STRONGEST. better than they said it. Then beat THAT version. This does three things:
1. Shows the judge you understand the debate at a deep level
2. Makes your refutation bulletproof. if you beat their best version, their actual version is dead
3. Prevents the opponent from saying "that's not what I argued"
Format: "The strongest version of their argument is [steelman]. Even granting all of that, it still fails because [your response]."
If their argument IS genuinely strong, don't pretend it's weak. Concede the premise, then show why it doesn't reach their conclusion or why your impact still outweighs.`:'';
  // Push for creative, non-obvious arguments. vary how aggressively
  const creativityRoll = Math.random();
  const unconventionalNote = creativityRoll < 0.4 ? `
ARGUMENT CREATIVITY. BE CLEVER:
- Your arguments should NOT be the first thing anyone would think of. The obvious argument is the one your opponent prepped for.
- For at least one argument, find a COUNTERINTUITIVE angle. where the naive expectation is wrong. The best debate arguments make the judge think "I never considered that."
- Use MECHANISM over ASSERTION. Don't just say "this causes harm." Show the specific, surprising causal pathway: perverse incentives, second-order effects, moral hazard, adverse selection, regulatory arbitrage, coordination failures, race-to-the-bottom dynamics.

ARGUMENT CREATIVITY:

  const isClosingSpeech = speech.code==='LOR'||speech.code==='PMR'   // APDA

  const evenIfBlock = (evenIfEligible && evenIfRoll < 0.6) ? `
EVEN-IF STACKING, LAYERED DEFENSE ON AT LEAST ONE ARGUMENT:
When responding to an opponent argument that could go either way, don't rely on a single line of response. Stack defenses in an "even-if" structure so the argument loses no matter which line of defense the opponent breaks. Format:

This is the hallmark of a rigorous rebuttal. It forces the opponent to beat every layer, not just the top one. Use it on at least one central argument, ideally on the argument the judge is most likely to vote on.
GUARDRAIL: Only stack even-ifs when each layer is genuinely true. A stack with a fake middle layer is worse than a clean single response, opponents and judges see through it.

  // Explicit weighing calculus, should be near-default in closing speeches.

- SCOPE: Structural vs. one-off? Systemic changes outweigh one-time effects in most judging frames.
Format: "On magnitude, we win because, [comparison]. On probability, we win because, [comparison]. On timeframe, we win because, [comparison]." Make the comparison explicit; never just list your own impacts without contrasting theirs.
GUARDRAIL: Don't cherry-pick dimensions you win on and ignore the ones you lose on. If they win probability, concede it and explain why your magnitude advantage still outweighs. Judges reward honesty in weighing; they penalize one-sided impact calc that ignores obvious counter-weighing.

  // Tight-call option, parli-only, Opposition-opening-speech-only. Gives

TIGHT-CALL OPTION, YOU MAY CALL TIGHT IF THIS MOTION IS GENUINELY UNDEFENDABLE:
Before you deliver your LO, honestly assess whether the motion "${motion}" gives Gov an unfair advantage that no skilled Opp could beat. A motion is "tight" in APDA terms when:
- The proposition is obviously correct to most judges (e.g., "cure cancer," "end child slavery"), Opp has no legitimate ground.
- The framing, caveats, or framework pre-empt every viable Opp impact before the round even starts.

IF you judge this motion to be genuinely tight (not just difficult, TIGHT), you may open your LO with a tight call. Two legitimate patterns, pick one:

IMPORTANT GUARDRAILS:
- Do NOT call tight on motions that are just hard. Hard ≠ tight. If you can imagine a sharp debater beating Gov, the case is winnable and you should run straight opp instead.

- If you're not genuinely convinced the motion is tight, IGNORE THIS ENTIRE BLOCK and deliver a normal LO. A spurious tight call loses you the round.

  const cxSimulatorBlock = isCX ? `
CX / CROSSFIRE SIMULATOR, MANDATORY DIALOGUE FORMAT:

This is NOT a speech. It is a ${cxIsCrossfire ? 'CROSSFIRE' : 'CROSS-EXAMINATION'} period. You are simulating the BACK-AND-FORTH between both debaters. Output 5-8 rapid exchanges total, each ONE or TWO sentences max per turn.

FORMAT every turn with a speaker tag at the start of the line, like a transcript:
${cxIsCrossfire

${userLabel}: [concise answer or counter-question]
${aiLabel}: [follow-up that pins them down]
${userLabel}: [response]
...`

VOICE & DELIVERY:
- HOOK. Your opening line is everything. NEVER open with: "Thank you," "Good morning," "Alright," "So," "Let me start by...," "Imagine a world," "Picture this," "Let's dive in," "I'm here to argue," "In this speech I will," "Buckle up," "Here's the thing." These are dead air OR pure ChatGPT tells. Your first word should HIT.
- NEVER name your framework in Title Case corporate-speak like "Societal Cohesion and Vulnerability Mitigation" or "Human Flourishing Framework." Real framework names are SHORT and GRITTY: "harm minimization," "the marginal worker test," "bodily autonomy," "whose-lives-get-worse," "the downstream harm lens." One-to-three words, lowercase if possible, named like a real debater would write it on the flow.
${isFirst ? `  First constructive hooks (start INSIDE the argument. no warm-up):
  * A concrete number that flips intuition: "Eighty-three percent of sex workers in the UK report violence from clients, and the number doubles for workers pushed underground by criminalization."
  * Name the framework up front with its decision rule: "Framework first. We're evaluating this round on harm minimization. whichever side reduces net harm to the most vulnerable people wins. Here's why that's the right lens, and here's why we meet it."
  * Directly disagree with a common assumption: "Everything you're about to hear from the other side rests on one assumption, and it's wrong."
  * The counterintuitive thesis: "The surprising thing about this debate is that criminalization is what's actually creating the harm they're claiming decriminalization causes."
  * A pointed question that frames the whole round: "Who actually gets hurt in the status quo, and does the motion make it better for them? That's the whole round."` :
isRebuttal ? `  Rebuttal hooks. open by exposing the round's key tension:
  * Expose the fatal flaw: "Judge, their entire case hangs on one link. and it just snapped."
  * Concession flip: "Grant them everything they said. Every word. They still lose, and here's why."
  * Round crystallization: "This round comes down to a single question, and they're on the wrong side of it."
  * Drop callout: "They left our strongest argument completely untouched. That tells you everything."` :
`  Later constructive hooks. respond to what happened:
  * Attack their framework: "The ${userLabel}'s framework sounds nice until you ask one question: [question that breaks it]."
  * Flip their strength: "They spent a lot of time on [their best point]. Ironically, it's actually a reason to vote for us."
  * Status check: "Two speeches in, and they still haven't answered the most basic question about their case."`}
- TRANSITIONS between arguments should be smooth and confident, not mechanical. Instead of "Moving to my second argument," use: "But it gets worse for them," or "That's the individual harm. zoom out to the systemic level," or "Now, they might think that's their strongest ground. It's not. Because..."
- NEVER narrate what you're about to do. No "Let me now turn to..." Just DO it. No "I'm going to explain why..." Just explain.
- Reference the judge directly: "Judge, the delta in this round comes down to..." / "Here's your voting issue, Judge."
- Use debate language naturally: "pull through," "cross-apply," "extend," "non-unique," "the link story is broken," "that argument is terminal for their case," "this is a clean win on the flow."
- Sound like someone explaining passionately to a smart friend. Conversational but precise. Authoritative but not pompous.
- Short punchy sentences for claims. Longer flowing sentences for mechanism. Cut filler ruthlessly. every word earns its place.
- No bullet points, no markdown, no headers, no asterisks. Spoken word only. STRUCTURED spoken word. the judge should be able to flow it.

${isFirst ? `VOCABULARY & TONE:
- Use precise, high-register vocabulary when it's the RIGHT word. not for show. "Vitiates" is better than "undermines" when you mean something was made legally void. "Attenuates" is better than "weakens" when you mean gradual dilution. Use elevated language to be precise, not to sound smart.
- Name specific concepts when relevant: "tragedy of the commons," "moral hazard," "regulatory capture," "Rawlsian veil of ignorance," "collective action problem," "principal-agent problem." These show the judge you understand the underlying theory.
- CONFIDENT, not arrogant. The best debaters sound like they're explaining something obvious to a friend, not performing for an audience. Controlled intensity. you believe what you're saying because the logic demands it.
- Dismissive when earned: "That argument is dead on arrival" or "Their link chain doesn't survive first contact with the real world." But only when you've actually shown why. confidence without warrant is bluster.
- Vary your energy. Not every sentence is a haymaker. Build quietly, then punch. Some of the most devastating debate moments are said calmly: "And that's the point they can't get around."
- COLLOQUIAL FLAIR (use sparingly, ~10-15% of the speech): Code-switch between precision and real-talk ONLY when it carries analytical weight. Good: "Americans love to act like Europeans when it's politically convenient, but nobody's actually paying the tax" (observational, names a real tension). "Politics is just vibes, and their argument doesn't flow because it rests on one unnamed assumption: that voters are paying attention." (substantive, wit points at a mechanism). "This is where their case falls apart and they know it, their own evidence contradicts their impact." Bad, NEVER DO THIS: empty slang used as a dismissal with no reasoning attached. "That's a vibe." "That's cap." "Skill issue." "Mid." "Cooked." "NPC behavior." Standalone slang without a WARRANT attached reads as cheap and LLM-chasing-cool. If you want to mock an argument, name the specific failure in the same breath: not "that's a vibe" but "that's a vibe dressed up as analysis, there's no mechanism, no named actor, no number." The word "vibe" is allowed as observational commentary ("politics runs on vibes," "the current discourse is pure vibes") but NEVER as a one-word dismissal of an opponent's argument.` : ''}`;
}

/* ═══════════════════════════════════════════════════
   SHARE CARD
   1200x630 PNG generated client-side at share time. Used on the
   feedback page so each completed round becomes top-of-funnel: the
   user gets a polished image they can drop into Discord / Slack /
   Stories without screenshotting. Branded crimson with the score as
   the hero element; motion below; debater + URL at the bottom. No
   external deps, no server roundtrip.
   ═══════════════════════════════════════════════════ */
function shareCardRoundRect(ctx, x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}
function shareCardWrapText(ctx, text, maxWidth){
  const words = text.split(/\s+/);
  const lines = [];
  let line = '';
  for (const w of words){
    const test = line ? line + ' ' + w : w;
    if (ctx.measureText(test).width > maxWidth && line){
      lines.push(line); line = w;
    } else {
      line = test;
    }
  }
  if (line) lines.push(line);
  return lines;
}
async function buildShareCard({score, motion, displayName, formatName, won}){
  const canvas = document.createElement('canvas');
  canvas.width = 1200; canvas.height = 630;
  const ctx = canvas.getContext('2d');
  // Wait for Inter to load; canvas otherwise renders a system fallback
  // even though the page already declared the font.
  try { if (document.fonts && document.fonts.ready) await document.fonts.ready; } catch {}

  // Background — near-black + soft red glow upper-right
  ctx.fillStyle = '#0a0608';
  ctx.fillRect(0,0,1200,630);
  const glow = ctx.createRadialGradient(960, 80, 0, 960, 80, 820);
  glow.addColorStop(0, 'rgba(239,68,68,0.22)');
  glow.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = glow;
  ctx.fillRect(0,0,1200,630);

  // Top-left brand "Debate AI" — "AI" in red
  ctx.textBaseline = 'alphabetic';
  ctx.font = '900 38px Inter, system-ui, sans-serif';
  ctx.fillStyle = '#fff';
  ctx.fillText('Debate ', 60, 92);
  const dW = ctx.measureText('Debate ').width;
  ctx.fillStyle = '#ef4444';
  ctx.fillText('AI', 60 + dW, 92);

  // WIN/LOSS pill (top-right) — only if a verdict is present
  if (won === true || won === false){
    const label = won ? 'WIN' : 'LOSS';
    const fg = won ? '#22c55e' : '#ef4444';
    const bg = won ? 'rgba(34,197,94,0.16)' : 'rgba(239,68,68,0.16)';
    const bd = won ? 'rgba(34,197,94,0.45)' : 'rgba(239,68,68,0.45)';
    ctx.font = '800 22px Inter, system-ui, sans-serif';
    const tW = ctx.measureText(label).width;
    const pillW = tW + 38, pillH = 42, pillX = 1200 - 60 - pillW, pillY = 56;
    ctx.fillStyle = bg;
    shareCardRoundRect(ctx, pillX, pillY, pillW, pillH, 21); ctx.fill();
    ctx.strokeStyle = bd; ctx.lineWidth = 2;
    shareCardRoundRect(ctx, pillX, pillY, pillW, pillH, 21); ctx.stroke();
    ctx.fillStyle = fg;
    ctx.fillText(label, pillX + 19, pillY + 28);
  }

  // Big score
  ctx.fillStyle = '#fbbf24';
  ctx.font = '900 230px Inter, system-ui, sans-serif';
  const scoreStr = (typeof score === 'number' && !isNaN(score)) ? score.toFixed(1) : String(score || '—');
  ctx.fillText(scoreStr, 60, 320);
  const sW = ctx.measureText(scoreStr).width;

  // "/ 30  · Speaker points · APDA" subtle, right of the score
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.font = '700 30px Inter, system-ui, sans-serif';
  ctx.fillText('/ 30', 60 + sW + 22, 240);
  ctx.font = '500 22px Inter, system-ui, sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.fillText('Speaker points', 60 + sW + 22, 280);
  ctx.fillStyle = 'rgba(239,68,68,0.85)';
  ctx.fillText('· ' + (formatName || 'APDA'), 60 + sW + 22, 312);

  // Motion (wrapped, max 3 lines)
  ctx.fillStyle = '#fff';
  ctx.font = '500 32px Inter, system-ui, sans-serif';
  const motionStr = '"' + (motion || '').trim() + '"';
  const lines = shareCardWrapText(ctx, motionStr, 1080);
  const motionTop = 410;
  const maxLines = 3;
  for (let i = 0; i < Math.min(lines.length, maxLines); i++){
    let ln = lines[i];
    if (i === maxLines - 1 && lines.length > maxLines){
      while (ctx.measureText(ln + '…"').width > 1080 && ln.length > 0){
        ln = ln.slice(0, -1);
      }
      ln = ln + '…"';
    }
    ctx.fillText(ln, 60, motionTop + i * 44);
  }

  // Footer divider + byline
  ctx.strokeStyle = 'rgba(239,68,68,0.5)';
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(60, 562); ctx.lineTo(120, 562); ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,0.88)';
  ctx.font = '700 24px Inter, system-ui, sans-serif';
  const byline = (displayName || 'Anonymous') + '  ·  debateai.com';
  ctx.fillText(byline, 60, 596);

  return new Promise((resolve) => canvas.toBlob(resolve, 'image/png', 0.95));
}
async function shareScoreCard(data){
  // Returns { ok, method, error? }. Method is one of: 'share' | 'download'
  // | 'cancelled' | 'error'. Caller uses this to show a toast.
  let blob;
  try { blob = await buildShareCard(data); }
  catch(e){ return { ok:false, method:'error', error:e } }
  if (!blob) return { ok:false, method:'error', error:new Error('canvas toBlob returned null') };

  const filename = 'debateai-' + (typeof data.score === 'number' ? data.score.toFixed(1).replace('.','_') : 'score') + '.png';
  const file = new File([blob], filename, { type:'image/png' });
  const text = `I scored ${typeof data.score==='number'?data.score.toFixed(1):data.score} on Debate AI. Try it: debateai.com`;
  const url = 'https://debateai.com/leaderboard';

  // Modern share path: native share sheet with file attached.
  if (navigator.canShare && navigator.canShare({ files:[file] })){
    try {
      await navigator.share({ title:`I scored ${data.score} on Debate AI`, text, url, files:[file] });
      return { ok:true, method:'share' };
    } catch(e){
      if (e && e.name === 'AbortError') return { ok:false, method:'cancelled' };
      // Fall through to download fallback
    }
  }

  // Fallback: download the PNG, then copy a share text+url to clipboard.
  const objectUrl = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = objectUrl; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(objectUrl), 1500);
  try { await navigator.clipboard.writeText(text + ' ' + url); } catch {}
  return { ok:true, method:'download' };
}

/* ═══════════════════════════════════════════════════
   APP
   ═══════════════════════════════════════════════════ */

function App(){
  const auth = useAuth();
  const { user, team, loading: authLoading, signIn, signOut } = auth;

  // Set global pro status from team data, with owner-email bypass.
  useEffect(() => {
    const planPro = !!(team && (team.plan === 'individual' || team.plan === 'team' || team.plan === 'lifetime'));
    __proStatus = planPro || isOwnerEmail(user && user.email);
  }, [team, user]);

  // Mirror auth state into the module-level helper. Modules that gate on
  // generation count (callAI, the CTA banners) live outside this component
  // tree so they can't read `user` directly.
  useEffect(() => {
    __signedInStatus = !!user;
  }, [user]);

  const[lighting,setLighting]=useState(()=>{try{return localStorage.getItem('debateos-lighting')||'dark'}catch{return 'dark'}});
  useEffect(()=>{
    document.documentElement.setAttribute('data-lighting',lighting);
    try{localStorage.setItem('debateos-lighting',lighting)}catch{}
  },[lighting]);

  const[phase,setPhase]=useState('setup');   // setup|prep|speech|feedback
  const[vis,setVis]=useState(true);          // fade transition
  const[motion,setMotion]=useState('');
  const[background,setBackground]=useState('');  // optional context for the motion
  // Motion triage. APDA-only pre-prep "is this a tight case?" memo. Fired
  // by the button under the motion textarea. Resets whenever the motion
  // changes so a stale triage never shows for a new motion.
  const[triage,setTriage]=useState('');
  const[triageBusy,setTriageBusy]=useState(false);
  const[triageError,setTriageError]=useState('');
  const[format,setFormat]=useState('quick');
  const[oppStrengths,setOppStrengths]=useState([]);
  const[oppWeaknesses,setOppWeaknesses]=useState([]);
  const[brain,setBrain]=useState('claude');
  const[voice,setVoice]=useState('onyx');
  // Judge count picker. 1 = single Tab/flow judge (default, fast). 3 =
  // full APDA-style panel of Maya / Marcus / Dr. Chen who deliberate
  // and reach a 3-0 or 2-1 vote. Auto-fires the panel deliberation
  // after the round when set to 3, instead of needing a separate click
  // on the ballot screen.
  const[judgeCount,setJudgeCount]=useState(1);
  // Account modal toggle. Lives in the topbar; opens a centered overlay
  // with email + plan badge + BYOK key entry + TTS provider selector +
  // manage-subscription link to Stripe billing portal.
  const[showAccount,setShowAccount]=useState(false);
  // BYOK key entry. Mirrors getStoredKey()/setStoredKey() so the modal
  // and the offline-fallback prompt share the same localStorage slot.
  const[byokKey,setByokKey]=useState(()=>{try{return localStorage.getItem('debateos-anthropic-key')||''}catch{return ''}});
  const[byokRevealed,setByokRevealed]=useState(false);
  // TTS provider preference. Pro users can opt into Inworld (sub-200ms,
  // multilingual, distinct voice timbre) instead of the default
  // ElevenLabs turbo_v2_5. Free users always get OpenAI tts-1 regardless
  // of this setting, backend ignores the provider field for non-premium.
  const[ttsProvider,setTtsProvider]=useState(()=>{try{return localStorage.getItem('debateos-tts-provider')||'elevenlabs'}catch{return 'elevenlabs'}});
  useEffect(()=>{try{localStorage.setItem('debateos-tts-provider',ttsProvider)}catch{}},[ttsProvider]);
  const[providerTestStatus,setProviderTestStatus]=useState('');
  // AI speaking language. Separate from the UI translation locale , 
  // a user reading the UI in English can still want the AI to debate
  // in Spanish or Mandarin (e.g. circuit prep in their first language).
  // Default seeds from debateos-locale so people who already picked a
  // UI language don't have to set this twice; can be overridden in setup.
  const[aiLanguage,setAiLanguage]=useState(()=>{
    try{const saved=localStorage.getItem('debateos-ai-lang');if(saved)return saved;
        const ui=localStorage.getItem('debateos-locale');return ui||'en';
    }catch{return 'en'}
  });
  useEffect(()=>{try{localStorage.setItem('debateos-ai-lang',aiLanguage)}catch{}},[aiLanguage]);

  // Chrome-extension bridge. When debate-ai.html is loaded inside the
  // extension's side panel (?ext=1), the panel posts the user's selection
  // as { type:'debateai-ext', action, text }. The 'Counter' extension is
  // branded as an oral-exam trainer, so the bridge frames every prefill
  // as an oral defense / quiz prompt — the AI plays examiner, the
  // student defends. Three actions:
  //   quiz-me     -> "Quiz me on this passage." (default, AI-led drill)
  //   defend-this -> "Defend this out loud. AI cross-examines."
  //   cross-exam  -> "I'll cross-examine the AI on this."
  // (Legacy debate-this/rebut-this still work, treated as quiz-me.)
  // We land on the setup screen so the user picks their format and brain.
  useEffect(()=>{
    let isExt=false;
    let extMode='counter';
    try{
      const qs=new URLSearchParams(location.search);
      isExt=qs.get('ext')==='1';
      extMode=qs.get('mode')||'counter';
    }catch{}
    if(!isExt) return;
    try{
      document.documentElement.setAttribute('data-ext','1');
      document.documentElement.setAttribute('data-ext-mode',extMode);
    }catch{}
    const SHORT=200;
    const frame=(action,text)=>{
      // Frame the motion as an oral-exam prompt so the existing AI
      // pipeline (which treats `motion` as the round's resolution) puts
      // the AI in examiner/cross-exam posture. The raw passage always
      // goes into background so the AI has the source material in hand.
      const isLong=text.length>SHORT;
      const passage=isLong
        ? text
        : '';
      const stem=isLong
        ? (text.match(/[^.!?]+[.!?]/)||[text])[0].trim().slice(0,SHORT)
        : text;
      let motion=text;
      if(action==='defend-this'||action==='rebut-this'){
        motion=isLong
          ? `Defend this passage in a viva: "${stem}"`
          : `Defend out loud: ${stem}`;
      }else if(action==='cross-exam'){
        motion=isLong
          ? `Cross-examine the AI on this passage: "${stem}"`
          : `Cross-examine the AI on: ${stem}`;
      }else{ // quiz-me / debate-this / fallback
        motion=isLong
          ? `Oral exam: defend this passage. "${stem}"`
          : `Oral exam: ${stem}`;
      }
      return { motion, background: passage };
    };
    const handle=(ev)=>{
      if(!ev||!ev.data||ev.data.type!=='debateai-ext') return;
      // Only trust the extension panel as the parent. Other origins (the
      // page hosting an unrelated iframe of us, etc.) are ignored.
      const origin=String(ev.origin||'');
      if(!origin.startsWith('chrome-extension://')) return;
      const text=String(ev.data.text||'').trim();
      if(!text) return;
      const action=String(ev.data.action||'quiz-me');
      const { motion, background } = frame(action, text);
      setMotion(motion);
      setBackground(background);
      // Counter (oral exam) extension mode: auto-pick the viva format so
      // the speech-list, side labels, and per-format voice all line up
      // with examiner-style probing instead of debate-round structure.
      if(extMode==='counter'&&typeof FORMATS!=='undefined'&&FORMATS.viva){
        try{ setFormat('viva'); }catch{}
      }
      setPhase('setup');
      // Smooth-scroll the motion field into view if the user had scrolled
      // away from setup. Cheap, only on the next tick.
      setTimeout(()=>{
        try{
          const el=document.querySelector('[data-motion-input], textarea[name="motion"], textarea#motion')||document.querySelector('textarea');
          el&&el.scrollIntoView({behavior:'smooth',block:'center'});
          el&&el.focus&&el.focus();
        }catch{}
      },80);
    };
    window.addEventListener('message',handle);
    // Tell the panel we're mounted so it can drain queued actions.
    try{window.parent&&window.parent.postMessage({type:'debateai-ext-ready'},'*');}catch{}
    return ()=>window.removeEventListener('message',handle);
  },[]);

  const[side,setSide]=useState('gov');
  // Judge paradigm, shapes BOTH the AI opponent's strategy (they try to
  // win the judge they're in front of) AND the final RFD voice. Persisted
  // to localStorage so the user's preferred training judge sticks around.
  const[judgeParadigm,setJudgeParadigm]=useState(()=>{
    try{return localStorage.getItem('debateos-judge-paradigm')||'flow';}catch{return 'flow';}
  });
  const saveJudgeParadigm=(k)=>{setJudgeParadigm(k);try{localStorage.setItem('debateos-judge-paradigm',k);}catch{}};
  // Custom paradigm text. Lets the user paste a real Tabroom paradigm
  // (or coach notes) and override the preset picker. This is how circuit
  // debaters actually prep: "I'm in front of Judge Chen at Harvard, here's
  // their paradigm, tune the AI to it." When non-empty, takes precedence
  // over the preset in both the AI opponent prompt and the RFD generator.
  // Starred motions, user-pinned quick-picks. Any motion (MotD, recent
  // round, or typed) can be starred; starred list renders as a chip row
  // on setup so a user mid-drill can rotate through their shortlist.
  const[starredMotions,setStarredMotions]=useState(()=>{
    try{const raw=localStorage.getItem('debateos-starred-motions');const arr=raw?JSON.parse(raw):[];return Array.isArray(arr)?arr:[];}catch{return [];}
  });
  const persistStarred=(next)=>{
    setStarredMotions(next);
    try{localStorage.setItem('debateos-starred-motions',JSON.stringify(next));}catch{}
  };
  const toggleStar=(text)=>{
    if(!text||!text.trim()) return;
    const t=text.trim();
    const exists=starredMotions.some(m=>m===t);
    persistStarred(exists ? starredMotions.filter(m=>m!==t) : [t,...starredMotions].slice(0,12));
  };
  const isStarred=(text)=>!!(text&&starredMotions.some(m=>m===text.trim()));
  const[customParadigm,setCustomParadigm]=useState(()=>{
    try{return localStorage.getItem('debateos-judge-paradigm-custom')||'';}catch{return '';}
  });
  const[showCustomParadigm,setShowCustomParadigm]=useState(()=>{
    try{return !!localStorage.getItem('debateos-judge-paradigm-custom');}catch{return false;}
  });
  const saveCustomParadigm=(text)=>{
    setCustomParadigm(text);
    try{
      if(text.trim()) localStorage.setItem('debateos-judge-paradigm-custom',text);
      else localStorage.removeItem('debateos-judge-paradigm-custom');
    }catch{}
  };
  // Judge pool. Circuit debaters face the same judges multiple times
  // across a tournament season. Save N named paradigms, one click to
  // load for a round, no re-pasting.
  const[judgePool,setJudgePool]=useState(()=>{
    try{
      const raw=localStorage.getItem('debateos-judge-pool');
      if(!raw) return [];
      const arr=JSON.parse(raw);
      return Array.isArray(arr)?arr:[];
    }catch{return []}
  });
  const persistJudgePool=(next)=>{
    setJudgePool(next);
    try{localStorage.setItem('debateos-judge-pool',JSON.stringify(next));}catch{}
  };
  const saveJudgeToPool=()=>{
    const text=customParadigm.trim();
    if(!text) return;
    const name=(window.prompt('Name this judge (e.g. "Chen, Harvard", "Rodriguez, lay parent"):')||'').trim();
    if(!name) return;
    const id=Date.now().toString(36)+Math.random().toString(36).slice(2,6);
    const existing=judgePool.findIndex(j=>j.name.toLowerCase()===name.toLowerCase());
    const next=existing>=0
      ? judgePool.map((j,i)=>i===existing?{...j,paradigm:text}:j)
      : [...judgePool,{id,name,paradigm:text}];
    persistJudgePool(next);
  };
  const loadJudgeFromPool=(id)=>{
    const j=judgePool.find(x=>x.id===id);
    if(!j) return;
    saveCustomParadigm(j.paradigm);
    setShowCustomParadigm(true);
  };
  const deleteJudgeFromPool=(id)=>{
    persistJudgePool(judgePool.filter(j=>j.id!==id));
  };
  // Default speech pace bumped to real-circuit territory. 200 WPM × 1.0
  // is high-school slow; circuit APDA / college parli runs ~230–280 WPM
  // delivered, with some spreading higher. 230 WPM × 1.15 ≈ 265 effective —
  // brisk but not policy-spread. Users can still slide either direction
  // via the WPM slider + the rate-preset row during a round.
  const[wpm,setWpm]=useState(230);
  const[liveRate,setLiveRate]=useState(1.15);
  const[idx,setIdx]=useState(0);
  const[log,setLog]=useState([]);            // {code,who,text}
  const[feedback,setFeedback]=useState('');
  const[fbLoading,setFbLoading]=useState(false);
  // Share-card UI state. 'idle' | 'loading' | 'shared' | 'downloaded' | 'error'
  // Drives the button label/state on the feedback screen so the user gets
  // feedback when the canvas is generating or when fallback fired.
  const[shareStatus,setShareStatus]=useState('idle');

  // Public-round publish state. 'idle' | 'publishing' | 'published' | 'error'.
  // publishedRound holds { id, url, fullUrl } after a successful publish so
  // the share dialog can persist the URL until the user navigates away.
  // Backend: app/netlify/functions/round-publish.mjs (POST /api/round/publish).
  const[publishStatus,setPublishStatus]=useState('idle');
  const[publishedRound,setPublishedRound]=useState(null);
  const[publishError,setPublishError]=useState('');
  const[notes,setNotes]=useState(()=>{try{return localStorage.getItem('debateos-prep-notes')||''}catch{return ''}});
  const[aiLoading,setAiLoading]=useState(false);
  const[aiText,setAiText]=useState('');
  // Surfaced AI failure message. Drives the visible error banner during
  // an AI speech and the "Wrapping up..." vs "AI failed" status text.
  // Catch block in runSpeech sets this; clears at next runSpeech entry
  // and on newRound.
  const[aiError,setAiError]=useState('');
  const[aiPct,setAiPct]=useState(0);       // generation progress %
  const[voiceEta]=useState(0); // TTS timing display
  const[showTx,setShowTx]=useState(false);
  // 30s countdown gate before AI starts speaking. The countdown begins the
  // moment the first audio chunk is ready; the user presses Start (or the
  // counter hits 0) to actually fire playback. Lets users finish notes /
  // brace themselves instead of being ambushed by the AI's voice.
  const[aiCountdown,setAiCountdown]=useState(null);
  const aiStartRef = useRef(null);
  useEffect(()=>{
    if(aiCountdown===null) return;
    if(aiCountdown<=0){
      const fn = aiStartRef.current;
      aiStartRef.current = null;
      setAiCountdown(null);
      if(fn) fn();
      return;
    }
    const id = setTimeout(()=>setAiCountdown(c => (c===null?null:c-1)), 1000);
    return () => clearTimeout(id);
  },[aiCountdown]);
  const startAiSpeechNow = () => {
    const fn = aiStartRef.current;
    aiStartRef.current = null;
    setAiCountdown(null);
    if(fn) fn();
  };

  // Auto-generated background context. Most motions need a sentence or two
  // of "what's actually being debated", actor, current state, key tension , 
  // before either side can argue cleanly. If the user leaves the background
  // field blank, we ask Claude Haiku for a 2-3 sentence factual primer and
  // surface it as a faded watermark behind the stage.
  const[generatedBackground,setGeneratedBackground]=useState('');
  const bgRequestedFor = useRef('');
  const ensureBackground = async (m) => {
    if (!m || !m.trim()) return;
    if (background && background.trim()) return;
    if (bgRequestedFor.current === m) return;
    bgRequestedFor.current = m;
    // Short-circuit on curated case files. Hand-written backgrounds are
    // (a) faster, no Claude Haiku round-trip on the 1.4-2s p50 path,
    // (b) more accurate, named actors, real numbers, real dates, and
    // (c) consistent across rounds for the same motion. Falls through to
    // the auto-gen path below for motions that aren't in CASE_FILES.
    const cf = caseFileFor(m);
    if (cf && cf.background) {
      setGeneratedBackground(cf.background);
      return;
    }
    try {
      const r = await fetch('/api/claude', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: 220,
          system: 'You write debate background primers. Given a motion, output 2-3 plain sentences of factual context: who decides, what the current state of the issue is, and what is actually contested. No fluff, no opinion, no rhetoric, no "this house" framing. Plain prose only, never use markdown, headings, hash signs, asterisks, bullets, bold, italics, or any other formatting. Output is rendered as plain text directly to the screen.',
          messages: [{ role:'user', content: `Motion: "${m}". Write the background.` }],
          stream: false,
          _feature: 'debate-ai-background-gen',
        }),
      });
      if (!r.ok) return;
      const d = await r.json();
      const text = (d && d.content && d.content[0] && d.content[0].text || '').trim();
      if (text) setGeneratedBackground(text);
    } catch {}
  };

  // Formats eligible for the pre-prep triage surface. Parli-only on
  // purpose: triage vocabulary ("tight," "squirrel," "half-call,"
  // "extension," "reply weighing," "POI bait") is parli-native. LD / PF /
  // Policy / Congress / MUN have totally different pre-prep heuristics
  // (T flow, evidence quality, framework lit, bill text) and would need
  // their own voice blocks; not free-rolling those formats into a memo
  // that uses the wrong language.
  const TRIAGE_FORMATS = ['apda','bp','asian','worlds'];
  const triageEligible = TRIAGE_FORMATS.indexOf(format) !== -1;
  // Cache keyed by format|motion. Hit avoids re-burning a Sonnet call
  // (~$0.04 + a free-tier request) when the user re-clicks on a motion
  // they already triaged this session. Component-scoped via useRef so it
  // doesn't trigger renders, and isn't persisted (next page load = fresh).
  const triageCache = useRef({});
  const triageCacheKey = (fmt, m) => (fmt || 'unknown') + '|' + (m || '').trim();

  // Motion triage. Pre-prep "is this a tight case?" runs the MOTION_TRIAGE
  // voice block server-side via _voiceFeature: 'motionTriage'. Output is
  // a ≤400-word structured memo (Verdict / Leak vectors / Ground /
  // Empirical knockout / Tighter rewrites / Next move). Aligned with the
  // in-round tight-call definition (~line 3034) so pre-prep triage and
  // in-round tight calls speak the same language. Per-format overlays in
  // voice-guidelines.mjs add BP / Asian / Worlds register on top of the
  // APDA-flavored base. Accepts motionOverride so the clickable rewrite
  // buttons can pass the new motion synchronously without waiting for
  // the setMotion state update to flush.
  const runTriage = async (motionOverride) => {
    const m = ((motionOverride != null ? motionOverride : motion) || '').trim();
    if (!m) return;
    if (TRIAGE_FORMATS.indexOf(format) === -1) return;
    // Cache hit — return instantly, don't burn a request.
    const key = triageCacheKey(format, m);
    const cached = triageCache.current[key];
    if (cached) {
      setTriage(cached);
      setTriageError('');
      return;
    }
    setTriage('');
    setTriageError('');
    setTriageBusy(true);
    try {
      const r = await fetch('/api/claude', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          // 900 not 1400: with the format overlay pushing input tokens
          // to ~5800, the bigger output cap pushed total Sonnet
          // generation past Netlify's 26s sync-function timeout and
          // returned 504. The voice block already says "400 words HARD
          // CAP" (~600 output tokens), so 900 is comfortable headroom
          // and lands the response under the timeout.
          max_tokens: 900,
          system: 'You are a parli debate coach running pre-prep motion triage. The user has not committed to prep yet. Output the structured memo per the format and rules in the voice guideline. No throat-clearing. Verdict-first.',
          messages: [{ role:'user', content: `Motion: "${m}". Run the triage.` }],
          stream: false,
          _feature: 'debate-ai-motion-triage',
          _voiceFeature: 'motionTriage',
          _voiceFormat: format,
        }),
      });
      if (!r.ok) {
        const txt = await r.text().catch(() => '');
        let msg = 'Triage failed.';
        try { const j = JSON.parse(txt); msg = (j && (j.error || j.message)) || msg; } catch {}
        if (r.status === 401) msg = 'Sign in to use motion triage.';
        if (r.status === 429) msg = 'Hit your usage cap. Upgrade to keep going.';
        setTriageError(msg);
        return;
      }
      const d = await r.json();
      const text = (d && d.content && d.content[0] && d.content[0].text || '').trim();
      if (text) {
        triageCache.current[key] = text;
        setTriage(text);
      } else setTriageError('Empty response. Try again.');
    } catch (e) {
      setTriageError('Triage failed. Check your connection and try again.');
    } finally {
      setTriageBusy(false);
    }
  };
  // Reset stale triage when the motion changes — a memo about an old
  // motion would mislead. Cache survives so re-running on a previously
  // triaged motion is instant (no fetch).
  useEffect(() => { setTriage(''); setTriageError(''); }, [motion]);
  // Parse the AI-emitted "Tighter rewrites." section into clickable
  // motion strings. The voice block tells the AI to format these as a
  // numbered list under a **Tighter rewrites.** heading. Tolerant of
  // both quoted ("...") and bare forms, and stops at the next bold
  // heading so it doesn't slurp the "Next move" line.
  const parseTighterRewrites = (memo) => {
    if (!memo) return [];
    const m = memo.match(/\*\*Tighter rewrites\.?\*\*\s*([\s\S]*?)(?=\n\s*\*\*[A-Z]|$)/);
    if (!m) return [];
    const block = m[1];
    const items = [];
    const re = /^\s*\d+\.\s+(?:"([^"]+)"|(.+?))\s*$/gm;
    let mm;
    while ((mm = re.exec(block)) !== null) {
      const text = (mm[1] || mm[2] || '').trim().replace(/^["']|["']$/g, '');
      // Skip prose-only lines (e.g. "Flips the default..." trailing
      // explanations). Heuristic: a real rewrite starts with a motion
      // verb / clause familiar to debaters.
      if (text && text.length > 12 && /^(THW|THBT|THR|THS|TH |This [Hh]ouse)/.test(text)) {
        items.push(text);
      }
    }
    return items;
  };
  // Tiny renderer for the triage memo. The AI emits **bold** section
  // labels per the voice block. We tokenize so labels render as <strong>
  // without dangerouslySetInnerHTML (no XSS surface). Plain text otherwise;
  // wrapped in a pre-wrap div so the AI's line breaks survive.
  const renderTriageMd = (text) => {
    if (!text) return null;
    const parts = text.split(/(\*\*[^*]+\*\*)/g);
    return parts.map((p, i) => {
      if (/^\*\*[^*]+\*\*$/.test(p)) {
        return el('strong', { key:i, style:{color:'var(--c-bright)',fontWeight:700} }, p.slice(2,-2));
      }
      return p;
    });
  };

  // Audio progress tick, polled at 200ms while TTS is speaking so the
  // scrub bar under the pause button updates in real time. The useEffect
  // that reads tts.speaking lives BELOW `const tts=useTTS()` to avoid a
  // TDZ error on the const during the effect's dependency-array eval at
  // render time. (Previously defined here and it blew up every render.)
  const[audioTick,setAudioTick]=useState(0);
  const[prepHint,setPrepHint]=useState('');
  const[prepHintLoading,setPrepHintLoading]=useState(false);
  const[notesSaved,setNotesSaved]=useState(false);
  const[showRoundPanel,setShowRoundPanel]=useState(null); // null | 'notes' | 'cases' | 'flow'
  // revealIdx removed. transcript is plain text now

  // POI (Points of Information) state
  const[poiActive,setPoiActive]=useState(false);
  const[poiText,setPoiText]=useState('');
  const[poiOffer,setPoiOffer]=useState(false); // AI is offering a POI
  const poiCountRef=useRef(0); // POIs offered this speech
  const poiTimeoutRef=useRef(null); // timeout for AI POI offers

  // Round history
  const[showHistory,setShowHistory]=useState(false);
  const[showAdvanced,setShowAdvanced]=useState(false);
  const[historyRounds,setHistoryRounds]=useState(()=>{
    try{return JSON.parse(localStorage.getItem('debateos-round-history')||'[]')}catch{return[]}
  });
  const[viewingRound,setViewingRound]=useState(null);

  // Server-truth style summary. historyRounds above is localStorage-only
  // so its count resets on a new device or storage clear. styleSummary
  // pulls from the generations collection (written via captureTurn since
  // 2026-05-13) so the "the AI has read your N rounds" claim is honest
  // cross-device and survives storage wipes. Silent failure: if the
  // endpoint 401s or the network blips, we render nothing and the
  // existing Round-history block keeps doing its localStorage thing.
  const[styleSummary,setStyleSummary]=useState(null);
  useEffect(()=>{
    if(!user) { setStyleSummary(null); return; }
    let cancelled=false;
    (async()=>{
      try{
        const token=await user.getIdToken();
        const res=await fetch('/api/user/style-summary',{
          headers:{Authorization:'Bearer '+token},
        });
        if(!res.ok) return;
        const data=await res.json();
        if(!cancelled) setStyleSummary(data);
      } catch(_){}
    })();
    return ()=>{cancelled=true};
  },[user]);

  // Saved cases library
  const[savedCases,setSavedCases]=useState(()=>{
    try{return JSON.parse(localStorage.getItem('debateos-saved-cases')||'[]')}catch{return[]}
  });
  const[showCases,setShowCases]=useState(false);
  const[viewingCase,setViewingCase]=useState(null);
  const[caseSaved,setCaseSaved]=useState(false); // flash "Saved!" in feedback phase
  // Publish-to-disclosures state. Mirrors caseSaved so the button can
  // flash a confirmation. 'pending' = mid-write to Firestore;
  // 'published' = success; null = idle. We never let users publish
  // twice for the same in-memory case (idempotent on log timestamp).
  const[casePublished,setCasePublished]=useState(null);

  // Setup-screen tab. 'setup' shows the format/motion/brain pickers;
  // 'saved' shows saved cases, past rounds, and "how I think as a debater"
  // (the genPatterns analyzer). One landing screen for everything historical.
  const[setupTab,setSetupTab]=useState('setup');

  // Inline brain-lock popover. Clicking GPT/Grok/Gemini on free tier used
  // to hard-navigate to /#pricing; users lost their setup context. Now we
  // surface a small popover near the brain row instead, same upgrade CTA
  // without the page jump.
  const[brainLock,setBrainLock]=useState(null); // null | brain key (string)
  useEffect(()=>{
    if (!brainLock) return;
    const id = setTimeout(()=>setBrainLock(null), 5000);
    return () => clearTimeout(id);
  }, [brainLock]);

  // Quota CTA, shown when callAI() throws QUOTA_SIGNIN (anon hit 5/5) or
  // QUOTA_PRO (signed-in hit 10/10). Kicks the user to sign-in or pricing.
  const[quotaCTA,setQuotaCTA]=useState(null);  // null | 'signin' | 'pro'
  useEffect(()=>{
    function handler(e){
      var code = e?.detail?.code;
      if (code === 'QUOTA_SIGNIN') setQuotaCTA('signin');
      else if (code === 'QUOTA_PRO') setQuotaCTA('pro');
    }
    window.addEventListener('debateos-quota-hit', handler);
    return () => window.removeEventListener('debateos-quota-hit', handler);
  }, []);
  // Force-rerender when usage changes so "X left" badges stay fresh.
  const[, forceUsageTick] = useState(0);
  useEffect(()=>{
    var id = setInterval(()=>forceUsageTick(n=>n+1), 2000);
    return () => clearInterval(id);
  }, []);

  const saveCase=(customTitle)=>{
    // Extract AI constructive speeches from the log
    const aiSpeeches=log.filter(l=>l.who==='AI');
    if(aiSpeeches.length===0) return;
    const fmt=FORMATS[format]||FORMATS.apda;
    const sideLabel=fmt.sideLabels[side]||side;
    const aiSide=fmt.sides.find(s=>s!==side)||'opp';
    const aiSideLabel=fmt.sideLabels[aiSide]||aiSide;
    const c={
      id:Date.now(),
      date:new Date().toISOString(),
      motion,format,
      formatName:fmt.name,
      side:aiSide,
      sideLabel:aiSideLabel,
      title:customTitle||motion.slice(0,80),
      brain,
      speeches:aiSpeeches.map(s=>({code:s.code,text:s.text})),
      fullText:aiSpeeches.map(s=>s.text).join('\n\n'),
    };
    const updated=[c,...savedCases].slice(0,100);
    setSavedCases(updated);
    try{localStorage.setItem('debateos-saved-cases',JSON.stringify(updated))}catch{}
    setCaseSaved(true);
    setTimeout(()=>setCaseSaved(false),2000);
    if(typeof gtag==='function')gtag('event','save_case',{format:fmt.name,side:aiSide});
  };

  const deleteCase=(id)=>{
    const updated=savedCases.filter(c=>c.id!==id);
    setSavedCases(updated);
    try{localStorage.setItem('debateos-saved-cases',JSON.stringify(updated))}catch{}
    if(viewingCase&&viewingCase.id===id)setViewingCase(null);
  };

  // Publish the just-finished round's AI case to the public
  // /disclosures community board. Same shape the SharedCases flow in
  // /app uses (visibility:'public' on shared_cases doc), so the
  // disclosures page picks it up immediately. Author shown as
  // first-name + last-initial — never the full displayName.
  const publishToDisclosures=async()=>{
    if(!user||!firebaseDb){alert('Sign in to publish to Community.');return}
    const aiSpeeches=log.filter(l=>l.who==='AI');
    if(aiSpeeches.length===0)return;
    const fmt=FORMATS[format]||FORMATS.apda;
    const aiSide=fmt.sides.find(s=>s!==side)||'opp';
    const aiSideLabel=fmt.sideLabels[aiSide]||aiSide;
    const fullText=aiSpeeches.map(s=>s.text).join('\n\n');
    // Floor check (length, profanity, link-spam) + LLM classifier.
    // Local guard runs instantly; LLM check fires only if local
    // passed and we have an auth token. Fails open on network blips
    // so transient errors don't block a real publisher.
    if(window.disclosureGuard){
      let token=null;
      try{ token=await user.getIdToken(); }catch{}
      const check = window.disclosureGuard.fullCheck
        ? await window.disclosureGuard.fullCheck({motion,output:fullText},token)
        : window.disclosureGuard.check({motion,output:fullText});
      if(!check.ok){alert(check.reason);setCasePublished(null);return}
    }
    const fullName=(user.displayName||'').trim();
    const parts=fullName.split(/\s+/).filter(Boolean);
    const shortName=parts.length>=2
      ? parts[0]+' '+parts[parts.length-1][0].toUpperCase()+'.'
      : (parts[0]||(user.email?user.email.split('@')[0]:'Anonymous'));
    setCasePublished('pending');
    try{
      await firebaseDb.collection('shared_cases').add({
        teamId: team?.teamId||null,
        sharedBy: shortName,
        sharedByUid: user.uid,
        authorUid: user.uid,
        motion: motion||'Untitled',
        side: aiSideLabel,
        format: fmt.name,
        depth: '',
        output: fullText,
        sharedAt: firebase.firestore.FieldValue.serverTimestamp(),
        visibility: 'public',
      });
      setCasePublished('published');
      if(typeof gtag==='function')gtag('event','disclosure_publish',{format:fmt.name,side:aiSide,source:'ai_round'});
    }catch(e){
      console.warn('[publishToDisclosures]',e);
      setCasePublished(null);
      alert('Could not publish: '+(e.message||'unknown error'));
    }
  };

  const copyCase=(c)=>{
    const txt=`CASE: ${c.title}\nFormat: ${c.formatName} | Side: ${c.sideLabel}\nDate: ${new Date(c.date).toLocaleDateString()}\n${'─'.repeat(40)}\n\n${c.fullText}`;
    navigator.clipboard.writeText(txt).catch(()=>{});
  };

  const orb=useOrb();
  const rec=useRecognition();
  const tts=useTTS();
  const timer=useTimer();
  const prepTimer=useTimer();
  const endingRef=useRef(false); // guard against double endSpeech calls
  // Audio progress tick effect (see audioTick state above). Runs only
  // while TTS is speaking. Placed here, AFTER tts=useTTS(), so the
  // dependency `tts.speaking` resolves at render time instead of hitting
  // the const's TDZ.
  React.useEffect(()=>{
    if(!tts.speaking) return;
    const id=setInterval(()=>setAudioTick(t=>t+1),200);
    return ()=>clearInterval(id);
  },[tts.speaking]);

  // ── Session recovery state ──
  const[recoveryData,setRecoveryData]=useState(()=>{
    try{const d=localStorage.getItem('debateos-session');return d?JSON.parse(d):null}catch{return null}
  });

  // First-round onboarding flag. Drives the welcome card on the setup
  // view. localStorage-backed so dismissal sticks across visits and
  // we don't nag returning users. The state mirror lets the dismiss
  // button trigger a React re-render (localStorage alone wouldn't).
  const[daOnboarded,setDaOnboarded]=useState(()=>{
    try{ return localStorage.getItem('debateos-da-onboarded') === '1' }catch{ return true }
  });

  // Use-case picker selection. null = picker is open (first-visit users).
  // Once the user picks (or the legacy onboarded flag is set), we never
  // surface the picker again. Persisted so the choice survives navs.
  const[useCase,setUseCase]=useState(()=>{
    try{ return localStorage.getItem('debateos-use-case') || null }catch{ return null }
  });
  // Dismissal flag for the post-pick confirmation banner — separate from
  // useCase itself so we can show the banner once after the pick, then
  // hide it forever once the user clicks Sign-in or Continue-without.
  const[useCaseConfirmed,setUseCaseConfirmed]=useState(()=>{
    try{ return localStorage.getItem('debateos-use-case-confirmed') === '1' }catch{ return true }
  });
  const pickUseCase=(key)=>{
    const u = USE_CASES[key];
    if(!u) return;
    try{ localStorage.setItem('debateos-use-case', key) }catch(e){}
    setUseCase(key);
    if(u.motion) setMotion(u.motion);
    if(u.format) setFormat(u.format);
    if(u.side) setSide(u.side);
    if(u.voice) setVoice(u.voice);
    // Mark onboarded so the prior generic welcome banner doesn't ALSO
    // render on top of the picker confirmation.
    try{ localStorage.setItem('debateos-da-onboarded','1') }catch(e){}
    setDaOnboarded(true);
    try{ window.gtag && gtag('event','use_case_picked',{ choice: key, signed_in: !!user }) }catch(e){}
  };

  // Auto-save round state every 30s during speech phase, plus on every
  // speech-boundary state change (idx/log.length deps), plus on tab-close
  // via beforeunload. The beforeunload listener is the safety net: React
  // commits state asynchronously, so a tab-close in the microsecond window
  // between setLog() and the next commit could lose the latest entry
  // without it.
  useEffect(()=>{
    if(phase!=='speech'&&phase!=='prep') return;
    const save=()=>{
      try{
        localStorage.setItem('debateos-session',JSON.stringify({
          phase,motion,format,side,brain,voice,wpm,idx,log,notes,
          oppStrengths,oppWeaknesses,background,
          timestamp:Date.now()
        }));
      }catch{}
    };
    save(); // save immediately on phase enter / boundary
    const iv=setInterval(save,30000);
    window.addEventListener('beforeunload',save);
    return()=>{clearInterval(iv);window.removeEventListener('beforeunload',save)};
  },[phase,idx,log.length,motion,notes]);

  // Clear session on round complete or new round
  const clearSession=()=>{try{localStorage.removeItem('debateos-session')}catch{}};

  // Resume from saved session. picks up exactly where the round was
  const resumeSession=()=>{
    if(!recoveryData) return;
    setMotion(recoveryData.motion||'');
    setFormat(recoveryData.format||'apda');
    setSide(recoveryData.side||'gov');
    setBrain(recoveryData.brain||'claude');
    setVoice(recoveryData.voice||'onyx');
    setWpm(recoveryData.wpm||200);
    setOppStrengths(recoveryData.oppStrengths||[]);
    setOppWeaknesses(recoveryData.oppWeaknesses||[]);
    setBackground(recoveryData.background||'');
    setNotes(recoveryData.notes||'');
    if(recoveryData.phase==='speech'){
      const savedLog=recoveryData.log||[];
      const savedIdx=recoveryData.idx||0;
      const recFmt=FORMATS[recoveryData.format||'apda']||FORMATS.apda;
      const recSpeeches=recFmt.speeches;
      // Figure out the correct resume point:
      // The log has completed speeches. The saved idx is where the round was.
      // If savedIdx's speech code is already in the log, that speech finished. advance to next.
      const speechAtIdx=recSpeeches[savedIdx];
      const alreadyDone=speechAtIdx&&savedLog.some(l=>l.code===speechAtIdx.code);
      const resumeIdx=alreadyDone?Math.min(savedIdx+1,recSpeeches.length-1):savedIdx;

      if(resumeIdx>=recSpeeches.length){
        // Round was actually complete. go to feedback
        setLog(savedLog);
        transition('feedback',()=>genFeedback(savedLog));
      } else {
        setLog(savedLog);
        setIdx(resumeIdx);
        // Resume path also enters speech phase, fire background autogen
        // here too so the watermark renders for resumed rounds.
        ensureBackground(recoveryData.motion);
        transition('speech',()=>{
          setIdx(resumeIdx);
          setTimeout(()=>runSpeech(resumeIdx,savedLog),400);
        });
      }
    } else {
      transition('prep',()=>prepTimer.go((FORMATS[recoveryData.format||'apda']||FORMATS.apda).prep));
    }
    setRecoveryData(null);
  };
  const dismissRecovery=()=>{setRecoveryData(null);clearSession()};

  // POI: user sends a POI during AI speech
  const sendPOI=async()=>{
    if(!poiText.trim())return;
    setPoiActive(false);
    tts.stop();
    try{
      const poiResponse=await callAI(
        `You are mid-speech in a ${fmt.name} debate on "${motion}". The opponent just raised a Point of Information. Respond in 1-2 sentences MAX, then get back to your speech. If the POI is weak: dismiss it sharply ("That's exactly my point. thank you for conceding it."). If it's strong: pivot without fully conceding ("Interesting, but that actually helps us because..."). NEVER say "good question" or "thank you for that." This is a debate, not a seminar.`,
        'POI: "'+poiText+'"',
        null,
        brain
      );
      const poiEntry={code:'POI',who:'POI',text:'You: "'+poiText+'" → AI: "'+poiResponse+'"'};
      setLog(prev=>[...prev,poiEntry]);
    }catch(e){
      console.warn('[POI] Error:',e);
    }
    setPoiText('');
  };

  // POI: AI offers a POI during user speech, user accepts
  const acceptAIPOI=async()=>{
    const hist=log.map(l=>'['+l.code+']: '+l.text).join('\n');
    try{
      const poiQ=await callAI(
        'You are the opposing debater in a '+(FORMATS[format]||FORMATS.apda).name+' debate on "'+motion+'". You just stood to offer a Point of Information during the opponent\'s speech. Ask ONE sharp, brief question (max 15 words) that challenges their weakest point or forces a difficult concession. Be incisive.',
        'Speech history:\n'+hist+'\nAsk your POI now.',
        null,
        brain
      );
      setAiText(poiQ);
      const poiEntry={code:'POI',who:'AI POI',text:poiQ};
      setLog(prev=>[...prev,poiEntry]);
      setTimeout(()=>setAiText(''),5000);
    }catch(e){
      console.warn('[POI] AI offer error:',e);
    }
  };

  const fmt=FORMATS[format]||FORMATS.apda;
  const SPEECHES=fmt.speeches;
  const cur=SPEECHES[idx]||SPEECHES[0];
  const isUser=cur.side===side;

  // Init orb in speech phase
  useEffect(()=>{if(phase==='speech'){orb.init()}return()=>orb.kill()},[phase]);

  // Phase transition helper
  const transition=(next,cb)=>{setVis(false);setTimeout(()=>{if(cb)cb();setPhase(next);setTimeout(()=>setVis(true),50)},350)};

  // Start debate
  const startDebate=()=>{
    if(!motion.trim())return;
    // SFX/TTS warmup is decorative — wrap in try/catch so a missing
    // method (e.g. the historic /js/sfx.js collision where window.SFX
    // got overwritten and lost startRound) can't take down the entire
    // round-start flow. The round MUST start regardless of audio.
    try { if (SFX && typeof SFX.startRound === 'function') SFX.startRound(); } catch(e) { console.warn('[startDebate] SFX failed:', e); }
    try { warmUpTTS(); } catch(e) { console.warn('[startDebate] TTS warmup failed:', e); }
    if(typeof gtag==='function')gtag('event','round_start',{format:fmt.name,side,motion_length:motion.length});
    // First-round prep cut. The default Quick Clash prep is 120s
    // which is fine for a returning debater warming up but is a
    // bounce-trap for first-timers — they hit Quick Clash expecting
    // instant action and get a 2-minute timer instead. For round 1
    // on Quick Clash specifically, cut prep to 30s so they're in
    // their first speech in under a minute. Other formats keep
    // their full prep (Worlds debaters need 15 minutes; we don't
    // touch those rules).
    const isFirstQuick = historyRounds.length===0 && format==='quick';
    const prepSec = isFirstQuick ? 30 : fmt.prep;
    transition('prep',()=>prepTimer.go(prepSec));
  };

  // Quick-start: one-tap flow that picks a random motion, forces Quick
  // Clash format (shortest round), picks pro, and fires startDebate.
  // Uses a pending flag + useEffect because startDebate closes over
  // motion/format state that won't reflect until the next render.
  const[quickStartPending,setQuickStartPending]=useState(false);
  useEffect(()=>{
    if(quickStartPending && motion.trim() && format==='quick'){
      setQuickStartPending(false);
      startDebate();
    }
  },[quickStartPending,motion,format]);
  const quickStart=()=>{
    // Smart motion pick: when the user has a fingerprint flagging a
    // weakness domain (econ / tech / ethics / etc.), bias toward a
    // motion in that domain so Quick Clash actually drills the rough
    // edge instead of throwing a random topic. Falls back to plain
    // random when no fingerprint exists or no domain match.
    const fpText = styleSummary && styleSummary.fingerprint && styleSummary.fingerprint.text;
    const m = smartQuickMotion(fpText);
    try {
      const target = inferWeaknessDomain(fpText);
      if (target) window.gtag && gtag('event','quick_clash_targeted',{ target });
    } catch(_) {}
    setMotion(m);
    if(format!=='quick') setFormat('quick');
    const quickFmt = FORMATS.quick;
    if(quickFmt && !quickFmt.sides.includes(side)) setSide(quickFmt.sides[0]);
    setQuickStartPending(true);
    // Hitting Quick Clash counts as completing the onboarding intent —
    // the welcome card has done its job, no need to nag on next visit.
    try{ localStorage.setItem('debateos-da-onboarded','1') }catch(e){}
    setDaOnboarded(true);
  };

  // Skip prep → first speech
  const goToSpeeches=()=>{
    try { if (SFX && typeof SFX.click === 'function') SFX.click(); } catch(e){}
    // Lazy background autogen: only fire if the user is actually entering
    // speeches (not at startDebate, which they might cancel during prep).
    // Saves a Claude call per round when users abort during prep.
    ensureBackground(motion);
    try { warmUpTTS(); } catch(e){}
    prepTimer.reset();
    transition('speech',()=>{setIdx(0);setLog([]);setTimeout(()=>runSpeech(0,[]),400)});
  };

  // Auto-advance when prep timer ends
  useEffect(()=>{
    if(phase==='prep'&&prepTimer.left===0&&!prepTimer.on&&log.length===0){
      // Only auto-advance if timer actually ran (not on initial mount)
    }
  },[prepTimer.left]);

  // Run a speech
  const runSpeech=async(i,currentLog)=>{
    endingRef.current=false; // allow endSpeech for this new speech
    const s=SPEECHES[i];
    const userTurn=s.side===side;
    setLiveRate(1.0); // reset live speed each speech

    if(userTurn){
      // User turn. start timer + mic immediately
      timer.go(s.time);
      orb.setMode('mic');await orb.startMic();rec.start();
      // POI: AI may offer POIs during user speech (only in POI-enabled formats)
      if(fmt.poi){
        poiCountRef.current=0;
        setPoiOffer(false);setPoiActive(false);setPoiText('');
        // Offer first POI after 60-90s, second after another 60-90s
        const offerPOI=()=>{
          if(poiCountRef.current<2){
            setPoiOffer(true);
            poiCountRef.current++;
            // Schedule a possible second POI
            if(poiCountRef.current<2){
              poiTimeoutRef.current=setTimeout(offerPOI,60000+Math.random()*30000);
            }
          }
        };
        poiTimeoutRef.current=setTimeout(offerPOI,60000+Math.random()*30000);
      }
    } else {
      // AI turn. overlapped: start fetching audio for first half while still generating text
      orb.setMode('ai');setAiLoading(true);setAiText('');setAiError('');setAiPct(0);
      // Defensive: SFX.thinking() returns a stop function. If SFX is
      // missing the method (the historic /js/sfx.js collision bug),
      // fall back to a no-op so the AI turn still runs.
      var stopThinking = (function(){
        try {
          if (SFX && typeof SFX.thinking === 'function') return SFX.thinking() || function(){};
        } catch(e){}
        return function(){};
      })();
      try{
        // Match the LLM's word budget to the user's chosen wpm directly,
        // and ask TTS to play that text at the same wpm. Previously we
        // computed actualWPM = 150 × (wpm/140) ≈ 1.07 × wpm, so the AI
        // generated 7% more words than the user's setting and the TTS
        // played 7% faster than the slider claimed, the slider lied
        // about the wpm being delivered. Now: targetWords = time × wpm,
        // ttsSpeed = wpm / TTS_BASE_WPM, both anchored to the same number.
        const targetWords=Math.round((s.time/60)*wpm);
        const hist=currentLog.map(l=>`[${l.code}. ${l.who}]: ${l.text}`).join('\n\n');
        const ttsSpeed=Math.max(0.75,Math.min(2.0,wpm/TTS_BASE_WPM));

        // ── Chunked TTS pipeline: fire audio for each paragraph as soon as it's ready ──
        // Intensity 0 read as flat-narrator "explainer voice", debate is a
        // performance, so the AI opponent should sound like one. 0.45 is the
        // sweet spot: clear emotional inflection on big claims and rhetorical
        // peaks, but not tied to playback speed (the prior bug that made fast
        // speech also sound breathless and overcaffeinated).
        const ttsIntensity=0.45;
        const fetchTTSBlob=(text)=>{
          // Scrub markdown before TTS: ElevenLabs Turbo handles `**bold**`
          // gracefully (silently ignores) but tts-1 occasionally pronounces
          // stray asterisks or hash signs. Stripping defensively keeps the
          // delivery clean across providers.
          const input=stripPlainMd(text).slice(0,4000);
          return fetch('/api/tts',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({text:input,voice,speed:ttsSpeed,premium:isPro(),intensity:ttsIntensity,provider:isPro()?ttsProvider:undefined}),
          }).then(r=>{
            if(!r.ok) throw new Error('TTS '+r.status);
            return r.blob();
          });
        };

        // Strip <plan>/<thinking> tags from AI output. including incomplete open tags during streaming
        const stripPlan=(text)=>text.replace(/<plan>[\s\S]*?<\/plan>/gi,'').replace(/<plan>[\s\S]*$/gi,'').replace(/<\/?plan>/gi,'').replace(/<thinking>[\s\S]*?<\/thinking>/gi,'').replace(/<thinking>[\s\S]*$/gi,'').replace(/<\/?thinking>/gi,'').trim();

        // ── Live-streaming TTS pipeline ──
        // Audio starts playing as soon as first ~25 words have TTS ready,
        // while AI is still generating the rest of the speech.
        const blobPromises=[];  // grows as AI streams. playStream consumes them live
        let lastChunkEnd=0;
        const MIN_CHUNK_WORDS=25;
        const MAX_CHUNK_WORDS=200;
        let playbackStarted=false;

        const onAudioStart=()=>{
          stopThinking();
          setAiLoading(false);
          timer.go(s.time);
        };

        const tryChunk=(clean,force)=>{
          const unchunked=clean.slice(lastChunkEnd).trim();
          const words=unchunked.split(/\s+/).filter(Boolean);
          if(words.length<MIN_CHUNK_WORDS&&!force) return;
          let splitText=unchunked;
          if(!force&&words.length>MAX_CHUNK_WORDS){
            const approxChar=unchunked.split(/\s+/).slice(0,MAX_CHUNK_WORDS).join(' ').length;
            const sentEnd=unchunked.indexOf('.',approxChar);
            if(sentEnd>0) splitText=unchunked.slice(0,sentEnd+1).trim();
          } else if(!force){
            const lastPeriod=unchunked.lastIndexOf('.');
            const lastExcl=unchunked.lastIndexOf('!');
            const lastQ=unchunked.lastIndexOf('?');
            const boundary=Math.max(lastPeriod,lastExcl,lastQ);
            if(boundary>unchunked.length*0.5) splitText=unchunked.slice(0,boundary+1).trim();
            else return;
          }
          if(splitText.length<20) return;
          lastChunkEnd+=clean.slice(lastChunkEnd).indexOf(splitText)+splitText.length;
          const blobP=fetchTTSBlob(splitText).catch(e=>{console.warn('[TTS] Chunk failed:',e);return null});
          blobPromises.push(blobP);
          console.log(`%c[TTS] Chunk ${blobPromises.length} queued (${splitText.split(/\s+/).length} words)`,'color:cyan');

          // Start playback on the FIRST chunk. don't wait for AI to finish.
          // Audio is gated: queue a starter and hand off to the countdown UI.
          // User presses Start (or the counter expires) to fire playChunks.
          if(!playbackStarted){
            playbackStarted=true;
            setAiLoading('voice');
            // Countdown scales to the speech itself: 10% of the speech's
            // total time, capped at 30s, floored at 5s. Stops 30s of dead
            // air before a 60s cross-ex while keeping a real "brace
            // yourself" pause before an 8min Constructive.
            const countdownSec = Math.max(5, Math.min(30, Math.round((s.time||300) * 0.1)));
            // Skip-the-gate preference: power users opt out via the modal,
            // and we honor it for the rest of the session + future visits.
            let skipGate = false;
            try { skipGate = localStorage.getItem('debateos-skip-ai-countdown') === '1'; } catch(e){}
            const startFn = () => tts.playChunks(blobPromises,()=>{orb.setMode('idle');setTimeout(()=>endSpeech(),800)},onAudioStart);
            aiStartRef.current = startFn;
            if (skipGate) {
              console.log('%c[TTS] Audio ready, skip-gate preference honored','color:lime;font-weight:bold');
              startFn();
            } else {
              // Fast-network bypass. By the time the first TTS chunk lands,
              // if ≥ 2 chunks are already queued the AI + TTS pipeline is
              // keeping up — no point making the user sit through 5–30s of
              // empty countdown. On slow networks only the one chunk has
              // been queued by then, so the gate stays as a "brace yourself"
              // affordance instead of a dead screen. Hard ceiling: if the
              // first chunk hasn't resolved within 1.5s, show the gate
              // anyway so the user always sees a Start affordance.
              let decided = false;
              const decide = (bypass) => {
                if (decided) return;
                decided = true;
                if (bypass) {
                  console.log('%c[TTS] Fast network — bypassing '+countdownSec+'s countdown','color:lime;font-weight:bold');
                  startFn();
                } else {
                  console.log('%c[TTS] Audio ready, gated behind '+countdownSec+'s countdown / Start','color:lime;font-weight:bold');
                  setAiCountdown(countdownSec);
                }
              };
              blobP.then(blob => {
                if (blob && blobPromises.length >= 2) decide(true);
                else decide(false);
              }).catch(()=> decide(false));
              setTimeout(() => decide(false), 1500);
            }
          }
        };

        // Generate argument text. chunks fire TTS and start playing mid-stream.
