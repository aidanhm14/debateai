<style>
/* ── View Transitions: matches landing.html so /debate-ai feels continuous */
@view-transition { navigation: auto; }
::view-transition-old(root),
::view-transition-new(root) { animation-duration: 280ms; animation-timing-function: cubic-bezier(.22,.9,.32,1); }
::view-transition-old(root) { animation-name: vt-fade-out }
::view-transition-new(root) { animation-name: vt-fade-in }
@keyframes vt-fade-out { to { opacity:0; transform:translateY(-6px) } }
@keyframes vt-fade-in  { from { opacity:0; transform:translateY(8px) } }

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow-x:hidden}
:root{
  --bg:#1a1a1e;--fg:#f5f5f7;
  --c-faint:rgba(255,255,255,.15);--c-dim:rgba(255,255,255,.2);
  --c-subtle:rgba(255,255,255,.25);--c-muted:rgba(255,255,255,.3);
  --c-mid:rgba(255,255,255,.35);--c-text:rgba(255,255,255,.4);
  --c-text2:rgba(255,255,255,.45);--c-text3:rgba(255,255,255,.5);
  --c-text4:rgba(255,255,255,.6);--c-bright:rgba(255,255,255,.7);
  --c-surface:rgba(255,255,255,.03);--c-surface2:rgba(255,255,255,.04);
  --c-surface3:rgba(255,255,255,.06);--c-surface4:rgba(255,255,255,.08);
  --c-border:rgba(255,255,255,.06);--c-border2:rgba(255,255,255,.08);
  --c-border3:rgba(255,255,255,.1);--c-border4:rgba(255,255,255,.15);
  --c-border5:rgba(255,255,255,.22);
  --c-scrim:rgba(0,0,0,.6);--c-scrim2:rgba(0,0,0,.92);
}
[data-lighting="light"]{
  --bg:#f5f5f0;--fg:#1a1a1e;
  --c-faint:rgba(0,0,0,.1);--c-dim:rgba(0,0,0,.15);
  --c-subtle:rgba(0,0,0,.2);--c-muted:rgba(0,0,0,.25);
  --c-mid:rgba(0,0,0,.3);--c-text:rgba(0,0,0,.4);
  --c-text2:rgba(0,0,0,.45);--c-text3:rgba(0,0,0,.5);
  --c-text4:rgba(0,0,0,.6);--c-bright:rgba(0,0,0,.7);
  --c-surface:rgba(0,0,0,.02);--c-surface2:rgba(0,0,0,.03);
  --c-surface3:rgba(0,0,0,.05);--c-surface4:rgba(0,0,0,.06);
  --c-border:rgba(0,0,0,.06);--c-border2:rgba(0,0,0,.08);
  --c-border3:rgba(0,0,0,.1);--c-border4:rgba(0,0,0,.15);
  --c-border5:rgba(0,0,0,.2);
  --c-scrim:rgba(245,245,240,.7);--c-scrim2:rgba(245,245,240,.97);
}
body{
  font-family:'Inter',system-ui,sans-serif;
  background:var(--bg);color:var(--fg);
  -webkit-font-smoothing:antialiased;
}
#root{min-height:100vh}

/* ── Ambient ───────────────────────── */
.ambient{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 60% 50% at 50% 45%,rgba(239,68,68,.06),transparent 70%);
}
.ambient::after{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle 400px at 30% 70%,rgba(239,68,68,.03),transparent);
}


/* ── Page ──────────────────────────── */
.page{
  position:relative;z-index:1;min-height:100vh;
  display:flex;flex-direction:column;
}

/* ── Top Bar ───────────────────────── */
.bar{
  position:fixed;top:0;left:0;right:0;z-index:50;
  padding:20px 32px;display:flex;align-items:center;justify-content:space-between;
}
.bar-logo{font-size:1.45rem;font-weight:900;color:#f5f5f7;text-decoration:none;letter-spacing:-.025em;opacity:.95;transition:opacity .2s,transform .2s;line-height:1}
.bar-logo:hover{opacity:1;transform:translateY(-1px)}
.bar-logo em{color:#ef4444;font-style:normal;font-weight:900}
.bar-links{display:flex;gap:20px;align-items:center;flex-wrap:wrap}
.bar-links a{font-size:.72rem;font-weight:500;color:rgba(255,255,255,.35);text-decoration:none;text-transform:uppercase;letter-spacing:.08em;transition:color .2s}
.bar-links a:hover{color:rgba(255,255,255,.7)}

/* ── Center Stage ──────────────────── */
.center{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:100px 24px 60px;text-align:center;
  transition:opacity .4s ease,transform .4s ease;
}
.center.entering{opacity:0;transform:scale(.97) translateY(12px)}
.center.visible{opacity:1;transform:scale(1) translateY(0)}

/* ── Typography ────────────────────── */
.t-hero{
  font-size:clamp(3rem,8vw,6rem);font-weight:900;letter-spacing:-.05em;
  line-height:.9;margin-bottom:16px;
}
.t-hero em{font-style:normal;color:#ef4444}
.t-sub{
  font-size:clamp(.9rem,2vw,1.1rem);font-weight:300;color:rgba(255,255,255,.4);
  max-width:400px;line-height:1.5;margin:0 auto 48px;
}
.t-label{
  font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.16em;
  color:#ef4444;margin-bottom:12px;
}
.t-phase{
  font-size:clamp(1.4rem,3.5vw,2rem);font-weight:800;letter-spacing:-.03em;
  margin-bottom:4px;
}
.t-dim{color:rgba(255,255,255,.35);font-size:.85rem;font-weight:400}
.t-time{
  font-size:clamp(3.2rem,8vw,5rem);font-weight:200;letter-spacing:.02em;
  font-variant-numeric:tabular-nums;line-height:1;
}
.t-time.warn{color:#f59e0b}
.t-time.danger{color:#ef4444}

/* ── Input (floating, minimal) ─────── */
.float-input{
  width:100%;max-width:480px;background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);border-radius:16px;
  padding:20px 22px;color:#f5f5f7;font-size:1rem;font-family:inherit;
  outline:none;resize:none;transition:border-color .2s;line-height:1.5;
}
.float-input:focus{border-color:rgba(239,68,68,.4)}
.float-input::placeholder{color:rgba(255,255,255,.2)}

/* ── Pills ─────────────────────────── */
.pills{display:flex;gap:8px;justify-content:center;margin:12px 0;flex-wrap:wrap;max-width:780px;margin-left:auto;margin-right:auto}
.pill{
  padding:10px 16px;border-radius:100px;border:1.5px solid rgba(255,255,255,.1);
  background:transparent;color:rgba(255,255,255,.4);font-size:.76rem;font-weight:600;
  cursor:pointer;transition:all .25s;font-family:inherit;letter-spacing:.02em;white-space:nowrap;
}
.pill:hover{border-color:rgba(255,255,255,.25);color:rgba(255,255,255,.7)}
.pill.on{border-color:#ef4444;color:#ef4444;background:rgba(239,68,68,.06)}

/* ── WPM Slider ────────────────────── */
.wpm{display:flex;align-items:center;gap:16px;margin:20px auto;max-width:320px;width:100%}
.wpm input[type=range]{flex:1;accent-color:#ef4444;height:2px;opacity:.6}
.wpm span{font-size:.75rem;color:rgba(255,255,255,.3);font-weight:500}
.wpm strong{font-size:.8rem;color:rgba(255,255,255,.6);font-weight:700;min-width:65px;text-align:right}

/* ── CTA Button ────────────────────── */
.cta{
  padding:16px 48px;border:none;border-radius:100px;
  background:#ef4444;color:#fff;font-size:.9rem;font-weight:700;
  text-transform:uppercase;letter-spacing:.06em;cursor:pointer;
  transition:transform .2s,box-shadow .2s,opacity .2s;font-family:inherit;
  margin-top:32px;
}
.cta:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(239,68,68,.25)}
.cta:disabled{opacity:.25;cursor:not-allowed;transform:none;box-shadow:none}
.cta-ghost{
  padding:12px 32px;border:1px solid rgba(255,255,255,.1);border-radius:100px;
  background:transparent;color:rgba(255,255,255,.4);font-size:.82rem;font-weight:600;
  cursor:pointer;transition:all .2s;font-family:inherit;margin-top:12px;
}
.cta-ghost:hover{border-color:rgba(255,255,255,.25);color:rgba(255,255,255,.7)}

/* ── The Orb (waveform) ────────────── */
.orb-wrap{
  position:relative;width:280px;height:280px;margin:0 auto 32px;
  display:flex;align-items:center;justify-content:center;
}
.orb-glow{
  position:absolute;inset:-40px;border-radius:50%;
  background:radial-gradient(circle,rgba(239,68,68,.08),transparent 70%);
  transition:opacity .5s;opacity:0;
}
.orb-glow.on{opacity:1}
.orb-ring{
  position:absolute;inset:0;border-radius:50%;
  border:1px solid rgba(255,255,255,.06);transition:all .5s;
}
.orb-ring.active{border-color:rgba(239,68,68,.3);box-shadow:0 0 60px rgba(239,68,68,.1)}
.orb-ring.pulse{animation:orbPulse 2s ease-in-out infinite}
@keyframes orbPulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.04);opacity:.7}}
canvas.orb{width:220px;height:220px;border-radius:50%}

/* ── Speech Progress ───────────────── */
.progress-bar{display:flex;gap:8px;justify-content:center;margin-bottom:40px}
.pip{display:flex;flex-direction:column;align-items:center;gap:6px}
.pip-bar{width:40px;height:4px;border-radius:2px;background:rgba(255,255,255,.06);transition:.3s}
.pip-bar.done{background:#ef4444}
.pip-bar.now{background:#ef4444;box-shadow:0 0 12px rgba(239,68,68,.4)}
.pip-code{font-size:.6rem;font-weight:600;color:rgba(255,255,255,.2);text-transform:uppercase;letter-spacing:.06em}
.pip.done .pip-code{color:rgba(239,68,68,.5)}
.pip.now .pip-code{color:#ef4444}

/* ── Transcript ────────────────────── */
.transcript-btn{
  background:none;border:none;color:rgba(255,255,255,.2);font-size:.72rem;
  font-weight:600;cursor:pointer;font-family:inherit;text-transform:uppercase;
  letter-spacing:.08em;margin-top:24px;transition:color .2s;
}
.transcript-btn:hover{color:rgba(255,255,255,.5)}
.transcript-box{
  width:100%;max-width:min(96vw,1200px);max-height:min(72vh,820px);overflow-y:auto;margin:12px auto 0;
  background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);
  border-radius:14px;padding:28px 36px;text-align:left;
  font-size:.95rem;line-height:1.75;color:rgba(255,255,255,.82);white-space:pre-wrap;
}

/* ── Feedback Card ─────────────────── */
.fb-card{
  width:100%;max-width:600px;text-align:left;
  background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);
  border-radius:18px;padding:32px;margin:24px auto 0;
}
.fb-card .feedback-text{color:rgba(255,255,255,.5);font-size:.88rem;line-height:1.75;white-space:pre-wrap}

/* ── Controls Row ──────────────────── */
.row-c{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:20px}

/* ── Limit Warning ─────────────────── */
.limit-warn{font-size:.78rem;color:#ef4444;margin-top:16px;opacity:.7}
.limit-warn a{color:#ef4444;text-decoration:underline}

/* ── Scroll affordance for transcript boxes ── */
.transcript-box{
  position:relative;
}
.transcript-box::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:20px;
  background:linear-gradient(transparent,rgba(0,0,0,.25));pointer-events:none;
  border-radius:0 0 12px 12px;opacity:.6;
}
.transcript-box::-webkit-scrollbar{width:4px}
.transcript-box::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:4px}

/* ── Speech phase buttons. bigger touch targets ── */
.speech-btn{min-height:48px;min-width:120px;font-size:.88rem !important;padding:14px 28px !important}

/* ── Session recovery banner ── */
.recovery-banner{
  padding:16px 20px;background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.2);
  border-radius:14px;max-width:480px;margin:0 auto 20px;text-align:center;
}

/* ── Responsive ──────────────────────
   On mobile the 4 secondary nav links (Home / High School / Learn / About)
   + the lighting toggle wrap to 2 rows and collide with the sign-in button.
   Hide them and show only logo + auth to keep the top bar clean.
   Users can still reach those pages from the footer or landing. */
.sign-btn-short{display:none}
@media(max-width:640px){
  .bar-link-secondary{display:none!important}
  .sign-btn-full{display:none}
  .sign-btn-short{display:inline}
  .bar{padding:14px 16px}
  .bar-links{gap:12px}
  .bar-links button,.bar-links .sign-btn{min-height:44px;min-width:44px}
  .center{padding:80px 16px 112px}  /* bottom padding reserves space for sticky CTA */
  .orb-wrap{width:200px;height:200px}
  canvas.orb{width:160px;height:160px}
  .float-input{padding:16px}
  .cta{padding:16px 36px;font-size:.88rem;min-height:48px}
  /* Sticky Start Round on the setup screen. thumb-reachable even after
     the user scrolls past the format/traits selectors. Only the setup
     Start button gets this class; other .cta buttons keep their layout. */
  .cta-setup-sticky{
    position:sticky;bottom:16px;z-index:30;
    box-shadow:0 10px 28px rgba(0,0,0,.55), 0 0 0 1px rgba(255,255,255,.06) inset;
  }
  .pill{padding:12px 18px;font-size:.8rem;min-height:44px}
  .cta-ghost{padding:14px 28px;min-height:48px}
  .speech-btn{min-height:56px;min-width:140px;font-size:.95rem !important;padding:16px 32px !important}
  .t-label{font-size:.72rem}
  .pip-code{font-size:.72rem}
  .progress-bar{gap:4px}
  .pip-bar{width:28px}
  .kb-hint{display:none}
  .mobile-hint{display:block}
}
@media(min-width:641px){
  .mobile-hint{display:none}
}
@media(max-width:480px){
  .bar{padding:10px 12px}
  .bar-links{gap:8px}
  .bar-links a{font-size:.65rem}
  .orb-wrap{width:160px;height:160px}
  .center{padding-top:70px}
  .speech-btn{min-height:56px;min-width:100%;font-size:1rem !important;padding:18px 32px !important}
}
/* ── Round History ────────────────── */
.history-panel{
  position:fixed;inset:0;z-index:90;background:rgba(0,0,0,.92);
  overflow-y:auto;padding:80px 24px 40px;animation:fadeIn .25s ease;
}
.history-grid{max-width:640px;margin:0 auto}
.history-card{
  background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);
  border-radius:16px;padding:20px 24px;margin-bottom:12px;cursor:pointer;
  transition:all .2s;
}
.history-card:hover{border-color:rgba(239,68,68,.3);background:rgba(255,255,255,.05)}
.history-card .hc-motion{font-weight:600;color:rgba(255,255,255,.7);font-size:.95rem;margin-bottom:6px}
.history-card .hc-meta{font-size:.72rem;color:rgba(255,255,255,.25);display:flex;gap:12px;flex-wrap:wrap}
.history-card .hc-meta span{display:flex;align-items:center;gap:4px}
.history-detail{max-width:640px;margin:0 auto}
.history-detail .hd-speech{
  background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05);
  border-radius:12px;padding:16px;margin-bottom:10px;
}
.history-detail .hd-who{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
.history-detail .hd-who.you{color:#ef4444}
.history-detail .hd-who.ai{color:rgba(255,255,255,.3)}
.history-detail .hd-text{font-size:.85rem;line-height:1.7;color:rgba(255,255,255,.45);white-space:pre-wrap}

@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms !important;transition-duration:.01ms !important}
}

/* ── Lighting Toggle Button ───────── */
.lighting-toggle{
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
  border-radius:8px;padding:4px 10px;cursor:pointer;font-size:.85rem;
  transition:all .2s;line-height:1;
}
.lighting-toggle:hover{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.2)}

/* ── Light Mode ───────────────────── */
[data-lighting="light"] body{background:#f5f5f0;color:#1a1a1e}
[data-lighting="light"] .ambient{background:radial-gradient(ellipse 60% 50% at 50% 45%,rgba(239,68,68,.04),transparent 70%)}
[data-lighting="light"] .ambient::after{background:radial-gradient(circle 400px at 30% 70%,rgba(239,68,68,.03),transparent)}
[data-lighting="light"] .bar-logo{color:#1a1a1e}
[data-lighting="light"] .bar-links a{color:rgba(0,0,0,.35)}
[data-lighting="light"] .bar-links a:hover{color:rgba(0,0,0,.7)}
[data-lighting="light"] .lighting-toggle{background:rgba(0,0,0,.06);border-color:rgba(0,0,0,.1)}
[data-lighting="light"] .lighting-toggle:hover{background:rgba(0,0,0,.1);border-color:rgba(0,0,0,.2)}
[data-lighting="light"] .t-hero{color:#1a1a1e}
[data-lighting="light"] .t-sub{color:rgba(0,0,0,.45)}
[data-lighting="light"] .t-dim{color:rgba(0,0,0,.35)}
[data-lighting="light"] .t-phase{color:#1a1a1e}
[data-lighting="light"] .t-time{color:#1a1a1e}
[data-lighting="light"] .float-input{background:rgba(0,0,0,.03);border-color:rgba(0,0,0,.1);color:#1a1a1e}
[data-lighting="light"] .float-input:focus{border-color:rgba(239,68,68,.5)}
[data-lighting="light"] .float-input::placeholder{color:rgba(0,0,0,.25)}
[data-lighting="light"] .pill{border-color:rgba(0,0,0,.12);color:rgba(0,0,0,.45)}
[data-lighting="light"] .pill:hover{border-color:rgba(0,0,0,.3);color:rgba(0,0,0,.7)}
[data-lighting="light"] .pill.on{border-color:#ef4444;color:#ef4444;background:rgba(239,68,68,.06)}
[data-lighting="light"] .cta-ghost{border-color:rgba(0,0,0,.1);color:rgba(0,0,0,.4)}
[data-lighting="light"] .cta-ghost:hover{border-color:rgba(0,0,0,.25);color:rgba(0,0,0,.7)}
[data-lighting="light"] .wpm span{color:rgba(0,0,0,.35)}
[data-lighting="light"] .wpm strong{color:rgba(0,0,0,.6)}
[data-lighting="light"] .orb-ring{border-color:rgba(0,0,0,.08)}
[data-lighting="light"] .pip-bar{background:rgba(0,0,0,.08)}
[data-lighting="light"] .pip-code{color:rgba(0,0,0,.25)}
[data-lighting="light"] .pip.done .pip-code{color:rgba(239,68,68,.6)}
[data-lighting="light"] .pip.now .pip-code{color:#ef4444}

const SFX = {
  _ctx: null,
  _getCtx() { if(!this._ctx) this._ctx=new (window.AudioContext||window.webkitAudioContext)(); return this._ctx; },

  // UI click. subtle, satisfying
  click() {
    try{const c=this._getCtx();const o=c.createOscillator();const g=c.createGain();
    o.connect(g);g.connect(c.destination);o.frequency.value=1200;o.type='sine';
    g.gain.setValueAtTime(0.08,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.06);
    o.start(c.currentTime);o.stop(c.currentTime+0.06);}catch{}
  },

  // Start round. ascending chime
  startRound() {
    try{const c=this._getCtx();
    [440,554,659].forEach((f,i)=>{
      const o=c.createOscillator();const g=c.createGain();o.connect(g);g.connect(c.destination);
      o.frequency.value=f;o.type='sine';
      g.gain.setValueAtTime(0,c.currentTime+i*0.12);
      g.gain.linearRampToValueAtTime(0.1,c.currentTime+i*0.12+0.02);
      g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+i*0.12+0.25);
      o.start(c.currentTime+i*0.12);o.stop(c.currentTime+i*0.12+0.25);
    });}catch{}
  },

  // AI thinking. low ambient pulse (plays on loop, returns stop fn)
  thinking() {
    try{const c=this._getCtx();
    const o=c.createOscillator();const g=c.createGain();const lfo=c.createOscillator();const lfoG=c.createGain();
    o.connect(g);g.connect(c.destination);o.frequency.value=80;o.type='sine';
    lfo.connect(lfoG);lfoG.connect(g.gain);lfo.frequency.value=2;lfo.type='sine';
    lfoG.gain.value=0.03;g.gain.value=0.04;
    o.start();lfo.start();
    return()=>{try{g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.3);o.stop(c.currentTime+0.4);lfo.stop(c.currentTime+0.4)}catch{}};
    }catch{return()=>{}}
  },

  // Speech ready. bright ping
  ready() {
    try{const c=this._getCtx();const o=c.createOscillator();const g=c.createGain();
    o.connect(g);g.connect(c.destination);o.frequency.value=880;o.type='sine';
    g.gain.setValueAtTime(0.12,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.3);
    o.start(c.currentTime);o.stop(c.currentTime+0.3);}catch{}
  },

  // Preparing voice. warm shimmer (plays on loop, returns stop fn)
  preparing() {
    try{const c=this._getCtx();
    // Warm mid-tone shimmer. distinct from the low thinking pulse
    const o=c.createOscillator();const o2=c.createOscillator();const g=c.createGain();
    const lfo=c.createOscillator();const lfoG=c.createGain();
    o.connect(g);o2.connect(g);g.connect(c.destination);
    o.frequency.value=220;o.type='sine';
    o2.frequency.value=330;o2.type='sine';
    lfo.connect(lfoG);lfoG.connect(g.gain);
    lfo.frequency.value=0.8;lfo.type='sine';lfoG.gain.value=0.015;
    g.gain.value=0.03;
    o.start();o2.start();lfo.start();
    return()=>{try{g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.3);o.stop(c.currentTime+0.4);o2.stop(c.currentTime+0.4);lfo.stop(c.currentTime+0.4)}catch{}};
    }catch{return()=>{}}
  },

};

  noExamples:    { label:'Weak Examples',    emoji:'', desc:'Struggles with concrete real-world evidence, sounds overly academic' },

  noFramework:   { label:'Weak Framework',   emoji:'', desc:'Poor at framework-level debate, easy to outmaneuver theoretically' },
  predictable:   { label:'Predictable',      emoji:'', desc:'Always follows the same structure, never surprising or unconventional' },
  coldDelivery:  { label:'Cold Delivery',    emoji:'', desc:'Unpersuasive on the merits, comes across as calculating rather than compelling' },
  weakLinks:     { label:'Weak Link Chain',  emoji:'', desc:'Jumps from small causes to huge impacts without enough middle steps' },

function buildTraitPrompt(selectedStrengths, selectedWeaknesses) {
  const sLabels = selectedStrengths.map(k => STRENGTHS[k]?.desc || k);
  const wLabels = selectedWeaknesses.map(k => WEAKNESSES[k]?.desc || k);
  // "God mode" detection: every STRENGTHS key selected AND zero weaknesses.
  // This is the tournament-champion preset. we escalate the prompt beyond
  // a generic "you have these strengths" and instruct the model to drop the
  // strategic-imperfection heuristic that normally leaves attack surface
  // for the human opponent. God mode is explicitly unbeatable-grade.
  const allStrengthKeys = Object.keys(STRENGTHS || {});
  const isGodMode = allStrengthKeys.length > 0
    && allStrengthKeys.every(k => selectedStrengths.includes(k))
    && selectedWeaknesses.length === 0;
  let prompt = 'You are a skilled AI debater.';
  if (isGodMode) {
    prompt += ` GOD MODE. UNBEATABLE DEBATER:
You are operating at world-champion level. Every dimension of the craft is maxed out: framework, rhetoric, aggression, philosophy, real-world grounding, strategy, impact calculus, and steelmanning. You have zero weaknesses. The user chose this preset because they want the hardest opponent the app can produce. give them that.

Operating principles for God mode:
- NO strategic imperfection. Do not leave honest attack surface. Every argument is airtight, every link chain complete, every warrant named and defended.
- PRE-EMPT the three strongest responses your opponent could make on each argument. Run "even-if" statements so no reply lands.
- ABSOLUTE weighing discipline. Every impact comes with magnitude, probability, timeframe, reversibility, comparative language, and an explicit "this matters more than their X because Y" ranking.
- FRAMEWORK SUPREMACY. Set a decision rule in the first 30 seconds that your impacts win under. Make every clash route through your framework.
- STEELMAN their best possible argument before refuting it, then beat the steelman. Shows the judge you understand the debate at a deep level.
- CROSS-APPLY liberally. If they drop anything, weaponize it and explain why the drop is fatal to their ballot.
- RHETORICAL PEAK. Use specific numbers, named historical cases, named mechanisms. Callbacks. One memorable line per speech. Close with a one-sentence ballot story.
- Be gracious, not smug. A world champion is calm and precise. not trash-talking. The intimidation comes from being unshakeable, not from insults.`;
    return prompt;
  }
  if (sLabels.length) prompt += ' Your strengths: ' + sLabels.join('; ') + '.';
  if (wLabels.length) prompt += ' However, you have REAL weaknesses that make you beatable: ' + wLabels.join('; ') + '. These weaknesses should genuinely show up in your arguments. don\'t just mention them, actually exhibit them. A smart opponent should be able to exploit these gaps.';
  if (!sLabels.length && !wLabels.length) prompt += ' You are a well-rounded debater. competent at everything but not dominant at anything. Solid framework, decent examples, clear logic.';
  return prompt;
}

// Unified AI call. supports Claude, OpenAI, and xAI streaming formats
async function callAI(sys, user, onChunk, brainKey, opts){
  const brain = BRAINS[brainKey] || BRAINS.claude;
  const pro = isPro();
  const model = pro && brain.proModel ? brain.proModel : brain.model;

  // Voice feature. defaults to "bot" (debate-ai is the full-round simulator,
  // which was getting FULL voice client-side before). Callers can override
  // via opts.voiceFeature. e.g. "judge" for RFD calls, "feedback" to skip
  // debater voice entirely.
  const voiceFeature = (opts && opts.voiceFeature) || 'bot';
  // Voice format. piped through to the server so the per-format voice
  // block (FORMAT_VOICES in voice-guidelines.mjs) gets appended. APDA users
  // see APDA conventions; Policy users see spreading + evidence tags; etc.
  // Callers (buildPrompt sites inside RoundApp) pass opts.voiceFormat = format.
  const voiceFormat = opts && opts.voiceFormat;
  const body={
    model: model,
    max_tokens:16000,
    stream:true,
    system:sys,
    messages:[{role:'user',content:user}],
    _feature:'debate-ai',
    _voiceFeature: voiceFeature,
  };
  if (voiceFormat) body._voiceFormat = voiceFormat;
  // Server-side prompt library: opts.promptId references PROMPT_LIBRARY[key]
  // in netlify/functions/lib/prompts.mjs; opts.promptVars supplies {{var}}
  // substitutions so the static prompt lives server-side.
  if (opts && opts.promptId) body._promptId = opts.promptId;
  if (opts && opts.promptVars) body._promptVars = opts.promptVars;
  let currentEndpoint=brain.endpoint;
  let r=await fetch(currentEndpoint,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(body),
  });
  // Detect Netlify 404 page (force=200 redirect can serve HTML body when function missing)
  // OR actual 404 OR 500-when-key-missing. fall back to Claude for any non-Claude brain failure
  const contentType=r.headers.get('content-type')||'';
  const isHtmlBody=contentType.includes('text/html');
  const isBroken=!r.ok || isHtmlBody;
  if(isBroken && currentEndpoint!=='/api/claude'){
    console.warn('[AI] '+currentEndpoint+' broken (status='+r.status+', ct='+contentType+'), falling back to /api/claude');
    body.model=BRAINS.claude.model;
    currentEndpoint='/api/claude';
    r=await fetch('/api/claude',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(body),
    });
  }
  // If Claude proxy itself returned an HTML error page, the backend is offline.
  // Try BYOK direct-to-Anthropic as a last resort. Prompt for key if not stored.
  const finalCt=r.headers.get('content-type')||'';
  if((!r.ok || finalCt.includes('text/html')) && currentEndpoint==='/api/claude'){
    body.model=BRAINS.claude.model;
    let direct=await callAnthropicDirect(body);
    if(!direct || !direct.ok){
      const key=await promptForKey();
      if(!key) throw new Error('AI backend is offline and no API key provided. Try again later or get a free key at console.anthropic.com to unlock unlimited access right now.');
      direct=await callAnthropicDirect(body);
      if(!direct || !direct.ok){
        clearStoredKey();
        throw new Error('That key didn\'t work. Double-check it on console.anthropic.com and try again.');
      }
    }
    r=direct;
  }
  if(!r.ok){
    const txt=await r.text().catch(()=>'');
    let errMsg='';
    try{const j=JSON.parse(txt);errMsg=typeof j.error==='string'?j.error:typeof j.message==='string'?j.message:JSON.stringify(j).slice(0,160)}catch{errMsg=(txt||'').replace(/<[^>]*>/g,'').slice(0,160).trim()||'No response body'}
    if(r.status===401) throw new Error('Sign in required: '+errMsg);
    if(r.status===429) throw new Error('Rate limited. Wait a moment and try again.');
    throw new Error('AI request failed ('+r.status+'). '+(errMsg||'Try again in a moment.'));
  }
  const reader=r.body.getReader(),dec=new TextDecoder();
  let full='',buf='';
  while(true){
    const{done,value}=await reader.read();
    if(done)break;
    buf+=dec.decode(value,{stream:true});
    const lines=buf.split('\n');buf=lines.pop()||'';
    for(const l of lines){
      if(l.startsWith('data: ')){
        const d=l.slice(6);if(d==='[DONE]')break;
        try{
          const p=JSON.parse(d);
          // Claude format
          if(p.type==='content_block_delta'&&p.delta?.text){
            full+=p.delta.text;if(onChunk)onChunk(full);
          }
          // OpenAI / xAI format
          if(p.choices&&p.choices[0]?.delta?.content){
            full+=p.choices[0].delta.content;if(onChunk)onChunk(full);
          }
          // Gemini format
          if(p.candidates&&p.candidates[0]?.content?.parts){
            for(const part of p.candidates[0].content.parts){
              if(part.text){full+=part.text;if(onChunk)onChunk(full)}
            }
          }
        }catch{}
      }
    }
  }
  incUsage();return full;
}

// Backwards-compatible wrapper
function callClaude(sys, user, onChunk){ return callAI(sys, user, onChunk, 'claude'); }

function useOrb(){
  const ref=useRef(null);
  const ctxRef=useRef(null);
  const analyserRef=useRef(null);
  const streamRef=useRef(null);
  const animRef=useRef(null);
  const modeRef=useRef('idle');
  const runRef=useRef(false);

  const draw=useCallback(()=>{
    const c=ref.current;if(!c)return;
    const ctx=c.getContext('2d');
    const W=c.width/2,H=c.height/2; // logical half (already scaled)
    const dpr=window.devicePixelRatio||1;
    const cx=c.width/(2*dpr),cy=c.height/(2*dpr),baseR=cx*0.7;
    ctx.save();ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.clearRect(0,0,c.width/dpr,c.height/dpr);

    let pts=120,ampData=null,globalAmp=0;

    if(modeRef.current==='mic'&&analyserRef.current){
      const data=new Uint8Array(analyserRef.current.frequencyBinCount);
      analyserRef.current.getByteFrequencyData(data);
      ampData=data;globalAmp=data.reduce((a,b)=>a+b,0)/data.length/255;
    } else if(modeRef.current==='ai'){
      const t=Date.now()/1000;
      globalAmp=0.25+Math.sin(t*3)*.12+Math.sin(t*7.3)*.06;
      ampData=new Uint8Array(64);
      for(let i=0;i<64;i++) ampData[i]=128+Math.sin(t*4+i*.4)*55+Math.sin(t*8.5+i*.9)*25;
    } else {
      globalAmp=0.015+Math.sin(Date.now()/2500*Math.PI)*.008;
    }

    // Draw organic blob
    ctx.beginPath();
    for(let i=0;i<=pts;i++){
      const a=(i/pts)*Math.PI*2;
      let r=baseR;
      if(ampData){
        const idx=Math.floor((i/pts)*ampData.length);
        r+=((ampData[idx]||128)/255)*baseR*0.35;
      } else {
        r+=Math.sin(a*5+Date.now()/500)*baseR*globalAmp;
        r+=Math.sin(a*3-Date.now()/700)*baseR*globalAmp*0.5;
      }
      const x=cx+Math.cos(a)*r,y=cy+Math.sin(a)*r;
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.closePath();

    // Gradient fill
    const grad=ctx.createRadialGradient(cx,cy,0,cx,cy,baseR*1.3);
    if(modeRef.current==='idle'){
      grad.addColorStop(0,'rgba(255,255,255,.02)');
      grad.addColorStop(1,'rgba(255,255,255,0)');
      ctx.strokeStyle='rgba(255,255,255,.06)';
    } else {
      grad.addColorStop(0,'rgba(239,68,68,.08)');
      grad.addColorStop(1,'rgba(239,68,68,0)');
      ctx.strokeStyle='rgba(239,68,68,.35)';
      ctx.shadowBlur=30;ctx.shadowColor='rgba(239,68,68,.15)';
    }
    ctx.fillStyle=grad;ctx.fill();
    ctx.lineWidth=1.5;ctx.stroke();
    ctx.shadowBlur=0;

    ctx.restore();
    if(runRef.current) animRef.current=requestAnimationFrame(draw);
  },[]);

  const init=()=>{
    const c=ref.current;if(!c)return;
    const dpr=window.devicePixelRatio||1;
    const rect=c.getBoundingClientRect();
    c.width=rect.width*dpr;c.height=rect.height*dpr;
    runRef.current=true;draw();
  };
  const kill=()=>{runRef.current=false;if(animRef.current)cancelAnimationFrame(animRef.current);stopMic()};
  const setMode=(m)=>{modeRef.current=m};

  const startMic=async()=>{
    try{
      const s=await navigator.mediaDevices.getUserMedia({audio:true});
      streamRef.current=s;
      ctxRef.current=new(window.AudioContext||window.webkitAudioContext)();
      analyserRef.current=ctxRef.current.createAnalyser();
      analyserRef.current.fftSize=256;
      ctxRef.current.createMediaStreamSource(s).connect(analyserRef.current);
      modeRef.current='mic';
    }catch{}
  };
  const stopMic=()=>{
    if(streamRef.current){streamRef.current.getTracks().forEach(t=>t.stop());streamRef.current=null}
    modeRef.current='idle';
  };

  return {ref,init,kill,setMode,startMic,stopMic};
}

/* ── Preload browser voices (Chrome loads async) ── */
let _voices=[];
let _audioUnlocked=false;
function _loadVoices(){
  if(!window.speechSynthesis) return;
  _voices=window.speechSynthesis.getVoices();
}
if(window.speechSynthesis){
  _loadVoices();
  window.speechSynthesis.onvoiceschanged=_loadVoices;
}

// Unlock both speechSynthesis AND Audio playback on user gesture
function warmUpTTS(){
  if(_audioUnlocked) return;
  // Unlock browser speechSynthesis
  if(window.speechSynthesis){
    const u=new SpeechSynthesisUtterance(' ');
    u.volume=0;u.rate=10;
    window.speechSynthesis.speak(u);
  }
  // Unlock AudioContext (Web Audio API)
  try{const ctx=new(window.AudioContext||window.webkitAudioContext)();ctx.resume().then(()=>ctx.close());}catch{}
  // Unlock HTMLAudioElement.play(). required on mobile/Safari
  // Play a tiny silent WAV so subsequent programmatic play() calls are allowed
  try{
    const silentWav='data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAIA+AAACABAAZGF0YQAAAAA=';
    const a=new Audio(silentWav);
    a.volume=0;
    a.play().then(()=>{a.pause();a.remove&&a.remove();console.log('[TTS] Audio element unlocked')}).catch(()=>{});
  }catch{}
  _audioUnlocked=true;
}

/* ── TTS. simple, reliable audio playback ── */

function useTTS(){
  const[speaking,setSpeaking]=useState(false);
  const[paused,setPaused]=useState(false);
  const[streamStatus,setStreamStatus]=useState('');
  const audioRef=useRef(null);
  // Per-invocation token. Each playChunks/speak call creates a fresh token;
  // the old loop captures its token by closure and exits on its OWN token flip,
  // so a new invocation can't accidentally resurrect an old in-flight fetch by
  // flipping a shared cancelled flag back to false.
  const tokenRef=useRef(null);
  const pausedRef=useRef(false);
  const onEndRef=useRef(null);
  const modeRef=useRef('none');
  const rateRef=useRef(1.0);
  const progressRef=useRef({elapsed:0,total:0});

  // Cancel any active invocation. Safe to call repeatedly; idempotent.
  const cancelActive=()=>{
    if(tokenRef.current){tokenRef.current.cancelled=true;tokenRef.current=null}
    if(audioRef.current){try{audioRef.current.pause()}catch(e){}try{audioRef.current.src=''}catch(e){}audioRef.current=null}
    if(window.speechSynthesis)window.speechSynthesis.cancel();
  };

  // Gate that resolves when not paused. used to hold chunk loops between chunks
  const waitIfPaused=(token)=>new Promise(resolve=>{
    if(!pausedRef.current||token.cancelled) return resolve();
    const check=()=>{
      if(!pausedRef.current||token.cancelled) resolve();
      else setTimeout(check,100);
    };
    check();
  });

  // Play a single audio blob. returns promise that resolves when done
  const playBlob=(blob,token)=>{
    return new Promise((resolve,reject)=>{
      if(token.cancelled) return resolve();
      const url=URL.createObjectURL(blob);
      const audio=new Audio(url);
      audioRef.current=audio;
      audio.playbackRate=rateRef.current;
      audio.onended=()=>{URL.revokeObjectURL(url);resolve()};
      audio.onerror=()=>{URL.revokeObjectURL(url);reject(new Error('Audio error'))};
      audio.play().catch(e=>{URL.revokeObjectURL(url);reject(e)});
    });
  };

  // Fetch TTS from API.
  // intensity defaults to 0 (calm, deliberate delivery) instead of being
  // coupled to playback speed. fast speech at zero intensity still sounds
  // composed rather than breathless. Callers that want the old behavior
  // can pass `intensity: Math.min(1, Math.max(0, (speed-1.0)/1.0))`.
  // Default voice 'sage' (The Philosopher) is the calmest option; callers
  // override per-character.
  const fetchTTS=(text,speed,voiceName,intensity)=>{
    const i = typeof intensity === 'number' ? Math.min(1,Math.max(0,intensity)) : 0;
    return fetch('/api/tts',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({text:text.slice(0,4000),voice:voiceName||'sage',speed,premium:isPro(),intensity:i}),
    }).then(r=>{
      if(!r.ok) throw new Error('TTS '+r.status);
      return r.blob();
    });
  };

  // Browser fallback
  const speakBrowser=(text,rate,token)=>new Promise(resolve=>{
    if(!window.speechSynthesis){resolve();return}
    window.speechSynthesis.cancel();
    const chunks=text.match(/[^.!?]+[.!?]+[\s]*/g)||[text];
    const groups=[];let cur='';
    for(const s of chunks){
      if((cur+s).split(/\s+/).length>60&&cur){groups.push(cur.trim());cur=s}
      else cur+=s;
    }
    if(cur.trim())groups.push(cur.trim());
    if(!_voices.length) _loadVoices();
    const v=_voices.find(v=>/Samantha|Google US English|Aaron/.test(v.name))||_voices.find(v=>v.lang?.startsWith('en'))||null;
    let i=0;
    const next=()=>{
      if(token.cancelled||i>=groups.length){resolve();return}
      const u=new SpeechSynthesisUtterance(groups[i]);
      u.rate=rate;u.pitch=1;u.volume=1;if(v)u.voice=v;
      u.onend=()=>{i++;next()};u.onerror=()=>{i++;next()};
      window.speechSynthesis.speak(u);
    };
    setTimeout(next,50);
  });

  // speak is now defined below as speakWithError (with error surfacing)

  // ── playChunks: play an array of blob promises sequentially, starting ASAP ──
  const playChunks=(blobPromises,onEnd,onStart)=>{
    // Cancel any prior invocation first. prevents old in-flight fetches from
    // resolving into a new audio element that overlaps this one.
    cancelActive();
    const token={cancelled:false};
    tokenRef.current=token;
    pausedRef.current=false;setPaused(false);setSpeaking(true);setStreamStatus('');
    modeRef.current='openai';onEndRef.current=onEnd;
    progressRef.current={elapsed:0,total:0};
    const durations=[];
    let i=0;let started=false;

    const next=async()=>{
      // Check if done. array may still be growing, so check a "done" flag
      while(i<blobPromises.length){
        if(token.cancelled) break;
        await waitIfPaused(token);
        if(token.cancelled) break;
        setStreamStatus(`Playing ${i+1}/${blobPromises.length}`);
        try{
          const blob=await blobPromises[i];
          if(token.cancelled) break;
          await waitIfPaused(token);
          if(token.cancelled) break;
          if(!blob||blob.size<500){durations[i]=0;i++;continue}
          const url=URL.createObjectURL(blob);
          const audio=new Audio(url);
          // Guard: only claim the active audio slot if we're still the active
          // token. Prevents a stale loop from hijacking audioRef mid-stream.
          if(tokenRef.current!==token){URL.revokeObjectURL(url);break}
          audioRef.current=audio;
          audio.playbackRate=rateRef.current;
          const ci=i;
          audio.onloadedmetadata=()=>{
            durations[ci]=audio.duration||0;
            progressRef.current.total=durations.reduce((a,b)=>a+(b||0),0);
          };
          audio.ontimeupdate=()=>{
            const prior=durations.slice(0,ci).reduce((a,b)=>a+(b||0),0);
            progressRef.current.elapsed=prior+(audio.currentTime||0);
          };
          if(!started){started=true;if(onStart)onStart()}
          await new Promise((res,rej)=>{
            audio.onended=()=>{URL.revokeObjectURL(url);res()};
            audio.onerror=()=>{URL.revokeObjectURL(url);res()};
            audio.play().catch(()=>{URL.revokeObjectURL(url);res()});
          });
        }catch{durations[i]=0}
        i++;
      }
      // Wait briefly in case more chunks arrive
      if(!token.cancelled&&!blobPromises._done){
        setTimeout(()=>{
          if(token.cancelled) return;
          if(blobPromises.length>i) next();
          else{setSpeaking(false);setStreamStatus('');if(onEndRef.current)onEndRef.current()}
        },500);
        return;
      }
      if(!token.cancelled){setSpeaking(false);setStreamStatus('');if(onEndRef.current)onEndRef.current()}
    };
    next();
  };

  const togglePause=()=>{
    const willPause=!pausedRef.current;
    pausedRef.current=willPause;
    setPaused(willPause);
    if(modeRef.current==='openai'){
      if(audioRef.current){
        if(willPause){try{audioRef.current.pause()}catch(e){}}
        else{try{audioRef.current.play()}catch(e){}}
      }
    } else if(modeRef.current==='browser'&&window.speechSynthesis){
      if(willPause)window.speechSynthesis.pause();
      else window.speechSynthesis.resume();
    }
  };

  const stop=()=>{
    cancelActive();
    pausedRef.current=false;
    setSpeaking(false);setPaused(false);setStreamStatus('');modeRef.current='none';
  };

  const setRate=(rate)=>{rateRef.current=rate;if(audioRef.current)audioRef.current.playbackRate=rate};

  const getAudioTime=()=>{
    if(!audioRef.current) return{currentTime:0,duration:0,rate:1};
    const e=progressRef.current.elapsed>0?progressRef.current.elapsed:(audioRef.current.currentTime||0);
    const t=progressRef.current.total>0?progressRef.current.total:(audioRef.current.duration||0);
    return{currentTime:e,duration:t,rate:audioRef.current.playbackRate||1};
  };

  const getProgress=()=>progressRef.current;

  const[ttsError,setTtsError]=useState('');

  // Wrap speak to surface errors
  const speakWithError=(text,wpm=180,onEnd,voiceName='onyx',onStart)=>{
    cancelActive();
    setTtsError('');
    const token={cancelled:false};
    tokenRef.current=token;
    pausedRef.current=false;setPaused(false);setSpeaking(true);setStreamStatus('');
    onEndRef.current=onEnd;
    progressRef.current={elapsed:0,total:0};
    const speed=Math.max(0.75,Math.min(2.0,wpm/140));
    (async()=>{
      try{
        modeRef.current='openai';
        const blob=await fetchTTS(text,speed,voiceName);
        if(token.cancelled) return;
        if(onStart) onStart();
        const audio=new Audio(URL.createObjectURL(blob));
        if(tokenRef.current!==token) return;
        audioRef.current=audio;
        audio.playbackRate=rateRef.current;
        audio.ontimeupdate=()=>{
          progressRef.current.elapsed=audio.currentTime||0;
          progressRef.current.total=audio.duration||0;
        };
        await new Promise((res,rej)=>{
          audio.onended=res;audio.onerror=rej;
          audio.play().catch(rej);
        });
      }catch(e){
        console.warn('[TTS] Failed:',e.message,',  browser fallback');
        setTtsError('HD voice failed ('+e.message+'). Using browser voice.');
        if(!token.cancelled){
          modeRef.current='browser';
          if(onStart) onStart();
          await speakBrowser(text,Math.max(0.5,Math.min(2.5,wpm/140)),token);
        }
      }
      if(!token.cancelled){setSpeaking(false);setStreamStatus('');setTtsError('');if(onEndRef.current)onEndRef.current()}
    })();
  };

  return{speak:speakWithError,playChunks,stop,speaking,paused,togglePause,getProgress,setRate,getAudioTime,streamStatus,ttsError};
}

function useRecognition(){
  const recRef=useRef(null);
  const txtRef=useRef('');
  const[transcript,setTranscript]=useState('');
  const aliveRef=useRef(false);
  const[micAvailable,setMicAvailable]=useState(true);
  const[micError,setMicError]=useState('');

  const start=()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){setMicAvailable(false);setMicError('Speech recognition not supported in this browser. Type your argument below.');return}
    const r=new SR();r.continuous=true;r.interimResults=true;r.lang='en-US';
    r.onresult=e=>{
      let f='',int='';
      for(let i=0;i<e.results.length;i++){
        if(e.results[i].isFinal)f+=e.results[i][0].transcript+' ';
        else int+=e.results[i][0].transcript;
      }
      txtRef.current=f;setTranscript(f+int);
    };
    r.onend=()=>{if(aliveRef.current)try{r.start()}catch{}};
    r.onerror=(e)=>{
      if(e.error==='not-allowed'||e.error==='service-not-allowed'){
        setMicAvailable(false);setMicError('Mic permission denied. Type your argument below.');
      }
    };
    recRef.current=r;aliveRef.current=true;
    txtRef.current='';setTranscript('');setMicError('');
    try{r.start()}catch(e){setMicAvailable(false);setMicError('Could not start mic. Type your argument below.')};
  };
  const stop=()=>{aliveRef.current=false;if(recRef.current)try{recRef.current.stop()}catch{};return txtRef.current};
  const setManualText=(text)=>{txtRef.current=text;setTranscript(text)};
  return{transcript,start,stop,getText:()=>txtRef.current,micAvailable,micError,setManualText};
}

/* ═══════════════════════════════════════════════════
   TIMER
   ═══════════════════════════════════════════════════ */

function useTimer(){
  const[left,setLeft]=useState(0);
  const[on,setOn]=useState(false);
  const iRef=useRef(null);
  const cbRef=useRef(null);

  const beep=(f,d)=>{try{const a=new(window.AudioContext||window.webkitAudioContext)();const o=a.createOscillator();const g=a.createGain();o.connect(g);g.connect(a.destination);o.frequency.value=f;g.gain.value=.12;o.start();o.stop(a.currentTime+d/1000)}catch{}};

  const go=(secs,onDone)=>{cbRef.current=onDone;setLeft(secs);setOn(true)};
  const halt=()=>{setOn(false)};
  const pause=()=>{setOn(false)};
  const resume=()=>{if(left>0)setOn(true)};
  const reset=()=>{setOn(false);setLeft(0)};

  useEffect(()=>{
    if(!on){if(iRef.current)clearInterval(iRef.current);return}
    iRef.current=setInterval(()=>{
      setLeft(p=>{
        if(p<=1){clearInterval(iRef.current);setOn(false);beep(880,400);if(cbRef.current)setTimeout(cbRef.current,300);return 0}
        if(p===61)beep(440,200);  // 1 minute warning
        if(p===31)beep(660,150);  // 30 second warning
        if(p===16)beep(880,150);  // 15 second warning
        return p-1;
      });
    },1000);
    return()=>clearInterval(iRef.current);
  },[on]);

  const fmt=s=>Math.floor(s/60)+':'+String(s%60).padStart(2,'0');
  return{left,on,go,halt,pause,resume,reset,fmt};
}

/* ── Flow Tracker: analyze what's been dropped/extended/conceded ── */
function buildFlowAnalysis(history,format,userSide){
  if(!history) return '';
  const fmt=FORMATS[format]||FORMATS.apda;
  const speeches=history.split('\n\n').filter(s=>s.startsWith('['));
  if(speeches.length<2) return '';

  return `
FLOW ANALYSIS. READ THIS CAREFULLY BEFORE SPEAKING:
You must track the "flow" of the round. every argument that has been made, and what happened to it.

Here is the round history for you to analyze:
${history}

Before writing your speech, mentally track:
1. THEIR ARGUMENTS: List every distinct argument/warrant the opponent has made. For each one, note: have you (your side) responded to it? If not, it is a DROP and you are losing on that argument. You MUST address drops.
2. YOUR ARGUMENTS: List every argument your side has made. Has the opponent responded? If they dropped it, EXTEND it explicitly: "They completely dropped our [argument name]. pull this through, Judge."
3. CONCESSIONS: Has either side conceded any point? If they conceded something, use it: "They granted our point about X. That's huge because it means Y."
4. CLASH POINTS: Where are both sides directly engaging? These are the key voting issues. Weigh them explicitly.

STRATEGIC RULES based on the flow:
- NEVER re-argue a point your side already made well. Instead, EXTEND it with new warrants, new applications, or weighing. Repetition is a waste of speech time.
- ALWAYS address the opponent's STRONGEST argument first, not their weakest. Judges notice when you dodge the hard clash. it makes you look scared.
- If the opponent dropped something, don't just note it. explain WHY the drop is fatal: "Because they dropped [Argument Name], they have no answer to [specific impact]. That argument flows uncontested to our side and it's sufficient to win the round on its own."
- Track the NUMBER of arguments won vs lost. If you're winning 3 clashes and losing 1, crystallize around the 3 wins and minimize the 1 loss.

/* ── Adaptive Opponent Modeling: detect user's argument patterns ── */
function buildOpponentModel(currentLog, historyRounds, userSide){
  // Analyze current round
  const userSpeeches=currentLog.filter(l=>l.who==='You');
  if(userSpeeches.length===0) return '';

  const userText=userSpeeches.map(l=>l.text).join(' ');
  const patterns=[];

  // Detect argument style tendencies
  if(userText.match(/framework|standard|criterion/gi)?.length>2) patterns.push('relies heavily on framework-level debate. challenge their framework directly or show yours subsumes it');
  if(userText.match(/example|instance|case study|real.?world/gi)?.length>2) patterns.push('uses lots of real-world examples. attack the examples as disanalogous or cherry-picked');
  if(userText.match(/emotion|feel|suffer|pain|human cost/gi)?.length>2) patterns.push('leans on emotional/pathos appeals. counter with structural analysis and mechanism');
  if(userText.match(/study|data|percent|statistic|research/gi)?.length>2) patterns.push('evidence-heavy. question the methodology or show the data cuts both ways');
  if(userText.match(/rights?|freedom|autonomy|liberty|dignity/gi)?.length>2) patterns.push('frames through rights/deontological lens. argue rights conflict or that consequences override in this context');
  if(userText.match(/consequen|utilitar|outcome|result|effect/gi)?.length>2) patterns.push('consequentialist framing. introduce a rights-based or principled objection they cannot weigh against');
  if(userText.match(/moral hazard|incentiv|rational|actor/gi)?.length>1) patterns.push('uses economic/rational actor reasoning. show where human behavior deviates from rational models');
  if(userText.match(/slippery slope|inevitable|always leads|will become/gi)?.length>1) patterns.push('prone to slippery slope reasoning. challenge the mechanism at each step');

  // Detect structural tendencies
  if(!userText.match(/weigh|outweigh|magnitude|probability|timeframe/gi)) patterns.push('DOES NOT WEIGH. exploit this by doing extensive comparative weighing on every clash');
  if(!userText.match(/even if|grant|concede/gi)) patterns.push('does not use strategic concessions or preemption. use even-if arguments to show your case is resilient');
  if(!userText.match(/drop|extend|pull through|cross.?apply/gi)) patterns.push('does not track the flow. call out their drops loudly and extend your untouched arguments');
  if(!userText.match(/framework|standard|criterion|lens/gi)) patterns.push('DID NOT SET A FRAMEWORK. set one aggressively and make all arguments flow through your standard');
  if(!userText.match(/impact|harm|benefit|consequence|affect/gi)) patterns.push('WEAK ON IMPACTS. their arguments lack terminal impacts, punish this by showing your impacts are concrete and theirs are vague');
  if(userText.split(/\s+/).length < 100 && userSpeeches.length > 0) patterns.push('VERY SHORT SPEECHES. they are underutilizing their time, point this out to the judge as lack of substantive engagement');

  // Check history for broader patterns
  if(historyRounds && historyRounds.length >= 3){
    const recentWins=historyRounds.slice(0,5).filter(r=>r.userWon===true).length;
    const recentTotal=Math.min(5,historyRounds.length);
    if(recentWins/recentTotal>=0.7) patterns.push('has been winning frequently. bring your A-game, exploit any gap in their technique');
    if(recentWins/recentTotal<=0.3) patterns.push('has been struggling. still debate well but the user needs practice identifying drops and weighing');
  }

  if(patterns.length===0) return '';
  return `
OPPONENT SCOUTING REPORT (based on analysis of their speeches this round):
Your opponent's tendencies: ${patterns.join('; ')}.
Use this intelligence. If they don't weigh, you weigh extensively. If they rely on examples, attack with framework. If they're framework-heavy, overwhelm with concrete impacts. Exploit their blind spots while respecting their strengths.`;
}

// Build the rivalry memory block: if the user has faced THIS voice
// personality before, give the AI a short history so it can reference the
// prior rounds naturally. This is what turns a one-shot debate into an
// ongoing rivalry — the AI "remembers" getting beaten on the impact calc
// last round and anticipates it this round.
function buildOpponentMemory(voice, historyRounds) {
  if (!voice || !Array.isArray(historyRounds) || !historyRounds.length) return '';
  const prior = historyRounds.filter(r => r && r.voice === voice);
  if (!prior.length) return '';
  const wins = prior.filter(r => r.userWon === true).length;
  const losses = prior.filter(r => r.userWon === false).length;
  // Last 3 rounds, most recent first — enough to ground the AI's memory
  // without overflowing the system prompt.
  const recent = prior.slice(0, 3).map((r, i) => {
    const outcome = r.userWon === true ? 'they beat you' : r.userWon === false ? 'you beat them' : 'split decision';
    const side = r.sideLabel || r.side || '?';
    return `  ${i+1}. "${(r.motion||'').slice(0,100)}" — they ran ${side} — ${outcome}`;
  }).join('\n');
  const personaLine = `You've debated this opponent ${prior.length} time${prior.length===1?'':'s'} before. Record so far: ${losses}W-${wins}L in your favor.`;
  return `
RIVALRY — YOU AND THIS DEBATER HAVE HISTORY:
${personaLine}
Recent rounds:
${recent}

Play this like a rematch. Reference the history sparingly but real — "last time you ran ${prior[0].sideLabel||prior[0].side||'the other side'} on a motion like this and I caught the drop on..." or "I've learned your tells — you'll likely collapse to the impact argument, so I'm pre-empting it this time." Do NOT force the reference if it doesn't fit; ONE callback per speech is plenty. The goal is to make this feel like a debate between two people who've been in a room together before, not a cold open.
`;
}

Don't just LIST your impacts. COMPARE them directly to theirs. The side that frames the comparison wins.

WHY-IT-MATTERS DISCIPLINE. say the quiet part out loud:
Every impact you name must be immediately followed by an explicit significance claim. The judge should never have to guess why a number or outcome matters. Use these exact templates at least THREE times across the speech:
- "...and this matters because [stakes statement. name the people affected, the system at risk, or the principle violated]."
- "...and this matters because if [mechanism] goes unchecked, [downstream harm that the judge can picture]."
Whenever you touch an opposing impact, do COMPARATIVE weighing using one of these templates at least TWICE per speech (once in constructive, more in rebuttal):
- "This matters more than their impact of [name their impact in one phrase] because [dimension: magnitude / probability / timeframe / reversibility / irreversibility / scope / structural vs. marginal], and specifically [the concrete reason their impact is smaller, later, less likely, or recoverable]."
- "Weigh this against their [impact name]: ours is [bigger / sooner / more certain / irreversible] because [mechanism], and theirs only matters if [list their contingent steps]. That asymmetry is the ballot."
- "Even granting their [impact name] in full, it still loses to ours because [specific dimension-based reason]."
Phrases that FAIL this rule and that you MUST NOT use as a substitute: "this is significant," "this is important," "this is huge," "at the end of the day," "the impact is real," "this is why we win." These assert significance without naming it. Replace every instance with the template above.
Weigh against the OPPONENT'S ACTUAL impacts by name. not a strawman. If the opponent hasn't landed a clear impact yet (first constructive), still weigh against the OBVIOUS opposing impact the judge is imagining ("the other side will say [X]; even if they do, this matters more because [Y]").

EXAMPLES ARE MANDATORY:
- Every speech must include at least ONE concrete real-world example. a specific country, policy, historical event, company, or case study that illustrates your mechanism.
- Examples are not decoration. They're PROOF that your causal chain works in reality. "This isn't hypothetical. we saw exactly this mechanism play out when [specific real example]."
- Bad example: "History shows this doesn't work." Good example: "When Sweden tried this exact approach in 2015, the result was a 30% increase in [specific outcome] because [mechanism]."
- If you cite an example, connect it back to your warrant: "This proves our [Warrant Name]. the same dynamic applies here because [parallel]."

${isFirst && !isCX ? `MODEL/MECHANISM. FOR POLICY MOTIONS:
If the motion proposes a policy change, you MUST establish the MODEL in your first constructive:
- WHO implements this? (government, international body, private sector)
- WHAT exactly changes? (specific policy details, not vague)
- HOW is it enforced? (regulatory body, legal penalties, incentives)
- WHERE does it apply? (scope and jurisdiction)
- WHEN does it take effect? (timeline)
You don't need to spend long on this. 2-3 sentences max. but the judge needs to know what world they're voting for. Vague motions get defined by whoever sets up the model first. That should be you.` : ''}

SIGNPOSTING. THE JUDGE MUST BE ABLE TO FLOW YOU:
Signposting is NON-NEGOTIABLE. The judge is writing down your arguments in real time. If they can't follow your structure, you lose.
- NUMBER every argument: "My first argument is [NAME]." "My second argument is [NAME]." Never leave the judge guessing which argument you're on.
- LABEL every sub-point with letters: "a." "b." "c." Say them out loud and clearly.
- NAME your arguments distinctively: Not "my point about economics" but "The Moral Hazard Argument" or "The Coordination Failure." Judges flow by name.
- SIGNPOST transitions explicitly: "Turning to the opposition's case." / "On their first argument about X..."
- In REBUTTALS, signpost by opponent's structure: "On their first argument, they said X. Three problems." / "They dropped our second argument entirely. extend it."
- Do NOT give a roadmap mid-speech ("I'll do three things..."). Just DO the things. Roadmaps waste time and sound robotic.
- NEVER forecast your own arguments ("I'm about to make my impact stand out by..."). Just make the argument. The judge doesn't need a preview. they need the content.
- NEVER narrate your own rhetorical moves ("Let me now use a powerful example to show..." / "To make this more concrete..." / "Here's why this matters..."). Just SAY the example. Just SAY why it matters. Forecasting kills momentum.

PRONOUN DISCIPLINE. NAME THE THING:
- MINIMIZE pronouns like "this," "that," "it," "they," "them" when the referent isn't crystal clear. The judge is flowing in real time. if they look down for 3 seconds and miss the antecedent, "this is why it matters" means nothing.
- BAD: "This is exactly why they can't win." WHO can't win WHAT?
- GOOD: "The opposition can't win the economic argument because their causal chain breaks at the enforcement step."
- BAD: "It leads to serious consequences." WHAT leads to WHAT consequences?
- GOOD: "The deregulation mechanism leads to a banking crisis because risk-taking goes unchecked."
- EXCEPTION: Pronouns are fine in analogies, rhetorical questions, and when the referent was JUST named in the same sentence ("The Coordination Failure means states act alone. it prevents collective action").
- When in doubt, name the argument, the actor, or the mechanism by its actual label. Specificity is what separates a 27 from a 29.

VOICE & DELIVERY:
- HOOK. Your opening line is everything. NEVER open with: "Thank you," "Good morning," "Alright," "So," "Let me start by...," "Imagine a world," "Picture this," "Let's dive in," "I'm here to argue," "In this speech I will," "Buckle up," "Here's the thing." These are dead air OR pure ChatGPT tells. Your first word should HIT.
- NEVER name your framework in Title Case corporate-speak like "Societal Cohesion and Vulnerability Mitigation" or "Human Flourishing Framework." Real framework names are SHORT and GRITTY: "harm minimization," "the marginal worker test," "bodily autonomy," "whose-lives-get-worse," "the downstream harm lens." One-to-three words, lowercase if possible, named like a real debater would write it on the flow.
${isFirst ? `  First constructive hooks (start INSIDE the argument. no warm-up):
  * A concrete number that flips intuition: "Eighty-three percent of sex workers in the UK report violence from clients, and the number doubles for workers pushed underground by criminalization."
  * Name the framework up front with its decision rule: "Framework first. We're evaluating this round on harm minimization. whichever side reduces net harm to the most vulnerable people wins. Here's why that's the right lens, and here's why we meet it."
  * Directly disagree with a common assumption: "Everything you're about to hear from the other side rests on one assumption, and it's wrong."
  * The counterintuitive thesis: "The surprising thing about this debate is that criminalization is what's actually creating the harm they're claiming decriminalization causes."
  * A pointed question that frames the whole round: "Who actually gets hurt in the status quo, and does the motion make it better for them? That's the whole round."` :
isRebuttal ? `  Rebuttal hooks. open by exposing the round's key tension:
  * Expose the fatal flaw: "Judge, their entire case hangs on one link. and it just snapped."
  * Concession flip: "Grant them everything they said. Every word. They still lose, and here's why."
  * Round crystallization: "This round comes down to a single question, and they're on the wrong side of it."
  * Drop callout: "They left our strongest argument completely untouched. That tells you everything."` :
`  Later constructive hooks. respond to what happened:
  * Attack their framework: "The ${userLabel}'s framework sounds nice until you ask one question: [question that breaks it]."
  * Flip their strength: "They spent a lot of time on [their best point]. Ironically, it's actually a reason to vote for us."
  * Status check: "Two speeches in, and they still haven't answered the most basic question about their case."`}
- TRANSITIONS between arguments should be smooth and confident, not mechanical. Instead of "Moving to my second argument," use: "But it gets worse for them," or "That's the individual harm. zoom out to the systemic level," or "Now, they might think that's their strongest ground. It's not. Because..."
- NEVER narrate what you're about to do. No "Let me now turn to..." Just DO it. No "I'm going to explain why..." Just explain.
- Reference the judge directly: "Judge, the delta in this round comes down to..." / "Here's your voting issue, Judge."
- Use debate language naturally: "pull through," "cross-apply," "extend," "non-unique," "the link story is broken," "that argument is terminal for their case," "this is a clean win on the flow."
- Sound like someone explaining passionately to a smart friend. Conversational but precise. Authoritative but not pompous.
- Short punchy sentences for claims. Longer flowing sentences for mechanism. Cut filler ruthlessly. every word earns its place.
- No bullet points, no markdown, no headers, no asterisks. Spoken word only. STRUCTURED spoken word. the judge should be able to flow it.

${isFirst ? `VOCABULARY & TONE:
- Use precise, high-register vocabulary when it's the RIGHT word. not for show. "Vitiates" is better than "undermines" when you mean something was made legally void. "Attenuates" is better than "weakens" when you mean gradual dilution. Use elevated language to be precise, not to sound smart.
- Name specific concepts when relevant: "tragedy of the commons," "moral hazard," "regulatory capture," "Rawlsian veil of ignorance," "collective action problem," "principal-agent problem." These show the judge you understand the underlying theory.
- CONFIDENT, not arrogant. The best debaters sound like they're explaining something obvious to a friend, not performing for an audience. Controlled intensity. you believe what you're saying because the logic demands it.
- Dismissive when earned: "That argument is dead on arrival" or "Their link chain doesn't survive first contact with the real world." But only when you've actually shown why. confidence without warrant is bluster.
- Vary your energy. Not every sentence is a haymaker. Build quietly, then punch. Some of the most devastating debate moments are said calmly: "And that's the point they can't get around."
- COLLOQUIAL FLAIR (use sparingly, ~10-15% of the speech): Code-switch between precision and real-talk ONLY when it carries analytical weight. Good: "Americans love to act like Europeans when it's politically convenient — but nobody's actually paying the tax" (observational, names a real tension). "Politics is just vibes, and their argument doesn't flow because it rests on one unnamed assumption: that voters are paying attention." (substantive, wit points at a mechanism). "This is where their case falls apart and they know it — their own evidence contradicts their impact." Bad, NEVER DO THIS: empty slang used as a dismissal with no reasoning attached. "That's a vibe." "That's cap." "Skill issue." "Mid." "Cooked." "NPC behavior." Standalone slang without a WARRANT attached reads as cheap and LLM-chasing-cool. If you want to mock an argument, name the specific failure in the same breath: not "that's a vibe" but "that's a vibe dressed up as analysis — there's no mechanism, no named actor, no number." The word "vibe" is allowed as observational commentary ("politics runs on vibes," "the current discourse is pure vibes") but NEVER as a one-word dismissal of an opponent's argument.` : ''}`;
}

/* ═══════════════════════════════════════════════════
   SHARE CARD. confidence delta as a 1200×630 PNG
   ───────────────────────────────────────────────────
   Renders a Twitter/OG-sized canvas with the Before/After/Market
   numbers and the motion. Returns a Blob for download or share.
   The viral loop hinges on this: every debate becomes a tiny ad.
   ═══════════════════════════════════════════════════ */

function generateConfidenceShareCard({ motion, prior, posterior, market, source }) {
  const W = 1200, H = 630;
  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  // Background: dark gradient
  const bg = ctx.createLinearGradient(0, 0, W, H);
  bg.addColorStop(0, '#0b0f17');
  bg.addColorStop(1, '#1a0a0f');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // Subtle red glow top-right
  const glow = ctx.createRadialGradient(W - 100, 60, 0, W - 100, 60, 500);
  glow.addColorStop(0, 'rgba(239,68,68,0.18)');
  glow.addColorStop(1, 'rgba(239,68,68,0)');
  ctx.fillStyle = glow;
  ctx.fillRect(0, 0, W, H);

  // Brand strip
  ctx.fillStyle = '#ef4444';
  ctx.font = '700 28px -apple-system, "SF Pro Display", system-ui, sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('Debate', 60, 80);
  ctx.fillStyle = '#ffffff';
  ctx.fillText(' AI.', 60 + ctx.measureText('Debate').width, 80);

  // "I argued the other side" tag
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.font = '600 14px system-ui';
  ctx.fillText('I ARGUED THE OTHER SIDE. HERE\'S WHAT IT DID TO MY PRIOR', 60, 108);

  // Motion (wraps to ~2 lines)
  ctx.fillStyle = '#ffffff';
  ctx.font = '700 38px -apple-system, "SF Pro Display", system-ui, sans-serif';
  const motionText = (motion || '(custom debate)').trim();
  wrapText(ctx, motionText, 60, 170, W - 120, 48, 2);

  // Three columns: Before / After / Market
  const colY = 320;
  const colH = 200;
  const colW = (W - 120 - 40) / 3;
  const cols = [
    { label: 'BEFORE', value: prior + '%', accent: 'rgba(255,255,255,0.7)', bgFill: 'rgba(255,255,255,0.04)' },
    { label: 'AFTER',  value: posterior + '%', accent: '#ef4444',           bgFill: 'rgba(239,68,68,0.12)' },
    { label: 'MARKET', value: market + '%', accent: 'rgba(255,255,255,0.7)', bgFill: 'rgba(255,255,255,0.04)' },
  ];
  cols.forEach((c, i) => {
    const x = 60 + i * (colW + 20);
    // card bg
    roundRect(ctx, x, colY, colW, colH, 16);
    ctx.fillStyle = c.bgFill;
    ctx.fill();
    ctx.strokeStyle = i === 1 ? 'rgba(239,68,68,0.5)' : 'rgba(255,255,255,0.1)';
    ctx.lineWidth = 2;
    ctx.stroke();
    // label
    ctx.fillStyle = c.accent;
    ctx.font = '700 16px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText(c.label, x + colW / 2, colY + 44);
    // value
    ctx.fillStyle = i === 1 ? '#ffffff' : 'rgba(255,255,255,0.85)';
    ctx.font = '900 78px -apple-system, "SF Pro Display", system-ui, sans-serif';
    ctx.fillText(c.value, x + colW / 2, colY + 138);
  });

  // Delta line (centered below cards)
  const delta = posterior - prior;
  let deltaText;
  if (Math.abs(delta) < 5) deltaText = 'I barely moved. Strong calibration. or strong stubbornness.';
  else if (delta > 0) deltaText = 'I moved ' + Math.abs(delta) + ' points UP after arguing the other side.';
  else deltaText = 'I moved ' + Math.abs(delta) + ' points DOWN after arguing the other side.';

  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.font = '600 22px system-ui';
  ctx.fillText(deltaText, W / 2, 575);

  // URL
  ctx.fillStyle = '#ef4444';
  ctx.font = '700 16px system-ui';
  ctx.textAlign = 'right';
  ctx.fillText('debateai.com/debate-ai', W - 60, 80);
  // Source tag
  if (source) {
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.font = '600 13px system-ui';
    ctx.fillText('via ' + source.toUpperCase(), W - 60, 108);
  }

  return new Promise(resolve => canvas.toBlob(b => resolve({ blob: b, dataUrl: canvas.toDataURL('image/png') }), 'image/png'));
}

function wrapText(ctx, text, x, y, maxWidth, lineHeight, maxLines) {
  const words = text.split(' ');
  let line = '';
  let lines = 0;
  for (let i = 0; i < words.length; i++) {
    const test = line + words[i] + ' ';
    if (ctx.measureText(test).width > maxWidth && line) {
      ctx.fillText(line.trim(), x, y);
      line = words[i] + ' ';
      y += lineHeight;
      lines++;
      if (lines >= maxLines - 1) {
        // Last allowed line. fit remainder with ellipsis if too long
        let rest = words.slice(i).join(' ');
        while (ctx.measureText(rest + '…').width > maxWidth && rest.length > 0) {
          rest = rest.slice(0, -1);
        }
        ctx.fillText(rest + (rest.length < words.slice(i).join(' ').length ? '…' : ''), x, y);
        return;
      }
    } else {
      line = test;
    }
  }
  ctx.fillText(line.trim(), x, y);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

async function downloadConfidenceCard(args) {
  const { blob } = await generateConfidenceShareCard(args);
  if (!blob) return;
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'debate-ai-confidence.png';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

async function shareConfidenceCard(args) {
  const { blob } = await generateConfidenceShareCard(args);
  if (!blob) return downloadConfidenceCard(args);
  // Web Share API (mobile). supports image attachment
  if (navigator.canShare && navigator.canShare({ files: [new File([blob], 'card.png', { type: 'image/png' })] })) {
    try {
      await navigator.share({
        files: [new File([blob], 'debate-ai.png', { type: 'image/png' })],
        text: 'I argued the other side and my prior moved ' + Math.abs(args.posterior - args.prior) + ' points. ' + 'debateai.com/debate-ai',
      });
      return;
    } catch (e) { /* user canceled or failed. fall through */ }
  }
  // Desktop: download + open Twitter compose
  await downloadConfidenceCard(args);
  const tweetText = encodeURIComponent(
    'I argued the other side on "' + (args.motion || 'a prediction market').slice(0, 80) +
    '" and my prior moved ' + Math.abs(args.posterior - args.prior) + ' points.\n\n' +
    'Try it: debateai.com/debate-ai'
  );
  window.open('https://twitter.com/intent/tweet?text=' + tweetText, '_blank', 'noopener');
}

  const[marketSource]=useState(_deepLink.source);
  const[priorPct,setPriorPct]=useState(50);    // user's confidence BEFORE the round

  const[aiLoading,setAiLoading]=useState(false);
  const[aiText,setAiText]=useState('');

  const[voiceEta]=useState(0); // TTS timing display
  const[showTx,setShowTx]=useState(false);
  const[prepHint,setPrepHint]=useState('');
  const[prepHintLoading,setPrepHintLoading]=useState(false);
  const[notesSaved,setNotesSaved]=useState(false);

  // revealIdx removed. transcript is plain text now

  // POI (Points of Information) state

  const saveCase=(customTitle)=>{
