<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow-x:hidden}
body{
  font-family:'Inter',system-ui,sans-serif;
  background:#1a1a1e;color:#f5f5f7;
  -webkit-font-smoothing:antialiased;
}
#root{min-height:100vh}

/* ── Ambient ───────────────────────── */
.ambient{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 60% 50% at 50% 45%,rgba(239,68,68,.06),transparent 70%);
}
.ambient::after{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle 400px at 30% 70%,rgba(239,68,68,.03),transparent);
}

/* ── Page ──────────────────────────── */
.page{
  position:relative;z-index:1;min-height:100vh;
  display:flex;flex-direction:column;
}

/* ── Top Bar ───────────────────────── */
.bar{
  position:fixed;top:0;left:0;right:0;z-index:50;
  padding:20px 32px;display:flex;align-items:center;justify-content:space-between;
}
.bar-logo{font-size:.9rem;font-weight:700;color:#f5f5f7;text-decoration:none;letter-spacing:-.01em;opacity:.7;transition:opacity .2s}
.bar-logo:hover{opacity:1}
.bar-logo em{color:#ef4444;font-style:normal}
.bar-links{display:flex;gap:20px;align-items:center}
.bar-links a{font-size:.72rem;font-weight:500;color:rgba(255,255,255,.35);text-decoration:none;text-transform:uppercase;letter-spacing:.08em;transition:color .2s}
.bar-links a:hover{color:rgba(255,255,255,.7)}

/* ── Center Stage ──────────────────── */
.center{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:100px 24px 60px;text-align:center;
  transition:opacity .4s ease,transform .4s ease;
}
.center.entering{opacity:0;transform:scale(.97) translateY(12px)}
.center.visible{opacity:1;transform:scale(1) translateY(0)}

/* ── Typography ────────────────────── */
.t-hero{
  font-size:clamp(3rem,8vw,6rem);font-weight:900;letter-spacing:-.05em;
  line-height:.9;margin-bottom:16px;
}
.t-hero em{font-style:normal;color:#ef4444}
.t-sub{
  font-size:clamp(.9rem,2vw,1.1rem);font-weight:300;color:rgba(255,255,255,.4);
  max-width:400px;line-height:1.5;margin:0 auto 48px;
}
.t-label{
  font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.16em;
  color:#ef4444;margin-bottom:12px;
}
.t-phase{
  font-size:clamp(1.4rem,3.5vw,2rem);font-weight:800;letter-spacing:-.03em;
  margin-bottom:4px;
}
.t-dim{color:rgba(255,255,255,.35);font-size:.85rem;font-weight:400}
.t-time{
  font-size:clamp(3.2rem,8vw,5rem);font-weight:200;letter-spacing:.02em;
  font-variant-numeric:tabular-nums;line-height:1;
}
.t-time.warn{color:#f59e0b}
.t-time.danger{color:#ef4444}

/* ── Input (floating, minimal) ─────── */
.float-input{
  width:100%;max-width:480px;background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);border-radius:16px;
  padding:20px 22px;color:#f5f5f7;font-size:1rem;font-family:inherit;
  outline:none;resize:none;transition:border-color .2s;line-height:1.5;
}
.float-input:focus{border-color:rgba(239,68,68,.4)}
.float-input::placeholder{color:rgba(255,255,255,.2)}

/* ── Pills ─────────────────────────── */
.pills{display:flex;gap:8px;justify-content:center;margin:12px 0;flex-wrap:wrap;max-width:780px;margin-left:auto;margin-right:auto}
.pill{
  padding:10px 16px;border-radius:100px;border:1.5px solid rgba(255,255,255,.1);
  background:transparent;color:rgba(255,255,255,.4);font-size:.76rem;font-weight:600;
  cursor:pointer;transition:all .25s;font-family:inherit;letter-spacing:.02em;white-space:nowrap;
}
.pill:hover{border-color:rgba(255,255,255,.25);color:rgba(255,255,255,.7)}
.pill.on{border-color:#ef4444;color:#ef4444;background:rgba(239,68,68,.06)}

/* ── WPM Slider ────────────────────── */
.wpm{display:flex;align-items:center;gap:16px;margin:20px auto;max-width:320px;width:100%}
.wpm input[type=range]{flex:1;accent-color:#ef4444;height:2px;opacity:.6}
.wpm span{font-size:.75rem;color:rgba(255,255,255,.3);font-weight:500}
.wpm strong{font-size:.8rem;color:rgba(255,255,255,.6);font-weight:700;min-width:65px;text-align:right}

/* ── CTA Button ────────────────────── */
.cta{
  padding:16px 48px;border:none;border-radius:100px;
  background:#ef4444;color:#fff;font-size:.9rem;font-weight:700;
  text-transform:uppercase;letter-spacing:.06em;cursor:pointer;
  transition:transform .2s,box-shadow .2s,opacity .2s;font-family:inherit;
  margin-top:32px;
}
.cta:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(239,68,68,.25)}
.cta:disabled{opacity:.25;cursor:not-allowed;transform:none;box-shadow:none}
.cta-ghost{
  padding:12px 32px;border:1px solid rgba(255,255,255,.1);border-radius:100px;
  background:transparent;color:rgba(255,255,255,.4);font-size:.82rem;font-weight:600;
  cursor:pointer;transition:all .2s;font-family:inherit;margin-top:12px;
}
.cta-ghost:hover{border-color:rgba(255,255,255,.25);color:rgba(255,255,255,.7)}

/* ── The Orb (waveform) ────────────── */
.orb-wrap{
  position:relative;width:280px;height:280px;margin:0 auto 32px;
  display:flex;align-items:center;justify-content:center;
}
.orb-glow{
  position:absolute;inset:-40px;border-radius:50%;
  background:radial-gradient(circle,rgba(239,68,68,.08),transparent 70%);
  transition:opacity .5s;opacity:0;
}
.orb-glow.on{opacity:1}
.orb-ring{
  position:absolute;inset:0;border-radius:50%;
  border:1px solid rgba(255,255,255,.06);transition:all .5s;
}
.orb-ring.active{border-color:rgba(239,68,68,.3);box-shadow:0 0 60px rgba(239,68,68,.1)}
.orb-ring.pulse{animation:orbPulse 2s ease-in-out infinite}
@keyframes orbPulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.04);opacity:.7}}
canvas.orb{width:220px;height:220px;border-radius:50%}

/* ── Speech Progress ───────────────── */
.progress-bar{display:flex;gap:8px;justify-content:center;margin-bottom:40px}
.pip{display:flex;flex-direction:column;align-items:center;gap:6px}
.pip-bar{width:40px;height:4px;border-radius:2px;background:rgba(255,255,255,.06);transition:.3s}
.pip-bar.done{background:#ef4444}
.pip-bar.now{background:#ef4444;box-shadow:0 0 12px rgba(239,68,68,.4)}
.pip-code{font-size:.6rem;font-weight:600;color:rgba(255,255,255,.2);text-transform:uppercase;letter-spacing:.06em}
.pip.done .pip-code{color:rgba(239,68,68,.5)}
.pip.now .pip-code{color:#ef4444}

/* ── Transcript ────────────────────── */
.transcript-btn{
  background:none;border:none;color:rgba(255,255,255,.2);font-size:.72rem;
  font-weight:600;cursor:pointer;font-family:inherit;text-transform:uppercase;
  letter-spacing:.08em;margin-top:24px;transition:color .2s;
}
.transcript-btn:hover{color:rgba(255,255,255,.5)}
.transcript-box{
  width:100%;max-width:560px;max-height:220px;overflow-y:auto;margin:12px auto 0;
  background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);
  border-radius:14px;padding:18px;text-align:left;
  font-size:.82rem;line-height:1.65;color:rgba(255,255,255,.35);white-space:pre-wrap;
}
.lyrics-box{
  white-space:normal;font-size:.9rem;line-height:1.8;max-height:280px;
  scroll-behavior:smooth;
}

/* ── Feedback Card ─────────────────── */
.fb-card{
  width:100%;max-width:600px;text-align:left;
  background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);
  border-radius:18px;padding:32px;margin:24px auto 0;
}
.fb-card .feedback-text{color:rgba(255,255,255,.5);font-size:.88rem;line-height:1.75;white-space:pre-wrap}

/* ── Controls Row ──────────────────── */
.row-c{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:20px}

/* ── Limit Warning ─────────────────── */
.limit-warn{font-size:.78rem;color:#ef4444;margin-top:16px;opacity:.7}
.limit-warn a{color:#ef4444;text-decoration:underline}

/* ── Responsive ────────────────────── */
@media(max-width:640px){
  .bar{padding:14px 16px}
  .center{padding:80px 16px 32px}
  .orb-wrap{width:200px;height:200px}
  canvas.orb{width:160px;height:160px}
  .float-input{padding:16px}
  .cta{padding:14px 36px;font-size:.82rem}
  .progress-bar{gap:4px}
  .pip-bar{width:28px}
}
/* ── Round History ────────────────── */
.history-panel{
  position:fixed;inset:0;z-index:90;background:rgba(0,0,0,.92);
  overflow-y:auto;padding:80px 24px 40px;animation:fadeIn .25s ease;
}
.history-grid{max-width:640px;margin:0 auto}
.history-card{
  background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);
  border-radius:16px;padding:20px 24px;margin-bottom:12px;cursor:pointer;
  transition:all .2s;
}
.history-card:hover{border-color:rgba(239,68,68,.3);background:rgba(255,255,255,.05)}
.history-card .hc-motion{font-weight:600;color:rgba(255,255,255,.7);font-size:.95rem;margin-bottom:6px}
.history-card .hc-meta{font-size:.72rem;color:rgba(255,255,255,.25);display:flex;gap:12px;flex-wrap:wrap}
.history-card .hc-meta span{display:flex;align-items:center;gap:4px}
.history-detail{max-width:640px;margin:0 auto}
.history-detail .hd-speech{
  background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05);
  border-radius:12px;padding:16px;margin-bottom:10px;
}
.history-detail .hd-who{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
.history-detail .hd-who.you{color:#ef4444}
.history-detail .hd-who.ai{color:rgba(255,255,255,.3)}
.history-detail .hd-text{font-size:.85rem;line-height:1.7;color:rgba(255,255,255,.45);white-space:pre-wrap}

@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms !important;transition-duration:.01ms !important}
}
</style>

const el = React.createElement;

const FIREBASE_CONFIG = {

} catch(e) { console.warn('Firebase init skipped:', e.message); }

function useAuth() {
  const [user, setUser] = useState(null);
  const [team, setTeam] = useState(null);
  const [loading, setLoading] = useState(true);
  useEffect(() => {
    if (!firebaseAuth) { setLoading(false); return; }
    return firebaseAuth.onAuthStateChanged(async u => {
      setUser(u);
      if (u) {
        try {
          const token = await u.getIdToken();
          const res = await fetch('/api/teams/usage', { headers: { Authorization: 'Bearer ' + token } });
          if (res.ok) setTeam(await res.json());
        } catch {}
      } else { setTeam(null); }
      setLoading(false);
    });
  }, []);
  const signIn = async () => {
    if (!firebaseAuth) return alert('Auth not available.');
    const provider = new firebase.auth.GoogleAuthProvider();
    await firebaseAuth.signInWithPopup(provider);
  };
  const signOut = async () => { if (firebaseAuth) await firebaseAuth.signOut(); };
  return { user, team, loading, signIn, signOut };
}

/* ═══════════════════════════════════════════════════
   SOUND EFFECTS
   ═══════════════════════════════════════════════════ */

const SFX = {
  _ctx: null,
  _getCtx() { if(!this._ctx) this._ctx=new (window.AudioContext||window.webkitAudioContext)(); return this._ctx; },

  // UI click — subtle, satisfying
  click() {
    try{const c=this._getCtx();const o=c.createOscillator();const g=c.createGain();
    o.connect(g);g.connect(c.destination);o.frequency.value=1200;o.type='sine';
    g.gain.setValueAtTime(0.08,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.06);
    o.start(c.currentTime);o.stop(c.currentTime+0.06);}catch{}
  },

  // Start round — ascending chime
  startRound() {
    try{const c=this._getCtx();
    [440,554,659].forEach((f,i)=>{
      const o=c.createOscillator();const g=c.createGain();o.connect(g);g.connect(c.destination);
      o.frequency.value=f;o.type='sine';
      g.gain.setValueAtTime(0,c.currentTime+i*0.12);
      g.gain.linearRampToValueAtTime(0.1,c.currentTime+i*0.12+0.02);
      g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+i*0.12+0.25);
      o.start(c.currentTime+i*0.12);o.stop(c.currentTime+i*0.12+0.25);
    });}catch{}
  },

  // AI thinking — low ambient pulse (plays on loop, returns stop fn)
  thinking() {
    try{const c=this._getCtx();
    const o=c.createOscillator();const g=c.createGain();const lfo=c.createOscillator();const lfoG=c.createGain();
    o.connect(g);g.connect(c.destination);o.frequency.value=80;o.type='sine';
    lfo.connect(lfoG);lfoG.connect(g.gain);lfo.frequency.value=2;lfo.type='sine';
    lfoG.gain.value=0.03;g.gain.value=0.04;
    o.start();lfo.start();
    return()=>{try{g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.3);o.stop(c.currentTime+0.4);lfo.stop(c.currentTime+0.4)}catch{}};
    }catch{return()=>{}}
  },

  // Speech ready — bright ping
  ready() {
    try{const c=this._getCtx();const o=c.createOscillator();const g=c.createGain();
    o.connect(g);g.connect(c.destination);o.frequency.value=880;o.type='sine';
    g.gain.setValueAtTime(0.12,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.3);
    o.start(c.currentTime);o.stop(c.currentTime+0.3);}catch{}
  },

  // Preparing voice — warm shimmer (plays on loop, returns stop fn)
  preparing() {
    try{const c=this._getCtx();
    // Warm mid-tone shimmer — distinct from the low thinking pulse
    const o=c.createOscillator();const o2=c.createOscillator();const g=c.createGain();
    const lfo=c.createOscillator();const lfoG=c.createGain();
    o.connect(g);o2.connect(g);g.connect(c.destination);
    o.frequency.value=220;o.type='sine';
    o2.frequency.value=330;o2.type='sine';
    lfo.connect(lfoG);lfoG.connect(g.gain);
    lfo.frequency.value=0.8;lfo.type='sine';lfoG.gain.value=0.015;
    g.gain.value=0.03;
    o.start();o2.start();lfo.start();
    return()=>{try{g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.3);o.stop(c.currentTime+0.4);o2.stop(c.currentTime+0.4);lfo.stop(c.currentTime+0.4)}catch{}};
    }catch{return()=>{}}
  },

};

function buildTraitPrompt(selectedStrengths, selectedWeaknesses) {
  const sLabels = selectedStrengths.map(k => STRENGTHS[k]?.desc || k);
  const wLabels = selectedWeaknesses.map(k => WEAKNESSES[k]?.desc || k);
  let prompt = 'You are a skilled AI debater.';
  if (sLabels.length) prompt += ' Your strengths: ' + sLabels.join('; ') + '.';
  if (wLabels.length) prompt += ' However, you have REAL weaknesses that make you beatable: ' + wLabels.join('; ') + '. These weaknesses should genuinely show up in your arguments — don\'t just mention them, actually exhibit them. A smart opponent should be able to exploit these gaps.';
  if (!sLabels.length && !wLabels.length) prompt += ' You are a well-rounded debater — competent at everything but not dominant at anything. Solid framework, decent examples, clear logic.';
  return prompt;
}

// Unified AI call — supports Claude, OpenAI, and xAI streaming formats
async function callAI(sys, user, onChunk, brainKey){
  const brain = BRAINS[brainKey] || BRAINS.claude;
  const pro = isPro();
  const model = pro && brain.proModel ? brain.proModel : brain.model;

  const body={
    model: model,
    max_tokens:8000,
    stream:true,
    system:sys,
    messages:[{role:'user',content:user}],
    _feature:'debate-ai',
  };
  let r=await fetch(brain.endpoint,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(body),
  });
  // If non-Claude brain returns 404 (function not deployed), fall back to Claude
  if(r.status===404 && brain.endpoint!=='/api/claude'){
    console.warn('[AI] '+brain.endpoint+' returned 404, falling back to /api/claude');
    body.model=BRAINS.claude.model;
    r=await fetch('/api/claude',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(body),
    });
  }
  if(!r.ok){
    const txt=await r.text().catch(()=>'');
    let errMsg='';
    try{const j=JSON.parse(txt);errMsg=typeof j.error==='string'?j.error:typeof j.message==='string'?j.message:JSON.stringify(j)}catch{errMsg=txt||'No response body'}
    if(r.status===401) throw new Error('Sign in required: '+errMsg);
    if(r.status===429) throw new Error('Rate limited — wait a moment and try again.');
    throw new Error('Error ('+r.status+') from '+brain.endpoint+': '+(errMsg||'Unknown error'));
  }
  const reader=r.body.getReader(),dec=new TextDecoder();
  let full='',buf='';
  while(true){
    const{done,value}=await reader.read();
    if(done)break;
    buf+=dec.decode(value,{stream:true});
    const lines=buf.split('\n');buf=lines.pop()||'';
    for(const l of lines){
      if(l.startsWith('data: ')){
        const d=l.slice(6);if(d==='[DONE]')break;
        try{
          const p=JSON.parse(d);
          // Claude format
          if(p.type==='content_block_delta'&&p.delta?.text){
            full+=p.delta.text;if(onChunk)onChunk(full);
          }
          // OpenAI / xAI format
          if(p.choices&&p.choices[0]?.delta?.content){
            full+=p.choices[0].delta.content;if(onChunk)onChunk(full);
          }
        }catch{}
      }
    }
  }
  incUsage();return full;
}

// Backwards-compatible wrapper
function callClaude(sys, user, onChunk){ return callAI(sys, user, onChunk, 'claude'); }

function useOrb(){
  const ref=useRef(null);
  const ctxRef=useRef(null);
  const analyserRef=useRef(null);
  const streamRef=useRef(null);
  const animRef=useRef(null);
  const modeRef=useRef('idle');
  const runRef=useRef(false);

  const draw=useCallback(()=>{
    const c=ref.current;if(!c)return;
    const ctx=c.getContext('2d');
    const W=c.width/2,H=c.height/2; // logical half (already scaled)
    const dpr=window.devicePixelRatio||1;
    const cx=c.width/(2*dpr),cy=c.height/(2*dpr),baseR=cx*0.7;
    ctx.save();ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.clearRect(0,0,c.width/dpr,c.height/dpr);

    let pts=120,ampData=null,globalAmp=0;

    if(modeRef.current==='mic'&&analyserRef.current){
      const data=new Uint8Array(analyserRef.current.frequencyBinCount);
      analyserRef.current.getByteFrequencyData(data);
      ampData=data;globalAmp=data.reduce((a,b)=>a+b,0)/data.length/255;
    } else if(modeRef.current==='ai'){
      const t=Date.now()/1000;
      globalAmp=0.25+Math.sin(t*3)*.12+Math.sin(t*7.3)*.06;
      ampData=new Uint8Array(64);
      for(let i=0;i<64;i++) ampData[i]=128+Math.sin(t*4+i*.4)*55+Math.sin(t*8.5+i*.9)*25;
    } else {
      globalAmp=0.015+Math.sin(Date.now()/2500*Math.PI)*.008;
    }

    // Draw organic blob
    ctx.beginPath();
    for(let i=0;i<=pts;i++){
      const a=(i/pts)*Math.PI*2;
      let r=baseR;
      if(ampData){
        const idx=Math.floor((i/pts)*ampData.length);
        r+=((ampData[idx]||128)/255)*baseR*0.35;
      } else {
        r+=Math.sin(a*5+Date.now()/500)*baseR*globalAmp;
        r+=Math.sin(a*3-Date.now()/700)*baseR*globalAmp*0.5;
      }
      const x=cx+Math.cos(a)*r,y=cy+Math.sin(a)*r;
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.closePath();

    // Gradient fill
    const grad=ctx.createRadialGradient(cx,cy,0,cx,cy,baseR*1.3);
    if(modeRef.current==='idle'){
      grad.addColorStop(0,'rgba(255,255,255,.02)');
      grad.addColorStop(1,'rgba(255,255,255,0)');
      ctx.strokeStyle='rgba(255,255,255,.06)';
    } else {
      grad.addColorStop(0,'rgba(239,68,68,.08)');
      grad.addColorStop(1,'rgba(239,68,68,0)');
      ctx.strokeStyle='rgba(239,68,68,.35)';
      ctx.shadowBlur=30;ctx.shadowColor='rgba(239,68,68,.15)';
    }
    ctx.fillStyle=grad;ctx.fill();
    ctx.lineWidth=1.5;ctx.stroke();
    ctx.shadowBlur=0;

    ctx.restore();
    if(runRef.current) animRef.current=requestAnimationFrame(draw);
  },[]);

  const init=()=>{
    const c=ref.current;if(!c)return;
    const dpr=window.devicePixelRatio||1;
    const rect=c.getBoundingClientRect();
    c.width=rect.width*dpr;c.height=rect.height*dpr;
    runRef.current=true;draw();
  };
  const kill=()=>{runRef.current=false;if(animRef.current)cancelAnimationFrame(animRef.current);stopMic()};
  const setMode=(m)=>{modeRef.current=m};

  const startMic=async()=>{
    try{
      const s=await navigator.mediaDevices.getUserMedia({audio:true});
      streamRef.current=s;
      ctxRef.current=new(window.AudioContext||window.webkitAudioContext)();
      analyserRef.current=ctxRef.current.createAnalyser();
      analyserRef.current.fftSize=256;
      ctxRef.current.createMediaStreamSource(s).connect(analyserRef.current);
      modeRef.current='mic';
    }catch{}
  };
  const stopMic=()=>{
    if(streamRef.current){streamRef.current.getTracks().forEach(t=>t.stop());streamRef.current=null}
    modeRef.current='idle';
  };

  return {ref,init,kill,setMode,startMic,stopMic};
}

let _voices=[];
let _audioUnlocked=false;
function _loadVoices(){
  if(!window.speechSynthesis) return;
  _voices=window.speechSynthesis.getVoices();
}
if(window.speechSynthesis){
  _loadVoices();
  window.speechSynthesis.onvoiceschanged=_loadVoices;

// Unlock both speechSynthesis AND Audio playback on user gesture
function warmUpTTS(){
  if(_audioUnlocked) return;
  // Unlock browser speechSynthesis
  if(window.speechSynthesis){
    const u=new SpeechSynthesisUtterance(' ');
    u.volume=0;u.rate=10;
    window.speechSynthesis.speak(u);
  }
  // Unlock AudioContext (Web Audio API)
  try{const ctx=new(window.AudioContext||window.webkitAudioContext)();ctx.resume().then(()=>ctx.close());}catch{}
  // Unlock HTMLAudioElement.play() — required on mobile/Safari
  // Play a tiny silent WAV so subsequent programmatic play() calls are allowed
  try{
    const silentWav='data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAIA+AAACABAAZGF0YQAAAAA=';
    const a=new Audio(silentWav);
    a.volume=0;
    a.play().then(()=>{a.pause();a.remove&&a.remove();console.log('[TTS] Audio element unlocked')}).catch(()=>{});
  }catch{}
  _audioUnlocked=true;
}

/* ── TTS — OpenAI (human voice) with browser fallback ── */

function useTTS(){
  const[speaking,setSpeaking]=useState(false);
  const[paused,setPaused]=useState(false);
  const audioRef=useRef(null);
  const cancelledRef=useRef(false);
  const onEndRef=useRef(null);
  const modeRef=useRef('none'); // 'openai' or 'browser'

  // ── OpenAI TTS: fetch audio from our /api/tts proxy ──
  const onStartRef=useRef(null);
  const speakOpenAI=(text,speed,voiceName='onyx')=>{
    return new Promise(async(resolve,reject)=>{
      try{
        const input=text.slice(0,4000);
        console.log('%c[TTS] Fetching from /api/tts... voice='+voiceName+' speed='+speed,'color:cyan');
        const r=await fetch('/api/tts',{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({text:input,voice:voiceName,speed,hd:true}),
        });
        console.log('%c[TTS] Response: '+r.status+' '+r.headers.get('content-type'),'color:cyan');
        if(!r.ok){
          const errBody=await r.text().catch(()=>'');
          console.error('[TTS] Error body:',errBody);
          return reject(new Error('TTS API '+r.status+': '+errBody));
        }
        const ct=r.headers.get('content-type')||'';
        if(!ct.includes('audio')){
          const errBody=await r.text().catch(()=>'');
          return reject(new Error('TTS returned non-audio: '+ct+' '+errBody));
        }
        const blob=await r.blob();
        console.log('%c[TTS] Got audio blob: '+blob.size+' bytes, type: '+blob.type,'color:cyan');
        if(cancelledRef.current) return resolve();
        if(blob.size<1000){
          return reject(new Error('Audio blob too small: '+blob.size+' bytes'));
        }
        const url=URL.createObjectURL(blob);
        const audio=new Audio();
        audioRef.current=audio;

        // Timeout: if audio doesn't start within 8s, reject
        const timeout=setTimeout(()=>{
          console.warn('[TTS] Audio play timeout — 8s elapsed');
          URL.revokeObjectURL(url);
          reject(new Error('Audio play timeout'));
        },8000);

        audio.oncanplay=()=>{
          clearTimeout(timeout);
          audio.play().then(()=>{
            console.log('%c[TTS] Audio playing','color:lime');
            // Fire onStart callback — timer should start NOW
            if(onStartRef.current){onStartRef.current();onStartRef.current=null}
          }).catch(e=>{
            console.error('[TTS] Audio.play() rejected:',e);
            URL.revokeObjectURL(url);
            reject(e);
          });
        };
        audio.onended=()=>{
          URL.revokeObjectURL(url);
          resolve();
        };
        audio.onerror=(e)=>{
          console.error('[TTS] Audio element error:',e);
          clearTimeout(timeout);
          URL.revokeObjectURL(url);
          reject(new Error('Audio element error'));
        };
        audio.src=url;
        audio.load();
      }catch(e){
        reject(e);
      }
    });
  };

  // ── Browser fallback TTS ──
  const speakBrowser=(text,rate)=>{
    return new Promise((resolve)=>{
      if(!window.speechSynthesis){resolve();return}
      window.speechSynthesis.cancel();
      // Chunk to avoid Chrome 15s cutoff
      const sentences=text.match(/[^.!?]+[.!?]+[\s]*/g)||[text];
      const groups=[];let cur='';
      for(const s of sentences){
        if((cur+s).split(/\s+/).length>60&&cur){groups.push(cur.trim());cur=s}
        else cur+=s;
      }
      if(cur.trim())groups.push(cur.trim());

      if(!_voices.length) _loadVoices();
      const voice=_voices.find(v=>/Samantha|Daniel|Karen|Google US English|Aaron/.test(v.name))
        ||_voices.find(v=>v.lang&&v.lang.startsWith('en'))||null;

      let i=0;
      const next=()=>{
        if(cancelledRef.current||i>=groups.length){resolve();return}
        const u=new SpeechSynthesisUtterance(groups[i]);
        u.rate=rate;u.pitch=1;u.volume=1;
        if(voice)u.voice=voice;
        u.onend=()=>{i++;next()};
        u.onerror=()=>{i++;next()};
        window.speechSynthesis.speak(u);
      };
      setTimeout(next,50);
    });
  };

  // ── Main speak: try OpenAI, fall back to browser ──
  // onStart fires when audio actually begins playing (use to start timer)
  const speak=(text,wpm=180,onEnd,voiceName='onyx',onStart)=>{
    cancelledRef.current=false;
    setPaused(false);
    setSpeaking(true);
    onEndRef.current=onEnd;
    // Speed: map WPM to TTS speed (180 wpm → ~1.2x for snappier delivery)
    const speed=Math.max(0.75,Math.min(2.0,wpm/140));
    const browserRate=Math.max(0.5,Math.min(2.5,wpm/140));

    console.log('%c[TTS] Starting — text: '+text.length+' chars, speed: '+speed.toFixed(2)+', voice: '+voiceName,'color:cyan;font-weight:bold');

    // Hook into audio element to fire onStart when playback actually begins
    let startFired=false;
    const fireStart=()=>{if(!startFired){startFired=true;if(onStart)onStart();console.log('%c[TTS] Audio playback started','color:lime')}};

    (async()=>{
      try{
        modeRef.current='openai';
        onStartRef.current=fireStart;
        await speakOpenAI(text,speed,voiceName);
        fireStart(); // ensure it fires even if oncanplay didn't trigger it
        console.log('%c[TTS] OpenAI playback complete','color:lime');
      }catch(e){
        console.warn('%c[TTS] OpenAI failed: '+e.message+' — falling back to browser','color:orange;font-weight:bold');
        if(!cancelledRef.current){
          modeRef.current='browser';
          fireStart(); // browser TTS starts immediately
          await speakBrowser(text,browserRate);
        }
      }
      if(!cancelledRef.current){
        setSpeaking(false);
        if(onEndRef.current) onEndRef.current();
      }
    })();
  };

  // Audio progress tracking for lyrics sync
  // totalEstimate = word-count-based estimate set before playback starts
  // total = sum of known chunk durations (grows as chunks load)
  // elapsed = cumulative playback time across all chunks
  const progressRef=useRef({elapsed:0,total:0,totalEstimate:0,chunkCount:0,chunksLoaded:0});
  const getProgress=()=>progressRef.current;

  // Play pre-fetched audio blobs sequentially
  const playBlobs=(blobs,onEnd,onStart)=>{
    cancelledRef.current=false;
    setPaused(false);
    setSpeaking(true);
    modeRef.current='openai';
    onEndRef.current=onEnd;
    // Calculate total duration from all blobs once first plays
    let cumulativeTime=0;
    const durations=new Array(blobs.length).fill(0);
    progressRef.current={elapsed:0,total:0};
    let i=0;
    const next=()=>{
      if(cancelledRef.current||i>=blobs.length){
        setSpeaking(false);
        if(onEndRef.current) onEndRef.current();
        return;
      }
      const url=URL.createObjectURL(blobs[i]);
      const audio=new Audio();
      audioRef.current=audio;
      const chunkIdx=i;
      audio.onloadedmetadata=()=>{
        durations[chunkIdx]=audio.duration||0;
        if(chunkIdx===0) progressRef.current.total=durations.reduce((a,b)=>a+b,0)||1;
      };
      // Update progress during playback
      audio.ontimeupdate=()=>{
        const priorTime=durations.slice(0,chunkIdx).reduce((a,b)=>a+b,0);
        progressRef.current.elapsed=priorTime+(audio.currentTime||0);
        // Recalculate total if we learn more durations
        const knownTotal=durations.reduce((a,b)=>a+b,0);
        if(knownTotal>progressRef.current.total) progressRef.current.total=knownTotal;
      };
      audio.onended=()=>{
        cumulativeTime+=durations[chunkIdx]||0;
        URL.revokeObjectURL(url);i++;next();
      };
      audio.onerror=()=>{URL.revokeObjectURL(url);i++;next()};
      audio.oncanplay=()=>{
        const knownTotal=durations.reduce((a,b)=>a+b,0);
        if(knownTotal>progressRef.current.total) progressRef.current.total=knownTotal;
        audio.play().then(()=>{
          // Fire onStart when first chunk starts playing
          if(chunkIdx===0&&onStart){onStart()}
        }).catch(()=>{URL.revokeObjectURL(url);i++;next()});
      };
      audio.src=url;
      audio.load();
    };
    next();
  };

  const togglePause=()=>{
    if(modeRef.current==='openai'&&audioRef.current){
      if(paused){audioRef.current.play();setPaused(false)}
      else{audioRef.current.pause();setPaused(true)}
    } else if(modeRef.current==='browser'&&window.speechSynthesis){
      if(paused){window.speechSynthesis.resume();setPaused(false)}
      else{window.speechSynthesis.pause();setPaused(true)}
    }
  };

  const stop=()=>{
    cancelledRef.current=true;
    if(audioRef.current){audioRef.current.pause();audioRef.current=null}
    if(window.speechSynthesis)window.speechSynthesis.cancel();
    setSpeaking(false);setPaused(false);
    modeRef.current='none';
  };

  return{speak,playBlobs,stop,speaking,paused,togglePause,getProgress};
}

function useRecognition(){
  const recRef=useRef(null);
  const txtRef=useRef('');
  const[transcript,setTranscript]=useState('');
  const aliveRef=useRef(false);

  const start=()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR)return;
    const r=new SR();r.continuous=true;r.interimResults=true;r.lang='en-US';
    r.onresult=e=>{
      let f='',int='';
      for(let i=0;i<e.results.length;i++){
        if(e.results[i].isFinal)f+=e.results[i][0].transcript+' ';
        else int+=e.results[i][0].transcript;
      }
      txtRef.current=f;setTranscript(f+int);
    };
    r.onend=()=>{if(aliveRef.current)try{r.start()}catch{}};
    r.onerror=()=>{};
    recRef.current=r;aliveRef.current=true;
    txtRef.current='';setTranscript('');
    try{r.start()}catch{};
  };
  const stop=()=>{aliveRef.current=false;if(recRef.current)try{recRef.current.stop()}catch{};return txtRef.current};
  return{transcript,start,stop,getText:()=>txtRef.current};
}

/* ═══════════════════════════════════════════════════
   TIMER
   ═══════════════════════════════════════════════════ */

function useTimer(){
  const[left,setLeft]=useState(0);
  const[on,setOn]=useState(false);
  const iRef=useRef(null);
  const cbRef=useRef(null);

  const beep=(f,d)=>{try{const a=new(window.AudioContext||window.webkitAudioContext)();const o=a.createOscillator();const g=a.createGain();o.connect(g);g.connect(a.destination);o.frequency.value=f;g.gain.value=.12;o.start();o.stop(a.currentTime+d/1000)}catch{}};

  const go=(secs,onDone)=>{cbRef.current=onDone;setLeft(secs);setOn(true)};
  const halt=()=>{setOn(false)};
  const reset=()=>{setOn(false);setLeft(0)};

  useEffect(()=>{
    if(!on){if(iRef.current)clearInterval(iRef.current);return}
    iRef.current=setInterval(()=>{
      setLeft(p=>{
        if(p<=1){clearInterval(iRef.current);setOn(false);beep(880,400);if(cbRef.current)setTimeout(cbRef.current,300);return 0}
        if(p===31)beep(660,150);
        if(p===16)beep(880,150);
        return p-1;
      });
    },1000);
    return()=>clearInterval(iRef.current);
  },[on]);

  const fmt=s=>Math.floor(s/60)+':'+String(s%60).padStart(2,'0');
  return{left,on,go,halt,reset,fmt};
}

/* ═══════════════════════════════════════════════════
   BUILD PROMPT
   ═══════════════════════════════════════════════════ */

function buildPrompt(speech,userSide,motion,history,notes,format,oppStr,oppWk,difficultyNote,background){
  const fmt=FORMATS[format]||FORMATS.apda;
  const traitPrompt=buildTraitPrompt(oppStr||[],oppWk||[]);
  const userLabel=fmt.sideLabels[userSide]||userSide;
  const aiSides=fmt.sides.filter(s=>s!==userSide);
  const aiLabel=fmt.sideLabels[aiSides[0]]||aiSides[0];
  const rule=fmt.rules[speech.code]||'Deliver your speech.';
  const isRebuttal=speech.code.includes('R')||speech.code==='LOR'||speech.code==='PMR'||speech.code==='Reply';
  const steelmanInstruction=history?`
CRITICAL — STEELMANNING REQUIREMENT:
When engaging with your opponent's arguments, you MUST:
1. First, take their argument at its BEST possible interpretation — state the strongest version of what they're claiming ("Even if we grant the strongest version of their point…" or "Taking their argument at its best case…")
2. Then defeat that strongest version through weighing and outweighing ("But this is outweighed because…", "Even granting all of that, X matters more because…")
3. Use comparative weighing: magnitude (how many people affected), probability (how likely), timeframe (how soon), reversibility (can we undo the harm?)
4. Never strawman. Never attack the weakest version. Always engage the steel-manned version and still win.
This makes you a formidable opponent — the kind that makes your opponent genuinely improve.`:'';
  // Occasionally make the AI pick an unconventional angle instead of the "average" argument
  const unconventional = Math.random() < 0.3;
  const unconventionalNote = unconventional ? `
UNCONVENTIONAL ANGLE: For at least one argument in this speech, deliberately avoid the most obvious/expected position. Pick a logically sound but surprising angle — something the opponent wouldn't have prepped for. The best debaters are unpredictable.` : '';

  return `You are a skilled ${aiLabel} debater in a ${fmt.name} debate. Motion/Resolution: "${motion}".

${traitPrompt}

${rule}
${steelmanInstruction}
${unconventionalNote}
${difficultyNote||''}

${background?'BACKGROUND/CONTEXT for this motion:\n'+background:''}
${history?'Previous speeches:\n'+history:'First speech of the round.'}
${notes?'Your opponent\'s prep notes (use to anticipate their strategy):\n'+notes:''}

Write ~${Math.floor(speech.time/60)*170} words (~${Math.floor(speech.time/60)} min) as a speech delivered aloud.

CASE STRUCTURE — YOU MUST FOLLOW THIS EXACT ARCHITECTURE (spoken aloud, no markdown):

${isRebuttal ? `REBUTTAL STRUCTURE:
1. Identify the 2-3 most important clashes in the round. For each:
   - Name the clash: "The first clash is whether X actually leads to Y."
   - Steelman their best version, then defeat it with mechanism and weighing.
   - Cross-apply warrants from your constructive: "Pull through our warrant about [name] from our first argument."
2. Extend your dropped or underweighed arguments.
3. Do comparative weighing on magnitude, probability, timeframe, reversibility.
4. Crystallize: "Judge, the round comes down to [1-2 key questions], and here's why we win both."` :

`FOR CONSTRUCTIVE SPEECHES — mirror this exact structure spoken aloud:

STEP 1 — FRAMEWORK (name it): Open with "Our framework is [Descriptive Name]." Then explain the standard in 2-3 sentences. Example: "Our framework is Democratic Process Integrity. The standard for this debate is whatever best preserves democratic legitimacy through informed deliberation."

STEP 2 — FRAMING POINTS under the framework (a, b, c): Give 2-3 lettered framing points that establish WHY this framework controls the round. Say the letters out loud:
"a. [Named Framing Point]. [1-2 sentences explaining it]."
"b. [Named Framing Point]. [1-2 sentences explaining it]."

STEP 3 — ARGUMENTS (2-3 independent arguments): Each argument MUST have:
- A clear claim with a descriptive name: "Argument one: [Descriptive Name Like 'The Coordination Failure']."
- Lettered sub-points (a, b, c) under each argument, each with a NAMED warrant:
  "a. [Warrant Name like 'The Substitution Effect']. [Full causal mechanism in 2-3 sentences]."
  "b. [Warrant Name]. [Mechanism]."
  "c. [Warrant Name]. [Mechanism]."
- An impact: "The impact here is [specific, quantified when possible]."

STEP 4 — EVEN-IF / PREEMPTION: For at least one argument, include: "Even if they argue [strongest opp response], our argument still holds because [mechanism]."

Example of how this sounds spoken aloud:
"Our framework is Institutional Trust Preservation. The standard is whatever mechanism best maintains public confidence in democratic institutions. Two framing points. a. Legitimacy Requires Perceived Fairness. Citizens comply with laws they disagree with only when they believe the process was fair. When that perception breaks, you get non-compliance spirals. b. Trust Is Asymmetric. It takes decades to build and moments to destroy. That asymmetry means we should be risk-averse about institutional credibility.

Argument one: The Chilling Effect on Qualified Candidates. a. The Talent Drain warrant. When public office becomes synonymous with character assassination, qualified professionals in medicine, engineering, and law choose private sector careers. We saw this after 2016 when applications to the Senior Executive Service dropped 28 percent. b. The Selection Bias warrant. The only people willing to endure that environment are either ideologues who don't care about reputation, or wealthy individuals who can absorb the cost. That's a worse candidate pool by any measure. The impact is structural democratic decay: not a single bad election, but a generation of declining governance quality."

That is the level of structure, specificity, and named warrants you must hit.`}

WARRANT QUALITY RULES:
- Each warrant must be SPECIFIC to this motion. If it could apply to any topic, it's too generic.
- "This harms the economy" is NOT a warrant. "This creates a moral hazard because actors insulated from risk take larger bets, as we saw with AIG in 2008" IS a warrant.
- NAME every warrant. Not "my first point" but "The Substitution Effect" or "The Coordination Problem."
- Walk through the full causal chain: when X happens, actors respond by doing Y through mechanism Z, which produces outcome W.
- Use counterfactual analysis: compare "in our world" vs "in their world" with specific mechanism differences.

STRATEGIC DEPTH:
- Comparative weighing is mandatory. Be explicit: "Our impact outweighs on magnitude, we're talking millions versus their thousands, and on probability, because our mechanism is direct while theirs requires three contingent steps."
- Punish drops: "They completely dropped our second argument, so extend that across the flow."
- Strategic concessions: "Grant them X. It still doesn't get them to their impact because..."
- Cross-reference: "Cross-apply the warrant from our first argument here."

VOICE & DELIVERY:
- Lead with substance. First sentence identifies the framework or clash. Never "Alright judge let's dive in." Just START.
- Say "a," "b," "c" and argument numbers out loud to signal structure. The judge needs to hear the organization.
- NEVER narrate what you're about to do. No "Let me now turn to..." Just DO it.
- Reference the judge casually: "Judge, the delta in this round comes down to..."
- Use APDA language naturally: "pull through," "cross-apply," "extend," "non-unique," "the link story is broken."
- Sound like someone explaining passionately to a smart friend. Conversational but precise.
- Short punchy sentences for claims. Longer ones for mechanism. Cut filler ruthlessly.
- No bullet points, no markdown, no headers. Spoken word only. But STRUCTURED spoken word — the judge should be able to flow it.`;
}

function App(){
  const auth = useAuth();
  const { user, team, loading: authLoading, signIn, signOut } = auth;

  // Set global pro status from team data
  useEffect(() => {
    __proStatus = !!(team && (team.plan === 'individual' || team.plan === 'team' || team.plan === 'lifetime'));
  }, [team]);

  const[phase,setPhase]=useState('setup');   // setup|prep|speech|feedback
  const[vis,setVis]=useState(true);          // fade transition
  const[motion,setMotion]=useState('');
  const[background,setBackground]=useState('');  // optional context for the motion
  const[format,setFormat]=useState('apda');
  const[oppStrengths,setOppStrengths]=useState([]);
  const[oppWeaknesses,setOppWeaknesses]=useState([]);
  const[brain,setBrain]=useState('claude');
  const[voice,setVoice]=useState('onyx');
  const[side,setSide]=useState('gov');
  const[wpm,setWpm]=useState(180);
  const[idx,setIdx]=useState(0);
  const[log,setLog]=useState([]);            // {code,who,text}
  const[feedback,setFeedback]=useState('');
  const[fbLoading,setFbLoading]=useState(false);
  const[notes,setNotes]=useState('');
  const[aiLoading,setAiLoading]=useState(false);
  const[aiText,setAiText]=useState('');
  const[aiPct,setAiPct]=useState(0);       // generation progress %
  const[voiceEta]=useState(0); // TTS timing display
  const[showTx,setShowTx]=useState(false);
  const[revealIdx,setRevealIdx]=useState(-1); // lyrics sync: words revealed so far (-1 = all visible)

  // Round history
  const[showHistory,setShowHistory]=useState(false);
  const[historyRounds,setHistoryRounds]=useState(()=>{
    try{return JSON.parse(localStorage.getItem('debateos-round-history')||'[]')}catch{return[]}
  });
  const[viewingRound,setViewingRound]=useState(null);

  const orb=useOrb();
  const rec=useRecognition();
  const tts=useTTS();
  const timer=useTimer();
  const prepTimer=useTimer();

  const fmt=FORMATS[format]||FORMATS.apda;
  const SPEECHES=fmt.speeches;
  const cur=SPEECHES[idx]||SPEECHES[0];
  const isUser=cur.side===side;

  // Init orb in speech phase
  useEffect(()=>{if(phase==='speech'){orb.init()}return()=>orb.kill()},[phase]);

  // Phase transition helper
  const transition=(next,cb)=>{setVis(false);setTimeout(()=>{if(cb)cb();setPhase(next);setTimeout(()=>setVis(true),50)},350)};

  // Start debate
  const startDebate=()=>{if(!motion.trim())return;SFX.startRound();warmUpTTS();transition('prep',()=>prepTimer.go(fmt.prep))};

  // Skip prep → first speech
  const goToSpeeches=()=>{SFX.click();
    warmUpTTS();
    prepTimer.reset();
    transition('speech',()=>{setIdx(0);setLog([]);setTimeout(()=>runSpeech(0,[]),400)});
  };

  // Auto-advance when prep timer ends
  useEffect(()=>{
    if(phase==='prep'&&prepTimer.left===0&&!prepTimer.on&&log.length===0){
      // Only auto-advance if timer actually ran (not on initial mount)
    }
  },[prepTimer.left]);

  // Run a speech
  const runSpeech=async(i,currentLog)=>{
    const s=SPEECHES[i];
    const userTurn=s.side===side;

    if(userTurn){
      // User turn — start timer + mic immediately
      timer.go(s.time);
      orb.setMode('mic');await orb.startMic();rec.start();
    } else {
      // AI turn — overlapped: start fetching audio for first half while still generating text
      orb.setMode('ai');setAiLoading(true);setAiText('');setAiPct(0);
      const stopThinking=SFX.thinking();
      try{
        const targetWords=Math.floor(s.time/60)*170;
        const hist=currentLog.map(l=>`[${l.code} — ${l.who}]: ${l.text}`).join('\n\n');
        const ttsSpeed=Math.max(0.75,Math.min(2.0,wpm/140));

        // Prefetch: fire TTS for first half of text while AI is still generating
        let prefetchBlob=null;
        let prefetchText='';
        let prefetchFired=false;
        const halfTarget=Math.floor(targetWords*0.5);

        const fetchTTSBlob=(text)=>{
          const input=text.slice(0,4000);
          return fetch('/api/tts',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({text:input,voice,speed:ttsSpeed,hd:true}),
          }).then(r=>{
            if(!r.ok) throw new Error('TTS '+r.status);
            return r.blob();
          });
        };

        // Phase 1: Generate argument text — prefetch audio mid-stream
        const txt=await callAI(buildPrompt(s,side,motion,hist,notes,format,oppStrengths,oppWeaknesses,getDifficultyNote(),background),`Deliver your ${s.code} speech on: "${motion}"`,chunk=>{
          setAiText(chunk);
          const words=chunk.split(/\s+/).length;
          setAiPct(Math.min(99,Math.round((words/targetWords)*100)));
          // Once we hit ~50% of target, fire TTS for the first half
          if(!prefetchFired&&words>=halfTarget){
            prefetchFired=true;
            // Find a sentence boundary near the middle
            const mid=chunk.length>>1;
            const sentenceEnd=chunk.indexOf('.',mid);
            const splitAt=sentenceEnd>0?sentenceEnd+1:mid;
            prefetchText=chunk.slice(0,splitAt).trim();
            if(prefetchText.length>50){
              console.log('%c[TTS] Prefetching first half ('+prefetchText.split(/\s+/).length+' words) while AI still generating','color:cyan;font-weight:bold');
              prefetchBlob=fetchTTSBlob(prefetchText).catch(e=>{console.warn('[TTS] Prefetch failed:',e);return null});
            }
          }
        },brain);
        setAiText(txt);setAiPct(100);
        stopThinking();SFX.ready();

        // Phase 2: Play speech audio
        setAiLoading('voice');
        const wordCount=txt.split(/\s+/).length;
        const estTotalSec=(wordCount/(150*ttsSpeed))*60;
        tts.getProgress().totalEstimate=estTotalSec;
        tts.getProgress().total=estTotalSec;

        const onAudioStart=()=>{
          setAiLoading(false);
          setRevealIdx(0);
          timer.go(s.time);
        };

        // If we prefetched the first half, play it immediately + queue the rest
        const resolvedPrefetch=prefetchBlob?await prefetchBlob:null;
        if(resolvedPrefetch&&resolvedPrefetch.size>1000&&prefetchText){
          console.log('%c[TTS] Using prefetched first half — fetching remainder','color:lime;font-weight:bold');
          const remainder=txt.slice(prefetchText.length).trim();
          // Start fetching remainder audio immediately
          const remainderBlobP=remainder.length>30?fetchTTSBlob(remainder).catch(()=>null):Promise.resolve(null);
          // Play first half now — fires onStart when audio begins
          const blobs=[resolvedPrefetch];
          const remainderBlob=await remainderBlobP;
          if(remainderBlob&&remainderBlob.size>1000) blobs.push(remainderBlob);
          tts.playBlobs(blobs,()=>{orb.setMode('idle');setRevealIdx(-1)},onAudioStart);
        } else {
          // Fallback: normal single-shot TTS
          tts.speak(txt,wpm,()=>{orb.setMode('idle');setRevealIdx(-1)},voice,onAudioStart);
        }
      }catch(e){
        stopThinking();
        setAiLoading(false);
        const msg='Something went wrong: '+e.message;
        setAiText('['+msg+']');
        orb.setMode('idle');
      }
    }
  };

  // End speech + advance
  const endSpeech=()=>{
    timer.reset();
    const userTurn=cur.side===side;
    let text='';
    if(userTurn){text=rec.stop();orb.stopMic();orb.setMode('idle')}
    else{tts.stop();text=aiText;orb.setMode('idle')}

    const entry={code:cur.code,who:userTurn?'You':'AI',text:text||'(no transcript)'};
    const newLog=[...log,entry];
    setLog(newLog);setAiText('');

    const next=idx+1;
    if(next>=SPEECHES.length){
      transition('feedback',()=>genFeedback(newLog));
    } else {
      setIdx(next);
      setTimeout(()=>runSpeech(next,newLog),600);
    }
  };

  // Adaptive difficulty — check user's win rate against this opponent
  const getWinRate=()=>{
    if(historyRounds.length===0) return { wins:0, losses:0, total:0, rate:0.5 };
    const wins=historyRounds.filter(r=>r.userWon===true).length;
    const losses=historyRounds.filter(r=>r.userWon===false).length;
    return { wins, losses, total:historyRounds.length, rate: historyRounds.length>0 ? wins/historyRounds.length : 0.5 };
  };
  const getDifficultyNote=()=>{
    const wr=getWinRate();
    if(wr.total<3) return '';
    if(wr.rate>=0.7) return 'The user has been winning consistently ('+wr.wins+'/'+wr.total+' wins). Debate at a SIGNIFICANTLY higher level — exploit YOUR strengths more aggressively, give fewer openings, use more sophisticated arguments. Make them EARN the win.';
    if(wr.rate<=0.3) return 'The user has been struggling ('+wr.wins+'/'+wr.total+' wins). Debate well but leave slightly more exploitable openings in your weaker areas. Still argue to win, but give the user more chances to find your weaknesses.';
    return '';
  };

  // Judge feedback — structured ballot
  const[ballot,setBallot]=useState(null); // parsed structured ballot
  const genFeedback=async(allLog)=>{
    setFbLoading(true);setBallot(null);
    const tx=allLog.map(l=>`[${l.code} — ${l.who}]: ${l.text}`).join('\n\n');
    const sys=`You are an experienced ${fmt.name} debate judge. Motion: "${motion}". User debated ${fmt.sideLabels[side]||side}. Opponent: AI.

Return your ballot as valid JSON with this exact structure:
{
  "winner": "user" or "ai",
  "decision": "2-3 sentences explaining why the winner won",
  "speakerPoints": { "user": 27.5, "ai": 27.0 },
  "keyClash": "The central clash point and who won it",
  "speeches": [
    { "code": "PM", "who": "You/AI", "score": 28, "strengths": ["strength1","strength2"], "improvements": ["area1","area2"] }
  ],
  "practiceAdvice": "One specific, actionable thing to practice next",
  "overallStrengths": ["what user did well across the round"],
  "overallWeaknesses": ["patterns to fix"]
}

Be honest and specific. Reference actual arguments from the transcript. Speaker points 25-30 scale (27 = average, 28 = good, 29 = excellent, 30 = near perfect). Return ONLY valid JSON, no markdown.`;
    try{
      let raw='';
      const fb=await callAI(sys,'Full round transcript:\n\n'+tx,chunk=>{raw=chunk;setFeedback(chunk)},brain);
      setFeedback(fb);
      // Parse structured ballot
      try{
        const cleaned=fb.replace(/```json\s*/g,'').replace(/```\s*/g,'').trim();
        const parsed=JSON.parse(cleaned);
        setBallot(parsed);
        saveRound(allLog,fb,parsed.winner==='user');
      }catch{
        // Fallback: save as unstructured
        saveRound(allLog,fb,null);
      }
    }catch(e){setFeedback('Could not generate feedback: '+e.message)}
    setFbLoading(false);
  };

  // Save round to history
  const saveRound=(allLog,fb,userWon)=>{
    const round={
      id:Date.now(),
      date:new Date().toISOString(),
      motion,format,side,voice,brain,
      oppStrengths,oppWeaknesses,
      formatName:(FORMATS[format]||FORMATS.apda).name,
      opponentName:'AI',
      sideLabel:(FORMATS[format]||FORMATS.apda).sideLabels[side]||side,
      log:allLog,
      feedback:fb||'',
      userWon: userWon, // true/false/null
    };
    const updated=[round,...historyRounds].slice(0,50);
    setHistoryRounds(updated);
    try{localStorage.setItem('debateos-round-history',JSON.stringify(updated))}catch{}
    // Also save to Firestore if signed in
    if(user&&firebaseDb){
      user.getIdToken().then(token=>{
        firebaseDb.collection('debate_rounds').doc(user.uid+'_'+round.id).set(round).catch(()=>{});
      }).catch(()=>{});
    }
  };

  const deleteRound=(id)=>{
    const updated=historyRounds.filter(r=>r.id!==id);
    setHistoryRounds(updated);
    try{localStorage.setItem('debateos-round-history',JSON.stringify(updated))}catch{}
    if(viewingRound&&viewingRound.id===id)setViewingRound(null);
  };

  // Copy transcript
  const copyAll=()=>{
    const t=log.map(l=>`[${l.code} — ${l.who}]\n${l.text}`).join('\n\n---\n\n')+'\n\n---\nJUDGE:\n'+feedback;
    navigator.clipboard.writeText(t).catch(()=>{});
  };

  // Reset
  const newRound=()=>transition('setup',()=>{setMotion('');setBackground('');setIdx(0);setLog([]);setFeedback('');setBallot(null);setNotes('');setAiText('');setShowTx(false);setFormat('apda');setOppStrengths([]);setOppWeaknesses([])});

  /* ─── RENDER ─────────────────────── */

  const bar=el('div',{className:'bar'},
    el('a',{href:'/landing',className:'bar-logo'},el('em',null,"Devil's"),' Advocate'),
    el('div',{className:'bar-links'},
      el('a',{href:'/#case'},'College'),
      el('a',{href:'/high-school'},'High School'),
      user ? el('div',{style:{display:'flex',alignItems:'center',gap:10}},
        user.photoURL && el('img',{src:user.photoURL,style:{width:24,height:24,borderRadius:'50%',border:'1px solid rgba(255,255,255,.15)'}}),
        el('span',{style:{fontSize:'.72rem',color:'rgba(255,255,255,.5)'}},user.displayName?.split(' ')[0]),
        isPro() && el('span',{style:{fontSize:'.6rem',color:'#ef4444',fontWeight:700,background:'rgba(239,68,68,.1)',padding:'2px 6px',borderRadius:4}},'PRO'),
        el('button',{onClick:signOut,style:{fontSize:'.65rem',color:'rgba(255,255,255,.3)',background:'none',border:'none',cursor:'pointer',fontFamily:'inherit'}},'Sign Out'),
      ) : el('button',{onClick:signIn,style:{fontSize:'.72rem',color:'#ef4444',background:'rgba(239,68,68,.08)',border:'1px solid rgba(239,68,68,.2)',borderRadius:999,padding:'5px 14px',cursor:'pointer',fontWeight:600,fontFamily:'inherit'}},'Sign In'),
    )
  );

  const stageClass='center '+(vis?'visible':'entering');

  // Auto-set side to first available when format changes
  useEffect(()=>{
    const f=FORMATS[format];
    if(f&&!f.sides.includes(side)) setSide(f.sides[0]);
  },[format]);

  // Lyrics sync: reveal words at a constant rate based on WPM
  const lyricsStartRef=useRef(0);
  useEffect(()=>{
    if(!tts.speaking||!aiText||aiLoading) { return; }
    if(!lyricsStartRef.current) lyricsStartRef.current=Date.now();
    const words=aiText.split(/\s+/);
    const totalWords=words.length;
    // Words per second based on TTS speed setting
    const ttsSpeed=Math.max(0.75,Math.min(2.0,wpm/140));
    const wordsPerSec=(150*ttsSpeed)/60; // ~150 wpm at 1x speed
    const tick=()=>{
      const elapsed=(Date.now()-lyricsStartRef.current)/1000;
      // Reveal slightly ahead so words appear just before spoken
      const idx=Math.min(totalWords,Math.floor(elapsed*wordsPerSec*1.05)+1);
      setRevealIdx(idx);
    };
    const iv=setInterval(tick,80);
    return()=>clearInterval(iv);
  },[tts.speaking,aiText,aiLoading]);

  // Reset reveal when speech ends or new speech starts
  useEffect(()=>{
    if(!tts.speaking){setRevealIdx(-1);lyricsStartRef.current=0}
    else{setShowTx(true);lyricsStartRef.current=Date.now()} // auto-open transcript when AI starts speaking
  },[tts.speaking]);

  // Apply trait preset
  const applyPreset=(key)=>{
    const p=TRAIT_PRESETS[key];
    if(key==='random'){
      // Pick 1-3 random strengths and 1-2 random weaknesses
      const sKeys=Object.keys(STRENGTHS);
      const wKeys=Object.keys(WEAKNESSES);
      const shuffle=a=>[...a].sort(()=>Math.random()-.5);
      setOppStrengths(shuffle(sKeys).slice(0,1+Math.floor(Math.random()*2)));
      setOppWeaknesses(shuffle(wKeys).slice(0,1+Math.floor(Math.random()*1)));
    } else {
      setOppStrengths([...p.strengths]);
      setOppWeaknesses([...p.weaknesses]);
    }
  };

  // ── SETUP ──
  if(phase==='setup') return el('div',{className:'page'},
    el('div',{className:'ambient'}),bar,
    el('div',{className:stageClass},
      el('h1',{className:'t-hero'},el('em',null,'Debate'),' AI'),
      el('p',{className:'t-sub'},'Choose your format, opponent, and go.'),

      // Format
      el('div',{className:'t-label',style:{marginTop:8}},'Format'),
      el('div',{className:'pills'},
        Object.entries(FORMATS).map(([k,v])=>
          el('button',{key:k,className:'pill'+(format===k?' on':''),onClick:()=>setFormat(k),title:v.desc},v.name)
        )
      ),

      // AI Brain
      el('div',{className:'t-label',style:{marginTop:24}},'AI Brain'),
      el('div',{className:'pills'},
        Object.entries(BRAINS).map(([k,v])=>
          el('button',{key:k,className:'pill'+(brain===k?' on':''),onClick:()=>setBrain(k),title:v.desc},v.name)
        )
      ),
      isPro()&&el('div',{style:{fontSize:'.72rem',color:'rgba(239,68,68,.6)',fontWeight:600,marginTop:4}},'⚡ Pro — using faster, smarter models'),
      !isPro()&&el('div',{style:{fontSize:'.72rem',color:'rgba(255,255,255,.2)',marginTop:4}},'Free tier · ',el('a',{href:'/#pricing',style:{color:'rgba(239,68,68,.5)',textDecoration:'underline'}},'Upgrade for ⚡ faster generation')),

      // Opponent Traits — mix & match strengths/weaknesses
      el('div',{className:'t-label',style:{marginTop:24}},'Opponent Style'),
      el('div',{className:'pills',style:{marginBottom:8}},
        Object.entries(TRAIT_PRESETS).map(([k,v])=>
          el('button',{key:k,className:'cta-ghost',onClick:()=>applyPreset(k),style:{padding:'6px 14px',fontSize:'.75rem'}},
            k==='random'?'🎲 '+v.label:v.label
          )
        )
      ),

      el('div',{className:'t-label',style:{marginTop:12,fontSize:'.6rem'}},'Strengths'),
      el('div',{className:'pills',style:{maxWidth:700}},
        Object.entries(STRENGTHS).map(([k,v])=>{
          const on=oppStrengths.includes(k);
          return el('button',{key:k,className:'pill'+(on?' on':''),title:v.desc,onClick:()=>{
            setOppStrengths(on?oppStrengths.filter(s=>s!==k):[...oppStrengths,k]);
          }},v.emoji+' '+v.label);
        })
      ),

      el('div',{className:'t-label',style:{marginTop:12,fontSize:'.6rem'}},'Weaknesses'),
      el('div',{className:'pills',style:{maxWidth:700}},
        Object.entries(WEAKNESSES).map(([k,v])=>{
          const on=oppWeaknesses.includes(k);
          return el('button',{key:k,className:'pill'+(on?' on':''),title:v.desc,onClick:()=>{
            setOppWeaknesses(on?oppWeaknesses.filter(w=>w!==k):[...oppWeaknesses,k]);
          }},v.emoji+' '+v.label);
        })
      ),

      // Trait summary
      (oppStrengths.length>0||oppWeaknesses.length>0)&&el('div',{style:{marginTop:12,padding:'12px 16px',background:'rgba(255,255,255,.03)',border:'1px solid rgba(255,255,255,.06)',borderRadius:14,maxWidth:500,textAlign:'left',fontSize:'.78rem'}},
        oppStrengths.length>0&&el('div',{style:{color:'rgba(100,220,100,.6)',marginBottom:oppWeaknesses.length?4:0}},
          '✦ '+oppStrengths.map(k=>STRENGTHS[k].label).join(' · ')
        ),
        oppWeaknesses.length>0&&el('div',{style:{color:'rgba(239,68,68,.6)'}},
          '✧ '+oppWeaknesses.map(k=>WEAKNESSES[k].label).join(' · ')
        ),
      ),

      // Motion
      el('div',{className:'t-label',style:{marginTop:28}},'Motion'),
      el('textarea',{className:'float-input',rows:2,placeholder:'Enter a motion or topic...',value:motion,onChange:e=>setMotion(e.target.value)}),
      el('button',{className:'cta-ghost',onClick:()=>setMotion(MOTIONS[Math.floor(Math.random()*MOTIONS.length)]),style:{marginTop:8,marginBottom:4}},'Random Motion'),

      // Background (optional)
      el('div',{className:'t-label',style:{marginTop:20,display:'flex',alignItems:'center',gap:8}},
        'Background',
        el('span',{style:{fontSize:'.55rem',fontWeight:500,color:'rgba(255,255,255,.2)',textTransform:'none',letterSpacing:'0'}},'optional')
      ),
      el('textarea',{className:'float-input',rows:2,placeholder:'Country context, actor details, constraints, time period... Leave blank to skip.',value:background,onChange:e=>setBackground(e.target.value),style:{minHeight:60,fontSize:'.9rem'}}),

      // Side
      el('div',{className:'t-label',style:{marginTop:24}},'Your Side'),
      el('div',{className:'pills'},
        fmt.sides.map(s=>
          el('button',{key:s,className:'pill'+(side===s?' on':''),onClick:()=>setSide(s)},fmt.sideLabels[s])
        )
      ),

      // AI Voice
      el('div',{className:'t-label',style:{marginTop:24}},'AI Voice'),
      el('div',{className:'pills'},
        Object.entries(VOICES).map(([k,v])=>
          el('button',{key:k,className:'pill'+(voice===k?' on':''),onClick:()=>setVoice(k),title:v.desc},v.name)
        )
      ),

      // AI Speed
      el('div',{className:'t-label',style:{marginTop:24}},'AI Speed'),
      el('div',{className:'wpm'},
        el('span',null,'Slow'),
        el('input',{type:'range',min:120,max:260,value:wpm,onChange:e=>setWpm(+e.target.value)}),
        el('span',null,'Fast'),
        el('strong',null,wpm+' wpm'),
      ),

      // Summary line
      el('div',{className:'t-dim',style:{marginTop:16}},
        fmt.speeches.length+' speeches · '+Math.floor(fmt.prep/60)+'min prep · '+BRAINS[brain].name+' brain · '+VOICES[voice].name+' voice'+(oppStrengths.length||oppWeaknesses.length?' · Custom opponent':'')

      ),

      el('button',{className:'cta',disabled:!motion.trim(),onClick:startDebate},'Start Round'),

      // Past Rounds button
      historyRounds.length>0&&el('button',{className:'cta-ghost',style:{marginTop:16},onClick:()=>setShowHistory(true)},
        '📋 Past Rounds ('+historyRounds.length+')'
      ),
    ),

    // History panel overlay
    showHistory&&el('div',{className:'history-panel'},
      el('div',{className:'history-grid'},
        el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:24}},
          el('h2',{style:{fontSize:'1.4rem',fontWeight:800,letterSpacing:'-.03em'}},
            viewingRound?'Round Detail':'Past Rounds'
          ),
          el('button',{className:'cta-ghost',style:{marginTop:0},onClick:()=>{setShowHistory(false);setViewingRound(null)}},'✕ Close'),
        ),

        viewingRound?el('div',{className:'history-detail'},
          el('button',{className:'cta-ghost',style:{marginTop:0,marginBottom:16},onClick:()=>setViewingRound(null)},'← Back'),
          el('div',{style:{marginBottom:20}},
            el('div',{style:{fontSize:'1.1rem',fontWeight:700,color:'rgba(255,255,255,.7)',marginBottom:6}},'"'+viewingRound.motion+'"'),
            el('div',{className:'hc-meta'},
              el('span',null,viewingRound.formatName),
              el('span',null,viewingRound.sideLabel),
              el('span',null,viewingRound.opponentName+' opponent'),
              el('span',null,new Date(viewingRound.date).toLocaleDateString()),
            ),
          ),
          el('div',{className:'t-label',style:{marginTop:16}},'Speeches'),
          viewingRound.log.map((l,i)=>el('div',{key:i,className:'hd-speech'},
            el('div',{className:'hd-who '+(l.who==='You'?'you':'ai')},l.code+' — '+l.who),
            el('div',{className:'hd-text'},l.text),
          )),
          viewingRound.feedback&&el(React.Fragment,null,
            el('div',{className:'t-label',style:{marginTop:24}},'Judge Feedback'),
            el('div',{className:'fb-card',style:{marginTop:8}},el('div',{className:'feedback-text'},viewingRound.feedback)),
          ),
          el('div',{className:'row-c',style:{marginTop:20}},
            el('button',{className:'cta-ghost',onClick:()=>{
              const t=viewingRound.log.map(l=>`[${l.code} — ${l.who}]\n${l.text}`).join('\n\n---\n\n')+'\n\n---\nJUDGE:\n'+viewingRound.feedback;
              navigator.clipboard.writeText(t).catch(()=>{});
            }},'Copy Transcript'),
            el('button',{className:'cta-ghost',style:{color:'#ef4444',borderColor:'rgba(239,68,68,.3)'},onClick:()=>deleteRound(viewingRound.id)},'Delete Round'),
          ),
        ):el(React.Fragment,null,
          historyRounds.map(r=>el('div',{key:r.id,className:'history-card',onClick:()=>setViewingRound(r)},
            el('div',{className:'hc-motion'},'"'+r.motion+'"'),
            el('div',{className:'hc-meta'},
              el('span',null,r.formatName),
              el('span',null,r.sideLabel),
              el('span',null,r.opponentName),
              el('span',null,new Date(r.date).toLocaleDateString()),
              el('span',null,r.log.length+' speeches'),
            ),
          )),
        ),
      ),
    ),
  );

  // ── PREP ──
  if(phase==='prep') return el('div',{className:'page'},
    el('div',{className:'ambient'}),bar,
    el('div',{className:stageClass},
      el('div',{className:'t-label'},'Prep Time'),
      el('div',{className:'t-time'+(prepTimer.left<=60?' danger':'')},prepTimer.fmt(prepTimer.left)),
      el('div',{style:{margin:'16px auto 24px',padding:'14px 20px',background:'rgba(255,255,255,.03)',border:'1px solid rgba(255,255,255,.06)',borderRadius:14,maxWidth:480}},
        el('span',{style:{color:'#ef4444',fontWeight:700}},fmt.sideLabels[side]||side),
        el('span',{style:{color:'rgba(255,255,255,.35)',margin:'0 8px'}},'·'),
        el('span',{style:{color:'rgba(255,255,255,.25)',fontSize:'.8rem'}},fmt.name),
        el('div',{style:{color:'rgba(255,255,255,.5)',marginTop:6}},motion),
      ),
      el('textarea',{className:'float-input',rows:8,placeholder:'Brainstorm your arguments...',value:notes,onChange:e=>setNotes(e.target.value),autoFocus:true,style:{maxWidth:480}}),
      el('button',{className:'cta',onClick:goToSpeeches,style:{marginTop:32,maxWidth:300}},'Start Round →'),
    )
  );

  // ── SPEECH ──
  if(phase==='speech'){
    const tc=timer.left<=15?'danger':timer.left<=30?'warn':'';
    return el('div',{className:'page'},
      el('div',{className:'ambient'}),bar,
      el('div',{className:stageClass,key:'s'+idx},

        // Progress pips
        el('div',{className:'progress-bar'},
          SPEECHES.map((s,i)=>el('div',{key:s.code,className:'pip'+(i<idx?' done':i===idx?' now':'')},
            el('div',{className:'pip-bar'+(i<idx?' done':i===idx?' now':'')}),
            el('div',{className:'pip-code',style:{color:i%2===0?'#ef4444':'rgba(255,255,255,.85)'}},s.code),
          ))
        ),

        // Resolution display
        el('div',{style:{maxWidth:600,margin:'0 auto 16px',textAlign:'center'}},
          el('div',{style:{fontSize:'.92rem',fontWeight:600,color:'rgba(255,255,255,.55)',lineHeight:1.4,fontStyle:'italic'}},'"'+motion+'"'),
          background&&el('div',{style:{fontSize:'.72rem',color:'rgba(255,255,255,.25)',marginTop:4,lineHeight:1.3}},background),
        ),

        // Speech info
        el('div',{className:'t-label'},isUser?'Your Turn':'AI Speaking'),
        el('div',{className:'t-phase'},cur.code+' — '+cur.name),
        el('div',{className:'t-dim',style:{marginBottom:24}},
          isUser?'Speak now — your voice is being transcribed':
          aiLoading==='voice'?('Preparing HD voice via OpenAI TTS...'+(voiceEta>0?' ~'+voiceEta+'s remaining':' almost ready')):
          aiLoading?'Writing argument via '+(BRAINS[brain]||BRAINS.claude).name+(isPro()?' ⚡ Pro':'')+' ... '+aiPct+'%':
          tts.paused?'Paused':'🔴 LIVE — Timer running'
        ),

        // The orb
        el('div',{className:'orb-wrap'},
          el('div',{className:'orb-glow'+(!isUser||tts.speaking?' on':'')}),
          el('div',{className:'orb-ring'+(isUser?' active':tts.speaking||aiLoading?' active pulse':'')}),
          el('canvas',{className:'orb',ref:orb.ref}),
        ),

        // Timer
        el('div',{className:'t-time'+(tc?' '+tc:'')},timer.fmt(timer.left)),

        // Transcript toggle — lyrics-style synced reveal for AI speech
        (rec.transcript||aiText)&&el(React.Fragment,null,
          el('button',{className:'transcript-btn',onClick:()=>setShowTx(!showTx)},showTx?'▼ Hide transcript':'▶ Show transcript'),
          showTx&&el('div',{className:'transcript-box lyrics-box'},
            isUser ? rec.transcript :
            (()=>{
              const words=aiText.split(/\s+/);
              const active=revealIdx>=0;
              return words.map((w,i)=>el('span',{key:i,style:{
                color: !active||i<revealIdx ? 'rgba(255,255,255,.85)' : 'rgba(255,255,255,.12)',
                transition: 'color .3s ease',
                fontWeight: active && i>=Math.max(0,revealIdx-3) && i<revealIdx ? 700 : 400,
              }},w+' '));
            })()
          ),
        ),

        // Controls
        el('div',{className:'row-c'},
          !isUser&&tts.speaking&&el('button',{className:'cta-ghost',onClick:tts.togglePause},tts.paused?'▶ Resume':'⏸ Pause'),
          el('button',{className:'cta-ghost',onClick:endSpeech},isUser?'End Speech →':'Skip →'),
        ),
      )
    );
  }

  // ── FEEDBACK ──
  if(phase==='feedback') {
    const b=ballot; // structured ballot or null
    const wr=getWinRate();
    return el('div',{className:'page'},
      el('div',{className:'ambient'}),bar,
      el('div',{className:stageClass,style:{justifyContent:'flex-start',paddingTop:120,maxWidth:700,textAlign:'left'}},
        el('div',{className:'t-label',style:{textAlign:'center'}},'Round Complete'),
        el('h2',{className:'t-hero',style:{fontSize:'clamp(2rem,5vw,3.2rem)',marginBottom:8,textAlign:'center'}},'Judge Ballot'),
        el('p',{className:'t-dim',style:{marginBottom:24,textAlign:'center'}},'"'+motion+'" — '+(fmt.sideLabels[side]||side)+' vs AI'),

        fbLoading&&!ballot&&el('div',{style:{textAlign:'center',marginTop:40}},
          el('p',{className:'t-dim',style:{fontStyle:'italic'}},'Deliberating...'),
        ),

        // Structured ballot
        b && el('div',{style:{width:'100%'}},
          // Decision banner
          el('div',{style:{padding:'20px 24px',background:b.winner==='user'?'rgba(34,197,94,.08)':'rgba(239,68,68,.08)',border:'1px solid '+(b.winner==='user'?'rgba(34,197,94,.2)':'rgba(239,68,68,.2)'),borderRadius:16,marginBottom:20,textAlign:'center'}},
            el('div',{style:{fontSize:'1.6rem',fontWeight:900,color:b.winner==='user'?'#22c55e':'#ef4444',marginBottom:6}},
              b.winner==='user'?'🏆 You Win':'Opponent Wins'
            ),
            el('p',{style:{fontSize:'.88rem',color:'rgba(255,255,255,.6)',lineHeight:1.5}},b.decision),
          ),

          // Speaker Points
          el('div',{style:{display:'flex',gap:12,marginBottom:20}},
            el('div',{style:{flex:1,padding:'16px 20px',background:'rgba(255,255,255,.03)',border:'1px solid rgba(255,255,255,.06)',borderRadius:14,textAlign:'center'}},
              el('div',{style:{fontSize:'.65rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'.1em',color:'rgba(255,255,255,.3)',marginBottom:6}},'Your Points'),
              el('div',{style:{fontSize:'2rem',fontWeight:900,color:'#f5f5f7'}},b.speakerPoints?.user||'—'),
            ),
            el('div',{style:{flex:1,padding:'16px 20px',background:'rgba(255,255,255,.03)',border:'1px solid rgba(255,255,255,.06)',borderRadius:14,textAlign:'center'}},
              el('div',{style:{fontSize:'.65rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'.1em',color:'rgba(255,255,255,.3)',marginBottom:6}},'AI Points'),
              el('div',{style:{fontSize:'2rem',fontWeight:900,color:'rgba(255,255,255,.4)'}},b.speakerPoints?.ai||'—'),
            ),
            wr.total>=2&&el('div',{style:{flex:1,padding:'16px 20px',background:'rgba(255,255,255,.03)',border:'1px solid rgba(255,255,255,.06)',borderRadius:14,textAlign:'center'}},
              el('div',{style:{fontSize:'.65rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'.1em',color:'rgba(255,255,255,.3)',marginBottom:6}},'Overall Win Rate'),
              el('div',{style:{fontSize:'2rem',fontWeight:900,color:wr.rate>=0.5?'#22c55e':'#f59e0b'}},Math.round(wr.rate*100)+'%'),
            ),
          ),

          // Key clash
          b.keyClash&&el('div',{style:{padding:'16px 20px',background:'rgba(255,255,255,.03)',border:'1px solid rgba(255,255,255,.06)',borderRadius:14,marginBottom:20}},
            el('div',{style:{fontSize:'.65rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'.1em',color:'#f59e0b',marginBottom:6}},'Key Clash'),
            el('p',{style:{fontSize:'.88rem',color:'rgba(255,255,255,.6)',lineHeight:1.5}},b.keyClash),
          ),

          // Per-speech breakdown
          b.speeches&&b.speeches.length>0&&el('div',{style:{marginBottom:20}},
            el('div',{style:{fontSize:'.65rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'.1em',color:'rgba(255,255,255,.3)',marginBottom:12}},'Speech Breakdown'),
            b.speeches.map((sp,i)=>el('div',{key:i,style:{padding:'14px 18px',background:'rgba(255,255,255,.02)',border:'1px solid rgba(255,255,255,.04)',borderRadius:12,marginBottom:8}},
              el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}},
                el('span',{style:{fontWeight:700,fontSize:'.85rem',color:'rgba(255,255,255,.7)'}},sp.code+' — '+sp.who),
                el('span',{style:{fontSize:'1.1rem',fontWeight:900,color:sp.score>=28?'#22c55e':sp.score>=27?'#f5f5f7':'#f59e0b'}},sp.score),
              ),
              sp.strengths&&el('div',{style:{marginBottom:4}},sp.strengths.map((s,j)=>
                el('div',{key:'s'+j,style:{fontSize:'.78rem',color:'rgba(100,220,100,.6)',paddingLeft:12}},'✦ '+s)
              )),
              sp.improvements&&sp.improvements.map((s,j)=>
                el('div',{key:'i'+j,style:{fontSize:'.78rem',color:'rgba(239,68,68,.6)',paddingLeft:12}},'✧ '+s)
              ),
            )),
          ),

          // Overall strengths/weaknesses
          (b.overallStrengths||b.overallWeaknesses)&&el('div',{style:{display:'flex',gap:12,marginBottom:20}},
            b.overallStrengths&&el('div',{style:{flex:1,padding:'14px 18px',background:'rgba(34,197,94,.04)',border:'1px solid rgba(34,197,94,.1)',borderRadius:14}},
              el('div',{style:{fontSize:'.65rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'.1em',color:'#22c55e',marginBottom:8}},'Strengths'),
              b.overallStrengths.map((s,i)=>el('div',{key:i,style:{fontSize:'.8rem',color:'rgba(255,255,255,.5)',marginBottom:4}},'• '+s)),
            ),
            b.overallWeaknesses&&el('div',{style:{flex:1,padding:'14px 18px',background:'rgba(239,68,68,.04)',border:'1px solid rgba(239,68,68,.1)',borderRadius:14}},
              el('div',{style:{fontSize:'.65rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'.1em',color:'#ef4444',marginBottom:8}},'To Improve'),
              b.overallWeaknesses.map((s,i)=>el('div',{key:i,style:{fontSize:'.8rem',color:'rgba(255,255,255,.5)',marginBottom:4}},'• '+s)),
            ),
          ),

          // Practice advice
          b.practiceAdvice&&el('div',{style:{padding:'16px 20px',background:'rgba(59,130,246,.06)',border:'1px solid rgba(59,130,246,.15)',borderRadius:14,marginBottom:20}},
            el('div',{style:{fontSize:'.65rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'.1em',color:'#3b82f6',marginBottom:6}},'Practice This Next'),
            el('p',{style:{fontSize:'.88rem',color:'rgba(255,255,255,.6)',lineHeight:1.5}},b.practiceAdvice),
          ),
        ),

        // Fallback: raw text if JSON parse failed
        !b&&feedback&&el('div',{className:'fb-card'},el('div',{className:'feedback-text'},feedback)),

        el('button',{className:'transcript-btn',style:{marginTop:28},onClick:()=>setShowTx(!showTx)},showTx?'▼ Hide round transcript':'▶ Show round transcript'),
        showTx&&el('div',{className:'transcript-box',style:{maxHeight:360}},log.map(l=>'['+l.code+' — '+l.who+']\n'+l.text).join('\n\n---\n\n')),

        el('div',{className:'row-c',style:{marginTop:28}},
          el('button',{className:'cta-ghost',onClick:copyAll},'Copy Transcript'),
          el('button',{className:'cta',style:{marginTop:0}},el('span',{onClick:newRound},'New Round')),
        ),
      )
    );
  }

  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(el(App));
</script>
</body>
</html>
