    var fadeNodes = shell.querySelectorAll('.eyebrow, h1, .lede, .meta-strip, .status, .countdown, .btn-row, .organized-pivot, .pairing-ticker, .queue-stats, .diag, .foot, .format-pill');
    Array.prototype.forEach.call(fadeNodes, function(el){
      el.style.transition = 'opacity .35s ease';
      el.style.opacity = '0';
    });

    setTimeout(function(){
      // Beat is done — stop the radar (we're about to navigate to the
      // round room anyway) and swap to the matched markup. Cascading
      // fade-in via transition-delay on each child.
      if (radarHandle && radarHandle.stop){ try { radarHandle.stop(); } catch(e){} radarHandle = null; }

      shell.innerHTML =
        '<div class="eyebrow" style="background:rgba(34,197,94,.10);border-color:rgba(34,197,94,.4);color:#4ade80;opacity:0;transition:opacity .4s ease"><span class="pip" style="background:#22c55e;box-shadow:0 0 8px #22c55e"></span>Match found</div>' +
        '<h1 style="opacity:0;transition:opacity .4s ease .08s">You\'re paired with <em>' + escHtml(peerName || 'a debater') + '</em>.</h1>' +
        '<p class="lede" style="opacity:0;transition:opacity .4s ease .16s">Joining the round room now. Camera + mic prompt in a sec; accept and you\'re live.</p>' +
        '<div class="orb-wrap matched" id="orbWrap" style="opacity:0;transition:opacity .4s ease .24s"><div class="orb-glow"></div><div class="orb-ring"></div><div class="orb-core"></div></div>' +
        '<div class="status" style="opacity:0;transition:opacity .4s ease .32s">Loading round…</div>';

      // Double-rAF so the opacity:0 → opacity:1 transition actually
      // plays — setting both in the same paint tick is a no-op.
      requestAnimationFrame(function(){
        requestAnimationFrame(function(){
          var nodes = shell.querySelectorAll('.eyebrow, h1, .lede, .orb-wrap, .status');
          Array.prototype.forEach.call(nodes, function(el){ el.style.opacity = '1'; });
        });
      });
    }, beatMs);
  }

  // ── Render: AI fallback fired ────────────────────────
  // Fire-and-forget POST to /api/log-missed-match. Increments the
  // public missed-match counter that's displayed on /spar's meta strip
  // and /live's callout. Dedupes via sessionStorage so a tab refresh
  // mid-queue doesn't double-count: same (format, joinedAtMs, reason)
  // tuple only fires once per browser session.
  function logMissedMatch(reason){
    try {
      var key = 'da-missed-' + formatParam + '-' + state.joinedAtMs + '-' + reason;
      if (sessionStorage.getItem(key)) return;
      sessionStorage.setItem(key, '1');
    } catch (e) { /* private mode — proceed without dedupe */ }
    try {
      fetch('/api/log-missed-match', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ format: formatParam, reason: reason }),
        keepalive: true, // survive navigation in renderFallback
      }).catch(function(){});
    } catch (e) { /* never block the flow on a logging failure */ }
  }

  // Spar intent. Fired once per tab session the moment a search starts,
  // whether it ends in a pairing, a fast AI fallback, or a cancel. This
  // is the honest "how many people looked for a live round this week"
  // signal — a superset of misses (every miss had an attempt, but plenty
  // of attempts never reach the >=15s "miss" bar). Deduped per format per
  // tab session so repeat searches don't inflate it.
  function logSparAttempt(){
    try {
      var k = 'da-spar-attempt-' + formatParam;
      if (sessionStorage.getItem(k)) return;
      sessionStorage.setItem(k, '1');
    } catch (e) { /* private mode — proceed without dedupe */ }
    try {
      fetch('/api/log-missed-match', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ format: formatParam, reason: 'attempt' }),
        keepalive: true,
      }).catch(function(){});
    } catch (e) { /* never block the flow on a logging failure */ }
  }

  function renderFallback(){
    removeWaitRail();
    shell.innerHTML =
      '<div class="eyebrow" style="background:rgba(245,158,11,.10);border-color:rgba(245,158,11,.4);color:#fbbf24"><span class="pip" style="background:#f59e0b;box-shadow:0 0 8px #f59e0b"></span>AI Fallback</div>' +
      '<h1>No human yet. <em>Spinning up the AI</em>.</h1>' +
      '<p class="lede">The queue is thin right now. Handing you to the AI sparring partner so you don\'t lose your prep time. You stay available in the background; if a human shows up, a match card pops wherever you are.</p>' +
      '<div class="orb-wrap"><div class="orb-glow"></div><div class="orb-ring"></div><div class="orb-core"></div></div>' +
      '<div class="status">Loading AI round…</div>';
    try { gtag('event', 'spar_ai_fallback', { format: formatParam }); } catch(e){}
    // Fallback timeout = a real "missed match" — they tried, nobody showed.
    logMissedMatch('fallback');
    setTimeout(function(){ location.href = '/debate-it'; }, 1200);
  }

  // ── Count-up timer (no forced AI fallback) ───────────
  // The user can leave the page and come back — no 4-minute wall.
  // AI fallback is still reachable via the "Skip to AI" link.
  // Notification permission is requested at 8s so the OS can ping
  // the user when a match lands while they're in another tab.
  function startCountdown(){
    if (state.countdownInterval) clearInterval(state.countdownInterval);
    state.pingAsked = false;
    state.countdownInterval = setInterval(function(){
      var elapsed = Math.floor((Date.now() - state.joinedAtMs) / 1000);
      var num = document.getElementById('countdownNum');
      if (num){
        var mm = Math.floor(elapsed / 60);
        var ss = elapsed % 60;
        num.textContent = mm + ':' + (ss < 10 ? '0' : '') + ss;
      }
      if (elapsed >= 8 && !state.pingAsked){
        state.pingAsked = true;
        requestPingPermission();
      }
    }, 250);
  }

  function requestPingPermission(){
    try {
      if (window.Notification && Notification.permission === 'default'){
        var r = Notification.requestPermission();
        if (r && r.catch) r.catch(function(){});
      }
    } catch(e){}
  }

  function pingMatchFound(name){
    try { if (window.SFX){ if (SFX.success) SFX.success(); else if (SFX.notify) SFX.notify(); } } catch(e){}
    try {
      if (document.hidden && window.Notification && Notification.permission === 'granted'){
        var n = new Notification('Opponent ready', {
          body: 'vs ' + (name || 'a debater') + '. Jump back in to start.',
          icon: '/favicon.svg',
          tag: 'da-spar-match'
        });
        n.onclick = function(){ try { window.focus(); } catch(e){} try { n.close(); } catch(e){} };
      }
    } catch(e){}
  }

  // ── Queue logic ──────────────────────────────────────
  // matchmaking_queue/{uid}: {
  //   uid, format, status: 'waiting' | 'consent' | 'matched' | 'matched_ai' | 'cancelled',
  //   joinedAt, matchedWith, room,
  //   paradigm,                  // my judge-instructions note (≤240 chars)
  //   skipUids,                  // peers I declined / who declined me (mutual, per session)
  //   // status 'consent' adds (written by spar-pair, admin SDK):
  //   paradigms: {uid: note},    // both notes, per uid
  //   consents: {uid: bool},     // per-uid handshake; both true → matched
  //   proposedAt, lastPassBy, lastPassAt,
  //   // status 'matched' adds:
  //   pairedParadigm,            // name-attributed agreed notes → /live-round ballot
  // }
  // Pairing strategy: real-time onSnapshot listener on the queue +
  // 2s polling fallback + transaction. The listener triggers an
  // immediate match attempt the instant a peer joins the queue; the
  // poll covers any case where the snapshot stream stalls (network
  // blip, Firestore reconnect). Whichever client races the
  // transaction first wins; the loser sees its own doc updated by
  // the winner's transaction and follows the same room link.
  //
  // ──────────────── REQUIRED Firebase config ────────────────
  // 1. Firestore security rules on matchmaking_queue:
  //      match /matchmaking_queue/{uid} {
  //        allow read: if request.auth != null;
  //        allow create, update, delete: if request.auth != null
  //          && (request.auth.uid == uid
  //              || resource.data.matchedWith == request.auth.uid);
  //      }
  //    The matchedWith clause is what lets the WINNING client of a
  //    race transaction also update the LOSING peer's doc to mark it
  //    matched. Without it the transaction succeeds for self and
  //    fails for peer, leaving the loser stuck on "searching."
  //
  // 2. Composite index for the polling query (Firebase Console →
  //    Firestore → Indexes):
  //      collection: matchmaking_queue
  //      fields:     status ASC, joinedAt ASC
  //
  // Without (1) clients can't write/read the queue at all. Without
  // (2) the polling query can fail and
  // every spar request falls through to the AI fallback at 4 min.
  // ──────────────────────────────────────────────────────────
  function joinQueue(){
    if (!state.user || !firebaseDb) return;
    state.cancelled = false;
    state.joinedAtMs = Date.now();
    // Remember the chosen format for the background matcher —
    // js/notifications.js fmt() reads 'debateos-spar-format' and falls
    // back to 'apda' when it was never written.
    try { localStorage.setItem('debateos-spar-format', formatParam); } catch(e){}
    // 2026-06-12: searching doubles as sitewide availability. Flip the
    // same 'da-spar-bg' flag the topbar "Available" pill + background
    // matcher read, so leaving /spar mid-search keeps this user
    // matchable everywhere (notifications.js heartbeats the doc and
    // pops the match card on whatever page they're on). Cleared by
    // Cancel below; a match consumes the doc through the normal flow.
    try { localStorage.setItem('da-spar-bg', '1'); } catch(e){}
    var ref = firebaseDb.collection('matchmaking_queue').doc(state.user.uid);
    state.queueDocRef = ref;
    var shortName = shortNameOf(state.user);
    var blockedUids = [];
    try {
      blockedUids = JSON.parse(localStorage.getItem('dit-blocked-users') || '[]');
      if (!Array.isArray(blockedUids)) blockedUids = [];
    } catch(e){ blockedUids = []; }
    ref.set({
      uid: state.user.uid,
      displayName: shortName,
      photoURL: state.user.photoURL || '',
      anonymous: !!state.user.isAnonymous,
      format: formatParam,
      paradigm: state.paradigm || '',
      blockedUids: blockedUids.slice(-100),
      status: 'waiting',
      joinedAt: firebase.firestore.FieldValue.serverTimestamp(),
    }).then(function(){
      try { gtag('event', 'spar_queue_join', { format: formatParam }); } catch(e){}
      // Going live: ping debaters who opted into live-round alerts (Web Push,
      // even while they're in another app). Named accounts only; server
      // enforces a per-debater cooldown. Helper lives in js/notifications.js.
      try { if (window.daBroadcastGoLive) window.daBroadcastGoLive(formatParam, 'spar'); } catch(e){}
      subscribeMyDoc();
      startMatchPolling();
      startQueueHeartbeat();
    }).catch(function(err){
      console.warn('[spar] queue join failed:', err);
      // Pattern-match on the error so the user gets a real next step
      // instead of a raw Firebase error code. Each branch maps to one
      // of the four most-likely failure modes documented above the
      // function: rules misconfig (1), composite-index missing
      // surfacing as a permission error too sometimes, network drop,
      // unknown.
      var raw = (err && (err.message || err.code)) || 'unknown';
      var msg;
      if (/resource-exhausted|resource_exhausted|quota|429/i.test(raw)) {
        // Firestore is refusing ops — the live matching backend is at
        // capacity (e.g. a daily quota was hit). Don't leave the user on
        // an endless "searching"; tell them plainly and point at the AI
        // round, which doesn't touch the queue.
        msg = "Live matching is temporarily at capacity, so we can't reach the queue right now. Take an AI round instead, or check back in a bit.";
      } else if (/permission|denied|insufficient/i.test(raw)) {
        msg = "Couldn't join the queue (permissions). The Firestore rule for matchmaking_queue likely needs updating to allow signed-in users to write their own doc. Skip to AI for now.";
      } else if (/network|offline|unavailable|failed-precondition/i.test(raw)) {
        msg = "Network problem reaching the queue. Check your connection and try again.";
      } else {
        msg = "Couldn't join the queue: " + raw + ". Skip to AI or refresh.";
      }
      shell.innerHTML += '<div class="error">' + escHtml(msg) + ' <a href="/debate-it" style="color:inherit;text-decoration:underline">Skip to AI</a>.</div>';
    });
    renderSearching();
  }

  // Listen to my own queue doc — when ANOTHER user's transaction marks
  // me as matched, this fires and I navigate to the round.
  function subscribeMyDoc(){
    if (!state.queueDocRef) return;
    if (state.queueUnsub){ try { state.queueUnsub(); } catch(e){} }
    state.queueUnsub = state.queueDocRef.onSnapshot(function(doc){
      if (!doc.exists) return;
      var d = doc.data();
      // Mirror my mutual-skip list (declined consent proposals) so
      // tryMatch stops POSTing at peers the server will refuse anyway.
      // Stamps ride along so local checks expire in step with the
      // server's SKIP_TTL_MS; a bare legacy array reads as expired.
      state.skipUids = Array.isArray(d.skipUids) ? d.skipUids : [];
      state.skipAtLocal = {};
      if (d.skipAt){
        Object.keys(d.skipAt).forEach(function(u){
          var at = d.skipAt[u];
          var t = (at && typeof at.toMillis === 'function') ? at.toMillis()
                : (at && at.seconds != null) ? at.seconds * 1000 : 0;
          if (t) state.skipAtLocal[u] = t;
        });
      }
      if (d.status === 'matched' && d.room && d.matchedWith){
        pingMatchFound(d.matchedWithName || '');
        teardownQueue();
        // The matched-state render is cosmetic; navigation into the
        // round is the load-bearing step. Never let a render error
        // (e.g. a future undefined ref) swallow the navigation and
        // strand a successfully-paired user on the search screen.
        try { renderMatched(d.room, d.matchedWithName || 'a debater'); }
        catch (e) { console.warn('[spar] renderMatched failed, navigating anyway', e); }
        navigateToRound(d, 900);
      } else if (d.status === 'consent' && d.matchedWith){
        pingMatchFound(d.matchedWithName || '');
        // Two-phase match: someone's judge-paradigm note needs eyes
        // before the round exists. spar-pair wrote the full proposal
        // onto both docs; render the accept/pass card off mine.
        try { renderConsentGate(d); }
        catch (e) {
          // Log only. Auto-passing here used to dissolve the pair with
          // a MUTUAL skip on a transient render bug, which silently
          // bricked rematching for the whole session. The peer's
          // timers (20s/30s) unwind a genuinely dead handshake anyway.
          console.warn('[spar] renderConsentGate failed', e);
        }
      } else if (d.status === 'waiting' && state.inConsent){
        // Proposal fell through (opponent passed, withdrew, or timed
        // out) — server already reverted my doc; back to the hunt.
        exitConsentToSearch(d);
      } else if (d.status === 'cancelled'){
        // Distinguish a system cancel from a user cancel. The pair
        // function's stale-peer skip and the reaper sweep both stamp a
        // cancelReason; if WE didn't hit Cancel and the cancel came
        // from one of those, re-join the queue instead of bouncing the
        // user off the page. Without this, a single false stale-skip
        // (e.g. an unresolved serverTimestamp on a fresh peer) ejected
        // a live, waiting debater straight to the homepage.
        var systemCancel = (d.cancelReason === 'stale_peer_skip'
                         || d.cancelReason === 'stale_reaper'
                         // My doc got ghost-cancelled by a consent
                         // proposer whose timers gave up on me — if
                         // I'm actually here (snapshot stream stall,
                         // OS sleep), rejoin with a clean doc.
                         || d.cancelReason === 'consent_ghost');
        if (systemCancel && !state.cancelled){
          console.info('[spar] system cancel (' + d.cancelReason + '), re-queueing');
          updateDiag({ last: 're-queue' });
          teardownQueue();
          // Fresh doc on re-join → fresh serverTimestamp → no repeat skip.
          setTimeout(function(){ if (!state.cancelled) joinQueue(); }, 400);
          return;
        }
        teardownQueue();
        location.href = '/';
      }
    }, function(err){
      console.warn('[spar] subscribeMyDoc error', err);
    });
  }
  function shortNameOf(u){
    if (!u) return 'You';
    if (u.isAnonymous) return guestName(u);
    var fullName = (u.displayName || '').trim();
    var parts = fullName.split(/\s+/).filter(Boolean);
    return parts.length >= 2
      ? parts[0] + ' ' + parts[parts.length - 1][0].toUpperCase() + '.'
      : (parts[0] || 'You');
  }

  function navigateToRound(d, delay){
    if (!d || !d.room || state.roundNavPending || state.cancelled) return;
    state.roundNavPending = true;
    // Build the live-round URL. We do not need to know which side this
    // browser got; the round-room infra reconciles from proUid/conUid.
    var params = new URLSearchParams({
      motion: d.pairedMotion || '',
      format: d.pairedFormat || formatParam,
      pro: d.proName || shortNameOf(state.user),
      con: d.conName || (d.matchedWithName || 'Opponent'),
      proUid: d.proUid || (state.user && state.user.uid) || '',
      conUid: d.conUid || d.matchedWith || '',
      room: d.room,
      paradigm: d.pairedParadigm || '',
      source: 'spar',
    });
    setTimeout(function(){ location.href = '/live-round.html?' + params.toString(); }, delay || 0);
  }

  // ── Consent gate ─────────────────────────────────────
  // A judge-paradigm note never reaches the round without both
  // debaters' eyes on it. When spar-pair lands a candidate pair where
  // either side filed one, both docs sit in status 'consent' and this
  // card renders. Accept POSTs phase 2; pass (or the auto-pass timer,
  // or a dead peer) unwinds both docs back to 'waiting' with a mutual
  // skip so the same pair isn't re-proposed.
  var CONSENT_DECIDE_SEC = 15;   // reading + deciding window (auto-JOINS at 0 if visible)
  // Waiting-on-peer net. Tab close no longer deletes queue docs (the
  // queue follows users across the app), so proposing to a ghost is a
  // ROUTINE case: a live deciding peer always acts by ~20s (their own
  // auto-pass), so 30s of silence means dead tab — unwind and move on.
  // Server-side ghost detection (spar-pair GHOST_CONSENT_MS, 25s) sits
  // between the two windows.
  var CONSENT_WAIT_SEC   = 30;
  var BASE_TITLE = document.title;

  // Stop the search machinery without dropping my own doc listener —
  // subscribeMyDoc is what drives every consent transition. The
  // AI-fallback countdown pauses too: a proposal on screen is not
  // "nobody showed up."
  function pauseSearchForConsent(){
    if (state.countdownInterval){ clearInterval(state.countdownInterval); state.countdownInterval = null; }
    if (state.matchPollInterval){ clearInterval(state.matchPollInterval); state.matchPollInterval = null; }
    if (state.queueWatchUnsub){ try { state.queueWatchUnsub(); } catch(e){} state.queueWatchUnsub = null; }
    state.pairInFlight = false;
  }

  function clearConsentTimer(){
    if (state.consentTimer){ clearInterval(state.consentTimer); state.consentTimer = null; }
  }

  // secs → timeout. pass showNum=false for the silent safety net on the
  // waiting-on-peer view (a visible timer there reads as pressure on YOU
  // when the wait is on THEM). Timer-fired actions carry auto:true so the
  // server can tell idle-timeout from a human click.
  //
  // autoAccept (2026-06-15, B): on the DECIDING card we now auto-JOIN at
  // 0 instead of auto-passing — a present user who doesn't click still
  // gets the match rather than losing it (matchmaking is low-liquidity;
  // dropping rare pairs to a slow click hurt more than it helped). Guard:
  // only auto-accept when the tab is VISIBLE. A hidden/dead tab can't
  // actually navigate into the room, so accepting there would strand the
  // opponent alone — fall back to the old auto-pass in that case. The
  // waiting-on-peer net keeps autoAccept=false (always unwind a ghost).
  function startConsentCountdown(peerUid, secs, showNum, autoAccept){
    clearConsentTimer();
    var deadline = Date.now() + secs * 1000;
    state.consentTimer = setInterval(function(){
      var left = Math.max(0, Math.ceil((deadline - Date.now()) / 1000));
      if (showNum){
        var el = document.getElementById('consentCountNum');
        if (el) el.textContent = String(left);
      }
      if (left <= 0){
        clearConsentTimer();
        var join = !!autoAccept && (typeof document === 'undefined' || document.visibilityState === 'visible');
        sendConsent(peerUid, join, true);
      }
    }, 250);
  }

  // Short two-note "match found" ping. WebAudio so we ship no asset; the
  // context resumes off the click that put the user in the queue, so it's
  // allowed to sound. Wrapped in try/catch — audio is a nicety, never a
  // blocker for the consent card rendering.
  function sparChime(){
    try {
      var AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return;
      if (!state.audioCtx) state.audioCtx = new AC();
      var ctx = state.audioCtx;
      if (ctx.state === 'suspended') { try { ctx.resume(); } catch(e){} }
      var t0 = ctx.currentTime;
      [880, 1318.5].forEach(function(f, i){
        var o = ctx.createOscillator(), g = ctx.createGain();
        o.type = 'sine'; o.frequency.value = f;
        var t = t0 + i * 0.15;
        g.gain.setValueAtTime(0.0001, t);
        g.gain.exponentialRampToValueAtTime(0.2, t + 0.02);
        g.gain.exponentialRampToValueAtTime(0.0001, t + 0.24);
        o.connect(g); g.connect(ctx.destination);
        o.start(t); o.stop(t + 0.26);
      });
    } catch(e){}
  }

  function renderConsentGate(d){
    var me = state.user.uid;
    var peerUid = d.matchedWith;
    var paradigms = d.paradigms || {};
    var consents = d.consents || {};
    var myConsent = !!consents[me];
    var peerConsent = !!consents[peerUid];
    // Snapshot streams echo every write; only re-render (and reset the
    // countdown) when the consent state actually moved.
    var key = peerUid + '|' + (myConsent ? 1 : 0) + '|' + (peerConsent ? 1 : 0);
    if (state.inConsent && state.consentKey === key) return;
    var firstRender = !state.inConsent;
    state.inConsent = true;
    state.consentKey = key;
    // Keep the latest doc around so a failed consent POST can restore
    // a usable card instead of leaving dead disabled buttons.
    state.lastConsentDoc = d;
    state.consentPending = 0;
    if (firstRender) pauseSearchForConsent();

    var peerName = escHtml(d.matchedWithName || 'Your opponent');
    var fmtLabel = escHtml(FORMAT_LABELS[d.pairedFormat] || String(d.pairedFormat || 'this').toUpperCase());
    var theirNote = cleanParadigm(paradigms[peerUid]);
    var myNote = cleanParadigm(paradigms[me]);
    // Cross-format proposal: the two sides proposed different styles.
    // Build a "your proposal X · their proposal Y · play Z" block so
    // nobody is dropped into a format they didn't pick without saying
    // yes first.
    var crossFmt = !!d.crossFormat;
    var labelFor = function(f){ return escHtml(FORMAT_LABELS[f] || String(f || '').toUpperCase()); };
    var formatBlock = '';
    if (crossFmt){
      formatBlock =
        '<div class="consent-format">' +
          '<div class="consent-format-row"><span class="consent-format-who">Your proposal</span><strong>' + labelFor(d.myFormatPref) + '</strong></div>' +
          '<div class="consent-format-row"><span class="consent-format-who">' + peerName + ' proposes</span><strong>' + labelFor(d.peerFormat) + '</strong></div>' +
          '<div class="consent-format-row play"><span class="consent-format-who">Proposed round</span><strong>' + fmtLabel + '</strong></div>' +
        '</div>';
    }

    if (myConsent){
      // My half of the handshake is in (their note was empty, or I
      // already accepted). The wait is on them reading my note.
      shell.innerHTML =
        '<div class="consent-wrap">' +
          '<div class="eyebrow"><span class="pip"></span>Match found · awaiting opponent</div>' +
          '<h1>Waiting on <em>' + peerName + '.</em></h1>' +
          '<p class="lede">' + (crossFmt ? 'They\'re confirming the <strong>' + fmtLabel + '</strong> round. It starts the moment they accept.' : 'They\'re reading your judge instructions. The round starts the moment they accept.') + '</p>' +
          (crossFmt ? formatBlock : '') +
          (myNote ? '<div class="consent-note mine"><div class="consent-note-label">Your instructions to the judge</div>' + escHtml(myNote) + '</div>' : '') +
          '<div class="btn-row"><button class="btn ghost" id="consentPassBtn">Withdraw &amp; keep searching</button></div>' +
        '</div>';
      var wb = document.getElementById('consentPassBtn');
      if (wb) wb.addEventListener('click', function(){
        clearConsentTimer();
        sendConsent(peerUid, false);
      });
      // Silent safety net: if their tab died mid-read, unwind instead
      // of waiting forever. Stays auto-PASS (autoAccept=false) — I've
      // already accepted; this net only exists to free me from a ghost.
      startConsentCountdown(peerUid, CONSENT_WAIT_SEC, false, false);
      return;
    }

    var noteBlocks = '';
    if (theirNote){
      noteBlocks += '<div class="consent-note"><div class="consent-note-label">' + peerName + '\'s instructions to the judge</div>' + escHtml(theirNote) + '</div>';
    }
    if (myNote){
      noteBlocks += '<div class="consent-note mine"><div class="consent-note-label">Yours · they\'re accepting this too</div>' + escHtml(myNote) + '</div>';
    }
    // Lede depends on what they're being asked to OK: a format switch, a
    // judge note, or both. Format gets named first since it changes the
    // whole round; the note rides on top of the standard ballot method.
    var lede;
    if (crossFmt && (theirNote || myNote)){
      lede = 'You proposed different formats. Run the <strong>' + fmtLabel + '</strong> round, with the judge instructions below applied on top. Accept to start, pass to keep searching.';
    } else if (crossFmt){
      lede = 'You proposed different formats. Accept to debate this round in <strong>' + fmtLabel + '</strong>, or pass to keep searching.';
    } else {
      lede = 'The judge applies the instructions below on top of the standard ballot method. Accept to start, pass to keep searching.';
    }
    shell.innerHTML =
      '<div class="consent-wrap">' +
        '<div class="eyebrow"><span class="pip"></span>Match found · needs your OK</div>' +
        '<h1>' + peerName + ' proposes a <em>' + fmtLabel + '</em> round.</h1>' +
        '<p class="lede">' + lede + '</p>' +
        formatBlock +
        noteBlocks +
        '<div class="btn-row">' +
          '<button class="btn primary" id="consentAcceptBtn">Accept &amp; start</button>' +
          '<button class="btn ghost" id="consentDeclineBtn">Pass</button>' +
        '</div>' +
        '<div class="countdown">Auto-join in <strong id="consentCountNum">' + CONSENT_DECIDE_SEC + '</strong>s</div>' +
      '</div>';
    document.getElementById('consentAcceptBtn').addEventListener('click', function(){
      this.disabled = true;
      this.textContent = 'Locking in…';
      var dec = document.getElementById('consentDeclineBtn');
      if (dec) dec.disabled = true;
      clearConsentTimer();
      sendConsent(peerUid, true);
    });
    document.getElementById('consentDeclineBtn').addEventListener('click', function(){
      clearConsentTimer();
      sendConsent(peerUid, false);
    });
    startConsentCountdown(peerUid, CONSENT_DECIDE_SEC, true, true);
    // Ping the moment a real human match lands (B, 2026-06-15): the user
    // asked not to be dropped in silently. Only on first render so a
    // snapshot re-paint doesn't double-chime.
    if (firstRender) sparChime();
    // Tab-title nudge — the proposal has a short shelf life and the user
    // may be in another tab ("queue follows you" makes that common).
    document.title = '● Match found · Spar';
  }

  function sendConsent(peerUid, accept, auto){
    if (!firebaseAuth || !firebaseAuth.currentUser) return;
    try { gtag('event', accept ? 'spar_consent_accept' : 'spar_consent_pass', { format: formatParam, auto: !!auto }); } catch(e){}
    firebaseAuth.currentUser.getIdToken().then(function(idToken){
      return fetch('/.netlify/functions/spar-pair', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + idToken,
        },
        body: JSON.stringify({ action: 'consent', accept: !!accept, auto: !!auto, peerUid: peerUid }),
      });
    }).then(function(res){
      return res.json().catch(function(){ return {}; });
    }).then(function(j){
      if (j && j.ok) return;
      // Doc snapshots drive every UI transition. 'consent_state_gone'
      // needs nothing from us — my own snapshot already moved me (or
      // is about to). Anything else (throttle 429, 5xx, weird body)
      // left the proposal ALIVE but my click dead — restore a usable
      // card so the user can act again instead of staring at disabled
      // buttons until a timer unwinds everything.
      var reason = (j && (j.reason || j.error)) || 'unknown';
      if (reason === 'consent_state_gone'){
        console.info('[spar] consent state gone before my ' + (accept ? 'accept' : 'pass'));
        return;
      }
      console.warn('[spar] consent POST soft-failed:', reason);
      recoverConsentCard();
    }).catch(function(err){
      // Network blip mid-click: same recovery. The auto-pass timers
      // (mine or the peer's) still backstop a never-delivered decline.
      console.warn('[spar] consent POST failed', err);
      recoverConsentCard();
    });
  }

  // Re-render the consent card from the last doc snapshot after a
  // failed POST — fresh buttons, fresh countdown, user can retry.
  function recoverConsentCard(){
    if (!state.inConsent || !state.lastConsentDoc) return;
    state.consentKey = '';
    try { renderConsentGate(state.lastConsentDoc); } catch(e){}
  }

  function exitConsentToSearch(d){
    state.inConsent = false;
    state.consentKey = '';
    state.consentPending = 0;
    state.lastConsentDoc = null;
    clearConsentTimer();
    document.title = BASE_TITLE;
    // Server refreshed joinedAt on the revert — restart the local
    // clocks to match so the AI fallback gets a fresh window.
    state.joinedAtMs = Date.now();
    renderSearching();
    startMatchPolling();
    if (d && d.lastPassBy){
      var stats = document.getElementById('queueStats');
      if (stats){
        // Hold the notice on screen — tryMatch repaints the stats slot
        // every ~2s and would otherwise blink this away unread.
        state.noticeUntil = Date.now() + 7000;
        stats.innerHTML = '<div style="margin-top:14px;padding:10px 14px;background:var(--bg-card);border:1px solid var(--border);border-radius:10px;color:var(--text-dim);font-size:.78rem;font-weight:600">' + escHtml(d.lastPassBy) + ' passed on the proposal. Still searching.</div>';
      }
    }
  }

  // Real-time queue watcher + polling fallback. The snapshot listener
  // fires the moment another peer's queue doc lands in Firestore,
  // making pairing sub-second instead of up-to-2s with polling alone.
  // Polling stays as a fallback for snapshot-stream hiccups (network
  // blip, Firestore reconnect, cold-start latency).
  //
  // Debounce: rapid-fire snapshot events (multiple peers joining at
  // once) coalesce to one tryMatch per ~150ms so we don't pile up
  // transaction attempts.
  function startMatchPolling(){
    if (state.matchPollInterval) clearInterval(state.matchPollInterval);
    // The onSnapshot listener below is the REAL matcher: it fires within
    // ~150ms of any waiting-doc change (a peer joins, heartbeats, matches),
    // so a live peer is picked up near-instantly regardless of this poll.
    // This interval is only a backstop for a dropped listener stream. It
    // used to run every 2s, and each tick does a 12-doc get() — ~14k reads
    // per hour for ONE person just sitting on the searching screen, which
    // is what blows the Firestore read quota. 15s keeps the safety net at
    // a fraction of the cost; matching speed is unchanged (the listener
    // owns the fast path).
    state.matchPollInterval = setInterval(tryMatch, 15000);
    setTimeout(tryMatch, 600); // first attempt fast

    if (state.queueWatchUnsub){ try { state.queueWatchUnsub(); } catch(e){} }
    state.queueWatchUnsub = firebaseDb.collection('matchmaking_queue')
      .where('status', '==', 'waiting')
      .limit(8)
      .onSnapshot(function(){
        if (state.matchTriggerPending) return;
        state.matchTriggerPending = true;
        // Coalesce a burst of changes (e.g. several people joining or
        // heartbeating at once) into one tryMatch get() instead of one
        // per change. 500ms still feels instant and cuts the read
        // amplification when the queue is active.
        setTimeout(function(){
          state.matchTriggerPending = false;
          tryMatch();
        }, 500);
      }, function(err){
        console.warn('[spar] queue snapshot stream error:', err);
      });
  }

  function tryMatch(){
    if (state.cancelled || !state.user || !firebaseDb) return;
    var queue = firebaseDb.collection('matchmaking_queue');
    // Match against every waiting debater. Format and judge notes are
    // proposed terms; spar-pair routes disagreements through consent.
    var queries = [
      queue.where('status', '==', 'waiting').orderBy('joinedAt').limit(12).get(),
    ];
    Promise.all(queries).then(function(snaps){
      var seen = {};
      var others = [];
      snaps.forEach(function(snap){
        snap.docs.forEach(function(d){
          if (d.id === state.user.uid) return;
          if (seen[d.id]) return;
          // Mutual-skip filter (declined consent proposals): the server
          // would refuse the pair anyway; don't waste the POST or stall
          // the poll loop on it. Skips EXPIRE (SKIP_TTL_MS) so one passed
          // proposal can't permanently blind two live debaters.
          if (localSkipActive(d.id)) return;
          var dd = d.data();
          if (docSkips(dd, state.user.uid)) return;
          seen[d.id] = true;
          others.push(d);
        });
      });
      state.waitingPeers = others.length;
      var stats = document.getElementById('queueStats');
      if (stats && Date.now() > (state.noticeUntil || 0)){
        stats.innerHTML = renderWaitlist(others);
      }
      updateDiag({ peers: others.length });
      if (others.length === 0) return;
      others.sort(function(a, b){
        var as = (a.data().joinedAt && a.data().joinedAt.seconds) || 0;
        var bs = (b.data().joinedAt && b.data().joinedAt.seconds) || 0;
        return as - bs;
      });
      attemptMatch(others[0].id, others[0].data());
    }).catch(function(err){
      console.warn('[spar] queue query failed', err);
      // A read-only failure (the query 429s but the join write went
      // through) would otherwise leave the user on an endless "searching"
      // with no signal. If the backend is at capacity (quota exhausted),
      // surface it once — not every 2s poll — and point at the AI round.
      var raw = (err && (err.message || err.code)) || '';
      if (/resource-exhausted|resource_exhausted|quota|429/i.test(raw) && !state.capacityNoticeShown){
        state.capacityNoticeShown = true;
        var host = document.getElementById('queueStats') || shell;
        if (host){
          host.innerHTML = '<div class="error">Live matching is temporarily at capacity, so we can\'t reach the queue right now. Take an AI round instead, or check back in a bit. <a href="/debate-it" style="color:inherit;text-decoration:underline">Skip to AI</a>.</div>';
        }
      }
    });
  }

  // 2026-05-18: moved off a client-side Firestore transaction (which
  // silently failed because Firestore rules don't allow user A to
  // write user B's queue doc — the transaction could update self but
  // not the peer, leaving both stuck on "1 other debater in your
  // queue") onto a Netlify function with admin-SDK credentials that
  // updates both docs atomically. The client side just kicks the
  // function and lets subscribeMyDoc's onSnapshot drive navigation.
  //
  // Soft-fail reason codes from spar-pair (keep polling silently):
  //   lost_race        — another transaction beat us to one of the docs
  //   queue_doc_missing— peer doc got deleted between query and txn
  //   stale_peer       — peer's joinedAt is >3min old (ghost session);
  //                      spar-pair just marked it cancelled, polling
  //                      will sort to a fresher peer next tick
  // Anything else (auth/5xx/network) is a hard fail; we surface it so
  // the user knows pairing is having trouble rather than burning the
  // full fallback clock in silence.
  var PAIR_REQUEST_TIMEOUT_MS = 15000;
  function attemptMatch(peerUid /* peerData unused now */){
    if (state.cancelled || !state.user || !firebaseAuth) return;
    // Guard against re-firing while a pair attempt is in flight —
    // tryMatch polls every 2s and the snapshot listener also pokes
    // it; without this we'd fan out duplicate POSTs.
    if (state.pairInFlight) return;
    state.pairInFlight = true;
    // Self-heal: if the fetch never resolves (network limbo on mobile
    // tethering, function cold-start that hangs), the pairInFlight
    // flag would stick forever and the user would burn the full AI
    // fallback timer with no further pair attempts. Reset after 8s no
    // matter what so polling can try again.
    var timeoutId = setTimeout(function(){
      if (state.pairInFlight){
        state.pairInFlight = false;
        console.warn('[spar] spar-pair request timed out, retrying');
        updateDiag({ last: 'timeout' });
        surfacePairError('timeout');
      }
    }, PAIR_REQUEST_TIMEOUT_MS);
    firebaseAuth.currentUser.getIdToken().then(function(idToken){
      return fetch('/.netlify/functions/spar-pair', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + idToken,
        },
        body: JSON.stringify({
          peerUid: peerUid,
          format: formatParam,
        }),
      });
    }).then(function(res){
      return res.json().then(function(j){ return { ok: res.ok, status: res.status, body: j }; });
    }).then(function(r){
      clearTimeout(timeoutId);
      state.pairInFlight = false;
      if (!r.ok || !r.body || !r.body.ok) {
        var reason = r.body && r.body.reason ? r.body.reason : 'http_' + r.status;
        var soft = (reason === 'lost_race'
                 || reason === 'queue_doc_missing' || reason === 'stale_peer'
                 || reason === 'skipped_peer' || reason === 'blocked_peer');
        // Soft fails are recoverable — keep polling. Surface them in
        // the diag line so the user can see retries happening instead
        // of staring at a silent countdown. Hard fails still get the
        // banner via surfacePairError.
        updateDiag({ last: reason });
        if (!soft) {
          console.warn('[spar] spar-pair function failed:', reason, r.body);
          surfacePairError(reason);
        } else {
          console.info('[spar] soft retry:', reason);
        }
        return;
      }
      clearPairError();
      if (r.body.pending === 'consent'){
        // Not a match yet — a judge-note proposal both sides now have
        // to sign off on. My own doc snapshot renders the consent
        // card; spar_consent_accept/pass instrument the outcome. Stamp
        // consentPending so the AI-fallback clock can't fire in the
        // gap between this response and the snapshot landing.
        state.consentPending = Date.now();
        updateDiag({ last: 'consent' });
        try { gtag('event', 'spar_consent_proposed', { format: formatParam }); } catch(e){}
        return;
      }
      updateDiag({ last: 'matched' });
      try { gtag('event', 'spar_match_made', { format: formatParam }); } catch(e){}
      // The snapshot listener on my own doc should fire and navigate.
      // Fallback: if that stream stalls, use the function response so a
      // successful pair never sits on the search screen forever.
      setTimeout(function(){
        if (!state.roundNavPending && !state.cancelled && !state.inConsent){
          navigateToRound(r.body, 0);
        }
      }, 1300);
    }).catch(function(err){
      clearTimeout(timeoutId);
      state.pairInFlight = false;
      console.warn('[spar] spar-pair fetch failed', err);
      updateDiag({ last: 'network' });
      surfacePairError('network');
    });
  }

  // Diag line state — mutates the small uppercase status under the
  // queue card so the user can see what the matchmaker is doing even
  // when the bigger UI elements get replaced.
  // Holds: peer count from the last query, last spar-pair outcome,
  // and the tail of my own uid (debug-only — helps confirm two test
  // windows are on different accounts).
  var diagState = { peers: null, last: null };
  function updateDiag(patch){
    if (patch && typeof patch === 'object'){
      if ('peers' in patch) diagState.peers = patch.peers;
      if ('last' in patch) diagState.last = patch.last;
    }
    var el = document.getElementById('diagLine');
    if (!el) return;
    var uidTail = (state.user && state.user.uid) ? state.user.uid.slice(-6) : '----';
    var parts = [];
    parts.push('Queue: ' + (diagState.peers == null ? '…' : diagState.peers) + ' available');
    parts.push('proposal ' + formatParam.toUpperCase());
    parts.push('me ' + uidTail);
    if (diagState.last) parts.push('last ' + diagState.last);
    el.textContent = parts.join(' · ');
  }
  // Set the initial line so the user sees the diagnostic immediately,
  // not blank until the first query resolves.
  setTimeout(updateDiag, 50);

  // Render a small banner near the queue stats when pairing
  // hard-fails. Auto-clears on next successful attempt. Without this,
  // a misconfigured auth or function 5xx leaves the user staring at
  // "Scanning the queue" with no feedback until the AI fallback fires.
  function surfacePairError(reason){
    var stats = document.getElementById('queueStats');
    if (!stats) return;
    var msg;
    if (reason === 'timeout')      msg = 'Slow response from the matchmaker. Retrying…';
    else if (reason === 'network') msg = 'Network blip reaching the matchmaker. Retrying…';
    else if (/^http_5/.test(reason)) msg = 'Matchmaker hiccup (' + reason + '). Retrying…';
    else if (/^http_4/.test(reason)) msg = 'Auth issue reaching the matchmaker (' + reason + '). Try signing out + in.';
    else                            msg = 'Pairing error (' + reason + '). Retrying…';
    stats.innerHTML = '<div style="padding:10px 14px;background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.32);border-radius:10px;color:#fbbf24;font-size:.78rem;font-weight:600">' + escHtml(msg) + '</div>';
  }
  function clearPairError(){
    // Touched by a successful pair attempt; the matched-state UI takes
    // over the queue stats area within ~900ms via subscribeMyDoc's
    // setTimeout navigation, so we don't bother re-rendering the
    // "N other debaters" text in between.
  }

  function triggerAIFallback(){
    if (state.cancelled) return;
    // Never bulldoze a live consent handshake into matched_ai — the
    // countdown tick already guards this, but teardownQueue below
    // resets inConsent, so a stray second caller would slip through.
    if (state.inConsent) return;
    teardownQueue();
    if (state.queueDocRef){
      state.queueDocRef.update({
        status: 'matched_ai',
        matchedAt: firebase.firestore.FieldValue.serverTimestamp(),
      }).catch(function(){});
    }
    renderFallback();
  }

  // Re-stamp joinedAt every 90s while searching, mirroring the
  // background matcher in js/notifications.js. spar-pair skips (and
  // cancels) peers older than 3 min (STALE_PEER_MS) — without this
  // heartbeat the 4-minute fallback window would guarantee a
  // stale-skip cancel at 3:00 for every waiter. Trade: each re-stamp
  // moves you to the back of the joinedAt ordering, which is
  // irrelevant at current queue depth. The visible countdown reads
  // state.joinedAtMs (local), so re-stamping never resets the clock.
  function startQueueHeartbeat(){
    if (state.heartbeatInterval) clearInterval(state.heartbeatInterval);
    state.heartbeatInterval = setInterval(function(){
      if (state.cancelled || !state.queueDocRef) return;
      state.queueDocRef.update({
        joinedAt: firebase.firestore.FieldValue.serverTimestamp(),
      }).catch(function(){});
    }, QUEUE_HEARTBEAT_MS);
  }

  function cancelQueue(){
    state.cancelled = true;
    // Cancel means OFF everywhere: clear the sitewide availability
    // flag joinQueue set, so the background matcher doesn't resurrect
    // the queue doc on the next page.
    try { localStorage.removeItem('da-spar-bg'); } catch(e){}
    // Only count as a "miss" if the user spent real time in the queue
    // (>=15s). A quick click-through isn't a missed match, it's a user
    // who never really tried.
    var elapsed = state.joinedAtMs ? Math.floor((Date.now() - state.joinedAtMs) / 1000) : 0;
    if (elapsed >= 15) logMissedMatch('cancel');
    teardownQueue();
    if (state.queueDocRef){
      state.queueDocRef.update({
        status: 'cancelled',
        cancelledAt: firebase.firestore.FieldValue.serverTimestamp(),
      }).catch(function(){});
    }
    try { gtag('event', 'spar_cancel', { format: formatParam, elapsed_sec: elapsed }); } catch(e){}
    location.href = '/';
  }

  function teardownQueue(){
    if (state.consentTimer){ clearInterval(state.consentTimer); state.consentTimer = null; }
    state.inConsent = false;
    state.consentKey = '';
    state.consentPending = 0;
    state.lastConsentDoc = null;
    document.title = BASE_TITLE;
    if (state.heartbeatInterval){ clearInterval(state.heartbeatInterval); state.heartbeatInterval = null; }
    if (state.watchPollInterval){ clearInterval(state.watchPollInterval); state.watchPollInterval = null; }
    if (state.countdownInterval){ clearInterval(state.countdownInterval); state.countdownInterval = null; }
    if (state.matchPollInterval){ clearInterval(state.matchPollInterval); state.matchPollInterval = null; }
    if (state.queueUnsub){ try { state.queueUnsub(); } catch(e){} state.queueUnsub = null; }
    if (state.queueWatchUnsub){ try { state.queueWatchUnsub(); } catch(e){} state.queueWatchUnsub = null; }
    // Drop the live ops strip's Firestore listeners too — leaving
    // them attached after the search view tears down would leak.
    if (metaLiveUnsub.queue){ try { metaLiveUnsub.queue(); } catch(e){} metaLiveUnsub.queue = null; }
    if (metaLiveUnsub.waitlist){ try { metaLiveUnsub.waitlist(); } catch(e){} metaLiveUnsub.waitlist = null; }
    state.matchTriggerPending = false;
    state.pairInFlight = false;
  }

  // Tab close / nav away. 2026-06-12: we deliberately do NOT delete
  // the queue doc anymore. Searching flips 'da-spar-bg' (see
  // joinQueue), so on any in-app navigation js/notifications.js
  // adopts the doc — heartbeats it, re-creates it if reaped, and
  // pops the match card wherever the user lands. On a true tab
  // close, the heartbeat stops and spar-pair's stale-skip/reaper
  // retires the doc server-side within minutes; if the user comes
  // back, the bg matcher self-heals. Deleting here would kill the
  // "stay available while you browse the rest of the app" promise.

  // ╭───────────────────────────────────────────────────────╮
  // │  WAITLIST + DMs (left rail)                          │
  // ╰───────────────────────────────────────────────────────╯
  // Two new Firestore collections back this surface:
  //   waitlist_posts/{postId}
  //     { uid, displayName, photoURL, format, note, createdAt }
  //     Listed in the left rail. 24h client-side TTL filter; posts
  //     stay in Firestore until the author deletes them.
  //   dm_threads/{threadId}/messages/{msgId}
  //     threadId = sorted([uidA, uidB]).join('_')
  //     Thread doc: { participants:[uidA,uidB], participantInfo, lastMessage,
  //                   lastMessageAt, lastMessageFrom, unread:{uidA:n,uidB:n} }
  //     Message doc: { fromUid, text, createdAt }
  //
  // REQUIRED Firestore rules — paste into Firebase console alongside
  // the existing matchmaking_queue rule:
  //
  //   match /waitlist_posts/{postId} {
  //     allow read: if request.auth != null;
  //     allow create: if request.auth != null
  //       && request.auth.uid == request.resource.data.uid
  //       && request.resource.data.note is string
  //       && request.resource.data.note.size() <= 240;
  //     allow update, delete: if request.auth != null
  //       && request.auth.uid == resource.data.uid;
  //   }
  //
  //   match /dm_threads/{threadId} {
  //     allow read, create, update: if request.auth != null
  //       && (
  //         (resource == null && request.auth.uid in request.resource.data.participants)
  //         || (resource != null && request.auth.uid in resource.data.participants)
  //       );
  //     match /messages/{msgId} {
  //       allow read: if request.auth != null
  //         && request.auth.uid in
  //           get(/databases/$(database)/documents/dm_threads/$(threadId))
  //             .data.participants;
  //       allow create: if request.auth != null
  //         && request.auth.uid == request.resource.data.fromUid
  //         && request.resource.data.text is string
  //         && request.resource.data.text.size() <= 1000;
  //     }
  //   }
  //
  // REQUIRED composite index (Firebase console → Firestore → Indexes):
  //   collection: dm_threads
  //   fields:     participants ARRAY-CONTAINS, lastMessageAt DESC
  // Without this, the inbox query (used for the unread badge + inbox
  // modal) returns an error with a clickable "create index" link.

  var WL_POST_TTL_MS = 24 * 60 * 60 * 1000; // 24h
  var WL_NOTE_MAX = 240;
  var WL_MSG_MAX = 1000;
  var WL_FORMATS = [
    { v: 'any',    label: 'Any format' },
    { v: 'quick',  label: 'Quick Clash' },
    { v: 'apda',   label: 'APDA' },
    { v: 'bp',     label: 'BP / WUDC' },
    { v: 'worlds', label: 'Worlds (WUDC)' },
    { v: 'asian',  label: 'Asian Parli' },
    { v: 'ld',     label: 'LD' },
    { v: 'pf',     label: 'Public Forum' },
    { v: 'policy', label: 'Policy' },
  ];

  var wl = {
    posts: [],
    postsUnsub: null,
    threads: [],
    threadsUnsub: null,
    unreadThreads: 0,
    activeThreadUnsub: null,
    // Thread-doc listener for the open 1:1 thread (read receipt) +
    // whether the peer has read my latest message.
    activeThreadDocUnsub: null,
    peerRead: false,
    // The thread currently open in the modal. Holds enough to send +
    // render without re-reading the doc: { id, participants:[uids],
    // participantInfo:{uid:{name,photo}}, isGroup, groupName }.
    activeThread: null,
  };

  var WL_GROUP_NAME_MAX = 60;
  var WL_GROUP_MAX_MEMBERS = 12; // including you

  function relTime(ms){
    var diff = Date.now() - ms;
    if (diff < 60000) return 'just now';
    if (diff < 3600000) return Math.floor(diff/60000) + 'm ago';
    if (diff < 86400000) return Math.floor(diff/3600000) + 'h ago';
    return Math.floor(diff/86400000) + 'd ago';
  }

  // Escape + linkify DM text. URLs become clickable anchors (the
  // schedule-proposal flow sends a Google Calendar URL in the body —
  // rendered as plain escaped text it was a dead string). Non-URL
  // spans go through escHtml exactly as before. Long URLs display as
  // a shortened host+path label so bubbles stay readable.
  function linkifyMsg(s){
    s = String(s || '');
    var rx = /(https?:\/\/[^\s<>"']+)/g;
    var out = '', last = 0, m;
    while ((m = rx.exec(s))){
      out += escHtml(s.slice(last, m.index));
      var url = m[1];
      // Trailing punctuation is sentence-structure, not URL.
      var clean = url.replace(/[).,;:!?]+$/, '');
      var rest = url.slice(clean.length);
      var label = clean.replace(/^https?:\/\//, '');
      if (label.length > 46) label = label.slice(0, 43) + '…';
      out += '<a class="wl-msg__link" href="' + escHtml(clean) + '" target="_blank" rel="noopener noreferrer">' + escHtml(label) + '</a>' + escHtml(rest);
      last = m.index + url.length;
    }
    out += escHtml(s.slice(last));
    return out;
  }

  function buildWaitlistRail(){
    if (document.getElementById('waitlistRail')) return;
    var rail = document.createElement('aside');
    rail.id = 'waitlistRail';
    rail.className = 'waitlist-rail';
    rail.setAttribute('aria-label', 'Open invites');
    rail.innerHTML =
      '<div class="waitlist-rail__head">' +
        '<div class="waitlist-rail__title"><span class="live-dot"></span>Open invites</div>' +
        '<div style="display:flex;gap:6px;align-items:center">' +
          '<button class="waitlist-rail__inbox" id="wlInboxBtn" type="button" hidden>Inbox<span class="badge" id="wlInboxBadge" hidden>0</span></button>' +
          '<button class="waitlist-rail__close" id="wlCloseBtn" type="button" aria-label="Close">×</button>' +
        '</div>' +
      '</div>' +
      '<div class="waitlist-rail__sub">Open invites for live debates. Join to show up here, and keep the matchmaker running above for instant rounds.</div>' +
      '<div style="margin:10px 16px 0" data-spar-night="rail"></div>' +
      '<div class="waitlist-rail__sched" id="wlSched" hidden></div>' +
      '<a class="waitlist-rail__discord" href="' + DISCORD_INVITE + '" target="_blank" rel="noopener noreferrer"><strong>Talk it out in Discord</strong><span>Channels and forum threads for judges, reminders, and longer planning.</span></a>' +
      '<div class="waitlist-rail__post-slot" id="wlPostSlot"></div>' +
      '<div class="waitlist-rail__list" id="wlList">' +
        '<div class="waitlist-rail__empty">Loading…</div>' +
      '</div>';
    document.body.appendChild(rail);

    var fab = document.createElement('button');
    fab.className = 'waitlist-fab';
    fab.id = 'wlFab';
    fab.type = 'button';
    fab.innerHTML = 'Open invites<span class="fab-badge" id="wlFabBadge" hidden>0</span>';
    document.body.appendChild(fab);
    fab.addEventListener('click', function(){
      document.getElementById('waitlistRail').classList.toggle('open');
    });
    document.getElementById('wlCloseBtn').addEventListener('click', function(){
      document.getElementById('waitlistRail').classList.remove('open');
    });
    document.getElementById('wlInboxBtn').addEventListener('click', openInboxModal);
  }

  // Returns the current user's active waitlist post (if they've signed
  // up), else null. Drives the join-button state so a user can't post
  // duplicates and can leave the list.
  function myWaitlistPost(){
    if (!state.user) return null;
    for (var i = 0; i < wl.posts.length; i++){
      if (wl.posts[i].data && wl.posts[i].data.uid === state.user.uid) return wl.posts[i];
    }
    return null;
  }

  // Renders just the action slot at the top of the rail. Four states:
  //   signed-out  → guest bootstrap nudge
  //   guest       → sign-up nudge for public posting
  //   on waitlist → "You're on the waitlist" + Leave
  //   available   → "Join the waitlist" button
  // Called both on auth change AND whenever the posts feed updates, so
  // the button reflects the latest membership without a full re-render.
  function renderJoinButton(){
    var slot = document.getElementById('wlPostSlot');
    var inboxBtn = document.getElementById('wlInboxBtn');
    if (!slot) return;
    if (!state.user){
      slot.innerHTML =
        '<div class="waitlist-rail__signin-overlay">' +
          'Starting guest mode for live matchmaking.' +
          '<br><button type="button" id="wlGuestLink">Try again →</button>' +
        '</div>';
      var guestLink = document.getElementById('wlGuestLink');
      if (guestLink) guestLink.addEventListener('click', function(){ ensureGuestAuth().catch(function(){}); });
      if (inboxBtn) inboxBtn.hidden = true;
      return;
    }
    if (inboxBtn) inboxBtn.hidden = false;
    if (!isNamedUser(state.user)){
      slot.innerHTML =
        '<div class="waitlist-rail__signin-overlay">' +
          'You can match live as a guest. Sign up to post an open invite with your name.' +
          '<br><button type="button" id="wlSignInLink">Sign up with Google →</button>' +
        '</div>';
      var link = document.getElementById('wlSignInLink');
      if (link) link.addEventListener('click', doGoogleSignIn);
      return;
    }
    var mine = myWaitlistPost();
    if (mine){
      slot.innerHTML =
        '<div class="waitlist-rail__joined">' +
          '<div class="waitlist-rail__joined-txt"><span class="dot"></span>You\'re on the waitlist</div>' +
          '<div class="waitlist-rail__joined-sub">Debaters can DM you to organize a round. You stay matchable while the queue is open.</div>' +
          '<div class="waitlist-rail__joined-actions">' +
            '<button class="waitlist-rail__leave" id="wlLeaveBtn" type="button">Leave waitlist</button>' +
          '</div>' +
        '</div>';
      var lb = document.getElementById('wlLeaveBtn');
      if (lb) lb.addEventListener('click', function(){ leaveWaitlist(mine.id); });
    } else {
      slot.innerHTML = '<button class="waitlist-rail__post-btn" id="wlPostBtn" type="button">Join the waitlist</button>';
      document.getElementById('wlPostBtn').addEventListener('click', openPostComposer);
    }
  }

  function leaveWaitlist(postId){
    if (!firebaseDb || !postId) return;
    firebaseDb.collection('waitlist_posts').doc(postId).delete().then(function(){
      try { gtag('event', 'waitlist_leave', {}); } catch(e){}
    }).catch(function(e){ console.warn('[waitlist] leave failed', e); });
  }

  function renderWaitlistContent(){
    renderJoinButton();
    // Repaint cards so DM buttons reflect new auth state.
    paintWaitlist();
  }

  function startWaitlistFeed(){
    if (!firebaseDb) return;
    if (wl.postsUnsub){ try { wl.postsUnsub(); } catch(e){} }
    wl.postsUnsub = firebaseDb.collection('waitlist_posts')
      .orderBy('createdAt', 'desc')
      .limit(40)
      .onSnapshot(function(snap){
        var now = Date.now();
        var rows = [];
        snap.forEach(function(d){
          var data = d.data() || {};
          var createdMs = (data.createdAt && data.createdAt.toMillis) ? data.createdAt.toMillis() : 0;
          if (createdMs && now - createdMs > WL_POST_TTL_MS) return;
          rows.push({ id: d.id, data: data, createdMs: createdMs || now });
        });
        wl.posts = rows;
        // Refresh the join button too — the user may have just joined
        // or left, and membership is derived from the posts feed.
        renderJoinButton();
        paintWaitlist();
      }, function(err){
        console.warn('[waitlist] feed snapshot error', err);
        // 2026-05-26: previous error copy was "Couldn't load the waitlist.
        // Refresh to retry." That read as a broken-product signal to anon
        // visitors, when in reality the most common cause is a permission
        // error before the user has signed in. Mirror the empty-state copy
        // (the "no one on the waitlist right now" line paintWaitlist uses)
        // so the failure path teaches the user the right next step instead
        // of asking them to refresh into the same wall.
        var list = document.getElementById('wlList');
        if (list) list.innerHTML = waitlistEmptyHtml();
      });
  }

  // Honest empty-state for the waitlist rail. This file has repeatedly
  // stripped FAKE debater activity ("dead-internet dishonesty"), so we do
  // NOT seed people. Instead, when the open waitlist is genuinely empty we
  // surface the REAL count of debaters who looked for a live round this
  // week (from /api/log-missed-match) — the rail reads alive when there
  // actually was activity, and stays a plain "be first" prompt when there
  // wasn't. Threshold 3 mirrors the meta-strip pills (a "1 looked this
  // week" line reads sadder than silence).
  var wlWeekLooked = 0;
  function waitlistEmptyHtml(){
    var join = state.user
      ? (isNamedUser(state.user) ? ' Be the first; join above.' : ' Sign up to post an invite, or keep searching as a guest.')
      : ' Guest mode is starting.';
    var activity = (wlWeekLooked >= 3)
      ? '<div class="wl-rail-activity"><strong>' + wlWeekLooked + '</strong> debaters looked for a live round this week. Join the waitlist so the next one finds you.</div>'
      : '';
    return '<div class="waitlist-rail__empty">No one on the waitlist right now.' + join + ' <a href="' + DISCORD_INVITE + '" target="_blank" rel="noopener noreferrer">Coordinate in Discord.</a></div>' + activity;
  }
  function fetchWaitlistActivity(){
    try {
      fetch('/api/log-missed-match', { method: 'GET' })
        .then(function(r){ return r.ok ? r.json() : null; })
        .then(function(j){
          if (!j) return;
          var n = (j.attempts && typeof j.attempts.week_count === 'number') ? j.attempts.week_count : 0;
          if (n === wlWeekLooked) return;
          wlWeekLooked = n;
          var list = document.getElementById('wlList');
          if (list && !wl.posts.length) paintWaitlist(); // only repaint the empty state
        })
        .catch(function(){});
    } catch(e){}
  }

  function paintWaitlist(){
    var list = document.getElementById('wlList');
    if (!list) return;
    if (!wl.posts.length){
      list.innerHTML = waitlistEmptyHtml();
      return;
    }
    var myUid = state.user && state.user.uid;
    list.innerHTML = wl.posts.map(function(p){
      var d = p.data;
      var name = escHtml(d.displayName || 'Anonymous');
      var format = escHtml((d.format || 'any').toUpperCase());
      var hasNote = !!(d.note && d.note.trim());
      var noteHtml = hasNote
        ? '<div class="waitlist-card__note">' + escHtml(d.note) + '</div>'
        : '<div class="waitlist-card__note waitlist-card__note--default">Open to a round. DM to organize.</div>';
      var time = relTime(p.createdMs);
      var avatar = d.photoURL
        ? '<img class="waitlist-card__avatar" src="' + escHtml(d.photoURL) + '" alt="">'
        : '<div class="waitlist-card__avatar" aria-hidden="true"></div>';
      var isMine = (d.uid === myUid);
      var action = isMine
        ? '<button class="waitlist-card__delete" data-postid="' + escHtml(p.id) + '">Remove</button>'
        : '<button class="waitlist-card__dm" ' +
            'data-peer-uid="' + escHtml(d.uid || '') + '" ' +
            'data-peer-name="' + escHtml(d.displayName || '') + '" ' +
            'data-peer-photo="' + escHtml(d.photoURL || '') + '"' +
          '>' + (state.user ? 'DM →' : 'Sign in to DM') + '</button>';
      return '<div class="waitlist-card">' +
        '<div class="waitlist-card__head">' +
          avatar +
          '<div class="waitlist-card__who">' +
            '<div class="waitlist-card__name">' + name + (isMine ? ' <span style="color:var(--accent);font-weight:600">(you)</span>' : '') + '</div>' +
            '<div class="waitlist-card__meta">' + format + ' · ' + time + '</div>' +
          '</div>' +
        '</div>' +
        noteHtml +
        '<div class="waitlist-card__actions">' + action + '</div>' +
      '</div>';
    }).join('');
    Array.prototype.forEach.call(list.querySelectorAll('.waitlist-card__dm'), function(btn){
      btn.addEventListener('click', function(){
        if (!state.user){ doGoogleSignIn(); return; }
        openDMThread(btn.dataset.peerUid, btn.dataset.peerName, btn.dataset.peerPhoto);
      });
    });
    Array.prototype.forEach.call(list.querySelectorAll('.waitlist-card__delete'), function(btn){
      btn.addEventListener('click', function(){
        var pid = btn.dataset.postid;
        if (!pid) return;
        firebaseDb.collection('waitlist_posts').doc(pid).delete().catch(function(e){
          console.warn('[waitlist] delete failed', e);
        });
      });
    });
  }

  function openPostComposer(){
    if (!isNamedUser(state.user)){ doGoogleSignIn(); return; }
    var preselect = formatParam;
    var optionsHtml = WL_FORMATS.map(function(f){
      return '<option value="' + escHtml(f.v) + '"' + (f.v === preselect ? ' selected' : '') + '>' + escHtml(f.label) + '</option>';
    }).join('');
    openModal('Join the waitlist',
      '<div style="font-size:.82rem;color:var(--text-dim);line-height:1.5">You\'ll show up as available to debate. Other signed-in debaters can DM you to set up a round on your own time.</div>' +
      '<div class="wl-field">' +
        '<label for="wlComposerFormat">Format</label>' +
        '<select class="wl-select" id="wlComposerFormat">' + optionsHtml + '</select>' +
      '</div>' +
      '<div class="wl-field">' +
        '<label for="wlComposerNote">Add a note <span style="text-transform:none;letter-spacing:0;font-weight:500;color:var(--text-ghost)">(optional)</span></label>' +
        '<textarea class="wl-textarea" id="wlComposerNote" maxlength="' + WL_NOTE_MAX + '" placeholder="e.g. Free tonight 8pm EST, open on motion, happy to take either side."></textarea>' +
        '<div class="wl-count"><span id="wlComposerCount">0</span>/' + WL_NOTE_MAX + '</div>' +
      '</div>' +
      '<div class="wl-modal__error" id="wlComposerError"></div>',
      [
        { label: 'Cancel', kind: 'ghost', onClick: closeModal },
        { label: 'Join waitlist', kind: 'primary', id: 'wlComposerSubmit', onClick: submitPost },
      ]
    );
    var ta = document.getElementById('wlComposerNote');
    var count = document.getElementById('wlComposerCount');
    ta.addEventListener('input', function(){ count.textContent = String(ta.value.length); });
    setTimeout(function(){ ta.focus(); }, 50);
  }

  function submitPost(){
    if (!isNamedUser(state.user) || !firebaseDb) return;
    var noteEl = document.getElementById('wlComposerNote');
    var fmtEl = document.getElementById('wlComposerFormat');
    var errEl = document.getElementById('wlComposerError');
    var btn = document.getElementById('wlComposerSubmit');
    if (!fmtEl) return;
    // Note is OPTIONAL — joining the waitlist is a one-tap signup; a
    // note just adds color. Firestore rule requires note be a string
    // <=240 chars, and '' satisfies that.
    var note = ((noteEl && noteEl.value) || '').trim();
    if (note.length > WL_NOTE_MAX){ if (errEl) errEl.textContent = 'Note too long (' + note.length + '/' + WL_NOTE_MAX + ').'; return; }
    if (btn) btn.disabled = true;
    if (errEl) errEl.textContent = '';
    firebaseDb.collection('waitlist_posts').add({
      uid: state.user.uid,
      displayName: shortNameOf(state.user),
      photoURL: state.user.photoURL || '',
      format: fmtEl.value,
      note: note,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    }).then(function(){
      try { gtag('event', 'waitlist_join', { format: fmtEl.value }); } catch(e){}
      markWaitlistMatchable(fmtEl.value);
      closeModal();
    }).catch(function(e){
      if (btn) btn.disabled = false;
      if (errEl) errEl.textContent = 'Couldn\'t join: ' + (e.message || e.code || 'unknown');
    });
  }

  function markWaitlistMatchable(fmt){
    try { localStorage.setItem('da-spar-bg', '1'); } catch(e){}
    try { localStorage.setItem('debateos-spar-format', fmt || formatParam); } catch(e){}
    // If this page is actively searching, joining the waitlist should
    // kick the live matcher immediately. Format preferences are already
    // proposals, so there is no broaden toggle anymore.
    if (state.queueDocRef && !state.inConsent){
      tryMatch();
    }
  }

  function dmThreadId(uidA, uidB){
    return [uidA, uidB].sort().join('_');
  }

  // Open a 1:1 DM. Sets up wl.activeThread (participants known up-front
  // even before the doc exists, so the first send can create it) and
  // hands off to the shared renderer.
  function openDMThread(peerUid, peerName, peerPhoto){
    if (!state.user || !firebaseDb || !peerUid) return;
    if (peerUid === state.user.uid) return;
    var me = state.user.uid;
    var pInfo = {};
    pInfo[me] = { name: shortNameOf(state.user), photo: state.user.photoURL || '' };
    pInfo[peerUid] = { name: peerName || 'Debater', photo: peerPhoto || '' };
    wl.activeThread = {
      id: dmThreadId(me, peerUid),
      participants: [me, peerUid],
      participantInfo: pInfo,
      isGroup: false,
      groupName: '',
    };
    // Hydrate lastMessage from the existing doc (if any). isFirstMessage
    // in sendThreadMessage keys off at.lastMessage; without this, the
    // first send of EVERY session on an existing thread re-hit the
    // /api/notify-dm-accept email endpoint (only server idempotency
    // stopped duplicate emails).
    firebaseDb.collection('dm_threads').doc(wl.activeThread.id).get().then(function(doc){
      if (doc.exists && wl.activeThread && wl.activeThread.id === doc.id){
        wl.activeThread.lastMessage = (doc.data() || {}).lastMessage || '';
      }
    }).catch(function(){});
    renderThreadModal();
  }

  // Open a group (or any) thread by its doc id. Fetches the thread doc
  // for participants + name, then renders. Used by the inbox list and
  // the ?thread= deep link from a notification.
  function openGroupThread(threadId){
    if (!state.user || !firebaseDb || !threadId) return;
    firebaseDb.collection('dm_threads').doc(threadId).get().then(function(doc){
      if (!doc.exists){ return; }
      var d = doc.data() || {};
      if (!(d.participants || []).some(function(u){ return u === state.user.uid; })) return; // not a member
      wl.activeThread = {
        id: threadId,
        participants: d.participants || [],
        participantInfo: d.participantInfo || {},
        isGroup: !!d.isGroup || (d.participants || []).length > 2,
        groupName: d.groupName || '',
        lastMessage: d.lastMessage || '',
      };
      renderThreadModal();
    }).catch(function(e){ console.warn('[dm] open group thread failed', e && e.message); });
  }

  // Shared thread modal renderer. Drives both 1:1 and group threads off
  // wl.activeThread. Group threads get a member-count subtitle and
  // per-message sender labels (handled in paintDMThread).
  function renderThreadModal(){
    var at = wl.activeThread;
    if (!at) return;
    var titleHtml;
    if (at.isGroup){
      var count = at.participants.length;
      titleHtml =
        '<div class="wl-modal__avatar wl-modal__avatar--group" aria-hidden="true">' +
          '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>' +
        '</div>' +
        '<span style="display:flex;flex-direction:column;min-width:0">' +
          '<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + escHtml(at.groupName || 'Group') + '</span>' +
          '<span style="font-size:.66rem;color:var(--text-dim);font-weight:500">' + count + ' members</span>' +
        '</span>';
    } else {
      var peerUid = at.participants.filter(function(u){ return u !== state.user.uid; })[0] || '';
      var info = at.participantInfo[peerUid] || {};
      titleHtml =
        (info.photo
          ? '<img class="wl-modal__avatar" src="' + escHtml(info.photo) + '" alt="">'
          : '<div class="wl-modal__avatar"></div>') +
        '<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + escHtml(info.name || 'Debater') + '</span>';
    }
    openModal(titleHtml,
      '<div class="wl-thread" id="wlThread"><div class="wl-msg__empty">Loading messages…</div></div>' +
      '<div class="wl-schedule-panel" id="wlSchedulePanel">' +
        '<div class="wl-schedule-row">' +
          '<div class="wl-field"><label class="wl-schedule-label">Date</label><input class="wl-input" type="date" id="wlSchedDate"></div>' +
          '<div class="wl-field"><label class="wl-schedule-label">Time</label><input class="wl-input" type="time" id="wlSchedTime"></div>' +
          '<div class="wl-field"><label class="wl-schedule-label">Duration</label>' +
            '<select class="wl-input wl-select" id="wlSchedDur">' +
              '<option value="30">30 min</option>' +
              '<option value="60" selected>1 hour</option>' +
              '<option value="90">1.5 hours</option>' +
              '<option value="120">2 hours</option>' +
            '</select>' +
          '</div>' +
        '</div>' +
        '<div class="wl-field"><label class="wl-schedule-label">Motion (optional)</label><input class="wl-input" type="text" id="wlSchedMotion" placeholder="e.g. THW ban social media for under-16s" maxlength="140"></div>' +
        '<div class="wl-schedule-actions">' +
          '<button class="wl-cal-btn" id="wlSchedSend" type="button">📅 Propose &amp; add to calendar</button>' +
          '<button class="wl-cal-cancel" id="wlSchedCancel" type="button">Cancel</button>' +
        '</div>' +
      '</div>',
      [
        { html: '<button class="wl-cal-toggle" id="wlCalToggle" type="button">📅 Schedule</button>' },
        { html: '<input class="wl-input wl-send-input" id="wlSendInput" placeholder="' + (at.isGroup ? 'Message the group…' : 'Message…') + '" maxlength="' + WL_MSG_MAX + '" style="flex:1">' },
        { label: 'Send', kind: 'primary', id: 'wlSendBtn', onClick: sendThreadMessage },
      ]
    );
    setTimeout(function(){
      var calBtn = document.getElementById('wlCalToggle');
      if (calBtn) calBtn.addEventListener('click', toggleSchedulePanel);
      var sendPropose = document.getElementById('wlSchedSend');
      if (sendPropose) sendPropose.addEventListener('click', sendScheduleProposal);
      var cancelBtn = document.getElementById('wlSchedCancel');
      if (cancelBtn) cancelBtn.addEventListener('click', function(){ toggleSchedulePanel(null, false); });
      // Default date = tomorrow, time = next round hour
      var scDate = document.getElementById('wlSchedDate');
      var scTime = document.getElementById('wlSchedTime');
      if (scDate && scTime){
        var now = new Date();
        var tom = new Date(now.getTime() + 86400000);
        scDate.value = tom.toISOString().slice(0, 10);
        var nextHour = new Date(now);
        nextHour.setHours(now.getHours() + 1, 0, 0, 0);
        scTime.value = nextHour.toTimeString().slice(0, 5);
      }
    }, 30);
    if (wl.activeThreadUnsub){ try { wl.activeThreadUnsub(); } catch(e){} }
    wl.activeThreadUnsub = firebaseDb
      .collection('dm_threads').doc(at.id).collection('messages')
      .orderBy('createdAt', 'asc').limitToLast(200)
      .onSnapshot(function(snap){
        paintDMThread(snap);
      }, function(err){
        console.warn('[dm] thread snapshot error', err);
        var t = document.getElementById('wlThread');
        if (!t) return;
        var code = (err && err.code) || '';
        // A brand-new thread has no doc yet, so the participant get() in
        // the messages read rule can't resolve and the listen denies.
        // That's the normal first-conversation state, not a failure.
        // Anything else must NOT masquerade as an empty thread — the
        // fake-empty on quota exhaustion is what made DMs feel broken.
        if (code === 'permission-denied' && !(at && at.lastMessage)){
          t.innerHTML = '<div class="wl-msg__empty">No messages yet.<br>Send one to start the thread.</div>';
        } else if (code === 'resource-exhausted'){
          t.innerHTML = '<div class="wl-msg__empty">Messages are rate-limited right now (daily data budget).<br>Sending still works; reading returns after midnight Pacific.</div>';
        } else {
          t.innerHTML = '<div class="wl-msg__empty">Could not load messages right now.<br>Try again in a minute.</div>';
        }
      });
    // Read-receipt listener (1:1 only): watch the thread doc for the
    // peer's unread hitting zero after my latest send.
    if (wl.activeThreadDocUnsub){ try { wl.activeThreadDocUnsub(); } catch(e){} wl.activeThreadDocUnsub = null; }
    wl.peerRead = false;
    if (!at.isGroup){
      wl.activeThreadDocUnsub = firebaseDb.collection('dm_threads').doc(at.id)
        .onSnapshot(function(doc){
          if (!doc.exists) return;
          var d = doc.data() || {};
          var peerUid = (at.participants || []).filter(function(u){ return u !== state.user.uid; })[0];
          var un = d.unread || {};
          wl.peerRead = d.lastMessageFrom === state.user.uid && !(un[peerUid] > 0);
          updateReadReceipt();
        }, function(){ /* receipt is decoration; stay silent on error */ });
    }
    markThreadRead(at.id).catch(function(){});
    setTimeout(function(){
      var input = document.getElementById('wlSendInput');
      if (input){
        input.focus();
        input.addEventListener('keydown', function(e){
          if (e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); sendThreadMessage(); }
        });
      }
    }, 50);
  }

  function paintDMThread(snap){
    var t = document.getElementById('wlThread');
    if (!t) return;
    if (snap.empty){
      var emptyMsg = (wl.activeThread && wl.activeThread.isGroup)
        ? 'No messages yet.<br>Kick off the group. Propose a time or a practice motion.'
        : 'No messages yet.<br>Say hi and set up a round.';
      t.innerHTML = '<div class="wl-msg__empty">' + emptyMsg + '</div>';
      return;
    }
    var myUid = state.user.uid;
    var at = wl.activeThread || {};
    var isGroup = !!at.isGroup;
    var pInfo = at.participantInfo || {};
    var lastSender = null;
    t.innerHTML = '';
    snap.forEach(function(d){
      var m = d.data();
      var mine = (m.fromUid === myUid);
      var when = m.createdAt && m.createdAt.toMillis ? relTime(m.createdAt.toMillis()) : '';
      var whenAbs = m.createdAt && m.createdAt.toMillis
        ? new Date(m.createdAt.toMillis()).toLocaleString(undefined, {month:'short',day:'numeric',hour:'numeric',minute:'2-digit'})
        : '';
      var div = document.createElement('div');
      div.className = 'wl-msg ' + (mine ? 'mine' : 'theirs');
      // In groups, label each incoming message with the sender's name
      // (collapsed when the same person sends consecutively) so it's
      // clear who's talking. 1:1 threads stay clean — the title says who.
      var senderLabel = '';
      if (isGroup && !mine && m.fromUid !== lastSender){
        var nm = (m.fromName) || (pInfo[m.fromUid] && pInfo[m.fromUid].name) || 'Debater';
        senderLabel = '<div class="wl-msg__sender">' + escHtml(nm) + '</div>';
      }
