<!-- Shared topbar styles. Loaded BEFORE the page's inline <style> so
     page-specific rules override ui.css's defaults via cascade order. -->
<link rel="stylesheet" href="/css/ui.css">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root,[data-theme="grey"]{
  --bg:#0a0a0c;--bg-elev:#101014;--bg-card:#15151a;
  --border:rgba(255,255,255,.18);--border-strong:rgba(255,255,255,.32);
  --accent:#ef4444;--accent-glow:rgba(239,68,68,.4);
  --green:#22c55e;--amber:#f59e0b;--blue:#3b82f6;
  --text:#fff;--text-dim:rgba(255,255,255,.85);--text-ghost:rgba(255,255,255,.65);
  --shadow-lg:0 18px 60px rgba(0,0,0,.55);
  --bar-bg:rgba(10,10,12,.92);
}
[data-theme="crimson"]{
  --bg:#000;--bg-elev:#0c0306;--bg-card:#13070a;
  --border:rgba(239,68,68,.22);--border-strong:rgba(239,68,68,.42);
  --accent:#ef4444;--accent-glow:rgba(239,68,68,.55);
  --green:#22c55e;--amber:#f59e0b;--blue:#3b82f6;
  --text:#fff;--text-dim:rgba(255,255,255,.85);--text-ghost:rgba(255,255,255,.65);
  --shadow-lg:0 18px 60px rgba(0,0,0,.6);
  --bar-bg:rgba(0,0,0,.95);
}
[data-theme="light"]{
  --bg:#fafaf7;--bg-elev:#fff;--bg-card:#fff;
  --border:rgba(0,0,0,.10);--border-strong:rgba(0,0,0,.22);
  --accent:#dc2626;--accent-glow:rgba(220,38,38,.22);
  --green:#16a34a;--amber:#d97706;--blue:#2563eb;
  --text:#1a1a1f;--text-dim:rgba(0,0,0,.7);--text-ghost:rgba(0,0,0,.46);
  --shadow-lg:0 18px 60px rgba(0,0,0,.10);
  --bar-bg:rgba(250,250,247,.85);
}
body{
  font-family:'Crimson Pro','Fraunces',Georgia,"Times New Roman",serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;
  display:flex;flex-direction:column;
  -webkit-font-smoothing:antialiased;
}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}

.bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 22px;background:var(--bar-bg);border-bottom:1px solid var(--border);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  position:sticky;top:0;z-index:50;
}
.bar-logo{font-size:1rem;font-weight:900;letter-spacing:-.02em;color:var(--text)}
.bar-logo em{color:var(--accent);font-style:normal}
.bar-back{padding:6px 14px;border:1px solid var(--border);border-radius:999px;font-size:.72rem;font-weight:700;color:var(--text-dim);transition:color .15s,border-color .15s}
.bar-back:hover{color:var(--text);border-color:var(--border-strong)}

.wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:32px 22px 80px}
.shell{max-width:560px;width:100%;text-align:center;padding:0 clamp(16px,4vw,32px)}

/* Eyebrow — smaller chip, no background fill, just a thin pip + caps
   tracking. Reads as a label, not a button. Pull tighter to the H1. */
.eyebrow{
  display:inline-flex;align-items:center;gap:7px;
  font-size:.58rem;font-weight:700;letter-spacing:.22em;text-transform:uppercase;
  padding:0;border-radius:0;background:transparent;border:0;
  color:var(--accent);margin-bottom:14px;
}
.eyebrow .pip{width:5px;height:5px;border-radius:50%;background:var(--accent);box-shadow:0 0 6px var(--accent);animation:pulse 1.6s ease-in-out infinite}
/* Saturated brand red (#ef4444) as small caps on pure black is a strained
   read; lighten just the eyebrow label on dark themes (~5.6:1 → ~7.6:1).
   The pip keeps the full accent + glow so the brand mark stays. */
[data-lighting="dark"] .eyebrow{color:#f87171}
@keyframes pulse{0%,100%{opacity:.55;transform:scale(.9)}50%{opacity:1;transform:scale(1.15)}}

/* H1 — slightly smaller cap, tighter tracking, tighter relationship
   to the radar below (margin-bottom shrunk so the visual sits closer
   to the headline). text-wrap:balance so a 2-line headline doesn't
   leave one word on the second line. */
h1{
  font-size:clamp(1.85rem,4.4vw,2.55rem);
  font-weight:900;letter-spacing:-.028em;line-height:1.08;
  margin:0 0 10px;color:var(--text);
  text-wrap:balance;
}
h1 em{color:var(--accent);font-style:normal}

.lede{
  font-size:.96rem;color:var(--text-dim);line-height:1.55;
  max-width:460px;margin:0 auto 22px;font-weight:500;
  text-wrap:pretty;
}

/* Format pill above the radar — smaller, calmer. Was reading too
   loud beneath the lede; now sits as a quiet tag. */
.format-pill{
  font-size:.62rem;
  padding:4px 10px;
  margin-bottom:14px;
}

/* Globe of debate rooms opening worldwide — the centerpiece of the
   matchmaking screen. Replaces the prior dark-glass radar disc + sweep
   arm (read as "surveillance / NFT mint / radar of targets"). The new
   metaphor: rooms lighting up across time zones, not signals acquired.
   The SVG inside /js/global-debate-map.js owns the disc gradient, grid,
   continents, dots, arcs, and floating room cards; this CSS layer just
   provides the host sizing + a soft floor shadow + the card/tooltip
   styling that the module's HTML overlay uses. Class names .globe-wrap /
   .globe-frame are preserved so the matched/fallback states don't have
   to change. */
.globe-wrap{
  position:relative;width:266px;max-width:82vw;margin:10px auto 22px;
  aspect-ratio:1 / 1;
}
/* Ambient light behind the disc. Without it the ivory globe reads as a
   sticker pasted on black; a soft warm-white core fading through a faint
   brand-red mid to transparent sits it in a lit room. Low-opacity per the
   muted aesthetic; the .globe-frame (z-index:1) + any floating room cards
   paint above it. */
.globe-wrap::before{
  content:'';position:absolute;inset:-16%;
  border-radius:50%;z-index:0;pointer-events:none;
  background:radial-gradient(circle at 50% 45%,
    rgba(255,248,236,0.16) 0%,
    rgba(239,68,68,0.07) 42%,
    transparent 70%);
  filter:blur(16px);
}
.globe-frame{
  position:relative;z-index:1;width:100%;height:100%;border-radius:50%;
  background:transparent;
  overflow:visible;
  /* A real, calm floor shadow under the ivory disc — sits the globe on
     a surface instead of next to a puddle. */
  filter:drop-shadow(0 18px 28px rgba(40, 25, 10, 0.22));
}
/* Mobile triage 2026-06-12: the globe ate most of the first screen and
   the fixed bottom chrome (signup nudge, waitlist FAB, coach FAB) piled
   on top of the countdown + CTAs. Cap the globe, give the page bottom
   room, and lift the nudge bar clear of the corner FABs. */
@media (max-width: 640px){
  /* Smaller orb + tighter rhythm so the status, countdown, and the
     primary "Prep while you wait" button sit above the fold and clear
     of the bottom FABs instead of getting pushed under them. */
  .globe-wrap{width:150px;max-width:42vw;margin:2px auto 10px}
  h1{font-size:1.9rem;line-height:1.08}
  .lede{font-size:.92rem;margin-bottom:10px}
  .meta-strip{margin-top:6px}
  #shell{padding-bottom:150px}
  .signup-nudge{bottom:88px !important;right:12px !important;left:12px !important;max-width:none !important}
}
[data-theme="light"] .globe-frame{
  filter:drop-shadow(0 18px 28px rgba(40, 25, 10, 0.18));
}
/* On the cream light theme the ambient halo muddies the paper; drop it
   to a barely-there warm lift instead. */
[data-theme="light"] .globe-wrap::before{
  background:radial-gradient(circle at 50% 45%,rgba(40,25,10,0.05) 0%,transparent 68%);
  filter:blur(10px);
}
.globe-frame > .gdmap-host-inner,
.globe-frame > div{width:100%;height:100%}
.globe-frame svg.gdmap-svg{display:block;width:100%;height:100%}
/* 2026-07-02 fix: the globe canvas had NO css size, so world-globe.js's
   resize() (buffer = rect × dpr) fed the buffer size back into layout.
   On dpr>1 screens that loop grew the canvas exponentially — the gate
   rendered a screen-tall blank gap on every iPhone. Pin it to the frame. */
.globe-frame canvas{display:block;width:100%;height:100%}

/* Floating "Room forming · CityA ↔ CityB" pill — sits at the midpoint
   of each animated arc. Soft ivory body, thin warm border, gentle shadow.
   Reads as a printed inset, not a notification toast. */
.gdmap-card{
  position:absolute;
  transform:translate(-50%, -50%);
  display:inline-flex;align-items:center;gap:8px;
  padding:6px 11px;
  border-radius:999px;
  background:rgba(252, 248, 240, 0.96);
  color:#2a1d10;
  border:1px solid rgba(96, 70, 40, 0.22);
  box-shadow:0 6px 14px rgba(40, 25, 10, 0.18);
  font-family:'EB Garamond', Georgia, ui-serif, serif;
  font-size:.74rem;font-weight:600;letter-spacing:.005em;
  white-space:nowrap;
  opacity:0;
  transition:opacity .35s ease;
  backdrop-filter:saturate(110%);
}
.gdmap-card .gdmap-card-dot{
  display:inline-block;width:6px;height:6px;border-radius:50%;
  background:#dc2a2a;
  box-shadow:0 0 8px rgba(220, 42, 42, .5);
}
.gdmap-card .gdmap-card-main{font-weight:700}
.gdmap-card .gdmap-card-arrow{color:rgba(96, 70, 40, .6);font-weight:400;margin:0 2px}
.gdmap-card .gdmap-card-sub{
  color:rgba(70, 50, 30, 0.7);
  font-family:'Crimson Pro','Inter','SF Pro Text',system-ui,sans-serif;
  font-size:.62rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
}
[data-theme="midnight"] .gdmap-card,
[data-lighting="dark"] .gdmap-card{
  background:rgba(28, 18, 18, 0.94);
  color:#f3e9e3;
  border-color:rgba(239, 68, 68, 0.32);
}
[data-theme="midnight"] .gdmap-card .gdmap-card-arrow,
[data-lighting="dark"] .gdmap-card .gdmap-card-arrow{color:rgba(243, 233, 227, .72)}
[data-theme="midnight"] .gdmap-card .gdmap-card-sub,
[data-lighting="dark"] .gdmap-card .gdmap-card-sub{color:rgba(243, 233, 227, .82)}

/* Tooltip on idle dot hover — "London · BP practice", "Delhi · WSDC prep". */
.gdmap-tooltip{
  font-family:'Crimson Pro','Inter','SF Pro Text',system-ui,sans-serif;
  font-size:.66rem;font-weight:600;letter-spacing:.04em;
  padding:4px 9px;border-radius:999px;
  background:rgba(252, 248, 240, 0.96);
  color:#2a1d10;
  border:1px solid rgba(96, 70, 40, 0.22);
  box-shadow:0 4px 10px rgba(40, 25, 10, 0.14);
  white-space:nowrap;
}
.gdmap-tooltip .gdmap-tip-city{font-weight:700}
.gdmap-tooltip .gdmap-tip-fmt{color:rgba(70, 50, 30, 0.7);text-transform:uppercase;letter-spacing:.08em;font-size:.6rem}
[data-theme="midnight"] .gdmap-tooltip,
[data-lighting="dark"] .gdmap-tooltip{
  background:rgba(28, 18, 18, 0.94);
  color:#f3e9e3;
  border-color:rgba(239, 68, 68, 0.32);
}

/* Live-system metadata strip below the radar — "X debaters online ·
   Y countries · Z rounds forming · APDA queue active." Reads like a
   live ops console line. Tabular, calm, doesn't fight the radar. */
.meta-strip{
  display:flex;flex-wrap:wrap;justify-content:center;align-items:center;
  gap:4px 10px;
  margin:14px auto 22px;max-width:520px;
  font-family:ui-monospace,SFMono-Regular,monospace;
  font-size:.7rem;font-weight:500;
  color:var(--text-ghost);letter-spacing:.04em;
  font-variant-numeric:tabular-nums;
}
.meta-strip .meta-cell strong{color:var(--text);font-weight:600}
.meta-strip .meta-sep{opacity:.45}
.meta-strip .meta-dot{
  display:inline-block;width:5px;height:5px;border-radius:50%;
  background:#22c55e;box-shadow:0 0 6px rgba(34,197,94,.6);
  margin-right:5px;animation:meta-dot-pulse 2.1s ease-in-out infinite;
}
@keyframes meta-dot-pulse{0%,100%{opacity:.55}50%{opacity:1}}

/* Recent-attempts timeline. Sits under the live counts: the strip says
   "N looked this week," this shows WHO (anonymously) and exactly when,
   newest first, so an empty live queue still reads as a place people
   actually come to. Each row = one prior attempt. */
.seek-feed{margin:-6px auto 20px;max-width:360px;width:100%}
.seek-feed__head{
  font-size:.62rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--text-ghost);opacity:.85;margin:0 0 8px;text-align:center;
}
/* Single-slot ticker: rows stack at the SAME position (absolute) and only
   one is shown at a time; the JS cycles which is .is-active so each
   attempt fades in where the last faded out — no downward cascade. */
.seek-feed__list{position:relative;min-height:30px}
.seek-row{
  position:absolute;left:0;right:0;top:0;
  display:flex;align-items:center;gap:8px;
  padding:5px 10px;border-radius:8px;font-size:.76rem;
  opacity:0;pointer-events:none;
  transition:opacity .55s ease, background .15s ease;
}
.seek-row.is-active{opacity:1;pointer-events:auto}
.seek-row:hover{background:rgba(127,127,127,.07)}
.seek-row__dot{flex:none;width:6px;height:6px;border-radius:50%;background:var(--text-ghost);opacity:.4}
.seek-row__fmt{color:var(--text-dim);font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.seek-row__time{
  color:var(--text-ghost);font-weight:500;white-space:nowrap;
  font-family:ui-monospace,SFMono-Regular,monospace;font-variant-numeric:tabular-nums;
}
/* Anything inside ~12 min reads as "someone's basically here right now." */
.seek-row--fresh .seek-row__dot{background:#22c55e;opacity:.95;box-shadow:0 0 6px rgba(34,197,94,.55)}
.seek-row--fresh .seek-row__time{color:#22c55e}
/* Dock the single-line ticker as a quiet rail on the right edge,
   vertically centered. Capped at 1280px: from 1281px the .wait-rail
   ("while you wait" panel) owns the right edge and the centre orb fills
   the middle, leaving no clean slot — so above that the ticker stays in
   the column flow (still single-slot, still cycling). */
@media (min-width:900px) and (max-width:1280px){
  .seek-feed{
    position:fixed;right:28px;top:50%;transform:translateY(-50%);
    margin:0;width:240px;max-width:240px;z-index:6;text-align:left;
  }
  .seek-feed__head{text-align:left;margin-bottom:10px}
  .seek-row{padding:5px 8px}
}

/* Legacy orb — still used by renderMatched() and renderFallback() as
   brief transition states. Kept for those two short-lived screens. */
.orb-wrap{
  position:relative;width:280px;height:280px;margin:0 auto 22px;
  display:flex;align-items:center;justify-content:center;
}
.orb-glow{
  position:absolute;inset:-20%;border-radius:50%;
  background:radial-gradient(circle at 50% 50%,var(--accent-glow) 0%,transparent 60%);
  filter:blur(20px);opacity:.7;
  animation:orb-breathe 3s ease-in-out infinite;
}
@keyframes orb-breathe{0%,100%{transform:scale(1);opacity:.55}50%{transform:scale(1.08);opacity:.85}}
.orb-ring{
  position:absolute;inset:0;border-radius:50%;
  border:1.5px solid var(--accent);
  opacity:.85;
  animation:orb-rotate 8s linear infinite;
}
@keyframes orb-rotate{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.orb-ring::before{
  content:'';position:absolute;top:-3px;left:50%;width:6px;height:6px;border-radius:50%;
  background:#fff;box-shadow:0 0 12px var(--accent),0 0 24px var(--accent);
  transform:translateX(-50%);
}
.orb-core{
  position:relative;width:64%;height:64%;border-radius:50%;
  background:radial-gradient(circle at 40% 35%,rgba(255,255,255,.18) 0%,rgba(239,68,68,.42) 35%,rgba(0,0,0,.85) 100%);
  box-shadow:inset 0 0 60px rgba(0,0,0,.65),0 0 60px rgba(239,68,68,.35);
}
.orb-wrap.matched .orb-glow{background:radial-gradient(circle,rgba(34,197,94,.5),transparent 60%);animation-duration:1s}
.orb-wrap.matched .orb-ring{border-color:#22c55e}
.orb-wrap.matched .orb-ring::before{background:#fff;box-shadow:0 0 12px #22c55e,0 0 24px #22c55e}

.status{
  font-size:1.05rem;font-weight:600;color:var(--text);margin-bottom:8px;letter-spacing:-.005em;
  min-height:32px;
}
.status .dim{color:var(--text-dim);font-weight:500}
.status #statusMain, .status #statusSub{
  display:inline-block;
  transition:opacity .26s ease, transform .26s ease;
  will-change:opacity;
}
.status #statusSub{display:block}
.status.is-fading #statusMain, .status.is-fading #statusSub{
  opacity:0;transform:translateY(-2px);
}
.countdown{
  display:inline-flex;align-items:center;gap:8px;
  font-size:.78rem;font-weight:600;color:var(--text-dim);letter-spacing:.06em;text-transform:uppercase;
  padding:6px 14px;border-radius:999px;
  background:var(--bg-card);border:1px solid var(--border);
  margin-bottom:24px;
}
.countdown strong{color:var(--text);font-variant-numeric:tabular-nums;font-weight:800;font-size:.86rem}
/* On the dark themes the pill fill (--bg-card ~#13070a) sits almost on
   top of the near-black page, so the chip dissolves into the background.
   Lift the fill and use the stronger (theme-tinted) border so it reads as
   a real chip — red border on crimson, white on grey. */
[data-lighting="dark"] .countdown{background:rgba(255,255,255,.045);border-color:var(--border-strong)}

.btn-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:8px}
/* Quiet escape links under the primary action — Cancel / Skip to AI.
   Demoted from equal-weight buttons so the searching screen reads as
   one clear next step. */
.quiet-links{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:12px}
.quiet-links .link-btn{background:none;border:none;padding:0;cursor:pointer;font-family:inherit;font-size:.78rem;font-weight:600;color:var(--text-ghost);text-decoration:none;transition:color .14s}
.quiet-links .link-btn:hover{color:var(--text-dim)}
.quiet-links .ql-sep{color:var(--text-ghost);opacity:.5}
.btn{
  padding:11px 22px;border-radius:999px;border:1px solid var(--border);
  background:transparent;color:var(--text);font-family:inherit;font-weight:700;
  font-size:.84rem;letter-spacing:.04em;cursor:pointer;
  transition:all .15s;
}
.btn:hover{background:rgba(255,255,255,.04);border-color:var(--border-strong);transform:translateY(-1px)}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 6px 24px var(--accent-glow)}
.btn.primary:hover{background:#dc2626;border-color:#dc2626}
.btn.ghost{background:transparent;color:var(--text-dim)}
.btn.ghost:hover{color:var(--text)}

.format-pill{
  display:inline-flex;align-items:center;gap:6px;
  padding:5px 11px;border-radius:999px;
  background:rgba(59,130,246,.10);border:1px solid rgba(59,130,246,.32);
  color:#93c5fd;font-size:.7rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  margin-bottom:18px;
}

.queue-stats{
  margin-top:16px;
}
.queue-stats strong{color:var(--text);font-variant-numeric:tabular-nums}

/* Watch a live round — spectator discovery on the searching screen. */
.watch-panel{
  max-width:460px;margin:18px auto 0;text-align:left;
  background:var(--bg-card);border:1px solid var(--border);border-radius:14px;
  padding:12px 14px;
}
.watch-head{
  display:flex;align-items:center;gap:8px;
  font-size:.72rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;
  color:var(--text-dim);margin-bottom:8px;
}
.watch-head-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;box-shadow:0 0 8px #22c55e;flex:none}
.watch-count{margin-left:auto;font-weight:700;letter-spacing:.04em;color:#22c55e}
.watch-row{
  display:flex;align-items:center;gap:10px;
  padding:9px 8px;border-radius:10px;text-decoration:none;
  transition:background .14s;
}
.watch-row:hover{background:rgba(34,197,94,.07)}
.watch-row + .watch-row{border-top:1px solid var(--border)}
.watch-live{
  flex:none;display:inline-flex;align-items:center;gap:4px;
  font-size:.56rem;font-weight:800;letter-spacing:.08em;color:#ef4444;
}
.watch-blink{width:6px;height:6px;border-radius:50%;background:#ef4444;animation:watchBlink 1.4s ease-in-out infinite}
@keyframes watchBlink{0%,100%{opacity:1}50%{opacity:.3}}
.watch-body{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
.watch-motion{font-size:.82rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.watch-meta{font-size:.68rem;color:var(--text-ghost);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.watch-go{flex:none;font-size:.74rem;font-weight:700;color:var(--accent)}

/* Round setup — style + judge-instructions proposal under the search
   controls. These are not matching filters; they become proposed round
   terms the opponent can accept/pass before the round starts. */
.setup-card{
  max-width:560px;margin:18px auto 0;padding:16px 18px;
  background:var(--bg-card);border:1px solid var(--border);border-radius:14px;
  text-align:left;
}
.setup-head{
  display:flex;flex-wrap:wrap;gap:6px 10px;align-items:baseline;margin-bottom:10px;
  font-size:.72rem;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--text-dim);
}
.setup-head span{
  font-weight:500;letter-spacing:0;text-transform:none;color:var(--text-ghost);
}
.style-chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px}
.style-chip{
  padding:7px 13px;border-radius:999px;border:1px solid var(--border);
  background:transparent;color:var(--text-dim);font-size:.76rem;font-weight:600;
  cursor:pointer;font-family:inherit;
  transition:border-color .15s,color .15s,background .15s;
}
.style-chip:hover{border-color:var(--border-strong);color:var(--text)}
.style-chip.on{
  background:rgba(239,68,68,.12);border-color:var(--accent);color:var(--accent);
}
.judge-presets{display:flex;flex-wrap:wrap;gap:6px;margin:2px 0 8px}
.judge-preset-chip{font-size:.72rem;padding:5px 10px}
.paradigm-row label{
  display:block;font-size:.74rem;font-weight:700;color:var(--text-dim);margin-bottom:6px;
}
.paradigm-row label .opt{font-weight:500;color:var(--text-ghost)}
.paradigm-row textarea{
  width:100%;background:var(--bg-elev);border:1px solid var(--border);border-radius:10px;
  color:var(--text);font-family:inherit;font-size:.8rem;line-height:1.5;
  padding:9px 11px;resize:vertical;min-height:46px;
}
.paradigm-row textarea:focus{outline:none;border-color:var(--accent)}
.paradigm-meta{
  display:flex;justify-content:space-between;gap:8px;margin-top:5px;
  font-size:.66rem;color:var(--text-ghost);
}
#paradigmSaved{color:var(--green)}

/* Consent card — a proposed round with judge instructions, awaiting
   the opponent's accept/pass. */
.consent-wrap{max-width:580px;margin:0 auto}
.consent-note{
  max-width:480px;margin:14px auto 0;padding:13px 16px;text-align:left;
  background:rgba(239,68,68,.07);border:1px solid var(--accent-glow);border-radius:12px;
  font-size:.86rem;line-height:1.55;color:var(--text);
}
.consent-note.mine{
  background:var(--bg-card);border-color:var(--border);color:var(--text-dim);
}
.consent-note-label{
  font-size:.64rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase;
  color:var(--text-ghost);margin-bottom:5px;
}
/* Cross-format proposal block — "your proposal X, their proposal Y, play Z?" */
.consent-format{
  max-width:480px;margin:14px auto 0;padding:13px 16px;text-align:left;
  background:rgba(239,68,68,.07);border:1px solid var(--accent-glow);border-radius:12px;
}
.consent-format-row{
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  font-size:.82rem;line-height:1.5;color:var(--text-dim);
}
.consent-format-row + .consent-format-row{margin-top:7px;padding-top:7px;border-top:1px solid var(--border)}
.consent-format-row strong{color:var(--text);font-weight:700}
.consent-format-row.play strong{color:var(--accent)}
.consent-format-who{font-size:.66rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--text-ghost)}

/* Live waitlist tile — shows other available debaters, with avatars,
   short names, proposed formats, and how long they've been waiting.
   Replaces the older single-line "X in your queue" text. */
.waitlist{
  max-width:420px;margin:0 auto;
  padding:14px 16px 12px;
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:14px;
  text-align:left;
}
.waitlist-head{
  display:flex;align-items:center;justify-content:space-between;
  font-size:.66rem;font-weight:800;letter-spacing:.14em;text-transform:uppercase;
  color:var(--text-ghost);
  margin-bottom:10px;
}
.waitlist-head strong{color:var(--text);font-size:.78rem;letter-spacing:.04em;text-transform:none;font-weight:800}
.waitlist-head .wl-fmt{color:var(--text-dim);font-size:.62rem}
.wl-list{
  list-style:none;padding:0;margin:0;
  display:flex;flex-direction:column;gap:2px;
}
.wl-row{
  display:grid;grid-template-columns:24px 1fr auto auto;align-items:center;gap:10px;
  padding:6px 4px;border-radius:6px;
}
.wl-row + .wl-row{border-top:1px solid var(--border)}
/* Per-peer DM action in the live queue list. Lets you reach out to
   someone who's searching right now and organise a round directly,
   instead of only waiting on the random pair. Reuses openDMThread +
   the existing dm_threads marketplace. */
.wl-msg-btn{
  font-family:inherit;font-size:.68rem;font-weight:700;letter-spacing:.02em;
  color:var(--accent);background:rgba(239,68,68,.08);
  border:1px solid rgba(239,68,68,.32);border-radius:999px;
  padding:4px 11px;cursor:pointer;white-space:nowrap;transition:background .15s,border-color .15s;
}
.wl-msg-btn:hover{background:rgba(239,68,68,.16);border-color:rgba(239,68,68,.55)}
.wl-avi{
  width:24px;height:24px;border-radius:50%;
  background:rgba(239,68,68,.12);
  display:inline-flex;align-items:center;justify-content:center;
  overflow:hidden;flex-shrink:0;
  font-size:.66rem;font-weight:800;color:#fca5a5;
}
.wl-avi img{width:100%;height:100%;object-fit:cover;display:block}
.wl-name{
  font-size:.82rem;color:var(--text);font-weight:600;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.wl-time{
  font-size:.7rem;color:var(--text-ghost);font-weight:600;
  font-variant-numeric:tabular-nums;
}
.wl-more{
  margin-top:8px;
  font-size:.7rem;color:var(--text-dim);text-align:center;
}
.waitlist-empty{
  max-width:420px;margin:0 auto;
  padding:12px 16px;
  background:var(--bg-card);
  border:1px dashed var(--border);
  border-radius:12px;
  font-size:.78rem;color:var(--text-dim);text-align:center;line-height:1.5;
}
.waitlist-empty strong{color:var(--text);font-weight:700}

/* Guest recovery gate. Normal visitors are placed into anonymous Firebase
   auth automatically; this only appears if that bootstrap fails or the user
   explicitly chooses Google. */
.gate{
  background:var(--bg-card);border:1px solid var(--border);border-radius:18px;
  padding:32px 28px;max-width:440px;width:100%;text-align:center;
}
.gate h2{font-size:1.4rem;font-weight:900;letter-spacing:-.015em;margin-bottom:10px;color:var(--text)}
.gate p{font-size:.92rem;color:var(--text-dim);line-height:1.55;margin-bottom:18px}
.gate-guest{
  display:inline-flex;align-items:center;justify-content:center;gap:10px;
  width:100%;padding:13px 22px;background:var(--accent);color:white;border-radius:12px;
  font-weight:800;font-size:.9rem;cursor:pointer;border:none;font-family:inherit;
  transition:transform .15s, background .15s, box-shadow .15s;margin-bottom:10px;
}
.gate-guest:hover{transform:translateY(-1px);background:#dc2626;box-shadow:0 10px 24px rgba(239,68,68,.22)}
.gate-google{
  display:inline-flex;align-items:center;justify-content:center;gap:10px;
  width:100%;padding:13px 22px;background:#fff;color:#1a1a1a;border-radius:12px;
  font-weight:700;font-size:.9rem;cursor:pointer;font-family:inherit;
  border:1px solid rgba(0,0,0,.14);box-shadow:0 2px 10px rgba(0,0,0,.06);
  transition:transform .15s;margin-bottom:10px;
}
.gate-google:hover{transform:translateY(-1px);box-shadow:0 8px 22px rgba(0,0,0,.3)}
.gate-google svg{width:18px;height:18px;flex-shrink:0}
.gate-disclaimer{font-size:.74rem;color:var(--text-ghost);margin-top:12px;line-height:1.55}
.gate .ai-alt{
  display:block;margin-top:10px;padding:6px 8px;
  font-size:.72rem;color:var(--text-ghost);font-weight:500;
  border:none;border-radius:0;
  text-decoration:underline;text-underline-offset:3px;
  opacity:.6;transition:opacity .15s,color .15s;
}
.gate .ai-alt:hover{color:var(--text-dim);opacity:.85;background:transparent}
.discord-schedule-link{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  margin-top:12px;padding:9px 13px;
  border:1px solid rgba(88,101,242,.38);border-radius:999px;
  background:rgba(88,101,242,.08);
  color:#a7b3ff;text-decoration:none;
  font-size:.76rem;font-weight:800;line-height:1.25;
  transition:border-color .15s, background .15s, transform .15s;
}
.discord-schedule-link:hover{
  border-color:rgba(88,101,242,.62);
  background:rgba(88,101,242,.13);
  transform:translateY(-1px);
}
.discord-schedule-link .dot{
  width:6px;height:6px;border-radius:50%;background:#5865F2;
  box-shadow:0 0 0 3px rgba(88,101,242,.18);flex-shrink:0;
}
[data-theme="light"] .discord-schedule-link{
  color:#4f46e5;background:rgba(88,101,242,.07);
  border-color:rgba(88,101,242,.28);
}
.guest-nudge{
  display:flex;align-items:center;justify-content:space-between;gap:14px;
  margin:18px auto 0;padding:12px 14px;max-width:520px;
  background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.22);
  border-radius:14px;color:var(--text-dim);font-size:.8rem;line-height:1.45;text-align:left;
}
/* Held back ~4s after searching starts (see delayed insert in
   renderSearching): guests see the round genuinely working before the
   sign-up ask arrives. The base .guest-nudge is fully visible; the fade
   is opt-in via --in and only applied when the tab is visible, so a
   backgrounded tab (which pauses the animation) can never leave it stuck
   invisible. */
.guest-nudge--in{animation:guestNudgeIn .42s ease}
@keyframes guestNudgeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.guest-nudge strong{color:var(--text);font-weight:800}
.guest-nudge button{
  flex:0 0 auto;border:1px solid rgba(239,68,68,.34);background:rgba(239,68,68,.12);
  color:var(--accent);border-radius:999px;padding:8px 12px;
  font-family:inherit;font-size:.74rem;font-weight:800;cursor:pointer;
}
.guest-nudge button:hover{background:rgba(239,68,68,.18)}
@media(max-width:640px){
  .guest-nudge{align-items:flex-start;flex-direction:column}
}
/* 2026-07-02 — session-style portraits near the signup CTA. */
.gate-faces{display:flex;justify-content:center;gap:8px;margin:2px 0 6px}
.gate-faces img{
  width:74px;height:74px;object-fit:cover;border-radius:12px;
  border:2px solid rgba(255,255,255,.85);
  box-shadow:0 6px 18px rgba(0,0,0,.28);
}
.gate-faces img:nth-child(odd){transform:rotate(-2deg)}
.gate-faces img:nth-child(even){transform:rotate(2deg)}
.gate-faces-note{font-size:.62rem;color:var(--text-ghost);opacity:.75;margin:0 0 14px}

.error{
  padding:12px 16px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.32);
  border-radius:10px;color:#fca5a5;font-size:.84rem;margin-top:14px;
}

/* Helpful link strip at bottom */
.foot{
  font-size:.74rem;color:var(--text-ghost);margin-top:24px;line-height:1.6;
}
.foot a{color:var(--text-dim);text-decoration:underline;text-decoration-color:rgba(255,255,255,.25)}
.foot a:hover{color:var(--text)}

/* ── Waitlist sidebar (left rail) ─────────────────────────
   Posts persist in Firestore (waitlist_posts collection) so users
   can find each other for organized debates while the matchmaker
   keeps running in the center. DMs go through dm_threads. Both
   collections need rules + an index — see the comment block in the
   JS section below. */
/* `[hidden]` defaults to display:none in the UA stylesheet, but our
   inbox button + badge have explicit display:flex / inline-flex below
   that beats specificity. Force-respect [hidden] for these elements
   so the JS toggle (inboxBtn.hidden = true/false) actually hides
   them on signed-out + zero-unread states. */
.waitlist-rail__inbox[hidden], .waitlist-rail__inbox .badge[hidden],
.waitlist-fab[hidden], .waitlist-fab .fab-badge[hidden]{display:none !important}
.waitlist-rail{
  position:fixed; top:90px; left:24px; bottom:24px;
  width:320px; max-width:calc(100vw - 48px);
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:16px;
  display:flex; flex-direction:column;
  overflow:hidden;
  z-index:30;
  box-shadow:var(--shadow-lg);
}
.waitlist-rail__head{
  padding:14px 16px;
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
  gap:8px;
}
/* Matches the right rail's "WHILE YOU WAIT" head so the two panels read
   as a set. The page's label language is uppercase-tracked throughout
   (eyebrow, meta-strip, warm-up label); title-case "Open invites" was the
   lone outlier. */
.waitlist-rail__title{
  font-size:.78rem; font-weight:800; letter-spacing:.07em; text-transform:uppercase;
  color:var(--text);
  display:flex; align-items:center; gap:8px;
}
.waitlist-rail__title .live-dot{
  width:6px; height:6px; border-radius:50%;
  background:var(--accent); box-shadow:0 0 8px var(--accent);
  animation:pulse 1.6s ease-in-out infinite;
}
.waitlist-rail__sub{
  font-size:.72rem; color:var(--text-ghost); font-weight:500;
  padding:10px 16px 0; line-height:1.5;
}
/* Scheduled rounds block (2026-07-14): native scheduling from
   /api/schedule-round rendered above the Discord card. Hidden until
   at least one upcoming round exists — no empty chrome. */
.waitlist-rail__sched{margin:10px 16px 0}
.wl-sched-head{
  font-size:.62rem;font-weight:800;letter-spacing:.13em;text-transform:uppercase;
  color:var(--text-ghost);margin:0 0 6px;display:flex;align-items:center;justify-content:space-between;
}
.wl-sched-head a{color:var(--text-dim);font-weight:700;text-decoration:none;text-transform:none;letter-spacing:0;font-size:.66rem}
.wl-sched-head a:hover{color:var(--text)}
.wl-sched-row{
  display:flex;align-items:center;gap:10px;
  padding:8px 10px;border:1px solid var(--border);border-radius:11px;
  background:rgba(255,255,255,.025);margin-bottom:6px;
}
.wl-sched-row.soon{border-color:rgba(34,197,94,.45)}
.wl-sched-when{flex:none;font-size:.66rem;font-weight:800;color:var(--text);min-width:74px;line-height:1.25}
.wl-sched-row.soon .wl-sched-when{color:#22c55e}
.wl-sched-what{flex:1;min-width:0;font-size:.68rem;color:var(--text-dim);line-height:1.35;overflow:hidden;text-overflow:ellipsis}
.wl-sched-what b{color:var(--text);font-weight:700}
.wl-sched-btn{
  flex:none;padding:5px 10px;border-radius:999px;border:1px solid var(--border);
  background:transparent;color:var(--text-dim);font-size:.64rem;font-weight:800;
  cursor:pointer;font-family:inherit;transition:color .15s,border-color .15s;text-decoration:none;
}
.wl-sched-btn:hover{color:var(--text);border-color:var(--border-strong)}
.wl-sched-btn.on{border-color:rgba(34,197,94,.55);color:#22c55e}
.wl-sched-btn.go{border-color:rgba(239,68,68,.55);color:var(--accent)}
.waitlist-rail__discord{
  display:block;margin:10px 16px 0;padding:10px 12px;
  border-radius:12px;border:1px solid rgba(88,101,242,.34);
  background:rgba(88,101,242,.08);
  color:var(--text);text-decoration:none;
  font-size:.74rem;line-height:1.45;
  transition:border-color .15s, background .15s;
}
.waitlist-rail__discord:hover{border-color:rgba(88,101,242,.58);background:rgba(88,101,242,.12)}
.waitlist-rail__discord strong{display:block;font-weight:800;margin-bottom:2px;color:var(--text)}
.waitlist-rail__discord span{display:block;color:var(--text-dim)}
.waitlist-rail__inbox{
  display:inline-flex; align-items:center; gap:6px;
  padding:4px 10px; border-radius:999px;
  background:transparent; border:1px solid var(--border);
  color:var(--text-dim); font-size:.7rem; font-weight:700; cursor:pointer;
  transition:color .15s, border-color .15s;
  font-family:inherit;
}
.waitlist-rail__inbox:hover{color:var(--text); border-color:var(--border-strong)}
.waitlist-rail__inbox .badge{
  display:inline-flex; align-items:center; justify-content:center;
  min-width:16px; height:16px; padding:0 5px; border-radius:999px;
  background:var(--accent); color:#fff; font-size:.62rem; font-weight:800;
}
.waitlist-rail__list{
  flex:1; overflow-y:auto; padding:8px 12px 12px;
  display:flex; flex-direction:column; gap:8px;
}
.waitlist-rail__empty{
  font-size:.78rem; color:var(--text-ghost); padding:18px 8px;
  text-align:center; line-height:1.55;
}
.waitlist-rail__empty a{color:#a7b3ff;font-weight:800;text-decoration:underline;text-underline-offset:3px}
[data-theme="light"] .waitlist-rail__empty a{color:#4f46e5}
/* Honest "real activity this week" note shown under the empty waitlist
   when the live log-missed-match count clears the threshold. */
.wl-rail-activity{
  margin:4px 8px 12px; padding:10px 12px;
  font-size:.76rem; color:var(--text-dim); line-height:1.5;
  text-align:center;
  background:rgba(239,68,68,.05); border:1px solid rgba(239,68,68,.16);
  border-radius:10px;
}
.wl-rail-activity strong{ color:var(--accent); font-weight:800; }
.waitlist-card{
  display:flex; flex-direction:column; gap:8px;
  padding:12px 12px;
  background:var(--bg-elev); border:1px solid var(--border);
  border-radius:12px;
  transition:border-color .15s, transform .15s;
}
.waitlist-card:hover{ border-color:var(--border-strong); transform:translateY(-1px) }
.waitlist-card__head{ display:flex; align-items:center; gap:10px }
.waitlist-card__avatar{
  width:32px; height:32px; border-radius:50%;
  background:linear-gradient(135deg,#444,#222);
  flex-shrink:0; object-fit:cover;
}
.waitlist-card__who{ flex:1; min-width:0; display:flex; flex-direction:column }
.waitlist-card__name{
  font-size:.82rem; font-weight:700; color:var(--text);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.waitlist-card__meta{
  font-size:.62rem; color:var(--text-ghost); font-weight:700;
  letter-spacing:.06em; text-transform:uppercase;
}
.waitlist-card__note{
  font-size:.78rem; color:var(--text-dim); line-height:1.5;
  display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden;
  white-space:pre-wrap; word-wrap:break-word;
}
.waitlist-card__actions{
  display:flex; align-items:center; justify-content:flex-end; gap:8px;
}
.waitlist-card__dm{
  padding:6px 14px; border-radius:999px;
  background:var(--accent); color:#fff; border:none;
  font-size:.72rem; font-weight:700; cursor:pointer;
  transition:background .15s; font-family:inherit;
}
.waitlist-card__dm:hover{background:#dc2626}
.waitlist-card__dm[disabled]{opacity:.45;cursor:not-allowed}
.waitlist-card__delete{
  padding:6px 12px; border-radius:999px;
  background:transparent; color:var(--text-ghost);
  border:1px solid var(--border); font-size:.66rem; font-weight:600; cursor:pointer;
  font-family:inherit;
}
.waitlist-card__delete:hover{color:var(--text); border-color:var(--border-strong)}

.waitlist-rail__post-slot{ padding:12px }
.waitlist-rail__post-btn{
  width:100%; padding:11px 14px;
  border-radius:12px; border:none;
  background:var(--accent); color:#fff;
  font-size:.84rem; font-weight:700; cursor:pointer;
  transition:background .15s, transform .15s;
  font-family:inherit;
}
.waitlist-rail__post-btn:hover{background:#dc2626; transform:translateY(-1px)}
.waitlist-rail__post-btn[disabled]{opacity:.5;cursor:not-allowed}

.waitlist-rail__signin-overlay{
  padding:14px;
  background:rgba(239,68,68,.06);
  border:1px dashed rgba(239,68,68,.32);
  border-radius:12px;
  font-size:.76rem; color:var(--text-dim); line-height:1.55;
  text-align:center;
}
.waitlist-rail__signin-overlay button{
  display:inline-block; margin-top:8px;
  font-weight:700; color:var(--accent);
  background:none; border:none; cursor:pointer;
  font-size:.78rem; font-family:inherit;

  // human queue indefinitely and prepping/browsing keeps their spot

  // remains for the manual/dead-peer paths; nothing auto-invokes it.
  // Re-stamp cadence for the searching queue doc. Mirrors
  // HEARTBEAT_MS in js/notifications.js sparLive().
  var QUEUE_HEARTBEAT_MS = 90 * 1000;

  // every waiting debater, then asks both sides to accept/pass when

  var shell = document.getElementById('shell');
  // Delegated DM action for the live queue list. Bound once on the stable
  // shell so it survives every renderWaitlist() re-render (the queue list
  // re-paints on each poll). Clicking "Message them" on a peer who's
  // searching opens a 1:1 thread with them via the existing dm_threads
  // marketplace, so you can organise a round instead of only waiting on
  // the random pair. openDMThread no-ops for signed-out users.
  if (shell){

      var btn = e.target && e.target.closest ? e.target.closest('[data-dm-uid]') : null;

  // Mirror of spar-pair.mjs skipActive(): a passed-proposal skip only
  // counts while its skipAt stamp is fresh (5 min). Legacy docs with
  // bare skipUids arrays and no stamp read as expired, so old ghosts
  // can't deadlock the queue.
  var SKIP_TTL_MS = 5 * 60 * 1000;
  function docSkips(data, uid){
    if (!data || !uid) return false;
    var arr = Array.isArray(data.skipUids) ? data.skipUids : [];
    if (arr.indexOf(uid) < 0) return false;
    var at = data.skipAt && data.skipAt[uid];
    var t = (at && typeof at.toMillis === 'function') ? at.toMillis()
          : (at && at.seconds != null) ? at.seconds * 1000 : 0;
    if (!t) return false;
    return (Date.now() - t) <= SKIP_TTL_MS;
  }

  // unbounded state.skipUids array so local skips expire too.
  function localSkipActive(uid){
    var t = state.skipAtLocal && state.skipAtLocal[uid];
    return !!t && (Date.now() - t) <= SKIP_TTL_MS;

  // Render the live waitlist tile shown under the globe. `others` is an
  // array of Firestore docs for queued peers (excluding self). Format is
  // shown as a proposal, not a separate queue.
  function renderWaitlist(others){

      return '<div class="waitlist-empty">' +
        "<strong>You're first in line.</strong> Waiting on the next available debater. Your round setup will be proposed before the debate starts." +

    }
    var now = Math.floor(Date.now() / 1000);
    var rows = others.slice(0, 6).map(function(d){
      var data = d.data ? d.data() : d;
      var uid = (d && d.id) ? d.id : (data.uid || '');
      var name = escHtml(data.displayName || 'Anonymous');
      var initial = (name.replace(/&[^;]+;/g,'').charAt(0) || '?').toUpperCase();
      var avi = data.photoURL
        ? '<img src="' + escHtml(data.photoURL) + '" alt="" referrerpolicy="no-referrer" onerror="this.replaceWith(Object.assign(document.createElement(\'span\'),{textContent:\'' + initial + '\'}))" />'

        ? Math.max(0, now - data.joinedAt.seconds)
        : 0;
      var pref = FORMAT_LABELS[data.format] || String(data.format || 'Open').toUpperCase();

      // organise a round directly. Only when we have a uid to reach and
      // it isn't us. Click handled by the delegated listener on `shell`.

      : '';

      '<div class="waitlist-head">' +

  function doGoogleSignIn(){
    if (!firebaseAuth){
      var gateError = document.getElementById('gateError');
      if (gateError) gateError.innerHTML = '<div class="error">Sign-in didn\'t load. Refresh the page or skip to the AI fallback.</div>';
      return;
    }
    var provider = new firebase.auth.GoogleAuthProvider();
    var current = firebaseAuth.currentUser;
    var signInPromise;
    if (current && current.isAnonymous && current.linkWithPopup){
      signInPromise = current.linkWithPopup(provider).catch(function(err){
        var code = err && err.code || '';
        if (code === 'auth/credential-already-in-use' || code === 'auth/email-already-in-use'){
          try {
            if (state.queueDocRef) {
              state.queueDocRef.update({
                status: 'cancelled',
                cancelReason: 'guest_upgrade',
                cancelledAt: firebase.firestore.FieldValue.serverTimestamp(),
              }).catch(function(){});
            }
          } catch(e){}
          return firebaseAuth.signInWithPopup(provider);
        }
        throw err;
      });
    } else {
      signInPromise = firebaseAuth.signInWithPopup(provider);
    }
    signInPromise.catch(function(err){
      try { if (window.gtag) gtag('event', 'sign_in_error', { code: (err && err.code) || 'unknown', message: ((err && err.message) || '').slice(0, 200), surface: 'spar', method: 'popup' }); } catch(_){}
      // Some in-app browsers (Instagram, TikTok) block popup OAuth.
      // Fall back to redirect, which most embedded browsers tolerate.
      if (err && (err.code === 'auth/popup-blocked' || err.code === 'auth/operation-not-supported-in-this-environment')){
        firebaseAuth.signInWithRedirect(provider);
      } else {
        var ge = document.getElementById('gateError');
        if (ge) ge.innerHTML = '<div class="error">Sign-in failed: ' + escHtml(err && err.message || 'unknown') + '</div>';
      }
    });
  }

  var guestAuthPromise = null;

      '<div class="organized-pivot" style="margin-top:14px;font-size:.78rem;color:var(--text-dim);text-align:center;line-height:1.55">' +
        'Or skip the random match. ' +
        '<a href="/live" style="color:var(--accent);font-weight:600;text-decoration:underline;text-underline-offset:3px;text-decoration-color:rgba(239,68,68,.45)">browse scheduled debates on the live board →</a>' +
        ' or ' +
        '<a href="' + DISCORD_INVITE + '" target="_blank" rel="noopener noreferrer" style="color:#a7b3ff;font-weight:700;text-decoration:underline;text-underline-offset:3px;text-decoration-color:rgba(88,101,242,.45)">organize times and forum threads in Discord →</a>' +
        /* 2026-05-26: dropped the "/debate-chat" follow-up link — that
           page redirects here now, so suggesting it from /spar is a
           loop. The /live board is the meaningful alternative. */
      '</div>' +
      // pairingTicker removed (2026-05-25): the "Recent pairing · @x ↔ @y · paired in Ns"
      // line cycled 8 fabricated handles every 3s. Same dead-internet dishonesty
      // ruled out in community.html (May 2026). Status text below is the honest signal.
      '<div class="queue-stats" id="queueStats">' + renderWaitlist([], formatParam) + '</div>' +
      // Watch-a-round panel: live rounds happening right now that anyone
      // (incl. guests) can drop into as a spectator. Directly answers
      // "can't see who's around." Populated by mountWatchPanel() from the
      // public-read live_rounds collection; hidden until there's at least
      // one round to watch so it never shows an empty shell.
      '<div class="watch-panel" id="watchPanel" hidden></div>' +
      // Live diagnostic line. Always visible during the search (unlike
      // Shows: peer count from the last query, my uid tail (so two
      // test windows confirm they're on different accounts), and the
      // last spar-pair attempt outcome (success/soft-fail reason).
      '<div class="diag" id="diagLine" aria-live="polite" style="margin-top:10px;font-size:.66rem;color:var(--text-ghost);text-align:center;font-variant-numeric:tabular-nums;letter-spacing:.04em;text-transform:uppercase;opacity:.7"></div>' +
      '<div class="foot">Your camera + mic stay off until you accept the match. Match found = you both jump into a video room.</div>';
    document.getElementById('cancelBtn').addEventListener('click', cancelQueue);
    (function(){
      // "Prep while you wait" — flip on BACKGROUND availability (the flag
      // js/notifications.js sparLive reads) and send the user to prep.
      // They keep matchmaking in the background and get a "Match found"
      // card the moment a human is found, anywhere on the site, instead of
      // staring at this page. This is the discoverable on-/spar entry to
      // the background matcher (the bell pill is suppressed on /spar).
      var bgBtn = document.getElementById('bgAvailBtn');
      if (!bgBtn) return;
      bgBtn.addEventListener('click', function(){
        // Persist the chosen format BEFORE flipping the availability
        // flag — js/notifications.js fmt() reads this key to decide
        // which queue the background matcher joins (defaults to 'apda'
        // when unset, silently overwriting the user's queue doc).
        try { localStorage.setItem('debateos-spar-format', formatParam); } catch(e){}
        try { localStorage.setItem('da-spar-bg', '1'); } catch(e){}
        try { if (window.gtag) gtag('event', 'spar_bg_on', { from: 'spar_searching' }); } catch(e){}
        location.href = '/debate-it';
      });
    })();
    (function(){
      // Round-alerts opt-in. Shows for signed-in (non-guest) users who haven't
      // already enabled live alerts; uses the helpers exposed by
      // js/notifications.js (daSetLiveAlerts requests push permission + saves
      // the notify_prefs flag). Web Push stays a named-account feature, so
      // this stays hidden for guest users.
      var cta = document.getElementById('alertsCta');
      var btn = document.getElementById('alertsEnableBtn');
      if (!cta || !btn) return;
      function refresh(){
        var ok = isNamedUser(state.user) && typeof window.daSetLiveAlerts === 'function';
        var alreadyOn = typeof window.daGetLiveAlerts === 'function' && window.daGetLiveAlerts();
        cta.hidden = !(ok && !alreadyOn);
      }
      btn.addEventListener('click', function(){
        if (window.daSetLiveAlerts) window.daSetLiveAlerts(true, function(){});
        cta.hidden = true;
        try { if (window.gtag) gtag('event', 'live_alerts_on', { from: 'spar_searching' }); } catch(e){}
      });
      // notifications.js loads deferred; retry briefly so the CTA appears once
      // the helpers are ready.
      refresh();
      var tries = 0, iv = setInterval(function(){ tries++; refresh(); if (!cta.hidden || tries > 20) clearInterval(iv); }, 300);
    })();
    startCountdown();
    startStatusCycle();
    // startPairingTicker() removed — see RECENT_PAIRINGS comment above
    startMetaLive();
    fetchMissedMatchCount();
    logSparAttempt();
    mountGlobalMap('globalDebateMap');
    delayedGuestNudge();
    wireSetupCard();
    mountWaitRail();
    mountWatchPanel();
  }

  // ── Watch a live round ───────────────────────────────
  // Lists rounds happening right now from the public-read live_rounds
  // collection. Anyone (guests included) can drop in as a spectator;
  // live-round.html treats a viewer with no seat as read-only. Refreshes
  // on an interval; torn down with the rest of the search machinery.
  var WATCH_FORMAT_LABELS = FORMAT_LABELS; // reuse the style-chip labels
  function watchRoundIsLive(d){
    if (!d || d.status !== 'round' || d.isPrivate) return false;
    // Require a recent participant heartbeat — a seated debater actually
    // in the room within the last ~100s (live-round.html writes lastSeenAt
    // every 30s while present). This is what kills ghost rooms: when both
    // debaters close their tabs the beat stops and the round drops off
    // here within a couple of cycles, instead of lingering 30 min on
    // createdAt. No heartbeat at all (abandoned/legacy doc) = not provably
    // live, so it's hidden.
    var hb = d.lastSeenAt;
    var sec = (hb && hb.seconds) ? hb.seconds : 0;
    if (!sec) return false;
    return (Date.now() / 1000 - sec) < 100;
  }
  function renderWatchRow(id, d){
    var fmt = escHtml(WATCH_FORMAT_LABELS[d.format] || String(d.format || '').toUpperCase());
    var motion = escHtml((d.motion || 'Live debate').slice(0, 90));
    var who = escHtml([d.proName, d.conName].filter(Boolean).join(' vs ') || 'In progress');
    var url = '/live-round.html?room=' + encodeURIComponent(id) + '&spectate=1';
    return '<a class="watch-row" href="' + url + '">' +
      '<span class="watch-live"><span class="watch-blink"></span>LIVE</span>' +
      '<span class="watch-body"><span class="watch-motion">' + motion + '</span>' +
      '<span class="watch-meta">' + fmt + ' · ' + who + '</span></span>' +
      '<span class="watch-go">Watch &rsaquo;</span>' +
    '</a>';
  }
  function paintWatchPanel(rounds){
    var el = document.getElementById('watchPanel');
    if (!el) return;
    if (!rounds.length){ el.hidden = true; el.innerHTML = ''; return; }
    el.hidden = false;
    el.innerHTML =
      '<div class="watch-head"><span class="watch-head-dot"></span>Watch a live round' +
        '<span class="watch-count">' + rounds.length + ' live</span></div>' +
      rounds.slice(0, 5).map(function(r){ return renderWatchRow(r.id, r.d); }).join('');
  }
  function pollWatchPanel(){
    if (!firebaseDb || state.cancelled) return;
    firebaseDb.collection('live_rounds').orderBy('createdAt', 'desc').limit(30).get()
      .then(function(snap){
        var mine = state.user ? state.user.uid : null;
        var rounds = [];
        snap.forEach(function(doc){
          var d = doc.data();
          if (!watchRoundIsLive(d)) return;
          if (mine && (d.proUid === mine || d.conUid === mine)) return; // don't offer your own round
          rounds.push({ id: doc.id, d: d });
        });
        paintWatchPanel(rounds);
      })
      .catch(function(err){ console.warn('[spar] watch poll failed', err && err.message); });
  }
  function mountWatchPanel(){
    pollWatchPanel();
    if (state.watchPollInterval) clearInterval(state.watchPollInterval);
    state.watchPollInterval = setInterval(pollWatchPanel, 12000);
  }

  // ── Round setup wiring ───────────────────────────────
  // Style switch updates the proposed format on the current queue doc.
  // It does not requeue or narrow matchmaking.
  function switchFormat(key){
    if (key === formatParam || FORMATS.indexOf(key) < 0) return;
    formatParam = key;
    try { localStorage.setItem('debateos-spar-format', key); } catch(e){}
    try {
      var u = new URL(location.href);
      u.searchParams.set('format', key);
      history.replaceState(null, '', u.toString());
    } catch(e){}
    try { gtag('event', 'spar_style_pick', { format: key }); } catch(e){}
    var chips = document.querySelectorAll('#styleChips [data-fmt]');
    chips.forEach(function(chip){
      chip.classList.toggle('on', chip.getAttribute('data-fmt') === key);
    });
    if (state.queueDocRef){
      state.queueDocRef.update({ format: key }).catch(function(){});
    } else if (!state.user || !firebaseDb) {
      ensureGuestAuth().catch(function(){ renderGate(); });
    }
  }

  function wireSetupCard(){
    var chips = document.getElementById('styleChips');
    if (chips){
      chips.addEventListener('click', function(ev){
        var b = ev.target && ev.target.closest ? ev.target.closest('[data-fmt]') : null;
        if (b) switchFormat(b.getAttribute('data-fmt'));
      });
    }
    var ta = document.getElementById('paradigmInput');
    if (!ta) return;
    ta.value = state.paradigm || '';
    var count = document.getElementById('paradigmCount');
    var saved = document.getElementById('paradigmSaved');
    if (count) count.textContent = ta.value.length + '/' + PARADIGM_MAX;
    // Preset chips light up when the note matches their text exactly; any
    // hand edit dims them (the note is the truth, chips are shortcuts).
    var presetWrap = document.getElementById('judgePresets');
    function syncPresetChips(){
      if (!presetWrap) return;
      var cur = cleanParadigm(ta.value);
      Array.prototype.forEach.call(presetWrap.querySelectorAll('[data-preset]'), function(b){
        var p = null;
        for (var i = 0; i < JUDGE_PRESETS.length; i++) if (JUDGE_PRESETS[i].key === b.getAttribute('data-preset')) p = JUDGE_PRESETS[i];
        b.classList.toggle('on', !!p && cur === p.text);
      });
    }
    syncPresetChips();
    if (presetWrap){
      presetWrap.addEventListener('click', function(ev){
        var b = ev.target && ev.target.closest ? ev.target.closest('[data-preset]') : null;
        if (!b) return;
        var p = null;
        for (var i = 0; i < JUDGE_PRESETS.length; i++) if (JUDGE_PRESETS[i].key === b.getAttribute('data-preset')) p = JUDGE_PRESETS[i];
        if (!p) return;
        // Tap again to clear; tap a different chip to swap.
        ta.value = (cleanParadigm(ta.value) === p.text) ? '' : p.text;
        try { gtag('event', 'spar_judge_preset', { preset: p.key, format: formatParam }); } catch(e){}
        ta.dispatchEvent(new Event('input'));
      });
    }
    var deb = null;
    function save(){
      var v = cleanParadigm(ta.value);
      if (v === state.paradigm) return;
      state.paradigm = v;
      try { localStorage.setItem('debateos-spar-paradigm', v); } catch(e){}
      try { gtag('event', 'spar_paradigm_set', { format: formatParam, len: v.length }); } catch(e){}
      if (state.queueDocRef){
        state.queueDocRef.update({ paradigm: v }).then(function(){
          if (saved) saved.textContent = v ? 'Saved. Your opponent reads this before accepting.' : 'Cleared.';
        }).catch(function(){});
      } else if (saved){
        saved.textContent = v ? 'Saved.' : '';
      }
    }
    ta.addEventListener('input', function(){
      if (count) count.textContent = ta.value.length + '/' + PARADIGM_MAX;
      if (saved) saved.textContent = '';
      syncPresetChips();
      if (deb) clearTimeout(deb);
      deb = setTimeout(save, 600);
    });
    ta.addEventListener('blur', save);
  }

  // ── While-you-wait rail (right side, searching only) ─────
  // The 4-minute window is long enough that "stare at the countdown"
  // is bad UX. The rail gives the wait a job: a warm-up motion +
  // scratchpad (persisted to localStorage so it survives navigation
  // into the round), the "your spot follows you" reassurance, and
  // safe links into the rest of the app — safe because searching now
  // flips the background-availability flag (see joinQueue).
  var WARMUP_MOTIONS = [
    'THBT social media platforms should ban political advertising.',
    'THW make voting compulsory.',
    'THBT elite universities do more harm than good.',
    'THW ban targeted advertising to minors.',
    'THBT space exploration is a waste of public money.',
    'THW abolish cash bail.',
    'THBT AI tutors will do more for educational equality than smaller class sizes.',
    'THW require a year of national service.',
    'THBT professional athletes are overpaid.',
    'THW give every citizen a universal basic income.',
    'THBT the nuclear family is an outdated ideal.',
    'THW ban private schools.',
  ];

  function mountWaitRail(){
    removeWaitRail();
    var rail = document.createElement('aside');
    rail.id = 'waitRail';
    rail.className = 'wait-rail';
    rail.setAttribute('aria-label', 'Things to do while you wait');
    var savedPad = '';
    try { savedPad = localStorage.getItem('da-spar-warmup') || ''; } catch(e){}
    rail.innerHTML =
      '<div class="wait-rail__head"><span class="live-dot"></span>While you wait</div>' +
      '<div class="wait-rail__body">' +
        '<div class="wait-rail__note"><strong>Your spot follows you.</strong> Leave this page and you stay in the queue; the green Available pill in the top bar tracks it, and a match card pops on whatever page you\'re on. Cancel here turns it off.</div>' +
        '<div class="wait-rail__card">' +
          '<div class="wait-rail__label">Warm-up motion <button class="wait-rail__shuffle" id="warmupShuffle" type="button">New motion</button></div>' +
          '<div class="wait-rail__motion" id="warmupMotion"></div>' +
          '<textarea class="wait-rail__pad" id="warmupPad" placeholder="Outline: main argument / why it matters / what the other side says, and why that\'s wrong."></textarea>' +
        '</div>' +
        '<div class="wait-rail__links">' +
          '<a class="wait-rail__link" href="/app#case">Prep a case <span class="spot-tag">spot kept</span></a>' +
          '<a class="wait-rail__link" href="/learn">Run a drill <span class="spot-tag">spot kept</span></a>' +
          '<a class="wait-rail__link" href="/live">Browse scheduled rounds <span class="spot-tag">spot kept</span></a>' +
          '<a class="wait-rail__link wait-rail__link--discord" href="' + DISCORD_INVITE + '" target="_blank" rel="noopener noreferrer">Set times in Discord <span class="spot-tag">spot kept</span></a>' +
          '<a class="wait-rail__link" href="/community">Read the community <span class="spot-tag">spot kept</span></a>' +
        '</div>' +
      '</div>';
    document.body.appendChild(rail);
    var motionEl = rail.querySelector('#warmupMotion');
    var idx = Math.floor(Math.random() * WARMUP_MOTIONS.length);
    function showMotion(){ if (motionEl) motionEl.textContent = WARMUP_MOTIONS[idx % WARMUP_MOTIONS.length]; }
    showMotion();
    var shuffle = rail.querySelector('#warmupShuffle');
    if (shuffle) shuffle.addEventListener('click', function(){ idx++; showMotion(); });
    var pad = rail.querySelector('#warmupPad');
    if (pad){
      pad.value = savedPad;
      pad.addEventListener('input', function(){
        try { localStorage.setItem('da-spar-warmup', pad.value); } catch(e){}
      });
    }
  }

  function removeWaitRail(){
    var existing = document.getElementById('waitRail');
    if (existing) existing.remove();
  }

  // Pulls the public "missed each other this week / this month" counts
  // from /api/log-missed-match (GET). Each pill renders independently;
  // both hide under a count of 3 so a tiny number doesn't read sadder
  // than showing nothing. Week prefers the broader "attempts" count;
  // falls back to "misses." Month mirrors that.
  function fetchMissedMatchCount(){
    fetch('/api/log-missed-match', { method: 'GET' })
      .then(function(r){ return r.ok ? r.json() : null; })
      .then(function(j){
        if (!j) return;
        var attempts = (j.attempts && typeof j.attempts.week_count === 'number') ? j.attempts.week_count : 0;
        var misses = (typeof j.week_count === 'number') ? j.week_count : 0;
        var attemptsM = (j.attempts && typeof j.attempts.month_count === 'number') ? j.attempts.month_count : 0;
        var missesM = (typeof j.month_count === 'number') ? j.month_count : 0;
        // Weekly pill
        var n, label;
        if (attempts >= 3) { n = attempts; label = 'looked for a live round this week'; }
        else if (misses >= 3) { n = misses; label = 'missed each other this week'; }
        if (n){
          var sep = document.getElementById('metaMissedSep');
          var cell = document.getElementById('metaMissedCell');
          if (sep) sep.style.display = '';
          if (cell) cell.style.display = '';
          if (cell) cell.innerHTML = '<strong id="metaMissed">' + String(n) + '</strong> ' + label;
        }
        // Monthly pill — independent, also hides under 3.
        var nM, labelM;
        if (attemptsM >= 3) { nM = attemptsM; labelM = 'this month'; }
        else if (missesM >= 3) { nM = missesM; labelM = 'this month'; }
        if (nM){
          var sepM = document.getElementById('metaMonthSep');
          var cellM = document.getElementById('metaMonthCell');
          if (sepM) sepM.style.display = '';
          if (cellM) cellM.style.display = '';
          if (cellM) cellM.innerHTML = '<strong id="metaMonth">' + String(nM) + '</strong> ' + labelM;
        }
        // Ordered "who looked, and when" timeline under the counts.
        renderRecentSeeks(Array.isArray(j.recent) ? j.recent : []);
      })
      .catch(function(){});
  }

  // Format slugs the recent-seeks ring can hand back. Covers both the
  // client style-chip slugs (worlds/asian) and the server's allow-list
  // names (wsdc/asian_parli/congress/mun/india_*), since the logger
  // normalizes to its own set. Unknown/'other' falls through to a
  // generic "a live round" so a row never shows a raw slug.
  var SEEK_LABELS = {
    quick: 'Quick Clash', apda: 'APDA', bp: 'BP',
    worlds: 'Worlds (WUDC)', wsdc: 'Worlds (WUDC)',
    asian: 'Asian Parli', asian_parli: 'Asian Parli',
    ld: 'LD', pf: 'Public Forum', policy: 'Policy',
    congress: 'Congress', mun: 'MUN',
    india_school: 'India circuit', india_college: 'India circuit',
  };
  var SEEK_FRESH_MS = 12 * 60 * 1000; // green dot = looked within ~12 min

  // Render the recent-attempts list. Each row is one prior debater who
  // pressed "find a round" (anonymous by design — that press isn't an
  // opt-in to be named, unlike the waitlist rail), labeled with the
  // format they wanted and how long ago. Newest first; the exact local
  // time rides in the row's title attribute for an on-hover precise read.
  function renderRecentSeeks(list){
    var wrap = document.getElementById('seekFeed');
    var host = document.getElementById('seekFeedList');
    if (!wrap || !host) return;
    var rows = (list || [])
      .filter(function(e){ return e && typeof e.ts === 'number'; })
      .sort(function(a, b){ return b.ts - a.ts; })
      .slice(0, 6);
    if (!rows.length){ wrap.hidden = true; host.innerHTML = ''; return; }
    var now = Date.now();
    host.innerHTML = rows.map(function(e){
      var fresh = (now - e.ts) <= SEEK_FRESH_MS;
      var label = SEEK_LABELS[e.fmt] || 'a live round';
      var exact = '';
      try { exact = new Date(e.ts).toLocaleString(); } catch (err) {}
      return '<div class="seek-row' + (fresh ? ' seek-row--fresh' : '') + '" title="' + escHtml(exact) + '">' +
               '<span class="seek-row__dot"></span>' +
               '<span class="seek-row__fmt">A debater looked for ' + escHtml(label) + '</span>' +
               '<span class="seek-row__time">' + escHtml(relTime(e.ts)) + '</span>' +
             '</div>';
    }).join('');
    wrap.hidden = false;
    startSeekTicker();
  }

  // Single-slot ticker. One attempt is shown at a time in the same spot;
  // every SEEK_TICK_MS the current one fades out and the next fades in
  // where it was (the rows are absolutely stacked, so there's no vertical
  // movement). Slow + calm on purpose. Self-clears once the searching
  // screen (and its #seekFeedList) is gone.
  var seekLoopTimer = null;
  var SEEK_TICK_MS = 4500;   // ~4.5s per attempt — deliberately slow
  var SEEK_FADE_MS = 600;    // matches the .seek-row opacity transition
  function startSeekTicker(){
    if (seekLoopTimer){ clearInterval(seekLoopTimer); seekLoopTimer = null; }
    var host = document.getElementById('seekFeedList');
    if (!host) return;
    var rows = host.querySelectorAll('.seek-row');
    if (!rows.length) return;
    var idx = 0;
    for (var i = 0; i < rows.length; i++) rows[i].classList.toggle('is-active', i === 0);
    if (rows.length < 2) return; // nothing to cycle
    seekLoopTimer = setInterval(function(){
      var h = document.getElementById('seekFeedList');
      if (!h){ clearInterval(seekLoopTimer); seekLoopTimer = null; return; }
      var rs = h.querySelectorAll('.seek-row');
      if (rs.length < 2){ clearInterval(seekLoopTimer); seekLoopTimer = null; return; }
      var cur = rs[idx % rs.length];
      cur.classList.remove('is-active');               // fade the current out
      idx = (idx + 1) % rs.length;
      var nxt = rs[idx];
      // Bring the next one in only after the outgoing has faded, so they
      // never overlap as mush at the shared position.
      setTimeout(function(){ if (nxt && nxt.isConnected) nxt.classList.add('is-active'); }, SEEK_FADE_MS);
    }, SEEK_TICK_MS);
  }

  // Live ops strip: real counts pulled from Firestore via onSnapshot.
  // Replaces the prior `startMetaDrift` which faked 12-18 debaters /
  // 4-7 countries / 2-4 rounds via Math.random(). Those numbers were a
  // marketing tell, not a measurement. The real picture (DAU ~10 per
  // soul.md §8) means honest counts are often 0; the dot dims to grey
  // when they are so the strip doesn't pretend a quiet moment is busy.
  var metaLiveUnsub = { queue: null, waitlist: null };
  var metaLiveCounts = { queue: 0, waitlist: 0 };

  function renderMetaLive(){
    var qEl = document.getElementById('metaQueue');
    var wEl = document.getElementById('metaWaitlist');
    if (!qEl || !wEl){
      // Strip torn down (user navigated to matched / fallback). Drop
      // subscriptions so we don't leak listeners across views.
      if (metaLiveUnsub.queue){ try { metaLiveUnsub.queue(); } catch(e){} metaLiveUnsub.queue = null; }
      if (metaLiveUnsub.waitlist){ try { metaLiveUnsub.waitlist(); } catch(e){} metaLiveUnsub.waitlist = null; }
      return;
    }
    qEl.textContent = String(metaLiveCounts.queue);
    wEl.textContent = String(metaLiveCounts.waitlist);
    var dot = document.querySelector('#metaStrip .meta-dot');
    var anyLive = metaLiveCounts.queue > 0;
    if (dot){
      dot.style.background = anyLive ? '#22c55e' : '#6b7280';
      dot.style.boxShadow = anyLive ? '0 0 6px rgba(34,197,94,.6)' : 'none';
      dot.style.opacity = anyLive ? '' : '.55';
    }
  }

  function startMetaLive(){
    if (metaLiveUnsub.queue){ try { metaLiveUnsub.queue(); } catch(e){} metaLiveUnsub.queue = null; }
    if (metaLiveUnsub.waitlist){ try { metaLiveUnsub.waitlist(); } catch(e){} metaLiveUnsub.waitlist = null; }
    metaLiveCounts = { queue: 0, waitlist: 0 };
    renderMetaLive();
    if (!firebaseDb) return;
    // (a) Matchmaking queue. Excludes self so the
    // strip never reads "1 waiting" off the user's own presence.
    try {
      metaLiveUnsub.queue = firebaseDb.collection('matchmaking_queue')
        .where('status', '==', 'waiting')
        .onSnapshot(function(snap){
          var selfUid = state.user && state.user.uid;
          // Count only TRULY-LIVE peers. A searching session re-stamps
          // joinedAt every QUEUE_HEARTBEAT_MS (90s), so a live doc is
          // never older than ~92s; a backgrounded/closed tab stops
          // heartbeating and goes stale. The server's 3-min STALE_PEER_MS
          // is a generous pairing cutoff, but for the headline "N debaters
          // available now" it over-counts: a session that went dark still
          // showed as available for up to 3 min, promising humans who were
          // gone. Tie the "available" window to one heartbeat + grace
          // (120s) so the number means "heartbeated within the last two
          // minutes = actually here," and a ghost drops off a minute
          // sooner. Docs with an unresolved/missing joinedAt
          // (serverTimestamp lands a beat after the local write) count as
          // fresh — same default as joinedAtMs() server-side.
          var STALE_MS = 120 * 1000;
          var now = Date.now();
          var n = 0;
          snap.forEach(function(d){
            if (selfUid && d.id === selfUid) return;
            var v = d.data() || {};
            // Skip-filter BOTH directions, same as tryMatch: a peer this
            // client will never attempt (passed proposal, unexpired) must
            // not show as spawnable. Counting them produced "1 in queue"
            // with a live dot while nothing could ever spawn.
            if (selfUid && localSkipActive(d.id)) return;
            if (selfUid && docSkips(v, selfUid)) return;
            var j = v.joinedAt;
            var t = (j && typeof j.toMillis === 'function') ? j.toMillis()
                  : (j && j.seconds != null) ? j.seconds * 1000
                  : now; // unresolved timestamp = just written = fresh
            if (now - t <= STALE_MS) n++;
          });
          metaLiveCounts.queue = n;
          renderMetaLive();
        }, function(err){
          // Missing composite index or rules denial: degrade to 0,
          // don't crash. Same failure mode as queueWatchUnsub above.
          console.warn('[meta] queue snapshot error:', err && err.message);
        });
    } catch(e){}
    // (b) Async waitlist posts, last 24h. Approximates the same
    // 24h client-side TTL the wl rail uses. Limit 100 caps the read.
    try {
      metaLiveUnsub.waitlist = firebaseDb.collection('waitlist_posts')
        .orderBy('createdAt', 'desc')
        .limit(100)
        .onSnapshot(function(snap){
          var cutoff = Date.now() - 24 * 60 * 60 * 1000;
          var n = 0;
          snap.forEach(function(d){
            var v = d.data() || {};
            var t = (v.createdAt && typeof v.createdAt.toMillis === 'function') ? v.createdAt.toMillis() : 0;
            if (t >= cutoff) n++;
          });
          metaLiveCounts.waitlist = n;
          renderMetaLive();
        }, function(err){
          console.warn('[meta] waitlist snapshot error:', err && err.message);
        });
    } catch(e){}
  }

  // Drive the status-phase rotation. Reads elapsed time from
  // state.joinedAtMs (same source the countdown uses) so the phase
  // is always in sync with how long the user has been waiting.
  // When the phase actually changes (not every poll tick), fade the
  // text out → swap → fade in. The .26s opacity transition lives in
  // CSS via the .status.is-fading class.
  var statusCycleInterval = null;
  function startStatusCycle(){
    if (statusCycleInterval) clearInterval(statusCycleInterval);
    function tick(){
      var elapsed = Math.floor((Date.now() - state.joinedAtMs) / 1000);
      // Default to the LAST phase so elapsed >= the final `until`
      // (a tick racing the fallback) doesn't snap back to phase one.
      var phase = STATUS_PHASES[STATUS_PHASES.length - 1];
      for (var i = 0; i < STATUS_PHASES.length; i++){
        if (elapsed < STATUS_PHASES[i].until){ phase = STATUS_PHASES[i]; break; }
      }
      var main = document.getElementById('statusMain');
      var sub = document.getElementById('statusSub');
      var wrap = main ? main.parentElement : null;
      if (!main || !sub) return;
      var mainChanged = main.textContent !== phase.text;
      var subChanged = sub.textContent !== phase.sub;
      if (!mainChanged && !subChanged) return;
      // Crossfade: dim → swap → un-dim.
      if (wrap) wrap.classList.add('is-fading');
      setTimeout(function(){
        if (mainChanged) main.textContent = phase.text;
        if (subChanged) sub.textContent = phase.sub;
        if (wrap) wrap.classList.remove('is-fading');
      }, 260);
    }
    tick();
    statusCycleInterval = setInterval(tick, 1500);
  }

  // startPairingTicker() removed 2026-05-25 — see RECENT_PAIRINGS
  // comment for the why. The 'Recent pairing · @x ↔ @y · paired in Ns'
  // line was fabricated social-proof theater.

  // Mount the rooms-opening-worldwide globe once
  // /js/global-debate-map.js has loaded. Replaces the prior radar
  // mount (sweep arm + fabricated @handles). Honest ambient visual —
  // dots spawn, arcs draw, room-forming pills float in. Keeps a
  // handle so we can stop the rAF loop on re-render.
  var globalMapHandle = null;

  // ── Real presence pins (/api/presence-live) ─────────────────────
  // People seen on the site in the last 30 minutes, city-level, fed
  // by the anonymous track.js beat. When we have real pins, the globe
  // shows ONLY them (every glowing dot is a real location) and the
  // arcs + "Room forming" pills are disabled so nothing fabricated
  // rides on real data. When the fetch fails or comes back empty, the
  // globe falls back to the ambient decorative city pool, unlabeled,
  // exactly as before. Server response is shared-cached 60s, so the
  // 2-min repoll costs ~1 cache read.
  var presenceLive = null;
  var presencePollTimer = null;
  function fetchPresenceLive(){
    fetch('/api/presence-live').then(function(r){ return r.ok ? r.json() : null; }).then(function(d){
      var had = !!(presenceLive && presenceLive.pins && presenceLive.pins.length);
      presenceLive = (d && Array.isArray(d.pins)) ? d : null;
      var has = !!(presenceLive && presenceLive.pins.length);
      renderLiveNote();
      // Remount only on a state change (ambient ↔ real pins) so the
      // globe doesn't visibly restart every poll.
      if (has !== had && document.getElementById('globalDebateMap')) mountGlobalMap('globalDebateMap');
    }).catch(function(){});
  }
  function renderLiveNote(){
    var note = document.getElementById('globeLiveNote');
    if (!note) return;
    var n = presenceLive && presenceLive.online30;
    if (n > 0) {
      note.textContent = 'Each red dot: someone on DebateIt in the last 30 minutes (' + n + ' total).';
      note.hidden = false;
    } else {
      note.hidden = true; // honest empty state: no claim, ambient art only
    }
  }
  function mountGlobalMap(containerId){
    if (globalMapHandle && globalMapHandle.stop) { try { globalMapHandle.stop(); } catch(e){} }
    globalMapHandle = null;
    function tryMount(retries){
      if (!window.GlobalDebateMap) {
        if (retries > 0) return setTimeout(function(){ tryMount(retries - 1); }, 60);
        return;
      }
      var c = document.getElementById(containerId);
      if (!c) return;
      var opts = {
        maxActiveDots: 7,
        maxActiveArcs: 2,
        spawnEveryMs:  1700,
        roomEveryMs:   4200,
        rotateSec:     240,
        palette:       'auto',
      };
      var pins = presenceLive && presenceLive.pins;
      if (pins && pins.length) {
        opts.cities = pins.map(function(p){
          return { name: p.city || 'Somewhere on Earth', lat: p.lat, lng: p.lng };
        });
        opts.maxActiveArcs  = 0;    // no fabricated "Room forming" on real pins
        opts.persistentDots = true; // real people don't blink out
      }
      globalMapHandle = window.GlobalDebateMap.mount(c, opts);
      renderLiveNote();
    }
    tryMount(40);
  }
  fetchPresenceLive();
  if (!presencePollTimer) presencePollTimer = setInterval(function(){
    if (document.hidden) return;
    if (!document.getElementById('globalDebateMap')) return;
    fetchPresenceLive();
  }, 120000);

  // Flat 2D presence background (#presenceMapBg, fixed behind the UI).
  // The module fetches, polls, resizes, and pulses on its own; empty
  // state is just faint land dots, so there is nothing to fake.
  (function mountPresenceBg(retries){
    if (!window.PresenceMap) {
      if (retries > 0) return setTimeout(function(){ mountPresenceBg(retries - 1); }, 80);
      return;
    }
    var host = document.getElementById('presenceMapBg');
    if (host) window.PresenceMap.mount(host, { palette: 'auto' });
  })(50);

  // Legacy world-globe mount, kept for the SIGN-IN GATE only. That
  // surface is pre-auth social proof — showing the geographic spread
  // of debaters is the right read there. The active matchmaking
  // (renderSearching) uses mountRadar instead.
  var globeHandle = null;
  function mountGlobe(canvasId){
    if (globeHandle && globeHandle.stop) { try { globeHandle.stop(); } catch(e){} }
    globeHandle = null;
    function tryMount(retries){
      if (!window.DebateGlobe) {
        if (retries > 0) return setTimeout(function(){ tryMount(retries - 1); }, 60);
        return;
      }
      var c = document.getElementById(canvasId);
      if (!c) return;
      globeHandle = window.DebateGlobe.mount(c, {
        palette: 'accent',
        rotateDegPerSec: 5,
        showArcs: true,
        showScanSweep: true,
        transparent: true,
      });
    }
    tryMount(40);
  }

  // ── Render: matched! ─────────────────────────────────
  // radarHandle: the searching view now renders the globe
  // (global-debate-map.js), not the old radar, so this stays null and
  // renderMatched's `if (radarHandle && ...)` guards fall through to
  // the immediate swap. It MUST be declared: leaving it implicit made
  // line "if (radarHandle && radarHandle.lockOn)" throw
  // ReferenceError, which aborted renderMatched before subscribeMyDoc
  // could navigate, stranding BOTH matched users on the search screen
  // until the 60s AI fallback. That was the "live spawn never works
  // for two humans" bug — the server paired them fine; the client
  // crashed rendering the match.
  var radarHandle = null;
  function renderMatched(roomName, peerName){
    removeWaitRail();
    try { gtag('event', 'spar_match_found', { format: formatParam }); } catch(e){}

    // Cinematic two-step: trigger the radar convergence FIRST (nodes
    // pull toward center, sweep fades, expanding ring pulses outward,
    // center pulse brightens), wait ~700ms for the visual beat, THEN
    // swap the eyebrow + headline so "Match found / paired with X"
    // arrives synchronously with the converged radar instead of a
    // hard cut. Falls through to immediate swap if the radar isn't
    // mounted (shouldn't happen in normal flow but defensive).
    var beatMs = 750;
    if (radarHandle && radarHandle.lockOn){
      try { radarHandle.lockOn(); } catch(e){ beatMs = 0; }
    } else {
      beatMs = 0;
    }

    // Soft-fade existing copy so the swap doesn't snap into the
    // converged radar. We dim everything except the canvas, which
    // keeps animating through the convergence.
