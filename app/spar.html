      lastSender = m.fromUid;
      div.innerHTML = senderLabel + linkifyMsg(m.text || '') + (when ? '<div class="wl-msg__time" title="' + escHtml(whenAbs) + '">' + escHtml(when) + '</div>' : '');
      t.appendChild(div);
    });
    updateReadReceipt();
    t.scrollTop = t.scrollHeight;
  }

  // "Read" marker under my latest message in a 1:1 thread. Driven by
  // the thread-doc snapshot in renderThreadModal: when the peer's
  // unread hits 0 and the last message is mine, they've seen it. The
  // data was always there (unread map); this just surfaces it.
  function updateReadReceipt(){
    var t = document.getElementById('wlThread');
    if (!t) return;
    var old = document.getElementById('wlReadReceipt');
    if (old) old.remove();
    if (!wl.peerRead) return;
    var msgs = t.querySelectorAll('.wl-msg');
    if (!msgs.length) return;
    var lastEl = msgs[msgs.length - 1];
    if (!lastEl.classList.contains('mine')) return;
    var d = document.createElement('div');
    d.id = 'wlReadReceipt';
    d.className = 'wl-msg__read';
    d.textContent = 'Read';
    t.appendChild(d);
  }

  // Generalized send: works for 1:1 and group threads. Reads
  // wl.activeThread for participants, bumps unread for everyone except
  // the sender, and stamps fromName so group messages can be labeled.
  function toggleSchedulePanel(e, forceOpen){
    var panel = document.getElementById('wlSchedulePanel');
    var btn = document.getElementById('wlCalToggle');
    if (!panel) return;
    var open = typeof forceOpen === 'boolean' ? forceOpen : !panel.classList.contains('open');
    panel.classList.toggle('open', open);
    if (btn) btn.classList.toggle('active', open);
    if (open){
      var f = document.getElementById('wlSchedDate');
      if (f) f.focus();
    } else {
      var inp = document.getElementById('wlSendInput');
      if (inp) inp.focus();
    }
  }

  function sendScheduleProposal(){
    var at = wl.activeThread;
    if (!at || !state.user) return;
    var dateVal = (document.getElementById('wlSchedDate') || {}).value || '';
    var timeVal = (document.getElementById('wlSchedTime') || {}).value || '';
    var durVal  = parseInt((document.getElementById('wlSchedDur') || {}).value || '60', 10);
    var motion  = ((document.getElementById('wlSchedMotion') || {}).value || '').trim();
    if (!dateVal || !timeVal){ alert('Pick a date and time first.'); return; }

    // Build a readable label
    var startDt = new Date(dateVal + 'T' + timeVal);
    if (isNaN(startDt.getTime())){ alert('Invalid date or time.'); return; }
    var endDt = new Date(startDt.getTime() + durVal * 60000);

    var dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    var monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    var label = dayNames[startDt.getDay()] + ' ' + monthNames[startDt.getMonth()] + ' ' + startDt.getDate();
    var h = startDt.getHours(), m = startDt.getMinutes();
    var ampm = h >= 12 ? 'pm' : 'am';
    var h12 = h % 12 || 12;
    var timeLabel = h12 + (m ? ':' + (m < 10 ? '0' + m : m) : '') + ampm;
    var durLabel = durVal < 60 ? durVal + ' min' : (durVal / 60) + ' hr';

    // Google Calendar URL (local time, no Z suffix so it uses the user's timezone)
    function fmtGcal(d){
      return d.getFullYear() +
        String(d.getMonth()+1).padStart(2,'0') +
        String(d.getDate()).padStart(2,'0') + 'T' +
        String(d.getHours()).padStart(2,'0') +
        String(d.getMinutes()).padStart(2,'0') + '00';
    }
    var joinUrl = 'https://debateai.com/spar';
    var details = 'Debate practice round via DebateIt.' + (motion ? '\n\nMotion: ' + motion : '') + '\n\nJoin at: ' + joinUrl;
    var calUrl = 'https://calendar.google.com/calendar/render?action=TEMPLATE' +
      '&text=' + encodeURIComponent('Debate Round — DebateIt') +
      '&dates=' + fmtGcal(startDt) + '/' + fmtGcal(endDt) +
      '&details=' + encodeURIComponent(details) +
      '&location=' + encodeURIComponent(joinUrl);

    // Compose the DM message
    var msg = '📅 Round proposed: ' + label + ' at ' + timeLabel + ' · ' + durLabel;
    if (motion) msg += '\nMotion: ' + motion;
    msg += '\n\nAdd to Google Calendar:\n' + calUrl;

    // Send it via the existing thread machinery
    var at2 = wl.activeThread;
    var me = state.user.uid;
    var threadRef = firebaseDb.collection('dm_threads').doc(at2.id);
    var msgsRef = threadRef.collection('messages');
    var preview = '📅 ' + label + ' at ' + timeLabel;
    var participantInfo = Object.assign({}, at2.participantInfo);
    participantInfo[me] = { name: shortNameOf(state.user), photo: state.user.photoURL || '' };
    var unread = {};
    at2.participants.forEach(function(uid){
      unread[uid] = (uid === me) ? 0 : firebase.firestore.FieldValue.increment(1);
    });
    var btn = document.getElementById('wlSchedSend');
    if (btn) btn.disabled = true;
    threadRef.set({
      participants: at2.participants,
      participantInfo: participantInfo,
      lastMessage: preview,
      lastMessageAt: firebase.firestore.FieldValue.serverTimestamp(),
      lastMessageFrom: me,
      unread: unread,
    }, { merge: true }).then(function(){
      return msgsRef.add({
        fromUid: me,
        fromName: shortNameOf(state.user),
        text: msg,
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      });
    }).then(function(){
      if (btn) btn.disabled = false;
      toggleSchedulePanel(null, false);
      try { gtag('event', 'dm_schedule_propose', {}); } catch(e){}
      firePushDM(at2.participants, at2.id); // Web Push the recipient(s)
      window.open(calUrl, '_blank', 'noopener');
    }).catch(function(err){
      if (btn) btn.disabled = false;
      console.warn('[sched] send failed', err && err.message);
      alert('Could not send. Try again.');
    });
  }

  // Web Push: ping every other participant's devices about a new DM so it
  // lands even with the tab or installed PWA closed. Mirrors the in-page
  // bell toast + the email nudge. The server verifies both sides share the
  // thread and builds the notification text, so there's no spoofing vector.
  // No-ops until VAPID is configured server-side.
  function firePushDM(participants, threadId){
    try {
      if (!state.user || !threadId || !Array.isArray(participants)) return;
      var me = state.user.uid;
      var others = participants.filter(function(uid){ return uid && uid !== me; });
      if (!others.length) return;
      state.user.getIdToken().then(function(tok){
        others.forEach(function(uid){
          fetch('/.netlify/functions/push-send', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + tok },
            body: JSON.stringify({ recipientUid: uid, threadId: threadId }),
          }).catch(function(){});
        });
      }).catch(function(){});
    } catch (e) {}
  }

  function sendThreadMessage(){
    var at = wl.activeThread;
    var input = document.getElementById('wlSendInput');
    var sendBtn = document.getElementById('wlSendBtn');
    if (!at || !input || !state.user) return;
    var text = (input.value || '').trim();
    if (!text) return;
    if (text.length > WL_MSG_MAX) text = text.slice(0, WL_MSG_MAX);
    if (sendBtn) sendBtn.disabled = true;
    var prevErr = document.getElementById('wlSendErr');
    if (prevErr) prevErr.textContent = '';
    var me = state.user.uid;
    var threadRef = firebaseDb.collection('dm_threads').doc(at.id);
    var msgsRef = threadRef.collection('messages');
    var preview = text.length > 80 ? text.slice(0, 77) + '…' : text;
    // Capture pre-send state: if lastMessage was empty on the active
    // thread object, this is the FIRST message in the thread — i.e.
    // the recipient just got their challenge accepted. Fire the
    // notification email after the send lands. 1:1 threads only;
    // group threads skip per server-side guard.
    var isFirstMessage = !at.lastMessage && !at.isGroup;
    // Make sure my own info is current in participantInfo.
    var participantInfo = Object.assign({}, at.participantInfo);
    participantInfo[me] = { name: shortNameOf(state.user), photo: state.user.photoURL || '' };
    var unread = {};
    at.participants.forEach(function(uid){
      unread[uid] = (uid === me) ? 0 : firebase.firestore.FieldValue.increment(1);
    });
    var threadDoc = {
      participants: at.participants,
      participantInfo: participantInfo,
      lastMessage: preview,
      lastMessageAt: firebase.firestore.FieldValue.serverTimestamp(),
      lastMessageFrom: me,
      unread: unread,
    };
    if (at.isGroup){ threadDoc.isGroup = true; threadDoc.groupName = at.groupName || 'Group'; }
    threadRef.set(threadDoc, { merge: true }).then(function(){
      return msgsRef.add({
        fromUid: me,
        fromName: shortNameOf(state.user),
        text: text,
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      });
    }).then(function(){
      input.value = '';
      if (sendBtn) sendBtn.disabled = false;
      input.focus();
      try { gtag('event', at.isGroup ? 'group_send' : 'dm_send', {}); } catch(e){}
      firePushDM(at.participants, at.id); // Web Push the recipient(s)
      // Fire-and-forget: notify recipient by email on the first DM
      // in a 1:1 thread. Endpoint is idempotent (server stamps
      // acceptEmailSentAt) so a race where two clients call it
      // simultaneously still results in one email. Failures are
      // silent — the chat is the source of truth, email is a nudge.
      // Local mirror so future sends in the same session don't re-fire
      // before the server-side stamp propagates.
      if (isFirstMessage) {
        at.lastMessage = preview;
        try { gtag('event', 'dm_first_accept', {}); } catch(e){}
        state.user.getIdToken().then(function(idToken){
          return fetch('/api/notify-dm-accept', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + idToken },
            body: JSON.stringify({ threadId: at.id }),
          });
        }).catch(function(e){
          // Silent: email is a nudge, not load-bearing for the round.
          console.warn('[dm] notify-dm-accept failed', e && e.message);
        });
      }
    }).catch(function(e){
      if (sendBtn) sendBtn.disabled = false;
      console.warn('[dm] send failed', e);
      // Surface it. The silent version left users retrying into a void
      // (2026-07-01) — name the failure, especially the daily-quota one.
      try {
        var code = (e && e.code) || '';
        var msg = code === 'resource-exhausted'
          ? 'Did not send: the daily data budget is used up. Try after midnight Pacific.'
          : 'Message did not send' + (code ? ' (' + code + ')' : '') + '. Try again.';
        var errEl = document.getElementById('wlSendErr');
        if (!errEl && input && input.parentElement){
          errEl = document.createElement('div');
          errEl.id = 'wlSendErr';
          errEl.style.cssText = 'flex-basis:100%;padding:5px 4px 0;font-size:.75rem;color:#f59e0b';
          input.parentElement.appendChild(errEl);
        }
        if (errEl) errEl.textContent = msg;
      } catch(_e){}
    });
  }

  function markThreadRead(threadId){
    if (!state.user) return Promise.resolve();
    var update = {};
    update['unread.' + state.user.uid] = 0;
    return firebaseDb.collection('dm_threads').doc(threadId).update(update);
  }

  function startInboxFeed(){
    if (!firebaseDb || !state.user) return;
    if (wl.threadsUnsub){ try { wl.threadsUnsub(); } catch(e){} }
    wl.threadsUnsub = firebaseDb.collection('dm_threads')
      .where('participants', 'array-contains', state.user.uid)
      .orderBy('lastMessageAt', 'desc')
      .limit(30)
      .onSnapshot(function(snap){
        var rows = [];
        var unreadCount = 0;
        var myUid = state.user.uid;
        snap.forEach(function(d){
          var data = d.data() || {};
          var unread = (data.unread && data.unread[myUid]) || 0;
          if (unread > 0) unreadCount++;
          rows.push({ id: d.id, data: data, unread: unread });
        });
        wl.threads = rows;
        wl.unreadThreads = unreadCount;
        var badge = document.getElementById('wlInboxBadge');
        var fabBadge = document.getElementById('wlFabBadge');
        [badge, fabBadge].forEach(function(b){
          if (!b) return;
          if (unreadCount > 0){ b.hidden = false; b.textContent = String(unreadCount); }
          else b.hidden = true;
        });
        if (document.getElementById('wlInboxList')) paintInboxList();
      }, function(err){
        // Most likely cause: missing composite index on
        // (participants array-contains, lastMessageAt desc). Firestore
        // logs a clickable "create index" link in the console error.
        console.warn('[dm] inbox snapshot error (likely missing index — see comment block above):', err);
      });
  }

  function openInboxModal(){
    if (!state.user){ doGoogleSignIn(); return; }
    openModal('Your messages',
      '<div class="wl-inbox-list" id="wlInboxList"><div class="wl-msg__empty">Loading…</div></div>',
      [
        { label: 'New group', kind: 'ghost', id: 'wlNewGroupBtn', onClick: openGroupComposer },
        { label: 'Close', kind: 'ghost', onClick: closeModal },
      ]
    );
    paintInboxList();
  }

  function paintInboxList(){
    var list = document.getElementById('wlInboxList');
    if (!list) return;
    if (!wl.threads.length){
      list.innerHTML = '<div class="wl-msg__empty">No messages yet. DM someone from the waitlist, or start a group.</div>';
      return;
    }
    var myUid = state.user.uid;
    list.innerHTML = wl.threads.map(function(t){
      var d = t.data || {};
      var isGroup = !!d.isGroup || (d.participants || []).length > 2;
      var preview = escHtml(d.lastMessage || '');
      var when = d.lastMessageAt && d.lastMessageAt.toMillis ? relTime(d.lastMessageAt.toMillis()) : '';
      var name, avatar, attrs;
      if (isGroup){
        var count = (d.participants || []).length;
        name = escHtml(d.groupName || 'Group') + ' <span class="wl-inbox-row__count">' + count + '</span>';
        avatar = '<div class="wl-modal__avatar wl-modal__avatar--group" aria-hidden="true">' +
          '<svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>' +
          '</div>';
        attrs = 'data-thread-id="' + escHtml(t.id) + '" data-is-group="1"';
      } else {
        var peerUid = (d.participants || []).filter(function(p){ return p !== myUid; })[0] || '';
        var info = (d.participantInfo && d.participantInfo[peerUid]) || {};
        name = escHtml(info.name || 'Debater');
        avatar = info.photo
          ? '<img class="wl-modal__avatar" src="' + escHtml(info.photo) + '" alt="">'
          : '<div class="wl-modal__avatar"></div>';
        attrs = 'data-peer-uid="' + escHtml(peerUid) + '" data-peer-name="' + escHtml(info.name || '') + '" data-peer-photo="' + escHtml(info.photo || '') + '"';
      }
      return '<div class="wl-inbox-row' + (t.unread > 0 ? ' unread' : '') + '" ' + attrs + '>' +
        avatar +
        '<div class="wl-inbox-row__main">' +
          '<div class="wl-inbox-row__name">' + name + '</div>' +
          '<div class="wl-inbox-row__preview">' + preview + '</div>' +
        '</div>' +
        '<div class="wl-inbox-row__time">' + escHtml(when) + '</div>' +
      '</div>';
    }).join('');
    Array.prototype.forEach.call(list.querySelectorAll('.wl-inbox-row'), function(row){
      row.addEventListener('click', function(){
        if (row.dataset.isGroup){ openGroupThread(row.dataset.threadId); }
        else { openDMThread(row.dataset.peerUid, row.dataset.peerName, row.dataset.peerPhoto); }
      });
    });
  }

  // ── Group creation ───────────────────────────────────────────────
  // Candidates = everyone you can reach right now: open-invite posters
  // + people you already have a thread with. Deduped, you excluded.
  function groupCandidates(){
    var me = state.user && state.user.uid;
    var seen = {}; var out = [];
    function add(uid, name, photo){
      if (!uid || uid === me || seen[uid]) return;
      seen[uid] = true;
      out.push({ uid: uid, name: name || 'Debater', photo: photo || '' });
    }
    (wl.posts || []).forEach(function(p){ var d = p.data || {}; add(d.uid, d.displayName, d.photoURL); });
    (wl.threads || []).forEach(function(t){
      var d = t.data || {};
      (d.participants || []).forEach(function(uid){
        var info = (d.participantInfo && d.participantInfo[uid]) || {};
        add(uid, info.name, info.photo);
      });
    });
    return out;
  }

  function openGroupComposer(){
    if (!state.user){ doGoogleSignIn(); return; }
    var cands = groupCandidates();
    var listHtml = cands.length
      ? cands.map(function(c){
          var av = c.photo
            ? '<img class="wl-modal__avatar" src="' + escHtml(c.photo) + '" alt="">'
            : '<div class="wl-modal__avatar"></div>';
          return '<label class="wl-pick">' +
            '<input type="checkbox" class="wl-pick__cb" value="' + escHtml(c.uid) + '" ' +
              'data-name="' + escHtml(c.name) + '" data-photo="' + escHtml(c.photo) + '">' +
            av +
            '<span class="wl-pick__name">' + escHtml(c.name) + '</span>' +
          '</label>';
        }).join('')
      : '<div class="wl-msg__empty">No one to add yet. When debaters post open invites or you DM someone, they show up here.</div>';
    openModal('New group',
      '<div class="wl-field">' +
        '<label for="wlGroupName">Group name</label>' +
        '<input class="wl-input" id="wlGroupName" placeholder="e.g. Friday BP practice" maxlength="' + WL_GROUP_NAME_MAX + '">' +
      '</div>' +
      '<div class="wl-field"><label>Add members</label>' +
        '<div class="wl-pick-list">' + listHtml + '</div>' +
      '</div>' +
      '<div class="wl-modal__error" id="wlGroupError"></div>',
      [
        { label: 'Cancel', kind: 'ghost', onClick: closeModal },
        { label: 'Create group', kind: 'primary', id: 'wlGroupCreate', onClick: submitGroup },
      ]
    );
    setTimeout(function(){ var n = document.getElementById('wlGroupName'); if (n) n.focus(); }, 50);
  }

  function submitGroup(){
    if (!state.user || !firebaseDb) return;
    var nameEl = document.getElementById('wlGroupName');
    var errEl = document.getElementById('wlGroupError');
    var btn = document.getElementById('wlGroupCreate');
    var name = (nameEl && nameEl.value || '').trim();
    var picks = Array.prototype.slice.call(document.querySelectorAll('.wl-pick__cb:checked'));
    if (!name){ if (errEl) errEl.textContent = 'Give the group a name.'; return; }
    if (picks.length < 2){ if (errEl) errEl.textContent = 'Pick at least 2 people for a group (use a DM for one).'; return; }
    if (picks.length + 1 > WL_GROUP_MAX_MEMBERS){ if (errEl) errEl.textContent = 'Groups cap at ' + WL_GROUP_MAX_MEMBERS + ' members.'; return; }
    if (btn) btn.disabled = true;
    if (errEl) errEl.textContent = '';
    var me = state.user.uid;
    var participants = [me];
    var participantInfo = {};
    participantInfo[me] = { name: shortNameOf(state.user), photo: state.user.photoURL || '' };
    var unread = {}; unread[me] = 0;
    picks.forEach(function(cb){
      var uid = cb.value;
      if (participants.indexOf(uid) >= 0) return;
      participants.push(uid);
      participantInfo[uid] = { name: cb.getAttribute('data-name') || 'Debater', photo: cb.getAttribute('data-photo') || '' };
      // Seed unread:1 for added members so "you were added to a group"
      // surfaces as a notification (bell badge + toast) for anyone online.
      unread[uid] = 1;
    });
    var threadId = 'grp_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 8);
    firebaseDb.collection('dm_threads').doc(threadId).set({
      isGroup: true,
      groupName: name.slice(0, WL_GROUP_NAME_MAX),
      participants: participants,
      participantInfo: participantInfo,
      createdBy: me,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      lastMessage: shortNameOf(state.user) + ' started the group',
      lastMessageAt: firebase.firestore.FieldValue.serverTimestamp(),
      lastMessageFrom: me,
      unread: unread,
    }).then(function(){
      try { gtag('event', 'group_create', { members: participants.length }); } catch(e){}
      openGroupThread(threadId);
    }).catch(function(e){
      if (btn) btn.disabled = false;
      if (errEl) errEl.textContent = 'Couldn\'t create group: ' + (e.message || e.code || 'unknown');
    });
  }

  // Open a DM thread given only the peer's uid (from a ?dm= deep link).
  // Fetches the thread doc to recover the peer's display name + photo
  // from participantInfo; falls back to a generic label if the thread
  // doesn't exist yet or the read fails.
  function openDmFromUid(peerUid){
    if (!firebaseDb || !state.user || !peerUid) return;
    var threadId = dmThreadId(state.user.uid, peerUid);
    firebaseDb.collection('dm_threads').doc(threadId).get().then(function(doc){
      var info = {};
      if (doc.exists){
        var d = doc.data() || {};
        info = (d.participantInfo && d.participantInfo[peerUid]) || {};
      }
      openDMThread(peerUid, info.name || 'Debater', info.photo || '');
    }).catch(function(){
      openDMThread(peerUid, 'Debater', '');
    });
  }

  // Calm center state for inbox deep-links: the user arrived to read a
  // DM, so we show their messages + an explicit opt-in to matchmaking
  // rather than auto-queueing them into a live round.
  function renderInboxLanding(){
    shell.innerHTML =
      '<div class="gate">' +
        '<div class="eyebrow"><span class="pip"></span>Sparring · Messages</div>' +
        '<h2>Your messages</h2>' +
        '<p>Pick up where you left off, or jump back into the matchmaking queue when you\'re ready to spar.</p>' +
        '<button class="gate-google" id="inboxOpenBtn" type="button" style="margin-top:6px">Open inbox</button>' +
        '<button class="ai-alt" id="inboxQueueBtn" type="button" style="background:none;border:none;cursor:pointer;font-family:inherit">Or find a sparring partner now →</button>' +
      '</div>';
    var openBtn = document.getElementById('inboxOpenBtn');
    if (openBtn) openBtn.addEventListener('click', openInboxModal);
    var queueBtn = document.getElementById('inboxQueueBtn');
    if (queueBtn) queueBtn.addEventListener('click', function(){
      // Strip ?dm so a refresh / re-auth doesn't bounce back to inbox.
      try { history.replaceState(null, '', '/spar' + (formatParam ? ('?format=' + encodeURIComponent(formatParam)) : '')); } catch(e){}
      joinQueue();
    });
  }

  // Generic modal helpers ────────────────────────────────
  function openModal(titleHtml, bodyHtml, footButtons){
    closeModal();
    var backdrop = document.createElement('div');
    backdrop.className = 'wl-modal-backdrop';
    backdrop.id = 'wlModalBackdrop';
    var footHtml = (footButtons || []).map(function(b, i){
      if (b.html) return b.html;
      var cls = b.kind === 'primary' ? 'wl-btn primary' : 'wl-btn ghost';
      var idAttr = b.id ? ' id="' + b.id + '"' : ' data-foot-idx="' + i + '"';
      return '<button class="' + cls + '"' + idAttr + ' type="button">' + escHtml(b.label) + '</button>';
    }).join('');
    backdrop.innerHTML =
      '<div class="wl-modal" role="dialog" aria-modal="true">' +
        '<div class="wl-modal__head">' +
          '<div class="wl-modal__title">' + titleHtml + '</div>' +
          '<button class="wl-modal__close" id="wlModalClose" aria-label="Close">×</button>' +
        '</div>' +
        '<div class="wl-modal__body">' + bodyHtml + '</div>' +
        (footButtons && footButtons.length ? '<div class="wl-modal__foot">' + footHtml + '</div>' : '') +
      '</div>';
    document.body.appendChild(backdrop);
    document.getElementById('wlModalClose').addEventListener('click', closeModal);
    backdrop.addEventListener('click', function(e){
      if (e.target === backdrop) closeModal();
    });
    (footButtons || []).forEach(function(b, i){
      if (!b.onClick) return;
      var el = b.id ? document.getElementById(b.id) : backdrop.querySelector('[data-foot-idx="' + i + '"]');
      if (el) el.addEventListener('click', b.onClick);
    });
    document.addEventListener('keydown', wlEscClose);
  }
  function wlEscClose(e){ if (e.key === 'Escape') closeModal(); }
  function closeModal(){
    var b = document.getElementById('wlModalBackdrop');
    if (b) b.remove();
    document.removeEventListener('keydown', wlEscClose);
    if (wl.activeThreadUnsub){ try { wl.activeThreadUnsub(); } catch(e){} wl.activeThreadUnsub = null; }
    if (wl.activeThreadDocUnsub){ try { wl.activeThreadDocUnsub(); } catch(e){} wl.activeThreadDocUnsub = null; }
  }

  // ── Scheduled rounds in the rail (2026-07-14) ────────
  // The dead-queue rescue: when matchmaking is quiet, the rail shows
  // upcoming community-scheduled rounds (/api/schedule-round) so a
  // failed match converts into an RSVP for a future one. Same device
  // id + anonymous posture as /community; hidden when nothing is
  // scheduled; refreshes every 2 min while the tab is visible.
  var SCHED_FMT_LABELS = { quick:'Quick Clash', apda:'APDA', bp:'BP', worlds:'Worlds', asian:'Asian Parli', ld:'LD', pf:'Public Forum', policy:'Policy' };
  function schedDeviceId(){
    var id = '';
    try { id = localStorage.getItem('da-device-id') || ''; } catch(e){}
    if (!id){
      id = 'd' + Math.random().toString(36).slice(2, 12) + Math.random().toString(36).slice(2, 12);
      try { localStorage.setItem('da-device-id', id); } catch(e){}
    }
    return id;
  }
  function schedHandle(){
    var h = '';
    if (state.user && state.user.displayName) h = state.user.displayName.split(/\s+/)[0];
    if (!h){ try { h = localStorage.getItem('da-chat-handle') || ''; } catch(e){} }
    return (h || 'anon').slice(0, 32);
  }
  function schedEsc(s){
    return String(s == null ? '' : s).replace(/[&<>"']/g, function(ch){
      return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[ch];
    });
  }
  function loadSchedRounds(){
    var slot = document.getElementById('wlSched');
    if (!slot) return;
    fetch('/api/schedule-round?d=' + encodeURIComponent(schedDeviceId()), { cache: 'no-cache' })
      .then(function(r){ return r.ok ? r.json() : null; })
      .then(function(j){
        var rounds = (j && Array.isArray(j.rounds)) ? j.rounds : [];
        if (!rounds.length){ slot.hidden = true; slot.innerHTML = ''; return; }
        var now = Date.now();
        var rows = rounds.slice(0, 3).map(function(r){
          var soon = r.startAt - now < 20 * 60 * 1000 && r.startAt + 2 * 60 * 60 * 1000 > now;
          var d = new Date(r.startAt);
          var when = soon ? 'starting<br>soon'
            : (d.toDateString() === new Date().toDateString() ? 'Today' : d.toLocaleDateString(undefined, { weekday: 'short' })) +
              '<br>' + d.toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' });
          var what = '<b>' + schedEsc(SCHED_FMT_LABELS[r.format] || 'Quick Clash') + '</b>' +
            (r.motion ? ' · ' + schedEsc(String(r.motion).slice(0, 60)) : '') +
            ' · ' + r.rsvpCount + ' in';
          var action = soon
            ? '<a class="wl-sched-btn go" href="/spar?format=' + schedEsc(r.format) + '">Queue →</a>'
            : '<button type="button" class="wl-sched-btn' + (r.mine ? ' on' : '') + '" data-sched-id="' + schedEsc(r.id) + '">' + (r.mine ? 'In ✓' : "I'm in") + '</button>';
          return '<div class="wl-sched-row' + (soon ? ' soon' : '') + '">' +
            '<div class="wl-sched-when">' + when + '</div>' +
            '<div class="wl-sched-what">' + what + '</div>' + action + '</div>';
        }).join('');
        slot.innerHTML =
          '<div class="wl-sched-head">Scheduled rounds<a href="/community">propose one →</a></div>' + rows;
        slot.hidden = false;
        slot.querySelectorAll('[data-sched-id]').forEach(function(b){
          b.addEventListener('click', function(){
            b.disabled = true;
            fetch('/api/schedule-round', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ action: 'rsvp', id: b.getAttribute('data-sched-id'), handle: schedHandle(), deviceId: schedDeviceId() }),
            }).then(function(r){ return r.json().catch(function(){ return null; }); })
              .then(function(res){
                if (res && res.ok){
                  try { gtag('event', 'spar_sched_rsvp', { going: res.mine }); } catch(e){}
                  loadSchedRounds();
                } else { b.disabled = false; }
              })
              .catch(function(){ b.disabled = false; });
          });
        });
      })
      .catch(function(){ /* endpoint down — block stays hidden */ });
  }
  setInterval(function(){ if (!document.hidden) loadSchedRounds(); }, 120 * 1000);

  // ── Boot ─────────────────────────────────────────────
  // Sidebar mounts immediately. Posts feed is public-read so we can
  // populate it before auth resolves; renderWaitlistContent swaps the
  // post-button / sign-in-overlay slot when the auth state lands.
  buildWaitlistRail();
  renderWaitlistContent();
  loadSchedRounds();
  // waitlist_posts requires isSignedIn() — start the feed only after
  // auth resolves (named user OR anonymous) so the first snapshot
  // doesn't fail with Missing or insufficient permissions and leave
  // the listener permanently dead.
  fetchWaitlistActivity();

  if (firebaseAuth){
    firebaseAuth.onAuthStateChanged(function(user){
      if (!user){
        ensureGuestAuth().catch(function(){});
        return;
      }
      state.user = user;
      renderWaitlistContent();
      if (firebaseDb && state.user) startWaitlistFeed();
      if (state.user){
        startInboxFeed();
        // Deep link from a DM notification (topbar bell / toast / OS
        // notification → /spar?dm=<peerUid>). Open that thread instead
        // of dumping the user straight into the matchmaking queue —
        // they came to read a message, not to start a live round.
        var dmPeer = qs.get('dm');
        var dmThread = qs.get('thread');
        if (dmThread){
          renderInboxLanding();
          openGroupThread(dmThread);
        } else if (dmPeer && dmPeer !== state.user.uid){
          renderInboxLanding();
          openDmFromUid(dmPeer);
        } else if (qs.get('inbox')){
          // Reached from the account/profile "Messages" card
          // (/spar?inbox=1). Land on the inbox with the thread list open,
          // not the matchmaking queue.
          renderInboxLanding();
          openInboxModal();
        } else {
          joinQueue();
        }
      } else {
        if (wl.threadsUnsub){ try { wl.threadsUnsub(); } catch(e){} wl.threadsUnsub = null; }
        wl.threads = []; wl.unreadThreads = 0;
        var badge = document.getElementById('wlInboxBadge');
        if (badge) badge.hidden = true;
        var fabBadge = document.getElementById('wlFabBadge');
        if (fabBadge) fabBadge.hidden = true;
        renderGate();
      }
    });
  } else {
    renderGate();
  }
})();
</script>
