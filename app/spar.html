/* Globe — the centerpiece of this page. Layered visual:
     • two slow-rotating outer orbit rings (dashed + dotted) on .globe-wrap
     • multi-stop radial gradient on .globe-frame for 3D-sphere look
       (specular highlight top-left, dark shadow bottom-right, red atmosphere)
     • two staggered expanding ring pulses (::before, ::after on frame)
     • a conic radar sweep inside the frame
     • three orbit containers with satellite dots at different radii/speeds
     • <canvas id="sparGlobe"> on top draws live pins/arcs via world-globe.js
       in transparent mode. If world-globe.js fails to load, the orb still
       reads as a rich animated sphere instead of a flat gradient blob. */
.globe-wrap{
  position:relative;width:220px;max-width:62vw;margin:0 auto 18px;
  aspect-ratio:1 / 1;
}
/* Outer dashed orbit ring — slow forward rotation */
.globe-wrap::before{
  content:''; position:absolute; inset:-6%;
  border-radius:50%;
  border:1px dashed rgba(239,68,68,.28);
  pointer-events:none;
  animation:globe-orbit-slow 32s linear infinite;
}
/* Wider dotted orbit ring — slower reverse rotation */
.globe-wrap::after{
  content:''; position:absolute; inset:-14%;
  border-radius:50%;
  border:1px dotted rgba(239,68,68,.18);
  pointer-events:none;
  animation:globe-orbit-slow 50s linear infinite reverse;
}
@keyframes globe-orbit-slow{ to{ transform:rotate(360deg) } }

.globe-frame{
  position:relative;width:100%;height:100%;border-radius:50%;
  background:
    /* Specular highlight top-left for sphere depth */
    radial-gradient(circle at 32% 28%,
      rgba(255,210,210,.20) 0%,
      rgba(255,170,170,.06) 18%,
      transparent 40%),
    /* Bottom-right shadow gives the orb 3D shape */
    radial-gradient(circle at 70% 78%,
      rgba(0,0,0,.55) 0%,
      transparent 48%),
    /* Red atmosphere — center bright, fades to halo */
    radial-gradient(circle at 50% 50%,
      rgba(239,68,68,.32) 0%,
      rgba(239,68,68,.16) 34%,
      rgba(239,68,68,.04) 62%,
      transparent 78%);
  box-shadow:
    inset 0 0 70px rgba(239,68,68,.20),
    inset 0 -14px 40px rgba(0,0,0,.5),
    0 0 110px rgba(239,68,68,.28);
  animation:globe-breathe 5.5s ease-in-out infinite;
  overflow:hidden;
}
/* Two ring pulses staggered for continuous expand-and-fade. */
.globe-frame::before, .globe-frame::after{
  content:''; position:absolute; inset:14%;
  border-radius:50%;
  border:1.5px solid rgba(239,68,68,.55);
  pointer-events:none; opacity:0;
  animation:globe-ring-pulse 3.8s cubic-bezier(.35,0,.25,1) infinite;
  z-index:1;
}
.globe-frame::after{ animation-delay:1.9s }
@keyframes globe-ring-pulse{
  0%{ transform:scale(.55); opacity:.75; border-width:2px }
  60%{ opacity:.18; border-width:1px }
  100%{ transform:scale(1.55); opacity:0; border-width:.5px }
}
@keyframes globe-breathe{
  0%,100%{box-shadow:inset 0 0 70px rgba(239,68,68,.20), inset 0 -14px 40px rgba(0,0,0,.5), 0 0 110px rgba(239,68,68,.28)}
  50%    {box-shadow:inset 0 0 95px rgba(239,68,68,.28), inset 0 -14px 40px rgba(0,0,0,.5), 0 0 145px rgba(239,68,68,.36)}
}
.globe-frame canvas{display:block;width:100%;height:100%;position:relative;z-index:3}

/* Radar sweep arc — conic gradient rotating inside the orb. Below the
   canvas so live pins draw on top. Subtle so it doesn't overpower. */
.globe-sweep{
  position:absolute; inset:10%;
  border-radius:50%; pointer-events:none; z-index:2;
  background:conic-gradient(from 0deg,
    transparent 0deg,
    rgba(239,68,68,.22) 38deg,
    rgba(239,68,68,.08) 60deg,
    transparent 78deg);
  animation:globe-sweep-rot 6s linear infinite;
  mix-blend-mode:screen;
}
@keyframes globe-sweep-rot{ to{ transform:rotate(360deg) } }

/* Orbit containers — child <span> is the satellite dot positioned at the
   top of the orbit. Rotating the container moves the dot around the rim.
   Different `inset` values give each orbit a distinct radius. */
.globe-orbit{
  position:absolute; inset:-2%;
  border-radius:50%; pointer-events:none; z-index:4;
}
.globe-orbit > .globe-dot{
  position:absolute; left:50%; top:0;
  width:7px; height:7px; margin:-3.5px 0 0 -3.5px;
  border-radius:50%;
  background:#fff;
  box-shadow:0 0 8px var(--accent), 0 0 16px rgba(239,68,68,.7);
}
.globe-orbit > .globe-dot--small{
  width:5px; height:5px; margin:-2.5px 0 0 -2.5px;
  background:#ffd5d5;
  box-shadow:0 0 6px var(--accent), 0 0 12px rgba(239,68,68,.6);
}
.globe-orbit > .globe-dot--bright{
  background:#fff;
  box-shadow:0 0 10px #fff, 0 0 18px var(--accent), 0 0 28px rgba(239,68,68,.6);
}
.globe-orbit--a{ animation:globe-orbit-spin 9s linear infinite }
.globe-orbit--b{ inset:8%; animation:globe-orbit-spin 14s linear infinite reverse }
.globe-orbit--c{ inset:18%; animation:globe-orbit-spin 22s linear infinite }
@keyframes globe-orbit-spin{ to{ transform:rotate(360deg) } }

/* Legacy orb — still used by renderMatched() and renderFallback() as
   brief transition states. Kept for those two short-lived screens. */
.orb-wrap{
  position:relative;width:280px;height:280px;margin:0 auto 22px;
  display:flex;align-items:center;justify-content:center;
}
.orb-glow{
  position:absolute;inset:-20%;border-radius:50%;
  background:radial-gradient(circle at 50% 50%,var(--accent-glow) 0%,transparent 60%);
  filter:blur(20px);opacity:.7;
  animation:orb-breathe 3s ease-in-out infinite;
}
@keyframes orb-breathe{0%,100%{transform:scale(1);opacity:.55}50%{transform:scale(1.08);opacity:.85}}
.orb-ring{
  position:absolute;inset:0;border-radius:50%;
  border:1.5px solid var(--accent);
  opacity:.85;
  animation:orb-rotate 8s linear infinite;
}
@keyframes orb-rotate{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.orb-ring::before{
  content:'';position:absolute;top:-3px;left:50%;width:6px;height:6px;border-radius:50%;
  background:#fff;box-shadow:0 0 12px var(--accent),0 0 24px var(--accent);
  transform:translateX(-50%);
}
.orb-core{
  position:relative;width:64%;height:64%;border-radius:50%;
  background:radial-gradient(circle at 40% 35%,rgba(255,255,255,.18) 0%,rgba(239,68,68,.42) 35%,rgba(0,0,0,.85) 100%);
  box-shadow:inset 0 0 60px rgba(0,0,0,.65),0 0 60px rgba(239,68,68,.35);
}
.orb-wrap.matched .orb-glow{background:radial-gradient(circle,rgba(34,197,94,.5),transparent 60%);animation-duration:1s}
.orb-wrap.matched .orb-ring{border-color:#22c55e}
.orb-wrap.matched .orb-ring::before{background:#fff;box-shadow:0 0 12px #22c55e,0 0 24px #22c55e}

.status{
  font-size:1.05rem;font-weight:600;color:var(--text);margin-bottom:8px;letter-spacing:-.005em;
  min-height:32px;
}
.status .dim{color:var(--text-dim);font-weight:500}
.countdown{
  display:inline-flex;align-items:center;gap:8px;
  font-size:.78rem;font-weight:600;color:var(--text-ghost);letter-spacing:.06em;text-transform:uppercase;
  padding:6px 14px;border-radius:999px;
  background:var(--bg-card);border:1px solid var(--border);
  margin-bottom:24px;
}
.countdown strong{color:var(--text);font-variant-numeric:tabular-nums;font-weight:800;font-size:.86rem}

.btn-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:8px}
.btn{
  padding:11px 22px;border-radius:999px;border:1px solid var(--border);
  background:transparent;color:var(--text);font-family:inherit;font-weight:700;
  font-size:.84rem;letter-spacing:.04em;cursor:pointer;
  transition:all .15s;
}
.btn:hover{background:rgba(255,255,255,.04);border-color:var(--border-strong);transform:translateY(-1px)}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 6px 24px var(--accent-glow)}
.btn.primary:hover{background:#dc2626;border-color:#dc2626}
.btn.ghost{background:transparent;color:var(--text-dim)}
.btn.ghost:hover{color:var(--text)}

.format-pill{
  display:inline-flex;align-items:center;gap:6px;
  padding:5px 11px;border-radius:999px;
  background:rgba(59,130,246,.10);border:1px solid rgba(59,130,246,.32);
  color:#93c5fd;font-size:.7rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  margin-bottom:18px;
}

.queue-stats{
  margin-top:16px;
}
.queue-stats strong{color:var(--text);font-variant-numeric:tabular-nums}

/* Live waitlist tile — shows other debaters currently queued in the
   same format, with avatars, short names, and how long they've been
   waiting. Replaces the older single-line "X in your queue" text. */
.waitlist{
  max-width:420px;margin:0 auto;
  padding:14px 16px 12px;
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:14px;
  text-align:left;
}
.waitlist-head{
  display:flex;align-items:center;justify-content:space-between;
  font-size:.66rem;font-weight:800;letter-spacing:.14em;text-transform:uppercase;
  color:var(--text-ghost);
  margin-bottom:10px;
}
.waitlist-head strong{color:var(--text);font-size:.78rem;letter-spacing:.04em;text-transform:none;font-weight:800}
.waitlist-head .wl-fmt{color:var(--text-dim);font-size:.62rem}
.wl-list{
  list-style:none;padding:0;margin:0;
  display:flex;flex-direction:column;gap:2px;
}
.wl-row{
  display:grid;grid-template-columns:24px 1fr auto;align-items:center;gap:10px;
  padding:6px 4px;border-radius:6px;
}
.wl-row + .wl-row{border-top:1px solid var(--border)}
.wl-avi{
  width:24px;height:24px;border-radius:50%;
  background:rgba(239,68,68,.12);
  display:inline-flex;align-items:center;justify-content:center;
  overflow:hidden;flex-shrink:0;
  font-size:.66rem;font-weight:800;color:#fca5a5;
}
.wl-avi img{width:100%;height:100%;object-fit:cover;display:block}
.wl-name{
  font-size:.82rem;color:var(--text);font-weight:600;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.wl-time{
  font-size:.7rem;color:var(--text-ghost);font-weight:600;
  font-variant-numeric:tabular-nums;
}
.wl-more{
  margin-top:8px;
  font-size:.7rem;color:var(--text-dim);text-align:center;
}
.waitlist-empty{
  max-width:420px;margin:0 auto;
  padding:12px 16px;
  background:var(--bg-card);
  border:1px dashed var(--border);
  border-radius:12px;
  font-size:.78rem;color:var(--text-dim);text-align:center;line-height:1.5;
}
.waitlist-empty strong{color:var(--text);font-weight:700}

/* Sign-in gate. We REQUIRE auth for human-vs-human (anti-abuse) but
   gate softly: explain why, offer Google sign-in, AND offer the AI
   fallback as an alternative for users who don't want to sign in. */
.gate{
  background:var(--bg-card);border:1px solid var(--border);border-radius:18px;
  padding:32px 28px;max-width:440px;width:100%;text-align:center;
}
.gate h2{font-size:1.4rem;font-weight:900;letter-spacing:-.015em;margin-bottom:10px;color:var(--text)}
.gate p{font-size:.92rem;color:var(--text-dim);line-height:1.55;margin-bottom:18px}
.gate-google{
  display:inline-flex;align-items:center;justify-content:center;gap:10px;
  width:100%;padding:13px 22px;background:#fff;color:#1a1a1a;border-radius:12px;
  font-weight:700;font-size:.9rem;cursor:pointer;border:none;font-family:inherit;
  transition:transform .15s;margin-bottom:10px;
}
.gate-google:hover{transform:translateY(-1px);box-shadow:0 8px 22px rgba(0,0,0,.3)}
.gate-google svg{width:18px;height:18px;flex-shrink:0}
.gate-disclaimer{font-size:.74rem;color:var(--text-ghost);margin-top:12px;line-height:1.55}
.gate .ai-alt{
  display:block;margin-top:14px;padding:10px 14px;
  font-size:.78rem;color:var(--accent);font-weight:700;
  border:1px dashed rgba(239,68,68,.42);border-radius:10px;
  text-decoration:none;transition:background .15s;
}
.gate .ai-alt:hover{background:rgba(239,68,68,.08)}

.error{
  padding:12px 16px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.32);
  border-radius:10px;color:#fca5a5;font-size:.84rem;margin-top:14px;
}

/* Helpful link strip at bottom */
.foot{
  font-size:.74rem;color:var(--text-ghost);margin-top:24px;line-height:1.6;
}
.foot a{color:var(--text-dim);text-decoration:underline;text-decoration-color:rgba(255,255,255,.25)}
.foot a:hover{color:var(--text)}

/* ── Waitlist sidebar (left rail) ─────────────────────────
   Posts persist in Firestore (waitlist_posts collection) so users
   can find each other for organized debates while the matchmaker
   keeps running in the center. DMs go through dm_threads. Both
   collections need rules + an index — see the comment block in the
   JS section below. */
/* `[hidden]` defaults to display:none in the UA stylesheet, but our
   inbox button + badge have explicit display:flex / inline-flex below
   that beats specificity. Force-respect [hidden] for these elements
   so the JS toggle (inboxBtn.hidden = true/false) actually hides
   them on signed-out + zero-unread states. */
.waitlist-rail__inbox[hidden], .waitlist-rail__inbox .badge[hidden],
.waitlist-fab[hidden], .waitlist-fab .fab-badge[hidden]{display:none !important}
.waitlist-rail{
  position:fixed; top:90px; left:24px; bottom:24px;
  width:320px; max-width:calc(100vw - 48px);
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:16px;
  display:flex; flex-direction:column;
  overflow:hidden;
  z-index:30;
  box-shadow:var(--shadow-lg);
}
.waitlist-rail__head{
  padding:14px 16px;
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
  gap:8px;
}
.waitlist-rail__title{
  font-size:.82rem; font-weight:800; letter-spacing:.01em;
  color:var(--text);
  display:flex; align-items:center; gap:8px;
}
.waitlist-rail__title .live-dot{
  width:6px; height:6px; border-radius:50%;
  background:var(--accent); box-shadow:0 0 8px var(--accent);
  animation:pulse 1.6s ease-in-out infinite;
}
.waitlist-rail__sub{
  font-size:.72rem; color:var(--text-ghost); font-weight:500;
  padding:10px 16px 0; line-height:1.5;
}
.waitlist-rail__inbox{
  display:inline-flex; align-items:center; gap:6px;
  padding:4px 10px; border-radius:999px;
  background:transparent; border:1px solid var(--border);
  color:var(--text-dim); font-size:.7rem; font-weight:700; cursor:pointer;
  transition:color .15s, border-color .15s;
  font-family:inherit;
}
.waitlist-rail__inbox:hover{color:var(--text); border-color:var(--border-strong)}
.waitlist-rail__inbox .badge{
  display:inline-flex; align-items:center; justify-content:center;
  min-width:16px; height:16px; padding:0 5px; border-radius:999px;
  background:var(--accent); color:#fff; font-size:.62rem; font-weight:800;
}
.waitlist-rail__list{
  flex:1; overflow-y:auto; padding:8px 12px 12px;
  display:flex; flex-direction:column; gap:8px;
}
.waitlist-rail__empty{
  font-size:.78rem; color:var(--text-ghost); padding:18px 8px;
  text-align:center; line-height:1.55;
}
.waitlist-card{
  display:flex; flex-direction:column; gap:8px;
  padding:12px 12px;
  background:var(--bg-elev); border:1px solid var(--border);
  border-radius:12px;
  transition:border-color .15s, transform .15s;
}

     mid-spar can still reach Voice / Community / Pricing / etc. -->
<div id="daTopbar"></div>

<!-- Rotating-globe data + renderer for the searching state. Defer-loaded

     until DebateGlobe is on window. -->

<script defer src="/js/world-globe.js?v=1"></script>

<div class="wrap" style="padding-top:90px">

</div>

<script>
(function(){
  'use strict';

  var FIREBASE_CONFIG = {

  } catch(e){ console.warn('[spar] firebase init', e); }

  // ── URL params ───────────────────────────────────────
  // /spar?format=quick — auto-pick format. Defaults to 'quick' since
  // it's the most-newcomer-friendly + universal pair point.
  var qs = new URLSearchParams(location.search);
  var FORMATS = ['quick','apda','bp','worlds','asian','ld','pf','policy'];
  var formatParam = (qs.get('format') || 'quick').toLowerCase();
  if (FORMATS.indexOf(formatParam) < 0) formatParam = 'quick';

  // ── State ────────────────────────────────────────────
  var state = {
    user: null,
    queueDocRef: null,
    queueUnsub: null,
    queueWatchUnsub: null,
    matchTriggerPending: false,
    pairInFlight: false,           // gate on the spar-pair POST so polling doesn't fan out duplicates
    joinedAtMs: 0,
    countdownInterval: null,
    matchPollInterval: null,
    waitingPeers: 0,
    cancelled: false,
    broaden: false,
    broadenOffered: false,
  };

  // 60-second timer until AI fallback. After this, we mark the user's
  // queue doc as 'matched_ai' and bounce them to /debate-ai with the
  // motion preserved. This is the load-bearing decision: a debate
  // engine where AI is the FALLBACK, not the headline.
  var AI_FALLBACK_SEC = 60;
  // After 45s with no match, surface a 'broaden formats' toggle so
  // users in thin-pair queues (Worlds, Asian Parli) can match across
  // formats instead of timing out into AI. Click → flip my queue
  // doc to broaden:true and the polling expands to any-format peers
  // who also have broaden:true (or my exact format).
  var BROADEN_OFFER_SEC = 45;

  var shell = document.getElementById('shell');

  function escHtml(s){
    return String(s||'').replace(/[&<>"']/g, function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }

  // Render the live waitlist tile shown under the globe. `others` is an
  // array of Firestore docs for queued peers (excluding self), `format`
  // is the current format string. Empty state has its own friendly
  // framing — "You're first in line" — instead of a dead "0 in queue".
  function renderWaitlist(others, format){
    var fmt = escHtml(String(format||'').toUpperCase());
    if (!others || others.length === 0){
      return '<div class="waitlist-empty">' +
        "<strong>You're first in line.</strong> Waiting on the next debater to join the " + fmt + ' queue.' +
        '</div>';
    }
    var now = Math.floor(Date.now() / 1000);
    var rows = others.slice(0, 6).map(function(d){
      var data = d.data ? d.data() : d;
      var name = escHtml(data.displayName || 'Anonymous');
      var initial = (name.replace(/&[^;]+;/g,'').charAt(0) || '?').toUpperCase();
      var avi = data.photoURL
        ? '<img src="' + escHtml(data.photoURL) + '" alt="" referrerpolicy="no-referrer" onerror="this.replaceWith(Object.assign(document.createElement(\'span\'),{textContent:\'' + initial + '\'}))" />'
        : initial;
      var sec = (data.joinedAt && data.joinedAt.seconds)
        ? Math.max(0, now - data.joinedAt.seconds)
        : 0;
      return '<li class="wl-row">' +
        '<span class="wl-avi">' + avi + '</span>' +
        '<span class="wl-name">' + name + '</span>' +
        '<span class="wl-time">' + sec + 's</span>' +
        '</li>';
    }).join('');
    var more = others.length > 6
      ? '<div class="wl-more">+' + (others.length - 6) + ' more queued</div>'
      : '';
    return '<div class="waitlist">' +
      '<div class="waitlist-head">' +
        '<span><strong>' + others.length + '</strong> in queue</span>' +
        '<span class="wl-fmt">' + fmt + '</span>' +
      '</div>' +
      '<ul class="wl-list">' + rows + '</ul>' +
      more +
      '</div>';
  }

  // ── Render: signed-out gate ──────────────────────────
  // Anti-abuse posture: human-vs-human REQUIRES sign-in. The AI side
  // doesn't, and that's the alternative we surface explicitly so the
  // user can choose AI without bouncing off a hard wall. The globe
  // sits above the sign-in CTA so visitors immediately see the live
  // network they're being asked to join (bigger pull than a static
  // form). Same canvas + mountGlobe used in renderSearching().
  function renderGate(){
    shell.innerHTML =
      '<div class="gate">' +
        '<div class="eyebrow"><span class="pip"></span>Sparring · Live Humans</div>' +
        '<div class="globe-wrap"><div class="globe-frame">' +
          '<div class="globe-sweep" aria-hidden="true"></div>' +
          '<canvas id="sparGlobe" aria-label="Live network of debaters"></canvas>' +
          '<div class="globe-orbit globe-orbit--a" aria-hidden="true"><span class="globe-dot globe-dot--bright"></span></div>' +
          '<div class="globe-orbit globe-orbit--b" aria-hidden="true"><span class="globe-dot globe-dot--small"></span></div>' +
          '<div class="globe-orbit globe-orbit--c" aria-hidden="true"><span class="globe-dot"></span></div>' +
        '</div></div>' +
        '<h2>Sign in to spar with another debater.</h2>' +
        '<p>Live human-vs-human is signed-in only. Keeps the queue free of bots and gives you a profile your opponent can see. AI sparring stays anonymous if you\'d rather skip the sign-in.</p>' +
        '<button class="gate-google" id="signInBtn" type="button">' +
          '<svg viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.7 29.2 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.8 1.1 7.9 3l5.7-5.7C34 6.1 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.2-.1-2.3-.4-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 16 19 13 24 13c3 0 5.8 1.1 7.9 3l5.7-5.7C34 6.1 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.2 35.3 26.7 36 24 36c-5.2 0-9.6-3.3-11.3-7.9l-6.5 5C9.5 39.6 16.2 44 24 44z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.2 4.3-4.1 5.7l6.2 5.2C41.9 35 44 29.8 44 24c0-1.2-.1-2.3-.4-3.5z"/></svg>' +
          'Continue with Google' +
        '</button>' +
        '<a class="ai-alt" href="/debate-ai">Or spar with the AI now, anonymous round →</a>' +
        '<div class="gate-disclaimer">We use your Google name + photo to label you to your opponent. Sign out anytime.</div>' +
        '<div id="gateError"></div>' +
      '</div>';
    document.getElementById('signInBtn').addEventListener('click', doGoogleSignIn);
    mountGlobe('sparGlobe');
    try { gtag('event', 'spar_gate_view', {}); } catch(e){}
  }

  function doGoogleSignIn(){
    if (!firebaseAuth){
      document.getElementById('gateError').innerHTML = '<div class="error">Sign-in didn\'t load. Refresh the page or skip to the AI fallback.</div>';
      return;
    }
    var provider = new firebase.auth.GoogleAuthProvider();
    firebaseAuth.signInWithPopup(provider).catch(function(err){
      try { if (window.gtag) gtag('event', 'sign_in_error', { code: (err && err.code) || 'unknown', message: ((err && err.message) || '').slice(0, 200), surface: 'spar', method: 'popup' }); } catch(_){}
      // Some in-app browsers (Instagram, TikTok) block popup OAuth.
      // Fall back to redirect, which most embedded browsers tolerate.
      if (err && (err.code === 'auth/popup-blocked' || err.code === 'auth/operation-not-supported-in-this-environment')){
        firebaseAuth.signInWithRedirect(provider);
      } else {
        var ge = document.getElementById('gateError');
        if (ge) ge.innerHTML = '<div class="error">Sign-in failed: ' + escHtml(err && err.message || 'unknown') + '</div>';
      }

  // Phased status messages, tied to elapsed wait time. Replaces the
