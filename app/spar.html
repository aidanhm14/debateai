  var STATUS_PHASES = [
    { until:  8, text: 'Scanning the queue', sub: 'Looking across active debaters in your format.' },
    { until: 18, text: 'Pinging recent sparrers', sub: 'Reaching out to debaters who matched in the last hour.' },
    { until: 30, text: 'Searching adjacent formats', sub: 'Long-form formats sometimes pair faster across the bench.' },
    { until: 45, text: 'Still looking. Hold tight.', sub: 'Most matches land between 20 and 50 seconds.' },
    { until: 60, text: 'Almost time to switch to AI', sub: 'If nobody pairs by zero, you get the AI sparring partner.' },
  ];

  // Faux "recent pairings" ticker. Real handles drawn from the live.html
  // seed pool + a few extras. Numbers are realistic spreads (8s-45s).
  // Cycles every ~3 seconds, gives the wait social proof without
  // requiring any backend call.
  var RECENT_PAIRINGS = [
    { a: 'flow_nerd',     b: 'kant_kid',       sec: 14 },
    { a: 'pmr_collapse',  b: 'card_doctor',    sec: 22 },
    { a: 'first_gen_voice', b: 'value_crit',   sec: 9  },
    { a: 'wsdc_2nd',      b: 'nsda_qual',      sec: 31 },
    { a: 'whip_speaker',  b: 'housing_wonk',   sec: 17 },
    { a: 'redteam',       b: 'firstround',     sec: 28 },
    { a: '1ar_collapse',  b: 'kritik_fan',     sec: 11 },
    { a: 'national_champ',b: 'topicality_god', sec: 19 },
  ];

  // ── Render: searching state ──────────────────────────
  function renderSearching(){
    var formatLabel = formatParam.toUpperCase();
    shell.innerHTML =
      '<div class="eyebrow"><span class="pip"></span>Looking for a partner</div>' +
      '<h1>Finding you a <em>debater.</em></h1>' +
      '<p class="lede">We\'ll match you with another human running the same format. AI fallback if nobody pairs in 60 seconds.</p>' +
      '<span class="format-pill" title="Format you\'re queueing for">' + escHtml(formatLabel) + '</span>' +
      // Rotating globe — replaces the static red orb. The visual makes
      // the wait feel like joining a real network instead of staring at
      // a loading spinner. Mounts via /js/world-globe.js after this
      // innerHTML lands.
      '<div class="globe-wrap"><div class="globe-frame">' +
          '<div class="globe-sweep" aria-hidden="true"></div>' +
          '<canvas id="sparGlobe" aria-label="Live network of debaters"></canvas>' +
          '<div class="globe-orbit globe-orbit--a" aria-hidden="true"><span class="globe-dot globe-dot--bright"></span></div>' +
          '<div class="globe-orbit globe-orbit--b" aria-hidden="true"><span class="globe-dot globe-dot--small"></span></div>' +
          '<div class="globe-orbit globe-orbit--c" aria-hidden="true"><span class="globe-dot"></span></div>' +
        '</div></div>' +
      '<div class="status" id="statusText"><span id="statusMain">Scanning the queue</span><span class="dim" id="statusSub" style="display:block;margin-top:4px;font-size:.78rem;font-weight:400">Looking across active debaters in your format.</span></div>' +
      '<div class="countdown">AI fallback in <strong id="countdownNum">60</strong>s</div>' +
      '<div class="btn-row">' +
        '<button class="btn ghost" id="cancelBtn">Cancel & go home</button>' +
        '<a class="btn" href="/debate-ai">Skip to AI now</a>' +
      '</div>' +
      // 2026-05-18: while the user is waiting on the random matchmaker,
      // give them a clear pivot to /live (the schedule board with
      // upcoming + live-now scheduled rounds, "what's on my schedule"
      // block, RSVP-style sign-ups) so a slow queue doesn't dead-end
      // them with just "cancel" or "skip to AI". /community is the
      // chat/forum surface — wrong tool for "find a scheduled debate".
      '<div class="organized-pivot" style="margin-top:14px;font-size:.78rem;color:var(--text-dim);text-align:center;line-height:1.55">' +
        'Or skip the random match — ' +
        '<a href="/live" style="color:var(--accent);font-weight:600;text-decoration:underline;text-underline-offset:3px;text-decoration-color:rgba(239,68,68,.45)">browse scheduled debates on the live board →</a>' +
      '</div>' +
      // Social-proof ticker. Cycles fake recent pairings every 3s.
      // Real-feeling handles, realistic pair times. Helps the wait
      // feel like an active marketplace rather than dead air.
      '<div class="pairing-ticker" id="pairingTicker" aria-live="polite" style="margin-top:18px;font-size:.74rem;color:var(--text-ghost);text-align:center;min-height:18px;font-variant-numeric:tabular-nums;letter-spacing:.01em;opacity:.85;transition:opacity .35s ease"></div>' +
      '<div class="queue-stats" id="queueStats">' + renderWaitlist([], formatParam) + '</div>' +
      // Live diagnostic line. Always visible during the search (unlike
      // queueStats, which gets replaced by the broaden CTA at 45s).
      // Shows: peer count from the last query, my uid tail (so two
      // test windows confirm they're on different accounts), and the
      // last spar-pair attempt outcome (success/soft-fail reason).
      '<div class="diag" id="diagLine" aria-live="polite" style="margin-top:10px;font-size:.66rem;color:var(--text-ghost);text-align:center;font-variant-numeric:tabular-nums;letter-spacing:.04em;text-transform:uppercase;opacity:.7"></div>' +
      '<div class="foot">Your camera + mic stay off until you accept the match. Match found = you both jump into a video room.</div>';
    document.getElementById('cancelBtn').addEventListener('click', cancelQueue);
    startCountdown();
    startStatusCycle();
    startPairingTicker();
    mountGlobe('sparGlobe');
  }

  // Drive the status-phase rotation. Reads elapsed time from
  // state.joinedAtMs (same source the countdown uses) so the phase
  // is always in sync with how long the user has been waiting.
  var statusCycleInterval = null;
  function startStatusCycle(){
    if (statusCycleInterval) clearInterval(statusCycleInterval);
    function tick(){
      var elapsed = Math.floor((Date.now() - state.joinedAtMs) / 1000);
      var phase = STATUS_PHASES[0];
      for (var i = 0; i < STATUS_PHASES.length; i++){
        if (elapsed < STATUS_PHASES[i].until){ phase = STATUS_PHASES[i]; break; }
      }
      var main = document.getElementById('statusMain');
      var sub = document.getElementById('statusSub');
      if (main && main.textContent !== phase.text) main.textContent = phase.text;
      if (sub && sub.textContent !== phase.sub) sub.textContent = phase.sub;
    }
    tick();
    statusCycleInterval = setInterval(tick, 1500);
  }

  // Cycle the fake recent-pairings ticker. Picks a random entry every
  // 3 seconds with a brief opacity fade so the swap doesn't read as
  // a layout shift. Stops cleanly when the host element disappears.
  var pairingTickerInterval = null;
  var lastPairingIdx = -1;
  function startPairingTicker(){
    if (pairingTickerInterval) clearInterval(pairingTickerInterval);
    function tick(){
      var host = document.getElementById('pairingTicker');
      if (!host){ clearInterval(pairingTickerInterval); pairingTickerInterval = null; return; }
      var nextIdx;
      do { nextIdx = Math.floor(Math.random() * RECENT_PAIRINGS.length); } while (nextIdx === lastPairingIdx);
      lastPairingIdx = nextIdx;
      var p = RECENT_PAIRINGS[nextIdx];
      host.style.opacity = '0';
      setTimeout(function(){
        host.textContent = 'Recent pairing · @' + p.a + ' ↔ @' + p.b + ' · paired in ' + p.sec + 's';
        host.style.opacity = '.85';
      }, 280);
    }
    tick();
    pairingTickerInterval = setInterval(tick, 3000);
  }

  // Mount the globe once world-globe.js has loaded. Keeps a handle
  // so we can stop it on re-render to avoid orphan rAF loops.
  var globeHandle = null;
  function mountGlobe(canvasId){
    if (globeHandle && globeHandle.stop) { try { globeHandle.stop(); } catch(e){} }
    globeHandle = null;
    function tryMount(retries){
      if (!window.DebateGlobe) {
        if (retries > 0) return setTimeout(function(){ tryMount(retries - 1); }, 60);
        return;
      }
      var c = document.getElementById(canvasId);
      if (!c) return;
      globeHandle = window.DebateGlobe.mount(c, {
        palette: 'accent',
        rotateDegPerSec: 5,
        showArcs: true,
        showScanSweep: true,
        // Skip the opaque dark sphere body. The disc becomes a soft
        // red glow defined by .globe-frame's radial-gradient + box-shadow
        // + the canvas rim glow + pins. Reads sexy on light AND dark
        // themes; the old black disc looked demonic on /light/.
        transparent: true,
      });
    }
    tryMount(40);
  }

  // ── Render: matched! ─────────────────────────────────
  function renderMatched(roomName, peerName){
    var orb = document.getElementById('orbWrap');
    if (orb) orb.classList.add('matched');
    shell.innerHTML =
      '<div class="eyebrow" style="background:rgba(34,197,94,.10);border-color:rgba(34,197,94,.4);color:#4ade80"><span class="pip" style="background:#22c55e;box-shadow:0 0 8px #22c55e"></span>Match found</div>' +
      '<h1>You\'re paired with <em>' + escHtml(peerName || 'a debater') + '</em>.</h1>' +
      '<p class="lede">Joining the round room now. Camera + mic prompt in a sec; accept and you\'re live.</p>' +
      '<div class="orb-wrap matched" id="orbWrap"><div class="orb-glow"></div><div class="orb-ring"></div><div class="orb-core"></div></div>' +
      '<div class="status">Loading round…</div>';
    try { gtag('event', 'spar_match_found', { format: formatParam }); } catch(e){}
  }

  // ── Render: AI fallback fired ────────────────────────
  function renderFallback(){
    shell.innerHTML =
      '<div class="eyebrow" style="background:rgba(245,158,11,.10);border-color:rgba(245,158,11,.4);color:#fbbf24"><span class="pip" style="background:#f59e0b;box-shadow:0 0 8px #f59e0b"></span>AI Fallback</div>' +
      '<h1>No human in 60s. <em>Spinning up the AI</em>.</h1>' +
      '<p class="lede">The queue is thin right now. Handing you to the AI sparring partner so you don\'t lose your prep time.</p>' +
      '<div class="orb-wrap"><div class="orb-glow"></div><div class="orb-ring"></div><div class="orb-core"></div></div>' +
      '<div class="status">Loading AI round…</div>';
    try { gtag('event', 'spar_ai_fallback', { format: formatParam }); } catch(e){}
    setTimeout(function(){ location.href = '/debate-ai'; }, 1200);
  }

  // ── Countdown timer ──────────────────────────────────
  function startCountdown(){
    if (state.countdownInterval) clearInterval(state.countdownInterval);
    state.countdownInterval = setInterval(function(){
      var elapsed = Math.floor((Date.now() - state.joinedAtMs) / 1000);
      var remaining = Math.max(0, AI_FALLBACK_SEC - elapsed);
      var num = document.getElementById('countdownNum');
      if (num) num.textContent = String(remaining);
      // Broaden-formats offer at 45s. Surfaces below the cancel/skip
      // buttons; user click flips state + queue doc.
      if (elapsed >= BROADEN_OFFER_SEC && !state.broadenOffered && !state.broaden){
        state.broadenOffered = true;
        offerBroaden();
      }
      if (remaining <= 0){
        clearInterval(state.countdownInterval);
        state.countdownInterval = null;
        triggerAIFallback();
      }
    }, 250);
  }

  function offerBroaden(){
    var stats = document.getElementById('queueStats');
    if (!stats) return;
    stats.innerHTML =
      '<div style="margin-top:14px;padding:14px 16px;background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.32);border-radius:12px;text-align:left;color:var(--text)">' +
        '<div style="font-size:.82rem;font-weight:700;margin-bottom:6px;color:#bfdbfe">Thin queue on ' + escHtml(formatParam.toUpperCase()) + '?</div>' +
        '<div style="font-size:.78rem;color:var(--text-dim);line-height:1.5;margin-bottom:10px">Match across formats instead. We\'ll pair you with any debater who\'s also broadened. Format gets picked on the round itself.</div>' +
        '<button class="btn primary" id="broadenBtn" style="font-size:.78rem;padding:8px 16px">Broaden formats</button>' +
      '</div>';
    var bb = document.getElementById('broadenBtn');
    if (bb) bb.addEventListener('click', function(){
      state.broaden = true;
      if (state.queueDocRef){
        state.queueDocRef.update({ broaden: true }).catch(function(){});
      }
      try { gtag('event', 'spar_broaden_formats', { from: formatParam }); } catch(e){}
      stats.innerHTML = '<div style="margin-top:14px;padding:10px 14px;background:rgba(34,197,94,.06);border:1px solid rgba(34,197,94,.28);border-radius:10px;color:#4ade80;font-size:.78rem;font-weight:600">✓ Broadened. Pairing across formats now.</div>';
      // Force an immediate match attempt with the new criteria.
      tryMatch();
    });
  }

  // ── Queue logic ──────────────────────────────────────
  // matchmaking_queue/{uid}: {
  //   uid, format, status: 'waiting' | 'matched' | 'matched_ai' | 'cancelled',
  //   joinedAt, matchedWith, room
  // }
  // Pairing strategy: real-time onSnapshot listener on the queue +
  // 2s polling fallback + transaction. The listener triggers an
  // immediate match attempt the instant a peer joins the queue; the
  // poll covers any case where the snapshot stream stalls (network
  // blip, Firestore reconnect). Whichever client races the
  // transaction first wins; the loser sees its own doc updated by
  // the winner's transaction and follows the same room link.
  //
  // ──────────────── REQUIRED Firebase config ────────────────
  // 1. Firestore security rules on matchmaking_queue:
  //      match /matchmaking_queue/{uid} {
  //        allow read: if request.auth != null;
  //        allow create, update, delete: if request.auth != null
  //          && (request.auth.uid == uid
  //              || resource.data.matchedWith == request.auth.uid);
  //      }
  //    The matchedWith clause is what lets the WINNING client of a
  //    race transaction also update the LOSING peer's doc to mark it
  //    matched. Without it the transaction succeeds for self and
  //    fails for peer, leaving the loser stuck on "searching."
  //
  // 2. Composite index for the polling query (Firebase Console →
  //    Firestore → Indexes):
  //      collection: matchmaking_queue
  //      fields:     format ASC, status ASC, joinedAt ASC
  //
  // 3. (Optional, for the broaden path) second composite index:
  //      collection: matchmaking_queue
  //      fields:     broaden ASC, status ASC, joinedAt ASC
  //
  // Without (1) clients can't write/read the queue at all. Without
  // (2) the polling + snapshot queries return empty silently and
  // every spar request falls through to the AI fallback at 60s.
  // ──────────────────────────────────────────────────────────
  function joinQueue(){
    if (!state.user || !firebaseDb) return;
    state.cancelled = false;
    state.joinedAtMs = Date.now();
    var ref = firebaseDb.collection('matchmaking_queue').doc(state.user.uid);
    state.queueDocRef = ref;
    var fullName = (state.user.displayName || '').trim();
    var parts = fullName.split(/\s+/).filter(Boolean);
    var shortName = parts.length >= 2
      ? parts[0] + ' ' + parts[parts.length - 1][0].toUpperCase() + '.'
      : (parts[0] || (state.user.email ? state.user.email.split('@')[0] : 'Anonymous'));
    ref.set({
      uid: state.user.uid,
      displayName: shortName,
      photoURL: state.user.photoURL || '',
      format: formatParam,
      status: 'waiting',
      joinedAt: firebase.firestore.FieldValue.serverTimestamp(),
    }).then(function(){
      try { gtag('event', 'spar_queue_join', { format: formatParam }); } catch(e){}
      subscribeMyDoc();
      startMatchPolling();
    }).catch(function(err){
      console.warn('[spar] queue join failed:', err);
      // Pattern-match on the error so the user gets a real next step
      // instead of a raw Firebase error code. Each branch maps to one
      // of the four most-likely failure modes documented above the
      // function: rules misconfig (1), composite-index missing
      // surfacing as a permission error too sometimes, network drop,
      // unknown.
      var raw = (err && (err.message || err.code)) || 'unknown';
      var msg;
      if (/permission|denied|insufficient/i.test(raw)) {
        msg = "Couldn't join the queue (permissions). The Firestore rule for matchmaking_queue likely needs updating to allow signed-in users to write their own doc. Skip to AI for now.";
      } else if (/network|offline|unavailable|failed-precondition/i.test(raw)) {
        msg = "Network problem reaching the queue. Check your connection and try again.";
      } else {
        msg = "Couldn't join the queue: " + raw + ". Skip to AI or refresh.";
      }
      shell.innerHTML += '<div class="error">' + escHtml(msg) + ' <a href="/debate-ai" style="color:inherit;text-decoration:underline">Skip to AI</a>.</div>';
    });
    renderSearching();
  }

  // Listen to my own queue doc — when ANOTHER user's transaction marks
  // me as matched, this fires and I navigate to the round.
  function subscribeMyDoc(){
    if (!state.queueDocRef) return;
    if (state.queueUnsub){ try { state.queueUnsub(); } catch(e){} }
    state.queueUnsub = state.queueDocRef.onSnapshot(function(doc){
      if (!doc.exists) return;
      var d = doc.data();
      if (d.status === 'matched' && d.room && d.matchedWith){
        teardownQueue();
        renderMatched(d.room, d.matchedWithName || 'a debater');
        // Build the live-round URL — we don't know which side we got;
        // the round-room infra will reconcile via posterUid/accepterUid
        // semantics. Pass both UIDs and the format.
        var params = new URLSearchParams({
          motion: '',
          format: formatParam,
          pro: d.proName || shortNameOf(state.user),
          con: d.conName || (d.matchedWithName || 'Opponent'),
          proUid: d.proUid || state.user.uid,
          conUid: d.conUid || d.matchedWith,
          room: d.room,
          source: 'spar',
        });
        setTimeout(function(){ location.href = '/live-round.html?' + params.toString(); }, 900);
      } else if (d.status === 'cancelled'){
        // Distinguish a system cancel from a user cancel. The pair
        // function's stale-peer skip and the reaper sweep both stamp a
        // cancelReason; if WE didn't hit Cancel and the cancel came
        // from one of those, re-join the queue instead of bouncing the
        // user off the page. Without this, a single false stale-skip
        // (e.g. an unresolved serverTimestamp on a fresh peer) ejected
        // a live, waiting debater straight to the homepage.
        var systemCancel = (d.cancelReason === 'stale_peer_skip'
                         || d.cancelReason === 'stale_reaper');
        if (systemCancel && !state.cancelled){
          console.info('[spar] system cancel (' + d.cancelReason + '), re-queueing');
          updateDiag({ last: 're-queue' });
          teardownQueue();
          // Fresh doc on re-join → fresh serverTimestamp → no repeat skip.
          setTimeout(function(){ if (!state.cancelled) joinQueue(); }, 400);
          return;
        }
        teardownQueue();
        location.href = '/';
      }
    }, function(err){
      console.warn('[spar] subscribeMyDoc error', err);
    });
  }
  function shortNameOf(u){
    if (!u) return 'You';
    var fullName = (u.displayName || '').trim();
    var parts = fullName.split(/\s+/).filter(Boolean);
    return parts.length >= 2
      ? parts[0] + ' ' + parts[parts.length - 1][0].toUpperCase() + '.'
      : (parts[0] || 'You');
  }

  // Real-time queue watcher + polling fallback. The snapshot listener
  // fires the moment another peer's queue doc lands in Firestore,
  // making pairing sub-second instead of up-to-2s with polling alone.
  // Polling stays as a fallback for snapshot-stream hiccups (network
  // blip, Firestore reconnect, cold-start latency).
  //
  // Debounce: rapid-fire snapshot events (multiple peers joining at
  // once) coalesce to one tryMatch per ~150ms so we don't pile up
  // transaction attempts.
  function startMatchPolling(){
    if (state.matchPollInterval) clearInterval(state.matchPollInterval);
    state.matchPollInterval = setInterval(tryMatch, 2000);
    setTimeout(tryMatch, 600); // first attempt fast

    if (state.queueWatchUnsub){ try { state.queueWatchUnsub(); } catch(e){} }
    state.queueWatchUnsub = firebaseDb.collection('matchmaking_queue')
      .where('format', '==', formatParam)
      .where('status', '==', 'waiting')
      .limit(8)
      .onSnapshot(function(){
        if (state.matchTriggerPending) return;
        state.matchTriggerPending = true;
        setTimeout(function(){
          state.matchTriggerPending = false;
          tryMatch();
        }, 150);
      }, function(err){
        // Common cause of the snapshot stream erroring: composite
        // index for (format, status) isn't built yet. The polling
        // path uses the same query and will surface the same error
        // through tryMatch's catch — log here for diagnostic clarity.
        console.warn('[spar] queue snapshot stream error (likely missing composite index on format+status+joinedAt):', err);
      });
  }

  function tryMatch(){
    if (state.cancelled || !state.user || !firebaseDb) return;
    var queue = firebaseDb.collection('matchmaking_queue');
    // Two-query strategy. Always query my exact format. If I've
    // broadened, ALSO query for any waiting peer with broaden:true
    // (regardless of format). Merge results; pair with the oldest.
    // The exact-format query wins ties so users who haven't broadened
    // still get same-format matches preferentially.
    var queries = [
      queue.where('format', '==', formatParam).where('status', '==', 'waiting').limit(8).get(),
    ];
    if (state.broaden){
      queries.push(
        queue.where('broaden', '==', true).where('status', '==', 'waiting').limit(8).get()
      );
    }
    Promise.all(queries).then(function(snaps){
      var seen = {};
      var others = [];
      snaps.forEach(function(snap){
        snap.docs.forEach(function(d){
          if (d.id === state.user.uid) return;
          if (seen[d.id]) return;
          seen[d.id] = true;
          others.push(d);
        });
      });
      state.waitingPeers = others.length;
      var stats = document.getElementById('queueStats');
      if (stats && !state.broadenOffered){
        stats.innerHTML = renderWaitlist(others, formatParam);
      }
      updateDiag({ peers: others.length });
      if (others.length === 0) return;
      others.sort(function(a, b){
        var as = (a.data().joinedAt && a.data().joinedAt.seconds) || 0;
        var bs = (b.data().joinedAt && b.data().joinedAt.seconds) || 0;
        return as - bs;
      });
      attemptMatch(others[0].id, others[0].data());
    }).catch(function(err){
      console.warn('[spar] queue query failed', err);
    });
  }

  // 2026-05-18: moved off a client-side Firestore transaction (which
  // silently failed because Firestore rules don't allow user A to
  // write user B's queue doc — the transaction could update self but
  // not the peer, leaving both stuck on "1 other debater in your
  // queue") onto a Netlify function with admin-SDK credentials that
  // updates both docs atomically. The client side just kicks the
  // function and lets subscribeMyDoc's onSnapshot drive navigation.
  //
  // Soft-fail reason codes from spar-pair (keep polling silently):
  //   lost_race        — another transaction beat us to one of the docs
  //   format_mismatch  — peer was on a different format
  //   queue_doc_missing— peer doc got deleted between query and txn
  //   stale_peer       — peer's joinedAt is >3min old (ghost session);
  //                      spar-pair just marked it cancelled, polling
  //                      will sort to a fresher peer next tick
  // Anything else (auth/5xx/network) is a hard fail; we surface it so
  // the user knows pairing is having trouble rather than burning the
  // full 60s clock in silence.
  var PAIR_REQUEST_TIMEOUT_MS = 8000;
  function attemptMatch(peerUid /* peerData unused now */){
    if (state.cancelled || !state.user || !firebaseAuth) return;
    // Guard against re-firing while a pair attempt is in flight —
    // tryMatch polls every 2s and the snapshot listener also pokes
    // it; without this we'd fan out duplicate POSTs.
    if (state.pairInFlight) return;
    state.pairInFlight = true;
    // Self-heal: if the fetch never resolves (network limbo on mobile
    // tethering, function cold-start that hangs), the pairInFlight
    // flag would stick forever and the user would burn the full AI
    // fallback timer with no further pair attempts. Reset after 8s no
    // matter what so polling can try again.
    var timeoutId = setTimeout(function(){
      if (state.pairInFlight){
        state.pairInFlight = false;
        console.warn('[spar] spar-pair request timed out, retrying');
        updateDiag({ last: 'timeout' });
        surfacePairError('timeout');
      }
    }, PAIR_REQUEST_TIMEOUT_MS);
    firebaseAuth.currentUser.getIdToken().then(function(idToken){
      return fetch('/.netlify/functions/spar-pair', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + idToken,
        },
        body: JSON.stringify({
          peerUid: peerUid,
          format: formatParam,
          broaden: !!state.broaden,
        }),
      });
    }).then(function(res){
      return res.json().then(function(j){ return { ok: res.ok, status: res.status, body: j }; });
    }).then(function(r){
      clearTimeout(timeoutId);
      state.pairInFlight = false;
      if (!r.ok || !r.body || !r.body.ok) {
        var reason = r.body && r.body.reason ? r.body.reason : 'http_' + r.status;
        var soft = (reason === 'lost_race' || reason === 'format_mismatch'
                 || reason === 'queue_doc_missing' || reason === 'stale_peer');
        // Soft fails are recoverable — keep polling. Surface them in
        // the diag line so the user can see retries happening instead
        // of staring at a silent countdown. Hard fails still get the
        // banner via surfacePairError.
        updateDiag({ last: reason });
        if (!soft) {
          console.warn('[spar] spar-pair function failed:', reason, r.body);
          surfacePairError(reason);
        } else {
          console.info('[spar] soft retry:', reason);
        }
        return;
      }
      clearPairError();
      updateDiag({ last: 'matched' });
      try { gtag('event', 'spar_match_made', { format: formatParam }); } catch(e){}
      // The snapshot listener on my own doc will fire (the function
      // updated it) and navigate via subscribeMyDoc → /live-round.
    }).catch(function(err){
      clearTimeout(timeoutId);
      state.pairInFlight = false;
      console.warn('[spar] spar-pair fetch failed', err);
      updateDiag({ last: 'network' });
      surfacePairError('network');
    });
  }

  // Diag line state — mutates the small uppercase status under the
  // queue card so the user can see what the matchmaker is doing even
  // when the bigger UI elements get replaced (broaden CTA at 45s).
  // Holds: peer count from the last query, last spar-pair outcome,
  // and the tail of my own uid (debug-only — helps confirm two test
  // windows are on different accounts).
  var diagState = { peers: null, last: null };
  function updateDiag(patch){
    if (patch && typeof patch === 'object'){
      if ('peers' in patch) diagState.peers = patch.peers;
      if ('last' in patch) diagState.last = patch.last;
    }
    var el = document.getElementById('diagLine');
    if (!el) return;
    var uidTail = (state.user && state.user.uid) ? state.user.uid.slice(-6) : '----';
    var parts = [];
    parts.push('Queue: ' + (diagState.peers == null ? '…' : diagState.peers) + ' on ' + formatParam.toUpperCase());
    parts.push('me ' + uidTail);
    if (diagState.last) parts.push('last ' + diagState.last);
    el.textContent = parts.join(' · ');
  }
  // Set the initial line so the user sees the diagnostic immediately,
  // not blank until the first query resolves.
  setTimeout(updateDiag, 50);

  // Render a small banner near the queue stats when pairing
  // hard-fails. Auto-clears on next successful attempt. Without this,
  // a misconfigured auth or function 5xx leaves the user staring at
  // "Scanning the queue" with no feedback until the AI fallback at 60s.
  function surfacePairError(reason){
    var stats = document.getElementById('queueStats');
    if (!stats) return;
    var msg;
    if (reason === 'timeout')      msg = 'Slow response from the matchmaker. Retrying…';
    else if (reason === 'network') msg = 'Network blip reaching the matchmaker. Retrying…';
    else if (/^http_5/.test(reason)) msg = 'Matchmaker hiccup (' + reason + '). Retrying…';
    else if (/^http_4/.test(reason)) msg = 'Auth issue reaching the matchmaker (' + reason + '). Try signing out + in.';
    else                            msg = 'Pairing error (' + reason + '). Retrying…';
    stats.innerHTML = '<div style="padding:10px 14px;background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.32);border-radius:10px;color:#fbbf24;font-size:.78rem;font-weight:600">' + escHtml(msg) + '</div>';
  }
  function clearPairError(){
    // Touched by a successful pair attempt; the matched-state UI takes
    // over the queue stats area within ~900ms via subscribeMyDoc's
    // setTimeout navigation, so we don't bother re-rendering the
    // "N other debaters" text in between.
  }

  function triggerAIFallback(){
    if (state.cancelled) return;
    teardownQueue();
    if (state.queueDocRef){
      state.queueDocRef.update({
        status: 'matched_ai',
        matchedAt: firebase.firestore.FieldValue.serverTimestamp(),
      }).catch(function(){});
    }
    renderFallback();
  }

  function cancelQueue(){
    state.cancelled = true;
    teardownQueue();
    if (state.queueDocRef){
      state.queueDocRef.update({
        status: 'cancelled',
        cancelledAt: firebase.firestore.FieldValue.serverTimestamp(),
      }).catch(function(){});
    }
    try { gtag('event', 'spar_cancel', { format: formatParam }); } catch(e){}
    location.href = '/';
  }

  function teardownQueue(){
    if (state.countdownInterval){ clearInterval(state.countdownInterval); state.countdownInterval = null; }
    if (state.matchPollInterval){ clearInterval(state.matchPollInterval); state.matchPollInterval = null; }
    if (state.queueUnsub){ try { state.queueUnsub(); } catch(e){} state.queueUnsub = null; }
    if (state.queueWatchUnsub){ try { state.queueWatchUnsub(); } catch(e){} state.queueWatchUnsub = null; }
    state.matchTriggerPending = false;
    state.pairInFlight = false;
  }

  // Tab close / nav away — drop our queue doc so we don't ghost.
  window.addEventListener('pagehide', function(){
    if (state.queueDocRef && !state.cancelled){
      state.queueDocRef.delete().catch(function(){});
    }
  });

  // ╭───────────────────────────────────────────────────────╮
  // │  WAITLIST + DMs (left rail)                          │
  // ╰───────────────────────────────────────────────────────╯
  // Two new Firestore collections back this surface:
  //   waitlist_posts/{postId}
  //     { uid, displayName, photoURL, format, note, createdAt }
  //     Listed in the left rail. 24h client-side TTL filter; posts
  //     stay in Firestore until the author deletes them.
  //   dm_threads/{threadId}/messages/{msgId}
  //     threadId = sorted([uidA, uidB]).join('_')
  //     Thread doc: { participants:[uidA,uidB], participantInfo, lastMessage,
  //                   lastMessageAt, lastMessageFrom, unread:{uidA:n,uidB:n} }
  //     Message doc: { fromUid, text, createdAt }
  //
  // REQUIRED Firestore rules — paste into Firebase console alongside
  // the existing matchmaking_queue rule:
  //
  //   match /waitlist_posts/{postId} {
  //     allow read: if request.auth != null;
  //     allow create: if request.auth != null
  //       && request.auth.uid == request.resource.data.uid
  //       && request.resource.data.note is string
  //       && request.resource.data.note.size() <= 240;
  //     allow update, delete: if request.auth != null
  //       && request.auth.uid == resource.data.uid;
  //   }
  //
  //   match /dm_threads/{threadId} {
  //     allow read, create, update: if request.auth != null
  //       && (
  //         (resource == null && request.auth.uid in request.resource.data.participants)
  //         || (resource != null && request.auth.uid in resource.data.participants)
  //       );
  //     match /messages/{msgId} {
  //       allow read: if request.auth != null
  //         && request.auth.uid in
  //           get(/databases/$(database)/documents/dm_threads/$(threadId))
  //             .data.participants;
  //       allow create: if request.auth != null
  //         && request.auth.uid == request.resource.data.fromUid
  //         && request.resource.data.text is string
  //         && request.resource.data.text.size() <= 1000;
  //     }
  //   }
  //
  // REQUIRED composite index (Firebase console → Firestore → Indexes):
  //   collection: dm_threads
  //   fields:     participants ARRAY-CONTAINS, lastMessageAt DESC
  // Without this, the inbox query (used for the unread badge + inbox
  // modal) returns an error with a clickable "create index" link.

  var WL_POST_TTL_MS = 24 * 60 * 60 * 1000; // 24h
  var WL_NOTE_MAX = 240;
  var WL_MSG_MAX = 1000;
  var WL_FORMATS = [
    { v: 'any',    label: 'Any format' },
    { v: 'quick',  label: 'Quick Clash' },
    { v: 'apda',   label: 'APDA' },
    { v: 'bp',     label: 'BP / WUDC' },
    { v: 'worlds', label: 'Worlds (WUDC)' },
    { v: 'asian',  label: 'Asian Parli' },
    { v: 'ld',     label: 'LD' },
    { v: 'pf',     label: 'Public Forum' },
    { v: 'policy', label: 'Policy' },
  ];

  var wl = {
    posts: [],
    postsUnsub: null,
    threads: [],
    threadsUnsub: null,
    unreadThreads: 0,
    activeThreadUnsub: null,
  };

  function relTime(ms){
    var diff = Date.now() - ms;
    if (diff < 60000) return 'just now';
    if (diff < 3600000) return Math.floor(diff/60000) + 'm ago';
    if (diff < 86400000) return Math.floor(diff/3600000) + 'h ago';
    return Math.floor(diff/86400000) + 'd ago';
  }

  function buildWaitlistRail(){
    if (document.getElementById('waitlistRail')) return;
    var rail = document.createElement('aside');
    rail.id = 'waitlistRail';
    rail.className = 'waitlist-rail';
    rail.setAttribute('aria-label', 'Open invites');
    rail.innerHTML =
      '<div class="waitlist-rail__head">' +
        '<div class="waitlist-rail__title"><span class="live-dot"></span>Open invites</div>' +
        '<div style="display:flex;gap:6px;align-items:center">' +
          '<button class="waitlist-rail__inbox" id="wlInboxBtn" type="button" hidden>Inbox<span class="badge" id="wlInboxBadge" hidden>0</span></button>' +
          '<button class="waitlist-rail__close" id="wlCloseBtn" type="button" aria-label="Close">×</button>' +
        '</div>' +
      '</div>' +
      '<div class="waitlist-rail__sub">Debaters looking for a round right now. Post one yourself, or DM someone directly to set up a time.</div>' +
      '<div class="waitlist-rail__post-slot" id="wlPostSlot"></div>' +
      '<div class="waitlist-rail__list" id="wlList">' +
        '<div class="waitlist-rail__empty">Loading…</div>' +
      '</div>';
    document.body.appendChild(rail);

    var fab = document.createElement('button');
    fab.className = 'waitlist-fab';
    fab.id = 'wlFab';
    fab.type = 'button';
    fab.innerHTML = 'Open invites<span class="fab-badge" id="wlFabBadge" hidden>0</span>';
    document.body.appendChild(fab);
    fab.addEventListener('click', function(){
      document.getElementById('waitlistRail').classList.toggle('open');
    });
    document.getElementById('wlCloseBtn').addEventListener('click', function(){
      document.getElementById('waitlistRail').classList.remove('open');
    });
    document.getElementById('wlInboxBtn').addEventListener('click', openInboxModal);
  }

  function renderWaitlistContent(){
    var slot = document.getElementById('wlPostSlot');
    var inboxBtn = document.getElementById('wlInboxBtn');
    if (!slot) return;
    if (state.user){
      slot.innerHTML = '<button class="waitlist-rail__post-btn" id="wlPostBtn" type="button">+ Post an invite</button>';
      document.getElementById('wlPostBtn').addEventListener('click', openPostComposer);
      if (inboxBtn) inboxBtn.hidden = false;
    } else {
      slot.innerHTML =
        '<div class="waitlist-rail__signin-overlay">' +
          'Sign in to post your own invite or DM other debaters.' +
          '<br><button type="button" id="wlSignInLink">Sign in with Google →</button>' +
        '</div>';
      var link = document.getElementById('wlSignInLink');
      if (link) link.addEventListener('click', doGoogleSignIn);
      if (inboxBtn) inboxBtn.hidden = true;
    }
    // Repaint cards so DM buttons reflect new auth state.
    paintWaitlist();
  }

  function startWaitlistFeed(){
    if (!firebaseDb) return;
    if (wl.postsUnsub){ try { wl.postsUnsub(); } catch(e){} }
    wl.postsUnsub = firebaseDb.collection('waitlist_posts')
      .orderBy('createdAt', 'desc')
      .limit(40)
      .onSnapshot(function(snap){
        var now = Date.now();
        var rows = [];
        snap.forEach(function(d){
          var data = d.data() || {};
          var createdMs = (data.createdAt && data.createdAt.toMillis) ? data.createdAt.toMillis() : 0;
          if (createdMs && now - createdMs > WL_POST_TTL_MS) return;
          rows.push({ id: d.id, data: data, createdMs: createdMs || now });
        });
        wl.posts = rows;
        paintWaitlist();
      }, function(err){
        console.warn('[waitlist] feed snapshot error', err);
        var list = document.getElementById('wlList');
        if (list) list.innerHTML = '<div class="waitlist-rail__empty">Couldn\'t load invites. Refresh to retry.</div>';
      });
  }

  function paintWaitlist(){
    var list = document.getElementById('wlList');
    if (!list) return;
    if (!wl.posts.length){
      list.innerHTML = '<div class="waitlist-rail__empty">No open invites right now.' +
        (state.user ? ' Be the first — post yours above.' : ' Sign in to post one.') +
      '</div>';
      return;
    }
    var myUid = state.user && state.user.uid;
    list.innerHTML = wl.posts.map(function(p){
      var d = p.data;
      var name = escHtml(d.displayName || 'Anonymous');
      var format = escHtml((d.format || 'any').toUpperCase());
      var note = escHtml(d.note || '');
      var time = relTime(p.createdMs);
      var avatar = d.photoURL
        ? '<img class="waitlist-card__avatar" src="' + escHtml(d.photoURL) + '" alt="">'
        : '<div class="waitlist-card__avatar" aria-hidden="true"></div>';
      var isMine = (d.uid === myUid);
      var action = isMine
        ? '<button class="waitlist-card__delete" data-postid="' + escHtml(p.id) + '">Remove</button>'
        : '<button class="waitlist-card__dm" ' +
            'data-peer-uid="' + escHtml(d.uid || '') + '" ' +
            'data-peer-name="' + escHtml(d.displayName || '') + '" ' +
            'data-peer-photo="' + escHtml(d.photoURL || '') + '"' +
          '>' + (state.user ? 'DM →' : 'Sign in to DM') + '</button>';
      return '<div class="waitlist-card">' +
        '<div class="waitlist-card__head">' +
          avatar +
          '<div class="waitlist-card__who">' +
            '<div class="waitlist-card__name">' + name + (isMine ? ' <span style="color:var(--accent);font-weight:600">(you)</span>' : '') + '</div>' +
            '<div class="waitlist-card__meta">' + format + ' · ' + time + '</div>' +
          '</div>' +
        '</div>' +
        '<div class="waitlist-card__note">' + note + '</div>' +
        '<div class="waitlist-card__actions">' + action + '</div>' +
      '</div>';
    }).join('');
    Array.prototype.forEach.call(list.querySelectorAll('.waitlist-card__dm'), function(btn){
      btn.addEventListener('click', function(){
        if (!state.user){ doGoogleSignIn(); return; }
        openDMThread(btn.dataset.peerUid, btn.dataset.peerName, btn.dataset.peerPhoto);
      });
    });
    Array.prototype.forEach.call(list.querySelectorAll('.waitlist-card__delete'), function(btn){
      btn.addEventListener('click', function(){
        var pid = btn.dataset.postid;
        if (!pid) return;
        firebaseDb.collection('waitlist_posts').doc(pid).delete().catch(function(e){
          console.warn('[waitlist] delete failed', e);
        });
      });
    });
  }

  function openPostComposer(){
    if (!state.user){ doGoogleSignIn(); return; }
    var preselect = formatParam;
    var optionsHtml = WL_FORMATS.map(function(f){
      return '<option value="' + escHtml(f.v) + '"' + (f.v === preselect ? ' selected' : '') + '>' + escHtml(f.label) + '</option>';
    }).join('');
    openModal('Post an invite',
      '<div class="wl-field">' +
        '<label for="wlComposerFormat">Format</label>' +
        '<select class="wl-select" id="wlComposerFormat">' + optionsHtml + '</select>' +
      '</div>' +
      '<div class="wl-field">' +
        '<label for="wlComposerNote">What do you want to debate?</label>' +
        '<textarea class="wl-textarea" id="wlComposerNote" maxlength="' + WL_NOTE_MAX + '" placeholder="Looking for an APDA round tonight 8pm EST. Open on motion, neutral side."></textarea>' +
        '<div class="wl-count"><span id="wlComposerCount">0</span>/' + WL_NOTE_MAX + '</div>' +
      '</div>' +
      '<div class="wl-modal__error" id="wlComposerError"></div>',
      [
        { label: 'Cancel', kind: 'ghost', onClick: closeModal },
        { label: 'Post invite', kind: 'primary', id: 'wlComposerSubmit', onClick: submitPost },
      ]
    );
    var ta = document.getElementById('wlComposerNote');
    var count = document.getElementById('wlComposerCount');
    ta.addEventListener('input', function(){ count.textContent = String(ta.value.length); });
    setTimeout(function(){ ta.focus(); }, 50);
  }

  function submitPost(){
    if (!state.user || !firebaseDb) return;
    var noteEl = document.getElementById('wlComposerNote');
    var fmtEl = document.getElementById('wlComposerFormat');
    var errEl = document.getElementById('wlComposerError');
    var btn = document.getElementById('wlComposerSubmit');
    if (!noteEl || !fmtEl) return;
    var note = (noteEl.value || '').trim();
    if (!note){ errEl.textContent = 'Add a short note so people know what you want.'; return; }
    if (note.length > WL_NOTE_MAX){ errEl.textContent = 'Note too long (' + note.length + '/' + WL_NOTE_MAX + ').'; return; }
    if (btn) btn.disabled = true;
    errEl.textContent = '';
    firebaseDb.collection('waitlist_posts').add({
      uid: state.user.uid,
      displayName: shortNameOf(state.user),
      photoURL: state.user.photoURL || '',
      format: fmtEl.value,
      note: note,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    }).then(function(){
      try { gtag('event', 'waitlist_post', { format: fmtEl.value }); } catch(e){}
      closeModal();
    }).catch(function(e){
      if (btn) btn.disabled = false;
      errEl.textContent = 'Couldn\'t post: ' + (e.message || e.code || 'unknown');
    });
  }

  function dmThreadId(uidA, uidB){
    return [uidA, uidB].sort().join('_');
  }

  function openDMThread(peerUid, peerName, peerPhoto){
    if (!state.user || !firebaseDb || !peerUid) return;
    if (peerUid === state.user.uid) return;
    var threadId = dmThreadId(state.user.uid, peerUid);
    var titleHtml =
      (peerPhoto
        ? '<img class="wl-modal__avatar" src="' + escHtml(peerPhoto) + '" alt="">'
        : '<div class="wl-modal__avatar"></div>') +
      '<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + escHtml(peerName || 'Debater') + '</span>';
    openModal(titleHtml,
      '<div class="wl-thread" id="wlThread"><div class="wl-msg__empty">Loading messages…</div></div>',
      [
        { html: '<input class="wl-input wl-send-input" id="wlSendInput" placeholder="Set a time, propose a motion, etc." maxlength="' + WL_MSG_MAX + '">' },
        { label: 'Send', kind: 'primary', id: 'wlSendBtn', onClick: function(){ sendDMMessage(threadId, peerUid, peerName, peerPhoto); } },
      ]
    );
    if (wl.activeThreadUnsub){ try { wl.activeThreadUnsub(); } catch(e){} }
    wl.activeThreadUnsub = firebaseDb
      .collection('dm_threads').doc(threadId).collection('messages')
      .orderBy('createdAt', 'asc').limitToLast(200)
      .onSnapshot(function(snap){
        paintDMThread(snap);
      }, function(err){
        console.warn('[dm] thread snapshot error', err);
        var t = document.getElementById('wlThread');
        if (t) t.innerHTML = '<div class="wl-msg__empty">No messages yet.<br>Send one to start the thread.</div>';
      });
    markThreadRead(threadId).catch(function(){});
    setTimeout(function(){
      var input = document.getElementById('wlSendInput');
      if (input){
        input.focus();
        input.addEventListener('keydown', function(e){
          if (e.key === 'Enter' && !e.shiftKey){
            e.preventDefault();
            sendDMMessage(threadId, peerUid, peerName, peerPhoto);
          }
        });
      }
    }, 50);
  }

  function paintDMThread(snap){
    var t = document.getElementById('wlThread');
    if (!t) return;
    if (snap.empty){
      t.innerHTML = '<div class="wl-msg__empty">No messages yet.<br>Say hi and set up a round.</div>';
      return;
    }
    var myUid = state.user.uid;
    t.innerHTML = '';
    snap.forEach(function(d){
      var m = d.data();
      var mine = (m.fromUid === myUid);
      var when = m.createdAt && m.createdAt.toMillis ? relTime(m.createdAt.toMillis()) : '';
      var div = document.createElement('div');
      div.className = 'wl-msg ' + (mine ? 'mine' : 'theirs');
      div.innerHTML = escHtml(m.text || '') + (when ? '<div class="wl-msg__time">' + escHtml(when) + '</div>' : '');
      t.appendChild(div);
    });
    t.scrollTop = t.scrollHeight;
  }

  function sendDMMessage(threadId, peerUid, peerName, peerPhoto){
    var input = document.getElementById('wlSendInput');
    var sendBtn = document.getElementById('wlSendBtn');
    if (!input || !state.user) return;
    var text = (input.value || '').trim();
    if (!text) return;
    if (text.length > WL_MSG_MAX) text = text.slice(0, WL_MSG_MAX);
    if (sendBtn) sendBtn.disabled = true;
    var threadRef = firebaseDb.collection('dm_threads').doc(threadId);
    var msgsRef = threadRef.collection('messages');
    var preview = text.length > 80 ? text.slice(0, 77) + '…' : text;
    var participantInfo = {};
    participantInfo[state.user.uid] = { name: shortNameOf(state.user), photo: state.user.photoURL || '' };
    participantInfo[peerUid] = { name: peerName || 'Debater', photo: peerPhoto || '' };
    var unread = {};
    unread[state.user.uid] = 0;
    unread[peerUid] = firebase.firestore.FieldValue.increment(1);
    threadRef.set({
      participants: [state.user.uid, peerUid],
      participantInfo: participantInfo,
      lastMessage: preview,
      lastMessageAt: firebase.firestore.FieldValue.serverTimestamp(),
      lastMessageFrom: state.user.uid,
      unread: unread,
    }, { merge: true }).then(function(){
      return msgsRef.add({
        fromUid: state.user.uid,
        text: text,
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      });
    }).then(function(){
      input.value = '';
      if (sendBtn) sendBtn.disabled = false;
      input.focus();
      try { gtag('event', 'dm_send', {}); } catch(e){}
    }).catch(function(e){
      if (sendBtn) sendBtn.disabled = false;
      console.warn('[dm] send failed', e);
    });
  }

  function markThreadRead(threadId){
    if (!state.user) return Promise.resolve();
    var update = {};
    update['unread.' + state.user.uid] = 0;
    return firebaseDb.collection('dm_threads').doc(threadId).update(update);
  }

  function startInboxFeed(){
    if (!firebaseDb || !state.user) return;
    if (wl.threadsUnsub){ try { wl.threadsUnsub(); } catch(e){} }
    wl.threadsUnsub = firebaseDb.collection('dm_threads')
      .where('participants', 'array-contains', state.user.uid)
      .orderBy('lastMessageAt', 'desc')
      .limit(30)
      .onSnapshot(function(snap){
        var rows = [];
        var unreadCount = 0;
        var myUid = state.user.uid;
        snap.forEach(function(d){
          var data = d.data() || {};
          var unread = (data.unread && data.unread[myUid]) || 0;
          if (unread > 0) unreadCount++;
          rows.push({ id: d.id, data: data, unread: unread });
        });
        wl.threads = rows;
        wl.unreadThreads = unreadCount;
        var badge = document.getElementById('wlInboxBadge');
        var fabBadge = document.getElementById('wlFabBadge');
        [badge, fabBadge].forEach(function(b){
          if (!b) return;
          if (unreadCount > 0){ b.hidden = false; b.textContent = String(unreadCount); }
          else b.hidden = true;
        });
        if (document.getElementById('wlInboxList')) paintInboxList();
      }, function(err){
        // Most likely cause: missing composite index on
        // (participants array-contains, lastMessageAt desc). Firestore
        // logs a clickable "create index" link in the console error.
        console.warn('[dm] inbox snapshot error (likely missing index — see comment block above):', err);
      });
  }

  function openInboxModal(){
    if (!state.user){ doGoogleSignIn(); return; }
    openModal('Your messages',
      '<div class="wl-inbox-list" id="wlInboxList"><div class="wl-msg__empty">Loading…</div></div>',
      [{ label: 'Close', kind: 'ghost', onClick: closeModal }]
    );
    paintInboxList();
  }

  function paintInboxList(){
    var list = document.getElementById('wlInboxList');
    if (!list) return;
    if (!wl.threads.length){
      list.innerHTML = '<div class="wl-msg__empty">No messages yet. DM someone from the waitlist to start a thread.</div>';
      return;
    }
    var myUid = state.user.uid;
    list.innerHTML = wl.threads.map(function(t){
      var others = (t.data.participants || []).filter(function(p){ return p !== myUid; });
      var peerUid = others[0] || '';
      var info = (t.data.participantInfo && t.data.participantInfo[peerUid]) || {};
      var name = escHtml(info.name || 'Debater');
      var preview = escHtml(t.data.lastMessage || '');
      var when = t.data.lastMessageAt && t.data.lastMessageAt.toMillis ? relTime(t.data.lastMessageAt.toMillis()) : '';
      var photo = info.photo
        ? '<img class="wl-modal__avatar" src="' + escHtml(info.photo) + '" alt="">'
        : '<div class="wl-modal__avatar"></div>';
      return '<div class="wl-inbox-row' + (t.unread > 0 ? ' unread' : '') + '" ' +
        'data-peer-uid="' + escHtml(peerUid) + '" ' +
        'data-peer-name="' + escHtml(info.name || '') + '" ' +
        'data-peer-photo="' + escHtml(info.photo || '') + '">' +
        photo +
        '<div class="wl-inbox-row__main">' +
          '<div class="wl-inbox-row__name">' + name + '</div>' +
          '<div class="wl-inbox-row__preview">' + preview + '</div>' +
        '</div>' +
        '<div class="wl-inbox-row__time">' + escHtml(when) + '</div>' +
      '</div>';
    }).join('');
    Array.prototype.forEach.call(list.querySelectorAll('.wl-inbox-row'), function(row){
      row.addEventListener('click', function(){
        openDMThread(row.dataset.peerUid, row.dataset.peerName, row.dataset.peerPhoto);
      });
    });
  }

  // Open a DM thread given only the peer's uid (from a ?dm= deep link).
  // Fetches the thread doc to recover the peer's display name + photo
  // from participantInfo; falls back to a generic label if the thread
  // doesn't exist yet or the read fails.
  function openDmFromUid(peerUid){
    if (!firebaseDb || !state.user || !peerUid) return;
    var threadId = dmThreadId(state.user.uid, peerUid);
    firebaseDb.collection('dm_threads').doc(threadId).get().then(function(doc){
      var info = {};
      if (doc.exists){
        var d = doc.data() || {};
        info = (d.participantInfo && d.participantInfo[peerUid]) || {};
      }
      openDMThread(peerUid, info.name || 'Debater', info.photo || '');
    }).catch(function(){
      openDMThread(peerUid, 'Debater', '');
    });
  }

  // Calm center state for inbox deep-links: the user arrived to read a
  // DM, so we show their messages + an explicit opt-in to matchmaking
  // rather than auto-queueing them into a live round.
  function renderInboxLanding(){
    shell.innerHTML =
      '<div class="gate">' +
        '<div class="eyebrow"><span class="pip"></span>Sparring · Messages</div>' +
        '<h2>Your messages</h2>' +
        '<p>Pick up where you left off, or jump back into the matchmaking queue when you\'re ready to spar.</p>' +
        '<button class="gate-google" id="inboxOpenBtn" type="button" style="margin-top:6px">Open inbox</button>' +
        '<button class="ai-alt" id="inboxQueueBtn" type="button" style="background:none;border:none;cursor:pointer;font-family:inherit">Or find a sparring partner now →</button>' +
      '</div>';
    var openBtn = document.getElementById('inboxOpenBtn');
    if (openBtn) openBtn.addEventListener('click', openInboxModal);
    var queueBtn = document.getElementById('inboxQueueBtn');
    if (queueBtn) queueBtn.addEventListener('click', function(){
      // Strip ?dm so a refresh / re-auth doesn't bounce back to inbox.
      try { history.replaceState(null, '', '/spar' + (formatParam ? ('?format=' + encodeURIComponent(formatParam)) : '')); } catch(e){}
      joinQueue();
    });
  }

  // Generic modal helpers ────────────────────────────────
  function openModal(titleHtml, bodyHtml, footButtons){
    closeModal();
    var backdrop = document.createElement('div');
    backdrop.className = 'wl-modal-backdrop';
    backdrop.id = 'wlModalBackdrop';
    var footHtml = (footButtons || []).map(function(b, i){
      if (b.html) return b.html;
      var cls = b.kind === 'primary' ? 'wl-btn primary' : 'wl-btn ghost';
      var idAttr = b.id ? ' id="' + b.id + '"' : ' data-foot-idx="' + i + '"';
      return '<button class="' + cls + '"' + idAttr + ' type="button">' + escHtml(b.label) + '</button>';
    }).join('');
    backdrop.innerHTML =
      '<div class="wl-modal" role="dialog" aria-modal="true">' +
        '<div class="wl-modal__head">' +
          '<div class="wl-modal__title">' + titleHtml + '</div>' +
          '<button class="wl-modal__close" id="wlModalClose" aria-label="Close">×</button>' +
        '</div>' +
        '<div class="wl-modal__body">' + bodyHtml + '</div>' +
        (footButtons && footButtons.length ? '<div class="wl-modal__foot">' + footHtml + '</div>' : '') +
      '</div>';
    document.body.appendChild(backdrop);
    document.getElementById('wlModalClose').addEventListener('click', closeModal);
    backdrop.addEventListener('click', function(e){
      if (e.target === backdrop) closeModal();
    });
    (footButtons || []).forEach(function(b, i){
      if (!b.onClick) return;
      var el = b.id ? document.getElementById(b.id) : backdrop.querySelector('[data-foot-idx="' + i + '"]');
      if (el) el.addEventListener('click', b.onClick);
    });
    document.addEventListener('keydown', wlEscClose);
  }
  function wlEscClose(e){ if (e.key === 'Escape') closeModal(); }
  function closeModal(){
    var b = document.getElementById('wlModalBackdrop');
    if (b) b.remove();
    document.removeEventListener('keydown', wlEscClose);
    if (wl.activeThreadUnsub){ try { wl.activeThreadUnsub(); } catch(e){} wl.activeThreadUnsub = null; }
  }

  // ── Boot ─────────────────────────────────────────────
  // Sidebar mounts immediately. Posts feed is public-read so we can
  // populate it before auth resolves; renderWaitlistContent swaps the
  // post-button / sign-in-overlay slot when the auth state lands.
  buildWaitlistRail();
  renderWaitlistContent();
  if (firebaseDb) startWaitlistFeed();

  if (firebaseAuth){
    firebaseAuth.onAuthStateChanged(function(user){
      state.user = user || null;
      renderWaitlistContent();
      if (user){
        startInboxFeed();
        // Deep link from a DM notification (topbar bell / toast / OS
        // notification → /spar?dm=<peerUid>). Open that thread instead
        // of dumping the user straight into the matchmaking queue —
        // they came to read a message, not to start a live round.
        var dmPeer = qs.get('dm');
        if (dmPeer && dmPeer !== user.uid){
          renderInboxLanding();
          openDmFromUid(dmPeer);
        } else {
          joinQueue();
        }
      } else {
        if (wl.threadsUnsub){ try { wl.threadsUnsub(); } catch(e){} wl.threadsUnsub = null; }
        wl.threads = []; wl.unreadThreads = 0;
        var badge = document.getElementById('wlInboxBadge');
        if (badge) badge.hidden = true;
        var fabBadge = document.getElementById('wlFabBadge');
        if (fabBadge) fabBadge.hidden = true;
        renderGate();
      }
    });
  } else {
    renderGate();
  }
})();
</script>

<script defer src="/js/signup-nudge.js"></script>
</body>
