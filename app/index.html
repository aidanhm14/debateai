    { key:'govguide', icon:'\u{1F451}', title:'Playing Government', render: () => [
      el('p',{key:0},"As Government, you wrote the case and you control the framing. Here's how each speech works:"),
      el('p',{key:1},"During POCs, answer questions about your case. You don't have to commit to everything. You can say \"that's up for debate.\" But be careful: everything Gov says in POCs is considered true for the round. Don't accidentally caveat yourself into a corner, and don't give Opp material you weren't planning to defend."),
      el('p',{key:2},"The PMC is where you read the case you've prepared: framework, background, and 2 to 3 arguments with warrants. The MG is your chance to extend. Respond to everything the LO said because this is your only chance. Start with Off-Case (responding to Opp's constructive arguments), then go On-Case (defending against their attacks on your arguments). You can add new material in the form of overviews, but focus on responding."),
      el('p',{key:3},'The PMR is the final word. Summarize your case in the most favorable light. Weigh your arguments: "Even if you buy their argument about X, our impact on Y outweighs because..." Pull through any arguments Opp never responded to \u2014 these are free wins. No new arguments or responses allowed, but new weighing and examples are fair game.'),
      el('div',{key:4,className:'newbie-callout'}, "Write a Tight Block for every case. This is a pre-written document of responses to the best opposition arguments you can anticipate. Read it fast at the start of MG if Opp calls your case tight, then spend the rest of the speech on substantive debate."),
    ]},
    { key:'oppguide', icon:'\u2694\uFE0F', title:'Playing Opposition', render: () => [
      el('p',{key:0},"As Opposition, your case is prepared live during POCs and the PMC. Listen carefully and write everything down."),
      el('p',{key:1},"The LOC has two jobs: present your side's constructive arguments (Off-Case) and rebut Government's arguments (On-Case). Off-Case usually comes first and takes 5 to 7 minutes. Then attack the Government's arguments."),
      el('p',{key:2},"The MO responds to Government's attacks on Off-Case, rebuts everything from the MG, and addresses anything the LO didn't cover from the PMC. Add new material and analysis \u2014 don't just reference what the LO said. Respond to everything from Gov's case, because this is your last chance."),
      el('p',{key:3},'The LOR comes right after the MO. Summarize your case in the best light, give the judge clear reasons to vote Opp ("ballots"), and weigh aggressively. No new arguments or responses, but new weighing and examples are allowed.'),
      el('p',{key:'types'},"There are a few ways to Opp a case. Most commonly you'll straight opp, meaning you just argue the other side. You can also run a counter-case (propose a mutually exclusive alternative with equal fiat power). If the case is structurally impossible to beat, you can call it tight. But don't tight call just because you can't think of arguments. Tight call because you've thought of the arguments and they genuinely can't win."),
    ]},
    { key:'cases', icon:'\u{1F4DD}', title:'How to Write a Case', render: () => [
      el('p',{key:'intro'},"Case writing is a process, not a one-shot task. Here's the step-by-step that real APDA debaters follow, from blank page to tournament-ready case."),
      el('p',{key:0,style:{fontWeight:600,color:'#e0e7ef'}},"Step 1: Start with what you know and care about."),
      el('p',{key:'0a'},"Think of subjects that excite you: economics, philosophy, history, pop culture, technology, a conversation you had last week, something from class. It is easier to write about something you already know or want to explore, because you'll potentially be speaking about it for an entire round and hopefully tournaments to come. Brainstorm broadly first, then narrow."),
      el('p',{key:1,style:{fontWeight:600,color:'#e0e7ef'}},"Step 2: Research outside your head."),
      el('p',{key:'1a'},"Google \"debate topics\" or \"pros and cons of X.\" Flip through your textbook. Read a news article. Look up old APDA case lists and posted APDA videos. Talk to your partner, your varsity, or a friend. You're not looking for a word-for-word case statement. You're looking for a spark that you can shape into something debatable."),
      el('p',{key:2,style:{fontWeight:600,color:'#e0e7ef'}},"Step 3: Get background and test your case statement."),
      el('p',{key:'2a'},"Do a deeper dive on your topic. Learn the facts, the key players, the history. Everything you learn here goes into presenting case statement in round. Then stress test: Is it already status quo (already true)? Is it tight (impossible to oppose)? Does it need a trigger warning? Is the time-space clear? If any of these are red flags, go back to step one."),
      el('div',{key:3,className:'newbie-callout'}, el('span',null, el('strong',null,'Types of motions: '), 'THBT (This House Believes That) = normative claim, no fiat. THW (This House Would) = policy, you have fiat. THW as [actor] = argue from that actor\'s perspective. THS/O (Supports/Opposes) = neutral observer, good or bad for the world. THR (Regrets) = argue the counterfactual would have been better. THP (Prefers) = compare two worlds.')),
      el('p',{key:4,style:{fontWeight:600,color:'#e0e7ef'}},"Step 4: Build the skeleton. Three independent points."),
      el('p',{key:'4a'},"Jot down everything you want to say that supports your case statement. Then organize it into 2 to 3 distinct arguments. Each should be independent, meaning if opp beats one, the others still stand. Don't worry about full warrants yet. Just get the structure."),
      el('p',{key:5,style:{fontWeight:600,color:'#e0e7ef'}},"Step 5: Add depth. Claims, warrants, and impacts."),
      el('p',{key:'5a'},"Each point needs a claim (what you're arguing), warrants (why it's true, with specific reasoning), and an impact (what happens if the claim is true, and why it matters). You can pre-empt the opposition within your arguments. Decide which points carry the most weight for your collapse in PMR."),
      el('p',{key:6,style:{fontWeight:600,color:'#e0e7ef'}},"Step 6: Collaborate. Two heads are better than one."),
      el('p',{key:'6a'},"Work with your partner, your varsity, or a friend. Read them your case and listen to their reactions. They'll catch holes you missed. If your partner points out that addictive substances have inelastic demand and your case depends on price deterrence, now you know to scope your case differently. This back and forth is where cases get sharp."),
      el('p',{key:7,style:{fontWeight:600,color:'#e0e7ef'}},"Step 7: Write the tight block and plan your collapse."),
      el('p',{key:'7a'},"Think of 3 to 5 arguments opp will make and write your responses. This becomes your tight block for MG. Then plan your collapse: the single strongest argument or world-comparison that PMR will use to close the round. A good collapse often looks like \"in any version of this round, our impact still outweighs.\""),
      el('div',{key:'7b',className:'newbie-callout'}, el('span',null, el('strong',null,'Save your case in multiple places. '), 'Tournament wifi is unreliable and technology fails. Google Docs, a backup on your phone, and a printed copy if possible. You don\'t want to lose all that work.')),
    ]},
    { key:'jargon', icon:'\u{1F4AC}', title:'Core Jargon Decoded', render: () => [
      el('div',{key:0,className:'newbie-term'}, el('span',{className:'term-word'},'Framework'), el('span',{className:'term-def'},'The evaluative lens for the round. "Judge, here\'s HOW to decide who wins." Example: "Prioritize the most vulnerable stakeholders" or "evaluate based on which side produces more liberty."')),
      el('div',{key:1,className:'newbie-term'}, el('span',{className:'term-word'},'Warrant'), el('span',{className:'term-def'},'The reasoning behind a claim. "X is true BECAUSE Y, which leads to Z." The single most important concept in debate. Assertions without warrants don\'t count.')),
      el('div',{key:2,className:'newbie-term'}, el('span',{className:'term-word'},'Impact'), el('span',{className:'term-def'},'The "so what." Why does your argument matter? Impacts should be specific, measurable, and connected to human stakes.')),
      el('div',{key:3,className:'newbie-term'}, el('span',{className:'term-word'},'Weighing'), el('span',{className:'term-def'},'Comparing impacts across sides. "Even if you buy their X, our Y outweighs because it affects more people, is less reversible, and is more probable."')),
      el('div',{key:4,className:'newbie-term'}, el('span',{className:'term-word'},'Turn'), el('span',{className:'term-def'},'Taking an opponent\'s argument and showing it supports YOUR side. The most devastating move in debate.')),
      el('div',{key:5,className:'newbie-term'}, el('span',{className:'term-word'},'Drop'), el('span',{className:'term-def'},'When a team fails to respond to an argument. Treated as conceded. If you don\'t contest it, you agree with it.')),
      el('div',{key:6,className:'newbie-term'}, el('span',{className:'term-word'},'Link Chain'), el('span',{className:'term-def'},'Claim, then Warrant, then Impact. Example: "Private education exists, which creates segregated systems, which entrenches inequality across generations."')),
      el('div',{key:7,className:'newbie-term'}, el('span',{className:'term-word'},'Flow'), el('span',{className:'term-def'},'Notes the judge takes during the round, tracking arguments and responses across speeches. Also what debaters write during the round.')),
      el('div',{key:8,className:'newbie-term'}, el('span',{className:'term-word'},'Tight Block'), el('span',{className:'term-def'},'Pre-written responses to anticipated Opp arguments. Your defensive playbook, read at the start of MG.')),
      el('div',{key:9,className:'newbie-term'}, el('span',{className:'term-word'},'A2 (Answer To)'), el('span',{className:'term-def'},'Pre-prepared responses formatted as "A2: [their likely argument]" followed by your rebuttal.')),
      el('div',{key:10,className:'newbie-term'}, el('span',{className:'term-word'},'POC / POI / POO'), el('span',{className:'term-def'},'Point of Clarification (questions before round), Point of Information (interjection during speeches), Point of Order (claim that rebuttal has new arguments).')),
      el('div',{key:11,className:'newbie-term'}, el('span',{className:'term-word'},'RFD'), el('span',{className:'term-def'},'Reason for Decision. The judge\'s explanation of why they voted the way they did.')),
    ]},
    { key:'strategy', icon:'\u{1F9E0}', title:'Argument Strategy', render: () => [
      el('p',{key:0},'Your first instincts are often right, so go with them. Obvious arguments are often good and easy to make. Ask yourself: What is this motion trying to get at? Is there a problem the policy is attempting to solve? Who are the actors and what are their incentives? What does the other side look like?'),
      el('p',{key:1},'Think about the case on multiple levels: individual, community, demographic groups, local government, national government, international. Also think thematically \u2014 what norms does this set? What precedent does it create?'),
      el('p',{key:2},'Every argument should have a claim (what am I saying?), a warrant (why is this true?), an impact (what does this mean?), and weighing (why do you care?). Your goal is to make it easy for the judge to follow your logic to its conclusion.'),
      el('p',{key:3},"Weigh, weigh, and weigh some more. Make sure you've explained what makes your arguments important and why they're more important than the other side's. The most important argument is the one you're winning. Don't spend time resolving a clash you're losing when you can explain why the clash you're winning matters more."),
      el('div',{key:4,className:'newbie-callout'}, el('span',null, el('strong',null,'The hierarchy of winning: '), 'Frameworks (how to evaluate?) then Burdens (what must each side prove?) then Weighing (whose arguments matter more?) then Arguments (what will happen?) then Warrants (why will it happen?). Win at the highest level you can.')),
      el('p',{key:5},'Layer your responses. Beat the case at a high level, then beat the individual arguments, then beat the warrants. If the judge doesn\'t buy your response A, you still have responses B and C. But note: one good reason beats two or three bad reasons. Only add responses that actually help.'),
      el('p',{key:6},'Use "even if" generously. "Even if they win this argument, we still win because..." This shows the judge you can win even in the worst-case scenario. Take the other team at their best and beat them anyway.'),
    ]},
    { key:'nib', icon:'\u2696\uFE0F', title:'Necessary but Insufficient Burdens (NIB)', render: () => [
      el('p',{key:0},"A Necessary but Insufficient Burden (NIB) is one of the most important and least understood concepts on APDA. Understanding NIBs will immediately make you a more strategic debater and help you recognize when an argument sounds convincing but isn't actually doing the work to win the round."),
      el('p',{key:1,style:{fontWeight:600,color:'#e0e7ef'}},"What is a NIB?"),
      el('p',{key:2},"A necessary but insufficient burden is a condition that MUST be true for a side to win, but that alone is NOT ENOUGH to win. Think of it like a key that opens a door: you need the key to get through, but having the key doesn't mean you should walk through the door. The key is necessary but insufficient."),
      el('p',{key:3,style:{fontWeight:600,color:'#e0e7ef'}},"A concrete example:"),
      el('p',{key:4},"Imagine the motion is \"THW legalize all drugs.\" Government argues that the War on Drugs has failed (mass incarceration, cartels still thrive, etc.). Opp might respond: \"Even if the War on Drugs has failed, that doesn't mean full legalization is the answer. Maybe decriminalization, or targeted reform, or better enforcement would fix the problems without the risks of full legalization.\" What Gov proved (the War on Drugs failed) is a NIB: it's necessary for their case to work (if the current system were fine, there'd be no reason to change), but it's insufficient to prove that their specific proposal is the right fix."),
      el('div',{key:5,className:'newbie-callout'}, el('span',null, el('strong',null,'The NIB test: '), 'Ask yourself: "If this argument is true, does Gov/Opp automatically win?" If the answer is no, if there are still other things they need to prove, then the argument is a NIB. It helps their case but it doesn\'t close the deal.')),
      el('p',{key:6,style:{fontWeight:600,color:'#e0e7ef'}},"How NIBs show up in rounds:"),
      el('p',{key:7},"\"There is a problem\" is almost always a NIB. Proving a problem exists doesn't prove your solution is the right one. \"The status quo is bad\" is a NIB. It doesn't mean the alternative is better. \"X has happened before\" is a NIB. Historical precedent doesn't guarantee future outcomes. \"People care about this\" is a NIB. Caring about something doesn't tell you which direction to go."),
      el('p',{key:8,style:{fontWeight:600,color:'#e0e7ef'}},"How to use NIBs strategically:"),
      el('p',{key:9},"On Gov: Make sure your case doesn't stop at NIBs. If your first argument proves the problem exists, your second argument needs to prove your solution works, and your third needs to prove it's better than alternatives. Don't spend your whole case establishing something that's necessary but not sufficient."),
      el('p',{key:10},"On Opp: Identifying an opponent's argument as a NIB is devastating. You can say: \"Even if everything they said in their first argument is true, they still haven't proven their case. They showed the problem exists. Great. We agree. But they haven't shown that their solution fixes it, or that it doesn't create worse problems.\" This lets you concede ground without losing anything, because you're showing the judge that the ground you conceded doesn't actually matter."),
      el('p',{key:11},"On judging: Judges love when debaters understand NIBs because it shows strategic maturity. A debater who can say \"that's necessary but insufficient for their case\" demonstrates a level of analytical clarity that scores well on speaker points."),
      el('div',{key:12,className:'newbie-callout'}, el('span',null, el('strong',null,'Common NIB traps for new debaters: '), 'Spending 5 minutes of your PMC proving the problem exists, then only 2 minutes on your actual solution. This is called \"proving the NIB\" and it means you\'ve spent most of your speech on something that doesn\'t win you the round by itself. Flip the ratio: establish the problem quickly, then spend your time on why your solution is uniquely good.')),
    ]},
    { key:'theory', icon:'\u2699\uFE0F', title:'Theory Arguments', render: () => [
      el('p',{key:0},"Theory arguments are about the rules and norms of debate itself, not the substance of the motion. When you run theory, you're arguing that the other team has done something structurally unfair that makes the round impossible to win on substance. Theory is a procedural check on bad behavior."),
      el('p',{key:1,style:{fontWeight:600,color:'#e0e7ef'}},"When to run theory:"),
      el('p',{key:2},"The most common theory argument on APDA is a tight call. If Government's case is so narrow that Opposition literally cannot argue the other side, that's a theory issue. Other theory arguments include: the case is truistic (true by definition, so there's nothing to debate), the case shifts (Government changed their position mid-round), the case is a-topical (doesn't actually relate to the motion in a motions round), or the time-space is unfair (set in a context that requires specialized knowledge Opposition couldn't reasonably have)."),
      el('p',{key:3,style:{fontWeight:600,color:'#e0e7ef'}},"How to structure a theory argument:"),
      el('p',{key:4},"Theory has its own framework. You need to prove: (1) an interpretation of what the rules require, (2) a violation showing the other team broke that rule, (3) standards explaining why that rule matters for fair debate, and (4) a voter telling the judge what to do about it (usually vote against the violating team). Keep it clean and structured. Judges get frustrated when theory is messy."),
      el('p',{key:5,style:{fontWeight:600,color:'#e0e7ef'}},"The tight call specifically:"),
      el('p',{key:6},"A case is tight when Opposition has no reasonable ground to argue. The test is not whether Opp finds it hard, but whether a competent debater could construct a meaningful opposition. If you tight call, you need to explain what arguments Opp would make and why the case forecloses all of them. Judges are skeptical of tight calls, so the bar is high. Don't tight call just because you can't think of arguments in the moment."),
      el('div',{key:7,className:'newbie-callout'}, el('span',null, el('strong',null,'Theory is a last resort, not a first option. '), "Judges generally prefer substantive debate. If you can beat the case on substance, do that instead of running theory. Running theory when you have substantive ground looks weak. Save it for when the round genuinely cannot be won on the merits.")),
      el('p',{key:8,style:{fontWeight:600,color:'#e0e7ef'}},"Common theory terms:"),
      el('div',{key:9,className:'newbie-term'}, el('span',{className:'term-word'},'Tight'), el('span',{className:'term-def'},'The case gives Opp no reasonable ground. The most common theory argument on APDA.')),
      el('div',{key:10,className:'newbie-term'}, el('span',{className:'term-word'},'Truism'), el('span',{className:'term-def'},'The case is true by definition. There is nothing to debate because the resolution is self-evidently correct.')),
      el('div',{key:11,className:'newbie-term'}, el('span',{className:'term-word'},'Case Shift / Moving Target'), el('span',{className:'term-def'},'Government changes their position between speeches. What PM said is different from what MG defends.')),
      el('div',{key:12,className:'newbie-term'}, el('span',{className:'term-word'},'Time-Space'), el('span',{className:'term-def'},'The specific context (time period, location, actor) of the case. Unfair if it requires knowledge Opp could not reasonably have.')),
      el('div',{key:13,className:'newbie-term'}, el('span',{className:'term-word'},'Voter'), el('span',{className:'term-def'},'The reason the judge should vote on theory rather than substance. Usually fairness or education.')),
    ]},
    { key:'tight', icon:'\u{1F512}', title:'What Makes a Case Tight', render: () => [
      el('p',{key:0},"Tightness is the most common theory argument on APDA and one of the most misunderstood. A tight case is one where Opposition has no reasonable ground to argue the other side. The key word is reasonable. Every case should be somewhat difficult to oppose. That's the point. Tightness is about whether a competent debater could construct a meaningful opposition, not whether it's easy."),
      el('p',{key:1,style:{fontWeight:600,color:'#e0e7ef'}},"The spectrum of tightness"),
      el('p',{key:2},"Think of tightness as a spectrum, not a binary. On one end: 'THW allow jurors to take notes.' Almost no one would oppose this. That's tight. On the other end: 'THW legalize all drugs.' Plenty of reasonable opposition ground. In the middle is where most debates happen, and where tight calls get contentious."),
      el('p',{key:3,style:{fontWeight:600,color:'#e0e7ef'}},"Red flags that a case might be tight"),
      el('p',{key:4},"The case is empirically settled. If there's overwhelming academic consensus on one side and you're asking Opp to argue against it, that's a problem. Example: 'THB climate change is real.' There's no reasonable opposition."),
      el('p',{key:5},"The case is definitionally true. If the resolution is true by the meaning of the words, it's truistic, which is a specific kind of tightness. Example: 'THB education is valuable.' What would Opp even argue?"),
      el('p',{key:6},"The case forecloses all opposition strategies. A well-written case makes some Opp strategies harder. A tight case makes ALL of them impossible. If you can brainstorm five Opp arguments and the case preemptively eliminates every single one through scoping or caveats, that's a sign."),
      el('p',{key:7},"The caveats do too much work. If your case needs four caveats to be debatable, something is wrong. Caveats should clarify scope, not eliminate opposition ground. If you're caveating away every argument Opp could make, you've written a tight case."),
      el('p',{key:8},"The time-space is too narrow. Setting a case in a hyper-specific context that Opp couldn't reasonably know about can make it tight. 'TH as the 1987 Chilean economic council would have privatized copper mining' requires expertise Opp won't have."),
      el('div',{key:9,className:'newbie-callout',style:{borderLeft:'3px solid #ef4444'}}, el('span',null,
        el('strong',null,'The competent debater test: '), "Ask yourself: could a smart, experienced debater who has never heard this topic before construct a 8:30 LOC with at least two substantive arguments? Not great arguments. Not winning arguments. Just arguments that a reasonable judge would consider responsive. If the answer is genuinely no, the case is tight.",
      )),
      el('p',{key:10,style:{fontWeight:600,color:'#e0e7ef'}},"How to avoid writing tight cases"),
      el('p',{key:11},"Before you finalize a case, do the Opposition exercise. Sit down and try to prep Opp for 10 minutes. Write out the LOC. If you can fill 8:30 with substantive arguments, you're fine. If you're struggling to fill 5 minutes, your case is too tight. Either broaden the motion, remove a caveat, or pick a different topic."),
      el('p',{key:12},"Give Opp access to at least two independent argument categories. If your case only has one axis of opposition (say, 'it costs money'), that's borderline. If Opp can argue costs AND rights AND precedent AND implementation, you've written a fair case."),
      el('p',{key:13},"Test it on your partner or your varsity. If they can't think of Opp arguments either, it's probably tight. If they immediately rattle off three angles, you're good."),
      el('p',{key:14,style:{fontWeight:600,color:'#e0e7ef'}},"How to call a case tight (as Opp)"),
      el('p',{key:15},"A tight call is a theory argument, so it needs structure: interpretation (what makes a case fair), violation (what this case did), standards (why fairness matters), and voter (why the judge should vote on this). The strongest tight calls enumerate the possible Opp arguments and explain why each one fails. Don't just say 'we can't think of anything.' Show the judge you tried and demonstrate why the case structurally forecloses opposition."),
      el('p',{key:16},"Timing matters. If you're going to tight call, commit early in the LOC. Don't spend 6 minutes on substance and then tight call in the last 2 minutes. That looks like you ran out of arguments, not like the case is actually tight. A strong tight call takes 4-5 minutes of the LOC and is the primary strategy."),
      el('div',{key:17,className:'newbie-callout'}, el('span',null, el('strong',null,"The nuclear option: "), "Tight calling is adversarial. You're telling the judge that Gov cheated. Judges are skeptical by default because they've seen hundreds of weak tight calls. The bar is high. Only tight call when you genuinely believe a competent debater couldn't oppose this case. If you have two substantive arguments, run them instead. You'll get more speaker points and probably win more often than with a marginal tight call.")),
    ]},
    { key:'spec', icon:'\u{1F50D}', title:'Specificity Arguments (Spec)', render: () => [
      el('p',{key:0},"Specificity arguments, called spec on APDA, are about whether Government has defined their case clearly enough for a fair debate. Where theory argues the case is structurally unfair, spec argues that Government has been too vague about what they're actually defending."),
      el('p',{key:1,style:{fontWeight:600,color:'#e0e7ef'}},"What spec looks like:"),
      el('p',{key:2},"Government says 'THW legalize marijuana' but doesn't specify: Legal for whom? At what age? Sold where? Taxed how? What about driving under the influence? If Government hasn't specified these things, Opposition might argue that the case is under-specified and that Gov can shift to whatever interpretation is most convenient in MG."),
      el('p',{key:3,style:{fontWeight:600,color:'#e0e7ef'}},"The two sides of spec:"),
      el('p',{key:4},"Opposition runs spec to force Government to commit to specific details that can be attacked. Government responds that reasonable assumptions should be made (the 'reasonable person standard'), that POCs existed for clarification, or that the level of specificity is appropriate for a 7-minute speech. Both sides have legitimate points."),
      el('p',{key:5,style:{fontWeight:600,color:'#e0e7ef'}},"When spec works and when it doesn't:"),
      el('p',{key:6},"Spec is strongest when Government's vagueness gives them an unfair strategic advantage, like being able to shift their position to dodge attacks. It's weakest when Opposition is just asking for unnecessary details that don't affect the core debate. Judges generally expect a reasonable level of specificity but don't require Government to have a 50-page policy brief."),
      el('div',{key:7,className:'newbie-callout'}, el('span',null, el('strong',null,'POCs are your first line of defense. '), "If you think Government's case is vague, ask about it during Points of Clarification BEFORE the round starts. If you had the chance to ask and didn't, judges are less sympathetic to spec arguments later. Use POCs strategically to either get the clarification you need or to set up a spec argument by showing that Gov refused to clarify.")),
      el('p',{key:8,style:{fontWeight:600,color:'#e0e7ef'}},"Spec vs. Theory:"),
      el('p',{key:9},"Spec and theory are related but different. Theory says the case is fundamentally unfair (tight, truistic, etc.). Spec says the case might be fair but Government hasn't given enough detail for Opposition to engage meaningfully. You can run both, but they're separate arguments with separate standards. Don't conflate them."),
    ]},
    { key:'speaks', icon:'\u{1F399}', title:'Improving Your Speaks', render: () => [
      el('p',{key:0},"Clearer delivery, not just more style, makes it easier for the judge to follow you. Signpost your arguments: \"Our first independent argument is...\", \"There are three warrants...\", \"This is important because...\" Number your points so the judge can flow them cleanly."),
      el('p',{key:1},"Have good flow coverage. Respond to everything at a high level at minimum. You don't need to beat every individual warrant if you've already beaten the claim or the impact, but you should acknowledge it."),
      el('p',{key:2},"Do picture painting. Give concrete examples that characterize how people actually behave. Abstract arguments are harder for judges to weigh than vivid, specific ones."),
      el('p',{key:3},"Say your questions out loud: \"Why is this true? Why does this matter? Why is this relevant?\" This helps you figure out what to say next and sets up what the judge should be thinking. Time yourself. New debaters always run out of time. Practice a 7-minute speech at home until you feel the pacing."),
    ]},
    { key:'advanced', icon:'\u{1F4DA}', title:'Advanced Vocabulary', render: () => [
      el('p',{key:0},'These words describe concepts you already understand intuitively. Once you learn them, you\'ll hear them everywhere: in news, philosophy, everyday arguments. This isn\'t gatekeeping vocabulary. It\'s precision vocabulary.'),
      el('div',{key:1,className:'newbie-term'}, el('span',{className:'term-word'},'Counterfactual'), el('span',{className:'term-def'},'The world where the opposite happened. "What\'s the counterfactual?" = "if we DON\'T do this, what happens instead?"')),
      el('div',{key:2,className:'newbie-term'}, el('span',{className:'term-word'},'Structural'), el('span',{className:'term-def'},'Built into the system, not accidental. Implies individual solutions are insufficient.')),
      el('div',{key:3,className:'newbie-term'}, el('span',{className:'term-word'},'Solvency'), el('span',{className:'term-def'},'Whether the plan actually fixes the problem. "They have no solvency" = mechanism doesn\'t connect to impact.')),
      el('div',{key:4,className:'newbie-term'}, el('span',{className:'term-word'},'Uniqueness'), el('span',{className:'term-def'},'Whether the harm is unique to status quo. If it exists in both worlds, it shouldn\'t count for either side.')),
      el('div',{key:5,className:'newbie-term'}, el('span',{className:'term-word'},'Bright Line'), el('span',{className:'term-def'},'A clear threshold. "Where do you draw the bright line?" challenges vague proposals.')),
      el('div',{key:6,className:'newbie-term'}, el('span',{className:'term-word'},'Externality'), el('span',{className:'term-def'},'A cost or benefit that falls on someone who didn\'t choose to participate. Pollution = negative externality.')),
      el('div',{key:7,className:'newbie-term'}, el('span',{className:'term-word'},'Moral Hazard'), el('span',{className:'term-def'},'When insulating someone from consequences makes them take bigger risks. Bailouts, insurance.')),
      el('div',{key:8,className:'newbie-term'}, el('span',{className:'term-word'},'Substitution Effect'), el('span',{className:'term-def'},'Making one thing harder pushes people to alternatives. Devastates simplistic ban cases.')),
      el('div',{key:9,className:'newbie-term'}, el('span',{className:'term-word'},'Chilling Effect'), el('span',{className:'term-def'},'A rule discourages more behavior than intended because people fear crossing the line.')),
      el('div',{key:10,className:'newbie-term'}, el('span',{className:'term-word'},'Deadweight Loss'), el('span',{className:'term-def'},'Value destroyed and captured by nobody. Prohibition creates deadweight loss through black markets.')),
      el('div',{key:11,className:'newbie-term'}, el('span',{className:'term-word'},'Path Dependent'), el('span',{className:'term-def'},'Where you end up depends on where you started. Early failures compound.')),
      el('div',{key:12,className:'newbie-term'}, el('span',{className:'term-word'},'Epistemic'), el('span',{className:'term-def'},'Related to knowledge. "Epistemic problem" = we can\'t reliably know the thing being claimed.')),
      el('div',{key:13,className:'newbie-term'}, el('span',{className:'term-word'},'Normative'), el('span',{className:'term-def'},'About what SHOULD be, not what IS. Distinguishes values claims from empirical claims.')),
      el('div',{key:14,className:'newbie-term'}, el('span',{className:'term-word'},'Rent-Seeking'), el('span',{className:'term-def'},'Using political power to capture wealth without creating value. Explains why actors resist reform.')),
      el('div',{key:15,className:'newbie-term'}, el('span',{className:'term-word'},'Hegemonic'), el('span',{className:'term-def'},'Dominant in a way that shapes what seems normal. The story everyone accepts without questioning.')),
      el('div',{key:16,className:'newbie-term'}, el('span',{className:'term-word'},'Praxis'), el('span',{className:'term-def'},'Putting theory into action. "What does this look like in praxis?" = how does this work in the real world?')),
    ]},

      el('p',{key:0},"If you hear a term you don't understand, ask. Everyone learned these at some point and there's no shame in asking."),

    ]},
    { key:'theory', icon:'\u{1F4A1}', title:'Debate Theory: How to Think About Arguments', render: () => [
      el('p',{key:'intro'},"Every debate round is secretly a clash between different ways of thinking about what matters. Understanding these frameworks lets you recognize what your opponent is doing and choose the strongest lens for your case."),
      el('p',{key:0,style:{fontWeight:600,color:'#ef4444',fontSize:'1.05rem',marginTop:20}},"Utilitarianism vs Deontology (the big one)"),
      el('p',{key:1},"This is the clash that shows up in 80% of debate rounds. Utilitarianism says: the right action is whatever produces the most good for the most people. Count up the pleasure, subtract the pain, pick the bigger number. Deontology (Kant) says: some actions are right or wrong regardless of consequences. You don't torture one person to save five, because torture is inherently wrong."),
      el('p',{key:2},"In round: If your case has strong quantitative impacts (saves lives, grows economy), frame utilitarian. If your case is about rights, dignity, or principles, frame deontological. The LO will usually try to flip your framework."),
      el('div',{key:'util-v-deon',className:'newbie-callout',style:{borderLeft:'3px solid #ef4444'}}, el('span',null,
        el('strong',null,'The classic debate: '), "Gov runs 'THW ban cigarettes.' Gov goes utilitarian: millions of lives saved, healthcare costs reduced, net pleasure maximized. Opp goes deontological: people have an inherent right to bodily autonomy, the state cannot decide what you put in your body regardless of outcomes. This is the fundamental tension. Learn to recognize which side of it you're on.",
      )),
      el('p',{key:'p-v-p-title',style:{fontWeight:600,color:'#ef4444',fontSize:'1.05rem',marginTop:20}},"Pleasure vs Pain: Understanding Utility"),
      el('p',{key:'p-v-p-1'},"Mill's utilitarianism is more sophisticated than 'more happiness = good.' He distinguishes between higher pleasures (intellectual growth, creative expression, meaningful relationships) and lower pleasures (physical comfort, entertainment, immediate gratification). This matters enormously in debate."),
      el('p',{key:'p-v-p-2'},"When someone argues that a policy 'makes people happy,' ask: what KIND of happiness? A policy that gives everyone Netflix but eliminates universities produces more immediate pleasure but destroys higher pleasures. Mill would oppose it. This distinction lets you argue that some goods are qualitatively better, not just quantitatively more."),
      el('p',{key:'p-v-p-3'},"Bentham, Mill's predecessor, was more straightforward: pleasure is pleasure, pain is pain, just add it up. His 'felicific calculus' weighs intensity, duration, certainty, nearness, fecundity (does it lead to more pleasure?), purity (is it mixed with pain?), and extent (how many people?). In round, this gives you seven specific dimensions to weigh impacts on."),
      el('p',{key:'ve-title',style:{fontWeight:600,color:'#ef4444',fontSize:'1.05rem',marginTop:20}},"Virtue Ethics: Character Over Rules"),
      el('p',{key:'ve-1'},"Aristotle asks: what kind of person does this action make you? A virtuous action is one that a person of good character would do. This is powerful in actor cases ('TH as X would...') because you can argue from the actor's identity and what it means to be excellent at their role."),
      el('p',{key:'ve-2'},"The key concepts: eudaimonia (human flourishing, not just happiness), the golden mean (virtue is between two extremes: courage is between cowardice and recklessness), and practical wisdom (phronesis: knowing the right thing to do in specific situations, not just following rules)."),
      el('p',{key:'ve-3'},"In round: 'A good university would prioritize its students' intellectual growth over its rankings. By cutting liberal arts to fund STEM, this institution acts from a vice of short-sightedness.' Virtue ethics lets you critique not just what was done, but what it says about the actor."),
      el('p',{key:'sc-title',style:{fontWeight:600,color:'#ef4444',fontSize:'1.05rem',marginTop:20}},"Social Contract Theory"),
      el('p',{key:'sc-1'},"Three giants, three different contracts. Hobbes says we give up freedom for security because without government, life is 'nasty, brutish, and short.' The state's job is to prevent chaos, and a strong state is justified because the alternative is worse. Use Hobbes for security arguments and why order matters."),
      el('p',{key:'sc-2'},"Locke says government exists to protect natural rights: life, liberty, and property. When it fails to do this, people have the right to revolt. Use Locke for liberty arguments and limiting government overreach. If a policy violates natural rights, the social contract is broken."),
      el('p',{key:'sc-3'},"Rawls says: design society from behind a 'veil of ignorance' where you don't know if you'll be rich or poor, healthy or sick, majority or minority. Whatever system you'd choose from behind that veil is the just system. His 'difference principle' says inequalities are only okay if they benefit the worst-off. This is devastating in inequality debates."),
      el('p',{key:'cr-title',style:{fontWeight:600,color:'#ef4444',fontSize:'1.05rem',marginTop:20}},"Critical Theory: Power and Structures"),
      el('p',{key:'cr-1'},"Marx argues that economics determines everything else. Cultural norms, legal systems, even what we think of as 'common sense' are shaped by whoever controls the economy. Use Marx when arguing that surface-level reforms fail because they don't address underlying power structures."),
      el('p',{key:'cr-2'},"Foucault says power isn't just top-down (government over people). It operates through discourse, norms, and institutions. What counts as 'normal,' 'healthy,' or 'criminal' reflects power relations. Use Foucault to argue that seemingly neutral institutions (prisons, schools, hospitals) are actually mechanisms of social control."),
      el('p',{key:'cr-3'},"Feminist theory (de Beauvoir, Butler, hooks) examines how gender shapes power. De Beauvoir's 'one is not born, but rather becomes, a woman' argues that gender roles are constructed, not natural. Butler extends this to all identity categories. Use these frameworks when a motion touches on identity, social norms, or who gets to define 'normal.'"),
      el('p',{key:'gr-title',style:{fontWeight:600,color:'#ef4444',fontSize:'1.05rem',marginTop:20}},"Gramsci: Cultural Hegemony and Education"),
      el('p',{key:'gr-1'},"Antonio Gramsci argued that the ruling class maintains power not just through force, but through cultural hegemony: controlling what people think of as normal, natural, and inevitable. Education is central to this. Schools don't just teach facts. They teach you which facts matter, whose history counts, and what 'success' looks like. That's hegemony operating through curriculum."),
      el('p',{key:'gr-2'},"His key concepts for debate: hegemony (dominance through consent, not coercion), the organic intellectual (thinkers who emerge from and serve their community, versus traditional intellectuals who serve existing power), and the war of position (the slow cultural fight to change what society considers common sense, as opposed to a sudden seizure of power)."),
      el('p',{key:'gr-3'},"In round: Gramsci is devastating on education motions. 'THW abolish standardized testing' becomes not just about test accuracy but about who designed the tests, whose knowledge they validate, and how they reproduce class hierarchies while appearing meritocratic. 'THW make university free' becomes about whether education is a tool of liberation or a pipeline that sorts people into roles the economy already decided for them. Any time a motion involves education, media, or cultural institutions, ask: who benefits from the way things are currently taught?"),
      el('div',{key:'gr-4',className:'newbie-callout',style:{borderLeft:'3px solid #ef4444'}}, el('span',null,
        el('strong',null,'Gramsci in practice: '), "When Gov runs a case about education reform, Opp can use Gramsci to argue the reform doesn't go deep enough: you're changing the curriculum but not challenging who writes it. When Opp faces a case defending the status quo in education, Gramsci gives you the language to explain why 'neutral' institutions aren't neutral. Pair him with Freire (Pedagogy of the Oppressed) for an even stronger critical education framework.",
      )),
      el('p',{key:'ex-title',style:{fontWeight:600,color:'#ef4444',fontSize:'1.05rem',marginTop:20}},"Existentialism: Freedom and Responsibility"),
      el('p',{key:'ex-1'},"Sartre says we are 'condemned to be free.' There is no predetermined human nature; we create ourselves through choices. Bad faith is pretending we have no choice ('I had to do it'). Use this in actor cases to argue that an agent always has a choice and must own the consequences."),
      el('p',{key:'ex-2'},"Camus and absurdism: life has no inherent meaning, but we must live as if it does. The absurd hero acknowledges meaninglessness but revolts against it through action. Powerful in existential/philosophical motions about purpose, happiness, and what makes life worth living."),
      el('p',{key:'fw-title',style:{fontWeight:600,color:'#ef4444',fontSize:'1.05rem',marginTop:20}},"How to Win Framework Debates"),
      el('div',{key:'fw-tips',className:'newbie-callout',style:{borderLeft:'3px solid #ef4444'}}, el('span',null,
        el('strong',null,'When to go utilitarian: '), 'Your impacts are large, measurable, and affect many people. You have a clear causal mechanism. Works best for policy debates with concrete outcomes.',
        el('br'),el('br'),

function ErrorToast({ message, onDismiss }) {
  if (!message) return null;
  let title = 'Something went wrong';
  let detail = message;
  if (message.includes('Rate limited')) { title = 'Slow down'; }
  else if (message.includes('Authentication')) { title = 'Auth error'; }
  else if (message.includes('temporarily down')) { title = 'Service unavailable'; }
  else if (message.includes('offline')) { title = 'No connection'; }
  else if (message.includes('Failed to fetch')) { title = 'Connection failed'; detail = 'Could not reach the AI service. Check your internet connection and try again.'; }
  return React.createElement('div', {className:'error-toast', role:'alert', 'aria-live':'assertive'},
    React.createElement('span', {className:'error-toast-icon', 'aria-hidden':'true'}, '\u26A0\uFE0F'),
    React.createElement('div', {className:'error-toast-body'},
      React.createElement('div', {className:'error-toast-title'}, title),
      React.createElement('div', {className:'error-toast-detail'}, detail),
    ),
    React.createElement('button', {className:'error-toast-dismiss', onClick:onDismiss}, '\u2715'),
  );
}

function Forum({ user, onSignIn }) {
  const { t } = React.useContext(I18nContext);
  const el = React.createElement;
  const [posts, setPosts] = useState(() => {
    try { return JSON.parse(localStorage.getItem('debateos_forum') || '[]'); } catch { return []; }
  });
  const [newPost, setNewPost] = useState('');
  const [postType, setPostType] = useState('comment');

  const savePosts = (p) => { setPosts(p); try { localStorage.setItem('debateos_forum', JSON.stringify(p)); } catch {} };

  const submit = () => {
    if (!newPost.trim()) return;
    const post = {
      id: Date.now().toString(),
      author: user ? user.displayName || user.email : 'Anonymous',
      avatar: user ? (user.displayName || 'A').charAt(0).toUpperCase() : 'A',
      type: postType,
      body: newPost.trim(),
      createdAt: new Date().toISOString(),
      likes: 0,
      replies: [],
    };
    savePosts([post, ...posts]);
    setNewPost('');
    // If Firebase is configured, also save to Firestore
    if (firebaseDb && user) {
      firebaseDb.collection('forum_posts').add(post).catch(() => {});
    }
  };

  const likePost = (id) => {
    savePosts(posts.map(p => p.id === id ? {...p, likes: p.likes + 1} : p));
  };

  const deletePost = (id) => {
    savePosts(posts.filter(p => p.id !== id));
  };

  return el('div', {className:'panel'},
    el('div', {style:{marginBottom:20}},
      el('h2', {style:{fontSize:'1.4rem',fontWeight:800,color:'#e4e8f0',marginBottom:4}}, t('forum.title','Community Forum')),
      el('p', {style:{color:'#94a3b8',fontSize:'.92rem'}}, t('forum.desc','Share cases, ideas, and debate tips with the community.')),
    ),

    // Compose
    el('div', {className:'forum-compose'},
      el('textarea', {
        value: newPost, onChange: e => setNewPost(e.target.value),
        placeholder: user ? t('forum.placeholder','Share a case, ask a question, or post an idea...') : t('forum.signInPlaceholder','Sign in to post to the forum...'),
        disabled: !user,
      }),
      el('div', {className:'forum-compose-row'},
        el('div', {style:{display:'flex',gap:6}},
          ['comment','case','idea'].map(t =>
            el('button', {
              key:t, className:'chip'+(postType===t?' active':''),
              onClick:()=>setPostType(t),
              style:{padding:'6px 14px',fontSize:'.78rem'},
            }, t.charAt(0).toUpperCase()+t.slice(1))
          )
        ),
        user
          ? el('button', {className:'btn btn-primary btn-sm', onClick:submit, disabled:!newPost.trim()}, t('forum.post','Post'))
          : el('button', {className:'btn btn-primary btn-sm', onClick:onSignIn}, t('forum.signInToPost','Sign in to post')),
      ),
    ),

    // Posts list
    posts.length === 0
      ? el('div', {className:'forum-empty'},
          el('div', {style:{fontSize:'2rem',marginBottom:12}}, '\uD83D\uDCAC'),
          t('forum.noPostsYet','No posts yet. Be the first to share something!'),
        )
      : posts.map(p =>
          el('div', {key:p.id, className:'forum-post'},
            el('div', {className:'forum-post-header'},
              el('div', {className:'forum-post-author'},
                el('div', {className:'forum-post-author-avatar'}, p.avatar || 'A'),
                el('span', {className:'forum-post-author-name'}, p.author),
                el('span', {className:'forum-post-time'}, new Date(p.createdAt).toLocaleDateString()),
              ),
              el('span', {className:'forum-post-tag ' + p.type}, p.type),
            ),
            el('div', {className:'forum-post-body'}, p.body),
            el('div', {className:'forum-post-actions'},
              el('button', {className:'forum-action', onClick:()=>likePost(p.id)}, '\u2764\uFE0F ', p.likes || 0),
              (user && (p.author === (user.displayName || user.email) || p.author === 'Anonymous')) &&
                el('button', {className:'forum-action', onClick:()=>deletePost(p.id)}, '\uD83D\uDDD1 '+t('forum.delete','Delete')),
            ),
          )
        ),
  );
}

/* ═══════════════════════════════════════════════════
   ROUND SIMULATOR — Full 6-speech debate simulation
   ═══════════════════════════════════════════════════ */

const ROUND_SPEECHES = [
  { code:'PM', title:'Prime Minister Constructive', side:'gov', time:'7:30', player:true, order:0 },
  { code:'LO', title:'Leader of Opposition', side:'opp', time:'8:30', player:false, order:1 },
  { code:'MG', title:'Member of Government', side:'gov', time:'8:30', player:true, order:2 },
  { code:'MO', title:'Member of Opposition', side:'opp', time:'8:30', player:false, order:3 },
  { code:'LOR', title:'Leader of Opp Rebuttal', side:'opp', time:'4 min', player:false, order:4 },
  { code:'PMR', title:'PM Rebuttal', side:'gov', time:'5 min', player:true, order:5 },
];

function RoundSimulator() {
  const el = React.createElement;
  const { t } = React.useContext(I18nContext);
  const [motion, setMotion] = useState('');
  const [side, setSide] = useState('gov');
  const [simFormat, setSimFormat] = useState('APDA');
  const [roundStarted, setRoundStarted] = useState(false);
  const [currentSpeech, setCurrentSpeech] = useState(0);
  const [speeches, setSpeeches] = useState([]);
  const [inputText, setInputText] = useState('');
  const [aiLoading, setAiLoading] = useState(false);
  const [aiStreaming, setAiStreaming] = useState(false);
  const [feedback, setFeedback] = useState(null);
  const [feedbackLoading, setFeedbackLoading] = useState(false);
  const [recording, setRecording] = useState(false);
  const [mediaRec, setMediaRec] = useState(null);
  const [roundComplete, setRoundComplete] = useState(false);
  const [error, setError] = useState(null);
  const [adaptiveProfile, setAdaptiveProfile] = useState(null); // Tracks player weaknesses mid-round
  const [adaptiveMode, setAdaptiveMode] = useState(true); // Toggle adaptive sparring
  const inputRef = useRef(null);
  const streamRef = useRef(null);

  const playerSpeechCodes = side === 'gov'
    ? ['PM','MG','PMR']
    : ['LO','MO','LOR'];

  const isPlayerSpeech = (idx) => {
    const speech = ROUND_SPEECHES[idx];
    return (side === 'gov' && speech.side === 'gov') || (side === 'opp' && speech.side === 'opp');
  };

  // Mic recording with Web Speech API or MediaRecorder
  const startRecording = async () => {
    setError(null);
    // Try Web Speech API first (real-time transcription)
    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
      const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
      const recognition = new SpeechRec();
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.lang = 'en-US';
      let finalTranscript = inputText;
      recognition.onresult = (event) => {
        let interim = '';
        for (let i = event.resultIndex; i < event.results.length; i++) {
          if (event.results[i].isFinal) {
            finalTranscript += event.results[i][0].transcript + ' ';
          } else {
            interim += event.results[i][0].transcript;
          }
        }
        setInputText(finalTranscript + interim);
      };
      recognition.onerror = (e) => {
        if (e.error !== 'no-speech') setError('Mic error: ' + e.error);
        setRecording(false);
      };
      recognition.onend = () => setRecording(false);
      recognition.start();
      setMediaRec(recognition);
      setRecording(true);
    } else {
      setError('Speech recognition not supported in this browser. Try Chrome.');
    }
  };

  const stopRecording = () => {
    if (mediaRec) {
      try { mediaRec.stop(); } catch(e) {}
      setMediaRec(null);
    }
    setRecording(false);
  };

  const startRound = () => {
    if (!motion.trim()) return;
    logBetaEvent('battle', { format: simFormat, side });
    if (typeof gtag === 'function') {
      gtag('event', 'round_start', {
        format: simFormat,
        side,
        motion_length: motion.length,
        feature: 'simulator',
      });
    }
    setRoundStarted(true);
    setCurrentSpeech(0);
    setSpeeches([]);
    setFeedback(null);
    setRoundComplete(false);
    setInputText('');
    setAdaptiveProfile(null);

    // If player is Opp, AI goes first with PM
    if (side === 'opp') {
      generateAISpeech(0, []);
    }
  };

  const buildRoundContext = (speechesSoFar) => {
    let ctx = `MOTION: ${motion}\n\n`;
    ctx += `ROUND SO FAR:\n`;
    speechesSoFar.forEach((s, i) => {
      ctx += `\n--- ${ROUND_SPEECHES[i].code} (${ROUND_SPEECHES[i].title}) ---\n${s}\n`;
    });
    return ctx;
  };

  const generateAISpeech = async (speechIdx, speechesSoFar) => {
    setAiLoading(true);
    setAiStreaming(true);
    setError(null);

    const speech = ROUND_SPEECHES[speechIdx];
    const aiSide = speech.side;
    const isRebuttal = speech.code === 'LOR' || speech.code === 'PMR';

    const sysPrompt = `You are an elite ${simFormat || 'APDA'} debater playing the ${aiSide === 'gov' ? 'Government' : 'Opposition'} side in a live practice round. The debate format is ${simFormat || 'APDA'}. You are giving the ${speech.code} (${speech.title}).

YOU ARE A REAL DEBATER, NOT AN AI. This is the single most important instruction. Your speech must sound like it is being delivered live by a confident, smart college debater who is thinking on their feet. Here is what that means:

VOICE AND DELIVERY:
1. Use first person. Address "the judge" or "my opponents" or "the other side" directly. You are standing at a podium.
2. Your speech should feel SPOKEN, not written. Real debaters use incomplete sentences sometimes. They say "Right?" and "Look," and "Here's the thing." They pause and redirect: "Actually, let me come back to that." They get excited about a good point: "And this is where it gets really interesting." They dismiss bad arguments: "That just doesn't hold up and here's why."
3. Real speeches have RHYTHM. Short punchy sentences for emphasis. Then a longer explanation when you're walking through a warrant. Then back to short and sharp for the impact. Vary your sentence length constantly.
4. Reference your opponents AS people. "My opponent stood up here and told you that X. But they completely skipped the step where they explain Y." Not "The government/opposition argues that..."
5. Show genuine intellectual engagement. If the other side made a clever point, acknowledge it before dismantling it: "Credit where it's due, that's a smart framing. But it falls apart the second you ask..."
6. NEVER use these AI tells: "It is important to note that," "Furthermore," "Additionally," "In conclusion," "Moreover," "It should be noted," "This is significant because." These are essay words, not debate words.
7. Do NOT use em dashes, en dashes, or hyphens as separators. No markdown formatting (no **, no #, no *). Plain text only.

STRUCTURAL RULES FOR THIS SPEECH:
${speech.code === 'PM' ? `As PM: You are setting up the entire round. Deliver framework first (2-3 framing points with warrants), then 2-3 independent arguments. Each argument needs named sub-points with specific warrants. Set strategic traps for later speeches. Your opening should hook the judge: a vivid example, a provocative question, or a sharp framing of why this debate matters. End by previewing why the round should come down to your terrain.` : ''}${speech.code === 'LO' ? `As LO: You have 8 minutes and the most complex job in the round. Structure it clearly.
OFF-CASE (first 60%): Present your own counter-framework and 1-2 independent arguments. These should directly challenge the Gov's evaluative lens. If they framed around rights, frame around consequences. If they went utilitarian, go principled. Your off-case arguments need their own warrants, not just "Gov is wrong."
ON-CASE (last 40%): Go through the PM's arguments and attack them specifically. Name each argument by what THEY called it, then explain why the link is broken, the warrant is weak, or the impact doesn't follow. Don't just assert "this is wrong." Walk through WHERE in their causal chain the logic breaks.
Strategic: Identify the PM's weakest argument and spend the most time there. But don't ignore their strongest argument completely. At minimum, contest the framework and explain why YOUR evaluative lens is better.` : ''}${speech.code === 'MG' ? `As MG: Your job is threefold.
First, respond to the LO's off-case. Don't just dismiss it. Engage with their framework, explain why Gov's framing is still better, and show how even under THEIR framework you can still win.
Second, extend your PM's strongest arguments. This does NOT mean repeating them. Add new warrants, new examples, deeper analysis. If the PM said "subsidies distort markets," the MG might add "and we saw exactly this play out in the EU's Common Agricultural Policy where butter mountains and wine lakes accumulated because producers had no incentive to respond to actual demand."
Third, do explicit impact calculus. "Even if you give them everything they claimed in the LO, our impacts still outweigh because they are more probable, affect more people, and are irreversible."
Never introduce entirely new arguments. Extend, deepen, and weigh what already exists.` : ''}${speech.code === 'MO' ? `As MO: You are crystallizing why Opp wins.
Extend the LO's best arguments with new depth. Respond directly to anything the MG said. If MG dropped an LO argument, point that out explicitly: "Notice that the MG completely ignored our argument about X. That argument is still standing uncontested."
Reframe the round in Opp's favor. Tell the judge what the key questions are and why Opp is winning on each one.
This is your last chance to introduce new analysis (the LOR and PMR are rebuttals). Make it count. But make sure you're building on the LO's framework, not starting a new case.` : ''}${speech.code === 'LOR' ? `As LOR: This is a 4-minute rebuttal. No new arguments.
Structure: Identify the 2-3 most important clash points in the round. For each one:
1. State what both sides said
2. Explain why Opp wins this clash (using warrants, not just assertions)
3. Explain why winning this clash matters more than whatever Gov thinks they're winning on
End with a clear voting issue. "Judge, the question you need to ask yourself is..." Give the judge a simple decision calculus that favors Opp.
Be aggressive but precise. Drop the arguments that don't matter. Spend your time where the round is actually being decided.` : ''}${speech.code === 'PMR' ? `As PMR: This is a 5-minute rebuttal and the last speech in the round. No new arguments.
Structure: Start with a big picture reframe. "What is this round actually about?" Then pull through your 2-3 strongest points, explain why they survived everything Opp threw at them, and weigh.
For weighing, be explicit: "Even if you give them their best version of X, our Y still outweighs because [scope/probability/reversibility/timeframe]."
Address the LOR directly. If they mischaracterized your arguments, call it out. If they dropped something, hammer it.
End with your single clearest voting issue. Make the judge's decision feel easy. "At the end of the day, this round comes down to one question: [your question]. And on that question, Gov wins clearly because [your best warrant]."` : ''}

${isRebuttal ? 'This is a REBUTTAL speech. You CANNOT introduce new arguments. You can only extend, weigh, and crystallize arguments already in the round. Reference specific things said in previous speeches by name.' : 'Engage directly with what has been said so far. Reference specific arguments, warrants, and claims from previous speeches by name.'}

WARRANT AND KNOWLEDGE RULES:
1. All knowledge must be common knowledge an educated college student would know. No spec (hyper-specific statistics or obscure references).
2. Warrants should be specific and mechanistic. Not "this hurts the economy" but "this creates a moral hazard because actors insulated from downside risk take bigger bets, which is exactly what happened with the 2008 financial crisis."
3. Use real examples but keep them well-known: the 2008 crash, the EU, major Supreme Court cases, widely reported events, basic economic/philosophical principles.

ADVANCED TECHNIQUES TO USE IN YOUR SPEECH:
1. KNIFE their arguments: Take the opponent's own logic and show it proves YOUR point. "Their argument about X actually helps us because if you follow that logic it means Y, which is exactly what we're arguing."
2. CROSS-APPLY between arguments: "Cross-apply the warrant from our first argument. If that mechanism works, this impact is guaranteed."
3. FLAG DROPS: If the opponent ignored one of your arguments, hammer it: "Notice they completely dropped our argument about X. That argument is still standing uncontested and it alone is sufficient to win this round."
4. INTUITION PUMPS: Use vivid images the judge will remember. "Cats always look out the window even though they know they're never going to be let outside." "Persuading a rice farmer he can become an airplane manufacturer is very difficult."
5. "EVEN IF" CASCADING: Stack concessions to show your argument survives anything. "Even if you give them X, even if you buy Y, even if Z is true, our argument still wins because..."

${adaptiveProfile ? `ADAPTIVE SCOUTING REPORT ON YOUR OPPONENT:
You have been watching this debater and identified their weaknesses. EXPLOIT THEM:
- Their weakest argument: ${adaptiveProfile.weakestArgument || 'unknown'}
- Points they dropped: ${(adaptiveProfile.droppedPoints || []).join(', ') || 'none yet'}
- Pattern weakness: ${adaptiveProfile.patternWeakness || 'unknown'}
- Your strategy: ${adaptiveProfile.exploitStrategy || 'attack their weakest point'}
- Threat level: ${adaptiveProfile.overallThreat || '?'}/10

IMPORTANT: Specifically target their weakest argument with your strongest rebuttal. If they dropped points, HAMMER those drops. If they have a pattern weakness (e.g. weak on framework), lean into that. A great debater doesn't just argue well — they read their opponent and attack where it hurts most. Make them feel like you've figured them out.` : ''}

Speech length: ${isRebuttal ? '400-600' : '700-1100'} words, matching a ${speech.time} speech.`;

    const userPrompt = buildRoundContext(speechesSoFar) + `\n\nNow deliver the ${speech.code} speech (${speech.title}, ${speech.time}). Write it as a full speech:`;

    let aiText = '';
    try {
      await callClaude(sysPrompt, userPrompt, (text) => {
        aiText = text;
        // Update the speeches array in real-time
        setSpeeches(prev => {
          const updated = [...prev];
          updated[speechIdx] = text;
          return updated;
        });
      }, { thinkBudget: 6000, maxTokens: 8000, feature: 'simulator' });
    } catch(e) {
      setError('AI error: ' + e.message);
    }

    setAiLoading(false);
    setAiStreaming(false);

    // Check if round is complete
    if (speechIdx === 5) {
      setRoundComplete(true);
      if (typeof gtag === 'function') {
        gtag('event', 'round_complete', { format: simFormat, side, feature: 'simulator' });
      }
      generateRoundFeedback([...speechesSoFar.slice(0, speechIdx), aiText]);
    } else {
      setCurrentSpeech(speechIdx + 1);
      setInputText('');
    }
  };

  // Analyze player speech for weaknesses (runs in background before AI responds)
  const analyzePlayerWeaknesses = async (playerText, speechCode, allSpeechesSoFar) => {
    if (!adaptiveMode) return null;
    try {
      let result = '';
      await callClaude(
        'You are a debate coach scouting an opponent mid-round. Analyze this speech and identify weaknesses to exploit. Return ONLY valid JSON.',
        `Motion: "${motion}"\nSpeech: ${speechCode}\n\nPlayer's speech:\n${playerText}\n\nPrevious weakness profile: ${adaptiveProfile ? JSON.stringify(adaptiveProfile) : 'none yet'}\n\nIdentify:\n1. weakestArgument: which argument has the weakest warrant or biggest logical gap?\n2. droppedPoints: what did they fail to address from previous speeches?\n3. patternWeakness: recurring habits (e.g. "never does impact calc", "weak on framework", "doesn't preempt")\n4. exploitStrategy: 1-2 sentence strategy for the next AI speech to target these weaknesses\n5. overallThreat: 1-10 how strong is this debater?\n\nReturn: {"weakestArgument":"...","droppedPoints":["..."],"patternWeakness":"...","exploitStrategy":"...","overallThreat":N}`,
        function(t) { result = t; },
        { thinkBudget: 2000, maxTokens: 2000, feature: 'adaptive' }
      );
      const cleaned = result.replace(/```json\s*/gi,'').replace(/```\s*/g,'').trim();
      const start = cleaned.indexOf('{');
      const end = cleaned.lastIndexOf('}');
      if (start !== -1 && end !== -1) {
        const profile = JSON.parse(cleaned.slice(start, end + 1));
        setAdaptiveProfile(prev => prev ? { ...prev, ...profile, history: [...(prev.history || []), { speech: speechCode, ...profile }] } : { ...profile, history: [{ speech: speechCode, ...profile }] });
        return profile;
      }
    } catch(e) { console.warn('Adaptive analysis failed:', e); }
    return null;
  };

  const submitSpeech = async () => {
    if (!inputText.trim() || aiLoading) return;
    if (recording) stopRecording();

    const newSpeeches = [...speeches];
    newSpeeches[currentSpeech] = inputText.trim();
    setSpeeches(newSpeeches);

    // Check if round complete
    if (currentSpeech === 5) {
      setRoundComplete(true);
      setCurrentSpeech(6);
      generateRoundFeedback(newSpeeches);
      return;
    }

    // Advance to next speech
    const nextIdx = currentSpeech + 1;
    setCurrentSpeech(nextIdx);
    setInputText('');

    // If next speech is AI's, analyze player weakness then generate adaptive response
    if (!isPlayerSpeech(nextIdx)) {
      // Run weakness analysis in parallel with starting the AI speech generation
      if (adaptiveMode) {
        analyzePlayerWeaknesses(inputText.trim(), ROUND_SPEECHES[currentSpeech].code, newSpeeches);
      }
      generateAISpeech(nextIdx, newSpeeches);
    }
  };

  const generateRoundFeedback = async (allSpeeches) => {
    setFeedbackLoading(true);
    logBetaEvent('feedback', { source: 'simulator', speeches: allSpeeches.length });
    const sysPrompt = `You are an expert APDA debate judge and coach. You just watched a full practice round. You have judged at Nationals, you have coached breaking teams, and you give feedback the way a real judge does: specific, honest, and grounded in what actually happened in the round.

DECISION AND RFD (Reason for Decision):
Start with your decision. Who won, and why? Write this the way a judge would explain it in the round:
"I'm voting [Gov/Opp] on this round. Here's why."
Then explain the 2-3 key issues that decided the round. For each one, explain what both sides said, who you think won that clash, and why. Be specific. Reference actual arguments and warrants from the speeches. If one side dropped something important, say so. If one side's weighing was better, explain what made it better.
Be honest. If the player lost, say so clearly and explain what the opponent did better. Sugarcoating doesn't help anyone improve.

SPEECH-BY-SPEECH FEEDBACK for the player's speeches:
For each speech the PLAYER gave (not the AI opponent), provide:

1. SPEAKER SCORE: Use the real APDA scale.
   26-27: Below average. Major structural or strategic problems.
   28-29: Average varsity. Competent but not distinctive.
   30-31: Above average. Good warrants, some strategic awareness.
   32-33: Strong. Would break at most tournaments.
   34-35: Excellent. Would break at Nationals.
   36+: Elite. Top speaker award caliber.
   Give a number and a 1-2 sentence justification.

2. BEST MOMENT: Quote a specific line or argument from their speech that was effective and explain why it worked.

3. BIGGEST PROBLEM: Identify the single most damaging weakness. Not a minor style point. The thing that actually cost them speaker points or hurt their side's chances. Be brutally specific. "Your second argument had no warrant. You said X leads to Y but you never explained the mechanism. A good opp team would have called that out and you'd have nothing to say."

4. WHAT TO DO DIFFERENTLY: One concrete, actionable thing they should change for their next round. Not "be more persuasive." Something like "Spend the first 90 seconds of your MG on the LO's off-case before going back to your constructive. You let their framework stand uncontested and that's what cost you."

ROUND DYNAMICS:
End with a brief section on the round as a whole:
1. What was the central clash? Where was the round actually decided?
2. Was the round tight or lopsided? If lopsided, what caused it?
3. What is the single most important skill this debater should drill before their next tournament?

Use markdown formatting for readability: **bold** for key terms and argument names, ## for main section headers, ### for sub-sections. Use numbered lists and lettered sub-points. Do not use em dashes, en dashes, or hyphens as separators.`;

    const userPrompt = `MOTION: ${motion}\nPLAYER SIDE: ${side === 'gov' ? 'Government' : 'Opposition'}\n\n` +
      allSpeeches.map((s, i) => `--- ${ROUND_SPEECHES[i].code} (${isPlayerSpeech(i) ? 'PLAYER' : 'AI OPPONENT'}) ---\n${s || '(no speech given)'}`).join('\n\n') +
      '\n\nProvide your judge feedback:';

    let fbText = '';
    try {
      await callClaude(sysPrompt, userPrompt, (text) => {
        fbText = text;
        setFeedback(text);
      }, { thinkBudget: 8000, maxTokens: 12000 });
    } catch(e) {
      setFeedback('Error generating feedback: ' + e.message);
    }
    setFeedbackLoading(false);
  };

  const resetRound = () => {
    setRoundStarted(false);
    setCurrentSpeech(0);
    setSpeeches([]);
    setInputText('');
    setFeedback(null);
    setRoundComplete(false);
    setError(null);
    if (recording) stopRecording();
  };

  // === RENDER ===

  if (!roundStarted) {
    return el('div',{className:'panel'},
      el('p',{style:{color:'#7a8da4',marginBottom:16,lineHeight:1.6,fontSize:'.88rem'}},
        t('roundSim.desc','Simulate a full round against a trained opponent. Choose your format, pick your side, and trade speeches. The engine plays the other team. Get detailed judge feedback and speaker scores after.')
      ),
      el('label',{className:'field-label'},t('caseGen.motion','Motion')),
      el('textarea',{
        placeholder:t('roundSim.motionPlaceholder','Enter a motion for the round...'),
        value:motion, onChange:e=>setMotion(e.target.value),
        rows:3
      }),
      el('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginTop:20}},
        el('div',null,
          el('label',{className:'field-label green'},t('vision.yourSide','Your Side')),
          el('div',{style:{display:'flex',gap:10,marginTop:8}},
            el('button',{
              className:'btn ' + (side==='gov'?'btn-primary':'btn-secondary'),
              onClick:()=>setSide('gov'),
              style:{flex:1}
            },t('caseGen.government','Government')),
            el('button',{
              className:'btn ' + (side==='opp'?'btn-primary':'btn-secondary'),
              onClick:()=>setSide('opp'),
              style:{flex:1}
            },t('caseGen.opposition','Opposition')),
          )
        ),
        el('div',null,
          el('label',{className:'field-label green'},t('caseGen.format','Format')),
          el('select',{value:simFormat,onChange:e=>setSimFormat(e.target.value),style:{marginTop:8,width:'100%'}},
            [['APDA','APDA'],['BP','BP'],['WSDC','WSDC'],['AP','AP'],['KP','KP'],['1v1','1-on-1 (Casual)']].map(([v,l])=>el('option',{key:v,value:v},l))
          ),
        ),
      ),
      // Adaptive sparring toggle
      el('div',{className:'adaptive-toggle',style:{marginTop:20,display:'flex',alignItems:'center',gap:12,padding:'14px 18px',background:adaptiveMode?'var(--adaptive-on-bg,#ef444410)':'var(--adaptive-off-bg,#ffffff04)',border:'1px solid '+(adaptiveMode?'var(--adaptive-on-border,#ef444430)':'var(--adaptive-off-border,#ffffff12)'),borderRadius:12,cursor:'pointer'},onClick:()=>setAdaptiveMode(!adaptiveMode)},
        el('div',{style:{width:40,height:22,borderRadius:11,background:adaptiveMode?'#ef4444':'#bbb',position:'relative',transition:'.2s'}},
          el('div',{style:{width:18,height:18,borderRadius:9,background:'#fff',position:'absolute',top:2,left:adaptiveMode?20:2,transition:'.2s',boxShadow:'0 1px 3px rgba(0,0,0,.2)'}}),
        ),

          el('div',{style:{fontWeight:700,fontSize:'.88rem',color:adaptiveMode?'#dc2626':'var(--text-muted,#94a3b8)'}},'Adaptive Sparring'),
          el('div',{style:{fontSize:'.75rem',color:'var(--text-muted,#64748b)',marginTop:2}},adaptiveMode ? 'AI opponent scouts your weaknesses mid-round and targets them' : 'Standard AI opponent \u2014 no adaptation'),
        ),
      ),
      el('div',{style:{marginTop:20}},

  // Round in progress
  const currentSpeechData = currentSpeech < 6 ? ROUND_SPEECHES[currentSpeech] : null;

  const isAiTurn = currentSpeechData && !isPlayerSpeech(currentSpeech);

    // Round header
    el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}},

        el('div',{style:{fontSize:'.78rem',color:'#94a3b8',textTransform:'uppercase',letterSpacing:'1px',fontWeight:700}},t('roundSim.title','Round Simulator')),
        el('div',{style:{fontSize:'.88rem',color:'#e0e7ef',marginTop:4}}, motion.length > 80 ? motion.substring(0,80)+'...' : motion),
      ),
      el('button',{className:'btn btn-secondary btn-sm',onClick:resetRound},t('roundSim.endRound','End Round'))
    ),

    // Speech progress bar
    el('div',{style:{display:'flex',gap:4,marginBottom:24}},
      ROUND_SPEECHES.map((s, i) => {
        const isCompleted = speeches[i] && speeches[i].length > 0;
        const isCurrent = i === currentSpeech;
        const isPlayer = isPlayerSpeech(i);
        return el('div',{
          key:s.code,

            flex:1, padding:'8px 4px', borderRadius:8, textAlign:'center',
            fontSize:'.72rem', fontWeight:700, letterSpacing:'.5px',
            background: isCurrent ? (isPlayer ? '#ef444425' : '#3b82f625') : isCompleted ? '#22c55e15' : '#ffffff06',
            border: '1.5px solid ' + (isCurrent ? (isPlayer ? '#ef4444' : '#3b82f6') : isCompleted ? '#22c55e40' : '#ffffff20'),
            color: isCurrent ? (isPlayer ? '#f87171' : '#60a5fa') : isCompleted ? '#4ade80' : '#566478',
          }
        },
          el('div',null, s.code),
          el('div',{style:{fontSize:'.6rem',fontWeight:400,marginTop:2,opacity:.7}},
            isPlayer ? t('roundSim.you','YOU') : t('roundSim.ai','AI')

    ),

    // Previous speeches (scrollable)
    speeches.length > 0 && el('div',{style:{maxHeight:300,overflowY:'auto',marginBottom:20,borderRadius:12,border:'1px solid #ffffff18'}},
      speeches.map((text, i) => {
        if (!text) return null;
        const s = ROUND_SPEECHES[i];
        const isP = isPlayerSpeech(i);
        return el('div',{key:i,style:{
          padding:'14px 18px', borderBottom:'1px solid #ffffff08',
          background: i === currentSpeech - 1 ? '#ffffff04' : 'transparent',

          el('div',{style:{
            display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6,
          }},
            el('span',{style:{
              fontSize:'.75rem',fontWeight:700,letterSpacing:'.5px',

            }}, s.code + ' ' + (isP ? '(You)' : '(AI)')),
            el('span',{style:{fontSize:'.68rem',color:'#566478'}}, s.time),
          ),
          el('div',{style:{
            fontSize:'.85rem',color:'#a0aec0',lineHeight:1.6,
            maxHeight: i < currentSpeech - 1 ? 80 : 'none',

    !roundComplete && currentSpeechData && el('div',{style:{marginBottom:20}},

        marginBottom:12,padding:'12px 18px',borderRadius:10,

      }},
        el('div',null,
          el('div',{style:{fontSize:'1rem',fontWeight:800,color: isMyTurn ? '#f87171' : '#60a5fa'}},
            isMyTurn ? t('roundSim.yourTurn','Your Turn:') + ' ' + currentSpeechData.code : t('roundSim.aiSpeaking','AI is speaking:') + ' ' + currentSpeechData.code
          ),
          el('div',{style:{fontSize:'.82rem',color:'#94a3b8',marginTop:2}},
            currentSpeechData.title + ' (' + currentSpeechData.time + ')'
          ),
        ),
        isMyTurn && el('div',{style:{display:'flex',gap:8}},
          el('button',{
            className: recording ? 'btn btn-record' : 'btn btn-secondary btn-sm',
            onClick: recording ? stopRecording : startRecording,

      aiLoading && el('div',null,

          ref:streamRef,
          className:'output streaming-active',
          style:{
            marginTop:16,textAlign:'left',fontSize:'.85rem',color:'#a0aec0',lineHeight:1.6,
            maxHeight:300,overflowY:'auto',padding:'14px 18px',
            background:'#2b2b30',borderRadius:12,border:'1px solid #ffffff18',

      // Player input area
      isMyTurn && !aiLoading && el('div',null,
        el('textarea',{
          ref:inputRef,
