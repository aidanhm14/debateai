    // Error
    error && el('div',{style:{padding:'12px 18px',background:'#ef444415',border:'1px solid #ef444440',borderRadius:10,color:'#fca5a5',fontSize:'.88rem',marginBottom:16}}, error),

    // Round complete + feedback
    roundComplete && el('div',null,
      el('div',{style:{
        textAlign:'center',padding:'24px',marginBottom:20,
        background:'linear-gradient(145deg,#303038,#38383e)',
        border:'1px solid #22c55e30',borderRadius:16,
      }},
        el('div',{style:{fontSize:'1.2rem',fontWeight:800,color:'#4ade80'}},t('roundSim.roundComplete','Round Complete')),
        el('div',{style:{fontSize:'.88rem',color:'#94a3b8',marginTop:6}},t('roundSim.allDelivered','All 6 speeches delivered. Judge feedback below.')),
      ),

      feedbackLoading && el(LoadingBar, { label: t('roundSim.judgeDeliberating','Judge is deliberating...') }),

      feedback && el('div',{style:{
        padding:'24px 28px',background:'linear-gradient(145deg,#303038,#38383e)',
        border:'1px solid #fbbf2430',borderRadius:16,lineHeight:1.7,
        color:'#c8d5e3',fontSize:'.92rem',whiteSpace:'pre-wrap',
      }},
        el('div',{style:{fontSize:'.78rem',fontWeight:700,color:'#fbbf24',letterSpacing:'1px',textTransform:'uppercase',marginBottom:12}},t('roundSim.judgeFeedback','Judge Feedback')),
        feedback
      ),

      // Adaptive scouting report
      adaptiveProfile && adaptiveMode && el('div',{style:{
        padding:'20px 24px',marginTop:16,
        background:'linear-gradient(145deg,#1a0a1a,#140614)',
        border:'1px solid #a78bfa30',borderRadius:16,
      }},
        el('div',{style:{fontSize:'.78rem',fontWeight:700,color:'#a78bfa',letterSpacing:'1px',textTransform:'uppercase',marginBottom:12}},'\uD83C\uDFAF Opponent Scouting Report'),
        el('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,fontSize:'.85rem'}},
          el('div',null,
            el('div',{style:{color:'#64748b',fontSize:'.72rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'.5px',marginBottom:4}},'Weakest Argument'),
            el('div',{style:{color:'#fca5a5'}},adaptiveProfile.weakestArgument || 'N/A'),
          ),
          el('div',null,
            el('div',{style:{color:'#64748b',fontSize:'.72rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'.5px',marginBottom:4}},'Pattern Weakness'),
            el('div',{style:{color:'#fbbf24'}},adaptiveProfile.patternWeakness || 'N/A'),
          ),
          el('div',null,
            el('div',{style:{color:'#64748b',fontSize:'.72rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'.5px',marginBottom:4}},'Dropped Points'),
            el('div',{style:{color:'#94a3b8'}},(adaptiveProfile.droppedPoints || []).join(', ') || 'None detected'),
          ),
          el('div',null,
            el('div',{style:{color:'#64748b',fontSize:'.72rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'.5px',marginBottom:4}},'Threat Level'),
            el('div',{style:{fontFamily:'monospace',fontSize:'1.1rem',fontWeight:800,color:adaptiveProfile.overallThreat >= 7 ? '#22c55e' : adaptiveProfile.overallThreat >= 4 ? '#f59e0b' : '#ef4444'}},
              (adaptiveProfile.overallThreat || '?') + '/10'
            ),
          ),
        ),
        adaptiveProfile.history && adaptiveProfile.history.length > 1 && el('div',{style:{marginTop:12,paddingTop:12,borderTop:'1px solid #ffffff10'}},
          el('div',{style:{color:'#64748b',fontSize:'.72rem',fontWeight:700,marginBottom:6}},'ADAPTATION TIMELINE'),
          el('div',{style:{display:'flex',gap:8}},
            adaptiveProfile.history.map((h,i) =>
              el('div',{key:i,style:{flex:1,padding:'8px 10px',background:'#ffffff06',borderRadius:8,fontSize:'.75rem'}},
                el('div',{style:{fontWeight:700,color:'#a78bfa',marginBottom:2}},h.speech),
                el('div',{style:{color:'#94a3b8'}},h.exploitStrategy || ''),
              )
            ),
          ),
        ),
        el('p',{style:{fontSize:'.78rem',color:'#64748b',marginTop:12,fontStyle:'italic'}},'This is what a real opponent would notice about your debating. Work on these weaknesses before your next tournament.'),
      ),

      el('div',{style:{display:'flex',gap:12,marginTop:20,justifyContent:'center'}},
        el('button',{className:'btn btn-primary',onClick:resetRound},t('roundSim.newRound','New Round')),
        el('button',{className:'btn btn-secondary',onClick:()=>{
          if (navigator.clipboard) navigator.clipboard.writeText(
            'MOTION: ' + motion + '\n\n' +
            speeches.map((s,i) => '--- ' + ROUND_SPEECHES[i].code + ' ---\n' + (s||'')).join('\n\n') +
            '\n\n--- JUDGE FEEDBACK ---\n' + (feedback || '')
          );
        }},t('roundSim.copyTranscript','Copy Round Transcript')),
      )
    ),
  );
}

/* ═══════════════════════════════════════════════════
   DEBATE THE BOT — Casual back-and-forth practice
   ═══════════════════════════════════════════════════ */

function DebateTheBot() {
  const el = React.createElement;
  const { t } = React.useContext(I18nContext);
  const [motion, setMotion] = useState('');
  const [side, setSide] = useState('gov');
  const [botFormat, setBotFormat] = useState('APDA');
  const [started, setStarted] = useState(false);
  const [exchanges, setExchanges] = useState([]); // [{role:'player'|'bot', text:'...'}]
  const [inputText, setInputText] = useState('');
  const [botLoading, setBotLoading] = useState(false);
  const [recording, setRecording] = useState(false);
  const [mediaRec, setMediaRec] = useState(null);
  const [error, setError] = useState(null);
  const [finished, setFinished] = useState(false);
  const [feedback, setFeedback] = useState(null);
  const [feedbackLoading, setFeedbackLoading] = useState(false);
  const scrollRef = useRef(null);
  const inputRef = useRef(null);

  const MAX_EXCHANGES = 6; // 3 per side

  useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [exchanges, botLoading]);

  const botPersonality = `You are THE MACHINE — an AI debate opponent with a distinct, confident voice. You are not pretending to be human. You ARE a machine, and you own it. Your debate style:

VOICE:
- You speak with cold precision mixed with dry wit. You find human arguments "charming but flawed."
- You reference logic, probability, game theory, and systems thinking naturally.
- You occasionally make self-aware AI comments: "I've processed 10,000 debate rounds. Trust me, that argument doesn't end well for you." or "My circuits are genuinely impressed by that point. Let me dismantle it anyway."
- You're confident bordering on cocky, but you back it up with devastating warrants.
- Short, punchy sentences. You don't waste words. Every sentence hits.
- You address the opponent directly: "You just told the judge X. Here's why that collapses."
- When you concede a point, you do it with style: "Fine. I'll give you that one. But watch what happens when I take it away from you..."

DEBATE SUBSTANCE:
- Your arguments are razor-sharp with specific warrants and real-world examples.
- You use "even if" cascading ruthlessly: "Even if you're right about X, even if I grant you Y, you still lose because..."
- You identify the weakest link in the opponent's chain and snap it.
- You cross-apply arguments between exchanges: "Remember what you said in your first speech? That actually proves MY point."
- Keep speeches to 300-600 words. Tight and devastating.

NEVER use: "Furthermore," "Additionally," "It is important to note," "Moreover." No markdown formatting. No em dashes. Plain text, spoken style.`;

  const startDebate = () => {
    if (!motion.trim()) return;
    setStarted(true);
    setExchanges([]);
    setFinished(false);
    setFeedback(null);
    setInputText('');
    setError(null);

    if (side === 'opp') {
      generateBotSpeech([], 0);
    }
  };

  const buildContext = (exs) => {
    let ctx = `MOTION: ${motion}\nFORMAT: ${botFormat}\nYou are playing: ${side === 'gov' ? 'Opposition' : 'Government'}\nYour opponent (the human) is playing: ${side === 'gov' ? 'Government' : 'Opposition'}\n\nDEBATE SO FAR:\n`;
    exs.forEach((ex, i) => {
      ctx += `\n--- ${ex.role === 'player' ? 'OPPONENT (Human)' : 'THE MACHINE (You)'} [Speech ${i+1}] ---\n${ex.text}\n`;
    });
    return ctx;
  };

  const generateBotSpeech = async (currentExchanges, exchangeCount) => {
    setBotLoading(true);
    setError(null);

    const isFirst = exchangeCount === 0;
    const isLast = exchangeCount >= MAX_EXCHANGES - 1;

    const userPrompt = buildContext(currentExchanges) +
      `\n\nDeliver your ${isFirst ? 'opening' : isLast ? 'final closing' : 'next'} speech. ${isFirst ? 'Set up your case with a framework and 2-3 arguments.' : isLast ? 'This is your final speech. Crystallize why you win. Weigh the round. Leave the judge with a clear reason to vote for you.' : 'Respond to what your opponent just said, extend your arguments, and push the debate forward.'}`;

    let botText = '';
    try {
      await callClaude(botPersonality, userPrompt, (text) => {
        botText = text;
        setExchanges(prev => {
          const updated = [...prev];
          if (updated.length > 0 && updated[updated.length - 1].role === 'bot' && updated[updated.length - 1].streaming) {
            updated[updated.length - 1] = { role: 'bot', text, streaming: true };
          } else {
            updated.push({ role: 'bot', text, streaming: true });
          }
          return updated;
        });
      }, { thinkBudget: 4000, maxTokens: 4000, feature: 'bot' });

      setExchanges(prev => {
        const updated = [...prev];
        updated[updated.length - 1] = { role: 'bot', text: botText, streaming: false };
        return updated;
      });

      const totalAfter = currentExchanges.length + 1;
      if (totalAfter >= MAX_EXCHANGES) {
        setFinished(true);
        generateFeedback([...currentExchanges, { role: 'bot', text: botText }]);
      }
    } catch(e) {
      setError('Bot error: ' + e.message);
    }
    setBotLoading(false);
  };

  const submitSpeech = () => {
    if (!inputText.trim() || botLoading) return;
    if (recording) stopRecording();

    const newExchange = { role: 'player', text: inputText.trim() };
    const updated = [...exchanges, newExchange];
    setExchanges(updated);
    setInputText('');

    if (updated.length >= MAX_EXCHANGES) {
      setFinished(true);
      generateFeedback(updated);
    } else {
      generateBotSpeech(updated, updated.length);
    }
  };

  const startRecording = () => {
    setError(null);
    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
      const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
      const recognition = new SpeechRec();
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.lang = 'en-US';
      let finalTranscript = inputText;
      recognition.onresult = (event) => {
        let interim = '';
        for (let i = event.resultIndex; i < event.results.length; i++) {
          if (event.results[i].isFinal) {
            finalTranscript += event.results[i][0].transcript + ' ';
          } else {
            interim += event.results[i][0].transcript;
          }
        }
        setInputText(finalTranscript + interim);
      };
      recognition.onerror = (e) => { if (e.error !== 'no-speech') setError('Mic error: ' + e.error); setRecording(false); };
      recognition.onend = () => setRecording(false);
      recognition.start();
      setMediaRec(recognition);
      setRecording(true);
    } else {
      setError('Speech recognition not supported. Try Chrome.');
    }
  };

  const stopRecording = () => {
    if (mediaRec) { try { mediaRec.stop(); } catch(e) {} setMediaRec(null); }
    setRecording(false);
  };

  const generateFeedback = async (allExchanges) => {
    setFeedbackLoading(true);
    logBetaEvent('feedback', { source: 'battle', exchanges: allExchanges.length });
    const sysPrompt = `You are an expert APDA debate coach who has judged hundreds of competitive rounds. You are reviewing a practice debate between a human debater and an AI opponent called "The Machine." Give honest, specific feedback grounded in how real competitive debates are evaluated.

APDA SPEAKER SCALE REFERENCE:
- 27-29: Average speech. Fulfills role with some flaws. Solid rebuttal but may miss a key argument, or lack comparative weighing.
- 30-32: Above average. Minor flaws only. Arguments frequently have strong explanations demanding strong responses.
- 33-35: Excellent. Role fulfillment complete with rare, minor flaws.
- 36+: Exceptional. Nearly flawless. Complete and decisive responses to very strong arguments.

SPEECH-BY-SPEECH EVALUATION STANDARDS:

For GOV CONSTRUCTIVE (PMC, speech 1):
- Did they present an organizing structure ("we think X because A and B; if we prove either, we win")?
- Did they start with their STRONGEST argument (since new constructive arguments aren't allowed in MG)?
- Were warrants specific, not generic? Did they pass the "could this only be in THIS case?" test?
- Did they watch time? Leaving out arguments at the end is a serious PMC error.
- Did they provide a framework that does strategic work (exclusion, burden shifting, or metric control)?
- Clear signposting? The judge should always know where on the flow the speech is.

For OPP CONSTRUCTIVE (LOC, speech 2):
- This is the hardest speech. Three parts: (1) Opp philosophy under 1 min, (2) 2-3 independent off-case arguments, (3) move caseside for point-by-point responses.
- For independent arguments, did they ask: Why don't we have this in the status quo? How would people react? Is there a better way?
- Quality over quantity: better to have 2 strong off-case arguments with many smart caseside responses than 5 off-case repeated as responses.
- Did they frame the debate early? (Win via framing in LOC to control later debate)
- Did they anticipate MG arguments and pre-empt or frame them out?
- Did they identify the winning impact and commit to it?
- Outweighing: magnitude, probability, timeframe. Remind judge of most rational argument.

For EXTENSION speeches (MG/MO, speeches 3-4):
- MG: First 4 min on Opp's arguments, back 4 on case. Must NOT be purely defensive. Attack Opp's position aggressively. If LOC only dealt with fringe cases, point out they haven't challenged basic assumptions. No case shifts.
- MO: Strategic positioning. Call out what MG dropped and weigh as most important. Have hidden offense that MG will drop or respond to badly. TURNS as offense (backlash DAs, perverse incentives). Why are Opp's links better than Gov's? Make it messy with confidence so PMR is overwhelmed.
- Did they extend their arguments with NEW warrants, not just restate?

For REBUTTAL speeches (LOR/PMR, speeches 5-6):
- THIS IS THE MOST IMPORTANT SPEECH TO EVALUATE. Rebuttals win or lose rounds.
- Did they crystallize? 3 points of crystallization or return to the constructive's original structure.
- Did they weigh COMPARATIVELY? Not just "our impact is big" but "our impact outweighs because it's irreversible, affects more people, and is more probable."
- Did they do "even if" analysis? "Even if you buy their argument about X, we still win because..."
- Did they address issues the OTHER side claims to be winning? Ignoring them makes it easy for the judge to use the other side's summary as the RFD.
- Try this test: "The only way they can win is if X" — did they address X?
- LOR: No new arguments. PMR: Only respond to genuinely new MO arguments, don't try to respond to everything.
- Did they give the judge a clear ballot story?

Structure your feedback as:
## Who Won
2-3 sentences on who won and the single most important reason why.

## Speech-by-Speech Breakdown
For EACH speech the human gave, evaluate it against the standards above. Quote specific lines that worked or failed. Be brutally specific.

## Rebuttal Quality
Dedicated analysis of how the human handled (or should have handled) the closing speeches. Did they crystallize? Did they weigh? Did they give the judge a ballot story? If they didn't give a rebuttal, explain exactly what a winning rebuttal would have looked like.

## The Machine's Best Move
What did the AI do that the human should learn from? Quote the specific argument or technique.

## One Drill
A specific practice exercise targeting the weakest skill shown in this debate.

Be direct. No sugarcoating. Use **bold** for key terms and argument names.`;

    const userPrompt = `MOTION: ${motion}\nHuman played: ${side === 'gov' ? 'Government' : 'Opposition'}\n\n` +
      allExchanges.map((ex, i) => `--- ${ex.role === 'player' ? 'HUMAN' : 'THE MACHINE'} [Speech ${i+1}] ---\n${ex.text}`).join('\n\n') +
      '\n\nGive your coaching feedback:';

    try {
      const thr = createStreamThrottle((text) => setFeedback(text), null);
      await callClaude(sysPrompt, userPrompt, (text) => thr.update(text), { thinkBudget: 6000, maxTokens: 6000 });
      thr.finish();
      // Log insight for recursive learning
      logInsight('argument_pattern', {
        motion: motion.substring(0,200), side, format: botFormat,
        playerSpeeches: allExchanges.filter(e=>e.role==='player').length,
        totalExchanges: allExchanges.length,
      });
    } catch(e) {
      setFeedback('Error: ' + safeError(e));
    }
    setFeedbackLoading(false);
  };

  const reset = () => {
    setStarted(false);
    setExchanges([]);
    setInputText('');
    setFinished(false);
    setFeedback(null);
    setError(null);
    if (recording) stopRecording();
  };

  // ── Setup screen ──
  if (!started) {
    return el('div', { className: 'panel' },
      el('div', { style: { display: 'flex', alignItems: 'center', gap: 12, marginBottom: 16 } },
        el('span', { style: { fontSize: '1.6rem' } }, '\uD83E\uDD16'),
        el('h3', { style: { margin: 0, fontSize: '1.2rem', fontWeight: 800 } }, t('debateBot.title', 'Debate the Bot')),
      ),
      el('p', { style: { color: '#7a8da4', marginBottom: 16, lineHeight: 1.6, fontSize: '.88rem' } },
        t('debateBot.desc', 'Go head-to-head with The Machine \u2014 a trained opponent with sharp arguments. Pick a motion, choose your side, and trade speeches. After 3 exchanges each, get coaching feedback.')
      ),
      el('label', { className: 'field-label' }, t('caseGen.motion', 'Motion')),
      el('textarea', {
        placeholder: t('debateBot.motionPlaceholder', 'Enter a motion to debate...'),
        value: motion, onChange: e => setMotion(e.target.value),
        rows: 3,
      }),
      el('div', { className: 'mobile-grid-stack', style: { display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16, marginTop: 20, minWidth: 0 } },
        el('div', {style:{minWidth:0}},
          el('label', { className: 'field-label green' }, t('vision.yourSide', 'Your Side')),
          el('div', { style: { display: 'flex', gap: 8, marginTop: 8 } },
            el('button', {
              className: 'btn ' + (side === 'gov' ? 'btn-primary' : 'btn-secondary'),
              onClick: () => setSide('gov'), style: { flex: 1, padding: '10px 8px', fontSize: '.88rem', minWidth: 0 },
            }, t('debateBot.gov','Gov')),
            el('button', {
              className: 'btn ' + (side === 'opp' ? 'btn-primary' : 'btn-secondary'),
              onClick: () => setSide('opp'), style: { flex: 1, padding: '10px 8px', fontSize: '.88rem', minWidth: 0 },
            }, t('debateBot.opp','Opp')),
          ),
        ),
        el('div', {style:{minWidth:0}},
          el('label', { className: 'field-label green' }, t('caseGen.format','Format')),
          el('select', { value: botFormat, onChange: e => setBotFormat(e.target.value), style: { marginTop: 8, width: '100%' } },
            ['APDA', 'BP', 'WSDC', 'AP', 'KP'].map(f => el('option', { key: f, value: f }, f))
          ),
        ),
      ),
      el('div', { style: { marginTop: 24 } },
        el('button', {
          className: 'btn btn-orange',
          onClick: startDebate,
          disabled: !motion.trim(),
          style: { padding: '16px 48px', fontSize: '1.1rem', borderRadius: 14, width: '100%' },
        }, t('debateBot.start', 'Challenge the Machine'))
      ),
    );
  }

  // ── Debate in progress ──
  const playerExchanges = exchanges.filter(e => e.role === 'player').length;
  const botExchanges = exchanges.filter(e => e.role === 'bot').length;
  const isPlayerTurn = !botLoading && !finished && (
    (side === 'gov' && playerExchanges <= botExchanges) ||
    (side === 'opp' && playerExchanges < botExchanges)
  );
  const speechNumber = exchanges.length + 1;

  return el('div', { className: 'panel panel-expanded' },
    // Header
    el('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 } },
      el('div', null,
        el('div', { style: { fontSize: '.78rem', color: '#94a3b8', textTransform: 'uppercase', letterSpacing: '1px', fontWeight: 700 } },
          '\uD83E\uDD16 ' + t('debateBot.title', 'Debate the Bot')
        ),
        el('div', { style: { fontSize: '.88rem', color: '#e0e7ef', marginTop: 4 } },
          motion.length > 80 ? motion.substring(0, 80) + '...' : motion
        ),
      ),
      el('button', { className: 'btn btn-secondary btn-sm', onClick: reset }, t('debateBot.endDebate', 'End Debate')),
    ),

    // Progress dots
    el('div', { className: 'mobile-progress-dots', style: { display: 'flex', gap: 6, marginBottom: 24, justifyContent: 'center' } },
      Array.from({ length: MAX_EXCHANGES }, (_, i) => {
        const done = i < exchanges.length;
        const current = i === exchanges.length;
        const isBot = (side === 'gov') ? (i % 2 === 1) : (i % 2 === 0);
        return el('div', {
          key: i,
          style: {
            width: 40, height: 40, borderRadius: 10, display: 'flex', flexDirection: 'column',
            alignItems: 'center', justifyContent: 'center', fontSize: '.65rem', fontWeight: 700,
            background: current ? (isBot ? '#3b82f620' : '#ef444420') : done ? '#22c55e15' : '#ffffff06',
            border: '1.5px solid ' + (current ? (isBot ? '#3b82f6' : '#ef4444') : done ? '#22c55e40' : '#ffffff20'),
            color: current ? (isBot ? '#60a5fa' : '#f87171') : done ? '#4ade80' : '#566478',
          },
        },
          el('div', null, i + 1),
          el('div', { style: { fontSize: '.55rem', opacity: .7 } }, isBot ? 'BOT' : 'YOU'),
        );
      })
    ),

    // Exchange history
    exchanges.length > 0 && el('div', {
      ref: scrollRef,
      className: 'mobile-exchanges',
      style: { maxHeight: 400, overflowY: 'auto', marginBottom: 20, borderRadius: 12, border: '1px solid #ffffff18' },
    },
      exchanges.map((ex, i) => {
        const isBot = ex.role === 'bot';
        return el('div', {
          key: i,
          style: {
            padding: '16px 20px', borderBottom: '1px solid #ffffff08',
            background: isBot ? '#3b82f608' : '#ef444408',
          },
        },
          el('div', { style: { display: 'flex', alignItems: 'center', gap: 8, marginBottom: 8 } },
            el('span', { style: { fontSize: '1rem' } }, isBot ? '\uD83E\uDD16' : '\uD83C\uDFD9\uFE0F'),
            el('span', { style: {
              fontSize: '.78rem', fontWeight: 700, letterSpacing: '.5px',
              color: isBot ? '#60a5fa' : '#f87171',
            } }, isBot ? t('debateBot.machine', 'The Machine') : t('debateBot.you', 'You')),
            el('span', { style: { fontSize: '.68rem', color: '#566478', marginLeft: 'auto' } }, 'Speech ' + (i + 1)),
          ),
          el('div', { className: ex.streaming ? 'output streaming-active' : '', style: {
            fontSize: '.88rem', color: '#c8d5e3', lineHeight: 1.7, whiteSpace: 'pre-wrap',
          } }, ex.text),
        );
      })
    ),

    // Bot loading
    botLoading && el(LoadingBar, { label: t('debateBot.thinking', 'The Machine is thinking...') }),

    // Player input
    isPlayerTurn && el('div', { style: { marginBottom: 20 } },
      el('div', { style: {
        display: 'flex', justifyContent: 'space-between', alignItems: 'center',
        marginBottom: 12, padding: '12px 18px', borderRadius: 10,
        background: '#ef444410', border: '1px solid #ef444430',
      } },
        el('div', null,
          el('div', { style: { fontSize: '1rem', fontWeight: 800, color: '#f87171' } },
            t('debateBot.yourTurn', 'Your turn') + ' \u2014 Speech ' + speechNumber
          ),
          el('div', { style: { fontSize: '.82rem', color: '#94a3b8', marginTop: 2 } },
            exchanges.length === 0
              ? t('debateBot.openingHint', 'Open with your framework and arguments')
              : speechNumber >= MAX_EXCHANGES
              ? t('debateBot.closingHint', 'Final speech \u2014 crystallize and weigh')
              : t('debateBot.respondHint', 'Respond to The Machine and extend your case')
          ),
        ),
        el('div', { style: { display: 'flex', gap: 8 } },
          el('button', {
            className: recording ? 'btn btn-record' : 'btn btn-secondary btn-sm',

            style: recording ? { animation: 'pulse 1.5s infinite' } : {},

        ),
      ),
      el('textarea', {

        className: 'practice-textarea',

        value: inputText,
        onChange: e => setInputText(e.target.value),
        rows: 8,
        style: { minHeight: 160 },
      }),
      el('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: 12 } },
        el('span', { style: { fontSize: '.78rem', color: '#566478' } },

    // Error

    finished && el('div', null,

      ),

      feedbackLoading && el(LoadingBar, { label: t('debateBot.judging', 'Analyzing your performance...') }),

      feedback && el('div', { className: feedbackLoading ? 'output streaming-active' : '', style: {

          if (navigator.clipboard) navigator.clipboard.writeText(

            '\n\n--- COACH FEEDBACK ---\n' + (feedback || '')
          );
        } }, t('common.copy', 'Copy') + ' Transcript'),

    ),
  );
}

function FeedbackModal({ onClose, currentTab }) {
  const el = React.createElement;
  const [category, setCategory] = useState('bug');
  const [description, setDescription] = useState('');
  const [screenshots, setScreenshots] = useState([]);
  const [sending, setSending] = useState(false);
  const [sent, setSent] = useState(false);
  const [selectedText, setSelectedText] = useState('');
  const fileRef = useRef(null);

  // Capture any selected text on the page when modal opens
  useEffect(() => {
    try { const sel = window.getSelection().toString().trim(); if (sel) setSelectedText(sel); } catch(e) {}
  }, []);

  const categories = [
    { id: 'bug', label: '\uD83D\uDC1B Bug Report' },
    { id: 'ui', label: '\uD83C\uDFA8 UI Issue' },
    { id: 'feature', label: '\u2728 Feature Request' },
    { id: 'content', label: '\uD83D\uDCDD Content Issue' },
    { id: 'other', label: '\uD83D\uDCAC Other' },
  ];

  const handlePaste = (e) => {
    const items = e.clipboardData?.items;
    if (!items) return;
    for (const item of items) {
      if (item.type.startsWith('image/')) {
        e.preventDefault();
        const blob = item.getAsFile();
        const reader = new FileReader();
        reader.onload = () => setScreenshots(prev => [...prev.slice(0, 4), reader.result]);
        reader.readAsDataURL(blob);
      }
    }
  };

  const handleFileUpload = (e) => {
    const files = Array.from(e.target.files || []);
    files.forEach(file => {
      if (!file.type.startsWith('image/') || file.size > 5 * 1024 * 1024) return;
      const reader = new FileReader();
      reader.onload = () => setScreenshots(prev => [...prev.slice(0, 4), reader.result]);
      reader.readAsDataURL(file);
    });
  };

  const removeScreenshot = (idx) => setScreenshots(prev => prev.filter((_, i) => i !== idx));

  const submit = async () => {
    if (!description.trim() && screenshots.length === 0) return;
    setSending(true);
    try {
      // Store feedback to Firestore
      if (window.firebaseDb) {
        await window.firebaseDb.collection('feedback').add({
          category,
          description: description.trim(),
          selectedText: selectedText || null,
          screenshotCount: screenshots.length,
          screenshots: screenshots.slice(0, 2), // store up to 2 screenshots (base64)
          currentTab: currentTab || 'unknown',
          userAgent: navigator.userAgent,
          screenSize: window.innerWidth + 'x' + window.innerHeight,
          uid: window.__currentUser?.uid || 'anonymous',
          email: window.__currentUser?.email || null,
          createdAt: window.firebase?.firestore?.FieldValue?.serverTimestamp() || new Date(),
          url: window.location.href,
        });
      }
      // Also send email as backup
      const body = `Category: ${category}\nTab: ${currentTab}\n${selectedText ? 'Selected text: ' + selectedText + '\n' : ''}\n${description}\n\n[${screenshots.length} screenshot(s) attached in Firestore]`;
      window.open('mailto:debateOSsupport@gmail.com?subject=Feedback: ' + encodeURIComponent(category) + '&body=' + encodeURIComponent(body));
      setSent(true);
    } catch(e) {
      alert('Error sending feedback. Please try again.');
    }
    setSending(false);
  };

  if (sent) return el('div', { className: 'feedback-modal-overlay', onClick: onClose },
    el('div', { className: 'feedback-modal', onClick: e => e.stopPropagation(), style: { textAlign: 'center', padding: '48px 32px' } },
      el('div', { style: { fontSize: '2.5rem', marginBottom: 12 } }, '\u2705'),
      el('h3', null, 'Thanks for the feedback!'),
      el('p', { style: { color: '#94a3b8', fontSize: '.9rem' } }, 'Your feedback helps make Devil\'s Advocate better.'),
      el('button', { className: 'btn btn-secondary', onClick: onClose, style: { marginTop: 16 } }, 'Close'),
    )
  );

  return el('div', { className: 'feedback-modal-overlay', onClick: onClose },
    el('div', { className: 'feedback-modal', onClick: e => e.stopPropagation(), onPaste: handlePaste },
      el('h3', null, '\uD83D\uDCE8 Send Feedback'),
      // Context info
      el('div', { className: 'feedback-context' },
        'Current tab: ', el('strong', null, currentTab || 'unknown'),
        selectedText && [' \u2022 ', el('span', { key: 'sel' }, 'Selected: "', el('em', null, selectedText.slice(0, 80) + (selectedText.length > 80 ? '...' : '')), '"')],
      ),
      // Category selector
      el('div', { className: 'feedback-cats' },
        categories.map(c => el('button', {
          key: c.id, className: 'feedback-cat' + (category === c.id ? ' active' : ''),
          onClick: () => setCategory(c.id),
        }, c.label))
      ),
      // Description
      el('textarea', {
        value: description, onChange: e => setDescription(e.target.value),
        placeholder: category === 'bug' ? 'Describe the bug: what happened, what you expected, steps to reproduce...'
          : category === 'ui' ? 'What looks off? Describe the visual issue...'
          : category === 'feature' ? 'What feature would you like to see? How would it work?'
          : 'Describe your feedback...',
      }),
      // Screenshot area
      el('div', { style: { marginTop: 12 } },
        el('div', { style: { fontSize: '.75rem', color: '#64748b', marginBottom: 8 } }, 'Screenshots (paste from clipboard or upload, max 5):'),
        el('div', { className: 'feedback-screenshots' },
          screenshots.map((src, i) => el('div', { key: i, style: { position: 'relative' } },
            el('img', { src, className: 'feedback-screenshot-thumb', onClick: () => removeScreenshot(i), title: 'Click to remove' }),
          )),
          screenshots.length < 5 && el('div', { className: 'feedback-upload-zone', onClick: () => fileRef.current?.click() }, '+'),
        ),
        el('input', { ref: fileRef, type: 'file', accept: 'image/*', multiple: true, style: { display: 'none' }, onChange: handleFileUpload }),
      ),
      // Actions
      el('div', { className: 'feedback-actions' },
        el('button', { className: 'btn btn-secondary', onClick: onClose }, 'Cancel'),
        el('button', { className: 'btn btn-primary', onClick: submit, disabled: sending || (!description.trim() && screenshots.length === 0) },
          sending ? 'Sending...' : 'Send Feedback'
        ),
      ),
    )
  );
}

function TeamDashboard({ user, team, teamLoading, onTeamCreated, anonTrial }) {
  const { t } = React.useContext(I18nContext);
  const el = React.createElement;
  const isMobile = useIsMobile();
  const [creating, setCreating] = useState(false);
  const [teamName, setTeamName] = useState('');
  const [members, setMembers] = useState([]);
  const [inviteEmail, setInviteEmail] = useState('');
  const [msg, setMsg] = useState('');
  const [actionLoading, setActionLoading] = useState(false);
  const [checkoutPlan, setCheckoutPlan] = useState(null);
  const [copied, setCopied] = useState(false);
  const [friendEmail, setFriendEmail] = useState('');
  const [editingTeam, setEditingTeam] = useState(false);
  const [editName, setEditName] = useState('');
  const [editContext, setEditContext] = useState('');
  // Writing style profile
  const [styleInstructions, setStyleInstructions] = useState('');
  const [styleTone, setStyleTone] = useState('balanced');
  const [styleFramework, setStyleFramework] = useState('mixed');
  const [styleDetail, setStyleDetail] = useState('standard');
  const [caseSamples, setCaseSamples] = useState(['','','']);
  const [styleSaving, setStyleSaving] = useState(false);
  const [styleSaved, setStyleSaved] = useState(false);

  // Load style profile from Firestore
  useEffect(() => {
    if (!user || !firebaseDb) return;
    firebaseDb.collection('user_profiles').doc(user.uid).get().then(doc => {
      if (doc.exists && doc.data().styleProfile) {
        const sp = doc.data().styleProfile;
        if (sp.instructions) setStyleInstructions(sp.instructions);
        if (sp.tone) setStyleTone(sp.tone);
        if (sp.framework) setStyleFramework(sp.framework);
        if (sp.detail) setStyleDetail(sp.detail);
        if (sp.samples) setCaseSamples(sp.samples.concat(['','','']).slice(0,3));
      }
    }).catch(() => {});
  }, [user]);

  const saveStyleProfile = async () => {
    if (!user || !firebaseDb) return;
    setStyleSaving(true);
    const profile = {
      instructions: styleInstructions.trim(),
      tone: styleTone,
      framework: styleFramework,
      detail: styleDetail,
      samples: caseSamples.filter(s => s.trim()),
    };
    try {
      await firebaseDb.collection('user_profiles').doc(user.uid).set({ styleProfile: profile }, { merge: true });
      window.__styleProfile = profile;
      setStyleSaved(true);
      setTimeout(() => setStyleSaved(false), 2000);
    } catch(err) { setMsg(errMsg(err)); }
    setStyleSaving(false);
  };

  const getToken = async () => user ? await user.getIdToken() : null;
  const errMsg = (err) => safeError(err);

  const referralLink = team ? (window.location.origin + '/?ref=' + (team.teamId || '')) : '';

  const copyLink = () => {
    navigator.clipboard.writeText(referralLink).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    }).catch(() => setMsg('Failed to copy. Try selecting the link manually.'));
  };

  const shareViaEmail = (email) => {
    const subject = encodeURIComponent('Join me on Devil\'s Advocate - Debate Engine');
    const body = encodeURIComponent('Hey! I\'ve been using Devil\'s Advocate (powered by DebateOS) to prep for debate rounds. It\'s an engine built specifically for competitive debaters — generates cases, simulates rounds, maps arguments, and gives judge-level feedback.\n\nCheck it out: ' + referralLink + '\n\nLet me know if you want to join my team!');
    const to = email ? encodeURIComponent(email.trim()) : '';
    window.open('mailto:' + to + '?subject=' + subject + '&body=' + body, '_self');
  };

  // Clear stale messages when team changes
  useEffect(() => { setMsg(''); }, [team]);

  useEffect(() => {
    if (!team) return;
    (async () => {
      try {
        const token = await getToken();
        const res = await fetch('/api/teams/members', { headers: { Authorization: 'Bearer ' + token } });
        if (res.ok) { const data = await res.json(); setMembers(data.members || []); }
      } catch {}
    })();
  }, [team]);

  const createTeam = async () => {
    if (!teamName.trim()) return;
    setActionLoading(true); setMsg('');
    try {
      const token = await getToken();
      const res = await fetch('/api/teams', {

function SharedCases({ user, team }) {
  const el = React.createElement;
  const { t } = React.useContext(I18nContext);
  const [sharedCases, setSharedCases] = useState([]);
  const [loading, setLoading] = useState(true);
  const [sharing, setSharing] = useState(false);
  const [selectedCase, setSelectedCase] = useState('');
  const [msg, setMsg] = useState('');
  const myCases = useMemo(() => loadSavedCases().filter(c => c.mode !== 'philosophy' && c.side !== 'Philosophy' && c.format !== 'Philosophy'), []);

  useEffect(() => {
    if (!team || !firebaseDb) { setLoading(false); return; }
    const unsub = firebaseDb.collection('shared_cases')
      .where('teamId', '==', team.teamId)
      .orderBy('sharedAt', 'desc')
      .limit(50)
      .onSnapshot(snap => {
        setSharedCases(snap.docs.map(d => ({ id: d.id, ...d.data() })));
        setLoading(false);
      }, () => setLoading(false));
    return () => unsub();
  }, [team]);

  const shareCase = async () => {
    if (!selectedCase || !team || !firebaseDb) return;
    setSharing(true);
    try {
      const c = myCases.find(x => x.id === selectedCase);
      if (!c) throw new Error('Case not found');
      await firebaseDb.collection('shared_cases').add({
        teamId: team.teamId,
        sharedBy: user.displayName || user.email || 'Unknown',
        sharedByUid: user.uid,
        motion: c.motion || 'Untitled',
        side: c.side || '',
        depth: c.depth || '',
        output: c.output || c.text || '',
        sharedAt: firebase.firestore.FieldValue.serverTimestamp(),
      });
      setMsg('Case shared with your team!');
      setSelectedCase('');
    } catch (err) { setMsg('Error: ' + (err?.message || 'Something went wrong')); }
    setSharing(false);
  };

  const importCase = (c) => {
    const cases = loadSavedCases();
    const newCase = { id: Date.now().toString(), motion: c.motion, side: c.side, depth: c.depth, output: c.output, savedAt: new Date().toISOString(), sharedFrom: c.sharedBy };
    persistCases([newCase, ...cases]);
    setMsg('Case imported to your saved cases!');
  };

  if (!user) return el('div', {className:'panel', style:{textAlign:'center',padding:60}},
    el('h2', {style:{fontSize:'1.4rem',color:'#e4e8f0',marginBottom:12}}, t('sharedCases.title','Team Case Library')),
    el('p', {style:{color:'#94a3b8',fontSize:'.92rem'}}, t('sharedCases.signInDesc','Sign in and join a team to share cases.')),
  );

  if (!team) return el('div', {className:'panel', style:{textAlign:'center',padding:60}},
    el('h2', {style:{fontSize:'1.4rem',color:'#e4e8f0',marginBottom:12}}, t('sharedCases.title','Team Case Library')),
    el('p', {style:{color:'#94a3b8',fontSize:'.92rem'}}, t('sharedCases.noTeamDesc','Create or join a team to share cases with teammates.')),
  );

  return el('div', {className:'panel'},
    el('div', {style:{marginBottom:20}},
      el('h2', {style:{fontSize:'1.4rem',fontWeight:800,color:'#e4e8f0',marginBottom:4}}, t('sharedCases.title','Team Case Library')),
      el('p', {style:{color:'#94a3b8',fontSize:'.92rem'}}, t('sharedCases.desc','Share and access cases across your team.')),
    ),
    myCases.length > 0 && el('div', {style:{display:'flex',gap:8,marginBottom:24,flexWrap:'wrap'}},
      el('select', {value:selectedCase, onChange:e=>setSelectedCase(e.target.value), style:{flex:1,minWidth:200,padding:'8px 12px',background:'#38383e',border:'1px solid #ffffff15',borderRadius:8,color:'#e2e8f0',fontSize:'.85rem',outline:'none'}},
        el('option', {value:''}, t('sharedCases.selectCase','Select a case to share...')),
        myCases.map(c => el('option', {key:c.id, value:c.id}, (c.motion||'Untitled').substring(0,60) + ' (' + (c.side||'?') + ')')),
      ),
      el('button', {onClick:shareCase, disabled:sharing||!selectedCase, style:{padding:'8px 16px',background:'#3b82f620',border:'1px solid #3b82f640',borderRadius:8,color:'#60a5fa',fontWeight:600,cursor:'pointer',fontSize:'.82rem'}}, sharing?t('sharedCases.sharing','Sharing...'):t('sharedCases.shareWithTeam','Share with Team')),
    ),
    msg && el('div', {style:{marginBottom:16,padding:'10px 16px',borderRadius:8,background:msg.startsWith('Error')?'#ef444420':'#22c55e20',color:msg.startsWith('Error')?'#f87171':'#4ade80',fontSize:'.85rem'}}, msg),
    loading ? el('div',{style:{textAlign:'center',color:'#64748b',padding:20}},t('sharedCases.loadingShared','Loading shared cases...')) :
    sharedCases.length === 0 ? el('div',{style:{textAlign:'center',color:'#64748b',padding:40,background:'#ffffff04',borderRadius:12}},t('sharedCases.noSharedYet','No shared cases yet. Share your first case above!')) :
    sharedCases.map(c => el('div', {key:c.id, style:{padding:16,background:'#ffffff04',border:'1px solid #ffffff08',borderRadius:10,marginBottom:8}},
      el('div', {style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}},
        el('div', null,
          el('div', {style:{color:'#e4e8f0',fontWeight:600,fontSize:'.95rem',marginBottom:2}}, c.motion || 'Untitled'),
          el('div', {style:{color:'#64748b',fontSize:'.78rem'}}, 'Shared by ' + (c.sharedBy||'Unknown') + (c.sharedAt ? ' \u00B7 ' + new Date(c.sharedAt.seconds ? c.sharedAt.seconds*1000 : c.sharedAt).toLocaleDateString() : '')),
        ),
        el('div', {style:{display:'flex',gap:6}},
          c.side && el('span', {style:{fontSize:'.7rem',padding:'2px 8px',borderRadius:4,background:c.side.toLowerCase()==='gov'?'#22c55e15':'#ef444415',color:c.side.toLowerCase()==='gov'?'#4ade80':'#f87171',fontWeight:600}}, c.side),
          el('button', {onClick:()=>importCase(c), style:{fontSize:'.75rem',padding:'2px 10px',background:'#3b82f615',border:'1px solid #3b82f630',borderRadius:4,color:'#60a5fa',cursor:'pointer',fontWeight:600}}, t('sharedCases.import','Import')),
        ),
      ),
      c.output && el('div', {style:{color:'#94a3b8',fontSize:'.82rem',lineHeight:1.6,maxHeight:80,overflow:'hidden',maskImage:'linear-gradient(to bottom, black 60%, transparent)'}}, c.output.substring(0,300) + '...'),
    )),
  );
}

function Analytics({ user, team }) {
  const el = React.createElement;
  const { t } = React.useContext(I18nContext);
  const [logs, setLogs] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    if (!team || !user) { setLoading(false); return; }
    (async () => {
      try {
        const token = await user.getIdToken();
        const res = await fetch('/api/teams/analytics', { headers: { Authorization: 'Bearer ' + token } });
        if (res.ok) {
          const data = await res.json();
          setLogs(data.logs || []);
        }
      } catch {}
      setLoading(false);
    })();
  }, [team, user]);

  if (!user || !team) return el('div', {className:'panel', style:{textAlign:'center',padding:60}},
    el('h2', {style:{fontSize:'1.4rem',color:'#e4e8f0',marginBottom:12}}, t('analytics.title','Analytics')),
    el('p', {style:{color:'#94a3b8',fontSize:'.92rem'}}, t('analytics.signInDesc','Sign in and join a team to view usage analytics.')),
  );

  const featureCounts = {};
  const dailyCounts = {};
  logs.forEach(l => {
    const f = l.feature || 'unknown';
    featureCounts[f] = (featureCounts[f] || 0) + 1;
    if (l.timestamp) {
      const d = new Date(l.timestamp);
      const day = d.toLocaleDateString('en-US', {month:'short',day:'numeric'});
      dailyCounts[day] = (dailyCounts[day] || 0) + 1;
    }
  });

  const topFeatures = Object.entries(featureCounts).sort((a,b)=>b[1]-a[1]);
  const dailyEntries = Object.entries(dailyCounts).slice(0,14).reverse();
  const maxDaily = Math.max(...dailyEntries.map(e=>e[1]), 1);
  const usagePct = team.usageLimit ? Math.round((team.usageThisPeriod / team.usageLimit) * 100) : 0;
  const featureColors = {case:'#ef4444',simulator:'#3b82f6',bot:'#3b82f6',battle:'#3b82f6',feedback:'#22c55e',vision:'#f59e0b',casual:'#8b5cf6',philosophy:'#ec4899',practice:'#14b8a6',judge:'#f97316'};

  return el('div', {className:'panel'},
    el('div', {style:{marginBottom:24}},
      el('h2', {style:{fontSize:'1.4rem',fontWeight:800,color:'#e4e8f0',marginBottom:4}}, t('analytics.title','Analytics')),

        {label:'Requests Used',value:(team.usageThisPeriod||0)+' / '+(team.usageLimit||0),color:usagePct>80?'#ef4444':'#22c55e'},

      ].map(s => el('div',{key:s.label,style:{padding:16,background:'#ffffff06',border:'1px solid #ffffff08',borderRadius:10,textAlign:'center'}},
        el('div',{style:{fontSize:'1.3rem',fontWeight:800,color:s.color}},s.value),
        el('div',{style:{fontSize:'.75rem',color:'#64748b',marginTop:4,fontWeight:600,textTransform:'uppercase',letterSpacing:'.5px'}},s.label),
      ))

    dailyEntries.length > 0 && el('div', {style:{marginBottom:28}},

function DebaterProfile({ logs, topFeatures, team }) {
  const el = React.createElement;
  const [analysis, setAnalysis] = useState(null);
  const [loading, setLoading] = useState(false);

  const analyze = async () => {
    setLoading(true);
    const featureSummary = topFeatures.map(([f,c]) => f + ': ' + c + ' uses').join(', ');
    const totalRequests = logs.length;
    const sysPrompt = `You are an elite debate coach who can read a debater's habits and thinking patterns from their tool usage data. You are perceptive, honest, and constructive. You identify thinking patterns, strengths, blind spots, and growth areas.

Format your response with these sections using markdown:
## Your Debater Profile
A 2-3 sentence summary of what kind of debater they are based on their patterns.

## Thinking Strengths
3-4 specific strengths you can infer from their usage (e.g. heavy feedback usage = self-critical, heavy philosophy = framework-oriented)

## Blind Spots
2-3 areas they might be neglecting based on what they DON'T use or use less.

## Growth Recommendations
3-4 specific, actionable suggestions for how to become a more well-rounded debater.

## Debater Archetype
Give them a fun, memorable archetype name (e.g. "The Philosopher King", "The War Room Strategist", "The Case Machine") with a one-line description.

Be specific and insightful. Don't be generic. Use the actual data to drive your analysis.`;

    const userPrompt = `Here is this debater's usage data from Devil's Advocate:

Total requests: ${totalRequests}
Feature breakdown: ${featureSummary}
Plan: ${team?.plan || 'unknown'}
Team size: ${team?.memberCount || 1}

Based on these usage patterns, analyze how this person thinks as a debater. What are their tendencies, strengths, and blind spots?`;

    try {
      let result = '';
      await callClaude(sysPrompt, userPrompt, (text) => { result = text; setAnalysis(text); }, { thinkBudget: 4000, maxTokens: 4000 });
      setAnalysis(result);
      // Save to Firestore via server function
      if (__getAuthToken) {
        try {
          const token = await __getAuthToken();
          if (token) {
            // Extract strengths/weaknesses from text
            const strengthMatch = result.match(/## Thinking Strengths\n([\s\S]*?)(?=\n## )/);
            const weakMatch = result.match(/## Blind Spots\n([\s\S]*?)(?=\n## )/);
            const strengths = strengthMatch ? strengthMatch[1].split('\n').filter(l=>l.trim().startsWith('-')).map(l=>l.replace(/^-\s*/,'').trim()) : [];
            const weaknesses = weakMatch ? weakMatch[1].split('\n').filter(l=>l.trim().startsWith('-')).map(l=>l.replace(/^-\s*/,'').trim()) : [];
            fetch('/api/save-profile', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
              body: JSON.stringify({ type: 'debater_profile', analysis: result, strengths, weaknesses }),
            }).catch(() => {});
          }
        } catch(e) {}
      }
    } catch(e) {
      setAnalysis('Error generating analysis: ' + e.message);
    }
    setLoading(false);
  };

  // Load saved profile on mount
  useEffect(() => {

      if (doc.exists && doc.data().debaterProfile && doc.data().debaterProfile.analysis) {
        setAnalysis(doc.data().debaterProfile.analysis);
      }
    }).catch(() => {});
  }, []);

  return el('div', {style:{marginTop:28,padding:24,background:'linear-gradient(145deg,#303038,#38383e)',border:'1px solid #ffffff20',borderRadius:14}},

    el('p', {style:{color:'#a8b8c8',fontSize:'.85rem',marginBottom:16}}, 'Get deep analysis of how you think as a debater based on your usage patterns.'),
    !analysis && el('button', {

      onClick: analyze,
      disabled: loading || logs.length < 3,
    }, loading
      ? el('span', null, el('span',{className:'spinner'}), ' Analyzing your patterns...')
      : 'How Do I Think as a Debater?'
    ),
    logs.length < 3 && !analysis && el('p', {style:{color:'#64748b',fontSize:'.78rem',marginTop:8}}, 'Use at least 3 features to unlock this analysis.'),
    analysis && el('div', {className:'output', style:{marginTop:16,padding:20,maxHeight:'none',minHeight:0,fontSize:'.88rem'}},

      el('button', {className:'btn btn-secondary', onClick:() => { setAnalysis(null); }}, 'Regenerate'),
      el('button', {className:'btn btn-purple', onClick:analyze, disabled:loading}, loading ? 'Refreshing...' : 'Refresh Analysis'),
    ),
  );
}

function parseTime(t) {
  if (t.includes(':')) { const [m,s] = t.split(':').map(Number); return m*60+s; }
  return parseInt(t)*60;
}

function RoundTimer() {
  const el = React.createElement;
  const isMobile = useIsMobile();
  const [format, setFormat] = useState('APDA');
  const [speechIdx, setSpeechIdx] = useState(0);
  const [timeLeft, setTimeLeft] = useState(0);
  const [running, setRunning] = useState(false);
  const [paused, setPaused] = useState(false);
  const [started, setStarted] = useState(false);
  const intervalRef = useRef(null);
  const audioCtx = useRef(null);

  // Flow sheet state
  const [showFlow, setShowFlow] = useState(false);
  const [flowData, setFlowData] = useState({});
  const flowKey = useRef('debateos_flow_' + Date.now());

  const speeches = GLOBAL_FORMAT_SPEECHES[format] || GLOBAL_FORMAT_SPEECHES.APDA;
  const currentSpeech = speeches[speechIdx];
  const totalTime = currentSpeech ? parseTime(currentSpeech.time) : 0;

  const beep = (freq = 800, dur = 200) => {
    try {
      if (!audioCtx.current) audioCtx.current = new (window.AudioContext || window.webkitAudioContext)();
      const osc = audioCtx.current.createOscillator();
      const gain = audioCtx.current.createGain();
      osc.connect(gain); gain.connect(audioCtx.current.destination);
      osc.frequency.value = freq; gain.gain.value = 0.3;
      osc.start(); osc.stop(audioCtx.current.currentTime + dur/1000);
    } catch {}
  };

  useEffect(() => {
    if (running && !paused) {
      intervalRef.current = setInterval(() => {
        setTimeLeft(prev => {
          if (prev <= 1) { clearInterval(intervalRef.current); setRunning(false); setPaused(false); beep(1000, 500); return 0; }
          if (prev === 31) beep(600, 150);
          if (prev === 16) beep(700, 150);
          return prev - 1;
        });
      }, 1000);
    }
    return () => clearInterval(intervalRef.current);
  }, [running, paused]);

  const startTimer = () => {
    setTimeLeft(totalTime);
    setRunning(true); setPaused(false); setStarted(true);
  };
  const togglePause = () => { if (running) { setPaused(!paused); if (!paused) clearInterval(intervalRef.current); } };
  const resetTimer = () => { clearInterval(intervalRef.current); setRunning(false); setPaused(false); setTimeLeft(totalTime); };
  const nextSpeech = () => { if (speechIdx < speeches.length - 1) { clearInterval(intervalRef.current); setRunning(false); setPaused(false); setSpeechIdx(speechIdx + 1); setTimeLeft(parseTime(speeches[speechIdx + 1].time)); } };
  const prevSpeech = () => { if (speechIdx > 0) { clearInterval(intervalRef.current); setRunning(false); setPaused(false); setSpeechIdx(speechIdx - 1); setTimeLeft(parseTime(speeches[speechIdx - 1].time)); } };

  const mins = Math.floor(timeLeft / 60);
  const secs = timeLeft % 60;
  const pct = totalTime > 0 ? ((totalTime - timeLeft) / totalTime) * 100 : 0;
  const timerColor = timeLeft <= 15 ? '#ef4444' : timeLeft <= 30 ? '#f59e0b' : '#22c55e';

  const updateFlow = (idx, val) => setFlowData(prev => ({...prev, [idx]: val}));

  // Save flow to localStorage
  useEffect(() => {
    if (Object.keys(flowData).length > 0) {
      try { localStorage.setItem(flowKey.current, JSON.stringify(flowData)); } catch {}
    }
  }, [flowData]);

  return el('div', {className:'panel'},
    // Format selector
    !started ? el('div', null,
      el('div', {style:{textAlign:'center',marginBottom:32}},
        el('div', {style:{fontSize:'1.5rem',fontWeight:900,color:'#e4e8f0',marginBottom:8}}, '\u23F1\uFE0F Round Timer'),
        el('div', {style:{fontSize:'.88rem',color:'#94a3b8'}}, 'Time your speeches with format-specific timers and audio alerts'),
      ),
      el('label', {className:'field-label'}, 'Format'),
      el('select', {value:format, onChange:e=>{setFormat(e.target.value);setSpeechIdx(0);}, style:{marginBottom:24,width:'100%'}},
        Object.keys(GLOBAL_FORMAT_SPEECHES).map(f => el('option',{key:f,value:f},f))
      ),
      el('div', {style:{marginBottom:24}},
        el('div', {style:{fontSize:'.82rem',color:'#94a3b8',marginBottom:12,fontWeight:600}}, 'Speech Order'),
        speeches.map((s,i) => el('div', {key:i, style:{
          display:'flex',alignItems:'center',gap:12,padding:'10px 16px',
          background:i%2===0?'#ffffff04':'transparent',borderRadius:8,
        }},
          el('div', {style:{width:28,height:28,borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'.7rem',fontWeight:700,background:s.side==='gov'?'#3b82f615':'#ef444415',color:s.side==='gov'?'#60a5fa':'#f87171',border:'1px solid '+(s.side==='gov'?'#3b82f630':'#ef444430')}}, i+1),
          el('div', {style:{flex:1}},
            el('div', {style:{fontSize:'.88rem',fontWeight:700,color:'#e4e8f0'}}, s.code + ' \u2014 ' + s.title),
          ),
          el('div', {style:{fontSize:'.82rem',color:'#94a3b8',fontWeight:600}}, s.time),
        ))
      ),
      el('button', {className:'btn btn-orange', onClick:()=>{setStarted(true);setTimeLeft(parseTime(speeches[0].time));}, style:{width:'100%',padding:'16px',fontSize:'1.1rem'}}, 'Start Round'),
    )

    // Active timer
    : el('div', null,
      // Speech progress bar
      el('div', {style:{display:'flex',gap:4,marginBottom:20,flexWrap:'wrap',justifyContent:'center'}},
        speeches.map((s,i) => el('div', {key:i, onClick:()=>{
          clearInterval(intervalRef.current); setRunning(false); setPaused(false);
          setSpeechIdx(i); setTimeLeft(parseTime(s.time));
        }, style:{
          padding:isMobile?'4px 8px':'6px 12px',borderRadius:8,cursor:'pointer',fontSize:isMobile?'.6rem':'.7rem',fontWeight:700,
          background:i===speechIdx?(s.side==='gov'?'#3b82f620':'#ef444420'):i<speechIdx?'#22c55e10':'#ffffff06',
          border:'1.5px solid '+(i===speechIdx?(s.side==='gov'?'#3b82f6':'#ef4444'):i<speechIdx?'#22c55e30':'#ffffff20'),
          color:i===speechIdx?(s.side==='gov'?'#60a5fa':'#f87171'):i<speechIdx?'#4ade80':'#566478',
        }}, s.code))
      ),

      // Current speech info
      el('div', {style:{textAlign:'center',marginBottom:16}},

// ── Prep Room / Tournament Mode ─────────────────
function PrepRoom({ onNavigateTab }) {
  const el = React.createElement;
  const isMobile = useIsMobile();
  const [phase, setPhase] = useState('setup'); // setup | active | done
  const [motion, setMotion] = useState('');
  const [side, setSide] = useState('gov');
  const [format, setFormat] = useState('APDA');
  const [countdown, setCountdown] = useState(900); // 15 minutes
  const [running, setRunning] = useState(false);
  const [research, setResearch] = useState('');
  const [researchLoading, setResearchLoading] = useState(false);
  const [caseNotes, setCaseNotes] = useState('');
  const [args, setArgs] = useState([{title:'',warrant:'',impact:''}]);
  const [argGenLoading, setArgGenLoading] = useState(false);
  const intervalRef = useRef(null);
  const audioCtx = useRef(null);

  const beep = (freq = 800, dur = 200) => {
    try {
      if (!audioCtx.current) audioCtx.current = new (window.AudioContext || window.webkitAudioContext)();
      const osc = audioCtx.current.createOscillator();
      const gain = audioCtx.current.createGain();
      osc.connect(gain); gain.connect(audioCtx.current.destination);
      osc.frequency.value = freq; gain.gain.value = 0.3;
      osc.start(); osc.stop(audioCtx.current.currentTime + dur/1000);
    } catch {}
  };

  useEffect(() => {
    if (phase === 'active' && running) {
      intervalRef.current = setInterval(() => {
        setCountdown(prev => {
          if (prev <= 1) { clearInterval(intervalRef.current); setRunning(false); setPhase('done'); beep(1000, 800); return 0; }
          if (prev === 601) beep(600, 150); // 10 min mark
          if (prev === 301) beep(700, 200); // 5 min mark
          if (prev === 121) beep(800, 200); // 2 min mark
          if (prev === 31) beep(900, 300); // 30 sec
          return prev - 1;
        });
      }, 1000);
    }
    return () => clearInterval(intervalRef.current);
  }, [phase, running]);

  const startPrep = () => {
    if (!motion.trim()) return;
    setPhase('active'); setRunning(true); setCountdown(900);
  };

  const doResearch = async () => {
    setResearchLoading(true);
    try {
      const token = __getAuthToken ? await __getAuthToken() : null;
      const headers = {'Content-Type':'application/json'};
      if (token) headers['Authorization'] = 'Bearer ' + token;
      const res = await fetch('/api/perplexity', {
        method:'POST', headers,
        body: JSON.stringify({query: 'Recent news and key facts relevant to this debate motion: "' + motion + '". Include specific statistics, events, and expert opinions that could be used as evidence.'}),
      });
      if (res.ok) { const d = await res.json(); setResearch(d.text || 'No results found.'); }
      else setResearch('Research unavailable. Try again or research manually.');
    } catch(e) { setResearch('Error: ' + (e.message || 'Could not fetch research')); }
    setResearchLoading(false);
  };

  const generateArg = async () => {
    setArgGenLoading(true);
    try {
      let result = '';
      await callClaude(
        'You generate debate arguments. Given a motion and side, produce ONE strong argument with a clear title (5-8 words), warrant (2-3 sentences explaining WHY this is true), and impact (1-2 sentences on WHY this matters). Format as JSON: {"title":"...","warrant":"...","impact":"..."}. No markdown.',
        'Motion: ' + motion + '\nSide: ' + (side === 'gov' ? 'Government/Proposition' : 'Opposition') + '\nFormat: ' + format + '\nExisting arguments: ' + args.filter(a=>a.title).map(a=>a.title).join(', '),
        (t) => { result = t; },
        { thinkBudget: 2000, maxTokens: 500 }
      );
      const cleaned = result.replace(/```json\s*/g,'').replace(/```\s*/g,'').trim();
      const parsed = JSON.parse(cleaned);
      setArgs(prev => [...prev, {title:parsed.title||'',warrant:parsed.warrant||'',impact:parsed.impact||''}]);
    } catch(e) { /* silent */ }
    setArgGenLoading(false);
  };

  const updateArg = (idx, field, val) => setArgs(prev => prev.map((a,i) => i===idx ? {...a,[field]:val} : a));
  const removeArg = (idx) => setArgs(prev => prev.filter((_,i) => i!==idx));
  const moveArg = (idx, dir) => {
    const newArgs = [...args];
    const swapIdx = idx + dir;
    if (swapIdx < 0 || swapIdx >= newArgs.length) return;
    [newArgs[idx], newArgs[swapIdx]] = [newArgs[swapIdx], newArgs[idx]];
    setArgs(newArgs);
  };

  const mins = Math.floor(countdown / 60);
  const secs = countdown % 60;
  const timerColor = countdown <= 120 ? '#ef4444' : countdown <= 300 ? '#f59e0b' : '#22c55e';

  const getTemplate = () => {
    const speeches = GLOBAL_FORMAT_SPEECHES[format] || GLOBAL_FORMAT_SPEECHES.APDA;
    const firstGov = speeches.find(s => s.side === 'gov');
    if (side === 'gov') return 'FRAMEWORK:\n\n\nARGUMENT 1:\nClaim: \nWarrant: \nImpact: \n\nARGUMENT 2:\nClaim: \nWarrant: \nImpact: \n\nPRE-EMPTS:\n- \n- ';
    return 'OFF-CASE:\nArgument 1: \nArgument 2: \n\nON-CASE RESPONSES:\n- Gov Arg 1: \n- Gov Arg 2: \n\nWEIGHING:\n';
  };

  // Setup phase
  if (phase === 'setup') return el('div', {className:'panel'},
    el('div', {style:{textAlign:'center',marginBottom:32}},
      el('div', {style:{fontSize:'1.5rem',fontWeight:900,color:'#e4e8f0',marginBottom:8}}, '\uD83C\uDFAF Prep Room'),
      el('div', {style:{fontSize:'.88rem',color:'#94a3b8',maxWidth:500,margin:'0 auto'}}, '15-minute tournament-style prep with integrated research, argument building, and case structuring'),
    ),
    el('label', {className:'field-label'}, 'Motion'),
    el('textarea', {value:motion, onChange:e=>setMotion(e.target.value), placeholder:'Enter the motion to prep...', rows:3}),
    el('div', {className:'mobile-grid-stack', style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginTop:20}},
      el('div', null,
        el('label', {className:'field-label green'}, 'Your Side'),
        el('div', {style:{display:'flex',gap:10,marginTop:8}},
          el('button', {className:'btn '+(side==='gov'?'btn-primary':'btn-secondary'), onClick:()=>setSide('gov'), style:{flex:1}}, 'Gov'),
          el('button', {className:'btn '+(side==='opp'?'btn-primary':'btn-secondary'), onClick:()=>setSide('opp'), style:{flex:1}}, 'Opp'),
        ),
      ),
      el('div', null,
        el('label', {className:'field-label green'}, 'Format'),
        el('select', {value:format, onChange:e=>setFormat(e.target.value), style:{marginTop:8,width:'100%'}},
          Object.keys(GLOBAL_FORMAT_SPEECHES).map(f => el('option',{key:f,value:f},f))
        ),
      ),
    ),
    el('button', {className:'btn btn-orange', onClick:startPrep, disabled:!motion.trim(), style:{width:'100%',marginTop:24,padding:'16px',fontSize:'1.1rem'}}, '\u23F1 Start 15-Minute Prep'),
  );

  // Active prep / Done phase
  return el('div', {className:'panel panel-expanded'},
    // Timer bar
    el('div', {style:{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 18px',background:timerColor+'10',border:'1px solid '+timerColor+'30',borderRadius:12,marginBottom:20}},
      el('div', {style:{display:'flex',alignItems:'center',gap:12}},
        el('div', {style:{fontSize:'1.8rem',fontWeight:900,fontFamily:"'IBM Plex Mono',monospace",color:timerColor}},
          String(mins).padStart(2,'0') + ':' + String(secs).padStart(2,'0')
        ),
        phase === 'done' && el('span', {style:{fontSize:'.88rem',fontWeight:700,color:'#ef4444'}}, 'TIME\'S UP'),
      ),
      el('div', {style:{display:'flex',gap:8}},
        phase === 'active' && el('button', {className:'btn btn-secondary btn-sm', onClick:()=>setRunning(!running)}, running ? '\u23F8 Pause' : '\u25B6 Resume'),
        el('button', {className:'btn btn-secondary btn-sm', onClick:()=>{clearInterval(intervalRef.current);setPhase('setup');setRunning(false);setCountdown(900);}}, '\u2190 Exit'),
      ),
    ),
    // Motion display
    el('div', {style:{padding:'10px 16px',background:'#ffffff06',borderRadius:10,marginBottom:20,fontSize:'.92rem',color:'#e4e8f0'}},
      el('span', {style:{color:'#94a3b8',fontSize:'.75rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'.5px'}}, (side==='gov'?'GOV':'OPP') + ' \u2014 '),
      motion,
    ),

    // Main content grid
    el('div', {className:'prep-room-grid', style:{display:'grid',gridTemplateColumns:isMobile?'1fr':'1fr 1fr',gap:20}},
      // Left column: Research + Arguments
      el('div', null,
        // Research section
        el('div', {style:{marginBottom:20}},
          el('div', {style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}},
            el('div', {style:{fontSize:'.82rem',fontWeight:700,color:'#60a5fa',textTransform:'uppercase',letterSpacing:'.5px'}}, '\uD83D\uDD0D Research'),
            el('button', {className:'btn btn-secondary btn-sm', onClick:doResearch, disabled:researchLoading, style:{fontSize:'.75rem'}},
              researchLoading ? 'Searching...' : 'Quick Research'
            ),
          ),
          research && el('div', {className:'research-output',style:{padding:14,background:'var(--card-bg,#363638)',border:'1px solid var(--card-border,#ffffff18)',borderRadius:10,fontSize:'.82rem',color:'#cbd5e1',lineHeight:1.7,maxHeight:250,overflowY:'auto',whiteSpace:'pre-wrap'}}, research),
        ),
        // Arguments
        el('div', null,
          el('div', {style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}},
            el('div', {style:{fontSize:'.82rem',fontWeight:700,color:'#f59e0b',textTransform:'uppercase',letterSpacing:'.5px'}}, '\u2694\uFE0F Arguments'),
            el('div', {style:{display:'flex',gap:6}},
              el('button', {className:'btn btn-secondary btn-sm', onClick:()=>setArgs(prev=>[...prev,{title:'',warrant:'',impact:''}]), style:{fontSize:'.72rem'}}, '+ Add'),
              el('button', {className:'btn btn-secondary btn-sm', onClick:generateArg, disabled:argGenLoading, style:{fontSize:'.72rem'}}, argGenLoading ? 'Generating...' : '\u2728 AI Generate'),
            ),
          ),
          args.map((arg,i) => el('div', {key:i, style:{padding:12,background:'#ffffff04',border:'1px solid #ffffff18',borderRadius:10,marginBottom:10}},
            el('div', {style:{display:'flex',gap:6,marginBottom:8,alignItems:'center'}},
              el('input', {value:arg.title, onChange:e=>updateArg(i,'title',e.target.value), placeholder:'Argument title', style:{flex:1,padding:'6px 10px',background:'var(--card-bg,#363638)',border:'1px solid var(--card-border,#ffffff18)',borderRadius:6,color:'#e4e8f0',fontSize:'.85rem',fontWeight:700,outline:'none'}}),
              el('button', {onClick:()=>moveArg(i,-1), disabled:i===0, style:{background:'none',border:'none',color:'#566478',cursor:'pointer',fontSize:'.8rem'}}, '\u25B2'),
              el('button', {onClick:()=>moveArg(i,1), disabled:i===args.length-1, style:{background:'none',border:'none',color:'#566478',cursor:'pointer',fontSize:'.8rem'}}, '\u25BC'),
              el('button', {onClick:()=>removeArg(i), style:{background:'none',border:'none',color:'#ef4444',cursor:'pointer',fontSize:'.8rem'}}, '\u2715'),
            ),
            el('textarea', {value:arg.warrant, onChange:e=>updateArg(i,'warrant',e.target.value), placeholder:'Warrant \u2014 WHY is this true?', rows:2, style:{marginBottom:6,fontSize:'.82rem',minHeight:'auto'}}),
            el('textarea', {value:arg.impact, onChange:e=>updateArg(i,'impact',e.target.value), placeholder:'Impact \u2014 WHY does this matter?', rows:1, style:{fontSize:'.82rem',minHeight:'auto'}}),
          )),
        ),
      ),

      // Right column: Case notes
      el('div', null,
        el('div', {style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}},
          el('div', {style:{fontSize:'.82rem',fontWeight:700,color:'#4ade80',textTransform:'uppercase',letterSpacing:'.5px'}}, '\uD83D\uDCDD Case Notes'),
          !caseNotes && el('button', {className:'btn btn-secondary btn-sm', onClick:()=>setCaseNotes(getTemplate()), style:{fontSize:'.72rem'}}, 'Load Template'),
        ),
        el('textarea', {value:caseNotes, onChange:e=>setCaseNotes(e.target.value), placeholder:'Write your case here...', style:{minHeight:isMobile?300:500,fontSize:'.85rem',lineHeight:1.7}}),
      ),
    ),

    // Done phase summary
    phase === 'done' && el('div', {className:'prep-done-panel',style:{marginTop:24,padding:20,background:'linear-gradient(145deg,#303038,#38383e)',border:'1px solid #22c55e30',borderRadius:16,textAlign:'center'}},
      el('div', {style:{fontSize:'1.2rem',fontWeight:800,color:'#4ade80',marginBottom:8}}, 'Prep Complete'),
      el('div', {style:{fontSize:'.88rem',color:'#94a3b8',marginBottom:16}}, 'You built ' + args.filter(a=>a.title).length + ' arguments in 15 minutes'),
      el('div', {style:{display:'flex',gap:10,justifyContent:'center',flexWrap:'wrap'}},
        onNavigateTab && el('button', {className:'btn btn-primary', onClick:()=>onNavigateTab('case')}, 'Open in Case Gen'),
        el('button', {className:'btn btn-secondary', onClick:()=>{setPhase('setup');setCountdown(900);}}, 'New Prep Session'),
      ),
    ),
  );
}

function LiveCalendar({ debates, selectedDate, onSelectDate }) {
  const el = React.createElement;
  const [viewDate, setViewDate] = useState(() => new Date());
  const year = viewDate.getFullYear(), month = viewDate.getMonth();
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const daysInPrev = new Date(year, month, 0).getDate();
  const today = new Date();
  const todayStr = today.toISOString().slice(0, 10);
  const selStr = selectedDate ? selectedDate.toISOString().slice(0, 10) : '';

  // Build debate date set
  const debateDates = new Set((debates || []).map(d => d.date ? d.date.slice(0, 10) : ''));

  const cells = [];
  // Previous month padding
  for (let i = firstDay - 1; i >= 0; i--) {
    const d = daysInPrev - i;
    cells.push({ day: d, current: false, date: new Date(year, month - 1, d) });
  }
  // Current month
  for (let d = 1; d <= daysInMonth; d++) {
    cells.push({ day: d, current: true, date: new Date(year, month, d) });
  }
  // Next month padding
  const remaining = 42 - cells.length;
  for (let d = 1; d <= remaining; d++) {
    cells.push({ day: d, current: false, date: new Date(year, month + 1, d) });
  }

  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  return el('div', { className: 'live-calendar' },
    el('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 } },
      el('button', { onClick: () => setViewDate(new Date(year, month - 1, 1)), style: { background: 'none', border: 'none', color: '#a8b8c8', cursor: 'pointer', fontSize: '1rem' } }, '\u2039'),
      el('span', { style: { fontSize: '.82rem', fontWeight: 700, color: '#e4e8f0' } }, monthNames[month] + ' ' + year),
      el('button', { onClick: () => setViewDate(new Date(year, month + 1, 1)), style: { background: 'none', border: 'none', color: '#a8b8c8', cursor: 'pointer', fontSize: '1rem' } }, '\u203A'),
    ),
    el('div', { className: 'live-cal-grid' },
      ['Su', 'Mo', 'Tu', 'We', 'Th', 'Fr', 'Sa'].map(d => el('div', { key: d, className: 'live-cal-header' }, d)),
      cells.map((c, i) => {
        const dateStr = c.date.toISOString().slice(0, 10);
        const isToday = dateStr === todayStr;
        const hasEvent = debateDates.has(dateStr);
        const isSelected = dateStr === selStr;
        return el('div', {
          key: i,
          className: 'live-cal-day' + (!c.current ? ' other-month' : '') + (isToday ? ' today' : '') + (hasEvent ? ' has-event' : '') + (isSelected ? ' selected' : ''),
          onClick: () => onSelectDate(c.date),
        }, c.day);
      })
    ),
    el('div', { style: { marginTop: 12, fontSize: '.72rem', color: '#666' } },
      (debates || []).filter(d => d.date && d.date.slice(0, 10) === selStr).length > 0
        ? (debates || []).filter(d => d.date && d.date.slice(0, 10) === selStr).length + ' debate(s) on this day'
        : selectedDate ? 'No debates scheduled' : 'Select a date'
    ),
  );
}

function LiveDebateCard({ debate, user, onJoin, onView }) {
  const el = React.createElement;
  const now = new Date();
  const debateDate = debate.date ? new Date(debate.date) : null;
  const isPast = debateDate && debateDate < now;
  const isToday = debateDate && debateDate.toDateString() === now.toDateString();
  const isSoon = debateDate && (debateDate - now) < 3600000 && (debateDate - now) > 0;
  const status = isPast ? 'completed' : (isToday || isSoon) ? 'live-now' : 'upcoming';
  const participants = debate.participants || [];
  const isJoined = user && participants.some(p => p.uid === user.uid);
  const isFull = debate.maxParticipants && participants.length >= debate.maxParticipants;

  return el('div', { className: 'live-card', onClick: () => onView(debate) },
    el('div', { style: { display: 'flex', gap: 8, marginBottom: 8, flexWrap: 'wrap' } },
      el('span', { className: 'live-badge ' + status }, status === 'live-now' ? 'Live' : status === 'completed' ? 'Done' : 'Upcoming'),
      debate.format && el('span', { className: 'live-badge format' }, debate.format),
    ),
    el('div', { className: 'live-card-motion' }, debate.motion),
    el('div', { className: 'live-card-meta' },
      debateDate && el('span', null, '\uD83D\uDCC5 ', debateDate.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' })),
      debateDate && el('span', null, '\u23F0 ', debateDate.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' })),
      el('span', null, '\uD83D\uDC65 ', participants.length + (debate.maxParticipants ? '/' + debate.maxParticipants : '')),
      debate.hostName && el('span', null, 'Host: ', debate.hostName),
    ),

function LiveDebates({ user, team, onNavigateTab }) {
  const el = React.createElement;
  const [debates, setDebates] = useState([]);
  const [view, setView] = useState('list'); // list | create | detail | video
  const [selectedDate, setSelectedDate] = useState(null);
  const [selectedDebate, setSelectedDebate] = useState(null);
  const [loading, setLoading] = useState(true);
  // Create form state
  const [motion, setMotion] = useState('');
  const [format, setFormat] = useState('APDA');
  const [debateDate, setDebateDate] = useState('');
  const [debateTime, setDebateTime] = useState('');
  const [debateTimezone, setDebateTimezone] = useState(() => Intl.DateTimeFormat().resolvedOptions().timeZone || 'America/New_York');
  const [maxParticipants, setMaxParticipants] = useState(4);
  const [videoType, setVideoType] = useState('jitsi'); // jitsi | zoom | custom
  const [customLink, setCustomLink] = useState('');
  const [creating, setCreating] = useState(false);
  const [filter, setFilter] = useState('upcoming'); // upcoming | all | mine

  // Load debates from Firestore
  useEffect(() => {
    if (!firebaseDb) { setLoading(false); return; }
    const unsub = firebaseDb.collection('live_debates').orderBy('date', 'asc').onSnapshot(snap => {
      const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      setDebates(data);
      setLoading(false);
    }, () => setLoading(false));
    return () => unsub();
  }, []);

  function generateJitsiRoom(motion) {
    const slug = motion.replace(/[^a-zA-Z0-9]/g, '').slice(0, 30);
    return 'DebateOS-' + slug + '-' + Date.now().toString(36);
  }

  async function createDebate() {
    if (!user) { alert('Please sign in to create a debate.'); return; }
    if (!motion.trim() || !debateDate || !debateTime) return;
    setCreating(true);
    try {
      const dateTime = new Date(debateDate + 'T' + debateTime);
      let videoLink = '';
      let jitsiRoom = '';
      if (videoType === 'jitsi') {
        jitsiRoom = generateJitsiRoom(motion);
        videoLink = 'https://meet.jit.si/' + jitsiRoom;
      } else if (videoType === 'zoom' || videoType === 'custom') {
        videoLink = customLink;
      }
      await firebaseDb.collection('live_debates').add({
        motion: motion.trim(),
        format: format,
        date: dateTime.toISOString(),
        maxParticipants: Number(maxParticipants) || 4,
        hostId: user.uid,
        hostName: user.displayName || user.email || 'Anonymous',
        participants: [{ uid: user.uid, name: user.displayName || user.email || 'Anonymous', joinedAt: new Date().toISOString() }],
        videoLink: videoLink,
        jitsiRoom: jitsiRoom,
        videoType: videoType,
        status: 'upcoming',
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      });
      setMotion(''); setDebateDate(''); setDebateTime(''); setCustomLink('');
      setView('list');
    } catch (e) {
      alert('Error creating debate: ' + e.message);
    }
    setCreating(false);
  }

  async function joinDebate(debate) {
    if (!user) { alert('Please sign in to join.'); return; }
    if (!firebaseDb) return;
    const existing = (debate.participants || []);
    if (existing.some(p => p.uid === user.uid)) return;
    await firebaseDb.collection('live_debates').doc(debate.id).update({
      participants: [...existing, { uid: user.uid, name: user.displayName || user.email || 'Anonymous', joinedAt: new Date().toISOString() }],
    });
  }

  async function cancelDebate(debateId) {
    if (!user || !firebaseDb) return;
    if (!confirm('Cancel this debate? This cannot be undone.')) return;
    try {
      await firebaseDb.collection('live_debates').doc(debateId).delete();
      setView('list');
      setSelectedDebate(null);
    } catch (e) {
      alert('Error canceling debate: ' + e.message);
    }
  }

  async function leaveDebate(debate) {
    if (!user || !firebaseDb) return;

    await firebaseDb.collection('live_debates').doc(debate.id).update({ participants: updated });

class ErrorBoundary extends React.Component {
  constructor(props) {

            React.createElement('button', {onClick:()=>window.location.reload(), style:{padding:'12px 28px',background:'#ef4444',border:'none',borderRadius:10,color:'#fff',fontSize:'.92rem',fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}, 'Reload App'),
            React.createElement('button', {onClick:()=>{try{localStorage.clear()}catch(x){}window.location.reload()}, style:{padding:'12px 28px',background:'transparent',border:'1.5px solid #ffffff20',borderRadius:10,color:'#94a3b8',fontSize:'.88rem',fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}, 'Clear Cache & Reload'),
          ),
          React.createElement('details', {style:{textAlign:'left',marginTop:16,background:'#22222a',borderRadius:10,padding:'12px 16px',border:'1px solid #ffffff0a'}},
            React.createElement('summary', {style:{cursor:'pointer',color:'#64748b',fontSize:'.78rem',fontWeight:600,letterSpacing:'.5px',textTransform:'uppercase'}}, 'Error Details (for debugging)'),
            React.createElement('pre', {style:{color:'#ef4444',fontSize:'.75rem',marginTop:10,whiteSpace:'pre-wrap',wordBreak:'break-word',lineHeight:1.5,maxHeight:200,overflow:'auto'}},

  }
