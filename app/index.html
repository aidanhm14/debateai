// ═══════════════════════════════════════════════════
//   MIND MAP — D3 Radial Tree Visualization
// ═══════════════════════════════════════════════════
function MindMapView({ caseResult, motion }) {
  const el = React.createElement;
  const canvasRef = useRef(null);
  const containerRef = useRef(null);
  const [tooltip, setTooltip] = useState(null);
  const [dimensions, setDimensions] = useState({ w: 900, h: 640 });

  const TYPE_COLORS = {
    root:'#e0e0e6', mechanism:'#818cf8', vision:'#a78bfa',
    section:'#6b6b80', argument:'#67e8f9', claim:'#818cf8',
    warrant:'#67e8f9', impact:'#f43f5e', spike:'#c084fc',
    turn:'#fbbf24', opposing:'#fb923c', turnMove:'#fbbf24', ballot:'#6ee7b7'
  };

  function caseToNodes(result, mot) {
    var nodes = [], links = [];
    var id = 0;
    var rootId = id++;
    nodes.push({ id: rootId, name: mot || 'Motion', type: 'root', detail: '', radius: 34, depth: 0 });
    if (!result) return { nodes: nodes, links: links };
    if (result.mechanism) {
      var nid = id++;
      nodes.push({ id: nid, name: 'Mechanism', type: 'mechanism', detail: result.mechanism, radius: 20, depth: 1 });
      links.push({ source: rootId, target: nid });
    }
    if (result.roundVision) {
      var nid = id++;
      nodes.push({ id: nid, name: 'Round Vision', type: 'vision', detail: result.roundVision, radius: 18, depth: 1 });
      links.push({ source: rootId, target: nid });
    }
    if (result.arguments && result.arguments.length) {
      result.arguments.forEach(function(arg, i) {
        var argId = id++;
        nodes.push({ id: argId, name: arg.label || ('Contention ' + (i+1)), type: 'argument', detail: '', radius: 22, depth: 1 });
        links.push({ source: rootId, target: argId });
        if (arg.claim) { var cid=id++; nodes.push({id:cid,name:'Claim',type:'claim',detail:arg.claim,radius:13,depth:2}); links.push({source:argId,target:cid}); }
        if (arg.warrant) { var wid=id++; nodes.push({id:wid,name:'Warrant',type:'warrant',detail:arg.warrant,radius:13,depth:2}); links.push({source:argId,target:wid}); }
        if (arg.impact) { var iid=id++; nodes.push({id:iid,name:'Impact',type:'impact',detail:arg.impact,radius:15,depth:2}); links.push({source:argId,target:iid}); }
      });
    }
    if (result.spikes && result.spikes.length) {
      result.spikes.forEach(function(s) {
        var sid = id++;
        nodes.push({ id: sid, name: s.label || 'Pre-empt', type: 'spike', detail: s.response, radius: 14, depth: 1 });
        links.push({ source: rootId, target: sid });
      });
    }
    if (result.turn) {
      var tid = id++;
      nodes.push({ id: tid, name: 'Turn', type: 'turn', detail: '', radius: 18, depth: 1 });
      links.push({ source: rootId, target: tid });
      if (result.turn.opposingArgument) { var oid=id++; nodes.push({id:oid,name:'Their Arg',type:'opposing',detail:result.turn.opposingArgument,radius:13,depth:2}); links.push({source:tid,target:oid}); }
      if (result.turn.turn) { var mid=id++; nodes.push({id:mid,name:'The Turn',type:'turnMove',detail:result.turn.turn,radius:14,depth:2}); links.push({source:tid,target:mid}); }
    }
    if (result.ballotFraming) {
      var bid = id++;
      nodes.push({ id: bid, name: 'Ballot', type: 'ballot', detail: result.ballotFraming, radius: 18, depth: 1 });
      links.push({ source: rootId, target: bid });
    }
    return { nodes: nodes, links: links };
  }

  useEffect(function() {
    if (!containerRef.current) return;
    var ro = new ResizeObserver(function(entries) {
      var e = entries[0];
      if (e) setDimensions({ w: e.contentRect.width || 900, h: Math.max(e.contentRect.height, 500) });
    });
    ro.observe(containerRef.current);
    return function() { ro.disconnect(); };
  }, []);

  useEffect(function() {
    if (!canvasRef.current || !caseResult || typeof d3 === 'undefined') return;
    var canvas = canvasRef.current;
    var ctx = canvas.getContext('2d');
    var W = dimensions.w, H = dimensions.h;
    var dpr = window.devicePixelRatio || 1;
    canvas.width = W * dpr; canvas.height = H * dpr;
    canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
    ctx.scale(dpr, dpr);

    var graph = caseToNodes(caseResult, motion);
    var nodes = graph.nodes.map(function(n) {
      return Object.assign({}, n, {
        x: W/2 + (Math.random() - 0.5) * 200,
        y: H/2 + (Math.random() - 0.5) * 200
      });
    });
    var links = graph.links.map(function(l) { return { source: l.source, target: l.target }; });

    var flowParticles = [];
    function spawnParticle() {
      if (links.length === 0) return;
      var li = Math.floor(Math.random() * links.length);
      var link = links[li];
      var s = typeof link.source === 'object' ? link.source : nodes[link.source];
      var t = typeof link.target === 'object' ? link.target : nodes[link.target];
      if (!s || !t) return;
      flowParticles.push({ link: li, t: 0, speed: 0.003 + Math.random() * 0.005, size: 1.2 + Math.random() * 2 });
    }

    var sim = d3.forceSimulation(nodes)
      .force('link', d3.forceLink(links).id(function(d) { return d.id; }).distance(function(d) {
        var s = typeof d.source === 'object' ? d.source : nodes[d.source];
        return s && s.depth === 0 ? 170 : 100;
      }).strength(0.5))
      .force('charge', d3.forceManyBody().strength(function(d) {
        return d.depth === 0 ? -700 : d.depth === 1 ? -300 : -150;
      }))
      .force('center', d3.forceCenter(W / 2, H / 2))
      .force('collision', d3.forceCollide().radius(function(d) { return d.radius + 12; }))
      .force('radial', d3.forceRadial(function(d) {
        return d.depth === 0 ? 0 : d.depth === 1 ? 160 : 280;
      }, W / 2, H / 2).strength(0.12))
      .alphaDecay(0.008)
      .velocityDecay(0.3);

    var frame = 0;
    var animId;
    var dragging = null;

    function hexToRgb(hex) {
      var r = parseInt(hex.slice(1, 3), 16);
      var g = parseInt(hex.slice(3, 5), 16);
      var b = parseInt(hex.slice(5, 7), 16);
      return [r, g, b];
    }

    function draw() {
      frame++;
      ctx.clearRect(0, 0, W, H);

      // Background
      var bgGrad = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, Math.max(W, H) * 0.7);
      bgGrad.addColorStop(0, '#303038');
      bgGrad.addColorStop(0.5, '#2b2b30');
      bgGrad.addColorStop(1, '#252528');
      ctx.fillStyle = bgGrad;
      ctx.fillRect(0, 0, W, H);

      // Subtle grid
      ctx.strokeStyle = 'rgba(255,255,255,0.015)';
      ctx.lineWidth = 0.5;
      for (var gx = 0; gx < W; gx += 60) { ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, H); ctx.stroke(); }
      for (var gy = 0; gy < H; gy += 60) { ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(W, gy); ctx.stroke(); }

      // Orbit rings
      ctx.strokeStyle = 'rgba(255,255,255,0.03)';
      ctx.lineWidth = 1;
      ctx.setLineDash([4, 8]);
      [160, 280].forEach(function(r) { ctx.beginPath(); ctx.arc(W / 2, H / 2, r, 0, Math.PI * 2); ctx.stroke(); });
      ctx.setLineDash([]);

      // Draw links
      links.forEach(function(link) {
        var s = typeof link.source === 'object' ? link.source : nodes[link.source];
        var t = typeof link.target === 'object' ? link.target : nodes[link.target];
        if (!s || !t) return;
        var sc = TYPE_COLORS[s.type] || '#555';
        var rgb = hexToRgb(sc);
        var pulse = 0.15 + Math.sin(frame * 0.02) * 0.05;
        var mx = (s.x + t.x) / 2 + (s.y - t.y) * 0.15;
        var my = (s.y + t.y) / 2 + (t.x - s.x) * 0.15;
        ctx.beginPath();
        ctx.moveTo(s.x, s.y);
        ctx.quadraticCurveTo(mx, my, t.x, t.y);
        ctx.strokeStyle = 'rgba(' + rgb[0] + ',' + rgb[1] + ',' + rgb[2] + ',' + pulse + ')';
        ctx.lineWidth = s.depth === 0 ? 2.5 : 1.5;
        ctx.stroke();
      });

      // Spawn and draw flow particles
      if (frame % 6 === 0) spawnParticle();
      var aliveParticles = [];
      flowParticles.forEach(function(p) {
        p.t += p.speed;
        if (p.t > 1) return;
        var link = links[p.link];
        var s = typeof link.source === 'object' ? link.source : nodes[link.source];
        var t = typeof link.target === 'object' ? link.target : nodes[link.target];
        if (!s || !t) return;
        var mx = (s.x + t.x) / 2 + (s.y - t.y) * 0.15;
        var my = (s.y + t.y) / 2 + (t.x - s.x) * 0.15;
        var u = 1 - p.t;
        var px = u * u * s.x + 2 * u * p.t * mx + p.t * p.t * t.x;
        var py = u * u * s.y + 2 * u * p.t * my + p.t * p.t * t.y;
        var col = TYPE_COLORS[t.type] || '#67e8f9';
        var crgb = hexToRgb(col);
        var alpha = Math.sin(p.t * Math.PI) * 0.9;
        ctx.beginPath();
        ctx.arc(px, py, p.size, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(' + crgb[0] + ',' + crgb[1] + ',' + crgb[2] + ',' + alpha + ')';
        ctx.fill();
        ctx.beginPath();
        ctx.arc(px, py, p.size * 3, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(' + crgb[0] + ',' + crgb[1] + ',' + crgb[2] + ',' + (alpha * 0.12) + ')';
        ctx.fill();
        aliveParticles.push(p);
      });
      flowParticles = aliveParticles;

      // Draw nodes
      nodes.forEach(function(node) {
        var col = TYPE_COLORS[node.type] || '#555';
        var rgb = hexToRgb(col);
        var r = node.radius;
        var pulse = node.type === 'root' ? Math.sin(frame * 0.03) * 4 : Math.sin(frame * 0.02 + node.id * 0.7) * 1.5;
        var drawR = r + pulse;

        // Outer glow
        var glowGrad = ctx.createRadialGradient(node.x, node.y, drawR * 0.5, node.x, node.y, drawR * 3);
        glowGrad.addColorStop(0, 'rgba(' + rgb[0] + ',' + rgb[1] + ',' + rgb[2] + ',0.12)');
        glowGrad.addColorStop(1, 'rgba(' + rgb[0] + ',' + rgb[1] + ',' + rgb[2] + ',0)');
        ctx.beginPath();
        ctx.arc(node.x, node.y, drawR * 3, 0, Math.PI * 2);
        ctx.fillStyle = glowGrad;
        ctx.fill();

        // Inner gradient fill
        var innerGrad = ctx.createRadialGradient(node.x - drawR * 0.3, node.y - drawR * 0.3, 0, node.x, node.y, drawR);
        innerGrad.addColorStop(0, 'rgba(' + Math.min(rgb[0] + 60, 255) + ',' + Math.min(rgb[1] + 60, 255) + ',' + Math.min(rgb[2] + 60, 255) + ',0.25)');
        innerGrad.addColorStop(0.7, 'rgba(' + rgb[0] + ',' + rgb[1] + ',' + rgb[2] + ',0.12)');
        innerGrad.addColorStop(1, 'rgba(' + rgb[0] + ',' + rgb[1] + ',' + rgb[2] + ',0.04)');
        ctx.beginPath();
        ctx.arc(node.x, node.y, drawR, 0, Math.PI * 2);
        ctx.fillStyle = innerGrad;
        ctx.fill();

        // Ring border
        ctx.beginPath();
        ctx.arc(node.x, node.y, drawR, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(' + rgb[0] + ',' + rgb[1] + ',' + rgb[2] + ',0.6)';
        ctx.lineWidth = node.depth === 0 ? 2.5 : 1.5;
        ctx.stroke();

        // Double ring for root
        if (node.type === 'root') {
          ctx.beginPath();
          ctx.arc(node.x, node.y, drawR + 6, 0, Math.PI * 2);
          ctx.strokeStyle = 'rgba(' + rgb[0] + ',' + rgb[1] + ',' + rgb[2] + ',0.2)';
          ctx.lineWidth = 1;
          ctx.setLineDash([3, 5]);
          ctx.stroke();
          ctx.setLineDash([]);
        }

        // Type icon inside node
        var icons = { root: '\u25C9', mechanism: '\u2699', vision: '\u25CE', argument: '\u25C6', claim: '\u25B8', warrant: '\u25B8', impact: '\u2B24', spike: '\u26A1', turn: '\u21BB', opposing: '\u25C0', turnMove: '\u27F6', ballot: '\u2696' };
        ctx.font = (node.depth === 0 ? '16px' : '11px') + ' sans-serif';
        ctx.fillStyle = 'rgba(' + rgb[0] + ',' + rgb[1] + ',' + rgb[2] + ',0.85)';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(icons[node.type] || '', node.x, node.y);

        // Label below node
        ctx.font = (node.depth === 0 ? 'bold 12px' : node.depth === 1 ? 'bold 10px' : '9px') + ' "IBM Plex Mono", monospace';
        ctx.fillStyle = 'rgba(' + rgb[0] + ',' + rgb[1] + ',' + rgb[2] + ',0.9)';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        var label = node.name || '';
        if (label.length > 22) label = label.substring(0, 20) + '..';
        ctx.fillText(label, node.x, node.y + drawR + 6);
      });

      animId = requestAnimationFrame(draw);
    }

    // Mouse interaction
    function getMousePos(e) {
      var rect = canvas.getBoundingClientRect();
      return { x: e.clientX - rect.left, y: e.clientY - rect.top };
    }
    function findNode(pos) {
      for (var i = nodes.length - 1; i >= 0; i--) {
        var n = nodes[i];
        var dx = pos.x - n.x, dy = pos.y - n.y;
        if (dx * dx + dy * dy < (n.radius + 8) * (n.radius + 8)) return n;
      }
      return null;
    }

    canvas.addEventListener('mousemove', function(e) {
      var pos = getMousePos(e);
      if (dragging) {
        dragging.fx = pos.x;
        dragging.fy = pos.y;
        sim.alpha(0.3).restart();
        return;
      }
      var node = findNode(pos);
      if (node && node.detail) {
        canvas.style.cursor = 'pointer';
        var rect = canvas.getBoundingClientRect();
        setTooltip({ x: e.clientX - rect.left, y: e.clientY - rect.top, name: node.name, type: node.type, detail: node.detail });
      } else {
        canvas.style.cursor = node ? 'grab' : 'default';
        setTooltip(null);
      }
    });

    canvas.addEventListener('mousedown', function(e) {
      var pos = getMousePos(e);
      var node = findNode(pos);
      if (node) {
        dragging = node;
        dragging.fx = pos.x;
        dragging.fy = pos.y;
        canvas.style.cursor = 'grabbing';
        sim.alphaTarget(0.3).restart();
      }
    });

    canvas.addEventListener('mouseup', function() {
      if (dragging) { dragging.fx = null; dragging.fy = null; dragging = null; }
      sim.alphaTarget(0);
      canvas.style.cursor = 'default';
    });

    canvas.addEventListener('mouseleave', function() {
      setTooltip(null);
      if (dragging) { dragging.fx = null; dragging.fy = null; dragging = null; }
    });

    draw();
    return function() { cancelAnimationFrame(animId); sim.stop(); };
  }, [caseResult, motion, dimensions]);

  var legendItems = [
    { type: 'mechanism', label: 'Mechanism' },
    { type: 'argument', label: 'Argument' },
    { type: 'impact', label: 'Impact' },
    { type: 'spike', label: 'Pre-empt' },
    { type: 'turn', label: 'Turn' },
    { type: 'ballot', label: 'Ballot' }
  ];

  return el('div', { ref: containerRef, style: { position: 'relative', width: '100%', height: 640, borderRadius: 18, overflow: 'hidden', marginTop: 16, border: '1px solid #ffffff1a', boxShadow: '0 8px 40px rgba(0,0,0,.5), inset 0 1px 0 #ffffff08' } },
    el('canvas', { ref: canvasRef, style: { width: '100%', height: '100%', display: 'block' } }),
    tooltip && el('div', { style: { position: 'absolute', left: Math.min(tooltip.x + 12, dimensions.w - 280), top: Math.max(tooltip.y - 10, 10), maxWidth: 260, padding: '12px 16px', background: '#303038ee', border: '1px solid ' + (TYPE_COLORS[tooltip.type] || '#555') + '50', borderRadius: 12, pointerEvents: 'none', zIndex: 10, boxShadow: '0 8px 32px rgba(0,0,0,.5)', backdropFilter: 'blur(12px)' } },
      el('div', { style: { fontSize: '.75rem', fontWeight: 700, color: TYPE_COLORS[tooltip.type] || '#ccc', marginBottom: 6, textTransform: 'uppercase', letterSpacing: '.08em' } }, tooltip.name),
      el('div', { style: { fontSize: '.82rem', color: '#c8cdd8', lineHeight: 1.5, fontFamily: 'IBM Plex Mono, monospace' } }, (tooltip.detail || '').length > 200 ? tooltip.detail.substring(0, 200) + '...' : tooltip.detail)),
    el('div', { style: { position: 'absolute', bottom: 12, left: 16, display: 'flex', gap: 10, flexWrap: 'wrap', padding: '8px 12px', background: '#2b2b3099', borderRadius: 10, border: '1px solid #ffffff08', backdropFilter: 'blur(8px)' } },
      legendItems.map(function(item) {
        return el('div', { key: item.type, style: { display: 'flex', alignItems: 'center', gap: 5 } },
          el('div', { style: { width: 8, height: 8, borderRadius: '50%', background: TYPE_COLORS[item.type], boxShadow: '0 0 6px ' + TYPE_COLORS[item.type] + '60' } }),
          el('span', { style: { fontSize: '.68rem', color: '#94a3b8', fontFamily: 'IBM Plex Mono, monospace' } }, item.label));
      })),
    el('div', { style: { position: 'absolute', top: 12, right: 16, fontSize: '.7rem', color: '#ffffff30', fontFamily: 'IBM Plex Mono, monospace' } }, 'drag nodes \u00B7 hover for details'));
}

function ArgumentMap({ mapData }) {
  const { t } = React.useContext(I18nContext);
  const el = React.createElement;
  const containerRef = useRef(null);
  const [paths, setPaths] = useState([]);
  const [hoveredClash, setHoveredClash] = useState(null);
  const [hoveredNode, setHoveredNode] = useState(null); // {type:'gov'|'opp', idx}

  // Build linked sets for highlighting
  const linkedGov = useMemo(() => {
    if (hoveredClash === null) return null;
    const clash = (mapData?.clashes || [])[hoveredClash];
    return clash ? new Set(clash.govLinks || []) : new Set();
  }, [hoveredClash, mapData]);
  const linkedOpp = useMemo(() => {
    if (hoveredClash === null) return null;
    const clash = (mapData?.clashes || [])[hoveredClash];
    return clash ? new Set(clash.oppLinks || []) : new Set();
  }, [hoveredClash, mapData]);
  // Reverse lookup: which clashes link to a hovered gov/opp node
  const linkedClashes = useMemo(() => {
    if (!hoveredNode || !mapData) return null;
    const set = new Set();
    (mapData.clashes || []).forEach((c, ci) => {
      if (hoveredNode.type === 'gov' && (c.govLinks || []).includes(hoveredNode.idx)) set.add(ci);
      if (hoveredNode.type === 'opp' && (c.oppLinks || []).includes(hoveredNode.idx)) set.add(ci);
    });
    return set;
  }, [hoveredNode, mapData]);

  // Compute bezier paths between nodes
  useEffect(() => {
    if (!containerRef.current || !mapData) return;
    const timer = setTimeout(() => {
      const container = containerRef.current;
      if (!container) return;
      const rect = container.getBoundingClientRect();
      const newPaths = [];
      (mapData.clashes || []).forEach((clash, ci) => {
        (clash.govLinks || []).forEach(gIdx => {
          const govEl = container.querySelector('[data-gov="'+gIdx+'"]');
          const clashEl = container.querySelector('[data-clash="'+ci+'"]');
          if (govEl && clashEl) {
            const gr = govEl.getBoundingClientRect();
            const cr = clashEl.getBoundingClientRect();
            const x1 = gr.right - rect.left;
            const y1 = gr.top + gr.height/2 - rect.top;
            const x2 = cr.left - rect.left;
            const y2 = cr.top + cr.height/2 - rect.top;
            const cpx = (x1 + x2) / 2;
            newPaths.push({
              d: 'M'+x1+' '+y1+' C'+cpx+' '+y1+' '+cpx+' '+y2+' '+x2+' '+y2,
              type: 'gov', clash: ci, govIdx: gIdx
            });
          }
        });
        (clash.oppLinks || []).forEach(oIdx => {
          const oppEl = container.querySelector('[data-opp="'+oIdx+'"]');
          const clashEl = container.querySelector('[data-clash="'+ci+'"]');
          if (oppEl && clashEl) {
            const or2 = oppEl.getBoundingClientRect();
            const cr = clashEl.getBoundingClientRect();
            const x1 = cr.right - rect.left;
            const y1 = cr.top + cr.height/2 - rect.top;
            const x2 = or2.left - rect.left;
            const y2 = or2.top + or2.height/2 - rect.top;
            const cpx = (x1 + x2) / 2;
            newPaths.push({
              d: 'M'+x1+' '+y1+' C'+cpx+' '+y1+' '+cpx+' '+y2+' '+x2+' '+y2,
              type: 'opp', clash: ci, oppIdx: oIdx
            });
          }
        });
      });
      setPaths(newPaths);
    }, 150);
    return () => clearTimeout(timer);
  }, [mapData]);

  if (!mapData) return null;
  if (mapData.error) {
    return el('div',{style:{textAlign:'center',padding:40,color:'#f87171',fontSize:'.9rem',
      background:'linear-gradient(145deg,#2b2020,#2b2b30)',borderRadius:16,marginTop:16,border:'1px solid #ef444430',
      boxShadow:'0 4px 20px rgba(0,0,0,.3)'}},
      el('div',{style:{fontSize:'1.1rem',fontWeight:700,marginBottom:12}},'Argument Map Error'),
      el('div',{style:{color:'#fca5a5',marginBottom:8}},mapData.error),
      el('div',{style:{color:'#555',fontSize:'.8rem'}},'Try clicking Analyze again. The AI occasionally returns text instead of JSON.')
    );
  }
  const gov = mapData.gov || [];
  const opp = mapData.opp || [];
  const clashes = mapData.clashes || [];
  const anyHover = hoveredClash !== null || hoveredNode !== null;

  function isPathActive(p) {
    if (hoveredClash !== null) return p.clash === hoveredClash;
    if (hoveredNode) {
      if (hoveredNode.type === 'gov' && p.type === 'gov' && p.govIdx === hoveredNode.idx) return true;
      if (hoveredNode.type === 'opp' && p.type === 'opp' && p.oppIdx === hoveredNode.idx) return true;
    }
    return false;
  }

  function nodeClass(type, idx) {
    let cls = 'argmap-node ' + type;
    if (!anyHover) return cls;
    if (type === 'clash') {
      if (hoveredClash === idx) return cls + ' highlighted';
      if (hoveredNode && linkedClashes && linkedClashes.has(idx)) return cls + ' highlighted';
      return cls + ' dimmed';
    }
    if (type === 'gov') {
      if (hoveredClash !== null && linkedGov && linkedGov.has(idx)) return cls + ' highlighted';
      if (hoveredNode && hoveredNode.type === 'gov' && hoveredNode.idx === idx) return cls + ' highlighted';
      if (hoveredNode && hoveredNode.type === 'gov' && hoveredNode.idx !== idx) return cls + ' dimmed';
      if (hoveredClash !== null && (!linkedGov || !linkedGov.has(idx))) return cls + ' dimmed';
      if (hoveredNode && hoveredNode.type === 'opp') return cls + ' dimmed';
      return cls;
    }
    if (type === 'opp') {
      if (hoveredClash !== null && linkedOpp && linkedOpp.has(idx)) return cls + ' highlighted';
      if (hoveredNode && hoveredNode.type === 'opp' && hoveredNode.idx === idx) return cls + ' highlighted';
      if (hoveredNode && hoveredNode.type === 'opp' && hoveredNode.idx !== idx) return cls + ' dimmed';
      if (hoveredClash !== null && (!linkedOpp || !linkedOpp.has(idx))) return cls + ' dimmed';
      if (hoveredNode && hoveredNode.type === 'gov') return cls + ' dimmed';
      return cls;
    }
    return cls;
  }

  function verdictClass(winner) {
    if (!winner) return 'clash-verdict tossup';
    const w = winner.toLowerCase();
    if (w.includes('gov')) return 'clash-verdict gov-lean';
    if (w.includes('opp')) return 'clash-verdict opp-lean';
    return 'clash-verdict tossup';
  }

  return el('div',{className:'argmap-container',ref:containerRef},
    // SVG curved connections
    el('svg',{className:'argmap-svg',style:{width:'100%',height:'100%'}},
      // Defs for gradient strokes
      el('defs',null,
        el('linearGradient',{id:'grad-gov',x1:'0%',y1:'0%',x2:'100%',y2:'0%'},
          el('stop',{offset:'0%',stopColor:'#3b82f6',stopOpacity:.7}),
          el('stop',{offset:'100%',stopColor:'#fbbf24',stopOpacity:.7})
        ),
        el('linearGradient',{id:'grad-opp',x1:'0%',y1:'0%',x2:'100%',y2:'0%'},
          el('stop',{offset:'0%',stopColor:'#fbbf24',stopOpacity:.7}),
          el('stop',{offset:'100%',stopColor:'#ef4444',stopOpacity:.7})
        ),
        el('linearGradient',{id:'grad-gov-dim',x1:'0%',y1:'0%',x2:'100%',y2:'0%'},
          el('stop',{offset:'0%',stopColor:'#3b82f6',stopOpacity:.1}),
          el('stop',{offset:'100%',stopColor:'#fbbf24',stopOpacity:.1})
        ),
        el('linearGradient',{id:'grad-opp-dim',x1:'0%',y1:'0%',x2:'100%',y2:'0%'},
          el('stop',{offset:'0%',stopColor:'#fbbf24',stopOpacity:.1}),
          el('stop',{offset:'100%',stopColor:'#ef4444',stopOpacity:.1})
        )
      ),
      paths.map((p,i) => {
        const active = isPathActive(p);
        const dimmed = anyHover && !active;
        return el('path',{
          key:i, d:p.d, fill:'none',
          stroke: dimmed ? 'url(#grad-'+p.type+'-dim)' : 'url(#grad-'+p.type+')',
          strokeWidth: active ? 2.5 : 1.5,
          strokeDasharray: active ? '10 5' : 'none',
          opacity: dimmed ? .2 : (active ? 1 : .45),
          style: active ? {animation:'flowDash .6s linear infinite'} : {transition:'all .3s ease'}
        });
      })
    ),
    // Three columns
    el('div',{className:'argmap-columns'},
      // Gov column
      el('div',{className:'argmap-col'},
        el('div',{className:'argmap-col-header gov'},t('argMap.government','Government')),
        gov.map((a,i) => el('div',{
          key:i, className:nodeClass('gov',i), 'data-gov':i,
          onMouseEnter:()=>{setHoveredNode({type:'gov',idx:i});setHoveredClash(null)},
          onMouseLeave:()=>setHoveredNode(null),
          style:{cursor:'pointer'}
        },
          el('div',{className:'node-title'},a.name),
          el('div',{className:'node-desc'},a.desc),
          el('div',{className:'node-weight-bar'},
            el('div',{className:'node-weight-fill',style:{width:(a.weight||5)*10+'%'}})
          ),
          el('div',{className:'node-weight-label'},(a.weight||5)+'/10'),
        ))
      ),
      // Clash column
      el('div',{className:'argmap-col'},
        el('div',{className:'argmap-col-header clash'},t('argMap.clashPoints','Clash Points')),
        clashes.map((c,i) => el('div',{
          key:i, className:nodeClass('clash',i), 'data-clash':i,
          onMouseEnter:()=>{setHoveredClash(i);setHoveredNode(null)},
          onMouseLeave:()=>setHoveredClash(null),
          style:{cursor:'pointer'}
        },
          el('div',{className:'node-title'},c.name),
          el('div',{className:'node-desc'},c.desc),
          c.winner && el('div',{className:verdictClass(c.winner)},c.winner),
        ))
      ),
      // Opp column
      el('div',{className:'argmap-col'},
        el('div',{className:'argmap-col-header opp'},t('argMap.opposition','Opposition')),
        opp.map((a,i) => el('div',{
          key:i, className:nodeClass('opp',i), 'data-opp':i,
          onMouseEnter:()=>{setHoveredNode({type:'opp',idx:i});setHoveredClash(null)},
          onMouseLeave:()=>setHoveredNode(null),
          style:{cursor:'pointer'}
        },
          el('div',{className:'node-title'},a.name),
          el('div',{className:'node-desc'},a.desc),
          el('div',{className:'node-weight-bar'},
            el('div',{className:'node-weight-fill',style:{width:(a.weight||5)*10+'%'}})
          ),
          el('div',{className:'node-weight-label'},(a.weight||5)+'/10'),
        ))
      ),
    ),
    // Legend
    el('div',{className:'argmap-legend'},
      el('span',null, el('span',{className:'dot',style:{background:'#3b82f6',color:'#3b82f6'}}), t('argMap.government','Government')),
      el('span',null, el('span',{className:'dot',style:{background:'#fbbf24',color:'#fbbf24'}}), t('argMap.clashPoints','Clash Points')),
      el('span',null, el('span',{className:'dot',style:{background:'#ef4444',color:'#ef4444'}}), t('argMap.opposition','Opposition')),
      el('span',null, t('argMap.hoverTrace','Hover any node to trace connections')),
    )
  );
}

function RoundVision() {
  const el = React.createElement;
  const { t } = React.useContext(I18nContext);
  const [motion, setMotion] = useState('');
  const [visionFormat, setVisionFormat] = useState('APDA');
  const [side, setSide] = useState('Government');
  const [output, setOutput] = useState(null);
  const [mapData, setMapData] = useState(null);
  const [loading, setLoading] = useState(false);
  const [view, setView] = useState('map');
  const [mapLoading, setMapLoading] = useState(false);
  const [vProgress, setVProgress] = useState(null);
  const [mapProgress, setMapProgress] = useState(null);
  const smoothVReveal = useSmoothProgress(
    vProgress ? Math.min(100, Math.max(0, (vProgress.percent - 30) * 1.1)) : 0,
    0.03
  );

  const analyze = async () => {
    if (!motion.trim()) return;
    setLoading(true);
    setOutput('');
    setMapData(null);

    try {
      // Generate text analysis
      const sysPrompt = `You are an elite ${visionFormat} debate strategist sitting in the prep room with a team 15 minutes before their round. You've seen this motion type before. You know what opp is going to run, you know where the traps are, and you're going to walk your team through the full strategic landscape so they go in with a plan, not just arguments.

YOUR ANALYSIS STRUCTURE:

1. THE MOTION AT A GLANCE
What is this motion really asking? Strip away the surface framing and identify the core philosophical or empirical question underneath. "This looks like a policy motion about X, but it's really a debate about Y." This helps the team know what terrain they're actually fighting on.

2. THEIR LIKELY CASE ANGLES (rank by probability)
If you're opp, what are the 3-4 most likely gov approaches? If you're gov, what's opp going to run? For each:
   a) The argument in one sentence
   b) The mechanism (how does it work, what's the causal chain)
   c) Why it's dangerous (what makes this hard to answer)
   d) The weakness (where the link breaks or the warrant is thin)
Don't just list generic arguments. Think about what a smart team would actually run at a competitive tournament.

3. THE FRAMEWORK BATTLE
What framework does each side want and why? Explain how the framework choice determines who wins. "If the round is evaluated through X, Gov wins easily. If it's evaluated through Y, Opp has the advantage. So the framework battle is really about whether X or Y is the right standard, and here's why."

4. KEY CLASH POINTS
Identify the 2-3 places where the round will actually be decided. Not every argument matters equally. Tell the team: "This round comes down to these questions. If you win on these, you win the round regardless of what else happens."

5. SPEECH-BY-SPEECH STRATEGY
Specific tactical advice for each remaining speech:
   a) What the constructive should prioritize
   b) What the extension speech (MG or MO) must do to set up the rebuttal
   c) What the rebuttal should collapse on
   d) What to concede and how to frame the concession

6. DANGER ZONES
Arguments that look tempting but actually lose rounds. "Don't run the slippery slope angle. It sounds good for 30 seconds but any decent team will point out you have no mechanism and you'll spend your whole MG defending a bad argument instead of extending your good ones."
Also flag potential traps the other side might set. "If they frame it as a rights question, don't bite. Reframe immediately."

7. THE WINNING NARRATIVE
In one paragraph, what is the story that wins this round? "At the end of the round, the judge should believe: ___." Give the team a clear, simple narrative they can build toward across all their speeches.

Write in a direct, confident, opinionated voice. You are the coach. You've seen this before. Tell them what to do. Use markdown formatting for readability: **bold** for key terms and argument names, ## for main section headers, ### for sub-sections. Use numbered lists and lettered sub-points. Do not use em dashes, en dashes, or hyphens as separators.`;
      const userPrompt = `Motion: ${motion}\nMy side: ${side}\n\nGive me the full round vision.`;
      const throttle = createStreamThrottle((text) => setOutput(text), null);
      await callClaude(sysPrompt, userPrompt, (text) => throttle.update(text), { thinkBudget: 10000, maxTokens: 8000, expectedWords: 2000, onProgress: (p) => setVProgress(p), feature: 'vision' });
      throttle.finish();
    } catch(e) {
      setOutput('Error: ' + safeError(e));
    }
    setLoading(false);
    setVProgress(null);

    // Generate argument map
    setMapLoading(true);
      try {
        const mapSys = `Output ONLY a JSON object. No text before or after. No code fences. Just JSON.

Schema: {"gov":[{"name":"string","desc":"string","weight":number}],"opp":[{"name":"string","desc":"string","weight":number}],"clashes":[{"name":"string","desc":"string","govLinks":[numbers],"oppLinks":[numbers],"winner":"string"}]}

gov: 3-4 Government arguments. name is a short label, desc is 1 sentence, weight is 1-10.
opp: 3-4 Opposition arguments. Same format.
clashes: 2-3 points where gov and opp arguments collide. govLinks/oppLinks are 0-based indices into the gov/opp arrays. winner is one of: "Lean Gov", "Lean Opp", "Toss-up".

Be specific to the motion. Arguments should be real strategic angles a competitive debater would run.`;
        const mapUser = `Motion: ${motion}\nSide: ${side}\n\nGenerate the argument map JSON.`;
        let mapText = '';
        await callClaude(mapSys, mapUser, (text) => { mapText = text; }, { thinkBudget: 6000, maxTokens: 8000, expectedWords: 400, onProgress: (p) => setMapProgress(p) });
        // Parse JSON from response - be aggressive about finding it
        let cleaned = (mapText || '').trim();
        // Strip code fences, leading text, trailing text
        cleaned = cleaned.replace(/^[\s\S]*?(?=\{)/, '');
        var js1 = cleaned.lastIndexOf('}');
        if (js1 === -1) throw new Error('No JSON object found in response');
        cleaned = cleaned.substring(0, js1 + 1);
        // Fix common JSON issues from AI
        cleaned = cleaned.replace(/,\s*([}\]])/g, '$1'); // trailing commas
        const parsed = JSON.parse(cleaned);
        // Validate minimum structure
        if (!parsed.gov || !parsed.opp) throw new Error('Missing gov or opp arrays');
        if (!Array.isArray(parsed.gov) || !Array.isArray(parsed.opp)) throw new Error('gov and opp must be arrays');
        // Ensure clashes exist with defaults
        if (!parsed.clashes || !Array.isArray(parsed.clashes)) parsed.clashes = [];
        setMapData(parsed);
      } catch(e) {
        // Map parse error — retry silently
        // Retry once with a more forceful prompt
        try {
          let retryText = '';
          await callClaude(
            'Output ONLY valid JSON. Nothing else. Schema: {"gov":[{"name":"str","desc":"str","weight":5}],"opp":[{"name":"str","desc":"str","weight":5}],"clashes":[{"name":"str","desc":"str","govLinks":[0],"oppLinks":[0],"winner":"Toss-up"}]}',
            'Motion: ' + motion + '. Side: ' + side + '. Generate 3 gov args, 3 opp args, 2 clashes. JSON only.',
            (text) => { retryText = text; },
            { thinkBudget: 2000, maxTokens: 4000 }
          );
          let rc = (retryText || '').trim().replace(/^[\s\S]*?(?=\{)/, '');
          var rj1 = rc.lastIndexOf('}');
          rc = rc.substring(0, rj1 + 1).replace(/,\s*([}\]])/g, '$1');
          const rp = JSON.parse(rc);
          if (rp.gov && rp.opp) { setMapData(rp); }
          else { throw new Error('Invalid structure'); }
        } catch(e2) {
          // Map parse error attempt 2 — show fallback
          setMapData({error: 'Map generation failed after 2 attempts. Try clicking Analyze again.', raw: (mapText || '').substring(0, 100)});
        }
      }
      setMapProgress(null);
      setMapLoading(false);
  };

  return el('div',{className:'panel'+(output?' panel-expanded':'')},
    el('p',{style:{color:'#888',marginBottom:16,fontSize:'.92rem'}},
      t('vision.desc','Map the strategic landscape of a round. Get text analysis and an interactive argument flow visualization.')
    ),
    el('label',{className:'field-label'},t('caseGen.motion','Motion')),
    el('textarea',{
      placeholder:t('vision.motionPlaceholder','Enter the motion to analyze...'),
      value:motion, onChange:e=>setMotion(e.target.value), rows:3
    }),
    el('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginTop:16}},
      el('div',null,
        el('label',{className:'field-label green'},t('vision.yourSide','Your Side')),
        el('select',{value:side,onChange:e=>setSide(e.target.value)},
          [{v:'Government',k:'caseGen.government'},{v:'Opposition',k:'caseGen.opposition'}].map(s=>el('option',{key:s.v,value:s.v},t(s.k,s.v)))
        )
      ),
      el('div',null,
        el('label',{className:'field-label green'},'Format'),
        el('select',{value:visionFormat,onChange:e=>setVisionFormat(e.target.value)},
          [['APDA','APDA'],['BP','BP'],['WSDC','WSDC'],['AP','AP'],['KP','KP'],['1v1','1-on-1 (Casual)']].map(([v,l])=>el('option',{key:v,value:v},l))
        )
      ),
    ),
    el('div',{style:{marginTop:20}},
      el('button',{className:'btn btn-primary',onClick:analyze,disabled:loading||mapLoading},
        loading ? el('span',null,el('span',{className:'spinner'}),t('vision.analyzing','Analyzing...')) : t('vision.analyzeRound','Analyze Round')
      ),
      loading && vProgress && el(LoadingBar, { label: vProgress.phase === 'thinking' ? 'Analyzing round...' : 'Writing analysis...', percent: vProgress.percent, phase: vProgress.phase })
    ),

    // View toggle
    (output || mapData) && el('div',{className:'argmap-tab-toggle'},
      el('button',{className:view==='map'?'active':'',onClick:()=>setView('map')},t('vision.argMap','Argument Map')),
      el('button',{className:view==='text'?'active':'',onClick:()=>setView('text')},t('vision.textAnalysis','Text Analysis')),
    ),

    // Map loading state
    view === 'map' && mapLoading && el('div',{style:{padding:'20px 0'}},
      el(LoadingBar, { label: mapProgress && mapProgress.phase === 'thinking' ? 'Analyzing arguments...' : 'Building argument map...', percent: mapProgress ? mapProgress.percent : 5, phase: mapProgress ? mapProgress.phase : 'thinking' }),
    ),

    // Argument Map
    view === 'map' && mapData && el(ArgumentMap, {mapData:mapData}),

    // Map placeholder when no API
    view === 'map' && !mapData && !mapLoading && output && el('div',{
      style:{textAlign:'center',padding:40,color:'#888',fontSize:'.9rem',
        background:'linear-gradient(145deg,#303038,#2b2b30)',borderRadius:16,marginTop:16,border:'1px solid #ffffff15',
        boxShadow:'0 4px 20px rgba(0,0,0,.3)'}
    },
      el('div',null,'The argument map is being generated. If it doesn\'t appear, try clicking Analyze again.'),
      el('div',{style:{marginTop:8,fontSize:'.8rem',color:'#555'}},'Map generation requires the AI to return structured JSON, which occasionally needs a retry.')
    ),

    // Text output
    view === 'text' && output && el('div',{
      className:'output-reveal' + (loading ? ' streaming-mask' : ''),
      style: loading && vProgress ? {
        '--reveal-pct': smoothVReveal + '%',
      } : {}
    },
      el('div',{className:'output' + (loading ? ' streaming-active' : '')},
        el('div',{dangerouslySetInnerHTML:{__html:cleanOutput(output, true)}})
      ),
      !loading && el(SaveToDocsButton,{text:output,filename:'Round Vision ' + motion.substring(0,40)})
    )
  );
}

function buildRoundVision(motion, side) {
  const opp = side === 'Government' ? 'Opposition' : 'Government';
  return `<h3>Round Vision — ${side}</h3>
<h4>Motion: ${escHtml(motion)}</h4>

<h4>Likely ${opp} Strategy</h4>
<div class="section">
<strong>Most probable case angle:</strong> The ${opp} will likely run a case centered on implementation failures and unintended consequences, arguing that the theoretical benefits don't materialize in practice.

<strong>Secondary angle:</strong> A principled objection based on autonomy/rights — arguing that even if outcomes improve, the mechanism violates important deontological constraints.

<strong>Dark horse angle:</strong> A countermodel that achieves similar goals through less interventionist means, trying to capture your impacts while avoiding your costs.
</div>

<h4>Key Clash Points</h4>
<div class="section">
1. <strong>Empirics vs. Theory</strong> — They'll want the round to be about real-world evidence of failure. You want it to be about structural analysis and comparative worlds.

2. <strong>Rights vs. Welfare</strong> — Expect a tension between aggregate welfare arguments and individual rights claims. Prepare to either integrate rights into your framework or explain why welfare takes priority.

3. <strong>Status Quo Bias</strong> — They benefit from uncertainty aversion. You need to establish that the status quo is not neutral — it's actively harmful and the cost of inaction is high.
</div>

<h4>Strategic Recommendations</h4>
<div class="section">
1. <strong>Frame early</strong> — Establish your evaluative framework in the first speech. If they accept your framing, you've likely won on impacts.

2. <strong>Pre-empt the strongest version</strong> — Don't build a case that only beats a weak opposition. Address the best counterargument head-on.

3. <strong>Control the counterfactual</strong> — Be specific about what the alternative world looks like. Vague counterfactuals let them fill in optimistic assumptions.

function buildPhilosophyOutput(philosopher, concept) {
  const data = {
    'Kant': { school:'Deontology', key:'Categorical Imperative (three formulations: universal law, humanity as end, kingdom of ends), duty-based ethics, autonomy of the will, moral law from reason alone',
      debateUse:'Kant gives you three distinct tools, not one. The universal law formulation ("act only on maxims you could will as universal laws") is your bright-line test. But the humanity formula ("treat persons as ends in themselves, never merely as means") is often more debate-useful because it grounds dignity arguments concretely. The kingdom of ends ("legislate as if for a community of rational agents") gives you institutional-design arguments. Deploy the right formulation for the motion. Strong for: human rights, anti-exploitation, bodily autonomy, and any motion where you need to argue that certain treatment of persons is impermissible regardless of aggregate benefits.',
      attack:'Vulnerable to: the demandingness objection (morality can\'t require ignoring devastating consequences), conflicting duties with no clear priority rule, the charge that universalizability is too formal to generate real guidance, and the fact that Kant\'s own applications of his theory (e.g., the "lying to the murderer" case) seem to produce absurd results. Smart opponents will also press: which formulation are you using, and do they always agree?' },
    'Mill': { school:'Utilitarianism', key:'Greatest happiness principle, harm principle, higher/lower pleasures, liberty',
      debateUse:'Deploy Mill for any consequentialist framework. The harm principle is your best friend in liberty-restriction debates: the only purpose for which power can be exercised over any member of a civilized community is to prevent harm to others. Distinguish between higher and lower pleasures to avoid the "push-pin is as good as poetry" objection.',
      attack:'Vulnerable to: utility monster problem, tyranny of the majority, inability to account for justice in distribution, and the measurement problem (how do you compare pleasures across persons?).' },
    'Rawls': { school:'Social Contract / Liberal Egalitarianism', key:'Veil of ignorance, original position, difference principle, justice as fairness, two principles of justice, reflective equilibrium',
      debateUse:'The veil of ignorance is thicker than most debaters realize: you don\'t just lack knowledge of your social position, you also don\'t know your conception of the good, your psychological dispositions, or your generation. This thick veil is what generates Rawls\'s strong conclusions. The two principles of justice are lexically ordered: (1) equal basic liberties for all, then (2) the difference principle (inequalities only justified if they benefit the least advantaged). The lexical ordering matters because it means you cannot trade away basic liberties for economic gains. Use early Rawls (A Theory of Justice) for distributive justice; use late Rawls (Political Liberalism) when you need to argue for principles that diverse groups can endorse without sharing a comprehensive moral doctrine.',
      attack:'Vulnerable to: Nozick\'s entitlement theory (historical process vs. end-state pattern), the charge that the original position is too idealized to generate real obligations, communitarian critiques (Sandel, MacIntyre) that it assumes an "unencumbered self" stripped of constitutive commitments, and Sen\'s argument that we should focus on actual capabilities rather than hypothetical contract scenarios.' },
    'Marx': { school:'Historical Materialism / Marxism', key:'Class struggle, surplus value, alienation, base and superstructure, dialectical materialism',
      debateUse:'Marx is essential for structural arguments about power, economics, and ideology. Use the base/superstructure distinction to argue that surface-level reforms fail because they don\'t address underlying economic relations. The concept of ideology (not "Critical Theory," which is the Frankfurt School) helps you argue that what appears natural or inevitable actually serves ruling-class interests. Alienation (from labor, product, species-being, and other workers) is powerful for motions about work, education, and human flourishing. Note: Marx\'s analysis evolved significantly from the early humanist writings (1844 Manuscripts) to the mature political economy (Capital). The early Marx gives you alienation and human nature arguments; the late Marx gives you structural economic analysis.',
      attack:'Vulnerable to: the economic calculation problem (Mises/Hayek), historical failures of actually-existing socialism, the charge of economic determinism (reducing all social phenomena to class relations), the problem of revolutionary violence, and the tension between Marx\'s deterministic historical claims and his call for revolutionary action.' },
    'Foucault': { school:'Genealogy / Analytics of Power', key:'Power/knowledge, disciplinary society, biopower, discourse, genealogy',
      debateUse:'Foucault (who rejected the "post-structuralist" label) gives you tools for arguing that seemingly neutral institutions are actually mechanisms of social control. Early Foucault (archaeology: The Order of Things, Archaeology of Knowledge) shows how systems of knowledge are historically contingent, not natural discoveries. Middle Foucault (genealogy: Discipline and Punish, History of Sexuality Vol. 1) introduces power/knowledge and biopower: what counts as "truth" or "expertise" reflects power relations, and modern states govern through managing populations rather than threatening violence. Late Foucault (ethics: care of the self, parrhesia) offers a positive account of self-formation and truth-telling. Most debaters only know middle Foucault. The genealogical method lets you denaturalize anything the opposition takes for granted.',
      attack:'Vulnerable to: the normative deficit problem (if all power relations are suspect, what grounds YOUR critique? Habermas pressed this hard), the charge that his analytics leave no room for genuine agency or resistance, and the practical objection that deconstruction without reconstruction gives the judge nothing to vote for. Note: calling Foucault a "relativist" is a common but philosophically shallow attack. His actual position is more subtle. A stronger line is pressing whether Foucauldian analysis can distinguish between better and worse power arrangements.' },
  };
  const info = data[philosopher] || {
    school: 'Various',

    debateUse: `${philosopher}'s work provides valuable frameworks for analyzing questions of justice, power, knowledge, and ethics. Select this thinker when the motion touches on their core areas of inquiry.`,
    attack: 'Like any philosophical framework, this approach has known vulnerabilities that sophisticated opponents will target.'
  };
  return `<h3>${philosopher}</h3>

}

    const sysPrompt = `You are the most brutally honest ${fbFormat} debate coach alive. You have coached Nationals champions. You do not sugarcoat. You have seen thousands of cases and you can smell a weak warrant from across the room. Your job is to review this ${fbFormat} case the way a real coach would in a prep session: sit down with the debater, read through the case, and tell them exactly what is wrong, what is good, and how a top opp team would tear them apart. Be blunt about their weaknesses. Tell them specifically where they are weak as a debater and what they need to work on. Don't coddle them. Give them the honest feedback that makes them actually improve.

YOUR COACHING VOICE:
You sound like a real coach, not a feedback tool. Here's the difference:
BAD (feedback bot): "This warrant could benefit from additional specificity and development."
GOOD (real coach): "This warrant is doing nothing. You said 'economic harm' but you never told me WHO is harmed, HOW MUCH, or WHY I should care more about that than whatever opp is going to say. A halfway decent LO will just say 'so what?' and you won't have an answer."

BAD: "The framework provides a useful evaluative lens for the round."
GOOD: "Your framework says 'justice.' Cool. What does that actually tell the judge to do when your impact and opp's impact are sitting next to each other? Nothing. This is decorative philosophy. A framework needs to be a MACHINE: put two competing impacts in, get a winner out."

BAD: "Consider strengthening the causal chain in argument 2."
GOOD: "Your causal chain skips from A to C. You said the policy creates incentives, then jumped to 'this devastates communities.' What happens in between? How do those incentives actually translate into community harm? Any competent LO will park right in that gap."

WHAT TO EVALUATE:
1. WARRANT QUALITY: For each warrant, ask: is this specific enough that it could ONLY exist in this case? Or could you copy paste it into any debate? "This harms the economy" is garbage. "This creates a deadweight loss because subsidized producers have no incentive to respond to demand signals, exactly the dynamic that created the EU's butter mountains in the 1980s" is a warrant. Flag every generic warrant.

2. FRAMEWORK TEETH: Does the framework actually resolve disputes, or is it just vibes? Test it: if Gov's impact is X and Opp's impact is Y, does the framework tell the judge which one matters more? If not, it's broken.

3. STRATEGIC VULNERABILITY: This is the most important thing you do. Identify the single argument that a smart opp team would collapse on in the MO to win this round. Tell the debater: "If I'm opp, I'm spending 80% of my MO on THIS, and here's the 3-sentence version of why you lose."

4. AI SMELL TEST: Read each section and ask: does this sound like a confident debater who has done their research, or does it sound like a language model producing balanced analysis? Hedging ("it could be argued"), balance where there should be advocacy ("while there are merits to both sides"), Wikipedia-voice ("X is a concept that refers to"), essay transitions ("Furthermore," "Additionally," "Moreover"). Flag every instance.

5. CLICHE DETECTION: Flag any arguments that are so overrun in APDA that every competent opp team has pre-loaded responses. Generic slippery slopes, "education is intrinsically good," vague democracy impacts, "chilling effect" without naming what's chilled.

6. IMPACT CALCULUS: Are impacts just stated ("this is bad") or actually weighed ("this is worse than what they'll say because it's irreversible and affects more people")? Impact calculus should be pre-loaded into the case, not left for the MG to invent on the fly.

7. ARGUMENT INDEPENDENCE: Can each argument win the round alone? If argument 2 depends on argument 1 being true, that's not diversification. Flag dependent arguments.

8. CONCESSION READINESS: Does the case have a plan for what to concede? Every good case should be designed so you can lose one argument and still win the round. If losing any single argument collapses the whole case, that's a structural problem.

9. DEPTH VS. BREADTH: Is this case playing chess or checkers? If it has 5 shallow arguments where each warrant could be dismissed in one sentence, it is checkers. If it has 2-3 deep arguments where each warrant survives the three most obvious responses, it is chess. Chess beats checkers. Flag cases that spread too thin and tell the debater which arguments to cut and which to deepen.

10. COUNTERFACTUAL CLARITY: Does the case define what happens if the motion DOESN'T pass? If not, the case is arguing in a vacuum. Every argument should be comparative: "In the world where X passes vs. the world where it doesn't, here is what changes." If the case never defines the counterfactual, any opp team can substitute their own favorable alternative and the case collapses.

11. ARGUMENT STRESS TEST: For each core argument, apply this test from elite debaters: "How many reasonable, damning responses can someone throw at this? How well does the argument insulate itself?" If the argument can be killed by one obvious response that the case doesn't address, it needs pre-loaded defense or it needs to be rebuilt. The goal is arguments where the most natural first-instinct response from opp FAILS.

12. PRINCIPLED AND CONSEQUENTIALIST LAYERS: Does the case operate on only one level? The most robust cases give the judge multiple independent frameworks. If opp wins the consequentialist debate, does a principled argument still stand? If opp wins the principled debate, do the consequences still favor Gov? A case that only operates on one layer is fragile.

13. HUMOR AND RHETORICAL FLAIR: Does this case sound like it was written by someone who actually wants to win, or does it read like a term paper? Check for:
   - KILLER LINES: Does the case have at least 2-3 memorable sentences that a judge would underline? Lines sharp enough to stick in someone's head after the round? If every sentence reads at the same flat register, the case has no rhetorical peaks. Tell the debater: "Nothing in this case would make a judge look up from their flow. You need lines that HIT."
   - WIT AND SHARPNESS: When dismissing weak opposing arguments, does the case do it with flair or with bland hedging? "This argument fails because..." is boring. "This argument has the structural integrity of a wet napkin" lands. If the A2 blocks are all monotone analytical responses with no personality, flag it: "Your A2s read like a textbook. A real debater would say 'this is absurd, and here is why' not 'this argument may be subject to critique.'"
   - RHETORICAL DEVICES: Is the case using rhetorical questions, vivid imagery, tricolon, antithesis, or punchy one-liners? Or is it wall-to-wall expository prose? The best cases vary their rhythm. A long analytical section should be punctuated by a sharp, short sentence that crystallizes the point. Flag sections that drone on without any rhetorical variation.
   - PASSION AND CONVICTION: Does the debater sound like they believe what they are saying? Or does the case have the emotional temperature of a refrigerator? Phrases like "it is worth noting" and "one might consider" are passion killers. Replace them with "here is the thing" and "look at what actually happens." If the case reads like the author does not care about the outcome, neither will the judge.
   - PATHOS/ETHOS/LOGOS BALANCE: Is the case all logos with no emotional hooks? The best cases make you FEEL something. If there is not a single moment in the case where a judge might feel genuine concern, outrage, or recognition, the case is emotionally flat. Flag it: "Your warrants are solid but your case has the emotional range of a spreadsheet. Where is the human being in this argument?"
   - CALLING OUT BAD ARGUMENTS: Sometimes the most effective feedback is telling the debater that a particular opposing argument is genuinely stupid and can be dismissed with a joke. If the case treats every possible opp response with equal seriousness, that is a mistake. Some arguments deserve to be laughed out of the room. Tell the debater which ones and give them the line to do it with.

TONE: Mix honest criticism with genuine encouragement. If a warrant is actually clever, say so: "This is genuinely good. A top team would struggle to answer this cleanly. Protect it in the MG." But NEVER praise mediocre work. The debater needs to know the difference between a 28-speak warrant and a 33-speak warrant.

FORMATTING: Do not use em dashes, en dashes, or hyphens as separators in your feedback. Use periods, commas, and natural sentence structure instead.

}

const JUDGE_EVAL_TYPES = {
  tabula_rasa: { label: 'Tabula Rasa', desc: 'Blank slate — evaluates only what is said in round, no outside knowledge, minimal intervention', prompt: 'You are a strict tabula rasa judge. You evaluate ONLY what was explicitly said in round. You do not import outside knowledge. If neither team weighs an argument, you do minimal work to resolve it. Dropped arguments carry their face-value weight. You intervene as little as possible.' },
  technical: { label: 'Technical / Flow', desc: 'Tracks every argument on the flow — rewards clean extensions, punishes drops hard', prompt: 'You are a highly technical flow judge. You track every argument meticulously. Dropped arguments are devastating. Extensions must be clean — just saying "extend our case" is not enough. You reward precise line-by-line engagement and punish teams that go for breadth over depth. Signposting matters enormously to you.' },
  truth_testing: { label: 'Truth-Testing', desc: 'Evaluates whether arguments are actually TRUE, not just technically won on the flow', prompt: 'You are a truth-testing judge. While you respect the flow, you also evaluate whether arguments are actually true and well-warranted. A technically "won" argument that is clearly false or absurd carries less weight. You reward intellectual honesty and penalize teams that win cheap drops on implausible claims. Real-world plausibility matters to you.' },
  policy: { label: 'Policy / Util', desc: 'Weighs impacts by magnitude, probability, timeframe — biggest impact wins', prompt: 'You are a utilitarian/policy-focused judge. You evaluate rounds primarily through impact calculus: magnitude, probability, timeframe, scope, and reversibility. The team with the biggest, most probable impact wins. Framework debates matter only insofar as they affect impact evaluation. You want to hear numbers, mechanisms, and comparative weighing.' },
  kritikal: { label: 'Critical / K', desc: 'Receptive to framework challenges, identity arguments, and structural critiques', prompt: 'You are a judge receptive to critical arguments. You take seriously challenges to the framing of the debate itself — arguments about what the debate should be about, who it excludes, what assumptions it makes. Identity arguments, structural critiques, and epistemological challenges are legitimate to you. However, they still need warrants and impacts. Being critical does not mean being unrigorous.' },
  parent: { label: 'Parent / Lay', desc: 'Persuasion-first — rewards clarity, stories, and accessibility over jargon', prompt: 'You are a lay/parent judge with no debate experience. You evaluate based on persuasiveness, clarity, and common sense. Debate jargon confuses you. The team that tells a clearer, more compelling story wins. You reward accessible language, concrete examples, and emotional resonance. Speed and technicality actively hurt with you.' },
};

function Judge({ user }) {
  const { t } = React.useContext(I18nContext);
  const [judgeMode, setJudgeMode] = useState('flow'); // flow | pool
  const [format, setFormat] = useState('APDA');
  const [judgeType, setJudgeType] = useState('tabula_rasa');
  const [notes, setNotes] = useState({});
  const [tags, setTags] = useState({});
  const [feedback, setFeedback] = useState({});
  const [recording, setRecording] = useState(null); // speech code currently recording
  const recognitionRef = useRef(null);

  const speeches = FORMATS[format].speeches;

  const updateNote = (code, val) => setNotes(prev => ({...prev, [code]:val}));

  const toggleRecording = (code) => {
    if (recording === code) {
      // Stop recording
      if (recognitionRef.current) { recognitionRef.current.stop(); recognitionRef.current = null; }
      setRecording(null);
      return;
    }
    // Stop any existing recording first
    if (recognitionRef.current) { recognitionRef.current.stop(); recognitionRef.current = null; }

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) { alert('Speech recognition is not supported in this browser. Try Chrome.'); return; }

    const recognition = new SpeechRecognition();
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.lang = 'en-US';

    let finalTranscript = '';
    recognition.onresult = (event) => {
      let interim = '';
      for (let i = event.resultIndex; i < event.results.length; i++) {
        const t = event.results[i][0].transcript;
        if (event.results[i].isFinal) { finalTranscript += t + ' '; }
        else { interim = t; }
      }
      setNotes(prev => {
        const base = (prev[code] || '').replace(/\n\[listening\.\.\.\].*$/, '');
        const combined = base + (base && !base.endsWith('\n') && finalTranscript ? '\n' : '') + finalTranscript + (interim ? '\n[listening...] ' + interim : '');
        return {...prev, [code]: combined};
      });
    };
    recognition.onerror = (e) => { if (e.error !== 'no-speech') { console.error('Speech error:', e.error); setRecording(null); } };
    recognition.onend = () => {
      // Clean up interim text
      setNotes(prev => {
        const cleaned = (prev[code] || '').replace(/\n\[listening\.\.\.\].*$/, '');
        return {...prev, [code]: cleaned};
      });
      if (recording === code) setRecording(null);
    };

    recognitionRef.current = recognition;
    recognition.start();
    setRecording(code);
  };
  const toggleTag = (code, tag) => {
    setTags(prev => {
      const current = prev[code] || [];
      return {...prev, [code]: current.includes(tag) ? current.filter(t=>t!==tag) : [...current, tag]};
    });
  };

  const [loadingFeedback, setLoadingFeedback] = useState({});
  const [roundEval, setRoundEval] = useState(null);
  const [roundEvalLoading, setRoundEvalLoading] = useState(false);
  const [reProgress, setReProgress] = useState(null);
  const allFilled = speeches.every(s => (notes[s.code] || '').trim().length > 0);
  const evaluateRound = async () => {
    setRoundEvalLoading(true);
    setRoundEval('');
    setReProgress({phase:'thinking',percent:0});
    try {
      const judgeProfile = JUDGE_EVAL_TYPES[judgeType] || JUDGE_EVAL_TYPES.tabula_rasa;
      const sysPrompt = `You are a senior APDA judge delivering a comprehensive Round Evaluation (RFD). You have observed all speeches in this round.

JUDGE PARADIGM: ${judgeProfile.label}
${judgeProfile.prompt}

APDA SPEAKER SCALE (use this for speaker points):
- 15-17: Exceptionally poor. Speaker does not fulfill their role.
- 18-20: Very poor. Speaker barely fulfills their role.
- 21-23: Fairly poor. Speaker partially fulfills role with many significant flaws.
- 24-26: Below average. Speaker fulfills role but has some significant flaws (incomplete responses, assertive weighing).
- 27-29: Average. Speaker fulfills role with some flaws (solid rebuttal but may miss a key argument, or lack comparative weighing).
- 30-32: Above average. Speaker fulfills role with some minor flaws. Arguments frequently have strong explanations demanding strong responses.
- 33-35: Excellent. Role fulfillment is complete with rare and minor flaws.
- 36-38: Exceptional. Nearly flawless. Complete and decisive responses to very strong arguments.

SPEECH EVALUATION CRITERIA (assess each):
1. WARRANT QUALITY: Are claims backed by specific reasoning that passes the "could this only be in THIS case?" test?
2. IMPACT QUALITY: Are impacts weighed comparatively (magnitude, probability, timeframe)?
3. WEIGHING QUALITY: Does the speaker do comparative analysis, not just assertion?
4. REBUTTAL QUALITY: Does the speaker engage the strongest opposing arguments, not just the weakest?
5. ROLE FULFILLMENT: Did the speech do what its position demands?
   - PMC: Case statement, clear framework, 2-3 independent arguments with warrants, strong signposting
   - LOC: Opposition philosophy (under 1 min), 2-3 independent off-case arguments, then move caseside for point-by-point responses. Better to have 2 strong off-case arguments and many smart caseside responses than 5 off-case repeated as responses
   - MG: First 4 min on Opp arguments (aggressive, not purely defensive), back 4 on case. Brief overview OK but don't frontload everything there. No case shifts
   - MO: Can restructure the flow. Last constructive, so focus on strongest material. Can add 1-2 new arguments woven into existing structure. Don't knife the LO
   - LOR: 3 points of crystallization or return to LOC structure. No new arguments. Must address issues the other side claims to be winning
   - PMR: Summarize, weigh, pull through drops. Only respond to new MO arguments. Don't repeat PMC

DECISION TREE METHODOLOGY (use this to structure your thinking):
1. What is THE question that needs to be answered in this round?
2. What is each team's best case scenario? Which is better?
3. What is each team's worst case scenario? Which is worse?
4. How likely are each scenario to happen?
5. For each argument: Does it tell me why one side is GOOD, why the other side is BAD, or why their side is BETTER? (Comparative arguments are the strongest.)
6. Do I have to buy another argument first before this one is true? (Path dependencies)

WEIGHING METRICS (evaluate which team weighs better):
- Probability: How likely are these scenarios?
- Time-Scale: How quickly do impacts materialize? Urgent > speculative future
- Magnitude: How severe is the impact per person?
- Scope: How many people affected?
- Reversibility: Can the harm be undone?

KEY JUDGING PRINCIPLES:
- Offense vs Defense: Offense = reason to vote FOR a side. Defense = reason to vote AGAINST the other side. Impact turns = accepting the other side's framing but showing it favors YOUR side. Impact turns are the strongest form of argument.
- Framing/Characterization: If a characterization is uncontested, it's assumed true for the round. If competing characterizations exist, evaluate which is more plausible.
- Dropped arguments should NOT compose the vast majority of the ballot. A team should lose because a dropped argument was IMPORTANT, not because of the NUMBER of drops.
- Judge intervention should be minimal. If neither team weighs, look for implicit weighing first (who cited scope, magnitude, etc.), then do comparative weighing yourself as last resort.
- No low-point wins. The team that won, by definition, did more to win the round.

Provide:
1. DECISION: Who wins and why (Gov or Opp). Be decisive. Use the decision tree: what was THE question of the round?
2. KEY CLASH POINTS: 2-3 issues where the round was decided. For each: who won it, what was the comparative weighing, and were there path dependencies?
3. SPEECH-BY-SPEECH ASSESSMENT: Evaluate warrant quality, impact quality, rebuttal quality, role fulfillment. What did each speaker do well? What was their biggest miss?
4. SPEAKER POINTS: Assign points on the 15-38 scale with brief justification referencing the rubric above.
5. ADVICE: One key improvement for each speaker.

Be direct, specific, and reference actual content from the notes. Write like a real judge giving an RFD. Use markdown formatting.`;
      let allNotes = '';
      for (const speech of speeches) {
        const note = notes[speech.code] || '';
        const speechTags = tags[speech.code] || [];
        allNotes += '## ' + speech.title + ' (' + speech.code + ')\n';
        if (speechTags.length > 0) allNotes += 'Tags: ' + speechTags.join(', ') + '\n';

      const thr = createStreamThrottle((text) => setRoundEval(text), null);
      await callClaude(sysPrompt, userPrompt, (text) => thr.update(text), { thinkBudget: 12000, maxTokens: 10000, expectedWords: 1500, onProgress: (p) => setReProgress(p), feature: 'judge' });
      thr.finish();
    } catch(e) {
      setRoundEval('Error: ' + safeError(e));
    }
    setReProgress(null);
    setRoundEvalLoading(false);
  };

  const getFeedback = async (code) => {
    const speech = speeches.find(s=>s.code===code);
    const note = notes[code] || '';

    if (!note.trim()) return;
    setLoadingFeedback(prev => ({...prev, [code]:true}));
    try {
      const jProfile = JUDGE_EVAL_TYPES[judgeType] || JUDGE_EVAL_TYPES.tabula_rasa;
      const sysPrompt = `You are an experienced APDA judge providing deeply considered feedback on a debate speech.

JUDGE PARADIGM: ${jProfile.label}
${jProfile.prompt}

ROLE FULFILLMENT STANDARDS:
- PMC: Must present case statement, explain necessary facts, offer 2-3 arguments supporting the case with clear signposting. Start with strongest argument. An organizing structure ("we think X because A and B; if we prove either, we win") elevates a PMC from a list of arguments to a persuasive case. Watch time closely — leaving out arguments at the end is a serious error since new constructive arguments aren't accepted in MG.
- LOC: Most difficult speech. Three parts: (1) Opposition philosophy — broad statement of why case should be rejected, under 1 minute. (2) 2-3 independent off-case arguments (NOT mere responses to Gov). Ask: Why don't we have this in the status quo? How would people react? Is there a better way? (3) Move caseside for point-by-point responses. Better to have 2 strong off-case arguments with many smart responses than 5 off-case repeated as caseside responses.
- MG: First 4 min on Opp's arguments, back 4 on case. Must NOT come off as purely defensive — go after Opposition aggressively, attack their position rather than just reformulating Gov's. If LOC only dealt with fringe cases, point out they haven't challenged basic assumptions. No case shifts.
- MO: Last constructive, more flexibility. Can restructure the flow. Can add 1-2 new arguments woven in naturally. Focus on strongest material. Don't knife the LO.
- LOR: 3 points of crystallization or return to LOC structure. No new arguments. MUST address issues the other side claims to be winning — ignoring them makes it easy for the judge to use the other side's summary as the RFD. Try: "the only way they can win is if X" — then address X.
- PMR: Summarize, weigh, pull through drops. Only respond to genuinely new MO arguments. Don't repeat PMC. Don't try to respond to everything MO said.

EVALUATION CRITERIA: warrant quality, impact quality (comparative weighing on magnitude/probability/timeframe), rebuttal quality (engage strongest opposing arguments, not weakest), strategic positioning, signposting clarity.

SPEAKER SCALE: 27-29 = average (fulfills role with some flaws), 30-32 = above average (minor flaws, strong explanations), 33-35 = excellent (rare flaws), 36+ = exceptional (nearly flawless).

Think through the strategic implications. Be specific, reference debate theory, and give actionable advice. Use markdown formatting: **bold** for key terms, ## for section headers, ### for sub-sections.`;
      const tagStr = speechTags.length > 0 ? `\nTagged moments: ${speechTags.join(', ')}` : '';
      const userPrompt = `Speech: ${speech.title} (${speech.code}, ${speech.time})\nFormat: ${format}${tagStr}\n\nMy flow notes:\n${note}\n\nGive me specific, strategic feedback on this speech.`;
      await callClaude(sysPrompt, userPrompt, (text) => {

function buildJudgeFeedback(speech, note, activeTags) {
  if (!note.trim() && activeTags.length === 0) return 'Add notes or tag key moments to get specific feedback on this speech.';
  let fb = `Feedback for ${speech.title} (${speech.code}):\n\n`;
  if (activeTags.includes('STRONG WARRANT')) fb += '✓ Strong warranting noted — this will carry weight with the judge. Make sure the warrant connects clearly to the impact.\n\n';
  if (activeTags.includes('DROPPED ARG')) fb += '⚠ Dropped argument detected — this is a significant strategic issue. The other team can extend this in later speeches and claim it as conceded.\n\n';
  if (activeTags.includes('GOOD TURN')) fb += '✓ Good turn identified — turning an opponent\'s argument is one of the most powerful moves in debate. Make sure the turn is clean and the internal link is clear.\n\n';
  if (activeTags.includes('NEW IN REBUTTAL')) fb += '⚠ New argument in rebuttal — depending on the judge, this may be struck. It\'s generally better to seed responses earlier and crystallize in rebuttals rather than introduce entirely new material.\n\n';
  if (activeTags.includes('ASSERTION')) fb += '⚠ Assertion without warrant — this weakens the argument significantly. A good opponent will call this out. Every claim needs a "because" and a "which means."\n\n';
  if (activeTags.includes('KEY CLASH')) fb += '✓ Key clash point — this is where the round is likely decided. Both sides should be spending their most valuable speech time here.\n\n';
  if (note.trim()) fb += `Based on your notes: Focus on whether the speaker effectively extended their strongest arguments and responded to the most critical opposition points. ${speech.side === 'gov' || speech.side === 'og' ? 'As a government speaker, they should be defending the mechanism and weighing impacts.' : 'As an opposition speaker, they should be attacking the case at the link, impact, and uniqueness levels.'}`;
  return fb;
}

function Newbies() {

    { key:'what', icon:'\u{1F3DB}', title:'What Is Parliamentary Debate?', render: () => [
      el('p',{key:0},"Parliamentary debate is a structured format where two teams argue for and against a resolution. One team (Government) proposes and defends a position; the other (Opposition) challenges it."),
      el('p',{key:1},"In APDA (American Parliamentary Debate Association), the most common college format, it's 2v2. Government has a Prime Minister (PM) and Member of Government (MG). Opposition has a Leader of Opposition (LO) and Member of Opposition (MO). There are six speeches total, alternating sides."),
      el('p',{key:2},'Most APDA tournaments are "Cases Tournaments" where the Government team chooses the topic and has already prepared their case. The Opposition team doesn\'t get preparation time, except during POCs (Points of Clarification). There are also Motions rounds where both sides get 15 minutes to prep a topic chosen by the tournament.'),
      el('p',{key:3},"A judge watches the round and decides who won based on the quality of arguments, not personal opinion on the topic. After the round, the judge gives an RFD (Reason for Decision) explaining the call. Listen carefully to RFDs. They're more valuable than any practice you'll do."),

    { key:'tournament', icon:'\u{1F3C6}', title:'Your First Tournament', render: () => [
      el('p',{key:0},"Tournaments run Friday afternoon through Saturday evening. There are 5 in-rounds that everyone participates in. After in-rounds, the top teams continue into out-rounds (elimination rounds): octafinals, quarterfinals, semifinals, and finals."),
      el('p',{key:1},"A typical schedule: arrive Friday afternoon, check into the GA (General Assembly, where everyone hangs out), listen to briefings, then debate rounds 1 through 3 that evening. Saturday morning you finish rounds 4 and 5, break is announced around 1 PM, and outrounds go until about 10 PM."),
      el('p',{key:'2a'},"In each round, speakers are assigned speaker points based on their speech quality. The average varsity score is around 28, and the average novice score is around 25. Most tournaments have closed speaks, meaning you don't find out your points until the tab card is posted after the tournament."),
      el('div',{key:2,className:'newbie-callout'}, "Dress is casual. Wear what you'd wear to class. Friday night dinner is usually provided, plus Saturday breakfast and lunch. You'll be nervous. Everyone is. You'll probably speak too fast, forget a warrant, and feel like the other team is way better. This is normal. The other team also forgot a warrant and also thinks you're better than them."),
      el('p',{key:3},"You will lose rounds, probably most of your early ones. This is the learning process, not a failure. The best debaters in the country lost constantly when they started. The most important thing: after each round, listen to the judge's RFD. That feedback is gold."),

    { key:'structure', icon:'\u{1F4CB}', title:'Structure of a Round', render: () => [

          el('tr',null, el('td',null,'Leader of Opp Constructive (LOC)'), el('td',null,'Opposition'), el('td',null,'8:30')),

          el('tr',null, el('td',null,'LO Rebuttal (LOR)'), el('td',null,'Opposition'), el('td',null,'4 min')),
          el('tr',null, el('td',null,'PM Rebuttal (PMR)'), el('td',null,'Government'), el('td',null,'5 min')),

      el('p',{key:2},"All speeches have a 30-second grace period. During constructive speeches (not LOR or PMR), the other team can offer Points of Information (POIs), which are brief questions or comments that support their side. You offer one by raising your hand, and the speaker can accept or decline. General rule: if someone offers you a POI, almost never take it."),
      el('div',{key:3,className:'newbie-callout'}, el('span',null, el('strong',null,'No new arguments in rebuttals. '), "LOR and PMR can introduce new weighing and new examples, but no new substantive arguments or responses. If you think the other team brought something new in rebuttal, you can call a Point of Order by interrupting and saying so. The judge rules on whether it's new.")),

    { key:'formats', icon:'\uD83C\uDF10', title:'Debate Formats Around the World', render: () => {
