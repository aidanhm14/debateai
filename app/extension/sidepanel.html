<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Counter: oral exam trainer</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #0a0a0c;
    --fg: #e8e8ea;
    --muted: #8a8a92;
    --line: #232328;
    --chip: #15151a;
    --chip-hover: #1f1f25;
    --crimson: #e54545;
  }
  html, body {
    height: 100%;
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--fg);
    font: 13px/1.4 -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  }
  .bar {
    position: sticky;
    top: 0;
    z-index: 5;
    height: 38px;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 12px;
    background: linear-gradient(180deg, rgba(14,14,18,0.96), rgba(10,10,12,0.92));
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--line);
  }
  .bar__brand {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    color: #fff;
    font-weight: 800;
    font-size: 11.5px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }
  .bar__brand::before {
    content: '';
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--crimson);
    box-shadow: 0 0 0 0 rgba(229, 69, 69, 0.55);
    animation: counter-pulse 2.4s ease-out infinite;
  }
  @keyframes counter-pulse {
    0%   { box-shadow: 0 0 0 0   rgba(229, 69, 69, 0.55); }
    70%  { box-shadow: 0 0 0 8px rgba(229, 69, 69, 0); }
    100% { box-shadow: 0 0 0 0   rgba(229, 69, 69, 0); }
  }
  .bar__hint {
    color: var(--muted);
    font-size: 11px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-style: italic;
  }
  .bar__spacer { flex: 1; }
  .btn {
    appearance: none;
    background: var(--chip);
    color: var(--fg);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 4px 8px;
    cursor: pointer;
    font: 11px/1 -apple-system, system-ui, sans-serif;
  }
  .btn:hover { background: var(--chip-hover); }
  iframe#frame {
    display: block;
    width: 100%;
    height: calc(100% - 36px);
    border: 0;
    background: var(--bg);
  }
  /* ── Google Docs agent strip (Stage 1: read-only) ──
     Sits between the top brand bar and the iframe. Hidden by default;
     toggled via the "Docs" button in the brand bar. Compact — single
     row when collapsed, grows to ~120px when an active doc is read.   */
  .docs {
    display: none;
    border-bottom: 1px solid var(--line);
    background: #0d0d11;
    padding: 8px 10px;
    font-size: 12px;
    color: var(--fg);
    gap: 8px;
    flex-direction: column;
  }
  .docs.is-open { display: flex; }
  .docs__row { display: flex; align-items: center; gap: 8px; min-height: 24px; }
  .docs__status {
    display: inline-flex; align-items: center; gap: 6px;
    color: var(--muted); font-size: 11px; flex: 1; min-width: 0;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .docs__dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #6a6a72; flex: 0 0 auto;
  }
  .docs.is-connected .docs__dot { background: #22c55e; box-shadow: 0 0 0 3px rgba(34,197,94,.18); }
  .docs__btn {
    appearance: none; border: 1px solid var(--line);
    background: var(--chip); color: var(--fg);
    border-radius: 6px; padding: 4px 9px; cursor: pointer;
    font: 11px/1 -apple-system, system-ui, sans-serif;
  }
  .docs__btn:hover { background: var(--chip-hover); }
  .docs__btn--primary {
    background: linear-gradient(180deg,#e54545,#c83232);
    border-color: rgba(229,69,69,.6); color:#fff; font-weight:600;
  }
  .docs__btn--primary:hover { filter: brightness(1.06); }
  .docs__panel {
    background: #14141a; border: 1px solid var(--line);
    border-radius: 8px; padding: 8px 10px; font-size: 11px;
    color: var(--fg); max-height: 140px; overflow: auto;
    line-height: 1.45; white-space: pre-wrap; word-break: break-word;
  }
  .docs__panel--meta {
    color: var(--muted); font-size: 10.5px;
    border: 0; background: transparent; padding: 2px 0; max-height: none;
  }
  .docs__error {
    background: rgba(239,68,68,.08); border:1px solid rgba(239,68,68,.4);
    color: #fca5a5; padding: 7px 9px; border-radius: 6px; font-size: 11px;
  }
  .docs__hint { color: var(--muted); font-size: 10.5px; margin-top: 2px; }
  .docs__title { color: var(--fg); font-weight: 600; }
  iframe#frame.is-shorter { height: calc(100% - 36px - var(--docs-h, 56px)); }
  .toast {
    position: fixed;
    left: 12px;
    right: 12px;
    bottom: 12px;
    background: #1a1a1f;
    color: #fff;
    padding: 10px 12px;
    border-radius: 10px;
    font-size: 12px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.45);
    transform: translateY(8px);
    opacity: 0;
    pointer-events: none;
    transition: transform 180ms ease, opacity 160ms ease;
    z-index: 10;
  }
  .toast.is-shown {
    transform: translateY(0);
    opacity: 1;
  }
  .err-shade {
    position: absolute;
    inset: 36px 0 0 0;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: var(--bg);
    text-align: center;
    color: var(--muted);
    z-index: 4;
  }
  .err-shade.is-shown { display: flex; }
  .err-shade__inner { max-width: 320px; }
  .err-shade__title {
    color: var(--fg);
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 6px;
  }
  a { color: #f0a0a0; }
</style>
</head>
<body>
  <div class="bar">
    <span class="bar__brand">Counter</span>
    <span class="bar__hint" id="hint">Defend your work out loud. The AI grills you.</span>
    <span class="bar__spacer"></span>
    <button class="btn" id="docsToggle" title="Connect to Google Docs">Docs</button>
    <button class="btn" id="typed" title="Switch to typed flow (debate-ai)">Typed</button>
    <button class="btn" id="paste" title="Paste from clipboard">Paste</button>
    <button class="btn" id="reload" title="Reload the panel">↻</button>
  </div>
  <!-- Google Docs agent strip. Stage 1 = read-only proof-of-life:
       OAuth, then read the active Doc and surface title + snippet.
       Stage 2 will turn the snippet into actionable Suggestions. -->
  <div class="docs" id="docs">
    <div class="docs__row">
      <span class="docs__dot" aria-hidden="true"></span>
      <span class="docs__status" id="docsStatus">Not connected to Google Docs</span>
      <button class="docs__btn docs__btn--primary" id="docsConnect">Connect</button>
      <button class="docs__btn" id="docsDisconnect" style="display:none">Disconnect</button>
      <button class="docs__btn" id="docsRead" style="display:none">Read active doc</button>
    </div>
    <div id="docsBody"></div>
  </div>
  <iframe
    id="frame"
    title="Counter: oral exam trainer"
    src="https://debateai.com/voice-debate.html?ext=1&amp;mode=counter"
    allow="microphone; camera; autoplay; clipboard-read; clipboard-write; display-capture"
    referrerpolicy="origin"
  ></iframe>
  <div class="err-shade" id="errShade">
    <div class="err-shade__inner">
      <div class="err-shade__title">Couldn't load Counter</div>
      <p>Check your connection, or open the full app at <a href="https://debateai.com" target="_blank" rel="noopener">debateai.com</a>.</p>
      <button class="btn" id="retry">Retry</button>
    </div>
  </div>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script src="sidepanel.js"></script>
</body>
</html>
