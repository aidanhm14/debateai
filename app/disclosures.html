<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>Community · Debate AI</title>
<meta name="description" content="The disclosures board moved to /community. Same cases, plus a discussion sub-forum." />
<meta http-equiv="refresh" content="0; url=/community" />
<link rel="canonical" href="https://debateai.com/community">
<style>
  html,body{margin:0;padding:0;background:#0a0a0c;color:#fff;font-family:system-ui,sans-serif}
  body{display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:24px}
  a{color:#ef4444;font-weight:700}
</style>
</head>
<body>
<noscript>
  <p>The Disclosures board moved to <a href="/community">/community</a> — refresh.</p>
</noscript>
<script>
  // /disclosures was renamed to /community when the discussion sub-
  // forum shipped. Keep this stub for any external links / search
  // results pointing at the old URL — instant client-side redirect
  // preserves the user's intent without a 404. The meta-refresh
  // above is the no-JS fallback.
  try {
    var hash = window.location.hash || '';
    var search = window.location.search || '';
    window.location.replace('/community' + search + hash);
  } catch (e) {
    window.location.href = '/community';
  }
</script>
</body>
</html>
