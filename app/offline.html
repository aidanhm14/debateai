<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offline · DebateIt</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Segoe UI',system-ui,sans-serif;background:#2b2b30;color:#e8ecf4;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;text-align:center}
.wrap{max-width:400px}
.icon{margin-bottom:24px}
h1{font-size:1.4rem;font-weight:700;margin-bottom:8px}
p{color:#94a3b8;font-size:.9rem;line-height:1.6;margin-bottom:20px}
button{padding:12px 28px;background:#ef4444;border:none;border-radius:10px;color:#fff;font-size:.9rem;font-weight:600;cursor:pointer;font-family:inherit;transition:.2s}
button:hover{background:#dc2626;transform:translateY(-1px)}
</style>
</head>
<body>
<div class="wrap">
  <div class="icon">
    <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="32" cy="32" r="28" stroke="#ffffff12" stroke-width="1.5"/>
      <path d="M20 38c0-6.6 5.4-12 12-12s12 5.4 12 12" stroke="#ef4444" stroke-width="2" stroke-linecap="round" fill="none"/>
      <path d="M24 34c0-4.4 3.6-8 8-8s8 3.6 8 8" stroke="#ef4444" stroke-width="2" stroke-linecap="round" fill="none" opacity=".6"/>
      <circle cx="32" cy="40" r="3" fill="#ef4444"/>
      <line x1="18" y1="18" x2="46" y2="46" stroke="#ef444480" stroke-width="2" stroke-linecap="round"/>
    </svg>
  </div>
  <h1>You're offline</h1>
  <p>DebateIt needs an internet connection to generate cases and run AI tools. Check your connection and try again.</p>
  <button onclick="window.location.reload()">Try Again</button>
</div>
</body>
</html>
