<style>
  /* Review proof wall — ported from landing.html. Cards are warm-white
     "paper"; this page runs the light theme so the [data-theme="light"]
     variants below are the active set. */
  .review{position:relative;padding:40px 24px 56px;display:flex;justify-content:center;
    background:
      radial-gradient(58% 52% at 50% 44%, rgba(239,68,68,.07), transparent 64%),
      radial-gradient(115% 85% at 50% 50%, rgba(255,255,255,.022), transparent 72%);}
  [data-theme="light"] .review{background:none}
  .review-wrap{width:100%;max-width:min(1040px,92vw);display:flex;flex-direction:column;gap:20px}
  .review-card{
    display:flex;flex-direction:column;position:relative;
    margin:0;padding:17px 21px 14px;
    border-radius:13px;
    background:linear-gradient(160deg,#33291f 0%,#251d18 100%);
    border:1px solid rgba(255,226,198,.12);
    box-shadow:0 24px 60px -14px rgba(0,0,0,.6), 0 2px 40px rgba(239,68,68,.06), 0 0 0 1px rgba(255,255,255,.05);
    overflow:hidden;
    box-sizing:border-box;
  }
  [data-theme="light"] .review-card{background:#ffffff;border-color:rgba(0,0,0,.08);box-shadow:0 18px 50px -16px rgba(0,0,0,.18),0 0 0 1px rgba(0,0,0,.03)}
  [data-theme="light"] .tc-circuit{color:#c81e1e}
  [data-theme="light"] .review-quote{color:#3a322c}
  [data-theme="light"] .review-hl{color:#16110d}
  [data-theme="light"] .review-attr{border-top-color:rgba(0,0,0,.1)}
  [data-theme="light"] .review-ava{background:rgba(200,30,30,.1);color:#c81e1e;border-color:rgba(200,30,30,.26)}
  [data-theme="light"] .review-attr-name{color:#1a1410}
  [data-theme="light"] .review-chip{color:#5c5048;border-color:rgba(0,0,0,.16);background:rgba(0,0,0,.035)}
  .review-card::before{
    content:'';position:absolute;top:0;left:0;right:0;height:3px;
    background:linear-gradient(90deg,#ef4444 0%,rgba(239,68,68,.25) 100%);
    border-radius:14px 14px 0 0;

  .tc-circuit{
    display:inline-block;margin-bottom:9px;

  .review-hl{font-weight:650;color:#fff}
  .review-attr{display:flex;align-items:center;gap:10px;margin-top:auto;padding-top:11px;border-top:1px solid rgba(255,255,255,.13)}
  .review-ava{
    flex:0 0 auto;width:31px;height:31px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-family:'Crimson Pro','Fraunces',Georgia,serif;font-size:.7rem;font-weight:700;letter-spacing:.02em;

  }
  .review-attr-text{display:flex;flex-direction:column;gap:5px;min-width:0}
  .review-attr-name{font-family:'Crimson Pro','Fraunces',Georgia,serif;font-size:.82rem;font-weight:700;color:#f5efe6;letter-spacing:-.01em;line-height:1.2}
  .review-chips{display:flex;flex-wrap:wrap;gap:5px}
  .review-chip{
    font-size:.55rem;font-weight:700;letter-spacing:.03em;line-height:1;
    padding:3px 7px;border-radius:999px;
    color:rgba(245,240,232,.8);border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.07);
    white-space:nowrap;

  .review-photo{display:none}
  @media (min-width:768px){
    .testimonial-stack{position:relative;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:15px;align-items:stretch;overflow:visible}

      content:'';position:absolute;inset:-7% -5% -10% -5%;z-index:0;border-radius:30px;

      position:relative;z-index:1;width:auto;

    .testimonial-card.tc-dimmed{opacity:1 !important;filter:none;transform:none !important}

    .review-photo{
      display:flex;flex-direction:column;position:relative;z-index:1;

      background:#fdfcf8;border:1px solid rgba(239,68,68,.18);

    .review-photo-cap{display:flex;align-items:center;gap:7px;padding:9px 13px 10px;background:#fdfcf8}
    .review-photo-cap .dot{flex:0 0 auto;width:6px;height:6px;border-radius:50%;background:#ef4444;box-shadow:0 0 0 3px rgba(239,68,68,.15)}
    .review-photo-name{font-family:'Crimson Pro','Fraunces',Georgia,serif;font-size:.92rem;font-weight:700;color:#1a1a1f;letter-spacing:-.01em;line-height:1}
    .review-photo--bl,.review-photo--tr{transform:none}
    .review-photo:hover{transform:scale(1.03);box-shadow:0 32px 96px rgba(0,0,0,.24);z-index:25}
    .review-nav{display:none}
  }
  @media (min-width:980px){
    .testimonial-stack{grid-template-columns:repeat(3,minmax(0,1fr))}
    .card-1{grid-area:1 / 1}
    .card-2{grid-area:1 / 2}
    .review-photo--tr{grid-area:1 / 3}
    .review-photo--bl{grid-area:2 / 1}
    .card-3{grid-area:2 / 2}
    .card-4{grid-area:2 / 3}

    .review{padding:24px 14px 48px}
    .testimonial-stack{
      display:flex;gap:14px;

      padding:4px 18vw 16px 16px;scrollbar-width:thin;

      touch-action:pan-y;cursor:grab;
    }
    .testimonial-stack::-webkit-scrollbar{height:5px}
    .testimonial-stack::-webkit-scrollbar-thumb{background:rgba(127,127,127,.22);border-radius:99px}
    .testimonial-card{flex:0 0 82vw;scroll-snap-align:start;scroll-snap-stop:always}
    .review-chip{white-space:normal}
    .review-nav{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:16px}
  }
  .review-swipe-hint{
    font-size:.72rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;
    color:var(--text-dim,rgba(255,255,255,.55));
    display:inline-flex;align-items:center;gap:6px;
    animation:reviewHintPulse 2.4s ease-in-out infinite;
  }
  .review-swipe-hint span{display:inline-block;animation:reviewHintNudge 1.4s ease-in-out infinite}
  @keyframes reviewHintPulse{0%,100%{opacity:.55}50%{opacity:1}}
  @keyframes reviewHintNudge{0%,100%{transform:translateX(0)}50%{transform:translateX(4px)}}
  .review-nav.reviewed .review-swipe-hint{opacity:0;transition:opacity .4s ease;pointer-events:none}
  .review-dots{display:flex;align-items:center;gap:2px}
  .review-dot{
    width:32px;height:32px;padding:0;border:none;background:transparent;
    cursor:pointer;display:inline-flex;align-items:center;justify-content:center;
    -webkit-tap-highlight-color:transparent;
  }
  .review-dot::before{
    content:'';display:block;width:8px;height:8px;border-radius:50%;
    border:1px solid rgba(239,68,68,.45);background:transparent;
    transition:transform .2s ease,background .2s ease,width .2s ease;
  }
  .review-dot.on::before{background:#ef4444;border-color:#ef4444;width:22px;border-radius:99px}
  [data-theme="light"] .review-dot::before{border-color:rgba(220,38,38,.5)}
  [data-theme="light"] .review-dot.on::before{background:#dc2626;border-color:#dc2626}
  @media (prefers-reduced-motion:reduce){
    .review-swipe-hint,.review-swipe-hint span{animation:none}
    .testimonial-card{animation:none !important;transition:none !important}
  }
</style>

<body>
<div id="daTopbar"></div>

<header class="shell">
  <div class="page-hero">
    <span class="eyebrow"><span class="dot" aria-hidden="true"></span>From the circuit</span>
    <h1>Four circuits. Same verdict.</h1>
    <p class="lede">Different formats, different countries, same thing keeps coming up: access to serious practice.</p>
  </div>
</header>

<section class="review" aria-label="What competitive debaters say">
  <div class="review-wrap">
    <div class="testimonial-stack" id="reviewGrid" role="list">
      <figure class="review-card testimonial-card card-1" role="listitem">
        <span class="tc-circuit">World Schools</span>
        <blockquote class="review-quote">
          I captained Zimbabwe at Worlds and competed at Columbia in the US. <span class="review-hl">The real gap between circuits isn't talent, it's access to quality practice.</span> DebateIt closes it. The AI argues back at full strength, knows what a World Schools round demands, and the ballot tells you exactly where the round was won or lost.
        </blockquote>
        <figcaption class="review-attr">
          <span class="review-ava" aria-hidden="true">MM</span>
          <span class="review-attr-text">
            <span class="review-attr-name">Mukudzeiishe Madzivire</span>
            <span class="review-chips">
              <span class="review-chip">Captain, Zimbabwe World Schools Team</span>
              <span class="review-chip">Champion debater, Columbia University</span>
            </span>
          </span>
        </figcaption>
      </figure>
      <figure class="review-card testimonial-card card-2" role="listitem">
        <span class="tc-circuit">Public Forum</span>
        <blockquote class="review-quote">
          DebateIt represents the future of enlightened debate. You can tell how much thought went into every layer of the experience, from case generation to the objectivity of the judging. It's proof that <span class="review-hl">AI can sharpen critical thinking rather than replace it</span>.
        </blockquote>
        <figcaption class="review-attr">
          <span class="review-ava" aria-hidden="true">PF</span>
          <span class="review-attr-text">
            <span class="review-attr-name">2025 Public Forum National Champion</span>
            <span class="review-chips">
              <span class="review-chip">NSDA Nationals</span>
            </span>
          </span>
        </figcaption>
      </figure>
      <figure class="review-card testimonial-card card-3" role="listitem">
        <span class="tc-circuit">British Parliamentary</span>
        <blockquote class="review-quote">
          In the four years I have been competing in British Parliamentary debate, <span class="review-hl">I have never seen a tool effectively able to summarize, refute, and analyze high-level argumentation</span> until I used Debate it. The platform would have made a substantive difference in my preparation for international majors, and I recommend it to all.
        </blockquote>
        <figcaption class="review-attr">
          <span class="review-ava" aria-hidden="true">AR</span>
          <span class="review-attr-text">
            <span class="review-attr-name">Arjun Raman</span>
            <span class="review-chips">
              <span class="review-chip">WUDC Octofinalist</span>
              <span class="review-chip">Princeton IV finalist</span>
              <span class="review-chip">Top-ranked adjudicator</span>
            </span>
          </span>
        </figcaption>
      </figure>
      <figure class="review-card testimonial-card card-4" role="listitem">
        <span class="tc-circuit">APDA / UChicago</span>
        <blockquote class="review-quote">
          I've debated across 4 continents and 4 formats, and I think we need more of it. Having solved away manual labor in our lives, we now go to gyms to stay physically fit. <span class="review-hl">In a world where we can outsource our thinking to AI, we need more tools to keep us sharp.</span> Debate is one such tool that forces us to think critically and confront disagreements openly. DebateIt makes this activity more accessible and helps us get better at it, like the chess.com of debate.
        </blockquote>
        <figcaption class="review-attr">
          <span class="review-ava" aria-hidden="true">PS</span>
          <span class="review-attr-text">
            <span class="review-attr-name">Pratyush Sharma</span>
            <span class="review-chips">
              <span class="review-chip">Debater, University of Chicago</span>
            </span>
          </span>
        </figcaption>
      </figure>
      <!-- Corner photos: real debaters mid-round filling the empty
           bottom-left + top-right of the diagonal. Decorative (aria-hidden);
           desktop-only — the mobile carousel has no corners. -->
      <figure class="review-photo review-photo--bl" aria-hidden="true">
        <img src="/img/reviews/muku.jpg" alt="" width="232" height="155" loading="lazy" decoding="async" onerror="var f=this.closest('figure');if(f)f.style.display='none'" />
        <figcaption class="review-photo-cap"><span class="dot"></span><span class="review-photo-name">Muku</span></figcaption>
      </figure>
      <figure class="review-photo review-photo--tr" aria-hidden="true">
        <img src="/img/reviews/aidan.jpg" alt="" width="232" height="155" loading="lazy" decoding="async" onerror="var f=this.closest('figure');if(f)f.style.display='none'" />
        <figcaption class="review-photo-cap"><span class="dot"></span><span class="review-photo-name">Aidan</span></figcaption>
      </figure>
    </div>
    <!-- swipe/dot nav -->
    <div class="review-nav">
      <span class="review-swipe-hint">Swipe reviews <span aria-hidden="true">→</span></span>
      <div class="review-dots" id="reviewDots" role="tablist" aria-label="Choose a review"></div>
    </div>
  </div>
</section>

<footer class="closing">
  <a class="cta cta-primary" href="/debate-it">Start a round</a>
  <a class="cta cta-ghost" href="/">Back to home</a>
</footer>

<script>
(function(){
  var stack = document.getElementById('reviewGrid');
  if (!stack) return;
  var isMobile = function(){ return window.innerWidth < 768; };
  var cards = [].slice.call(stack.querySelectorAll('.testimonial-card'));
  if (!cards.length) return;

  function activateCard(card){
    if (isMobile()) return;
    stack.classList.add('tc-stack-active');
    cards.forEach(function(c){
      c.classList.toggle('tc-hovered', c === card);
      c.classList.toggle('tc-dimmed', c !== card);
    });
  }
  function deactivateAll(){
    stack.classList.remove('tc-stack-active');
    cards.forEach(function(c){ c.classList.remove('tc-hovered','tc-dimmed'); });
  }
  cards.forEach(function(card){
    card.addEventListener('mouseenter', function(){ activateCard(card); });
    card.addEventListener('focus',      function(){ activateCard(card); });
  });
  stack.addEventListener('mouseleave', deactivateAll);
  stack.addEventListener('focusout', function(e){
    if (!stack.contains(e.relatedTarget)) deactivateAll();
  });

  var dotsWrap = document.getElementById('reviewDots');
  var dots = [];
  var active = -1;
  if (dotsWrap){
    dots = cards.map(function(card,i){
      var d = document.createElement('button');
      d.type='button';d.className='review-dot';
      d.setAttribute('role','tab');
      d.setAttribute('aria-label','Review '+(i+1)+' of '+cards.length);
      d.addEventListener('click',function(){goTo(i);});
      dotsWrap.appendChild(d);
      return d;
    });
  }
  function setActive(i){
    if(i===active) return; active=i;
    dots.forEach(function(d,k){
      var on=k===i;d.classList.toggle('on',on);
      d.setAttribute('aria-selected',on?'true':'false');
    });
    if(active>=cards.length-1){
      var nav=stack.parentNode&&stack.parentNode.querySelector('.review-nav');
      if(nav) nav.classList.add('reviewed');
    }
  }
  function sync(){
    var mid=stack.scrollLeft+stack.clientWidth/2,best=0,bd=Infinity;
    cards.forEach(function(c,i){var d=Math.abs(c.offsetLeft+c.clientWidth/2-mid);if(d<bd){bd=d;best=i;}});
    setActive(best);
  }
  // Animate scrollLeft via rAF rather than scrollTo({behavior:'smooth'}).
  // Smooth scrollTo silently no-ops in some in-app WebViews (and under
  // automation), which left the carousel stranded between cards. rAF is
  // universal, so the snap lands every time.
  var snapRaf=0;
  function animateScrollLeft(to){
    if(snapRaf){ cancelAnimationFrame(snapRaf); snapRaf=0; }
    var from=stack.scrollLeft, dist=to-from, start=null, dur=300;
    if(Math.abs(dist)<1){ stack.scrollLeft=to; return; }
    function step(ts){
      if(start===null) start=ts;
      var p=Math.min(1,(ts-start)/dur);
      var e=1-Math.pow(1-p,3); // easeOutCubic
      stack.scrollLeft=from+dist*e;
      snapRaf = p<1 ? requestAnimationFrame(step) : 0;
    }
    snapRaf=requestAnimationFrame(step);
  }
  function goTo(i){
    i=Math.max(0,Math.min(cards.length-1,i));
    var c=cards[i];
    var pad=parseFloat(getComputedStyle(stack).scrollPaddingLeft)||0;
    var left=Math.max(0,c.offsetLeft-pad);
    animateScrollLeft(left);
  }
  var raf;
  stack.addEventListener('scroll',function(){
    sync();
    if(raf) return;
    raf=requestAnimationFrame(function(){raf=0;sync();});
  },{passive:true});

  function canSwipe(){ return stack.scrollWidth > stack.clientWidth + 4; }
  function nearestIndex(){
    var mid=stack.scrollLeft+stack.clientWidth/2, best=0, bd=Infinity;
    cards.forEach(function(c,k){var d=Math.abs(c.offsetLeft+c.clientWidth/2-mid);if(d<bd){bd=d;best=k;}});
    return best;
  }
  var down=false, sx=0, sy=0, sLeft=0, axis=null, moved=false;
  stack.addEventListener('pointerdown',function(e){
    if(e.pointerType !== 'mouse') return;
    if(!canSwipe()) return;
    down=true; moved=false; axis=null;
    sx=e.clientX; sy=e.clientY; sLeft=stack.scrollLeft;
  });
  stack.addEventListener('pointermove',function(e){
    if(!down) return;
    var dx=e.clientX-sx, dy=e.clientY-sy;
    if(axis===null && (Math.abs(dx)>6 || Math.abs(dy)>6)){
      axis = Math.abs(dx) >= Math.abs(dy) ? 'x' : 'y';
      if(axis==='x'){ try{ stack.setPointerCapture(e.pointerId); }catch(_){} stack.style.cursor='grabbing'; }
    }
    if(axis==='x'){
      moved=true;
      if(e.cancelable) e.preventDefault();
      stack.scrollLeft = sLeft - dx;
    }
  },{passive:false});
  function endSwipe(e){
    if(!down) return; down=false;
    stack.style.cursor='';
    if(axis==='x'){
      try{ stack.releasePointerCapture(e.pointerId); }catch(_){}
      goTo(nearestIndex());
    }
    axis=null;
  }
  stack.addEventListener('pointerup',endSwipe);
  stack.addEventListener('pointercancel',endSwipe);

  var tDown=false, tx=0, ty=0, tLeft=0, tAxis=null, tMoved=false;
  stack.addEventListener('touchstart',function(e){
    if(!canSwipe() || e.touches.length!==1){ tDown=false; return; }
    tDown=true; tAxis=null; tMoved=false;
    var t=e.touches[0]; tx=t.clientX; ty=t.clientY; tLeft=stack.scrollLeft;
  },{passive:true});
  stack.addEventListener('touchmove',function(e){
    if(!tDown || !e.touches.length) return;
    var t=e.touches[0], dx=t.clientX-tx, dy=t.clientY-ty;
    if(tAxis===null && (Math.abs(dx)>4 || Math.abs(dy)>4)){
      tAxis = Math.abs(dx) > Math.abs(dy) ? 'x' : 'y';
    }
    if(tAxis==='x'){
      tMoved=true;
      if(e.cancelable) e.preventDefault();
      stack.scrollLeft = tLeft - dx;
    }
  },{passive:false});
  function tEnd(){
    if(!tDown) return; tDown=false;
    if(tAxis==='x') goTo(nearestIndex());
    tAxis=null;
  }
  stack.addEventListener('touchend',tEnd);
  stack.addEventListener('touchcancel',tEnd);

  stack.addEventListener('click',function(e){ if(moved||tMoved){ e.preventDefault(); e.stopPropagation(); moved=false; tMoved=false; } },true);
  sync();
})();
</script>
