<!-- Global UI sound effects. Pure Web Audio synthesis, no MP3 assets.
     Tap-to-enter plays SFX.confirm() alongside the (optional) MP3 hook
     so visitors get immediate feedback even when the MP3 file is
     missing or still loading. -->
<script defer src="/js/sfx.js"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#000}
body{
  font-family:'Crimson Pro','Fraunces',Georgia,"Times New Roman",serif;
  color:#fff;-webkit-font-smoothing:antialiased;
  cursor:pointer;
  user-select:none;-webkit-user-select:none;
}

/* ── Full-bleed stage ──────────────────────────────────── */
.stage{
  position:fixed;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:24px;
  background:
    radial-gradient(ellipse 60% 50% at 50% 50%, rgba(239,68,68,.18), transparent 60%),
    radial-gradient(ellipse 90% 60% at 50% 100%, rgba(239,68,68,.10), transparent 70%),
    #000;
  /* fade-in on first paint */
  opacity:0;
  animation:stageIn .9s cubic-bezier(.2,.7,.2,1) .15s forwards;
}
@keyframes stageIn{to{opacity:1}}

/* ── Brand mark, top ───────────────────────────────────── */
.brand{
  position:fixed;top:22px;left:50%;transform:translateX(-50%);
  font-size:.82rem;font-weight:900;letter-spacing:.16em;text-transform:uppercase;
  color:#fff;
  pointer-events:none;
  z-index:6;
}
.brand em{color:#ef4444;font-style:normal;margin-right:6px}

/* ── Audio frequency bars ───────────────────────────────────────
   Two banks of animated vertical bars fan out from the mic to the
   left and right edges of the viewport, each bar pulsing on its own
   staggered phase so the whole thing reads as a live audio spectrum
   / oscilloscope feed. The mic is the source; the bars are what it
   sees. Bars fade to transparent at the outer edges via mask-image
   so they bleed into the dark background instead of stopping in a
   hard line. */
.wave{
  position:fixed;top:50%;
  display:flex;align-items:center;
  gap:4px;
  height:160px;width:42vw;
  transform:translateY(-50%);
  z-index:2;
  pointer-events:none;
  opacity:0;
  animation:waveIn 1.2s cubic-bezier(.2,.7,.2,1) .35s forwards;
}
.wave-l{
  left:0;
  padding-left:36px;
  -webkit-mask-image:linear-gradient(to right, transparent 0%, #000 16%, #000 84%, transparent 100%);
          mask-image:linear-gradient(to right, transparent 0%, #000 16%, #000 84%, transparent 100%);
}
.wave-r{
  right:0;
  padding-right:36px;
  flex-direction:row-reverse;
  -webkit-mask-image:linear-gradient(to left, transparent 0%, #000 16%, #000 84%, transparent 100%);
          mask-image:linear-gradient(to left, transparent 0%, #000 16%, #000 84%, transparent 100%);
}
.wave span{
  flex:1 1 0;
  min-width:3px;max-width:6px;
  height:60%;
  border-radius:3px;
  background:linear-gradient(to top,
    rgba(239,68,68,.20) 0%,
    rgba(239,68,68,.9)  45%,
    #ff8a8a            100%);
  box-shadow:0 0 10px rgba(239,68,68,.35);
  transform-origin:center;
  transform:scaleY(var(--rest,.3));
  animation:barPulse 1.9s cubic-bezier(.4,0,.2,1) infinite;
  animation-delay:var(--d,0s);
}
@keyframes barPulse{
  0%,100%{transform:scaleY(var(--rest,.25))}
  50%    {transform:scaleY(var(--peak,1))}
}
@keyframes waveIn{
  from{opacity:0;transform:translateY(-50%) scale(.94)}
  to  {opacity:1;transform:translateY(-50%) scale(1)}
}
/* ── Center: mic + pulsing rings ───────────────────────── */
.orb{
  position:relative;
  width:240px;height:240px;
  display:flex;align-items:center;justify-content:center;
  margin-bottom:48px;
}
.ring{
  position:absolute;inset:0;
  border-radius:50%;
  border:1.5px solid rgba(239,68,68,.55);
  /* 4.2s (was 2.6s) reads as a slow sonar ping rather than a busy
     pulse. Smoother easing too — cubic-bezier(.4,0,.2,1) is the
     material standard-out which feels less "popped" than the prior
     (.2,.7,.2,1). Stagger updated to .keep the 4-ring cadence even
     across the longer cycle (~1.05s between rings starting). */
  animation:pulse 4.2s cubic-bezier(.4,0,.2,1) infinite;
}
.ring:nth-child(2){animation-delay:1.05s}
.ring:nth-child(3){animation-delay:2.10s}
.ring:nth-child(4){animation-delay:3.15s}
@keyframes pulse{
  /* Tighter envelope (.6 → 1.55 vs .55 → 1.65) so the rings feel like
     they bloom rather than snap outward. Opacity curve also smoother:
     hold a touch longer at the start, fade gently. */
  0%{transform:scale(.6);opacity:.92;border-width:2px}
  18%{opacity:.85}
  85%{opacity:0;border-width:.5px}
  100%{transform:scale(1.55);opacity:0}
}
.core{
  position:relative;z-index:2;
  width:96px;height:96px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%, #ff6b6b 0%, #ef4444 45%, #b91c1c 100%);
  box-shadow:
    0 0 60px rgba(239,68,68,.55),
    0 0 120px rgba(239,68,68,.32),
    inset 0 -8px 30px rgba(0,0,0,.45);
  display:flex;align-items:center;justify-content:center;
  /* Slowed from 3.4s to 5.2s so the breathe reads as inhale/exhale
     rather than nervous pulse. Same scale envelope. */
  animation:breathe 5.2s ease-in-out infinite;
}
@keyframes breathe{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.06)}
}
/* Inline mic glyph — no external SVG load */
.mic{
  width:34px;height:34px;
  fill:#fff;opacity:.96;
  filter:drop-shadow(0 1px 2px rgba(0,0,0,.4));
}

/* ── Headline + subhead ────────────────────────────────── */
.heads{
  text-align:center;max-width:640px;
  /* slide-up after stage fade */
  opacity:0;transform:translateY(14px);
  animation:headsIn .9s cubic-bezier(.2,.7,.2,1) .55s forwards;
}
@keyframes headsIn{to{opacity:1;transform:translateY(0)}}
.heads h1{
  font-size:clamp(2.4rem, 6.8vw, 4.4rem);
  font-weight:900;letter-spacing:-.035em;line-height:.98;
  margin-bottom:18px;
}
.heads h1 em{color:#ef4444;font-style:normal}
.heads p{
  font-size:clamp(1rem, 1.6vw, 1.2rem);
  color:rgba(255,255,255,.72);font-weight:500;letter-spacing:-.005em;
  line-height:1.45;
}

/* ── Tap-to-enter hint at bottom ───────────────────────── */
.hint{
  position:fixed;bottom:32px;left:50%;transform:translateX(-50%);
  display:flex;flex-direction:column;align-items:center;gap:10px;
  font-size:.72rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;
  color:rgba(255,255,255,.48);
  pointer-events:none;
  /* delayed fade-in so attention lands on the mic first */
  opacity:0;
  animation:hintIn 1s ease-out 1.4s forwards;
}
@keyframes hintIn{to{opacity:1}}
.hint .arrow{
  width:1px;height:18px;background:rgba(255,255,255,.34);
  animation:bounce 1.6s ease-in-out infinite;
}
@keyframes bounce{
  0%,100%{transform:translateY(0);opacity:.34}
  50%{transform:translateY(4px);opacity:.7}
}

/* ── Press-flash on click ──────────────────────────────── */
.stage.press{animation:pressOut .5s cubic-bezier(.4,0,.2,1) forwards}
@keyframes pressOut{
  0%{opacity:1;transform:scale(1)}
  60%{opacity:1;transform:scale(1.03)}
  100%{opacity:0;transform:scale(1.06)}
}

@media(max-width:600px){
  .orb{width:200px;height:200px;margin-bottom:36px}
  .core{width:80px;height:80px}
  .mic{width:28px;height:28px}
  .hint{bottom:22px}
  /* Mobile: pull the wave fields off the side edges since a phone-width
     viewport can't fit a 42vw bar bank on each side plus the mic. Bars
     stay but they're shorter and tighter. */
  .wave{width:38vw;height:90px}
  .wave-l{padding-left:18px}
  .wave-r{padding-right:18px}
  .wave span{min-width:2px;max-width:4px}
  .brand{top:18px;font-size:.74rem}
}

/* Respect reduced-motion: kill the pulse / breathe / bounce */
@media(prefers-reduced-motion:reduce){
  .ring,.core,.heads,.hint .arrow,.stage,.wave,.wave span{animation:none}
  .stage{opacity:1}
  .heads,.wave{opacity:1}
  .heads{transform:none}
  .wave{transform:translateY(-50%)}
  .wave span{transform:scaleY(.6)}
  .hint{opacity:1}
}
</style>

</head>
<body>

<div class="stage" id="stage" role="button" tabindex="0" aria-label="Enter DebateIt">
  <div class="brand"><em>DebateIt</em></div>

  <div class="wave wave-l" id="waveL" aria-hidden="true"></div>
  <div class="wave wave-r" id="waveR" aria-hidden="true"></div>

  <div class="orb" aria-hidden="true">
    <span class="ring"></span>
    <span class="ring"></span>
    <span class="ring"></span>
    <span class="ring"></span>
    <div class="core">
      <!-- Inline mic glyph: avoids an extra request, scales cleanly. -->
      <svg class="mic" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 14.5a3 3 0 0 0 3-3V6a3 3 0 1 0-6 0v5.5a3 3 0 0 0 3 3z"/>
        <path d="M18.5 11.5a.75.75 0 0 0-1.5 0 5 5 0 0 1-10 0 .75.75 0 0 0-1.5 0 6.5 6.5 0 0 0 5.75 6.46V20H8.5a.75.75 0 0 0 0 1.5h7a.75.75 0 0 0 0-1.5h-2.75v-2.04a6.5 6.5 0 0 0 5.75-6.46z"/>
      </svg>
    </div>
  </div>

  <div class="heads">
    <h1>Argue out <em>loud.</em></h1>
    <p>An AI that pushes back. In real time. Voice first.</p>
  </div>

  <div class="hint">
    <div class="arrow"></div>
    <span>Tap for home page</span>
  </div>
</div>

<script>
// Single click target: anywhere on the stage routes to /landing. The
// explicit Skip button does the same thing — kept for visible
// affordance + keyboard users who'd otherwise tab through nothing.
//
// On tap we kick off both the press-out animation AND a brief AI voice
// line (/audio/splash-hook.mp3) so the "voice first" promise lands
// instantly. The audio plays defensively — if the file is missing, the
// .play() promise rejects, we swallow the error, and the visual flow
// continues unchanged. See app/audio/README.md for how to (re)generate.
//
// We pre-prefetch /landing on first interaction (mousemove or touchstart)
// so the click→nav handoff feels instant. Netlify edges it; the browser
// just needs the bytes warm.
(function(){
  // ── Populate the audio-spectrum bars ───────────────────────────
  // Generates N bars in each wave bank with staggered animation
  // delays so the whole field reads as a rolling wave instead of
  // every bar pulsing in lockstep. Each bar gets a custom rest +
  // peak amplitude via CSS variables so the silhouette is organic
  // — like an actual EQ visualization, not a uniform metronome.
  // Bars closest to the mic peak highest; bars farthest from the
  // mic stay quieter so the overall shape suggests sound emanating
  // outward from the center.
  function buildBars(el, count, dir){
    if (!el) return;
    var frag = document.createDocumentFragment();
    for (var i = 0; i < count; i++) {
      var b = document.createElement('span');
      // Phase: distribute delays across the 1.9s cycle. dir flips the
      // direction so left vs right banks roll *outward* from the mic.
      var phase = (i / count) * 1.9 * dir;
      // Light per-bar jitter so adjacent bars aren't perfectly in sync
      var jitter = (Math.random() - 0.5) * 0.18;
      // Amplitude ramp: bars near the inner edge (closest to the mic)
      // peak ~1.0, bars near the outer edge taper to ~0.45. Position
      // 0 = innermost on each side regardless of left/right.
      var nearness = 1 - (i / count); // 1 → 0
      var peak = 0.5 + nearness * 0.55 + (Math.random() - 0.5) * 0.12;
      var rest = 0.18 + nearness * 0.18;
      b.style.setProperty('--d',    (phase + jitter).toFixed(3) + 's');
      b.style.setProperty('--peak', peak.toFixed(2));
      b.style.setProperty('--rest', rest.toFixed(2));
      frag.appendChild(b);
    }
    el.appendChild(frag);
  }
  // Left bank: index 0 is closest to mic (right edge of left field).
  // wave-l uses default row direction, so index 0 is the leftmost
  // bar — we want the opposite. Build it in reverse so the inner-most
  // bar (next to the mic) corresponds to nearness=1.
  function buildReverse(el, count, dir){
    if (!el) return;
    var frag = document.createDocumentFragment();
    for (var i = 0; i < count; i++) {
      var nearness = i / count; // 0 (outer) → 1 (inner = mic side)
      var phase = (i / count) * 1.9 * dir;
      var jitter = (Math.random() - 0.5) * 0.18;
      var peak = 0.5 + nearness * 0.55 + (Math.random() - 0.5) * 0.12;
      var rest = 0.18 + nearness * 0.18;
      var b = document.createElement('span');
      b.style.setProperty('--d',    (phase + jitter).toFixed(3) + 's');
      b.style.setProperty('--peak', peak.toFixed(2));
      b.style.setProperty('--rest', rest.toFixed(2));
      frag.appendChild(b);
    }
    el.appendChild(frag);
  }
  var barCount = (window.innerWidth < 600) ? 24 : 42;
  // wave-l is laid out left-to-right (outer→inner), so use buildReverse
  // wave-r is reversed via flex-direction:row-reverse so index 0 is the
  // INNER bar (closest to the mic). buildBars works there directly.
  buildReverse(document.getElementById('waveL'), barCount, -1);
  buildBars(document.getElementById('waveR'),  barCount,  1);

  var stage = document.getElementById('stage');
  var navigated = false;

  // Audio element. Volume kept under unity so the line is present but
  // not jarring on a hot speaker. Preload kept to 'auto' so the bytes
  // are ready by the time the user taps.
  var hookAudio = null;
  try {
    hookAudio = new Audio('/audio/splash-hook.mp3');
    hookAudio.preload = 'auto';
    hookAudio.volume = 0.7;
  } catch(e){ /* Audio unavailable in this env — proceed silent */ }

  function playHook(){
    if (!hookAudio) return;
    // play() returns a Promise that rejects on autoplay-block, missing
    // file, or codec issue. Catch silently — splash works without audio.
    var p; try { p = hookAudio.play(); } catch(e){ return; }
    if (p && typeof p.catch === 'function') p.catch(function(){ /* no-op */ });
  }

  function go(href){
    if (navigated) return;
    navigated = true;
    // Synthesized confirm tone first (instant, no asset dependency),
    // then the optional richer MP3 hook on top. Either alone is fine.
    try { window.SFX && window.SFX.confirm(); } catch(e){}
    playHook();
    try { gtag('event','splash_enter',{ via: href === '/landing' ? 'tap' : 'skip' }); } catch(e){}
    // Trigger the press-out animation, then nav. Animation duration
    // is 500ms but we nav at 320ms so the page swap feels instant
    // while the splash is still visually receding. The audio continues
    // playing right up until /landing replaces the document — usually
    // the visitor still hears the first ~1 second of the line, which
    // is exactly the "I'll push back" hook.
    stage.classList.add('press');
    setTimeout(function(){ window.location.href = href; }, 320);
  }

  stage.addEventListener('click', function(){
    go('/landing');
  });
  stage.addEventListener('keydown', function(e){
    if (e.key === 'Enter' || e.key === ' '){ e.preventDefault(); go('/landing'); }
  });

  // Prefetch /landing on first interaction. Cheaper than prefetching
  // on load because some visitors immediately bounce; we only pay the
  // bytes when we have evidence the user is engaging.
  var prefetched = false;
  function prefetch(){
    if (prefetched) return; prefetched = true;
    var link = document.createElement('link');
    link.rel = 'prefetch'; link.href = '/landing';
    document.head.appendChild(link);
  }
  ['mousemove','touchstart','keydown'].forEach(function(ev){
    window.addEventListener(ev, prefetch, { once:true, passive:true });
  });

  // ── Sonar ping audio ────────────────────────────────────
  // Soft synthesized chime synced to each visual ring pulse (4.2s
  // cycle, 1.05s stagger). No external audio file; pure Web Audio
  // sine + exponential gain envelope so it's tiny + ships nothing
  // extra. Volume targets ambient (~0.04 peak) so it's "felt" not
  // "blasted." Suppressed under prefers-reduced-motion + when the
  // tab isn't visible.
  //
  // Browser autoplay policy: AudioContext starts suspended until a
  // user gesture. We init on first pointermove/touch/key + fire the
  // first ping right then so the user gets immediate confirmation
  // the page has audio (vs. wondering why it's silent).
  var audioCtx = null;
  var pingTimer = null;
  var motionReduced = false;
  try { motionReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches; } catch(e){}

  function ping(){
    if (!audioCtx || audioCtx.state !== 'running') return;
    if (document.hidden) return;
    var now = audioCtx.currentTime;
    var osc = audioCtx.createOscillator();
    var gain = audioCtx.createGain();
    osc.type = 'sine';
    // Sweep down ~220 → 110 Hz over 700ms — feels like a sonar
    // ping descending into water. Two sine layers (a quiet 4th
    // overtone) for a touch of body without making it bright.
    osc.frequency.setValueAtTime(220, now);
    osc.frequency.exponentialRampToValueAtTime(110, now + 0.7);
    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.exponentialRampToValueAtTime(0.045, now + 0.05);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.85);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(now);
    osc.stop(now + 0.9);

    // Subtle 4th overtone for warmth — much quieter than the
    // fundamental, decays faster.
    var osc2 = audioCtx.createOscillator();
    var gain2 = audioCtx.createGain();
    osc2.type = 'sine';
    osc2.frequency.setValueAtTime(440, now);
    osc2.frequency.exponentialRampToValueAtTime(220, now + 0.5);
    gain2.gain.setValueAtTime(0.0001, now);
    gain2.gain.exponentialRampToValueAtTime(0.012, now + 0.04);
    gain2.gain.exponentialRampToValueAtTime(0.0001, now + 0.5);
    osc2.connect(gain2).connect(audioCtx.destination);
    osc2.start(now);
    osc2.stop(now + 0.55);
  }

  function startPings(){
    if (pingTimer) return;
    if (motionReduced) return;
    if (audioCtx && audioCtx.state === 'suspended') {
      audioCtx.resume().catch(function(){});
    }
    ping();
    // Cycle matches the ring CSS animation duration so audio + visual
    // pulse stay phase-locked.
    pingTimer = setInterval(ping, 4200);
  }

  function initAudio(){
    if (audioCtx || motionReduced) return;
    try {
      var Ctor = window.AudioContext || window.webkitAudioContext;
      if (!Ctor) return;
      audioCtx = new Ctor();
      // First gesture also kicks off the loop — Safari needs the
      // explicit resume(); Chrome auto-runs once we're past gesture.
      startPings();
    } catch(e){ audioCtx = null; }
  }
  ['pointerdown','touchstart','keydown','mousemove'].forEach(function(ev){
    window.addEventListener(ev, initAudio, { once:true, passive:true });
  });
  // Stop the loop the moment we navigate so the ping doesn't bleed
  // into the next page during the 320ms press-out animation.
  ['beforeunload','pagehide'].forEach(function(ev){
    window.addEventListener(ev, function(){
      if (pingTimer) { clearInterval(pingTimer); pingTimer = null; }
      try { audioCtx && audioCtx.close(); } catch(e){}
    }, { passive:true });
  });
  // Pause when tab is backgrounded so we don't ping into a hidden
  // tab; resume when foregrounded.
  document.addEventListener('visibilitychange', function(){
    if (document.hidden && pingTimer){
      clearInterval(pingTimer); pingTimer = null;
    } else if (!document.hidden && audioCtx && !pingTimer){
      startPings();
    }
  });
})();
</script>
