<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root { color-scheme: dark; }
  body { width: 268px; margin: 0; font: 14px/1.5 -apple-system, system-ui, sans-serif; background: #15101d; color: #e8e8ee; }
  .wrap { padding: 16px; }
  .brand { font-weight: 800; font-size: 15px; letter-spacing: .01em; }
  .brand b { color: #ef4444; }
  p { margin: 8px 0 0; font-size: 12.5px; color: #b8bcc4; }
  button { margin-top: 14px; width: 100%; padding: 10px 12px; border: none; border-radius: 10px; cursor: pointer;
           font: inherit; font-weight: 700; color: #fff; background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); }
  button:hover { filter: brightness(1.06); }
  .note { margin-top: 12px; font-size: 11px; color: #8a8a96; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="brand"><b>Debate</b>It · Floating round</div>
    <p>Start a voice round, then hit <b>Float over apps</b> in the round to keep it on top while you work in other apps.</p>
    <button id="go" type="button">Start a floating round</button>
    <div class="note">Always-on-top floating needs Chrome or Edge (Document Picture-in-Picture).</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
