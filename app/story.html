<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<meta name="description" content="The founding story behind Debate AI — coming soon.">
<link rel="canonical" href="https://debateai.com/story">
<meta name="robots" content="noindex">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/ui.css">
<script>
/* Hardcoded dark surface — force the topbar's dark token set regardless
   of a saved da-theme=light (see /us). */
document.documentElement.setAttribute('data-theme','crimson');
document.documentElement.setAttribute('data-force-theme','crimson');
</script>
<script defer src="/js/track.js"></script>
<style>
  :root{ --bg:#08080c; --fg:#f4f4f6; --muted:#8a8a95; --line:rgba(255,255,255,.09); --accent:#ef4444; }
  *{box-sizing:border-box}
  html{background:var(--bg)}
  body{margin:0;color:var(--fg);
    font:400 16px/1.6 'Inter',system-ui,-apple-system,sans-serif;
    -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
    background:radial-gradient(1100px 520px at 50% -240px,rgba(239,68,68,.10),transparent 62%) no-repeat,var(--bg);}
  a{color:var(--accent);text-decoration:none}a:hover{text-decoration:underline}
  .stage{min-height:calc(100vh - 52px);display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:96px 24px 64px;max-width:560px;margin:0 auto}
  .eyebrow{font-size:12px;color:var(--accent);letter-spacing:.18em;text-transform:uppercase;font-weight:800;margin-bottom:18px}
  h1{font:900 clamp(40px,8vw,64px)/1.02 'Inter',system-ui,sans-serif;letter-spacing:-0.04em;margin:0 0 16px}
  p{margin:0 0 32px;font-size:18px;line-height:1.6;color:rgba(255,255,255,.72)}
  .actions{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
  .cta{display:inline-block;background:var(--accent);color:#fff;padding:13px 26px;border-radius:999px;font-weight:800;font-size:15px;transition:background .15s,transform .15s}
  .cta:hover{text-decoration:none;background:#dc2626;transform:translateY(-1px)}
  .cta-ghost{background:transparent;border:1px solid var(--line);color:var(--fg)}
  .cta-ghost:hover{background:rgba(255,255,255,.04);border-color:var(--muted)}
</style>
</head>
<body>
<div id="daTopbar"></div>
<main class="stage">
  <div class="eyebrow">Founding story</div>
  <h1>Not up yet.</h1>
  <p>The founding story isn't published yet. Check back soon.</p>
  <div class="actions">
    <a class="cta" href="/debate-ai">Start a round</a>
    <a class="cta cta-ghost" href="/">Back to home</a>
  </div>
</main>
<script defer src="/js/topbar.js"></script>
</body>
</html>
