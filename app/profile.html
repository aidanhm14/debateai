<script>
(function(){
  try{
    var t=localStorage.getItem('da-theme');
    if(!t || t==='day') t='crimson';
    document.documentElement.setAttribute('data-theme',t);
  }catch(e){
    document.documentElement.setAttribute('data-theme','crimson');
  }
})();
</script>

<style>
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0;overflow-x:hidden}
body{
  font-family:'Inter',system-ui,sans-serif;
  background:var(--bg);color:var(--text);
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
}
.wrap{max-width:1080px;margin:0 auto;padding:28px 24px 64px}

/* ─── Loading + signed-out + error states ─── */
.state{
  padding:64px 24px;text-align:center;
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:18px;
  box-shadow:0 18px 60px rgba(0,0,0,.35);
}
.state .spinner{
  display:inline-block;width:26px;height:26px;
  border:2.5px solid var(--border);border-top-color:var(--accent);
  border-radius:50%;animation:spin .8s linear infinite;
}
.state h3{font-size:1.15rem;font-weight:800;margin:0 0 8px}
.state p{font-size:.92rem;color:var(--text-dim);max-width:440px;margin:0 auto 18px;line-height:1.55}
.state .cta{
  display:inline-block;margin-top:6px;
  padding:11px 22px;background:var(--accent);color:#fff;
  border-radius:999px;font-size:.82rem;font-weight:800;letter-spacing:.04em;
  text-decoration:none;
  transition:transform .15s, box-shadow .15s;
}
.state .cta:hover{transform:translateY(-1px);box-shadow:0 8px 24px var(--accent-glow)}
@keyframes spin{to{transform:rotate(360deg)}}

/* ─── Hero strip ─── */
.hero{
  display:grid;grid-template-columns:96px 1fr auto;gap:22px;align-items:center;
  padding:22px 26px;
  background:var(--bg-card);border:1px solid var(--border);border-radius:18px;
  box-shadow:0 18px 60px rgba(0,0,0,.35);
  margin-bottom:18px;
}
.avatar{
  width:96px;height:96px;border-radius:50%;
  border:2px solid var(--accent);
  background:var(--bg-elev);
  display:flex;align-items:center;justify-content:center;
  font-size:2.2rem;font-weight:900;color:var(--accent);
  letter-spacing:-.02em;
  overflow:hidden;
}
.avatar img{width:100%;height:100%;object-fit:cover}
.hero-meta .name{
  font-size:1.6rem;font-weight:900;letter-spacing:-.02em;line-height:1.1;
  margin:0 0 4px;
}
.hero-meta .sub{
  font-size:.82rem;color:var(--text-dim);font-weight:500;
}
.hero-meta .title-pill{
  display:inline-block;margin-top:10px;
  padding:5px 12px;font-size:.7rem;font-weight:800;letter-spacing:.06em;
  text-transform:uppercase;color:var(--accent);
  background:var(--accent-soft);border:1px solid var(--accent-border);
  border-radius:999px;
}
.hero-side{
  display:flex;flex-direction:column;align-items:flex-end;gap:8px;
  text-align:right;
}
.streak-chip{
  display:inline-flex;align-items:center;gap:8px;
  padding:8px 14px;border-radius:999px;
  background:linear-gradient(135deg, rgba(251,191,36,.16), rgba(239,68,68,.12));
  border:1px solid rgba(251,191,36,.34);
  font-size:.78rem;font-weight:800;letter-spacing:-.01em;color:#fbbf24;
}
.streak-chip.cold{
  background:var(--bg-elev);border-color:var(--border);color:var(--text-dim);
}
.streak-chip .dot{
  width:8px;height:8px;border-radius:50%;
  background:#fbbf24;box-shadow:0 0 8px rgba(251,191,36,.7);
}
.streak-chip.cold .dot{background:var(--text-ghost);box-shadow:none}
.hero-side .small{font-size:.72rem;color:var(--text-ghost)}
@media(max-width:680px){
  .hero{grid-template-columns:72px 1fr;gap:14px;padding:18px}
  .avatar{width:72px;height:72px;font-size:1.6rem}
  .hero-side{grid-column:1 / -1;flex-direction:row;justify-content:space-between;align-items:center;width:100%;text-align:left}
  .hero-meta .name{font-size:1.3rem}
}

/* ─── Daily quest ─── */
/* Game-mechanic card sandwiched between hero and XP bar. One quest
   per day, rotates deterministically off day-of-year so all users see
   the same daily quest (lets future leaderboard / chat surfaces talk
   about "did you hit today's quest yet"). Completed state celebrates;
   pending state pulses subtly. */
.quest-card{
  display:grid;grid-template-columns:auto 1fr auto;gap:18px;
  align-items:center;
  padding:16px 22px;margin-bottom:18px;
  background:linear-gradient(135deg, rgba(251,191,36,.10), rgba(239,68,68,.05));
  border:1px solid rgba(251,191,36,.32);
  border-radius:18px;
  box-shadow:0 12px 36px rgba(251,191,36,.06);
}
.quest-card.done{
  background:linear-gradient(135deg, rgba(34,197,94,.12), rgba(34,197,94,.04));
  border-color:rgba(34,197,94,.42);
}
.quest-icon{
  width:46px;height:46px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:rgba(251,191,36,.16);border:1px solid rgba(251,191,36,.4);
  font-size:1.4rem;line-height:1;color:#fbbf24;font-weight:900;
}
.quest-card.done .quest-icon{background:rgba(34,197,94,.18);border-color:rgba(34,197,94,.55);color:#22c55e}
.quest-eyebrow{
  font-size:.62rem;font-weight:800;letter-spacing:.14em;text-transform:uppercase;
  color:#fbbf24;margin-bottom:3px;
}
.quest-card.done .quest-eyebrow{color:#22c55e}
.quest-title{
  font-size:1.02rem;font-weight:800;letter-spacing:-.01em;color:var(--text);
  margin-bottom:3px;
}
.quest-sub{
  font-size:.78rem;color:var(--text-dim);line-height:1.4;
}
.quest-side{
  display:flex;flex-direction:column;align-items:flex-end;gap:7px;
}
.quest-reward{
  font-size:.7rem;font-weight:800;letter-spacing:.04em;color:#fbbf24;
  padding:3px 10px;border:1px solid rgba(251,191,36,.36);border-radius:999px;
}
.quest-card.done .quest-reward{color:#22c55e;border-color:rgba(34,197,94,.45)}
.quest-cta{
  display:inline-block;padding:7px 16px;font-size:.72rem;font-weight:800;
  letter-spacing:.04em;border-radius:999px;
  background:var(--accent);color:#fff;border:1px solid var(--accent);
  text-decoration:none;white-space:nowrap;
  transition:transform .15s,box-shadow .15s;
}
.quest-cta:hover{transform:translateY(-1px);box-shadow:0 8px 24px var(--accent-glow)}
.quest-card.done .quest-cta{background:#22c55e;border-color:#22c55e}
@media(max-width:680px){
  .quest-card{grid-template-columns:auto 1fr;gap:14px;padding:14px 16px}
  .quest-side{grid-column:1 / -1;flex-direction:row;justify-content:space-between;width:100%;align-items:center}
}

/* ─── Level / XP bar ─── */
.xp-card{
  padding:20px 24px;
  background:var(--bg-card);border:1px solid var(--border);border-radius:18px;
  box-shadow:0 18px 60px rgba(0,0,0,.35);
  margin-bottom:18px;
}
.xp-row{
  display:flex;align-items:baseline;justify-content:space-between;
  font-size:.78rem;color:var(--text-dim);font-weight:600;letter-spacing:.02em;
}
.xp-row .lvl-now{color:var(--text);font-weight:800;letter-spacing:-.01em;font-size:.92rem}
.xp-bar{
  position:relative;margin-top:10px;height:10px;
  background:var(--bg-elev);border:1px solid var(--border);
  border-radius:999px;overflow:hidden;
}
.xp-fill{
  position:absolute;left:0;top:0;height:100%;
  background:linear-gradient(90deg, var(--accent), #fbbf24);
  box-shadow:0 0 14px var(--accent-glow);
  transition:width .8s cubic-bezier(.2,.7,.2,1);
}
.xp-foot{
  display:flex;justify-content:space-between;margin-top:8px;
  font-size:.7rem;color:var(--text-ghost);
}

/* ─── Stat tiles ─── */
.stat-grid{
  display:grid;grid-template-columns:repeat(4, 1fr);gap:12px;
  margin-bottom:18px;
}
.stat{
  padding:18px 18px 16px;
  background:var(--bg-card);border:1px solid var(--border);border-radius:14px;
  text-align:left;
}
.stat .label{
  font-size:.66rem;font-weight:800;letter-spacing:.10em;text-transform:uppercase;
  color:var(--text-ghost);margin-bottom:8px;
}
.stat .val{
  font-size:1.7rem;font-weight:900;letter-spacing:-.02em;color:var(--text);
  font-variant-numeric:tabular-nums;line-height:1;
}
.stat .val.accent{color:var(--accent)}
.stat .sub{
  margin-top:4px;font-size:.7rem;color:var(--text-dim);font-weight:500;
}
@media(max-width:680px){
  .stat-grid{grid-template-columns:repeat(2, 1fr)}
}

/* ─── Section header ─── */
.section{margin:24px 0 10px;display:flex;align-items:baseline;justify-content:space-between;gap:14px}
.section h2{
  font-size:1.05rem;font-weight:900;letter-spacing:-.01em;margin:0;
}
.section .right{
  font-size:.72rem;color:var(--text-dim);font-weight:600;
}
.section .right a{color:var(--accent);text-decoration:none}
.section .right a:hover{text-decoration:underline}

/* ─── Format mastery ─── */
.format-grid{
  display:grid;grid-template-columns:repeat(auto-fill, minmax(220px, 1fr));gap:12px;
}
.fmt-card{
  padding:16px;
  background:var(--bg-card);border:1px solid var(--border);border-radius:14px;
  position:relative;overflow:hidden;
}
.fmt-card::before{
  content:"";position:absolute;left:0;top:0;bottom:0;width:3px;
  background:var(--fmt-color, var(--accent));
}
.fmt-card .fname{
  font-size:.92rem;font-weight:800;letter-spacing:-.01em;margin:0 0 8px;
}
.fmt-card .fmeta{
  display:flex;align-items:baseline;justify-content:space-between;
  font-size:.72rem;color:var(--text-dim);font-weight:600;
}
.fmt-card .fmeta b{color:var(--text);font-weight:800;font-variant-numeric:tabular-nums}
.fmt-bar{
  margin-top:10px;height:6px;background:var(--bg-elev);
  border-radius:999px;overflow:hidden;
}
.fmt-bar .fill{
  height:100%;background:var(--fmt-color, var(--accent));
  border-radius:999px;
}

/* ─── Achievements ─── */
.ach-grid{
  display:grid;grid-template-columns:repeat(auto-fill, minmax(180px, 1fr));gap:10px;
}
.ach{
  padding:14px 14px 12px;
  background:var(--bg-card);border:1px solid var(--border);border-radius:12px;
  position:relative;
  transition:transform .12s, border-color .15s;
}
.ach.unlocked{border-color:var(--accent-border)}
.ach.unlocked:hover{transform:translateY(-1px);border-color:var(--accent)}
.ach .ach-tier{
  position:absolute;top:8px;right:10px;
  font-size:.56rem;font-weight:800;letter-spacing:.10em;text-transform:uppercase;
  color:var(--text-ghost);
}
.ach.unlocked.tier-rare .ach-tier{color:#3b82f6}
.ach.unlocked.tier-legendary .ach-tier{color:#fbbf24}
.ach .ach-name{
  font-size:.84rem;font-weight:800;letter-spacing:-.01em;margin:0 0 4px;color:var(--text);
}
.ach.locked .ach-name{color:var(--text-ghost)}
.ach .ach-desc{
  font-size:.68rem;color:var(--text-dim);line-height:1.4;
}
.ach.locked .ach-desc{color:var(--text-ghost)}

/* ─── Recent rounds ─── */
.recent{
  background:var(--bg-card);border:1px solid var(--border);border-radius:14px;
  overflow:hidden;
}
.r-row{
  display:grid;grid-template-columns:1fr 90px 80px 90px;align-items:center;
  gap:14px;padding:13px 18px;border-bottom:1px solid var(--border);
  font-size:.82rem;
}
.r-row:last-child{border-bottom:none}
.r-row.head{
  background:var(--bg-elev);font-size:.62rem;text-transform:uppercase;
  letter-spacing:.10em;font-weight:800;color:var(--text-ghost);
}
.r-motion{font-weight:600;letter-spacing:-.01em;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.r-motion .fmt{
  display:inline-block;margin-left:8px;padding:1px 7px;font-size:.62rem;
  font-weight:800;letter-spacing:.06em;text-transform:uppercase;
  color:var(--text-dim);background:var(--bg-elev);
  border:1px solid var(--border);border-radius:4px;vertical-align:1px;
}
.r-score{font-weight:800;font-variant-numeric:tabular-nums;color:var(--accent)}
.r-side{font-size:.72rem;color:var(--text-dim);font-weight:600}
.r-when{font-size:.7rem;color:var(--text-ghost);text-align:right;font-variant-numeric:tabular-nums}
.r-row .badge-w{
  display:inline-block;margin-left:6px;padding:1px 6px;
  font-size:.58rem;font-weight:800;letter-spacing:.06em;
  color:var(--green, #22c55e);background:rgba(34,197,94,.14);
  border:1px solid rgba(34,197,94,.36);border-radius:4px;
}
@media(max-width:680px){
  .r-row{grid-template-columns:1fr 60px 70px;gap:8px;padding:12px 14px}
  .r-side{display:none}
  .r-row.head .r-side{display:none}
}

/* ─── CTA strip ─── */
.cta-strip{
  display:grid;grid-template-columns:repeat(3, 1fr);gap:10px;margin-top:22px;
}
.cta-strip a{
  display:flex;flex-direction:column;justify-content:center;
  padding:18px 18px;
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:14px;text-decoration:none;color:var(--text);
  transition:transform .15s, border-color .15s, box-shadow .15s;
}
.cta-strip a:hover{
  transform:translateY(-1px);
  border-color:var(--accent);box-shadow:0 8px 24px var(--accent-glow);
}
.cta-strip a .cl{font-size:.62rem;font-weight:800;letter-spacing:.10em;text-transform:uppercase;color:var(--text-ghost);margin-bottom:6px}
.cta-strip a .ct{font-size:.96rem;font-weight:800;letter-spacing:-.01em}
.cta-strip a .cs{font-size:.72rem;color:var(--text-dim);margin-top:3px}
@media(max-width:680px){
  .cta-strip{grid-template-columns:1fr}
}

/* ─── Next-milestone card ─── */
.milestone{
  display:grid;grid-template-columns:1fr auto;gap:18px;align-items:center;
  padding:16px 20px;margin-bottom:18px;
  background:linear-gradient(135deg, var(--accent-soft), transparent 70%);
  border:1px solid var(--accent-border);border-radius:14px;
}
.milestone .ms-eyebrow{
  font-size:.62rem;font-weight:800;letter-spacing:.10em;text-transform:uppercase;
  color:var(--accent);margin-bottom:4px;
}
.milestone .ms-title{
  font-size:1.0rem;font-weight:800;letter-spacing:-.01em;color:var(--text);
  line-height:1.35;
}
.milestone .ms-sub{
  font-size:.74rem;color:var(--text-dim);margin-top:4px;
}
.milestone .ms-sub b{color:var(--text);font-weight:800}
.milestone .ms-cta{
  padding:10px 18px;background:var(--accent);color:#fff;
  border-radius:999px;font-size:.72rem;font-weight:800;letter-spacing:.04em;
  text-decoration:none;white-space:nowrap;
  transition:filter .15s, transform .15s;
}
.milestone .ms-cta:hover{filter:brightness(1.1);transform:translateY(-1px)}
@media(max-width:680px){
  .milestone{grid-template-columns:1fr;text-align:left}
  .milestone .ms-cta{justify-self:start}
}

/* ─── Activity heatmap ─── */
.heat-card{
  padding:18px 20px;margin-bottom:18px;
  background:var(--bg-card);border:1px solid var(--border);border-radius:14px;
  overflow:hidden;
}
.heat-card .label{
  font-size:.66rem;font-weight:800;letter-spacing:.10em;text-transform:uppercase;
  color:var(--text-ghost);
}
.heat-grid{
  display:grid;grid-template-columns:repeat(12, 1fr);gap:4px;
  margin-top:12px;
}
.heat-col{display:grid;grid-template-rows:repeat(7, 1fr);gap:3px}
.heat-cell{
  width:100%;aspect-ratio:1;border-radius:3px;background:var(--bg-elev);
}
.heat-cell.l1{background:rgba(239,68,68,.22)}
.heat-cell.l2{background:rgba(239,68,68,.42)}
.heat-cell.l3{background:rgba(239,68,68,.66)}
.heat-cell.l4{background:rgba(239,68,68,.96);box-shadow:0 0 6px var(--accent-glow)}
.heat-foot{
  display:flex;justify-content:space-between;align-items:center;
  margin-top:10px;font-size:.66rem;color:var(--text-ghost);
}
.heat-legend{display:inline-flex;gap:4px;align-items:center}
.heat-legend .heat-cell{width:10px;height:10px;aspect-ratio:auto}

/* ─── Two-up: trend + side ─── */
.two-up{
  display:grid;grid-template-columns:1.4fr 1fr;gap:12px;margin-bottom:18px;
}
@media(max-width:680px){.two-up{grid-template-columns:1fr}}
.trend-card,.side-card{
  padding:18px 20px;
  background:var(--bg-card);border:1px solid var(--border);border-radius:14px;
}
.trend-card .label,.side-card .label{
  font-size:.66rem;font-weight:800;letter-spacing:.10em;text-transform:uppercase;
  color:var(--text-ghost);margin-bottom:10px;
}
.trend-svg{display:block;width:100%;height:80px}
.trend-foot{
  display:flex;justify-content:space-between;
  margin-top:8px;font-size:.7rem;color:var(--text-dim);
}
.trend-foot b{color:var(--text);font-variant-numeric:tabular-nums}
.trend-delta.up{color:var(--green, #22c55e);font-weight:800}
.trend-delta.down{color:var(--accent);font-weight:800}
.side-row{
  display:flex;align-items:baseline;justify-content:space-between;
  padding:10px 0;border-bottom:1px solid var(--border);
}
.side-row:last-child{border-bottom:none}
.side-row .sname{font-size:.82rem;font-weight:700;color:var(--text)}
.side-row .scount{font-size:.66rem;color:var(--text-ghost);font-weight:600;margin-left:6px}
.side-row .savg{font-size:1.05rem;font-weight:900;color:var(--accent);font-variant-numeric:tabular-nums}

/* ─── Voice rank pill ─── */
.rank-card{
  display:grid;grid-template-columns:auto 1fr auto;gap:14px;align-items:center;
  padding:14px 20px;margin-bottom:18px;
  background:var(--bg-card);border:1px solid var(--border);border-radius:14px;
}

/* Style profile card. Renders the nightly-Haiku-generated fingerprint
   (or an empty state if the user hasn't been fingerprinted yet) plus
   an edit affordance. Same card chrome as heat-card / rank-card so it
   reads as part of the dashboard, not a marketing bolt-on. */
.style-card{
  padding:18px 22px;margin-bottom:18px;
  background:var(--bg-card);border:1px solid var(--border);border-radius:14px;
  position:relative;
}
.certs-card{
  padding:20px 22px;margin-bottom:18px;
  background:var(--bg-card);
  border:1px solid rgba(212,175,55,.30);
  border-radius:14px;
  background-image:linear-gradient(180deg, rgba(212,175,55,.06), transparent 65%);
}
.certs-eyebrow{
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  font-size:.66rem;font-weight:800;letter-spacing:.10em;text-transform:uppercase;
  color:var(--text-ghost);margin-bottom:14px;
}
.certs-eyebrow-tag{font-size:.58rem;letter-spacing:.14em;color:#d4af37}
.certs-hero{
  display:flex;align-items:flex-end;gap:18px;flex-wrap:wrap;margin-bottom:14px;
}
.certs-hero-tier{
  font-family:'Fraunces',Georgia,serif;font-weight:800;font-style:italic;
  font-size:clamp(2rem, 5vw, 2.6rem);line-height:1;color:var(--text);
}
.certs-hero-tier .gold{color:#d4af37}
.certs-hero-sub{
  font-size:.86rem;color:var(--text-dim);line-height:1.5;flex:1;min-width:200px;
}
.certs-counts{
  display:flex;flex-wrap:wrap;gap:10px;margin-bottom:14px;font-size:.78rem;
}
.certs-count-chip{
  padding:5px 11px;border-radius:999px;
  background:rgba(212,175,55,.10);border:1px solid rgba(212,175,55,.25);
  color:var(--text);font-weight:600;
}

       returns. -->

    </div>
  </div>

</main>

<script>
const FIREBASE_CONFIG = {
  apiKey: ["AIzaSyDDx","TYlyWLOJnFP99","e7XsLPb3FwIEijNNM"].join(""),
  authDomain: "debateos-78ac5.firebaseapp.com",
  projectId: "debateos-78ac5",
  storageBucket: "debateos-78ac5.firebasestorage.app",
  messagingSenderId: "860359449192",
  appId: "1:860359449192:web:f5dc0060dbd50d6c4fb9dd",
  measurementId: "G-0V4R5MY3BT"
};

let db=null;
let auth=null;
try{
  if(typeof firebase!=='undefined'){
    const app=firebase.apps&&firebase.apps.length?firebase.apps[0]:firebase.initializeApp(FIREBASE_CONFIG);
    db=firebase.firestore();
    if(firebase.auth) auth=firebase.auth();
  }
}catch(e){
  console.warn('[profile] firebase init failed:', e);
}

const mount=document.getElementById('mount');

function escapeHtml(s){
  return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// Levels. XP is the simple sum of every AI-judged speaker score the
// user has logged. A typical round scores 24–28, so 10 rounds at 27
// avg = 270 XP. The thresholds below put a casual practitioner at
// "Speaker" and an active circuit debater at "Closer" or above. Names
// borrow BP/parli terminology because that's the register the AI judge
// uses and the audience that retains.
const LEVELS = [
  { min:0,    name:'Novice' },
  { min:80,   name:'Walk-on' },
  { min:200,  name:'Speaker' },
  { min:400,  name:'Member' },
  { min:700,  name:'Whip' },
  { min:1100, name:'Leader of Opp' },
  { min:1600, name:'Prime Minister' },
  { min:2200, name:'Closer' },
  { min:3000, name:'Veteran' },
  { min:4000, name:'National Champion' },
];

// Format display colors. Matches the per-format accent the audience
// pages and topic SEO pages already use, so the mastery panel reads
// consistently with the rest of the site.
const FMT_COLOR = {
  'APDA':'#ef4444',
  'British Parliamentary':'#fbbf24',
  'Public Forum':'#3b82f6',
  'Lincoln-Douglas':'#a855f7',
  'Policy':'#22c55e',
  'World Schools':'#06b6d4',
  'Asian Parliamentary':'#f97316',
  'Congress':'#64748b',
  'MUN':'#0ea5e9',
  'Quick Clash':'#ec4899',
  'Viva':'#14b8a6',
};

function fmtAgo(ts){
  if(!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  const diff = Date.now() - d.getTime();
  const mins = Math.floor(diff/60000);
  if(mins<1) return 'just now';
  if(mins<60) return mins+'m';
  const hrs = Math.floor(mins/60);
  if(hrs<24) return hrs+'h';
  const days = Math.floor(hrs/24);
  if(days<7) return days+'d';
  const wks = Math.floor(days/7);
  if(wks<5) return wks+'w';
  return d.toLocaleDateString(undefined,{month:'short',day:'numeric'});
}

function fmtScore(s){
  if(typeof s!=='number' || isNaN(s)) return '—';
  return s.toFixed(1);
}

function computeLevel(xp){
  let cur = LEVELS[0], nxt = LEVELS[1];
  for(let i=0;i<LEVELS.length;i++){
    if(xp >= LEVELS[i].min){
      cur = LEVELS[i];
      nxt = LEVELS[i+1] || null;
    }
  }
  const span = nxt ? (nxt.min - cur.min) : 1;
  const into = nxt ? (xp - cur.min) : 1;
  const pct  = nxt ? Math.min(100, Math.max(0, (into/span)*100)) : 100;
  return { cur, nxt, pct, into, span };
}

function dayKey(d){
  return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();
}

function computeStreak(daySet){
  if(!daySet.size) return 0;
  const today = new Date();
  // Allow today to be a rest day: start counting from yesterday if
  // today is missing. This way users don't lose their streak just
  // because they haven't trained yet that day.
  let cursor = 0;
  let streak = 0;
  let allowMiss = true;
  while(cursor < 365){
    const d = new Date(today.getFullYear(), today.getMonth(), today.getDate() - cursor);
    if(daySet.has(dayKey(d))){
      streak++;
      allowMiss = false;
    } else {
      if(allowMiss){ allowMiss = false; cursor++; continue; }
      break;
    }
    cursor++;
  }
  return streak;
}

function compute(rows){
  const scores = rows.map(r => r.score).filter(s => typeof s === 'number');
  const total = rows.length;
  const sum = scores.reduce((a,b)=>a+b, 0);
  const avg = scores.length ? sum/scores.length : 0;
  const best = scores.length ? Math.max(...scores) : 0;
  const lowest = scores.length ? Math.min(...scores) : 0;
  const wins = rows.filter(r => r.won === true && r.kind === 'ai').length;
  const live = rows.filter(r => r.kind === 'live').length;
  // Voice subset for the rank-percentile card (only voice entries
  // appear on the public board per the 2026-05-13 voice-only rule).
  const voiceScores = rows.filter(r => r.kind === 'voice' && typeof r.score === 'number').map(r => r.score);
  const bestVoice = voiceScores.length ? Math.max(...voiceScores) : null;

  const days = new Set();
  // Per-day round counts power the activity heatmap and let the
  // milestone card distinguish "trained today" from "streak at risk".
  const dailyCounts = new Map();
  let lastRoundAt = null;
  rows.forEach(r => {
    const t = r.completedAt && r.completedAt.toDate ? r.completedAt.toDate() : null;
    if(t){
      const k = dayKey(t);
      days.add(k);
      dailyCounts.set(k, (dailyCounts.get(k)||0) + 1);
      if(!lastRoundAt || t > lastRoundAt) lastRoundAt = t;
    }
  });
  const streak = computeStreak(days);

  const formats = {};
  rows.forEach(r => {
    const key = r.formatName || r.format || 'Unknown';
    if(!formats[key]) formats[key] = { count:0, sum:0, best:0 };
    formats[key].count++;
    if(typeof r.score === 'number'){
      formats[key].sum += r.score;
      if(r.score > formats[key].best) formats[key].best = r.score;
    }
  });

  // Side breakdown — Gov vs Opp average. Skips rows without a side
  // tag (older entries, debater-vs-debater rows).
  const sideStats = { gov:{count:0, sum:0, avg:0}, opp:{count:0, sum:0, avg:0} };
  rows.forEach(r => {
    const s = (r.side || '').toLowerCase();
    if(typeof r.score !== 'number') return;
    if(s === 'gov' || s === 'government'){
      sideStats.gov.count++; sideStats.gov.sum += r.score;
    } else if(s === 'opp' || s === 'opposition'){
      sideStats.opp.count++; sideStats.opp.sum += r.score;
    }
  });
  if(sideStats.gov.count) sideStats.gov.avg = sideStats.gov.sum/sideStats.gov.count;
  if(sideStats.opp.count) sideStats.opp.avg = sideStats.opp.sum/sideStats.opp.count;

  const xp = Math.round(sum);
  const level = computeLevel(xp);

  return {
    total, avg, best, lowest, wins, live, formats, xp, level,
    streak, days: days.size, scores: scores.length,
    dailyCounts, sideStats, lastRoundAt, bestVoice,
  };
}

function computeAchievements(s){
  // current/target are surfaced so the milestone picker can rank
  // locked achievements by "closest to unlocking" without re-deriving
  // the math. unlocked is the boolean the existing card grid uses.
  const A = (id, title, desc, current, target, tier) => ({
    id, title, desc,
    current: Math.max(0, current),
    target,
    unlocked: current >= target,
    tier: tier||'common',
  });
  const fmtCount = Object.keys(s.formats).length;
  const climb = s.scores >= 5 ? Math.max(0, s.best - s.lowest) : 0;
  return [
    A('first_round',    'First Round',    'Finish one debate.',                          s.total,    1,    'common'),
    A('five_alive',     'Five & Alive',   'Five rounds in the books.',                   s.total,    5,    'common'),
    A('marathon',       'Marathon',       'Twenty-five rounds completed.',               s.total,    25,   'rare'),
    A('centurion',      'Centurion',      'One hundred rounds. Real circuit volume.',    s.total,    100,  'legendary'),
    A('cross_format',   'Cross-format',   'Rounds in three different formats.',          fmtCount,   3,    'rare'),
    A('polyglot',       'Polyglot',       'Rounds in five different formats.',           fmtCount,   5,    'legendary'),
    A('on_fire',        'On Fire',        'Three-day practice streak.',                  s.streak,   3,    'common'),
    A('inferno',        'Inferno',        'Seven-day practice streak.',                  s.streak,   7,    'rare'),
    A('high_scorer',    'High Scorer',    'Score 28.5 or higher in any round.',          s.best,     28.5, 'rare'),
    A('perfect_speech', 'Perfect Speech', 'A 30.0 ballot from the AI judge.',            s.best,     30,   'legendary'),
    A('underdog',       'Underdog',       'Beat the AI once.',                           s.wins,     1,    'common'),
    A('closer_ach',     'Closer',         'Beat the AI five times.',                     s.wins,     5,    'rare'),
    A('live_wire',      'Live Wire',      'Run a human-vs-human live round.',            s.live,     1,    'common'),
    A('comeback',       'Comeback',       'Climb three points from your worst.',         climb,      3,    'rare'),
  ];
}

// Picks the most actionable line for the milestone card. Streak gets
// top billing because it's the retention lever; the achievement
// sub-line surfaces the closest unlocked-imminent badge so the user
// has a concrete second target.
function pickNextMilestone(s, ach){
  const today = new Date();
  const todayKey = dayKey(today);
  const yKey = dayKey(new Date(today.getFullYear(), today.getMonth(), today.getDate()-1));
  const trainedToday = s.dailyCounts.has(todayKey);
  const trainedYesterday = s.dailyCounts.has(yKey);

  let streakLine, ctaLabel = 'Debate it', ctaHref = '/voice-debate';
  if(s.total === 0){
    streakLine = 'Run a voice round when you\'re ready. Dashboard fills in from there.';
  } else if(trainedToday){
    streakLine = `Trained today. ${s.streak} day${s.streak===1?'':'s'} in a row.`;
    ctaLabel = 'One more?';
  } else if(s.streak > 0 && trainedYesterday){
    streakLine = `${s.streak} day${s.streak===1?'':'s'} in a row. Today keeps it going.`;
  } else if(s.streak > 0){
    streakLine = `Skipped yesterday. One round today picks it back up.`;
  } else {
    streakLine = 'No streak going. Start one with a round.';
  }

  const candidates = ach
    .filter(a => !a.unlocked)
    .map(a => ({
      a,
      remaining: Math.max(0, a.target - a.current),
      pct: a.target > 0 ? Math.min(1, a.current/a.target) : 0,
    }))
    .sort((x, y) => y.pct - x.pct);
  let achLine;
  if(candidates.length){
    const next = candidates[0];
    const remStr = next.remaining < 1 ? '<1' : Math.ceil(next.remaining);
    achLine = `Next badge: <b>${escapeHtml(next.a.title)}</b> in ${remStr}.`;
  } else {
    achLine = `All achievements unlocked.`;
  }

  return { streakLine, achLine, ctaLabel, ctaHref };
}

// Daily quest. Deterministic rotation off the user's local day index
// so each calendar day has one fixed quest. Five-quest rotation keeps
// users from grinding the same task forever; the day-of-year mod 5
// math means everyone sees the same quest globally on the same date,
// which makes future chat / leaderboard cross-talk natural ("did you
// hit today's quest yet?"). Completion check looks at rows from
// today only — yesterday's wins don't carry over, which is the
// "fresh start every day" feeling the streak system rewards.
function renderDailyQuest(rows){
  const QUESTS = [
    {
      id:'hot_start',
      title:'Hot start',
      sub:'Run one round in any format today.',
      reward:25,
      done:(today) => today.length >= 1,
      cta:{ label:'Debate it', href:'/debate-ai' },
    },
    {
      id:'high_scorer',
      title:'High scorer',
      sub:'Score 27.5 or higher on any round today.',
      reward:50,
      done:(today) => today.some(r => typeof r.score === 'number' && r.score >= 27.5),
      cta:{ label:'Go for the ballot', href:'/debate-ai' },
    },
    {
      id:'format_hopper',
      title:'Format hopper',
      sub:'Run rounds in two different formats today.',
      reward:40,
      done:(today) => new Set(today.map(r => r.formatName || r.format || '')).size >= 2,
      cta:{ label:'Pick a new format', href:'/debate-ai' },
    },
    {
      id:'voice_up',
      title:'Voice up',
      sub:'Run one live voice round today.',
      reward:35,
      done:(today) => today.some(r => r.kind === 'voice' || r.kind === 'live'),
      cta:{ label:'Open voice', href:'/voice-debate' },
    },
    {
      id:'cross_ai',
      title:'Cross the AI',
      sub:'Beat the AI on any round today.',
      reward:60,
      done:(today) => today.some(r => r.won === true && r.kind !== 'live'),
      cta:{ label:'Take a shot', href:'/debate-ai' },
    },
  ];

  // Local day index. Floor((days since epoch) % 5) — same for every
  // user in the same timezone-day so the quest is universal.
  const dayIndex = Math.floor(Date.now() / 86400000);
  const quest = QUESTS[dayIndex % QUESTS.length];

  // Today's rows: completedAt within the user's local "today" window.
  const today = new Date();
  const dayStart = new Date(today.getFullYear(), today.getMonth(), today.getDate()).getTime();
  const todayRows = rows.filter(r => {
    const t = r.completedAt && r.completedAt.toDate ? r.completedAt.toDate() : null;
    return t && t.getTime() >= dayStart;
  });
  const isDone = quest.done(todayRows);

  return `
    <section class="quest-card ${isDone ? 'done' : ''}" aria-label="Today's quest">
      <div class="quest-icon">${isDone ? '✓' : '◎'}</div>
      <div>

// 12 columns × 7 rows. Column 11 is the current week, column 0 is
// ~12 weeks ago. Cell (col, row) = (cols-1-col) weeks back +
// (today.weekday - row) days. Cells in the future stay blank.
function renderHeatmap(s){
  const today = new Date();
  const weekday = today.getDay();
  const cols = 12, rows = 7;
  const cells = [];
  for(let r=0;r<rows;r++) cells.push(new Array(cols).fill(0));
  for(let c=0;c<cols;c++){
    for(let r=0;r<rows;r++){
      const weeksBack = (cols - 1 - c);
      const dayDiff = weekday - r;
      const daysBack = weeksBack * 7 + dayDiff;
      if(daysBack < 0) continue;
      const d = new Date(today.getFullYear(), today.getMonth(), today.getDate() - daysBack);
      cells[r][c] = s.dailyCounts.get(dayKey(d)) || 0;
    }
  }
  const bucket = n => n<=0?'':n===1?'l1':n===2?'l2':n===3?'l3':'l4';
  const colsHtml = [];
  for(let c=0;c<cols;c++){
    const colCells = [];
    for(let r=0;r<rows;r++){
      const n = cells[r][c];
      colCells.push(`<div class="heat-cell ${bucket(n)}" title="${n} round${n===1?'':'s'}"></div>`);
    }
    colsHtml.push(`<div class="heat-col">${colCells.join('')}</div>`);
  }
  let active = 0;
  cells.forEach(row => row.forEach(v => { if(v) active++; }));
  return `
    <section class="heat-card">
      <div class="label">Practice over the last 12 weeks</div>
      <div class="heat-grid">${colsHtml.join('')}</div>
      <div class="heat-foot">
        <span>${active} active day${active===1?'':'s'} of 84</span>
        <span class="heat-legend">
          <span>Less</span>
          <span class="heat-cell"></span>
          <span class="heat-cell l1"></span>
          <span class="heat-cell l2"></span>
          <span class="heat-cell l3"></span>
          <span class="heat-cell l4"></span>
          <span>More</span>
        </span>
      </div>
    </section>
  `;
}

// Score sparkline of the last 30 scored rounds in chronological order.
// Y-axis is locked to the typical speaker-points window (22-30) so a
// single off round doesn't smash the curve flat.
function renderTrend(rows){
  const series = rows.slice()
    .filter(r => typeof r.score === 'number')
    .reverse()
    .slice(-30);
  if(series.length < 2){
    return `
      <section class="trend-card">
        <div class="label">Score trend</div>
        <div style="font-size:.78rem;color:var(--text-dim);padding:18px 0">Two scored rounds and the curve appears.</div>
      </section>
    `;
  }
  const w = 320, h = 80, pad = 6;
  const yMin = 22, yMax = 30;
  const pts = series.map((r, i) => {
    const x = pad + (i / (series.length - 1)) * (w - pad*2);
    const y = pad + (1 - (r.score - yMin)/(yMax - yMin)) * (h - pad*2);
    return [x, y, r.score];
  });
  const path = pts.map((p, i) => (i===0?'M':'L') + p[0].toFixed(1) + ' ' + p[1].toFixed(1)).join(' ');
  const last = pts[pts.length-1];
  const first = pts[0];
  const areaPath = path + ` L ${last[0].toFixed(1)} ${(h-pad).toFixed(1)} L ${first[0].toFixed(1)} ${(h-pad).toFixed(1)} Z`;
  const third = Math.max(1, Math.floor(series.length/3));
  const a = series.slice(0, third), b = series.slice(-third);
  const avgA = a.reduce((x,r)=>x+r.score,0)/a.length;
  const avgB = b.reduce((x,r)=>x+r.score,0)/b.length;
  const delta = avgB - avgA;
  const arrow = delta >= 0.1 ? '↑' : (delta <= -0.1 ? '↓' : '→');
  const dCls = delta >= 0.1 ? 'up' : (delta <= -0.1 ? 'down' : '');
  return `
    <section class="trend-card">
      <div class="label">Score trend (last ${series.length})</div>
      <svg class="trend-svg" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
        <defs>
          <linearGradient id="trendFill" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="var(--accent)" stop-opacity=".34"/>
            <stop offset="100%" stop-color="var(--accent)" stop-opacity="0"/>
          </linearGradient>
        </defs>
        <path d="${areaPath}" fill="url(#trendFill)" stroke="none"/>
        <path d="${path}" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
        <circle cx="${last[0].toFixed(1)}" cy="${last[1].toFixed(1)}" r="3.5" fill="var(--accent)"/>
      </svg>
      <div class="trend-foot">
        <span>Last: <b>${last[2].toFixed(1)}</b></span>
        <span><span class="trend-delta ${dCls}">${arrow} ${Math.abs(delta).toFixed(2)}</span> across the window</span>
      </div>
    </section>
  `;
}

async function fillRank(s){
  if(!db || s.bestVoice == null) return;
  const node = document.getElementById('rankCard');
  if(!node) return;
  try{
    // Read-thrift (2026-05-20 quota fix): this used to fetch up to 500
    // leaderboard docs on EVERY profile load just to compute a rank
    // percentile — 500 reads a pop on a high-traffic page, a real
    // contributor to blowing the daily Firestore quota. Replaced with
    // two count() aggregations: each is billed ~1 read per 1000 index
    // entries scanned (min 1), so this is ~2 reads instead of 500.
    // Falls back to a SMALL (100-doc) fetch if count() isn't available
    // (older SDK) — still 5x lighter than the old 500.
    const base = db.collection('leaderboard_entries').where('kind','==','voice');
    let ahead, total;
    if (typeof base.count === 'function') {
      const [aheadSnap, totalSnap] = await Promise.all([
        base.where('score','>', s.bestVoice).count().get(),
        base.count().get(),
      ]);
      ahead = aheadSnap.data().count;
      total = Math.max(totalSnap.data().count, 1);
    } else {
      const top = await base.orderBy('score','desc').limit(100).get();
      const scores = top.docs.map(d => d.data().score).filter(x => typeof x === 'number');
      ahead = scores.filter(x => x > s.bestVoice).length;
      total = Math.max(scores.length, 1);
    }
    const rank = ahead + 1;
    let pct = Math.round((rank / total) * 100);
    pct = Math.max(1, Math.min(99, pct));
    const badge = node.querySelector('.badge');
    const line = node.querySelector('.rk-line');
    if(rank <= 3){
      badge.textContent = ['1st','2nd','3rd'][rank-1];
      line.innerHTML = `Rank <b>#${rank}</b> on the voice board with <b>${s.bestVoice.toFixed(1)}</b>.`;
    } else if(rank <= 100){
      badge.textContent = '#' + rank;
      line.innerHTML = `Rank <b>#${rank}</b> · Top <b>${pct}%</b> of voice debaters.`;
    } else {
      badge.textContent = '★';
      line.innerHTML = `Top <b>${pct}%</b> of voice debaters with <b>${s.bestVoice.toFixed(1)}</b>.`;
    }
  }catch(e){
    console.warn('[profile] rank query failed:', e && e.message);
    const badge = node.querySelector('.badge');
    const line = node.querySelector('.rk-line');
    if(badge) badge.textContent = '★';
    if(line) line.innerHTML = `Best voice score: <b>${s.bestVoice.toFixed(1)}</b>. Couldn't pull live rank.`;
  }
}

function wireSettings(user, rows){
  const status = document.getElementById('setStatus');
  function setStatus(msg, cls){
    if(!status) return;
    status.textContent = msg || '';
    status.className = 'set-status ' + (cls||'');
  }

  const saveBtn = document.getElementById('saveSettings');
  if(saveBtn){
    saveBtn.addEventListener('click', async () => {
      if(!db || !user){ setStatus('Not signed in.', 'err'); return; }
      saveBtn.disabled = true;
      setStatus('Saving…');
      try{
        const name = (document.getElementById('setName')?.value || '').trim().slice(0, 40);
        const lbOn = document.getElementById('setLb')?.checked;
        const sfxOn = document.getElementById('setSfx')?.checked;
        const corpusOn = document.getElementById('setCorpus')?.checked;
        try { localStorage.setItem('da-sfx-muted', sfxOn ? '0' : '1'); } catch(_){}
        // Mirror corpus consent to localStorage so the captureTurn write
        // path on /app and /voice-debate reads sync without a Firestore hit
        // per turn. Firestore is still the source of truth across devices.
        try { localStorage.setItem('debateos-corpus-contribute', corpusOn ? '1' : '0'); } catch(_){}
        await db.collection('user_profiles').doc(user.uid).set({
          displayNameOverride: name || null,
          leaderboardOptOut: !lbOn,
          contributeToCorpus: !!corpusOn,
          contributeToCorpusUpdatedAt: new Date(),
          settingsUpdatedAt: new Date(),
        }, { merge: true });
        setStatus('Saved. Future rounds will reflect these settings.', 'ok');
      } catch(e){
        console.warn('[profile] settings save failed:', e && e.message);
        setStatus('Could not save: ' + (e.message || 'unknown'), 'err');
      } finally {
        saveBtn.disabled = false;
      }
    });
  }

  const exportBtn = document.getElementById('exportRounds');
  if(exportBtn){
    exportBtn.addEventListener('click', () => {
      try{
        const slim = rows.map(r => ({
          completedAt: r.completedAt && r.completedAt.toDate ? r.completedAt.toDate().toISOString() : null,
          score: typeof r.score === 'number' ? r.score : null,
          format: r.formatName || r.format || null,
          side: r.sideLabel || r.side || null,
          kind: r.kind || null,
          won: r.won === true,
          motion: r.motion || '',
        }));
        const blob = new Blob([JSON.stringify(slim, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `debateai-rounds-${new Date().toISOString().slice(0,10)}.json`;
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(() => URL.revokeObjectURL(url), 1000);
        setStatus(`Exported ${slim.length} round${slim.length===1?'':'s'}.`, 'ok');
      } catch(e){
        setStatus('Export failed: ' + (e.message || 'unknown'), 'err');
      }
    });
  }

  const outBtn = document.getElementById('signOutBtn');
  if(outBtn){
    outBtn.addEventListener('click', () => {
      try { if(auth) auth.signOut(); } catch(_){}
    });
  }
}

function renderDashboard(user, rows, profileData){
  const s = compute(rows);
  const ach = computeAchievements(s);
  const avatar = renderAvatar(user);
  // Display-name override wins over Google name on the dashboard hero
  // so users see the same name they'll appear under on the leaderboard.
  const overrideName = (profileData && profileData.displayNameOverride) || '';
  const headerName = overrideName || user.displayName || user.email || 'Debater';
  const first = headerName.split(/\s+/)[0];

  // XP-bar copy. When the user has hit the top tier, we collapse the
  // "to next" line into a short tag instead of a confusing 100%/100%.
  const nxtCopy = s.level.nxt
    ? `${s.level.nxt.min - s.xp} XP to <b>${escapeHtml(s.level.nxt.name)}</b>`
    : `Top tier. Nothing left to climb.`;

  // Streak chip. Cold (grey) if 0 — warm (gold) if active.
  const streakChip = s.streak > 0
    ? `<span class="streak-chip"><span class="dot"></span> ${s.streak}-day streak</span>`
    : `<span class="streak-chip cold"><span class="dot"></span> No streak yet</span>`;

  // Format mastery. Sort by round count desc so the user's strongest
  // surface leads, but cap at 8 cards to keep the panel scannable.
  const fmtRows = Object.entries(s.formats)
    .map(([name, f]) => ({
      name,
      count: f.count,
      avg: f.count ? f.sum/f.count : 0,
      best: f.best,
      color: FMT_COLOR[name] || 'var(--accent)',
    }))
    .sort((a,b) => b.count - a.count)
    .slice(0, 8);

  // Format mastery bar = avg score normalized against 30 (perfect ballot).
  // Caps the floor at 10% so the bar reads as "present" even after a
  // single low-scoring round.
  const fmtBars = fmtRows.map(f => {
    const pct = Math.max(10, Math.min(100, (f.avg / 30) * 100));
    return `
      <div class="fmt-card" style="--fmt-color:${f.color}">
        <div class="fname">${escapeHtml(f.name)}</div>
        <div class="fmeta"><span>${f.count} round${f.count===1?'':'s'}</span><b>${fmtScore(f.avg)} avg</b></div>

      </div>
    `;
  }).join('');

  // Achievement cards. Sort unlocked first (so the user immediately
  // sees what they've earned), within each group preserve definition
  // order so legendaries don't all clump together.
  const achSorted = [...ach].sort((a,b) => (b.unlocked?1:0) - (a.unlocked?1:0));
  const achCards = achSorted.map(a => `
    <div class="ach ${a.unlocked?'unlocked':'locked'} tier-${a.tier}">
      <div class="ach-tier">${a.unlocked?a.tier:'Locked'}</div>
      <div class="ach-name">${escapeHtml(a.title)}</div>
      <div class="ach-desc">${escapeHtml(a.desc)}</div>
    </div>
  `).join('');

  // Recent rounds (8 most recent). Truncates the motion so it doesn't
  // wrap into a paragraph — full motion is still in the user's saved
  // round inside /debate-ai history.
  const recent = rows.slice(0, 8).map(r => {
    const motion = (r.motion || '(no motion saved)').slice(0, 90);
    const fmt = r.formatName || r.format || '—';
    const side = r.sideLabel || r.side || '';
    const wonBadge = (r.won === true && r.kind === 'ai') ? '<span class="badge-w">W</span>' : '';
    return `
      <div class="r-row">
        <div class="r-motion">${escapeHtml(motion)}${wonBadge}<span class="fmt">${escapeHtml(fmt)}</span></div>
        <div class="r-score">${fmtScore(r.score)}</div>
        <div class="r-side">${escapeHtml(side)}</div>
        <div class="r-when">${fmtAgo(r.completedAt)}</div>
      </div>
    `;
  }).join('');

  mount.innerHTML = `
    <section class="hero">
      ${avatar}
      <div class="hero-meta">
        <h1 class="name">${escapeHtml(first)}</h1>
        <div class="sub">${escapeHtml(user.email || '')}</div>
        <span class="title-pill">${escapeHtml(s.level.cur.name)}</span>
      </div>
      <div class="hero-side">
        ${streakChip}
        <span class="small">${s.total} round${s.total===1?'':'s'} logged</span>
      </div>
    </section>

    ${renderDailyQuest(rows)}

    ${renderMilestone(s, ach)}

    <section class="xp-card">
      <div class="xp-row">
        <span class="lvl-now">${escapeHtml(s.level.cur.name)}</span>
        <span>${nxtCopy}</span>
      </div>
      <div class="xp-bar"><div class="xp-fill" style="width:${s.level.pct.toFixed(1)}%"></div></div>
      <div class="xp-foot">
        <span>${s.xp} XP total</span>
        <span>${s.level.nxt ? `${s.level.cur.min} → ${s.level.nxt.min} XP` : 'Max tier'}</span>
      </div>
    </section>

    <section class="stat-grid">
      <div class="stat"><div class="label">Total rounds</div><div class="val">${s.total}</div><div class="sub">${s.days} active day${s.days===1?'':'s'}</div></div>
      <div class="stat"><div class="label">Avg speaker</div><div class="val accent">${fmtScore(s.avg)}</div><div class="sub">across all formats</div></div>
      <div class="stat"><div class="label">Best ballot</div><div class="val">${fmtScore(s.best)}</div><div class="sub">your high so far</div></div>
      <div class="stat"><div class="label">Wins vs AI</div><div class="val">${s.wins}</div><div class="sub">${s.live} live round${s.live===1?'':'s'}</div></div>
    </section>

    ${renderHeatmap(s)}

    <div class="two-up">
      ${renderTrend(rows)}
      ${renderSideBreakdown(s)}
    </div>

    ${renderRankSkeleton(s)}

    <!-- Certifications card. Hydrated post-mount by hydrateCerts()
         which reads user_certificates/{uid} (summary doc) + the user's
         five most-recent certificate docs. Empty state nudges the user
         toward a judged voice round. -->
    <div id="certsSlot" class="certs-card">
      <div class="certs-eyebrow">
        <span>Certifications</span>
        <span class="certs-eyebrow-tag">Loading</span>
      </div>
      <div class="certs-empty">Checking your Debate AI credentials…</div>
    </div>

    <!-- Style profile card. Hydrated post-mount by hydrateStyleProfile()
         which fetches /api/user/style-summary and renders the
         nightly-Haiku-generated fingerprint (or empty/loading states).
         Surfaces the learning loop wired 2026-05-13 and lets users edit
         their fingerprint via /api/user/style-update (2026-05-19). -->
    <div id="styleProfileSlot" class="style-card">
      <div class="sc-eyebrow">
        <span>Your style profile</span>
        <span class="sc-eyebrow-tag">Loading</span>
      </div>
      <div class="sc-body" style="color:var(--text-dim)">The AI is checking how it has been reading you. One moment.</div>
    </div>

    <div class="section"><h2>Format mastery</h2><div class="right">${fmtRows.length} format${fmtRows.length===1?'':'s'} touched</div></div>
    <div class="format-grid">${fmtBars || `<div class="state" style="grid-column:1/-1"><h3>No format data yet</h3><p>Run a round and your strongest formats will surface here, ranked by reps.</p></div>`}</div>

    <div class="section"><h2>Achievements</h2><div class="right">${ach.filter(a=>a.unlocked).length} of ${ach.length} unlocked</div></div>
    <div class="ach-grid">${achCards}</div>

    <div class="section"><h2>Recent rounds</h2><div class="right"><a href="/leaderboard">See the full leaderboard →</a></div></div>
    <div class="recent">
      <div class="r-row head">
        <div>Motion</div>
        <div>Score</div>
        <div>Side</div>
        <div style="text-align:right">When</div>
      </div>
      ${recent || `<div class="r-row"><div class="r-motion" style="grid-column:1/-1;color:var(--text-dim)">Nothing yet. Your last eight rounds will appear here.</div></div>`}
    </div>

    <div class="cta-strip">
      <a href="/debate-ai"><span class="cl">Typed</span><span class="ct">Beat the AI</span><span class="cs">Full round, AI judge, ballot at the end.</span></a>
      <a href="/voice-debate"><span class="cl">Voice</span><span class="ct">Talk it out</span><span class="cs">Live speech, interruptions, a real timer.</span></a>
      <a href="/live"><span class="cl">Human vs human</span><span class="ct">Go live</span><span class="cs">Real opponents, same AI ballot.</span></a>
    </div>

    ${renderSettings(user, profileData)}
  `;

  // Post-mount: wire settings handlers + kick off the rank query.
  // Both run after innerHTML so the DOM nodes exist; both are
  // best-effort and never block first paint.
  try { wireSettings(user, rows); } catch(e){ console.warn('[profile] wireSettings failed:', e && e.message); }
  fillRank(s);
  hydrateStyleProfile(user, s);
  hydrateCerts(user);
}

// Certifications hydration. Reads user_certificates/{uid} (single
// summary doc with counts + highest tier + latest cert id) and the
// user's five most recent certificates from the public certificates
// collection. Both reads are public-safe (no auth header) — Firestore
// rules required (set these in console manually):
//   match /certificates/{id}       { allow read: if true; allow write: if false; }
//   match /user_certificates/{uid}  { allow read: if true; allow write: if false; }
// Writes only come from /api/create-cert (server-side admin SDK
// bypasses these rules), so the rule says "no client writes ever."
async function hydrateCerts(user){
  const slot = document.getElementById('certsSlot');
  if (!slot || !db || !user) return;

  try {
    const summarySnap = await db.collection('user_certificates').doc(user.uid).get();
    if (!summarySnap.exists){
      slot.innerHTML = `
        <div class="certs-eyebrow">
          <span>Credentials</span>
          <span class="certs-eyebrow-tag">None yet</span>
        </div>
        <div class="certs-empty">
          <strong>No credentials yet.</strong> Run a judged voice round and score 27.0+ on the academic 25-30 scale to earn a Novice credential; 29.0+ earns Champion. Each one is a verified proof of spoken-English argumentation — usable on college apps, ESL portfolios, and resumes.
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-top:10px">
          <a class="certs-cta" href="/voice-debate">Start a voice round →</a>
          <a href="/credentials" style="font-size:.78rem;font-weight:600;color:var(--text-dim);text-decoration:none;border-bottom:1px dashed var(--border);padding-bottom:1px">How the program works →</a>
        </div>
      `;
      return;
    }

    const summary = summarySnap.data() || {};
    const counts = summary.counts || {};
    const total = summary.totalCount || 0;
    const highestTier = summary.highestTier || 'novice';
    const tierNameMap = { novice:'Novice', varsity:'Varsity', circuit:'Circuit', champion:'Champion' };
    const highestTierName = tierNameMap[highestTier] || 'Novice';
    const highestScore = summary.highestScore;

    // Recent certs — five most recent.
    let recent = [];
    try {
      const recentSnap = await db.collection('certificates')
        .where('uid','==',user.uid)
        .orderBy('issuedAtMs','desc')
        .limit(5).get();
      recent = recentSnap.docs.map(d => d.data());
    } catch(e){
      // Composite index might not be built yet — fall back to an
      // unsorted read sliced client-side.
      console.warn('[certs] indexed query failed, falling back:', e && e.message);
      try {
        const fb = await db.collection('certificates').where('uid','==',user.uid).limit(10).get();
        recent = fb.docs.map(d => d.data())
          .sort((a,b) => (b.issuedAtMs || 0) - (a.issuedAtMs || 0))
          .slice(0, 5);
      } catch(e2){ recent = []; }
    }

    const fmtDate = (ms) => {
      if (!ms) return '—';
      const d = new Date(ms);
      return d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
    };

    const escapeHtml = (s) => String(s || '').replace(/[&<>"']/g, c => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]));

    const countChips = ['champion','circuit','varsity','novice']
      .filter(k => counts[k] > 0)
      .map(k => `<span class="certs-count-chip"><b>${counts[k]}</b> ${tierNameMap[k]}</span>`)
      .join('');

    const rowsHtml = recent.length
      ? recent.map(c => {
          const motion = c.motion ? c.motion.slice(0, 90) + (c.motion.length > 90 ? '…' : '') : '(impromptu)';
          const tier = tierNameMap[c.tier] || 'Novice';
          const score = typeof c.score === 'number' ? c.score.toFixed(1) : '—';
          return `<a class="certs-row" href="/verify/${escapeHtml(c.certId)}">
            <div class="certs-row-motion">${escapeHtml(motion)}</div>
            <div class="certs-row-tier">${tier}</div>
            <div class="certs-row-score">${score}</div>
            <div class="certs-row-date">${fmtDate(c.issuedAtMs)}</div>
          </a>`;
        }).join('')
      : '';

    slot.innerHTML = `
      <div class="certs-eyebrow">
        <span>Credentials</span>
        <span class="certs-eyebrow-tag">${total} earned</span>
      </div>
      <div class="certs-hero">
        <div class="certs-hero-tier">Debate AI <span class="gold">${highestTierName}</span></div>
        <div class="certs-hero-sub">
          ${highestScore ? `Highest score <b>${highestScore.toFixed(1)}</b>. ` : ''}Each credential is verified proof of spoken-English argumentation under live pressure — share the link or download the PDF for college apps + resumes.
        </div>
      </div>
      ${countChips ? `<div class="certs-counts">${countChips}</div>` : ''}
      ${rowsHtml ? `<div class="certs-list">${rowsHtml}</div>` : ''}
      <a class="certs-cta" href="/voice-debate" style="margin-top:14px">Earn another →</a>
    `;
  } catch (err) {
    console.warn('[certs] hydrate failed:', err && err.message);
    slot.innerHTML = `
      <div class="certs-eyebrow"><span>Certifications</span><span class="certs-eyebrow-tag">—</span></div>
      <div class="certs-empty">Couldn't load your certificates right now. Refresh in a moment.</div>
    `;
  }
}

// Style profile hydration. Fetches /api/user/style-summary with the
// user's Firebase ID token, renders the appropriate state into the
// #styleProfileSlot, and wires the edit / save / reset affordances.
async function hydrateStyleProfile(user, stats){
  const slot = document.getElementById('styleProfileSlot');
  if (!slot) return;

  let token;
  try { token = await user.getIdToken(); }
  catch (err) {
    console.warn('[style-profile] token failed:', err && err.message);
    renderStyleEmpty(slot, stats, 'Sign-in token failed. Refresh and try again.');
    return;
  }

  let data;
  try {
    const resp = await fetch('/api/user/style-summary', {
      headers: { Authorization: 'Bearer ' + token },
    });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    data = await resp.json();
  } catch (err) {
    console.warn('[style-profile] fetch failed:', err && err.message);
    renderStyleEmpty(slot, stats, 'Could not load your style profile.');
    return;
  }

  if (!data || !data.fingerprint || !data.fingerprint.text) {
    renderStyleEmpty(slot, stats, null, data);
    return;
  }
  renderStyleProfileFilled(slot, user, data);
}

function renderStyleEmpty(slot, stats, errMsg, data){
  const have = (data && typeof data.totalRounds === 'number') ? data.totalRounds : (stats && stats.total) || 0;
  const need = Math.max(0, 3 - have);
  const sub = errMsg
    ? `<div class="sc-status err">${escapeHtml(errMsg)}</div>`
    : need > 0
      ? `<div class="sc-meta"><span>You have <strong style="color:var(--text)">${have}</strong> round${have===1?'':'s'} logged.</span><span class="sc-meta-dot">·</span><span>${need} more and the nightly pass will build your fingerprint.</span></div>`
      : `<div class="sc-meta"><span>${have} rounds logged.</span><span class="sc-meta-dot">·</span><span>Your fingerprint will appear after tonight's pass (runs around 04:00 UTC).</span></div>`;
  slot.innerHTML = `
    <div class="sc-eyebrow">
      <span>Your style profile</span>
      <span class="sc-eyebrow-tag">Pending</span>
    </div>
    <div class="sc-empty">The AI hasn't built your profile yet. Once you have enough rounds, it'll surface <strong>signature moves</strong>, <strong>recurring strengths</strong>, <strong>weaknesses to fix</strong>, and <strong>topic affinities</strong>, then inject that fingerprint into every future round.</div>
    ${sub}
  `;
}

function renderStyleProfileFilled(slot, user, data){
  const fp = data.fingerprint || {};
  const text = fp.text || '';
  const sample = fp.sampleCount ? String(fp.sampleCount) : '';
  const updated = fp.updatedAt ? fmtAgo(new Date(fp.updatedAt)) : null;
  const userEdited = fp.userEdited === true;
  const editedFlag = userEdited
    ? `<span class="sc-edited-flag">Edited by you</span>`
    : '';
  const metaParts = [];
  if (updated) metaParts.push(`Updated ${escapeHtml(updated)}`);
  if (!userEdited && sample) metaParts.push(`Built from ${escapeHtml(sample)} round${sample === '1' ? '' : 's'}`);
  if (userEdited) metaParts.push(`Auto-regeneration paused`);
  const metaHtml = metaParts.length
    ? `<div class="sc-meta">${metaParts.map((m,i) => i ? `<span class="sc-meta-dot">·</span><span>${m}</span>` : `<span>${m}</span>`).join('')}</div>`
    : '';

  slot.innerHTML = `
    <div class="sc-eyebrow">
      <span>Your style profile${editedFlag}</span>
      <span class="sc-eyebrow-tag">Used in every round</span>
    </div>
    <div class="sc-body">${escapeHtml(text)}</div>
    ${metaHtml}
    <div class="sc-actions">
      <button type="button" class="sc-btn primary" id="scEditBtn">Edit how the AI reads you</button>
      ${userEdited ? `<button type="button" class="sc-btn ghost" id="scResetBtn">Regenerate from rounds</button>` : ''}
    </div>
    <div class="sc-status" id="scStatus"></div>
  `;

  const editBtn = document.getElementById('scEditBtn');
  if (editBtn) editBtn.addEventListener('click', () => enterStyleEditMode(slot, user, data));
  const resetBtn = document.getElementById('scResetBtn');
  if (resetBtn) resetBtn.addEventListener('click', () => resetStyleProfile(slot, user, data));
}

function enterStyleEditMode(slot, user, data){
  const fp = data.fingerprint || {};
  const text = fp.text || '';
  const userEdited = fp.userEdited === true;
  slot.innerHTML = `
    <div class="sc-eyebrow">
      <span>Your style profile</span>
      <span class="sc-eyebrow-tag">Editing</span>
    </div>
    <textarea class="sc-edit" id="scEditTextarea" maxlength="2000">${escapeHtml(text)}</textarea>
    <div class="sc-edit-hint">Free-form. The AI reads this verbatim into every brain call. Useful for correcting habits the auto-generated read got wrong, or naming a move you want the AI to pressure-test. Saving pauses the nightly auto-regenerate until you reset.</div>
    <div class="sc-actions">
      <button type="button" class="sc-btn primary" id="scSaveBtn">Save changes</button>
      <button type="button" class="sc-btn ghost" id="scCancelBtn">Cancel</button>
    </div>
    <div class="sc-status" id="scStatus"></div>
  `;
  const saveBtn = document.getElementById('scSaveBtn');
  const cancelBtn = document.getElementById('scCancelBtn');
  if (saveBtn) saveBtn.addEventListener('click', () => saveStyleProfile(slot, user, data));
  if (cancelBtn) cancelBtn.addEventListener('click', () => renderStyleProfileFilled(slot, user, data));
  setTimeout(() => {
    const ta = document.getElementById('scEditTextarea');
    if (ta) ta.focus();
  }, 50);
}

async function saveStyleProfile(slot, user, data){
  const ta = document.getElementById('scEditTextarea');
  const status = document.getElementById('scStatus');
  const saveBtn = document.getElementById('scSaveBtn');
  if (!ta || !status) return;
  const text = ta.value.trim();
  if (text.length < 30) {
    status.className = 'sc-status err';
    status.textContent = 'A style profile that short would be ignored. Add more detail.';
    return;
  }
  if (saveBtn) saveBtn.disabled = true;
  status.className = 'sc-status';
  status.textContent = 'Saving…';
  let token;
  try { token = await user.getIdToken(); }
  catch (err) {
    status.className = 'sc-status err';
    status.textContent = 'Could not authenticate. Refresh and try again.';
    if (saveBtn) saveBtn.disabled = false;
    return;
  }
  try {
    const resp = await fetch('/api/user/style-update', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
      body: JSON.stringify({ fingerprint: text }),
    });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.error || ('HTTP ' + resp.status));
    }
    // Local refresh: update the data in place + re-render filled state.
    data.fingerprint = Object.assign({}, data.fingerprint, {
      text,
      userEdited: true,
      updatedAt: new Date().toISOString(),
    });
    renderStyleProfileFilled(slot, user, data);
    const newStatus = document.getElementById('scStatus');
    if (newStatus) {
      newStatus.className = 'sc-status ok';
      newStatus.textContent = 'Saved. The AI uses this on your next round.';
    }
  } catch (err) {
    status.className = 'sc-status err';
    status.textContent = (err && err.message) || 'Could not save.';
    if (saveBtn) saveBtn.disabled = false;
  }
}

async function resetStyleProfile(slot, user, data){
  const status = document.getElementById('scStatus');
  const resetBtn = document.getElementById('scResetBtn');
  if (!confirm('Regenerate from your last 6 rounds tonight? Your current edits will be replaced after the nightly pass runs.')) return;
  if (resetBtn) resetBtn.disabled = true;
  if (status) { status.className = 'sc-status'; status.textContent = 'Resetting…'; }
  let token;
  try { token = await user.getIdToken(); }
  catch (err) {
    if (status) { status.className = 'sc-status err'; status.textContent = 'Could not authenticate.'; }
    if (resetBtn) resetBtn.disabled = false;
    return;
  }
  try {
    const resp = await fetch('/api/user/style-update', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
      body: JSON.stringify({ reset: true }),
    });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    data.fingerprint = Object.assign({}, data.fingerprint, { userEdited: false });
    renderStyleProfileFilled(slot, user, data);
    const newStatus = document.getElementById('scStatus');
    if (newStatus) {
      newStatus.className = 'sc-status ok';
      newStatus.textContent = 'Reset. Tonight\'s pass will regenerate your fingerprint from your latest rounds.';
    }
  } catch (err) {
    if (status) { status.className = 'sc-status err'; status.textContent = (err && err.message) || 'Could not reset.'; }
    if (resetBtn) resetBtn.disabled = false;
  }
}

async function loadProfile(user){
  if(!db){
    renderError('Firestore did not load. Your browser may be blocking the database script.');
    return;
  }
  try{
    // Pull the user's profile doc (settings + display-name override)
    // in parallel with the leaderboard entries. Both are best-effort —
    // a profile-doc miss falls through to defaults; an entries miss
    // surfaces the empty state.
    const [entriesSnap, profileSnap] = await Promise.all([
      db.collection('leaderboard_entries')
        .where('uid', '==', user.uid)
        .orderBy('completedAt', 'desc')
        .limit(200)
        .get(),
      db.collection('user_profiles').doc(user.uid).get().catch(err => {
        console.warn('[profile] profile-doc read failed:', err && err.message);
        return null;
      }),
    ]);
    const rows = entriesSnap.docs.map(d => d.data());
    const profileData = (profileSnap && profileSnap.exists) ? profileSnap.data() : null;
    if(!rows.length){
      renderEmpty(user, profileData);
      return;
    }
    renderDashboard(user, rows, profileData);
    try { window.SFX && window.SFX.success && window.SFX.success(); } catch(_){}
  } catch(e){
    console.warn('[profile] query failed:', e && e.message);
    // 2026-05-19: an index-missing failure used to fall through to
    // renderEmpty() — but that lied to the user ("0 rounds logged")
    // when the actual cause was a missing (uid, completedAt) composite
    // index on leaderboard_entries. Surface that something went wrong
    // via renderError instead. If the user genuinely has zero rounds,
    // entriesSnap is empty (no exception) and renderEmpty() handles it.
    // 2026-05-20: do NOT pass the raw Firestore error to renderError —
    // a missing/ building index throws a 'failed-precondition' whose
    // message embeds the private Firebase console index-creation URL.
    // That dev-only link was rendering verbatim in the user-facing card.
    // Map it to friendly copy; the technical detail stays in console.
    const raw = (e && e.message) || '';
    const isIndex = (e && e.code === 'failed-precondition') || /requires an index|index.*building|currently building/i.test(raw);
    renderError(isIndex
      ? "Your stats are still warming up on our end. Give it a minute and refresh."
      : "Couldn't pull your rounds right now.");
  }
}

if(auth){
  auth.onAuthStateChanged(u => {
    if(!u){ renderSignedOut(); return; }
    loadProfile(u);
  });
} else {
  renderSignedOut();
}
</script>
