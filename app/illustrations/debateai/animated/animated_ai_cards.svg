<svg xmlns="http://www.w3.org/2000/svg" width="960" height="660" viewBox="0 0 960 660" role="img" aria-labelledby="title desc">
<title id="title">Animated DebateAI abstract AI cards</title><desc id="desc">Animated pencil-style DebateAI website accent.</desc>

<defs>
  <filter id="paperGrain" x="-10%" y="-10%" width="120%" height="120%">
    <feTurbulence type="fractalNoise" baseFrequency="0.76" numOctaves="4" seed="21" result="noise"/>
    <feColorMatrix type="saturate" values="0"/>
    <feComponentTransfer>
      <feFuncA type="table" tableValues="0 0.105"/>
    </feComponentTransfer>
  </filter>
  <filter id="softShadow" x="-30%" y="-30%" width="160%" height="180%">
    <feGaussianBlur in="SourceAlpha" stdDeviation="18" result="blur"/>
    <feOffset in="blur" dx="0" dy="18" result="offset"/>
    <feFlood flood-color="#111a22" flood-opacity="0.18" result="color"/>
    <feComposite in="color" in2="offset" operator="in" result="shadow"/>
    <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="cardShadow" x="-30%" y="-30%" width="160%" height="180%">
    <feGaussianBlur in="SourceAlpha" stdDeviation="10" result="blur"/>
    <feOffset in="blur" dx="0" dy="10" result="offset"/>
    <feFlood flood-color="#111a22" flood-opacity="0.20" result="color"/>
    <feComposite in="color" in2="offset" operator="in" result="shadow"/>
    <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="pencilDisplace" x="-8%" y="-8%" width="116%" height="116%">
    <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="3" seed="9" result="turb"/>
    <feDisplacementMap in="SourceGraphic" in2="turb" scale="1.6"/>
  </filter>
  <linearGradient id="paperFade" x1="0" x2="1" y1="0" y2="1">
    <stop offset="0" stop-color="#fffaf1"/>
    <stop offset="1" stop-color="#f7f4ec"/>
  </linearGradient>
</defs>


<style>
  .bg { fill:url(#paperFade); }
  .grain { filter:url(#paperGrain); opacity:.055; }
  .line { fill:none; stroke:#3a3a36; stroke-width:3; stroke-linecap:round; stroke-linejoin:round; filter:url(#pencilDisplace); opacity:.82; }
  .mutedLine { fill:none; stroke:#6b625a; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; filter:url(#pencilDisplace); opacity:.42; }
  .draw { stroke-dasharray:520; stroke-dashoffset:520; animation:draw 5.2s ease-in-out infinite; }
  .pulse { transform-box:fill-box; transform-origin:center; animation:pulse 2.2s ease-in-out infinite; }
  .float1 { transform-box:fill-box; transform-origin:center; animation:float1 6s ease-in-out infinite; }
  .float2 { transform-box:fill-box; transform-origin:center; animation:float2 7s ease-in-out infinite; }
  .wave1 { animation:wave 2.8s ease-in-out infinite; transform-origin:240px 315px; }
  .wave2 { animation:wave 2.8s ease-in-out .45s infinite; transform-origin:240px 315px; }
  .wave3 { animation:wave 2.8s ease-in-out .9s infinite; transform-origin:240px 315px; }
  @keyframes draw { 0%,14%{stroke-dashoffset:520;opacity:.15} 52%{stroke-dashoffset:0;opacity:.8} 100%{stroke-dashoffset:0;opacity:.24} }
  @keyframes pulse { 0%,100%{transform:scale(1); opacity:.82} 50%{transform:scale(1.08); opacity:1} }
  @keyframes float1 { 0%,100%{transform:translateY(0) rotate(-1deg)} 50%{transform:translateY(-13px) rotate(1.4deg)} }
  @keyframes float2 { 0%,100%{transform:translateY(0) rotate(2deg)} 50%{transform:translateY(10px) rotate(-1deg)} }
  @keyframes wave { 0%{transform:scale(.82); opacity:.0} 30%{opacity:.68} 100%{transform:scale(1.38); opacity:0} }
  @media (prefers-reduced-motion: reduce) { .draw,.pulse,.float1,.float2,.wave1,.wave2,.wave3 { animation:none; } }
</style>

<rect class="bg" width="100%" height="100%" rx="36"/><rect class="grain" width="100%" height="100%" rx="36"/>

<ellipse cx="478" cy="520" rx="310" ry="52" fill="#ddd3c4" opacity=".35" filter="url(#softShadow)"/>
<g class="float1" transform="translate(250 120) rotate(-4)">
  <rect width="310" height="210" rx="34" fill="#111a22" filter="url(#cardShadow)"/>
  <path d="M34 50 L164 50 M34 83 L244 83 M34 116 L212 116" stroke="#fff7e9" stroke-width="5" opacity=".24" stroke-linecap="round"/>
  <path d="M38 158 C73 117 112 210 151 158 S218 120 267 155" fill="none" stroke="#13bfae" stroke-width="6" stroke-linecap="round" opacity=".86"/>
  <circle class="pulse" cx="270" cy="51" r="11" fill="#b83e3e"/>
</g>
<g class="float2" transform="translate(522 234) rotate(7)">
  <rect width="260" height="170" rx="30" fill="#fffaf2" stroke="#d5c9ba" filter="url(#cardShadow)"/>
  <path d="M32 50 L174 50 M32 82 L218 82 M32 114 L138 114" stroke="#6b625a" stroke-width="4" opacity=".32" stroke-linecap="round"/>
  <path d="M178 131 C200 109 231 112 248 132" fill="none" stroke="#b83e3e" stroke-width="4" opacity=".78"/>
</g>
<g class="float1" transform="translate(170 365) rotate(4)">
  <rect width="238" height="160" rx="28" fill="#fffaf2" stroke="#d5c9ba" filter="url(#cardShadow)"/>
  <path d="M31 49 L151 49 M31 79 L190 79 M31 109 L107 109" stroke="#6b625a" stroke-width="4" opacity=".32" stroke-linecap="round"/>
  <circle class="pulse" cx="194" cy="114" r="9" fill="#13bfae"/>
</g>
<path class="line draw" d="M411 316 C475 332 517 359 553 404" stroke="#13bfae"/>
<path class="line draw" style="animation-delay:.8s" d="M270 358 C254 329 255 305 280 277" stroke="#b83e3e"/>
<path class="mutedLine" d="M104 116 C170 89 212 113 257 143 M735 112 C816 173 846 243 838 340"/>
<circle class="pulse" cx="553" cy="404" r="11" fill="#13bfae"/>

</svg>