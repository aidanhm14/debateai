<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
<title id="title">DebateAI voice round and judge ballot illustration</title>
<desc id="desc">Pencil drawn DebateAI illustration with cream paper grain, graphite lines, navy interface cards, red annotations, teal highlights, and soft shadows.</desc>

<defs>
  <filter id="paperGrain" x="-10%" y="-10%" width="120%" height="120%">
    <feTurbulence type="fractalNoise" baseFrequency="0.76" numOctaves="4" seed="21" result="noise"/>
    <feColorMatrix type="saturate" values="0"/>
    <feComponentTransfer>
      <feFuncA type="table" tableValues="0 0.105"/>
    </feComponentTransfer>
  </filter>
  <filter id="softShadow" x="-30%" y="-30%" width="160%" height="180%">
    <feGaussianBlur in="SourceAlpha" stdDeviation="18" result="blur"/>
    <feOffset in="blur" dx="0" dy="18" result="offset"/>
    <feFlood flood-color="#111a22" flood-opacity="0.18" result="color"/>
    <feComposite in="color" in2="offset" operator="in" result="shadow"/>
    <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="cardShadow" x="-30%" y="-30%" width="160%" height="180%">
    <feGaussianBlur in="SourceAlpha" stdDeviation="10" result="blur"/>
    <feOffset in="blur" dx="0" dy="10" result="offset"/>
    <feFlood flood-color="#111a22" flood-opacity="0.20" result="color"/>
    <feComposite in="color" in2="offset" operator="in" result="shadow"/>
    <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="pencilDisplace" x="-8%" y="-8%" width="116%" height="116%">
    <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="3" seed="9" result="turb"/>
    <feDisplacementMap in="SourceGraphic" in2="turb" scale="1.6"/>
  </filter>
  <linearGradient id="paperFade" x1="0" x2="1" y1="0" y2="1">
    <stop offset="0" stop-color="#fffaf1"/>
    <stop offset="1" stop-color="#f7f4ec"/>
  </linearGradient>
</defs>


<style>
  .bg { fill:url(#paperFade); }
  .grain { filter:url(#paperGrain); opacity:.055; }
  .pencil { fill:none; stroke:#3a3a36; stroke-width:3.2; stroke-linecap:round; stroke-linejoin:round; opacity:.86; filter:url(#pencilDisplace); }
  .pencil2 { fill:none; stroke:#6b625a; stroke-width:1.55; stroke-linecap:round; stroke-linejoin:round; opacity:.52; filter:url(#pencilDisplace); }
  .pencil3 { fill:none; stroke:#3a3a36; stroke-width:1.1; stroke-linecap:round; stroke-linejoin:round; opacity:.26; filter:url(#pencilDisplace); }
  .navy { fill:#111a22; }
  .navy2 { fill:#182631; }
  .red { stroke:#b83e3e; }
  .teal { stroke:#13bfae; }
  .redFill { fill:#b83e3e; }
  .tealFill { fill:#13bfae; }
  .soft { filter:url(#softShadow); }
  .card { filter:url(#cardShadow); }
  .paperCard { fill:#fffaf2; stroke:#ddd4c5; stroke-width:1.5; filter:url(#cardShadow); }
  .tiny { stroke-width:2; opacity:.72; }
  .wash { fill:#111a22; opacity:.045; }
</style>


<rect class="bg" width="100%" height="100%" rx="38"/>
<rect class="grain" width="100%" height="100%" rx="38"/>

<ellipse cx="600" cy="683" rx="450" ry="72" fill="#ddd3c4" opacity=".42" filter="url(#softShadow)"/>
<path class="wash" d="M92 140 C251 81 425 133 553 122 C704 108 890 76 1080 170 L1114 570 C923 686 741 618 568 652 C388 689 211 676 94 601 Z"/>

<!-- speaker profile -->
<g transform="translate(204 212)">
  <ellipse cx="142" cy="124" rx="86" ry="96" fill="#f4e7d6" stroke="#2d2d2a" stroke-width="3" opacity=".95" filter="url(#pencilDisplace)"/>
  <path class="pencil" d="M72 101 C54 38 95 4 156 12 C215 20 248 64 234 137"/>
  <path class="pencil2" d="M99 74 C124 49 178 53 204 81 M115 153 C140 168 170 166 194 148"/>
  <path class="pencil" d="M144 226 C83 256 52 320 63 456 C119 484 204 484 264 456 C259 331 218 259 166 228"/>
  <path class="pencil2" d="M211 230 C269 270 299 322 310 396 M94 240 C73 315 75 391 87 457"/>
  <path d="M229 126 C276 130 316 150 350 184" fill="none" stroke="#13bfae" stroke-width="5" stroke-linecap="round" opacity=".82"/>
  <path d="M235 92 C309 92 376 125 436 177" fill="none" stroke="#13bfae" stroke-width="3.6" stroke-linecap="round" opacity=".43"/>
  <path d="M231 164 C295 181 345 214 389 268" fill="none" stroke="#13bfae" stroke-width="3.2" stroke-linecap="round" opacity=".36"/>
</g>

<!-- dark timer / voice card -->
<g transform="translate(548 117) rotate(-3)">
  <rect class="navy card" width="325" height="214" rx="31"/>
  <circle cx="60" cy="63" r="24" fill="#13bfae" opacity=".9"/>
  <path d="M54 54 L54 72 L73 72" stroke="#fff7e9" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity=".84"/>
  <path d="M116 58 L270 58 M116 92 L245 92" stroke="#fff7e9" stroke-width="4" opacity=".26" stroke-linecap="round"/>
  <path d="M44 145 C60 105 79 190 96 145 S131 108 148 145 S182 185 200 145 S237 106 259 145" fill="none" stroke="#13bfae" stroke-width="6" stroke-linecap="round" opacity=".82"/>
  <circle cx="287" cy="175" r="10" fill="#b83e3e"/>
</g>

<!-- POI cue -->
<g transform="translate(856 330) rotate(9)">
  <rect class="paperCard" width="226" height="156" rx="28"/>
  <path d="M74 105 C54 86 56 58 75 43 C91 29 116 30 129 48 C142 67 135 91 113 106" fill="none" stroke="#3a3a36" stroke-width="4" stroke-linecap="round"/>
  <path d="M93 44 L93 17 M115 54 L141 31 M72 55 L45 34" stroke="#13bfae" stroke-width="4" stroke-linecap="round" opacity=".8"/>
  <path d="M158 52 L197 52 M158 78 L201 78 M158 104 L185 104" stroke="#6b625a" stroke-width="3" opacity=".35" stroke-linecap="round"/>
  <circle cx="45" cy="115" r="8" fill="#b83e3e" opacity=".86"/>
</g>

<!-- ballot card -->
<g transform="translate(578 383) rotate(-5)">
  <rect class="paperCard" width="384" height="300" rx="32"/>
  <rect x="34" y="32" width="104" height="16" rx="8" fill="#b83e3e" opacity=".78"/>
  <path d="M34 83 L330 83 M34 118 L290 118 M34 153 L346 153 M34 188 L260 188 M34 224 L312 224" stroke="#6b625a" stroke-width="4" opacity=".33" stroke-linecap="round"/>
  <path d="M38 260 C96 229 155 226 212 246 C252 260 285 259 336 232" fill="none" stroke="#13bfae" stroke-width="5" stroke-linecap="round" opacity=".78"/>
  <circle cx="333" cy="232" r="8" fill="#13bfae"/>
</g>

<!-- motion arcs and loose sketches -->
<path class="pencil2" d="M394 245 C473 193 523 195 559 241"/>
<path class="pencil2 red" d="M816 317 C762 264 706 254 642 281" stroke-width="3"/>
<path class="pencil3" d="M104 170 C160 150 193 168 236 191 M1014 168 C1086 220 1117 289 1125 383"/>
<g transform="translate(127 555) rotate(-7)">
  <rect class="paperCard" width="224" height="120" rx="24" opacity=".96"/>
  <path d="M28 34 L146 34 M28 61 L194 61 M28 88 L121 88" stroke="#6b625a" stroke-width="3" opacity=".28" stroke-linecap="round"/>
  <path d="M169 92 C185 78 200 77 215 93" fill="none" stroke="#b83e3e" stroke-width="4" opacity=".75"/>
</g>

</svg>