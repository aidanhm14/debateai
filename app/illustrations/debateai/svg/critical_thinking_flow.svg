<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
<title id="title">DebateAI critical thinking flow illustration</title>
<desc id="desc">Pencil drawn DebateAI illustration with cream paper grain, graphite lines, navy interface cards, red annotations, teal highlights, and soft shadows.</desc>

<defs>
  <filter id="paperGrain" x="-10%" y="-10%" width="120%" height="120%">
    <feTurbulence type="fractalNoise" baseFrequency="0.76" numOctaves="4" seed="21" result="noise"/>
    <feColorMatrix type="saturate" values="0"/>
    <feComponentTransfer>
      <feFuncA type="table" tableValues="0 0.105"/>
    </feComponentTransfer>
  </filter>
  <filter id="softShadow" x="-30%" y="-30%" width="160%" height="180%">
    <feGaussianBlur in="SourceAlpha" stdDeviation="18" result="blur"/>
    <feOffset in="blur" dx="0" dy="18" result="offset"/>
    <feFlood flood-color="#111a22" flood-opacity="0.18" result="color"/>
    <feComposite in="color" in2="offset" operator="in" result="shadow"/>
    <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="cardShadow" x="-30%" y="-30%" width="160%" height="180%">
    <feGaussianBlur in="SourceAlpha" stdDeviation="10" result="blur"/>
    <feOffset in="blur" dx="0" dy="10" result="offset"/>
    <feFlood flood-color="#111a22" flood-opacity="0.20" result="color"/>
    <feComposite in="color" in2="offset" operator="in" result="shadow"/>
    <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="pencilDisplace" x="-8%" y="-8%" width="116%" height="116%">
    <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="3" seed="9" result="turb"/>
    <feDisplacementMap in="SourceGraphic" in2="turb" scale="1.6"/>
  </filter>
  <linearGradient id="paperFade" x1="0" x2="1" y1="0" y2="1">
    <stop offset="0" stop-color="#fffaf1"/>
    <stop offset="1" stop-color="#f7f4ec"/>
  </linearGradient>
</defs>


<style>
  .bg { fill:url(#paperFade); }
  .grain { filter:url(#paperGrain); opacity:.055; }
  .pencil { fill:none; stroke:#3a3a36; stroke-width:3.2; stroke-linecap:round; stroke-linejoin:round; opacity:.86; filter:url(#pencilDisplace); }
  .pencil2 { fill:none; stroke:#6b625a; stroke-width:1.55; stroke-linecap:round; stroke-linejoin:round; opacity:.52; filter:url(#pencilDisplace); }
  .pencil3 { fill:none; stroke:#3a3a36; stroke-width:1.1; stroke-linecap:round; stroke-linejoin:round; opacity:.26; filter:url(#pencilDisplace); }
  .navy { fill:#111a22; }
  .navy2 { fill:#182631; }
  .red { stroke:#b83e3e; }
  .teal { stroke:#13bfae; }
  .redFill { fill:#b83e3e; }
  .tealFill { fill:#13bfae; }
  .soft { filter:url(#softShadow); }
  .card { filter:url(#cardShadow); }
  .paperCard { fill:#fffaf2; stroke:#ddd4c5; stroke-width:1.5; filter:url(#cardShadow); }
  .tiny { stroke-width:2; opacity:.72; }
  .wash { fill:#111a22; opacity:.045; }
</style>


<rect class="bg" width="100%" height="100%" rx="38"/>
<rect class="grain" width="100%" height="100%" rx="38"/>

<ellipse cx="612" cy="684" rx="448" ry="76" fill="#ddd3c4" opacity=".42" filter="url(#softShadow)"/>
<path class="wash" d="M86 142 C257 82 404 156 541 128 C721 92 878 74 1075 157 L1109 587 C920 681 739 617 581 649 C400 686 220 682 92 603 Z"/>

