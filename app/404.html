<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 · DebateIt</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0c;
    color: #fff;
    font-family:'Fraunces',Georgia,"Times New Roman",serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    text-align: center;
    padding: 24px;
    -webkit-font-smoothing: antialiased;
  }

  .container {
    max-width: 520px;
  }

  .error-code {
    font-size: 120px;
    font-weight: 800;
    color: #ef4444;
    line-height: 1;
    margin-bottom: 16px;
  }

  .subtitle {
    font-size: 24px;
    font-weight: 600;
    margin-bottom: 12px;
  }

  .message {
    font-size: 16px;
    color: rgba(255,255,255,.65);
    margin-bottom: 36px;
    line-height: 1.5;
  }

  .btn-row {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .btn {
    display: inline-block;
    padding: 12px 28px;
    text-decoration: none;
    font-size: 15px;
    font-weight: 600;
    border-radius: 8px;
    transition: background 0.2s ease, border-color 0.2s ease;
  }

  .btn-primary {
    background: #ef4444;
    color: #ffffff;
  }

  .btn-primary:hover {
    background: #dc2626;
  }

  .btn-ghost {
    background: transparent;
    color: rgba(255,255,255,.85);
    border: 1px solid rgba(255,255,255,.32);
  }

  .btn-ghost:hover {
    border-color: rgba(255,255,255,.6);
  }
</style>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT,WONK@9..144,300..900,0..100,0..1&display=swap" media="print" onload="this.media='all';this.onload=null">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT,WONK@9..144,300..900,0..100,0..1&display=swap"></noscript>
</head>
<body>

<div class="container">
  <div class="error-code">404</div>
  <div class="subtitle">Page not found</div>
  <p class="message">The argument you're looking for doesn't exist. Yet.</p>
  <div class="btn-row">
    <a href="/" class="btn btn-primary">Back to DebateIt</a>
    <a href="/debate-it" class="btn btn-ghost">Start a round</a>
  </div>
</div>

  <script src="/js/home-magnet.js" defer></script>
</body>
</html>
