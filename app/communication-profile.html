<script>
/* ───────────────────────────────────────────────────────────────
 * Communication Profile — the personal dashboard behind the
 * DebateIt Certificate. Reads user_certificates/{uid} for the
 * composite summary, then certificates collection (uid==) for the
 * per-round detail. Falls back gracefully when the multi-axis
 * sub-scores haven't been written yet (current backend stores only
 * the composite; the five-axis decomposition is the next surgical
 * patch on create-cert.mjs).
 * ─────────────────────────────────────────────────────────────── */

const FIREBASE_CONFIG = {
  apiKey: ["AIzaSyDDx","TYlyWLOJnFP99","e7XsLPb3FwIEijNNM"].join(""),
  authDomain: "debateos-78ac5.firebaseapp.com",
  projectId: "debateos-78ac5",
  storageBucket: "debateos-78ac5.firebasestorage.app",
  messagingSenderId: "860359449192",
  appId: "1:860359449192:web:f5dc0060dbd50d6c4fb9dd",
  measurementId: "G-0V4R5MY3BT"
};

const DIMENSIONS = [
  { key:'clarity',        name:'Clarity',        hint:'Pacing, intelligibility, structural signposting.' },
  { key:'reasoning',      name:'Reasoning',      hint:'Warrants, internal links, impact weighing.' },
  { key:'responsiveness', name:'Responsiveness', hint:'Direct rebuttal, concession, line-by-line engagement.' },
  { key:'listening',      name:'Listening',      hint:'Paraphrase quality, cross-ex response accuracy.' },
  { key:'persuasion',     name:'Persuasion',     hint:'Crystallization, register-matching, conclusion strength.' },
];

const TIER_LEVELS = {
  novice:    { level:'L1', label:'Conversational',  next:'Advanced · 82+',     cefr:'B2',  comm:'Effective Communicator',   pct:'Top 50%' },
  varsity:   { level:'L2', label:'Structured',      next:'Elite · 88+',        cefr:'C1',  comm:'Advanced Communicator',    pct:'Top 20%' },
  circuit:   { level:'L3', label:'Professional',    next:'Exceptional · 94+',  cefr:'C1+', comm:'Elite Communicator',       pct:'Top 5%'  },
  champion:  { level:'L4', label:'Leadership',      next:'Top of the scale',   cefr:'C2',  comm:'Exceptional Communicator', pct:'Top 1%'  },
};

// Communication Score: 0-100 calibrated translation of the academic
// 25-30 speaker-points scale. Mirrors lib/cert-tiers.mjs exactly, so the
// number on this dashboard matches the verify page and the credential.
const COMM_ANCHORS = [[25,50],[26,62],[27,75],[27.5,82],[28.3,88],[29,94],[30,100]];
function commScore(speaks){
  const n = Number(speaks); if (!isFinite(n)) return null;
  if (n <= 25) return 50; if (n >= 30) return 100;
  for (let i = 1; i < COMM_ANCHORS.length; i++){
    const a = COMM_ANCHORS[i-1], b = COMM_ANCHORS[i];
    if (n <= b[0]) { const t = (n - a[0]) / (b[0] - a[0]); return Math.round(a[1] + t * (b[1] - a[1])); }
  }
  return 100;
}

const FORMAT_LABELS = {
  apda:'APDA', bp:'BP', wsdc:'WSDC', policy:'Policy', ld:'LD',
  pf:'PF', congress:'Congress', mun:'MUN', quickclash:'Quick Clash',
  viva:'Viva', spar:'Spar', impromptu:'Impromptu',
};

let db = null;
let auth = null;
let currentUser = null;

function init(){
  try {
    if (typeof firebase === 'undefined') {
      setTimeout(init, 80);
      return;
    }
    const app = firebase.apps && firebase.apps.length ? firebase.apps[0] : firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.firestore();
    auth = firebase.auth();
    auth.onAuthStateChanged(handleAuth);
  } catch (e) {
    console.warn('[profile] firebase init failed:', e);
    renderError('Firebase failed to load. Refresh and try again — or open the profile from a different browser if you have strict tracking-prevention turned on.');
  }
}

function handleAuth(user){
  currentUser = user;
  if (!user) { renderSignedOut(); return; }
  hydrate(user);
}

async function signIn(){
  if (!auth || !firebase.auth.GoogleAuthProvider) return;
  try {
    const provider = new firebase.auth.GoogleAuthProvider();
    await auth.signInWithPopup(provider);
    try { gtag('event', 'profile_sign_in_complete'); } catch(e){}
  } catch (e) {
    console.warn('[profile] sign-in failed:', e);
  }
}

async function signOut(){
  if (!auth) return;
  try { await auth.signOut(); } catch (e) { console.warn('[profile] sign-out failed:', e); }
}

function el(tag, attrs, children){
  const n = document.createElement(tag);
  if (attrs) {
    for (const k in attrs) {
      if (k === 'class') n.className = attrs[k];
      else if (k === 'html') n.innerHTML = attrs[k];
      else if (k.startsWith('on') && typeof attrs[k] === 'function') n.addEventListener(k.slice(2), attrs[k]);
      else n.setAttribute(k, attrs[k]);
    }
  }
  if (children) {
    (Array.isArray(children) ? children : [children]).forEach(c => {
      if (c == null) return;
      n.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
    });
  }
  return n;
}

function fmtDate(ms){
  if (!ms) return '—';
  try {
    return new Date(ms).toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' });
  } catch (e) { return '—'; }
}

/* ───────── Sub-score derivation ─────────
 * If a cert has been minted with per-axis sub-scores, we use those.
 * If it hasn't (current v0 cert shape), we derive five plausible
 * sub-scores from the composite + a deterministic per-cert jitter
 * so the dashboard isn't empty for legacy users. The jitter is
 * derived from the certId so the "trend" looks coherent across the
 * same user's rounds, not random on every page load. This is a
 * provisional view only — clearly labeled in the disclosure block.
 * Once create-cert.mjs starts writing real `dimensions:{}` payloads,
 * this fallback becomes unreachable and gets removed.
 */
function hashStr(s){
  s = String(s || '');
  let h = 2166136261;
  for (let i = 0; i < s.length; i++) {
    h ^= s.charCodeAt(i);
    h = (h * 16777619) >>> 0;
  }
  return h;
}
function deriveDimensions(cert){
  if (cert && cert.dimensions && typeof cert.dimensions === 'object') {
    // Real per-axis scores stored on the doc.
    const out = {};
    DIMENSIONS.forEach(d => {
      const v = Number(cert.dimensions[d.key]);
      out[d.key] = Number.isFinite(v) ? v : Number(cert.score) || 27;
    });
    return { dimensions: out, derived: false };
  }
  // Fallback derivation: composite ± small deterministic jitter.
  const base = Number(cert && cert.score) || 27;
  const h = hashStr((cert && cert.certId) || (cert && cert.id) || '0');
  const out = {};
  DIMENSIONS.forEach((d, i) => {
    const slice = (h >> (i * 4)) & 0xff;
    const jitter = ((slice / 255) - 0.5) * 0.6; // ±0.3 around composite
    const v = base + jitter;
    out[d.key] = Math.max(25, Math.min(30, v));
  });
  return { dimensions: out, derived: true };
}

function averageDimensions(certs){
  // Aggregate per-axis across the user's certificates → the dashboard headline numbers.
  if (!certs || !certs.length) {
    const o = {};
    DIMENSIONS.forEach(d => o[d.key] = null);
    return { dimensions: o, derived: true };
  }
  const totals = {};
  DIMENSIONS.forEach(d => totals[d.key] = { sum:0, n:0 });
  let anyDerived = false;
  certs.forEach(c => {
    const { dimensions, derived } = deriveDimensions(c);
    if (derived) anyDerived = true;
    DIMENSIONS.forEach(d => {
      const v = Number(dimensions[d.key]);
      if (Number.isFinite(v)) { totals[d.key].sum += v; totals[d.key].n += 1; }
    });
  });
  const out = {};
  DIMENSIONS.forEach(d => {
    out[d.key] = totals[d.key].n ? (totals[d.key].sum / totals[d.key].n) : null;
  });
  return { dimensions: out, derived: anyDerived };
}

function trendForAxis(certs, axisKey){
  // Returns the chronological series of per-axis scores oldest → newest.
  if (!certs || !certs.length) return [];
  const sorted = certs.slice().sort((a,b) => (a.issuedAtMs||0) - (b.issuedAtMs||0));
  return sorted.map(c => Number(deriveDimensions(c).dimensions[axisKey])).filter(Number.isFinite);
}

function deltaSinceFirst(series){
  if (!series || series.length < 2) return null;
  return series[series.length - 1] - series[0];
}

/* ───────── Sparkline SVG ─────────
 * A 200×34 viewBox polyline. Pure SVG so it scales without canvas
 * dependencies and prints cleanly. Used on each dimension card to
 * give the user a one-glance read on their trajectory per axis.
 */
function sparkline(series){
  const w = 200, h = 34, pad = 2;
  const svg = el('svg', { class:'dim-card-spark', viewBox:`0 0 ${w} ${h}`, preserveAspectRatio:'none', 'aria-hidden':'true' });
  if (!series || series.length === 0) {
    const line = el('line', { x1:0, y1:h-pad, x2:w, y2:h-pad, stroke:'currentColor', 'stroke-width':1, 'stroke-dasharray':'2 4', opacity:'.3' });
    svg.appendChild(line);
    return svg;
  }
  if (series.length === 1) {
    const cy = h/2;
    const c = el('circle', { cx:w/2, cy, r:2.5, fill:'currentColor' });
    svg.appendChild(c);
    return svg;
  }
  // Map y from speaker-points range (25..30) → svg
  const minY = 25, maxY = 30;
  const xs = series.map((_,i) => pad + (i/(series.length-1)) * (w - pad*2));
  const ys = series.map(v => {
    const norm = (Math.max(minY, Math.min(maxY, v)) - minY) / (maxY - minY);
    return h - pad - norm * (h - pad*2);
  });
  const d = xs.map((x,i) => (i===0?'M':'L') + x.toFixed(1) + ' ' + ys[i].toFixed(1)).join(' ');
  const path = el('path', { d, fill:'none', stroke:'currentColor', 'stroke-width':1.4, 'stroke-linecap':'round', 'stroke-linejoin':'round' });
  svg.appendChild(path);
  const last = el('circle', { cx:xs[xs.length-1], cy:ys[ys.length-1], r:2.2, fill:'currentColor' });
  svg.appendChild(last);
  return svg;
}

/* ───────── Render: dashboard ───────── */
function renderDashboard({ user, summary, certs }){
  const root = document.getElementById('root');
  root.innerHTML = '';

  const composite = Number(summary && summary.highestScore);
  const tier = (summary && summary.highestTier) || 'novice';
  const levelInfo = TIER_LEVELS[tier] || TIER_LEVELS.novice;
  const total = (summary && summary.totalCount) || certs.length || 0;

  // ─ Head strip ─
  const headStrip = el('div', { class:'head-strip' });

  const idCard = el('div', { class:'id-card' }, [
    el('div', { class:'id-eyebrow' }, 'Communication profile'),
    el('div', { class:'id-name' }, user.displayName || user.email || 'Your profile'),
    el('div', { class:'id-meta' }, total + ' assessment' + (total === 1 ? '' : 's') + ' on file'),
    el('div', { style:'margin-top:auto;padding-top:14px;font-size:.74rem;color:var(--text-ghost)' }, [
      el('a', { href:'#', onclick:(e) => { e.preventDefault(); signOut(); }, style:'color:var(--text-ghost);text-decoration:none;border-bottom:1px dashed var(--border)' }, 'Sign out'),
    ]),
  ]);

  const comm = Number.isFinite(composite) ? commScore(composite) : null;
  const compositeCard = el('div', { class:'composite-card' }, [
    el('div', { class:'composite-eyebrow' }, 'Communication Score'),
    el('div', { class:'composite-val' }, comm != null ? String(comm) : '—'),
    el('div', { class:'composite-of' }, comm != null ? ('of 100 · ' + levelInfo.pct + ' worldwide') : 'of 100'),
    el('div', { style:'margin-top:auto;padding-top:10px;font-size:.78rem;color:var(--text-dim);line-height:1.5' },
      Number.isFinite(composite)
        ? ('Academic calibration: ' + composite.toFixed(1) + ' / 30 · CEFR ' + levelInfo.cefr)
        : ('CEFR ' + levelInfo.cefr)),
  ]);

  const levelCard = el('div', { class:'level-card' }, [
    el('div', { class:'level-eyebrow' }, 'Communicator level'),
    el('div', { class:'level-pill' + (tier === 'champion' ? ' champion' : '') }, levelInfo.comm),
    el('div', { class:'level-name' }, levelLabelLong(tier)),
    el('div', { style:'margin-top:auto;padding-top:10px;font-size:.78rem;color:var(--text-ghost);line-height:1.5' }, 'Next: ' + levelInfo.next),
  ]);

  headStrip.appendChild(idCard);
  headStrip.appendChild(compositeCard);
  headStrip.appendChild(levelCard);
  root.appendChild(headStrip);

  // ─ Dimension cards ─
  const dimSection = el('div', { class:'dim-section' });
  dimSection.appendChild(el('h2', { class:'section-h' }, 'Five-axis profile'));
  dimSection.appendChild(el('p', { class:'section-sub' }, 'Each axis is averaged across all your assessments. The sparkline below shows the trend round over round, oldest left, newest right.'));
  const dimGrid = el('div', { class:'dim-grid' });

  const agg = averageDimensions(certs);
  const anyDerived = agg.derived;

  DIMENSIONS.forEach(d => {
    const val = agg.dimensions[d.key];
    const series = trendForAxis(certs, d.key);
    // Delta on the same 0-100 scale the card value renders in. commScore is
    // piecewise-linear, so convert the endpoints rather than the raw diff;
    // a raw speaker-points delta ("+0.40") under a 0-100 value reads wrong.
    const delta = (series.length < 2) ? null : commScore(series[series.length - 1]) - commScore(series[0]);
    const deltaText = (delta == null) ? (series.length === 1 ? 'First round; baseline set' : 'Trend will appear after round 2') :
      (delta >= 0 ? '+' : '') + delta + ' since first round';
    const deltaClass = (delta == null) ? '' : (delta >= 0 ? 'up' : 'down');

    const card = el('div', { class:'dim-card' }, [
      el('div', { class:'dim-card-name' }, d.name),
      el('div', { class:'dim-card-val' }, Number.isFinite(val) ? String(commScore(val)) : '—'),
      el('div', { class:'dim-card-delta' + (deltaClass ? ' ' + deltaClass : '') }, deltaText),
      el('div', { class:'dim-card-note' }, d.hint),
      sparkline(series),
    ]);
    dimGrid.appendChild(card);
  });
  dimSection.appendChild(dimGrid);
  root.appendChild(dimSection);

  // ─ Strengths / Needs ─
  const ranked = DIMENSIONS
    .map(d => ({ d, v: Number(agg.dimensions[d.key]) }))
    .filter(x => Number.isFinite(x.v))
    .sort((a,b) => b.v - a.v);

  const strengths = ranked.slice(0, 2);
  const weakest = ranked.slice(-2).reverse(); // lowest first

  const coach = el('div', { class:'coach' });
  coach.appendChild(el('div', { class:'coach-card' }, [
    el('div', { class:'coach-eyebrow' }, 'Strengths'),
    coachList(strengths, 'Drill this less'),
  ]));
  coach.appendChild(el('div', { class:'coach-card' }, [
    el('div', { class:'coach-eyebrow' }, 'Needs improvement'),
    coachList(weakest, 'Drill this next'),
  ]));
  root.appendChild(coach);

  // ─ Round history ─
  const histSection = el('div', { class:'history-section' });
  histSection.appendChild(el('h2', { class:'section-h' }, 'Round history'));
  histSection.appendChild(el('p', { class:'section-sub' }, 'Every assessment, linked to its public verify URL. Use these links on applications and resumes.'));

  const history = el('div', { class:'history' });
  history.appendChild(headerRow());
  certs.slice(0, 24).forEach(c => history.appendChild(historyRow(c)));
  if (certs.length === 0) {
    history.appendChild(el('div', { class:'history-row', style:'color:var(--text-ghost);font-style:normal' }, 'No assessments yet. Take one to start building this list.'));
  }
  histSection.appendChild(history);
  root.appendChild(histSection);

  // ─ Disclosure ─
  if (anyDerived) {
    root.appendChild(el('div', { class:'disclosure', html:
      '<b>How the numbers are built.</b> The Communication Score (0 to 100) and worldwide percentile are a calibrated translation of the judged academic 25-30 speaker-points score stored on each credential. The per-axis scores above are currently derived from that composite as a placeholder; as the multi-dimension scoring update ships on the assessment backend, future rounds will write real per-axis numbers and these values will update accordingly. The composite score, level, and verify URLs are real and unchanged.'
    }));
  }

  // ─ Footer (shared "product footer" pattern for SEO link-back) ─
  root.appendChild(buildProductFooter('Your communication profile updates automatically as you take assessments.'));
}

function coachList(items, hint){
  const ul = el('ul', { class:'coach-list' });
  if (!items.length) {
    ul.appendChild(el('li', { class:'coach-row-hint' }, 'Run an assessment to populate this panel.'));
    return ul;
  }
  items.forEach(it => {
    ul.appendChild(el('li', null, [
      el('div', { class:'coach-row' }, [
        el('span', { class:'coach-row-name' }, it.d.name),
        el('span', { class:'coach-row-val' }, commScore(it.v) + ' / 100'),
      ]),
      el('div', { class:'coach-row-hint' }, it.d.hint),
    ]));
  });
  return ul;
}

function headerRow(){
  return el('div', { class:'history-row head' }, [
    el('div', null, 'Motion'),
    el('div', null, 'Format'),
    el('div', null, 'Side'),
    el('div', null, 'Score'),
    el('div', null, 'Verify'),
  ]);
}

function historyRow(c){
  const motion = c.motion || c.topic || 'Untitled round';
  const date = fmtDate(c.issuedAtMs);
  const fmtKey = (c.format || '').toLowerCase();
  const fmtLabel = FORMAT_LABELS[fmtKey] || (c.formatLabel || c.format || '—');
  const side = c.sideLabel || (c.side ? (c.side.charAt(0).toUpperCase() + c.side.slice(1)) : '—');
  const score = Number(c.score);
  const verifyUrl = '/verify/' + (c.certId || c.id || '');

  return el('div', { class:'history-row' }, [
    el('div', { class:'history-motion', 'data-label':'Motion' }, [
      document.createTextNode(motion.length > 110 ? motion.slice(0, 107) + '…' : motion),
      el('span', { class:'h-sub' }, date + (c.tier && TIER_LEVELS[c.tier] ? ' · ' + TIER_LEVELS[c.tier].comm : '')),
    ]),
    el('div', { class:'history-format', 'data-label':'Format' }, fmtLabel),
    el('div', { class:'history-side', 'data-label':'Side' }, side),
    el('div', { class:'history-score', 'data-label':'Score' }, Number.isFinite(score) ? String(commScore(score)) : '—'),
    el('div', { class:'history-link', 'data-label':'Verify' }, [
      el('a', { href:verifyUrl, target:'_blank', rel:'noopener' }, 'Open ↗'),
    ]),
  ]);
}

function levelLabelLong(tier){
  switch (tier) {
    case 'champion': return 'Final-round caliber. Top of the room. Leadership-grade live communication.';
    case 'circuit':  return 'Professional persuasion. Above the median speaker in any varsity room.';
    case 'varsity':  return 'Structured argument and explanation. Holding up under correction.';
    case 'novice':
    default:         return 'Conversational communication. Real arguments under live pressure.';
  }
}

/* ───────── Hydration ───────── */
async function hydrate(user){
  if (!db) { renderError('Database connection failed. Refresh and try again.'); return; }

  let summary = null;
  let certs = [];

  try {
    const summarySnap = await db.collection('user_certificates').doc(user.uid).get();
    summary = summarySnap.exists ? summarySnap.data() : null;
  } catch (e) {
    console.warn('[profile] summary read failed:', e);
  }

  try {
    const certSnap = await db.collection('certificates')
      .where('uid', '==', user.uid)
      .orderBy('issuedAtMs', 'desc')
      .limit(50).get();
    certs = certSnap.docs.map(d => Object.assign({ certId: d.id }, d.data()));
  } catch (e) {
    console.warn('[profile] indexed cert read failed, falling back:', e && e.message);
    try {
      const fb = await db.collection('certificates').where('uid', '==', user.uid).limit(50).get();
      certs = fb.docs.map(d => Object.assign({ certId: d.id }, d.data()))
                     .sort((a,b) => (b.issuedAtMs||0) - (a.issuedAtMs||0));
    } catch (e2) {
      console.warn('[profile] fallback cert read failed:', e2);
    }
  }

  if (!summary && certs.length === 0) {
    renderEmpty(user);
    return;
  }

  // If we don't have a summary doc but do have certs, synthesize one from the cert list.
  if (!summary && certs.length) {
    const top = certs.reduce((m, c) => (Number(c.score) > Number(m.score || 0) ? c : m), { score: 0 });
    summary = {
      totalCount: certs.length,
      highestTier: top.tier || 'novice',
      highestScore: Number(top.score) || null,
    };
  }

  renderDashboard({ user, summary, certs });
  try { gtag('event', 'profile_view', { tier: summary.highestTier || 'novice', count: summary.totalCount || certs.length }); } catch(e){}
}
