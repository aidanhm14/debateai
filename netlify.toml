# ──────────────────────────────────────────────────────────────────
# API routing — DO NOT add /api/* redirects here.
#
# Every function uses Netlify Functions v2 and self-declares its
# route via `export const config = { path: '/api/...' }`. Adding
# [[redirects]] from /api/* to /.netlify/functions/* with force=true
# overrides the function's own routing and rewrites to a path that
# doesn't exist for v2 functions.
#
# Legacy alias /api/billing/webhook → /api/stripe-webhook kept because
# old Stripe configs may still point there.
# ──────────────────────────────────────────────────────────────────
[[redirects]]
  from = "/api/billing/webhook"
  to = "/api/stripe-webhook"
  status = 200
