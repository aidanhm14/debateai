[build]
  # publish = "." (repo root) is the bullet-proof setup given the dual layout:
  # root/index.html now contains the landing HTML directly, so Netlify serves
  # landing at / whether the dashboard honors netlify.toml or not. The React
  # app lives at /app/ and Netlify serves that subtree as-is.
  publish = "."
  functions = "app/netlify/functions"

[build.environment]
  NETLIFY_SKIP_SECRETS_CHECK = "true"

[functions]
  external_node_modules = ["@google-cloud/firestore", "stripe"]
  node_bundler = "esbuild"

# ════════════════════════════════════════════════════════════════════
# Routing — repo has dual copies (stale root files + live /app files).
# publish="app" above makes Netlify serve from app/, ignoring root copies.
# All redirects below are read from THIS file (repo-root netlify.toml);
# app/netlify.toml is no longer authoritative but kept in sync for safety.
# ════════════════════════════════════════════════════════════════════

# Marketing landing at root. React app lives under /app/.
# With publish=".", root/index.html is served at / directly (it IS the
# landing page content — copy of app/landing.html).
#
# `/` MUST serve the marketing landing, not the React app. Netlify picks
# an existing file at `/` before falling through to redirects, so when
# publish dir is `/app/` the default behavior is to serve `/app/index.html`
# (the React bundle). force=true makes this rewrite win unconditionally.
[[redirects]]
  from = "/"
  to = "/landing.html"
  status = 200
  force = true

[[redirects]]
  from = "/landing"
  to = "/landing.html"
  status = 200

# /app (bare) and /app/anything both serve the React app at /app/index.html
[[redirects]]
  from = "/app"
  to = "/app/index.html"
  status = 200

[[redirects]]
  from = "/app/"
  to = "/app/index.html"
  status = 200

# Icon 404 patches
[[redirects]]
  from = "/favicon.ico"
  to = "/icons/icon-192.png"
  status = 200

[[redirects]]
  from = "/apple-touch-icon.png"
  to = "/icons/icon-192.png"
  status = 200

[[redirects]]
  from = "/apple-touch-icon-precomposed.png"
  to = "/icons/icon-192.png"
  status = 200

[[redirects]]
  from = "/apple-touch-icon-*.png"
  to = "/icons/icon-512.png"
  status = 200

# Named pages
[[redirects]]
  from = "/high-school"
  to = "/high-school.html"
  status = 200

# Debaters landing (remains separate from root landing per soul.md).
[[redirects]]
  from = "/debaters"
  to = "/debaters.html"
  status = 200

# Consolidated professional-overflow page. Replaces the six per-audience
# pages (lawyers / sales / teams / founders / students / speakers) which
# were deleted 2026-04-20. Old URLs 301 to /pro so inbound links don't 404.
[[redirects]]
  from = "/pro"
  to = "/pro.html"
  status = 200

[[redirects]]
  from = "/lawyers"
  to = "/pro"
  status = 301

[[redirects]]
  from = "/sales"
  to = "/pro"
  status = 301

[[redirects]]
  from = "/teams"
  to = "/pro"
  status = 301

[[redirects]]
  from = "/founders"
  to = "/pro"
  status = 301

[[redirects]]
  from = "/students"
  to = "/pro"
  status = 301

[[redirects]]
  from = "/speakers"
  to = "/pro"
  status = 301

[[redirects]]
  from = "/debate-ai"
  to = "/debate-ai.html"
  status = 200

[[redirects]]
  from = "/learn"
  to = "/learn.html"
  status = 200

[[redirects]]
  from = "/changelog"
  to = "/changelog.html"
  status = 200

[[redirects]]
  from = "/markets"
  to = "/markets.html"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200

# /me was a stale localStorage-only debates archive superseded by the full
# Team + Library system. Page deleted 2026-04-20; route 301s to /debate-ai
# so old bookmarks / tweets land on the sparring page instead of 404.
[[redirects]]
  from = "/me"
  to = "/debate-ai"
  status = 301

# Legacy Stripe webhook alias
[[redirects]]
  from = "/api/billing/webhook"
  to = "/api/stripe-webhook"
  status = 200
