# ════════════════════════════════════════════════════════════════════
# SERVING TRUTH (as of 2026-04-21)
#
# The Netlify dashboard has the base/publish directory set to `app/`,
# so Netlify reads `app/netlify.toml` as the authoritative config and
# serves files from the `app/` subtree. Verified by diffing prod HTML
# (`curl https://debateai.com/`) against `app/landing.html` — identical
# modulo Netlify's auto-injected RUM script.
#
# This file (repo-root netlify.toml) is NOT read by Netlify in the
# current setup. It is kept as a safety mirror of `app/netlify.toml`
# so if someone flips the base directory back to repo root, routing
# still works. Any change to routing MUST be made in both files.
#
# Prior comments in this file claimed the opposite ("stale /app files,
# live root files"). That was wrong and led to weeks of edits landing
# in `app/landing.html` while the author believed they were editing
# dead root copies. The stale root `landing.html` and `index.html`
# were deleted in this cleanup.
# ════════════════════════════════════════════════════════════════════

[build]
  publish = "app"
  functions = "app/netlify/functions"

[build.environment]
  NETLIFY_SKIP_SECRETS_CHECK = "true"

[functions]
  external_node_modules = ["@google-cloud/firestore", "stripe"]
  node_bundler = "esbuild"

# Icon 404 patches — browsers and PWAs request canonical icon paths
# that don't physically exist. Serve them from /icons/ via rewrite.
[[redirects]]
  from = "/favicon.ico"
  to = "/icons/icon-192.png"
  status = 200

[[redirects]]
  from = "/apple-touch-icon.png"
  to = "/icons/icon-192.png"
  status = 200

[[redirects]]
  from = "/apple-touch-icon-precomposed.png"
  to = "/icons/icon-192.png"
  status = 200

[[redirects]]
  from = "/apple-touch-icon-*.png"
  to = "/icons/icon-512.png"
  status = 200

# Root routing.
# / serves /landing.html (reverted from splash 2026-05-15 — splash had
# ~14 words of content and zero outbound links, tanking SEO at the
# canonical URL). Splash still reachable at /splash.
# `force = true` keeps this rule above any shadow /index.html.
[[redirects]]
  from = "/"
  to = "/landing.html"
  status = 200
  force = true

[[redirects]]
  from = "/splash"
  to = "/splash.html"
  status = 200

[[redirects]]
  from = "/landing"
  to = "/landing.html"
  status = 200

[[redirects]]
  from = "/app"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/app/*"
  to = "/index.html"
  status = 200

# Named pages
[[redirects]]
  from = "/high-school"
  to = "/high-school.html"
  status = 200

# Schools / educators page (canonical URL declared in app/schools.html)
[[redirects]]
  from = "/schools"
  to = "/schools.html"
  status = 200

[[redirects]]
  from = "/debaters"
  to = "/debaters.html"
  status = 200

# Consolidated /pro page replaces the six per-audience pages (deleted
# 2026-04-20). Legacy URLs 301 to /pro.
[[redirects]]
  from = "/pro"
  to = "/pro.html"
  status = 200
[[redirects]]
  from = "/lawyers"
  to = "/pro"
  status = 301
[[redirects]]
  from = "/sales"
  to = "/pro"
  status = 301
[[redirects]]
  from = "/teams"
  to = "/pro"
  status = 301
[[redirects]]
  from = "/founders"
  to = "/pro"
  status = 301
[[redirects]]
  from = "/students"
  to = "/pro"
  status = 301
[[redirects]]
  from = "/speakers"
  to = "/pro"
  status = 301

[[redirects]]
  from = "/debate-ai"
  to = "/debate-ai.html"
  status = 200

# Live debates (human vs human)
[[redirects]]
  from = "/live"
  to = "/live.html"
  status = 200

# Cross-format leaderboard (public, AI-judged)
[[redirects]]
  from = "/leaderboard"
  to = "/leaderboard.html"
  status = 200

[[redirects]]
  from = "/learn"
  to = "/learn.html"
  status = 200

[[redirects]]
  from = "/changelog"
  to = "/changelog.html"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200

[[redirects]]
  from = "/admin/runner"
  to = "/admin-runner.html"
  status = 200

[[redirects]]
  from = "/admin-runner"
  to = "/admin-runner.html"
  status = 200

[[redirects]]
  from = "/pricing"
  to = "/pricing.html"
  status = 200

# /me deleted 2026-04-20 — stale localStorage archive. 301 to /debate-ai
# so old bookmarks land on the sparring page instead of 404.
[[redirects]]
  from = "/me"
  to = "/debate-ai"
  status = 301

# ──────────────────────────────────────────────────────────────────
# API routing — DO NOT add /api/* redirects here.
#
# Every function uses Netlify Functions v2 and self-declares its
# route via `export const config = { path: '/api/...' }`. Adding
# [[redirects]] from /api/* to /.netlify/functions/* with force=true
# overrides the function's own routing and rewrites to a path that
# doesn't exist for v2 functions.
#
# Legacy alias /api/billing/webhook → /api/stripe-webhook kept because
# old Stripe configs may still point there.
# ──────────────────────────────────────────────────────────────────
[[redirects]]
  from = "/api/billing/webhook"
  to = "/api/stripe-webhook"
  status = 200
