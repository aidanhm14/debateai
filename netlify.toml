[build]
  # publish = "." (repo root) is the bullet-proof setup given the dual layout:
  # root/index.html now contains the landing HTML directly, so Netlify serves
  # landing at / whether the dashboard honors netlify.toml or not. The React
  # app lives at /app/ and Netlify serves that subtree as-is.
  publish = "."
  functions = "app/netlify/functions"

[build.environment]
  NETLIFY_SKIP_SECRETS_CHECK = "true"

[functions]
  external_node_modules = ["@google-cloud/firestore", "stripe"]
  node_bundler = "esbuild"

# ════════════════════════════════════════════════════════════════════
# Routing — repo has dual copies (stale root files + live /app files).
# publish="app" above makes Netlify serve from app/, ignoring root copies.
# All redirects below are read from THIS file (repo-root netlify.toml);
# app/netlify.toml is no longer authoritative but kept in sync for safety.
# ════════════════════════════════════════════════════════════════════

# Marketing landing at root. React app lives under /app/.
# With publish=".", root/index.html is served at / directly (it IS the
# landing page content — copy of app/landing.html).
#
# Belt-and-suspenders: even though root/index.html IS landing content,
# we still declare an explicit "/" → "/landing.html" redirect so that if
# Netlify's publish dir ever gets reconfigured (via dashboard overrides
# that ignore netlify.toml), a root visit still lands on marketing rather
# than bootstrapping into the React app. Use force=true so this rule wins
# against any shadow file at `/` that might otherwise be served directly.
[[redirects]]
  from = "/"
  to = "/landing.html"
  status = 200
  force = false

[[redirects]]
  from = "/landing"
  to = "/landing.html"
  status = 200

# /app (bare) and /app/anything both serve the React app at /app/index.html
[[redirects]]
  from = "/app"
  to = "/app/index.html"
  status = 200

[[redirects]]
  from = "/app/"
  to = "/app/index.html"
  status = 200

# Icon 404 patches
[[redirects]]
  from = "/favicon.ico"
  to = "/icons/icon-192.png"
  status = 200

[[redirects]]
  from = "/apple-touch-icon.png"
  to = "/icons/icon-192.png"
  status = 200

[[redirects]]
  from = "/apple-touch-icon-precomposed.png"
  to = "/icons/icon-192.png"
  status = 200

[[redirects]]
  from = "/apple-touch-icon-*.png"
  to = "/icons/icon-512.png"
  status = 200

# Named pages
[[redirects]]
  from = "/high-school"
  to = "/high-school.html"
  status = 200

# Audience-specific landing pages — one per vertical. Keep the URL
# clean (no .html) so /debaters, /lawyers, /sales, /teams, /founders,
# /students, /speakers can be shared/linked externally without leaking
# the build detail.
[[redirects]]
  from = "/debaters"
  to = "/debaters.html"
  status = 200

[[redirects]]
  from = "/lawyers"
  to = "/lawyers.html"
  status = 200

[[redirects]]
  from = "/sales"
