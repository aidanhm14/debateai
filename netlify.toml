# Icon 404 patches — browsers and PWAs request canonical icon paths
# that don't physically exist. Serve them from /icons/ via rewrite.
# /favicon.ico now physically exists at the root as a real multi-resolution
# .ico (16/32/48/64), so it bypasses these rules and serves directly.
# Google's favicon crawler explicitly prefers a real .ico — the prior
# PNG-served-at-.ico-URL was triggering the auto-generated letter-avatar
# fallback in search results. (Note: the apple-touch and android icons
# below stay as rewrites because no real files exist for those paths.)
[[redirects]]
  from = "/apple-touch-icon.png"
  to = "/icons/icon-192.png"
  status = 200

[[redirects]]
  from = "/apple-touch-icon-precomposed.png"
  to = "/icons/icon-192.png"
  status = 200

[[redirects]]
  from = "/apple-touch-icon-*.png"
  to = "/icons/icon-512.png"
  status = 200

