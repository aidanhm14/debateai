[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  NETLIFY_SKIP_SECRETS_CHECK = "true"

[functions]
  external_node_modules = ["@google-cloud/firestore", "stripe"]
  node_bundler = "esbuild"

# Root-level redirects removed — Netlify reads app/netlify.toml (base dir is
# "app" per dashboard config). Those old rules were the inverse of the current
# routing and would silently re-surface if base dir ever changed.
