# ════════════════════════════════════════════════════════════════════
# SERVING TRUTH (as of 2026-04-21)
#
# The Netlify dashboard has the base/publish directory set to `app/`,
# so Netlify reads `app/netlify.toml` as the authoritative config and
# serves files from the `app/` subtree. Verified by diffing prod HTML
# (`curl https://debateai.com/`) against `app/landing.html` — identical
# modulo Netlify's auto-injected RUM script.
#
# This file (repo-root netlify.toml) is NOT read by Netlify in the
# current setup. It is kept as a safety mirror of `app/netlify.toml`
# so if someone flips the base directory back to repo root, routing
# still works. Any change to routing MUST be made in both files.
#
# Prior comments in this file claimed the opposite ("stale /app files,
# live root files"). That was wrong and led to weeks of edits landing
# in `app/landing.html` while the author believed they were editing
# dead root copies. The stale root `landing.html` and `index.html`
# were deleted in this cleanup.
# ════════════════════════════════════════════════════════════════════

[build]
  command = "node scripts/bake-firestore-creds.mjs && echo 'Static Netlify deploy: publishing app/ without Vite build'"
  publish = "app"
  functions = "app/netlify/functions"

[build.environment]
  # 2026-05-24: see app/netlify.toml for the full rationale. Netlify
  # renamed NETLIFY_SKIP_SECRETS_CHECK → SECRETS_SCAN_ENABLED; the old
  # name no longer disables the scanner. Setting both for safety.
  SECRETS_SCAN_ENABLED = "false"
  NETLIFY_SKIP_SECRETS_CHECK = "true"
  # Bake script intentionally writes the Firestore service account into the
  # function bundle (base64-encoded), so tell the scanner not to flag the
  # match against the dashboard GOOGLE_SERVICE_ACCOUNT value.
  SECRETS_SCAN_OMIT_KEYS = "GOOGLE_SERVICE_ACCOUNT"
  SECRETS_SCAN_OMIT_PATHS = "app/netlify/functions/lib/_firestore-creds.mjs"
  # Firebase web API keys are public by Firebase's own design — they
  # identify the project, not authenticate the user. Real auth is
  # enforced via Firestore Security Rules + App Check. The key is
  # inline in every HTML page (debate-ai, voice-debate, landing, etc.)
  # and visible in view-source. Netlify's smart-detection scanner
  # started flagging it on 2026-05-24 after debate-chat.html landed
  # with a more recognizable `apiKey: "AIza..."` pattern, which
  # bricked every deploy. Whitelist the specific value so the scan
  # keeps running for actual secrets. Mirror of app/netlify.toml.
  SECRETS_SCAN_SMART_DETECTION_OMIT_VALUES = "AIzaSyDqHa-AHzx-K9MeBaIv9TY4WPdfV5ECgrU"

[functions]
  external_node_modules = ["@google-cloud/firestore", "stripe"]
  node_bundler = "esbuild"

# Domain canonicalization → itsdebatable.com (2026-07-22). The
# canonical domain is now itsdebatable.com (brand = Debatable; the
# domain finally matches the brand — and unlike the 2026-05-25 and
# 2026-06-08 traps, this one is actually owned). Every legacy domain
# (debateai.com, debateit.live, debatetable.com, debatethedevil.com)
# 301s here, plus www→apex + http→https normalization for the
# canonical host itself. These host-scoped rules MUST stay above the
# path rewrites below: rules run first-match, and without these a
# request to a legacy host's /sitemap.xml would hit the force=true
# sitemap rewrite and serve duplicate content instead of redirecting.
# Legacy debateai.com /api/* uses 308 (method-preserving) so stale
# service-worker-cached pages on the old origin can still POST to the
# API mid-migration. Stripe's webhook endpoint must be updated to
# itsdebatable.com in Stripe itself (Stripe does not follow
# redirects). All legacy domains must remain Netlify domain aliases
# with DNS pointed at Netlify for these to fire.

# ── canonical-host normalization: www + http → https apex ──
[[redirects]]
  from = "https://www.itsdebatable.com/*"
  to = "https://itsdebatable.com/:splat"
  status = 301
  force = true
[[redirects]]
  from = "http://itsdebatable.com/*"
  to = "https://itsdebatable.com/:splat"
  status = 301
  force = true
[[redirects]]
  from = "http://www.itsdebatable.com/*"
  to = "https://itsdebatable.com/:splat"
  status = 301
  force = true

# ── debateai.com (primary legacy domain, live 2024–2026) ──
# /native serves IN PLACE on the legacy host (no redirect): the iOS
# binary uploaded to ASC 2026-07-18 hardcodes debateai.com/native with
# an allowNavigation list that does NOT include itsdebatable.com, so a
# 301 would bounce the shipped app's WebView to a domain it treats as
# external. Remove these two rules only after a binary pointing at
# itsdebatable.com ships (mobile/capacitor.config.ts already does).
