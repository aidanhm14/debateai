  to = "/teams.html"
  status = 200

[[redirects]]
  from = "/founders"
  to = "/founders.html"
  status = 200

[[redirects]]
  from = "/students"
  to = "/students.html"
  status = 200

[[redirects]]
  from = "/speakers"
  to = "/speakers.html"
  status = 200

[[redirects]]
  from = "/debate-ai"
  to = "/debate-ai.html"
  status = 200

[[redirects]]
  from = "/learn"
  to = "/learn.html"
  status = 200

[[redirects]]
  from = "/changelog"
  to = "/changelog.html"
  status = 200

[[redirects]]
  from = "/markets"
