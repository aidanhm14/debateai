<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="refresh" content="0;url=/landing">
<title>Debate the Devil</title>
<link rel="canonical" href="https://debatethedevil.com/">
<script>
  // Belt-and-suspenders: repo root has both /index.html (this file) and /app/
  // duplicates. If Netlify ever serves this root file at / instead of honoring
  // publish="app" + the / → /landing.html rewrite (dashboard override, cached
  // build, etc.), this shim still forwards users to the marketing page.
  // Also proactively unregisters any stale service worker that precached "/"
  // with old React-app content — that was the real cause of the persistent
  // "debatethedevil.com shows the app, not the landing" bug.
  try {
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(regs){
        regs.forEach(function(r){ r.unregister(); });
      });
    }
    if (window.caches && caches.keys) {
      caches.keys().then(function(keys){ keys.forEach(function(k){ caches.delete(k); }); });
    }
  } catch(e) {}
  window.location.replace('/landing');
</script>
<style>html,body{margin:0;background:#0a0a0a;color:#e2e8f0;font-family:system-ui,-apple-system,sans-serif}body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;text-align:center}a{color:#ef4444}</style>
</head>
<body>
<div>
  <p>Redirecting to <a href="/landing">debatethedevil.com/landing</a>…</p>
</div>
</body>
</html>
